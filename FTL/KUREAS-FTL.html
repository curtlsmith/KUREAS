                        <SettingsModal
                            settings={settings}
                            onSave={(newSettings) => setSettings(newSettings)}
                            onClose={() => setShowSettings(false)}
                        />
                    )}

                    {showExport && (
                        <ExportModal
                            project={currentProject}
                            onClose={() => setShowExport(false)}
                        />
                    )}

                    {/* Project Name / Description Dialog */}
                    {showProjectNameDialog && (
                        <div className="modal-overlay" style={{ zIndex: 2000 }}>
                            <div className="modal-content" style={{ maxWidth: 480 }}>
                                <div className="p-6">
                                    <h2 className="text-xl font-bold mb-4">Edit Project</h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
                                            <input
                                                type="text"
                                                value={editProjectName}
                                                onChange={e => setEditProjectName(e.target.value)}
                                                onKeyDown={e => { if (e.key === 'Enter') saveProjectName(); if (e.key === 'Escape') setShowProjectNameDialog(false); }}
                                                className="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                placeholder="Enter project name"
                                                autoFocus
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Project Description</label>
                                            <textarea
                                                value={editProjectDescription}
                                                onChange={e => setEditProjectDescription(e.target.value)}
                                                className="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                placeholder="Enter project description (optional)"
                                                rows={3}
                                            />
                                        </div>
                                    </div>
                                    <div className="flex justify-end gap-2 mt-6">
                                        <button onClick={() => setShowProjectNameDialog(false)} className="px-4 py-2 border rounded text-sm hover:bg-gray-50">Cancel</button>
                                        <button onClick={saveProjectName} disabled={!editProjectName.trim()} className="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">Save</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cut Sets Floating Window - Auto-show when in visualize view with cut sets */}
                    {view === 'visualize' && currentProject && currentProject.faultTrees[selectedTreeIndex] && !cutSetsClosed && (() => {
                        const treeName = currentProject.faultTrees[selectedTreeIndex].treeName;
                        const cutSetData = currentProject.cutSets && currentProject.cutSets[treeName];
                        return cutSetData;
                    })() && (
                        <CutSetsFloatingWindow
                            cutSetsData={currentProject.cutSets[currentProject.faultTrees[selectedTreeIndex].treeName]}
                            stale={staleTreeNames.has(currentProject.faultTrees[selectedTreeIndex].treeName)}
                            position={cutSetsPosition}
                            size={cutSetsSize}
                            minimized={cutSetsMinimized}
                            onPositionChange={setCutSetsPosition}
                            onSizeChange={setCutSetsSize}
                            onMinimize={() => setCutSetsMinimized(!cutSetsMinimized)}
                            onClose={() => setCutSetsClosed(true)}
                            onMouseDown={handleCutSetsDragStart}
                            eventInfo={eventInfo}
                            eventDescriptions={eventDescriptions}
                            treeName={currentProject.faultTrees[selectedTreeIndex].treeName}
                            settings={settings}
                            project={currentProject}
                            onEditEvent={(evtName, updates) => {
                                // Edit a BE from the event list (name is not changed)
                                const allTrees = currentProject?.faultTrees || [];
                                const countInstances = (node, nm, c=0) => { if(!node) return c; if(node.name===nm) c++; return (node.children||[]).reduce((a,ch)=>countInstances(ch,nm,a),c); };
                                const totalInstances = allTrees.reduce((s,t)=>s+countInstances(t.rootNode,evtName),0);
                                // Build the updates object for onEditNode (no rename)
                                const editUpdates = { name: evtName, description: updates.description, probability: updates.probability, notes: updates.notes || '', isGate: false, scope: totalInstances > 1 ? 'all' : 'local' };
                                // Find which tree contains this event (use first occurrence)
                                let targetTreeIdx = 0;
                                for (let i=0; i<allTrees.length; i++) {
                                    if (countInstances(allTrees[i].rootNode, evtName) > 0) { targetTreeIdx = i; break; }
                                }
                                setEditHistory(h => [...h.slice(-49), currentProject]);
                                // Apply directly - probability changes only, no structural change
                                const _newProb = parseFloat(updates.probability);
                                const _isProbChange = !isNaN(_newProb) && _newProb !== (currentProject?.eventInfo?.[evtName]?.Prob);
                                setIsDirty(true);
                                setCurrentProject(prev => {
                                    const newEvtDesc = { ...prev.eventDescriptions, [evtName]: updates.description };
                                    const base = prev.eventInfo?.[evtName] || {};
                                    const hasProb = updates.probability !== undefined && updates.probability !== '';
                                    const prob = hasProb ? (parseFloat(updates.probability) || 0) : (base.Prob || 0);
                                    const modelFields = {};
                                    if (updates.failureModel !== undefined) modelFields.FailureModel = updates.failureModel;
                                    if (updates.distribution !== undefined) modelFields.Distribution = updates.distribution;
                                    if (updates.distAlpha    !== undefined) modelFields.DistAlpha    = updates.distAlpha;
                                    if (updates.distEF       !== undefined) modelFields.DistEF       = updates.distEF;
                                    if (updates.demandN      !== undefined) modelFields.DemandN      = parseInt(updates.demandN)||1;
                                    if (updates.missionTime  !== undefined) modelFields.MissionTime  = parseFloat(updates.missionTime)||0;
                                    if (updates.tauRepair    !== undefined) modelFields.TauRepair    = parseFloat(updates.tauRepair)||0;
                                    if (updates.demandProb   !== undefined) modelFields.DemandProb   = parseFloat(updates.demandProb)||0;
                                    if (updates.lambda       !== undefined) modelFields.Lambda       = parseFloat(updates.lambda)||0;
                                    if (updates.inspInterval !== undefined) modelFields.InspInterval = parseFloat(updates.inspInterval)||0;
                                    if (updates.logicFlag    !== undefined) modelFields.LogicFlag    = updates.logicFlag;
                                    const newEvtInfo = { ...prev.eventInfo, [evtName]: { ...base, Name: evtName, ...(hasProb ? { Prob: prob, Calc_Prob: prob } : {}), ...(updates.notes !== undefined ? { Notes: updates.notes } : {}), ...modelFields } };
                                    return { ...prev, eventDescriptions: newEvtDesc, eventInfo: newEvtInfo };
                                });
                                // Also sync standalone eventInfo so CutSetsFloatingWindow re-renders
                                if (!isNaN(_newProb)) {
                                    setEventInfo(prev => {
                                        const base = prev[evtName] || {};
                                        return { ...prev, [evtName]: { ...base, Name: evtName, Prob: _newProb, Calc_Prob: _newProb } };
                                    });
                                }
                                if (_isProbChange) {
                                    logChange('Edit basic event', `Basic event "${evtName}": probability changed to ${_newProb.toExponential(3)}`);
                                }
                            }}
                        />
                    )}

                    {/* Basic Event List Floating Window */}
                    {view === 'visualize' && currentProject && showBEList && (
                        <BEListFloatingWindow
                            events={allBasicEvents}
                            position={beListPosition}
                            size={beListSize}
                            minimized={beListMinimized}
                            onPositionChange={setBEListPosition}
                            onSizeChange={setBEListSize}
                            onMinimize={() => setBEListMinimized(v => !v)}
                            onClose={() => setShowBEList(false)}
                            onHeaderMouseDown={e => {
                                setIsDraggingBEList(true);
                                setBeListDragOffset({ x: e.clientX - beListPosition.x, y: e.clientY - beListPosition.y });
                            }}
                            settings={settings}
                            project={currentProject}
                            onEditEvent={(evtName, updates) => {
                                // Edit a BE from the event list (name is not changed)
                                const allTrees = currentProject?.faultTrees || [];
                                const countInstances = (node, nm, c=0) => { if(!node) return c; if(node.name===nm) c++; return (node.children||[]).reduce((a,ch)=>countInstances(ch,nm,a),c); };
                                const totalInstances = allTrees.reduce((s,t)=>s+countInstances(t.rootNode,evtName),0);
                                // Build the updates object for onEditNode (no rename)
                                const editUpdates = { name: evtName, description: updates.description, probability: updates.probability, notes: updates.notes || '', isGate: false, scope: totalInstances > 1 ? 'all' : 'local' };
                                // Find which tree contains this event (use first occurrence)
                                let targetTreeIdx = 0;
                                for (let i=0; i<allTrees.length; i++) {
                                    if (countInstances(allTrees[i].rootNode, evtName) > 0) { targetTreeIdx = i; break; }
                                }
                                setEditHistory(h => [...h.slice(-49), currentProject]);
                                // Apply directly - probability changes only, no structural change
                                const _newProb = parseFloat(updates.probability);
                                const _isProbChange = !isNaN(_newProb) && _newProb !== (currentProject?.eventInfo?.[evtName]?.Prob);
                                setIsDirty(true);
                                setCurrentProject(prev => {
                                    const newEvtDesc = { ...prev.eventDescriptions, [evtName]: updates.description };
                                    const base = prev.eventInfo?.[evtName] || {};
                                    const hasProb = updates.probability !== undefined && updates.probability !== '';
                                    const prob = hasProb ? (parseFloat(updates.probability) || 0) : (base.Prob || 0);
                                    const modelFields = {};
                                    if (updates.failureModel !== undefined) modelFields.FailureModel = updates.failureModel;
                                    if (updates.distribution !== undefined) modelFields.Distribution = updates.distribution;
                                    if (updates.distAlpha    !== undefined) modelFields.DistAlpha    = updates.distAlpha;
                                    if (updates.distEF       !== undefined) modelFields.DistEF       = updates.distEF;
                                    if (updates.demandN      !== undefined) modelFields.DemandN      = parseInt(updates.demandN)||1;
                                    if (updates.missionTime  !== undefined) modelFields.MissionTime  = parseFloat(updates.missionTime)||0;
                                    if (updates.tauRepair    !== undefined) modelFields.TauRepair    = parseFloat(updates.tauRepair)||0;
                                    if (updates.demandProb   !== undefined) modelFields.DemandProb   = parseFloat(updates.demandProb)||0;
                                    if (updates.lambda       !== undefined) modelFields.Lambda       = parseFloat(updates.lambda)||0;
                                    if (updates.inspInterval !== undefined) modelFields.InspInterval = parseFloat(updates.inspInterval)||0;
                                    if (updates.logicFlag    !== undefined) modelFields.LogicFlag    = updates.logicFlag;
                                    const newEvtInfo = { ...prev.eventInfo, [evtName]: { ...base, Name: evtName, ...(hasProb ? { Prob: prob, Calc_Prob: prob } : {}), ...(updates.notes !== undefined ? { Notes: updates.notes } : {}), ...modelFields } };
                                    return { ...prev, eventDescriptions: newEvtDesc, eventInfo: newEvtInfo };
                                });
                                // Sync standalone eventInfo so CutSetsFloatingWindow re-renders
                                if (!isNaN(_newProb)) {
                                    setEventInfo(prev => {
                                        const base = prev[evtName] || {};
                                        return { ...prev, [evtName]: { ...base, Name: evtName, Prob: _newProb, Calc_Prob: _newProb } };
                                    });
                                }
                                if (_isProbChange) {
                                    logChange('Edit basic event', `Basic event "${evtName}": probability changed to ${_newProb.toExponential(3)}`);
                                }
                            }}
                        />
                    )}

                    {/* Change Log Modal */}
                    {showChangeLog && (
                        <ChangeLogModal
                            changeLog={changeLog}
                            onClose={() => setShowChangeLog(false)}
                        />
                    )}

                    {/* Unsaved Changes 3-Button Dialog */}
                    {showUnsavedDialog && (
                        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <div style={{background:'white',borderRadius:'10px',boxShadow:'0 8px 32px rgba(0,0,0,0.35)',padding:'28px 28px 22px',width:'400px',maxWidth:'94vw'}}>
                                <h3 style={{fontWeight:'bold',fontSize:'16px',marginBottom:'10px',color:'#1e3a8a'}}>⚠ Unsaved Changes</h3>
                                <p style={{fontSize:'14px',color:'#374151',marginBottom:'22px',lineHeight:'1.6'}}>
                                    This project has unsaved changes.<br/>
                                    What would you like to do?
                                </p>
                                <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                                    <button
                                        onClick={() => setShowUnsavedDialog(false)}
                                        style={{padding:'8px 16px',background:'#f3f4f6',border:'1px solid #d1d5db',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#374151'}}
                                    >Return to the Project</button>
                                    <button
                                        onClick={() => {
                                            setShowUnsavedDialog(false);
                                            setView('upload');
                                            setCurrentProject(null);
                                            setSelectedTreeIndex(0);
                                            setIsDirty(false);
                                            setEditHistory([]);
                                        }}
                                        style={{padding:'8px 16px',background:'#dc2626',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'white'}}
                                    >Discard &amp; Open New FTL</button>
                                    <button
                                        onClick={() => {
                                            handleSaveKnowFTL();
                                            setShowUnsavedDialog(false);
                                        }}
                                        style={{padding:'8px 16px',background:'#1e40af',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'white'}}
                                    >Save First</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer with opened files */}
                    <footer className="bg-gray-800 text-white text-xs py-1.5 px-4 flex items-center">
                        {workingDirectory && (
                            <span className="text-gray-300">
                                Files: <span className="text-white font-mono">{workingDirectory}</span>
                            </span>
                        )}
                    </footer>
                </div>
            );
        }

        // Initialize Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FaultTreeVisualizer />);
    </script>
</body>
</html>
