            function drawEdge(ctx, parent, child, expandedTransNodes, settings, nodeMultiplier) {
                const ltMult = getLineThicknessMultiplier(settings?.lineThickness);
                ctx.strokeStyle = '#6b7280'; // Darker gray
                ctx.lineWidth = 2 * ltMult;

                // Calculate start and end points based on node types
                const isParentTrans = parent.type === 'TRAN' || parent.transferTo;
                const isChildTrans = child.type === 'TRAN' || child.transferTo;

                // Check if parent is expanded (pointing up) or collapsed (pointing down)
                const isParentExpanded = parent.isExpanded || (expandedTransNodes && parent.transferTo && expandedTransNodes.has(`${parent.name}_${parent.transferTo}`));
                const isChildExpanded = child.isExpanded || (expandedTransNodes && child.transferTo && expandedTransNodes.has(`${child.name}_${child.transferTo}`));

                // Apply node size multiplier to offsets
                const rectOffset = 40 * nodeMultiplier;
                const tranOffset = 30 * nodeMultiplier;
                const nodeHeight = 80 * nodeMultiplier;

                let startY = parent.y + (isParentTrans ? tranOffset : rectOffset);
                let endY = child.y - (isChildTrans ? tranOffset : rectOffset);

                // Adjust startY if parent is OR/AND gate with gate-symbol boxType
                const boxType = settings?.boxType || 'circle';
                if (boxType === 'gate-symbol' && (parent.type === 'OR' || parent.type === 'AND' || parent.type === 'NOT' || parent.type === 'NAND' || parent.type === 'VOTING')) {
                    const gateHeight = 20 * nodeMultiplier;
                    // Connect to bottom of gate symbol: nodeHeight/2 (to bottom of box) + 2 (gap) + gateHeight
                    startY = parent.y + nodeHeight / 2 + 2 + gateHeight;
                }

                // Set line style
                ctx.strokeStyle = '#6b7280'; // Darker gray
                ctx.lineWidth = 1.5 * ltMult;
                
                // Set dash pattern based on arrows setting
                // 'dotted' option means dotted lines with no arrows
                if (settings.arrows === 'dotted') {
                    ctx.setLineDash([5, 5]); // 5px dash, 5px gap
                } else {
                    ctx.setLineDash([]); // Solid line for both 'arrows' and 'no-arrows'
                }
                
                // Draw line based on line style setting (curved or straight)
                ctx.beginPath();
                ctx.moveTo(parent.x, startY);
                
                if (settings.lineStyle === 'straight') {
                    // Draw straight line
                    ctx.lineTo(child.x, endY);
                } else if (settings.lineStyle === 'curved-up') {
                    // Upward curved: control point above the start (parent side)
                    const bulge = Math.abs(endY - startY) * 0.5;
                    ctx.quadraticCurveTo(child.x, startY - bulge, child.x, endY);
                } else {
                    // Downward curved (default): control point below midpoint, bowing toward child
                    const midY = (startY + endY) / 2;
                    ctx.quadraticCurveTo(parent.x, midY, child.x, endY);
                }
                ctx.stroke();
                
                // Reset line dash after drawing
                ctx.setLineDash([]);

                // Draw arrowhead at end only if 'arrows' option is selected
                // Not shown for 'no-arrows' or 'dotted'
                if (settings.arrows === 'arrows') {
                    const arrowLength = 8;
                    let angle;
                    
                    if (settings.lineStyle === 'straight') {
                        angle = Math.atan2(endY - startY, child.x - parent.x);
                    } else if (settings.lineStyle === 'curved-up') {
                        const bulge = Math.abs(endY - startY) * 0.5;
                        angle = Math.atan2(endY - (startY - bulge), child.x - child.x + 0.001);
                    } else {
                        const midY = (startY + endY) / 2;
                        angle = Math.atan2(endY - midY, child.x - parent.x);
                    }
                    
                    ctx.beginPath();
                    ctx.moveTo(child.x, endY);
                    ctx.lineTo(
                        child.x - arrowLength * Math.cos(angle - Math.PI / 6),
                        endY - arrowLength * Math.sin(angle - Math.PI / 6)
                    );
                    ctx.moveTo(child.x, endY);
                    ctx.lineTo(
                        child.x - arrowLength * Math.cos(angle + Math.PI / 6),
                        endY - arrowLength * Math.sin(angle + Math.PI / 6)
                    );
                    ctx.stroke();
                }
            }

            function getNodeColor(type, node, project, expandedTransNodes, settings) {
                // Helper function to generate color variations from a base color
                function generateColorVariations(baseColor) {
                    // Parse hex color
                    const hex = baseColor.replace('#', '');
                    const r = parseInt(hex.substr(0, 2), 16);
                    const g = parseInt(hex.substr(2, 2), 16);
                    const b = parseInt(hex.substr(4, 2), 16);
                    
                    // Generate variations by adjusting lightness
                    const variations = {
                        'OR': {
                            fill: `rgb(${Math.min(255, r + 30)}, ${Math.min(255, g + 30)}, ${Math.min(255, b + 30)})`,
                            stroke: baseColor
                        },
                        'AND': {
                            fill: baseColor,
                            stroke: `rgb(${Math.max(0, r - 40)}, ${Math.max(0, g - 40)}, ${Math.max(0, b - 40)})`
                        },
                        'DT': {
                            fill: `rgb(${Math.min(255, r + 50)}, ${Math.min(255, g + 50)}, ${Math.min(255, b + 50)})`,
                            stroke: `rgb(${Math.max(0, r - 20)}, ${Math.max(0, g - 20)}, ${Math.max(0, b - 20)})`
                        },
                        'VOTING': {
                            fill: `rgb(${Math.min(255, r + 40)}, ${Math.min(255, g + 40)}, ${Math.min(255, b + 40)})`,
                            stroke: `rgb(${Math.max(0, r - 30)}, ${Math.max(0, g - 30)}, ${Math.max(0, b - 30)})`
                        },
                        'NOT': {
                            fill: `rgb(${Math.min(255, r + 60)}, ${Math.min(255, g)}, ${Math.min(255, b + 60)})`,
                            stroke: `rgb(${Math.max(0, r + 20)}, ${Math.max(0, g - 30)}, ${Math.max(0, b + 20)})`
                        },
                        'NAND': {
                            fill: `rgb(${Math.min(255, r + 20)}, ${Math.min(255, g)}, ${Math.min(255, b + 80)})`,
                            stroke: `rgb(${Math.max(0, r - 10)}, ${Math.max(0, g - 30)}, ${Math.max(0, b + 40)})`
                        },
                        'TRAN': {
                            fill: `rgb(${Math.max(0, r - 30)}, ${Math.max(0, g - 30)}, ${Math.max(0, b - 30)})`,
                            stroke: `rgb(${Math.max(0, r - 60)}, ${Math.max(0, g - 60)}, ${Math.max(0, b - 60)})`
                        },
                        'TRAN_EXPANDED': {
                            fill: `rgb(${Math.min(255, r + 80)}, ${Math.min(255, g + 80)}, ${Math.min(255, b + 80)})`,
                            stroke: `rgb(${Math.min(255, r + 40)}, ${Math.min(255, g + 40)}, ${Math.min(255, b + 40)})`
                        },
                        'EVENT': {
                            fill: `rgb(${Math.min(255, r + 20)}, ${Math.min(255, g + 20)}, ${Math.min(255, b + 20)})`,
                            stroke: `rgb(${Math.max(0, r - 50)}, ${Math.max(0, g - 50)}, ${Math.max(0, b - 50)})`
                        }
                    };
                    
                    return variations;
                }
                
                // Single Color mode
                if (settings && settings.colorMode === 'single-color') {
                    const baseColor = settings.singleColor || '#3b82f6';
                    const variations = generateColorVariations(baseColor);
                    
                    // Check for expanded TRAN
                    if (node && node.type === 'TRAN' && node.isExpanded) {
                        return variations['TRAN_EXPANDED'];
                    }
                    if (node && node.transferTo) {
                        const nodeId = `${node.name}_${node.transferTo}`;
                        if (expandedTransNodes && expandedTransNodes.has(nodeId)) {
                            return variations['TRAN_EXPANDED'];
                        }
                    }
                    
                    // Check for N-of-M gates
                    if (type && type.includes('/')) {
                        return variations['VOTING'];
                    }
                    
                    // Return variation based on type
                    return variations[type] || variations['EVENT'];
                }
                
                // Grayscale mode - return gray for all nodes
                if (settings && settings.colorMode === 'grayscale') {
                    // Different shades of gray for different node types
                    if (node && node.type === 'TRAN' && node.isExpanded) {
                        return { fill: '#d1d5db', stroke: '#9ca3af' }; // Light gray for expanded TRAN
                    }
                    if (node && node.transferTo) {
                        const nodeId = `${node.name}_${node.transferTo}`;
                        if (expandedTransNodes && expandedTransNodes.has(nodeId)) {
                            return { fill: '#d1d5db', stroke: '#9ca3af' }; // Light gray for expanded TRAN
                        }
                    }
                    return { fill: '#9ca3af', stroke: '#6b7280' }; // Medium gray for all others
                }

                // Color mode - original colors
                const colors = {
                    'OR':     { fill: '#f59e0b', stroke: '#d97706' },
                    'AND':    { fill: '#60a5fa', stroke: '#3b82f6' },
                    'VOTING': { fill: '#f97316', stroke: '#ea580c' },  // orange – N-of-M
                    'NOT':    { fill: '#a78bfa', stroke: '#7c3aed' },  // purple – NOT OR
                    'NAND':   { fill: '#818cf8', stroke: '#4f46e5' },  // indigo – NOT AND
                    'DT':     { fill: '#ec4899', stroke: '#db2777' },
                    'TRAN':   { fill: '#9ca3af', stroke: '#6b7280' },
                    'TRAN_EXPANDED': { fill: '#fbff11', stroke: '#e6ea0f' },
                    'EVENT':  { fill: '#73f3c9', stroke: '#059669' },
                    'EVENT_COMPLEMENT': { fill: '#fca5a5', stroke: '#dc2626' },
                    'EVENT_FLAG':       { fill: '#e5e7eb', stroke: '#6b7280' }
                };

                // Check for N-of-M gates (X/Y format)
                if (type && type.includes('/')) {
                    return { fill: '#f97316', stroke: '#ea580c' };
                }

                // Check if this is an expanded TRAN node (show yellow) using isExpanded flag
                if (node && node.type === 'TRAN' && node.isExpanded) {
                    return colors['TRAN_EXPANDED'];
                }

                // Also check expandedTransNodes set as backup
                if (node && node.transferTo) {
                    const nodeId = `${node.name}_${node.transferTo}`;
                    if (expandedTransNodes && expandedTransNodes.has(nodeId)) {
                        return colors['TRAN_EXPANDED'];
                    }
                }

                // For TRAN gates, try to determine color from referenced tree's top gate
                if (type === 'TRAN' && node && node.transferTo && project && project.faultTrees) {
                    // Find the referenced tree
                    const referencedTree = project.faultTrees.find(tree => 
                        tree.treeName === node.transferTo || 
                        tree.rootNode.name === node.transferTo
                    );
                    
                    if (referencedTree && referencedTree.rootNode) {
                        const topGateType = referencedTree.rootNode.type;
                        // Return the color for the top gate type
                        if (topGateType.includes('/')) {
                            return { fill: '#f97316', stroke: '#ea580c' };
                        }
                        return colors[topGateType] || colors['TRAN'];
                    }
                    // If referenced tree not found, keep gray
                    return colors['TRAN'];
                }

                // Complement events and logic flag events get special colors
                if (type === 'EVENT' && node) {
                    const _isComp = node.name && node.name.startsWith('/');
                    const _lookupName = _isComp ? node.name.slice(1) : node.name;
                    const _evtInfo = project && project.eventInfo && project.eventInfo[_lookupName];
                    const _isFlag = _evtInfo && _evtInfo.FailureModel === '5';
                    if (_isFlag) {
                        const _rawFlag = _evtInfo.LogicFlag || 'T';
                        // Complement flips T↔F; Ignore stays Ignore
                        const _flag = _isComp
                            ? (_rawFlag === 'I' ? 'I' : _rawFlag === 'T' ? 'F' : 'T')
                            : _rawFlag;
                        if (_flag === 'T') return { fill: '#fca5a5', stroke: '#dc2626' }; // reddish — TRUE = failure
                        if (_flag === 'F') return { fill: '#86efac', stroke: '#16a34a' }; // bright green — FALSE = not failed
                        return { fill: '#e5e7eb', stroke: '#6b7280' };                    // gray — Ignore
                    }
                    if (_isComp) return colors['EVENT_COMPLEMENT'];
                }
                return colors[type] || colors['EVENT'];
            }

            function wrapText(ctx, text, maxWidth) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = words[0];

                for (let i = 1; i < words.length; i++) {
                    const word = words[i];
                    const width = ctx.measureText(currentLine + ' ' + word).width;
                    if (width < maxWidth) {
                        currentLine += ' ' + word;
                    } else {
                        lines.push(currentLine);
                        currentLine = word;
                    }
                }
                lines.push(currentLine);
                return lines;
            }

            // Event handlers
            function handleWheel(e) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                setScale(prev => Math.max(0.1, Math.min(2, prev + delta)));
            }

            function getCanvasCoords(e) {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                // Account for any ratio difference between canvas pixel buffer and CSS display size
                const ratioX = canvas.width / rect.width;
                const ratioY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * ratioX;
                const y = (e.clientY - rect.top) * ratioY;
                const canvasX = (x - canvas.width / 2 - offset.x) / scale;
                const canvasY = (y - 50 - offset.y) / scale;
                return { x, y, canvasX, canvasY };
            }

            function handleMouseDown(e) {
                if (e.button === 2) return; // Right-click handled separately

                const { canvasX, canvasY } = getCanvasCoords(e);

                // Check if click is on a TRAN node
                const clickedNode = processedTreeRef.current ? 
                    findTranNodeAtPoint(processedTreeRef.current, canvasX, canvasY) : null;
                
                if (clickedNode && (clickedNode.type === 'TRAN' || clickedNode.transferTo)) {
                    let transferTarget = clickedNode.transferTo;
                    if (!transferTarget && clickedNode.type === 'TRAN') {
                        const originalNode = findOriginalTranNode(tree.rootNode, clickedNode.name);
                        if (originalNode) {
                            transferTarget = originalNode.transferTo;
                        }
                    }
                    if (transferTarget) {
                        const nodeId = `${clickedNode.name}_${transferTarget}`;
                        setExpandedTransNodes(prev => {
                            const newSet = new Set(prev);
                            if (newSet.has(nodeId)) {
                                newSet.delete(nodeId);
                            } else {
                                newSet.add(nodeId);
                            }
                            return newSet;
                        });
                        return;
                    }
                }

                // Check for any node click — show info/delete panel
                const anyNode = processedTreeRef.current ?
                    findAnyNodeAtPoint(processedTreeRef.current, canvasX, canvasY) : null;
                if (anyNode) {
                    setSelectedNodeName(anyNode.name);
                    const _panelW1 = anyNode.type !== 'EVENT' ? 320 : 340;
                    const _panelH1 = 800;
                    const _px1 = Math.min(e.clientX, window.innerWidth - _panelW1 - 8);
                    const _py1 = Math.min(e.clientY, window.innerHeight - _panelH1 - 8);
                    setEditPanelPos({ x: _px1, y: _py1 });
                    setContextMenu({ node: anyNode, screenX: e.clientX, screenY: e.clientY });
                    return; // Don't start drag when clicking a node
                }

                // Clicked empty space — dismiss panel and start drag
                setSelectedNodeName(null);
                setContextMenu(null);
                setIsDragging(true);
                setDragStart({ x: e.clientX - offset.x, y: e.clientY - offset.y });
            }


            // Find original TRAN node in the unprocessed tree
            function findOriginalTranNode(node, name) {
                if (!node) return null;
                
                // Check if this is a TRAN node with matching name
                if (node.name === name && (node.type === 'TRAN' || node.transferTo)) {
                    return node;
                }
                
                // Search children
                if (node.children) {
                    for (const child of node.children) {
                        const found = findOriginalTranNode(child, name);
                        if (found) return found;
                    }
                }
                return null;
            }

            // Find node by name in tree
            function findNodeByName(node, name) {
                if (!node) return null;
                if (node.name === name) return node;
                
                if (node.children) {
                    for (const child of node.children) {
                        const found = findNodeByName(child, name);
                        if (found) return found;
                    }
                }
                return null;
            }

            // Find parent node of a named child
            function findParentNode(root, childName) {
                if (!root || !root.children) return null;
                for (const child of root.children) {
                    if (child.name === childName) return root;
                    const found = findParentNode(child, childName);
                    if (found) return found;
                }
                return null;
            }

            // Find TRAN node at given coordinates (searches in tree for accurate positions)
            function findTranNodeAtPoint(node, x, y, depth = 0) {
                if (!node) return null;

                // Check if this node has position info
                if (node.x !== undefined && node.y !== undefined) {
                    // Check if this is a TRAN node by looking at its type or transferTo property
                    const isTransGate = node.type === 'TRAN' || node.transferTo;
                    
                    if (isTransGate) {
                        // Check if click is within triangle bounds
                        const height = 60;
                        const width = 70;
                        const top = node.y - height / 2;
                        const bottom = node.y + height / 2;
                        const left = node.x - width / 2;
                        const right = node.x + width / 2;
                        
                        if (x >= left && x <= right && y >= top && y <= bottom) {
                            return node;
                        }
                    }
                }

                // Check children
                if (node.children) {
                    for (const child of node.children) {
                        const found = findTranNodeAtPoint(child, x, y, depth + 1);
                        if (found) return found;
                    }
                }

                return null;
            }

            // Find any node (gate or basic event) at the given canvas coordinates
            function findAnyNodeAtPoint(node, x, y) {
                if (!node) return null;
                if (node.x !== undefined && node.y !== undefined) {
                    // Match the actual node dimensions from the layout algorithm
                    const hw = (160 * nodeMultiplier) / 2;   // half node width
                    const hh = (80 * nodeMultiplier) / 2;    // half node height
                    if (x >= node.x - hw && x <= node.x + hw && y >= node.y - hh && y <= node.y + hh) {
                        return node;
                    }
                }
                if (node.children) {
                    for (const child of node.children) {
                        const found = findAnyNodeAtPoint(child, x, y);
                        if (found) return found;
                    }
                }
                return null;
            }

            // Right-click just prevents browser menu; left-click on nodes is handled in handleMouseDown
            function handleContextMenu(e) {
                e.preventDefault();
                if (!processedTreeRef.current) return;
                const { canvasX, canvasY } = getCanvasCoords(e);
                const node = findAnyNodeAtPoint(processedTreeRef.current, canvasX, canvasY);
                if (node) {
                    const _panelW2 = node.type !== 'EVENT' ? 320 : 340;
                    const _panelH2 = 800;
                    const _px2 = Math.min(e.clientX, window.innerWidth - _panelW2 - 8);
                    const _py2 = Math.min(e.clientY, window.innerHeight - _panelH2 - 8);
                    setEditPanelPos({ x: _px2, y: _py2 });
                    setContextMenu({ node, screenX: e.clientX, screenY: e.clientY });
                }
            }

            // Delete node from logic tree (removes it and its subtree, or just the node from parent's children)
            function deleteNodeFromTree(rootNode, targetName) {
                if (!rootNode) return null;
                if (rootNode.name === targetName) return null; // deleting root removes all
                const updated = { ...rootNode };
                if (updated.children) {
                    updated.children = updated.children
                        .filter(c => c.name !== targetName)
                        .map(c => deleteNodeFromTree(c, targetName));
                }
                return updated;
            }

            function handleMouseMove(e) {
                if (isDragging) {
                    setOffset({
                        x: e.clientX - dragStart.x,
                        y: e.clientY - dragStart.y
                    });
                } else {
                    const canvas = canvasRef.current;
                    if (!canvas || !processedTreeRef.current) return;
                    const { canvasX, canvasY } = getCanvasCoords(e);
                    const tranNode = findTranNodeAtPoint(processedTreeRef.current, canvasX, canvasY);
                    const anyNode = findAnyNodeAtPoint(processedTreeRef.current, canvasX, canvasY);
                    canvas.style.cursor = (tranNode || anyNode) ? 'pointer' : 'grab';
                }
            }

            function handleMouseUp() {
                setIsDragging(false);
            }

            const [copyStatus, setCopyStatus] = useState('');

            function handleZoomIn() {
                setScale(prev => Math.min(2, prev + 0.2));
            }

            function handleZoomOut() {
                setScale(prev => Math.max(0.1, prev - 0.2));
            }

            function handleReset() {
                setScale(1);
                setOffset({ x: 0, y: 0 });
            }

            async function handleCopyToClipboard() {
                const canvas = canvasRef.current;
                if (!canvas) {
                    alert('Canvas not ready');
                    return;
                }

                setCopyStatus('Copying...');

                try {
                    // First check if we have clipboard write permission
                    if (!navigator.clipboard || !navigator.clipboard.write) {
                        throw new Error('Clipboard API not available');
                    }

                    // Create a promise-based version
                    const blob = await new Promise((resolve, reject) => {
                        canvas.toBlob((b) => {
                            if (b) resolve(b);
                            else reject(new Error('Failed to create blob'));
                        }, 'image/png');
                    });

                    // Try to write to clipboard
                    const clipboardItem = new ClipboardItem({ 'image/png': blob });
                    await navigator.clipboard.write([clipboardItem]);
                    
                    setCopyStatus('Copied!');
                    setTimeout(() => setCopyStatus(''), 2000);
                    
                } catch (err) {
                    console.error('Copy failed:', err);
                    setCopyStatus('Failed');
                    setTimeout(() => setCopyStatus(''), 2000);
                    
                    // More helpful error message
                    if (err.name === 'NotAllowedError') {
                        alert('Clipboard access denied. Please make sure:\n1. You are using HTTPS or localhost\n2. You have granted clipboard permissions\n\nAlternatively, use the Download button (â¬‡) to save as PNG file.');
                    } else if (err.message.includes('Clipboard API')) {
                        alert('Your browser does not support clipboard images.\n\nTip: Use the Download button (â¬‡) to save as PNG file instead.');
                    } else {
                        alert('Failed to copy: ' + err.message + '\n\nTip: Use the Download button (â¬‡) as an alternative.');
                    }
                }
            }

            function handleDownloadImage() {
                const canvas = canvasRef.current;
                if (!canvas) {
                    alert('Canvas not ready');
                    return;
                }

                try {
                    // Get the tree name for the filename
                    const treeName = tree.treeName || 'fault_tree';
                    const fileName = `${treeName.replace(/[^a-z0-9]/gi, '_')}.png`;

                    // Convert canvas to data URL
                    const dataURL = canvas.toDataURL('image/png');
                    
                    // Create a temporary link element
                    const link = document.createElement('a');
                    link.download = fileName;
                    link.href = dataURL;
                    
                    // Trigger download
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // Show success feedback
                    setCopyStatus('Downloaded!');
                    setTimeout(() => setCopyStatus(''), 2000);
                } catch (err) {
                    console.error('Download failed:', err);
                    alert('Failed to download image: ' + err.message);
                }
            }

            return (
                <div ref={containerRef} className="relative w-full h-full" style={backgroundStyle}>
                    <canvas
                        ref={canvasRef}
                        onMouseDown={handleMouseDown}
                        onMouseMove={handleMouseMove}
                        onMouseUp={handleMouseUp}
                        onMouseLeave={handleMouseUp}
                        onDragOver={e => { e.preventDefault(); e.dataTransfer.dropEffect='copy'; }}
                        onDrop={e => {
                            e.preventDefault();
                            const payload = e.dataTransfer.getData('text/plain');
                            if (!payload || !processedTreeRef.current) return;
                            const canvas = canvasRef.current;
                            if (!canvas) return;
                            const rect = canvas.getBoundingClientRect();
                            const ratioX = canvas.width / rect.width;
                            const ratioY = canvas.height / rect.height;
                            const x = (e.clientX - rect.left) * ratioX;
                            const y = (e.clientY - rect.top) * ratioY;
                            const canvasX = (x - canvas.width/2 - offset.x) / scale;
                            const canvasY = (y - 50 - offset.y) / scale;
                            const target = findAnyNodeAtPoint(processedTreeRef.current, canvasX, canvasY);
                            if (!target || target.type === 'EVENT') return;
                            if (payload.startsWith('FAULT_TREE:')) {
                                const treeName = payload.slice('FAULT_TREE:'.length);
                                if (onDropFaultTree) onDropFaultTree(treeName, target.name);
                            } else {
                                if (onDropBE) onDropBE(payload, target.name);
                            }
                        }}
                        onContextMenu={handleContextMenu}
                        className="w-full h-full"
                    />
                    <div className="absolute bottom-4 left-4 bg-white bg-opacity-80 rounded px-2 py-1 text-xs text-gray-500 pointer-events-none select-none">
                        Click node to edit · right-click to pin · Ctrl+Z to undo
                    </div>
                    {/* Upper-left action button group */}
                    <div className="absolute top-2 left-2 bg-white rounded-lg shadow-lg p-1.5 flex flex-col gap-1">
                        <div className="flex gap-1 items-center">
                            <button
                                onClick={onUndo}
                                disabled={!canUndo}
                                className={`p-1.5 rounded flex items-center gap-1 text-xs font-medium ${canUndo ? 'hover:bg-gray-100 text-gray-700' : 'text-gray-300 cursor-not-allowed'}`}
                                title={canUndo ? 'Undo last change (Ctrl+Z)' : 'Nothing to undo'}
                            >
                                <UndoIcon /> Undo
                            </button>
                            <div className="border-l border-gray-200 mx-0.5 self-stretch"></div>
                            <button
                                onClick={onAddGate}
                                className="p-1.5 hover:bg-gray-100 rounded flex items-center gap-1 text-xs font-medium text-gray-700"
                                title="Add new top-level fault tree"
                            >
                                <AddGateIcon /> New FT
                            </button>
                            <button
                                onClick={() => onAddNodeGate && onAddNodeGate(selectedNodeName)}
                                className={`p-1.5 rounded flex items-center gap-1 text-xs font-medium ${selectedNodeName ? 'hover:bg-gray-100 text-gray-700' : 'text-gray-400'}`}
                                title={selectedNodeName ? `Add gate below "${selectedNodeName}"` : 'Select a node first to add a gate'}
                            >
                                <AddGateIcon /> New Gate
                            </button>
                            <button
                                onClick={() => onAddEvent && onAddEvent(selectedNodeName)}
                                className={`p-1.5 rounded flex items-center gap-1 text-xs font-medium ${selectedNodeName ? 'hover:bg-gray-100 text-gray-700' : 'text-gray-400'}`}
                                title={selectedNodeName ? `Add basic event to "${selectedNodeName}"` : 'Select a node first to add a basic event'}
                            >
                                <AddEventIcon /> New BE
                            </button>
                        </div>
                        {/* Find bar */}
                        <div style={{display:'flex',alignItems:'center',gap:'4px',borderTop:'1px solid #e5e7eb',paddingTop:'4px'}}>
                            <span style={{fontSize:'11px',fontWeight:'600',color:'#6b7280',flexShrink:0}}>Find:</span>
                            <input
                                type="text"
                                value={findText}
                                onChange={e => setFindText(e.target.value)}
                                placeholder="Search gates & events…"
                                style={{fontSize:'11px',padding:'2px 6px',border:'1px solid #d1d5db',borderRadius:'4px',width:'160px',outline:'none'}}
                                onFocus={e => e.target.style.borderColor='#f59e0b'}
                                onBlur={e => e.target.style.borderColor='#d1d5db'}
                            />
                            {findText && (
                                <button
                                    onClick={() => setFindText('')}
                                    style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:'13px',padding:'0 2px',lineHeight:1}}
                                    title="Clear search"
                                >×</button>
                            )}
                            {findText.trim() && (() => {
                                const _count = (() => {
                                    let n = 0;
                                    const walk = (node) => { if (!node) return; if (node.name.toLowerCase().includes(findText.trim().toLowerCase())) n++; (node.children||[]).forEach(walk); };
                                    if (processedTreeRef.current) walk(processedTreeRef.current);
                                    return n;
                                })();
                                return <span style={{fontSize:'10px',color: _count > 0 ? '#d97706' : '#ef4444',fontWeight:'600',flexShrink:0}}>{_count > 0 ? `${_count} match${_count>1?'es':''}` : 'no match'}</span>;
                            })()}
                        </div>
                    </div>
                    <div className="absolute bottom-4 right-4 bg-white rounded-lg shadow-lg p-2 flex gap-2">
                        <button
                            onClick={handleZoomIn}
                            className="p-2 hover:bg-gray-100 rounded"
                            title="Zoom In"
                        >
                            <ZoomInIcon />
                        </button>
                        <button
                            onClick={handleZoomOut}
                            className="p-2 hover:bg-gray-100 rounded"
                            title="Zoom Out"
                        >
                            <ZoomOutIcon />
                        </button>
                        <button
                            onClick={handleReset}
                            className="p-2 hover:bg-gray-100 rounded"
                            title="Reset View"
                        >
                            <RefreshIcon />
                        </button>
                        <div className="border-l border-gray-300 mx-1"></div>
                        <button
                            onClick={handleCopyToClipboard}
                            className="p-2 hover:bg-gray-100 rounded relative"
                            title={copyStatus || "Copy to Clipboard (requires HTTPS/localhost)"}
                        >
                            <CopyIcon />
                            {copyStatus && (
                                <span className="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white text-xs px-2 py-1 rounded whitespace-nowrap">
                                    {copyStatus}
                                </span>
                            )}
                        </button>
                        <button
                            onClick={handleDownloadImage}
                            className="p-2 hover:bg-gray-100 rounded"
                            title="Download as PNG (works anywhere)"
                        >
                            <DownloadIcon />
                        </button>
                        <div className="px-3 py-2 text-sm font-medium text-gray-700">

                                                                    <div style={{color:'#6b7280',marginBottom:'2px'}}>Mission Time (hr)</div>
                                                                    <input type="number" min="0" step="any" value={form.missionTime||''}
                                                                        onChange={e=>setEditForm(prev=>({...prev,missionTime:e.target.value}))} style={inp}/>
                                                                </div>
                                                            </div>
                                                        )}
                                                        {/* Model parameters — FM3 */}
                                                        {fm === '3' && (
                                                            <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
                                                                <div style={{flex:1}}>
                                                                    <div style={{color:'#6b7280',marginBottom:'2px'}}>Failure Rate λ (/hr)</div>
                                                                    <input type="number" min="0" step="any" value={form.lambda||''}
                                                                        onChange={e=>setEditForm(prev=>({...prev,lambda:e.target.value}))} style={inp}/>
                                                                </div>
                                                                <div style={{flex:'0 0 120px'}}>
                                                                    <div style={{color:'#6b7280',marginBottom:'2px'}}>Inspection Interval (hr)</div>

                                                                </div>
                                                            </div>

                                                        {/* Model parameters — FM4 */}
                                                        {fm === '4' && (
                                                            <div style={{display:'flex',gap:'6px',marginBottom:'6px',flexWrap:'wrap'}}>
                                                                <div style={{flex:1,minWidth:'80px'}}>
                                                                    <div style={{color:'#6b7280',marginBottom:'2px'}}>Failure Rate λ (/hr)</div>
                                                                    <input type="number" min="0" step="any" value={form.lambda||''}
                                                                        onChange={e=>setEditForm(prev=>({...prev,lambda:e.target.value}))} style={inp}/>
                                                                </div>
                                                                <div style={{flex:1,minWidth:'80px'}}>
                                                                    <div style={{color:'#6b7280',marginBottom:'2px'}}>Mission Time (hr)</div>
                                                                    <input type="number" min="0" step="any" value={form.missionTime||''}
                                                                        onChange={e=>setEditForm(prev=>({...prev,missionTime:e.target.value}))} style={inp}/>
                                                                </div>
                                                                <div style={{flex:1,minWidth:'80px'}}>
                                                                    <div style={{color:'#6b7280',marginBottom:'2px'}}>Repair Time μ (hr)</div>
                                                                    <input type="number" min="0" step="any" value={form.tauRepair||''}
                                                                        onChange={e=>setEditForm(prev=>({...prev,tauRepair:e.target.value}))} style={inp}/>
                                                                </div>
                                                            </div>
                                                        )}
                                                        {/* FM5 — Logic T/F Flag */}
                                                        {fm === '5' && (
                                                            <div style={{marginBottom:'6px'}}>
                                                                <div style={{color:'#6b7280',marginBottom:'4px'}}>Flag Value</div>
                                                                <div style={{display:'flex',gap:'6px'}}>
                                                                    {[['T','True'],['F','False'],['I','Ignore']].map(([val,label]) => (
                                                                        <button key={val}
                                                                            onClick={() => setEditForm(prev => ({...prev, logicFlag: val}))}
                                                                            style={{flex:1,padding:'3px 0',fontSize:'11px',fontWeight:'700',borderRadius:'4px',border:'1px solid',
                                                                                borderColor: (form.logicFlag||'T')===val ? '#7c3aed' : '#c4b5fd',
                                                                                background: (form.logicFlag||'T')===val ? '#7c3aed' : 'white',
                                                                                color: (form.logicFlag||'T')===val ? 'white' : '#6b7280',
                                                                                cursor:'pointer'}}
                                                                        >{label}</button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        )}
                                                        {/* Distribution */}
                                                        <div style={{borderTop:'1px solid #ddd6fe',paddingTop:'8px',marginBottom:'6px'}}>
                                                            <div style={{fontWeight:'700',color:'#5b21b6',marginBottom:'4px'}}>Distribution</div>
                                                            <select value={dst} onChange={e=>setEditForm(prev=>({...prev,distribution:e.target.value}))} style={sel}>
                                                                <option value="point">Point Estimate</option>
                                                                <option value="beta">Beta [α, β]</option>
                                                                <option value="gamma">Gamma [α, θ]</option>
                                                                <option value="lognormal">Lognormal [EF]</option>
                                                                <option value="cni">CNI (Constrained Non-Informative)</option>
                                                            </select>
                                                        </div>

                                                        {dst !== 'point' && dst !== 'cni' && (
                                                            <div style={{marginBottom:'6px'}}>
                                                                {dst==='beta' && (

                                                                        <div style={{flex:1}}>
                                                                            <div style={{color:'#6b7280',marginBottom:'2px'}}>α (shape)</div>
                                                                            <input type="number" min="0" step="any" value={form.distAlpha||''}
                                                                                onChange={e=>setEditForm(prev=>({...prev,distAlpha:e.target.value}))} style={inp}/>
                                                                        </div>
                                                                        <div style={{flex:1}}>
                                                                            <div style={{color:'#6b7280',marginBottom:'2px'}}>β (derived)</div>
                                                                            <div style={ro}>{betaDerived||'—'}</div>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                                {dst==='gamma' && (
                                                                    <div style={{display:'flex',gap:'6px',alignItems:'flex-end'}}>
                                                                        <div style={{flex:1}}>
                                                                            <div style={{color:'#6b7280',marginBottom:'2px'}}>α (shape)</div>
                                                                            <input type="number" min="0" step="any" value={form.distAlpha||''}
                                                                                onChange={e=>setEditForm(prev=>({...prev,distAlpha:e.target.value}))} style={inp}/>
                                                                        </div>
                                                                        <div style={{flex:1}}>
                                                                            <div style={{color:'#6b7280',marginBottom:'2px'}}>θ (derived)</div>
                                                                            <div style={ro}>{gammaDerived||'—'}</div>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                                {dst==='lognormal' && (
                                                                    <div>
                                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Error Factor (EF = 95th/50th)</div>
                                                                        <input type="number" min="1" step="any" value={form.distEF||''}
                                                                            onChange={e=>setEditForm(prev=>({...prev,distEF:e.target.value}))} style={inp}/>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    )}
                                </div>
                                {/* Actions */}
                                {(onCopyNode || onPasteNode) && (
                                    <div className="px-4 pb-2 flex gap-1.5">
                                        <button
                                            className="flex-1 px-2 py-1 text-xs rounded border border-gray-300 hover:bg-blue-50 text-gray-700 font-medium"
                                            title="Copy this node and its subtree to clipboard"
                                            onClick={() => onCopyNode && onCopyNode(n.name, 'copy')}
                                        >⎘ Copy</button>
                                        <button
                                            className="flex-1 px-2 py-1 text-xs rounded border border-amber-300 hover:bg-amber-50 text-amber-700 font-medium"
                                            title="Cut this node and its subtree (removes from current position)"
                                            onClick={() => onCopyNode && onCopyNode(n.name, 'cut')}
                                        >✂ Cut</button>
                                        {clipboard && (
                                            <button
                                                className="flex-1 px-2 py-1 text-xs rounded border border-green-400 bg-green-50 hover:bg-green-100 text-green-800 font-medium"
                                                title={`Paste "${clipboard.node.name}" as child of this node`}
                                                onClick={() => { onPasteNode && onPasteNode(n.name); closePanel(); }}
                                            >⬇ Paste</button>
                                        )}
                                    </div>
                                )}
                                <div className="px-4 pb-4 flex gap-2">
                                    <button
                                        className="flex-1 px-3 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 font-medium"
                                        onClick={() => {
                                            if (!onEditNode) { closePanel(); return; }
                                            const originalName = n.name;
                                            const newGateType = form.gateType || n.type;
                                            const updates = {
                                                name: form.name,
                                                description: form.description,
                                                probability: form.probability,
                                                notes: form.notes || '',
                                                isGate,
                                                gateType: newGateType,
                                                votingN: form.votingN || n.votingN || 1,
                                                // Model detail
                                                failureModel: form.failureModel || '0',
                                                distribution: form.distribution || 'point',
                                                distUnits: form.distUnits || 'none',
                                                distAlpha: form.distAlpha !== undefined ? form.distAlpha : '',
                                                distEF: form.distEF !== undefined ? form.distEF : '',
                                                demandN: form.demandN !== undefined ? form.demandN : '1',
                                                demandProb: form.demandProb !== undefined ? form.demandProb : '',
                                                lambda: form.lambda !== undefined ? form.lambda : '',
                                                missionTime: form.missionTime !== undefined ? form.missionTime : '',
                                                inspInterval: form.inspInterval !== undefined ? form.inspInterval : '',
                                                tauRepair: form.tauRepair !== undefined ? form.tauRepair : '',
                                                logicFlag: form.logicFlag || 'T',
                                            };
                                            // Name conflict check: if renaming to an existing node name
                                            const _proposedName = (updates.name || originalName).trim();
                                            if (_proposedName !== originalName && _proposedName) {
                                                // Build sets of gate names and event names separately
                                                const _gateNames = new Set(), _eventNames = new Set();
                                                const _scanTyped = (nd) => {
                                                    if (!nd) return;
                                                    if (nd.type === 'EVENT') _eventNames.add(nd.name);
                                                    else _gateNames.add(nd.name);
                                                    (nd.children||[]).forEach(_scanTyped);
                                                };
                                                (project?.faultTrees||[]).forEach(t => _scanTyped(t.rootNode));
                                                // Cross-type check: BE can't take a gate name, gate can't take a BE name
                                                const _crossType = isGate ? _eventNames.has(_proposedName) : _gateNames.has(_proposedName);
                                                if (_crossType) {
                                                    const _conflictKind = isGate ? 'basic event' : 'gate';
                                                    alert(`Cannot rename to "${_proposedName}" — that name is already used by a ${_conflictKind}. A name cannot be shared between a basic event and a gate.`);
                                                    return;
                                                }
                                                const _allProjNames = new Set([..._gateNames, ..._eventNames]);
                                                if (_allProjNames.has(_proposedName)) {
                                                    setNameConflictDialog({ originalName, conflictingName: _proposedName, updates, scope: 'local', treeIdx: treeIndex, isGate });
                                                    return;
                                                }
                                            }
                                            // Special case: converting a non-Transfer gate TO Transfer
                                            const becomingTransfer = newGateType === 'TRAN' && n.type !== 'TRAN';
                                            if (becomingTransfer && n.children && n.children.length > 0) {
                                                setTransferDialog({ originalName, updates });
                                                return;
                                            }
                                            // Standard: check multi-instance scope.
                                            // Only relevant when the name is NOT changing — if the name IS
                                            // changing to a new unique name, apply locally without asking scope.
                                            const _nameIsChanging = _proposedName !== originalName && _proposedName;
                                            if (!_nameIsChanging) {
                                                const allTrees = project && project.faultTrees ? project.faultTrees : [];
                                                const countInstances = (node, target, count = 0) => {
                                                    if (!node) return count;
                                                    if (node.name === target) count++;
                                                    return (node.children || []).reduce((c, ch) => countInstances(ch, target, c), count);
                                                };
                                                const totalInstances = allTrees.reduce((sum, t) => sum + countInstances(t.rootNode, originalName), 0);
                                                if (totalInstances > 1) {
                                                    setScopeDialog({ originalName, totalInstances, updates, isGate: updates.isGate });
                                                    return;
                                                }
                                            }
                                            onEditNode(originalName, treeIndex, { ...updates, scope: 'local' });
                                            closePanel();
                                        }}
                                    >✓ Save changes</button>
                                    <button
                                        className="px-3 py-1.5 bg-red-500 text-white text-sm rounded-lg hover:bg-red-600"
                                        title={(() => {
                                            if (n.type === 'AND')    return 'Delete AND gate & subtree';
                                            if (n.type === 'OR')     return 'Delete OR gate & subtree';
                                            if (n.type === 'NOT')    return 'Delete NOT OR gate & subtree';
                                            if (n.type === 'NAND')   return 'Delete NOT AND gate & subtree';
                                            if (n.type === 'VOTING') return 'Delete N-of-M gate & subtree';
                                            if (n.type === 'TRAN')   return 'Delete Transfer gate & subtree';
                                            if (n.type !== 'EVENT')  return `Delete ${n.type} gate & subtree`;
                                            return 'Delete basic event';
                                        })()}
                                        onClick={() => {
                                            closePanel();
                                            if (confirm(`Delete "${n.name}"${isGate ? ' and its entire subtree' : ''} from this fault tree?\n\nUse Ctrl+Z to undo.`)) {
                                                if (onDeleteNode) onDeleteNode(n.name);
                                            }
                                        }}
                                    >🗑</button>
                                </div>
                            </div>
                        );
                    })()}
                    {/* Scope Dialog — project-wide vs local edit */}
                    {scopeDialog && (() => {
                        // Collect every node name used in this project
                        const _allNames = new Set();
                        const _collectNames = (node) => { if (!node) return; _allNames.add(node.name); (node.children||[]).forEach(_collectNames); };
                        (project?.faultTrees||[]).forEach(t => _collectNames(t.rootNode));

                        const _origName  = scopeDialog.originalName;
                        const _newName   = (scopeDialog.updates.name || _origName).trim();
                        const _nameChanged = _newName !== _origName;
                        // Forbidden names: ALL existing names including the original (since it
                        // exists in multiple places, re-using it for this local instance is not allowed)
                        const _forbiddenNames = _allNames; // do NOT exclude _origName
                        const _newNameUnique = !_forbiddenNames.has(_newName);
                        const _nodeLabel = scopeDialog.isGate ? 'gate' : 'basic event';

                        // Determine which sub-view to show:
                        //  'scope'  – main question (all vs local)
                        //  'unique' – ask for a unique name before applying local
                        const _phase = scopeDialog.phase || 'scope';

                        // Validate the current unique-name input
                        const _inputName = scopeUniqueName.trim().toUpperCase();
                        const _inputConflict = _inputName && _forbiddenNames.has(_inputName);
                        const _inputEmpty = !_inputName;

                        const _handleThisInstance = () => {
                            if (_nameChanged && _newNameUnique) {
                                // Name was changed and the new name is truly unique — apply directly
                                onEditNode(_origName, treeIndex, { ...scopeDialog.updates, scope: 'local' });
                                setScopeDialog(null); setScopeUniqueName('');
                                closePanel();
                            } else {
                                // Need a unique name: show the unique-name prompt.
                                // Pre-fill only if the proposed name is not the original and not a conflict.
                                const _preFill = (_nameChanged && !_forbiddenNames.has(_newName)) ? _newName : '';
                                setScopeUniqueName(_preFill);
                                setScopeDialog(prev => ({ ...prev, phase: 'unique' }));
                            }
                        };

                        const _applyWithUniqueName = () => {
                            if (_inputEmpty || _inputConflict) return;
                            onEditNode(_origName, treeIndex, { ...scopeDialog.updates, name: _inputName, scope: 'local' });
                            setScopeDialog(null); setScopeUniqueName('');
                            closePanel();
                        };

                        return (
                            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}>
                                <div style={{background:'white',borderRadius:'10px',boxShadow:'0 8px 32px rgba(0,0,0,0.35)',padding:'28px 28px 22px',width:'440px',maxWidth:'94vw'}}>

                                    {_phase === 'scope' ? (<>
                                        <h3 style={{fontWeight:'bold',fontSize:'16px',marginBottom:'10px',color:'#1e3a8a'}}>Multiple Instances Found</h3>
                                        <p style={{fontSize:'14px',color:'#374151',marginBottom:'6px',lineHeight:'1.6'}}>
                                            <strong>"{_origName}"</strong> appears <strong>{scopeDialog.totalInstances} times</strong> across this project.
                                        </p>
                                        <p style={{fontSize:'13px',color:'#6b7280',marginBottom:'22px',lineHeight:'1.5'}}>
                                            Update all instances project-wide, or only this instance in the current fault tree?
                                            {!scopeDialog.isGate && <span style={{display:'block',marginTop:'6px',color:'#92400e',background:'#fef3c7',borderRadius:'4px',padding:'6px 8px'}}>
                                                ⚠ Choosing "This Instance Only" will create a new {_nodeLabel} with a unique name — the same {_nodeLabel} name cannot have different properties across a project.
                                            </span>}
                                        </p>
                                        <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                                            <button onClick={() => { setScopeDialog(null); setScopeUniqueName(''); }}
                                                style={{padding:'8px 16px',background:'#f3f4f6',border:'1px solid #d1d5db',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#374151'}}
                                            >Cancel</button>
                                            <button onClick={_handleThisInstance}
                                                style={{padding:'8px 16px',background:'#0369a1',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'white'}}
                                            >This Instance Only</button>
                                            <button onClick={() => {
                                                const _upAllProposed = (scopeDialog.updates.name || scopeDialog.originalName).trim();
                                                if (_upAllProposed !== scopeDialog.originalName && _upAllProposed) {
                                                    const _upAllNames = new Set();
                                                    const _upAllScan = (nd) => { if (!nd) return; if (nd.name !== scopeDialog.originalName) _upAllNames.add(nd.name); (nd.children||[]).forEach(_upAllScan); };
                                                    (project?.faultTrees||[]).forEach(t => _upAllScan(t.rootNode));
                                                    if (_upAllNames.has(_upAllProposed)) {
                                                        setNameConflictDialog({ originalName: scopeDialog.originalName, conflictingName: _upAllProposed, updates: scopeDialog.updates, scope: 'all', treeIdx: treeIndex, isGate: scopeDialog.isGate });
                                                        setScopeDialog(null); setScopeUniqueName('');
                                                        return;
                                                    }
                                                }
                                                onEditNode(scopeDialog.originalName, treeIndex, { ...scopeDialog.updates, scope: 'all' }); setScopeDialog(null); setScopeUniqueName(''); closePanel();
                                            }}
                                                style={{padding:'8px 16px',background:'#1e40af',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'white'}}
                                            >Update All {scopeDialog.totalInstances} Instances</button>
                                        </div>
                                    </>) : (<>
                                        <h3 style={{fontWeight:'bold',fontSize:'16px',marginBottom:'10px',color:'#0369a1'}}>Unique Name Required</h3>
                                        <p style={{fontSize:'14px',color:'#374151',marginBottom:'4px',lineHeight:'1.6'}}>
                                            This instance will become a new {_nodeLabel} separate from <strong>"{_origName}"</strong>.
                                        </p>
                                        <p style={{fontSize:'13px',color:'#6b7280',marginBottom:'14px',lineHeight:'1.5'}}>
                                            {!_nameChanged
                                                ? `The name was not changed. Provide a new unique name for this instance.`
                                                : `"${_newName}" already exists in this project. Provide a different unique name.`}
                                        </p>
                                        <input
                                            autoFocus
                                            value={scopeUniqueName}
                                            onChange={e => setScopeUniqueName(e.target.value.toUpperCase())}
                                            onKeyDown={e => { if (e.key === 'Enter') _applyWithUniqueName(); if (e.key === 'Escape') { setScopeDialog(null); setScopeUniqueName(''); } }}
                                            placeholder={`New unique ${_nodeLabel} name`}
                                            style={{width:'100%',boxSizing:'border-box',border:`1.5px solid ${_inputConflict ? '#dc2626' : '#d1d5db'}`,borderRadius:'6px',padding:'8px 10px',fontSize:'14px',fontFamily:'monospace',marginBottom:'6px',outline:'none'}}
                                        />
                                        {_inputConflict && <p style={{fontSize:'12px',color:'#dc2626',marginBottom:'10px'}}>⚠ "{_inputName}" already exists in this project. Choose a different name.</p>}
                                        {!_inputConflict && _inputName && <p style={{fontSize:'12px',color:'#16a34a',marginBottom:'10px'}}>✓ "{_inputName}" is available.</p>}
                                        <div style={{display:'flex',gap:'8px',justifyContent:'flex-end',marginTop:'8px'}}>
                                            <button onClick={() => { setScopeDialog(null); setScopeUniqueName(''); }}
                                                style={{padding:'8px 16px',background:'#f3f4f6',border:'1px solid #d1d5db',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#374151'}}
                                            >Cancel</button>
                                            <button onClick={() => setScopeDialog(prev => ({ ...prev, phase: 'scope' }))}
                                                style={{padding:'8px 16px',background:'#e0f2fe',border:'1px solid #7dd3fc',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#0369a1'}}
                                            >← Back</button>
                                            <button onClick={_applyWithUniqueName}
                                                disabled={_inputEmpty || _inputConflict}
                                                style={{padding:'8px 16px',background:(_inputEmpty||_inputConflict)?'#d1d5db':'#0369a1',border:'none',borderRadius:'6px',cursor:(_inputEmpty||_inputConflict)?'not-allowed':'pointer',fontSize:'13px',fontWeight:'600',color:'white'}}
                                            >Apply as New {scopeDialog.isGate ? 'Gate' : 'Basic Event'}</button>
                                        </div>
                                    </>)}
                                </div>
                            </div>
                        );
                    })()}

                    {/* Transfer Dialog — extract vs strip logic when converting to TRAN */}
                    {transferDialog && (
                        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <div style={{background:'white',borderRadius:'10px',boxShadow:'0 8px 32px rgba(0,0,0,0.35)',padding:'28px 28px 22px',width:'420px',maxWidth:'94vw'}}>
                                <h3 style={{fontWeight:'bold',fontSize:'16px',marginBottom:'10px',color:'#7c3aed'}}>Convert to Transfer Gate</h3>
                                <p style={{fontSize:'14px',color:'#374151',marginBottom:'6px',lineHeight:'1.6'}}>
                                    Converting <strong>"{transferDialog.originalName}"</strong> to a Transfer gate.
                                </p>
                                <p style={{fontSize:'13px',color:'#6b7280',marginBottom:'22px',lineHeight:'1.5'}}>
                                    This gate currently has child nodes. What should happen to the logic beneath it?
                                </p>
                                <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                                    <button
                                        onClick={() => setTransferDialog(null)}
                                        style={{padding:'8px 16px',background:'#f3f4f6',border:'1px solid #d1d5db',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#374151'}}

                    {/* Name Conflict Dialog — shown when renaming to an already-existing node name */}

                            closePanel();

                        const _handleOverwrite = () => {

                                    <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'6px',padding:'10px 14px',marginBottom:'20px',fontSize:'13px',color:'#475569',lineHeight:'1.6'}}>
                                        <div style={{marginBottom:'6px'}}><strong style={{color:'#0369a1'}}>Use Existing Information</strong> — rename this {_nodeLabel} to "{_ncd.conflictingName}" and adopt the existing properties (description, probability, notes). Your edits to those fields will be discarded.</div>
                                        <div><strong style={{color:'#7c3aed'}}>Overwrite</strong> — name this {_nodeLabel} "{_ncd.conflictingName}" and replace "{_ncd.conflictingName}" existing properties with the information you just entered.</div>
