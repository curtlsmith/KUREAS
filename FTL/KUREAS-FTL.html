                                                    title={editingEvent._usedInOpen ? 'Collapse where-used' : 'Show which fault trees use this event'}>
                                                    {editingEvent._usedInOpen ? '▲' : '▼'} Used In
                                                </button>
                                            </div>
                                        </div>
                                        {isFlagModel ? (
                                            <div className="flex gap-1.5">
                                                {['T','F','I'].map(f => (
                                                    <button key={f} onClick={() => setEditingEvent(p=>({...p,logicFlag:f}))}
                                                        className={`flex-1 py-1 text-xs rounded-md font-bold border ${
                                                            editingEvent.logicFlag===f
                                                                ? (f==='T'?'bg-red-100 border-red-400 text-red-700':f==='F'?'bg-green-100 border-green-400 text-green-700':'bg-gray-200 border-gray-400 text-gray-600')
                                                                : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'
                                                        }`}>
                                                        {f==='T'?'True':f==='F'?'False':'Ignore'}
                                                    </button>
                                                ))}
                                            </div>
                                        ) : isCalc ? (
                                            <div className="w-full border border-purple-200 rounded-lg px-2.5 py-1.5 text-sm font-mono bg-purple-50 text-purple-700">
                                                {dispProb || <span className="text-gray-400 italic">computed</span>}
                                            </div>
                                        ) : (
                                            <input className="w-full border border-gray-300 rounded-lg px-2.5 py-1.5 text-sm font-mono focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400"
                                                value={editingEvent.probability}
                                                onChange={e => setEditingEvent(prev => ({...prev, probability: e.target.value}))}
                                                onBlur={e => { const v=parseFloat(e.target.value); if(!isNaN(v)) setEditingEvent(prev=>({...prev,probability:v.toExponential(3).toUpperCase()})); }}
                                                placeholder="e.g. 1.5E-3" />
                                        )}
                                    </div>
                                    {/* Notes */}
                                    {editingEvent._notesOpen && (
                                        <textarea className="w-full border border-gray-300 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400 resize-none"
                                            rows={3}
                                            placeholder="Notes (basis, source, uncertainty...)"
                                            value={editingEvent.notes || ''}
                                            onChange={e => setEditingEvent(prev => ({...prev, notes: e.target.value}))} />
                                    )}
                                    {/* Used In */}
                                    {editingEvent._usedInOpen && (
                                        <div className="border border-green-200 rounded-lg px-2.5 py-2 bg-green-50 text-xs">
                                            {_usedFTs.length === 0
                                                ? <span className="text-gray-400 italic">Not used in any fault tree.</span>
                                                : _usedFTs.map(nm => <div key={nm} className="font-mono font-semibold text-emerald-700" style={{lineHeight:'1.8'}}>{nm}</div>)
                                            }
                                        </div>
                                    )}
                                    {/* Model Detail — exact canvas editor content */}
                                    {editingEvent._modelOpen && (() => {
                                        const meanVal = parseFloat(editingEvent.probability) || 0;
                                        const al  = parseFloat(editingEvent.distAlpha) || 0;
                                        let betaDerived = '';
                                        if (dst==='beta' && al>0 && meanVal>0 && meanVal<1)
                                            betaDerived = (al*(1-meanVal)/meanVal).toExponential(3).toUpperCase();
                                        let gammaDerived = '';
                                        if (dst==='gamma' && al>0 && meanVal>0)
                                            gammaDerived = (meanVal/al).toExponential(3);
                                        const sel = {width:'100%',border:'1px solid #c4b5fd',borderRadius:'4px',padding:'3px 5px',fontSize:'11px',background:'white',cursor:'pointer'};
                                        const inp2 = {width:'100%',border:'1px solid #c4b5fd',borderRadius:'4px',padding:'3px 6px',fontSize:'11px',fontFamily:'monospace',MozAppearance:'textfield',appearance:'textfield'};
                                        const ro  = {border:'1px solid #e9d5ff',borderRadius:'4px',padding:'3px 6px',fontSize:'11px',fontFamily:'monospace',background:'#f5f3ff',color:'#7c3aed',minHeight:'22px'};
                                        return (
                                        <div style={{marginTop:'4px',padding:'10px',background:'#f5f3ff',borderRadius:'8px',border:'1px solid #ddd6fe',fontSize:'11px'}}>
                                            {/* Failure Model */}
                                            <div style={{marginBottom:'8px'}}>
                                                <div style={{fontWeight:'700',color:'#5b21b6',marginBottom:'4px'}}>Failure Model</div>
                                                <select value={fm} onChange={e => setEditingEvent(prev => ({...prev, failureModel: e.target.value}))} style={sel}>
                                                    <option value="0">Probability of Failure</option>
                                                    <option value="1">Demand (Binomial)</option>
                                                    <option value="2">Fails While Operating (Poisson)</option>
                                                    <option value="3">Fails in Standby</option>
                                                    <option value="4">Fails While Operating w/ Repair</option>
                                                    <option value="5">Logic T/F Flag</option>
                                                </select>
                                            </div>
                                            {/* FM1 */}
                                            {fm === '1' && (
                                                <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
                                                    <div style={{flex:1}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Probability (/demand)</div>
                                                        <input type="number" min="0" max="1" step="any" value={editingEvent.demandProb||''}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,demandProb:e.target.value}))} style={inp2}/>
                                                    </div>
                                                    <div style={{flex:'0 0 70px'}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Demands (N)</div>
                                                        <input type="number" min="1" step="1" value={editingEvent.demandN||'1'}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,demandN:String(Math.max(1,parseInt(e.target.value)||1))}))}
                                                            style={{...inp2,MozAppearance:'number',appearance:'auto'}}/>
                                                    </div>
                                                </div>
                                            )}
                                            {/* FM2 */}
                                            {fm === '2' && (
                                                <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
                                                    <div style={{flex:1}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Failure Rate λ (/hr)</div>
                                                        <input type="number" min="0" step="any" value={editingEvent.lambda||''}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,lambda:e.target.value}))} style={inp2}/>
                                                    </div>
                                                    <div style={{flex:'0 0 100px'}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Mission Time (hr)</div>
                                                        <input type="number" min="0" step="any" value={editingEvent.missionTime||''}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,missionTime:e.target.value}))} style={inp2}/>
                                                    </div>
                                                </div>
                                            )}
                                            {/* FM3 */}
                                            {fm === '3' && (
                                                <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
                                                    <div style={{flex:1}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Failure Rate λ (/hr)</div>
                                                        <input type="number" min="0" step="any" value={editingEvent.lambda||''}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,lambda:e.target.value}))} style={inp2}/>
                                                    </div>
                                                    <div style={{flex:'0 0 120px'}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Inspection Interval (hr)</div>
                                                        <input type="number" min="0" step="any" value={editingEvent.inspInterval||''}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,inspInterval:e.target.value}))} style={inp2}/>
                                                    </div>
                                                </div>
                                            )}
                                            {/* FM4 */}
                                            {fm === '4' && (
                                                <div style={{display:'flex',gap:'6px',marginBottom:'6px',flexWrap:'wrap'}}>
                                                    <div style={{flex:1,minWidth:'80px'}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Failure Rate λ (/hr)</div>
                                                        <input type="number" min="0" step="any" value={editingEvent.lambda||''}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,lambda:e.target.value}))} style={inp2}/>
                                                    </div>
                                                    <div style={{flex:1,minWidth:'80px'}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Mission Time (hr)</div>
                                                        <input type="number" min="0" step="any" value={editingEvent.missionTime||''}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,missionTime:e.target.value}))} style={inp2}/>
                                                    </div>
                                                    <div style={{flex:1,minWidth:'80px'}}>
                                                        <div style={{color:'#6b7280',marginBottom:'2px'}}>Repair Time μ (hr)</div>
                                                        <input type="number" min="0" step="any" value={editingEvent.tauRepair||''}
                                                            onChange={e=>setEditingEvent(prev=>({...prev,tauRepair:e.target.value}))} style={inp2}/>
                                                    </div>
                                                </div>
                                            )}
                                            {/* FM5 */}
                                            {fm === '5' && (
                                                <div style={{marginBottom:'6px'}}>
                                                    <div style={{color:'#6b7280',marginBottom:'4px'}}>Flag Value</div>
                                                    <div style={{display:'flex',gap:'6px'}}>
                                                        {[['T','True'],['F','False'],['I','Ignore']].map(([val,label]) => (
                                                            <button key={val}
                                                                onClick={() => setEditingEvent(prev => ({...prev, logicFlag: val}))}
                                                                style={{flex:1,padding:'3px 0',fontSize:'11px',fontWeight:'700',borderRadius:'4px',border:'1px solid',
                                                                    borderColor: (editingEvent.logicFlag||'T')===val ? '#7c3aed' : '#c4b5fd',
                                                                    background: (editingEvent.logicFlag||'T')===val ? '#7c3aed' : 'white',
                                                                    color: (editingEvent.logicFlag||'T')===val ? 'white' : '#6b7280',
                                                                    cursor:'pointer'}}
                                                            >{label}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                            {/* Distribution */}
                                            <div style={{borderTop:'1px solid #ddd6fe',paddingTop:'8px',marginBottom:'6px'}}>
                                                <div style={{fontWeight:'700',color:'#5b21b6',marginBottom:'4px'}}>Distribution</div>
                                                <select value={dst} onChange={e=>setEditingEvent(prev=>({...prev,distribution:e.target.value}))} style={sel}>
                                                    <option value="point">Point Estimate</option>
                                                    <option value="beta">Beta [α, β]</option>
                                                    <option value="gamma">Gamma [α, θ]</option>
                                                    <option value="lognormal">Lognormal [EF]</option>
                                                    <option value="cni">CNI (Constrained Non-Informative)</option>
                                                </select>
                                            </div>
                                            {/* Distribution parameters */}
                                            {dst !== 'point' && dst !== 'cni' && (
                                                <div style={{marginBottom:'6px'}}>
                                                    {dst==='beta' && (
                                                        <div style={{display:'flex',gap:'6px',alignItems:'flex-end'}}>
                                                            <div style={{flex:1}}>
                                                                <div style={{color:'#6b7280',marginBottom:'2px'}}>α (shape)</div>
                                                                <input type="number" min="0" step="any" value={editingEvent.distAlpha||''}
                                                                    onChange={e=>setEditingEvent(prev=>({...prev,distAlpha:e.target.value}))} style={inp2}/>
                                                            </div>
                                                            <div style={{flex:1}}>
                                                                <div style={{color:'#6b7280',marginBottom:'2px'}}>β (derived)</div>
                                                                <div style={ro}>{betaDerived||'—'}</div>
                                                            </div>
                                                        </div>
                                                    )}
                                                    {dst==='gamma' && (
                                                        <div style={{display:'flex',gap:'6px',alignItems:'flex-end'}}>
                                                            <div style={{flex:1}}>
                                                                <div style={{color:'#6b7280',marginBottom:'2px'}}>α (shape)</div>
                                                                <input type="number" min="0" step="any" value={editingEvent.distAlpha||''}
                                                                    onChange={e=>setEditingEvent(prev=>({...prev,distAlpha:e.target.value}))} style={inp2}/>
                                                            </div>
                                                            <div style={{flex:1}}>
                                                                <div style={{color:'#6b7280',marginBottom:'2px'}}>θ (derived)</div>
                                                                <div style={ro}>{gammaDerived||'—'}</div>
                                                            </div>
                                                        </div>
                                                    )}
                                                    {dst==='lognormal' && (
                                                        <div>
                                                            <div style={{color:'#6b7280',marginBottom:'2px'}}>Error Factor (EF = 95th/50th)</div>
                                                            <input type="number" min="1" step="any" value={editingEvent.distEF||''}
                                                                onChange={e=>setEditingEvent(prev=>({...prev,distEF:e.target.value}))} style={inp2}/>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                        );
                                    })()}
                                </div>
                                {/* Footer — matches canvas editor */}
                                <div className="px-4 py-2.5 border-t border-gray-200 flex items-center justify-end gap-2 bg-gray-50">
                                    <button onClick={() => setEditingEvent(null)}
                                        className="px-3 py-1.5 bg-white border border-gray-300 text-gray-600 text-sm rounded-lg hover:bg-gray-50">
                                        Cancel
                                    </button>
                                    <button onClick={() => {
                                        const _fm = editingEvent.failureModel || '0';
                                        const _lam = parseFloat(editingEvent.lambda)||0;
                                        const _mt  = parseFloat(editingEvent.missionTime)||1;
                                        const _N   = parseInt(editingEvent.demandN)||1;
                                        const _dp  = parseFloat(editingEvent.demandProb)||0;
                                        let calcP = null;
                                        if (_fm==='1') calcP=_dp;
                                        else if (_fm==='2') calcP=1-Math.exp(-_lam*_mt);
                                        else if (_fm==='3') calcP=(_lam*_mt)/(_lam*_mt+1);
                                        else if (_fm==='4') calcP=_N*_dp;
                                        const outProb = _fm==='0' ? editingEvent.probability : (calcP!==null ? calcP.toExponential(3).toUpperCase() : editingEvent.probability);
                                        if (onEditEvent) onEditEvent(editingEvent.name, {
                                            description: editingEvent.description,
                                            probability: outProb,
                                            notes: editingEvent.notes,
                                            failureModel: _fm,
                                            distribution: editingEvent.distribution,
                                            distAlpha: editingEvent.distAlpha,
                                            distEF:    editingEvent.distEF,
                                            demandN:   editingEvent.demandN,
                                            missionTime: editingEvent.missionTime,
                                            tauRepair: editingEvent.tauRepair,
                                            demandProb: editingEvent.demandProb,
                                            lambda: editingEvent.lambda,
                                            inspInterval: editingEvent.inspInterval,
                                            logicFlag: editingEvent.logicFlag,
                                        });
                                        setEditingEvent(null);
                                    }}
                                        className="px-3 py-1.5 bg-emerald-600 text-white text-sm rounded-lg hover:bg-emerald-700">
                                        ✓ Save changes
                                    </button>
                                </div>
                            </div>
                        </div>
                        );
                    })()}
                </div>
            );
        }


        // ─── Export Modal ──────────────────────────────────────────────────────────
        function ExportModal({ project, onClose }) {
            const allTrees = project?.faultTrees || [];
            const [selectedTrees, setSelectedTrees] = React.useState(() => new Set(allTrees.map((_, i) => i)));
            const [format, setFormat] = React.useState('saphire_ftl');

            const toggleTree = (idx) => {
                setSelectedTrees(prev => {
                    const s = new Set(prev);
                    s.has(idx) ? s.delete(idx) : s.add(idx);
                    return s;
                });
            };
            const toggleAll = () => {
                setSelectedTrees(prev => prev.size === allTrees.length ? new Set() : new Set(allTrees.map((_, i) => i)));
            };

            // ── SAPHIRE FTL export ─────────────────────────────────────────────
            function exportSAPHIRE() {
                const lines = [];
                const treesToExport = allTrees.filter((_, i) => selectedTrees.has(i));
                const projName = (project.projectName || 'PROJECT').toUpperCase().substring(0, 24);

                for (const tree of treesToExport) {
                    const tName = tree.treeName.toUpperCase();
                    lines.push(`${projName}, ${tName}=`);

                    // Walk tree collecting gate definitions
                    const gateLines = [];
                    const walk = (node) => {
                        if (!node || node.type === 'EVENT') return;
                        let typeStr;
                        if (node.type === 'TRAN') {
                            typeStr = 'TRAN';
                        } else if (node.type === 'VOTING') {
                            const m = (node.children || []).length;
                            const n = node.votingN || 1;
                            typeStr = `${n}/${m}`;
                        } else {
                            typeStr = node.type; // OR, AND, NOT, NAND
                        }
                        const inputs = node.type === 'TRAN'
                            ? [(node.transferTo || node.name)]
                            : (node.children || []).map(c => c.name);
                        gateLines.push(`${node.name} ${typeStr} ${inputs.join(' ')}`);
                        (node.children || []).forEach(walk);
                    };
                    walk(tree.rootNode);
                    gateLines.forEach(l => lines.push(l));
                    lines.push('');
                }

                const text = lines.join('\r\n');
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const safeName = (project.projectName || 'project').replace(/[^a-zA-Z0-9_\-]/g, '_');
                a.download = 'export.FTL';
                a.click();
                URL.revokeObjectURL(url);
            }

            // ── KUREAS_FTL export (subset of trees) ───────────────────────────
            function exportKUREAS() {
                const treesToExport = allTrees.filter((_, i) => selectedTrees.has(i));
                const exportedNames = new Set(treesToExport.map(t => t.treeName));

                // Collect all BE names referenced by exported trees
                const usedBEs = new Set();
                const walkBE = (node) => {
                    if (!node) return;
                    if (node.type === 'EVENT') usedBEs.add(node.name);
                    (node.children || []).forEach(walkBE);
                };
                treesToExport.forEach(t => walkBE(t.rootNode));

                // Filter eventInfo/descriptions to only exported trees' BEs
                const eventInfo = project.eventInfo || {};
                const eventDescriptions = project.eventDescriptions || {};
                const gateDescriptions = project.gateDescriptions || {};
                const filteredEventInfo = {};
                const filteredEventDesc = {};
                const filteredGateDesc = {};
                usedBEs.forEach(n => {
                    if (eventInfo[n]) filteredEventInfo[n] = eventInfo[n];
                    if (eventDescriptions[n]) filteredEventDesc[n] = eventDescriptions[n];
                });
                treesToExport.forEach(t => {
                    const walkG = (node) => {
                        if (!node || node.type === 'EVENT') return;
                        if (gateDescriptions[node.name]) filteredGateDesc[node.name] = gateDescriptions[node.name];
                        (node.children || []).forEach(walkG);
                    };
                    walkG(t.rootNode);
                });

                const projectData = {
                    format: 'KUREAS-FTL',
                    version: '1.1',
                    savedAt: new Date().toISOString(),
                    projectName: project.projectName || 'Unnamed Project',
                    projectDescription: project.projectDescription || '',
                    faultTrees: treesToExport,
                    eventDescriptions: filteredEventDesc,
                    gateDescriptions: filteredGateDesc,
                    eventInfo: filteredEventInfo,
                    cutSets: {}
                };
                const json = JSON.stringify(projectData, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const safeName = (project.projectName || 'project').replace(/[^a-zA-Z0-9_\-]/g, '_');
                a.href = url;
                a.download = 'export.KNOW_FTL';
                a.click();
                URL.revokeObjectURL(url);
            }

            // ── OpenPSA MEF export ─────────────────────────────────────────────
            function exportOpenPSA() {
                const treesToExport = allTrees.filter((_, i) => selectedTrees.has(i));
                const eventInfo = project.eventInfo || {};
                const eventDescriptions = project.eventDescriptions || {};

                // Collect all unique basic events across exported trees
                const usedBEs = new Map(); // name → { prob, desc }
                const walkBE = (node) => {
                    if (!node) return;
                    if (node.type === 'EVENT' && !usedBEs.has(node.name)) {
                        const info = eventInfo[node.name] || {};
                        usedBEs.set(node.name, {
                            prob: info.Calc_Prob ?? info.Prob ?? null,
                            desc: eventDescriptions[node.name] || ''
                        });
                    }
                    (node.children || []).forEach(walkBE);
                };
                treesToExport.forEach(t => walkBE(t.rootNode));

                const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

                // Build gate formula XML recursively
                function buildFormula(node) {
                    if (!node) return '';
                    if (node.type === 'EVENT') {
                        const cleanName = node.name.startsWith('/') ? node.name.substring(1) : node.name;
                        if (node.name.startsWith('/')) {
                            return `<not><event name="${esc(cleanName)}"/></not>`;
                        }
                        return `<event name="${esc(node.name)}"/>`;
                    }
                    if (node.type === 'TRAN') {
                        return `<gate name="${esc(node.transferTo || node.name)}"/>`;
                    }
                    const kids = (node.children || []).map(buildFormula).join('\n          ');
                    if (node.type === 'OR')   return `<or>\n          ${kids}\n        </or>`;
                    if (node.type === 'AND')  return `<and>\n          ${kids}\n        </and>`;
                    if (node.type === 'NOT')  return `<or><not>\n          ${kids}\n        </not></or>`;
                    if (node.type === 'NAND') return `<and><not>\n          ${kids}\n        </not></and>`;
                    if (node.type === 'VOTING') {
                        const n = node.votingN || 1;
                        return `<atleast min="${n}">\n          ${kids}\n        </atleast>`;
                    }
                    return `<or>\n          ${kids}\n        </or>`;
                }

                const projName = esc(project.projectName || 'PROJECT');
                const lines = [];
                lines.push('<?xml version="1.0" encoding="UTF-8"?>');
                lines.push(`<opsa-mef>`);
                lines.push(`  <define-fault-tree name="${projName}">`);

                // Gate definitions
                for (const tree of treesToExport) {
                    const walkGates = (node) => {
                        if (!node || node.type === 'EVENT' || node.type === 'TRAN') return;
                        const formula = buildFormula({ ...node, name: '__skip__' });
                        const inner = buildFormula({ ...node });
                        lines.push(`    <define-gate name="${esc(node.name)}">`);
                        lines.push(`      <formula>`);
                        // write the actual gate formula (children logic)
                        const children = node.children || [];
                        const kidsXML = children.map(buildFormula).join('\n        ');
                        if (node.type === 'OR')   lines.push(`        <or>\n        ${kidsXML}\n        </or>`);
                        else if (node.type === 'AND') lines.push(`        <and>\n        ${kidsXML}\n        </and>`);
                        else if (node.type === 'NOT') lines.push(`        <not>\n        ${kidsXML}\n        </not>`);
                        else if (node.type === 'NAND') { lines.push(`        <not><and>\n        ${kidsXML}\n        </and></not>`); }
                        else if (node.type === 'VOTING') {
                            const n = node.votingN || 1;
                            lines.push(`        <atleast min="${n}">\n        ${kidsXML}\n        </atleast>`);
                        } else lines.push(`        <or>\n        ${kidsXML}\n        </or>`);
                        lines.push(`      </formula>`);
                        lines.push(`    </define-gate>`);
                        children.forEach(walkGates);
                    };
                    walkGates(tree.rootNode);
                }

                lines.push(`  </define-fault-tree>`);
                lines.push(``);

                // Basic event definitions
                lines.push(`  <model-data>`);
                usedBEs.forEach((info, name) => {
                    const cleanName = name.startsWith('/') ? name.substring(1) : name;
                    lines.push(`    <define-basic-event name="${esc(cleanName)}">`);
                    if (info.desc) lines.push(`      <label>${esc(info.desc)}</label>`);
                    if (info.prob !== null && info.prob !== undefined) {
                        lines.push(`      <float value="${info.prob}"/>`);
                    }
                    lines.push(`    </define-basic-event>`);
                });
                lines.push(`  </model-data>`);
                lines.push(`</opsa-mef>`);

                const xml = lines.join('\n');
                const blob = new Blob([xml], { type: 'application/xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const safeName = (project.projectName || 'project').replace(/[^a-zA-Z0-9_\-]/g, '_');
                a.href = url;
                a.download = 'export.xml';
                a.click();
                URL.revokeObjectURL(url);
            }

            const handleExport = () => {
                if (selectedTrees.size === 0) { alert('Select at least one fault tree to export.'); return; }
                if (format === 'saphire_ftl') exportSAPHIRE();
                else if (format === 'kureas_ftl') exportKUREAS();
                else if (format === 'openpsa') exportOpenPSA();
                onClose();
            };

            const FORMAT_INFO = {
                saphire_ftl: { label: 'SAPHIRE MAR-D (.FTL)', color: '#1d4ed8', desc: 'SAPHIRE fault tree logic file. Contains gate definitions and basic event references. Load with companion .BED/.BEI files for full data.' },
                kureas_ftl:  { label: 'KUREAS-FTL (.KNOW_FTL)', color: '#7c3aed', desc: 'Native KUREAS-FTL project file (JSON). Includes gate/event descriptions, probabilities, and notes for the selected trees.' },
                openpsa:     { label: 'OpenPSA MEF (.xml)', color: '#065f46', desc: 'Open Probabilistic Safety Assessment Model Exchange Format. XML-based standard for fault tree exchange between PSA tools.' },
            };
            const fi = FORMAT_INFO[format];

            return (
                <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}}
                    onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
                    <div style={{background:'white',borderRadius:'12px',boxShadow:'0 8px 40px rgba(0,0,0,0.3)',width:'480px',maxWidth:'95vw',maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
                        {/* Header */}
                        <div style={{background:'#064e3b',color:'white',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
                            <span style={{fontWeight:'700',fontSize:'15px'}}>
                                <svg style={{display:'inline',marginRight:'7px',verticalAlign:'-3px'}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                Export Fault Trees
                            </span>
                            <button onClick={onClose} style={{background:'none',border:'none',color:'white',fontSize:'18px',cursor:'pointer',lineHeight:1}}>×</button>
                        </div>

                        <div style={{padding:'18px 20px',overflowY:'auto',flex:1}}>
                            {/* Format selection */}
                            <div style={{marginBottom:'18px'}}>
                                <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Export Format</div>
                                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                                    {Object.entries(FORMAT_INFO).map(([key, info]) => (
                                        <label key={key} style={{display:'flex',alignItems:'flex-start',gap:'10px',padding:'10px 12px',border:`2px solid ${format===key ? info.color : '#e5e7eb'}`,borderRadius:'8px',cursor:'pointer',background: format===key ? '#f0fdf4' : 'white',transition:'all 0.15s'}}>
                                            <input type="radio" name="fmt" value={key} checked={format===key} onChange={() => setFormat(key)} style={{marginTop:'2px',accentColor:info.color}}/>
                                            <div>
                                                <div style={{fontSize:'13px',fontWeight:'600',color: format===key ? info.color : '#374151'}}>{info.label}</div>
                                                <div style={{fontSize:'11px',color:'#6b7280',marginTop:'2px',lineHeight:'1.4'}}>{info.desc}</div>
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Tree selection */}
                            <div>
                                <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.05em',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span>Fault Trees to Export</span>
                                    <button onClick={toggleAll} style={{fontSize:'10px',color:'#0891b2',background:'none',border:'none',cursor:'pointer',fontWeight:'600'}}>
                                        {selectedTrees.size === allTrees.length ? 'Deselect All' : 'Select All'}
                                    </button>
                                </div>
                                <div style={{maxHeight:'200px',overflowY:'auto',border:'1px solid #e5e7eb',borderRadius:'8px'}}>
                                    {allTrees.map((tree, idx) => (
                                        <label key={idx} style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 12px',borderBottom: idx<allTrees.length-1 ? '1px solid #f3f4f6':'none',cursor:'pointer',background: selectedTrees.has(idx) ? '#f0fdf4' : 'white'}}>
                                            <input type="checkbox" checked={selectedTrees.has(idx)} onChange={() => toggleTree(idx)} style={{accentColor:'#065f46'}}/>
                                            <span style={{fontSize:'12px',fontFamily:'monospace',fontWeight:'600',color:'#374151'}}>{tree.treeName}</span>
                                            <span style={{fontSize:'10px',color:'#9ca3af',marginLeft:'auto'}}>
                                                {(() => { let g=0,e=0; const w=(n)=>{if(!n)return;n.type==='EVENT'?e++:g++; (n.children||[]).forEach(w);}; w(tree.rootNode); return `${g} gate${g!==1?'s':''}, ${e} event${e!==1?'s':''}`; })()}
                                            </span>
                                        </label>
                                    ))}
                                </div>
                                <div style={{fontSize:'11px',color:'#6b7280',marginTop:'5px'}}>{selectedTrees.size} of {allTrees.length} trees selected</div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div style={{borderTop:'1px solid #e5e7eb',padding:'12px 20px',display:'flex',justifyContent:'flex-end',gap:'8px',flexShrink:0}}>
                            <button onClick={onClose} style={{padding:'8px 18px',background:'#f3f4f6',border:'1px solid #d1d5db',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#374151'}}>Cancel</button>
                            <button onClick={handleExport} style={{padding:'8px 20px',background:'#065f46',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'700',color:'white'}}>
                                ↓ Export {selectedTrees.size > 0 ? `(${selectedTrees.size})` : ''}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

            useEffect(() => {

            const captureFaultTreeImage = async (treeIndex, isFirstTree = false) => {
                console.log(`\n--- Capturing image for tree ${treeIndex} ---`);
                return new Promise((resolve) => {
                    try {
                        // Save current tree index
                        const currentIndex = selectedTreeIndex;
                        console.log(`Current tree index: ${currentIndex}, switching to: ${treeIndex}`);
                        
                        // Switch to the tree we want to capture
                        setSelectedTreeIndex(treeIndex);
                        
                        // First tree needs more time to render (1.5 seconds), others need 500ms
                        const timeout = isFirstTree ? 1500 : 500;
                        console.log(`Waiting ${timeout}ms for render...`);
                        
                        // Retry mechanism for canvas readiness
                        const attemptCapture = (attemptNumber = 1, maxAttempts = 3) => {
                            setTimeout(() => {
                                try {
                                    // Find the canvas element in the DOM
                                    const canvasElements = document.querySelectorAll('canvas');
                                    console.log(`Attempt ${attemptNumber}: Found ${canvasElements.length} canvas elements`);
                                    
                                    if (canvasElements.length === 0) {
                                        if (attemptNumber < maxAttempts) {
                                            console.log(`No canvas found, retrying in 500ms...`);
                                            attemptCapture(attemptNumber + 1, maxAttempts);
                                            return;
                                        }
                                        console.log('✗ No canvas found after all attempts');
                                        setSelectedTreeIndex(currentIndex);
                                        resolve(null);
                                        return;
                                    }
                                    
                                    // Use the first canvas (the fault tree canvas)
                                    const displayedCanvas = canvasElements[0];
                                    console.log(`Canvas dimensions: ${displayedCanvas.width}x${displayedCanvas.height}`);
                                    
                                    // Check if canvas is ready (has content)
                                    if (displayedCanvas.width === 0 || displayedCanvas.height === 0) {
                                        if (attemptNumber < maxAttempts) {
                                            console.log(`Canvas not ready, retrying in 500ms...`);
                                            attemptCapture(attemptNumber + 1, maxAttempts);
                                            return;
                                        }
                                        console.log('✗ Canvas not ready after all attempts');
                                        setSelectedTreeIndex(currentIndex);
                                        resolve(null);
                                        return;
                                    }
                                    
                                    // Get canvas image data to find non-white bounds
                                    // Set willReadFrequently for performance
                                    const ctx = displayedCanvas.getContext('2d', { willReadFrequently: true });
                                    const imageData = ctx.getImageData(0, 0, displayedCanvas.width, displayedCanvas.height);
                                    const data = imageData.data;
                                    
                                    let minX = displayedCanvas.width;
                                    let minY = displayedCanvas.height;
                                    let maxX = 0;
                                    let maxY = 0;
                                    let hasContent = false;
                                    
                                    // More aggressive whitespace detection - check every 4th pixel for speed
                                    // and use a stricter threshold for "white"
                                    for (let y = 0; y < displayedCanvas.height; y += 2) {
                                        for (let x = 0; x < displayedCanvas.width; x += 2) {
                                            const idx = (y * displayedCanvas.width + x) * 4;
                                            const r = data[idx];
                                            const g = data[idx + 1];
                                            const b = data[idx + 2];
                                            const a = data[idx + 3];
                                            
                                            // More strict: pixel is not white if any channel is < 245 and has opacity
                                            if (a > 0 && (r < 245 || g < 245 || b < 245)) {
                                                minX = Math.min(minX, x);
                                                minY = Math.min(minY, y);
                                                maxX = Math.max(maxX, x);
                                                maxY = Math.max(maxY, y);
                                                hasContent = true;
                                            }
                                        }
                                    }
                                    
                                    if (!hasContent) {
                                        if (attemptNumber < maxAttempts) {
                                            console.log(`No content found in canvas, retrying in 500ms...`);
                                            attemptCapture(attemptNumber + 1, maxAttempts);
                                            return;
                                        }
                                        console.log('✗ No content found in canvas after all attempts');
                                        setSelectedTreeIndex(currentIndex);
                                        resolve(null);
                                        return;
                                    }
                                    
                                    // Add padding around the content
                                    const padding = 30;
                                    minX = Math.max(0, minX - padding);
                                    minY = Math.max(0, minY - padding);
                                    maxX = Math.min(displayedCanvas.width, maxX + padding);
                                    maxY = Math.min(displayedCanvas.height, maxY + padding);
                                    
                                    const trimmedWidth = maxX - minX;
                                    const trimmedHeight = maxY - minY;
                                    
                                    console.log(`Original: ${displayedCanvas.width}x${displayedCanvas.height}`);
                                    console.log(`Trimmed bounds: ${minX},${minY} to ${maxX},${maxY}`);
                                    console.log(`Trimmed size: ${trimmedWidth}x${trimmedHeight}`);
                                    console.log(`Reduction: ${Math.round((1 - (trimmedWidth * trimmedHeight) / (displayedCanvas.width * displayedCanvas.height)) * 100)}%`);
                                    
                                    // Create a higher resolution copy with trimmed bounds
                                    const scale = 2; // 2x resolution for better quality
                                    const canvas = document.createElement('canvas');
                                    canvas.width = trimmedWidth * scale;
                                    canvas.height = trimmedHeight * scale;
                                    const newCtx = canvas.getContext('2d');
                                    
                                    // Fill with white background
                                    newCtx.fillStyle = '#ffffff';
                                    newCtx.fillRect(0, 0, canvas.width, canvas.height);
                                    
                                    // Scale up and draw the trimmed portion
                                    newCtx.scale(scale, scale);
                                    newCtx.drawImage(displayedCanvas, minX, minY, trimmedWidth, trimmedHeight, 0, 0, trimmedWidth, trimmedHeight);
                                    
                                    // Convert to base64
                                    const finalImageData = canvas.toDataURL('image/png');
                                    console.log(`✓ Image captured and trimmed (attempt ${attemptNumber}), base64 length: ${finalImageData.length}`);
                                    
                                    // Restore original tree index
                                    setSelectedTreeIndex(currentIndex);
                                    console.log(`Restored tree index to: ${currentIndex}`);
                                    
                                    resolve(finalImageData);
                                } catch (error) {
                                    console.error('✗ Error in capture attempt:', error);
                                    if (attemptNumber < maxAttempts) {
                                        console.log(`Error occurred, retrying in 500ms...`);
                                        attemptCapture(attemptNumber + 1, maxAttempts);
                                    } else {
                                        setSelectedTreeIndex(currentIndex);
                                        resolve(null);
                                    }
                                }
                            }, attemptNumber === 1 ? timeout : 500); // First attempt uses initial timeout, retries use 500ms
                        };
                        
                        // Start the capture attempts
                        attemptCapture();
                        
                    } catch (error) {
                        console.error('✗ Error in captureFaultTreeImage:', error);

                    }
                });

            const handleGenerate = async () => {

            };

            const buildPreviewHTML = (treeIndices, treeImages, includeCutSetsData, headerOptions = {}) => {

                const fmtProb = (p) => {
                    if (!p && p !== 0) return '—';
                    const exp = Math.floor(Math.log10(Math.abs(p) || 1));
                    const man = p / Math.pow(10, exp);
                    if (probDigits === '0') return `${Math.round(man)}E${exp >= 0 ? '+' : ''}${exp}`;
                    if (probDigits === '1') return `${man.toFixed(1)}E${exp >= 0 ? '+' : ''}${exp}`;
                    return `${man.toFixed(2)}E${exp >= 0 ? '+' : ''}${exp}`;
                };

                                body += `<td style="padding:5px 8px;border:1px solid #e5e7eb;text-align:right;font-family:monospace;">${prob != null ? fmtProb(prob) : '—'}</td>`;
                                body += `</tr>`;
                            });
                            body += `</tbody></table>`;
                            if (csData.cutSets.length > limit) {
                                body += `<p style="font-size:11px;color:#9ca3af;margin:4px 0 0 0;">Showing ${limit} of ${csData.cutSets.length} cut sets</p>`;

                    }

                    body += `</div>`;
                });

                return `<!DOCTYPE html><html><head><meta charset="utf-8">

                    // Build HTML content

<body>
`;

                    // Title (optional)
                    if (headerOptions.includeHeader !== false) {
                        htmlContent += `<h1 style="text-align: center;">Fault Tree Analysis Report</h1>\n`;
                    }

                    // Project info (optional)
                    if (headerOptions.includeProject !== false) {
                        htmlContent += `<p><strong>Project:</strong> ${currentProject?.projectName || 'Unnamed Project'}</p>\n`;
                    }
                    if (headerOptions.includeDate !== false) {

                    // Add trees
                    for (let i = 0; i < treeIndices.length; i++) {

                        if (imageData && imageData.length > 0) {

                        // Add cut sets if requested
                        if (includeCutSetsData && cutSets) {

                            console.log(`Available keys:`, Object.keys(cutSets));
                            
                            const cutSetData = cutSets[treeName];

                            if (cutSetData && cutSetData.cutSets) {
                                console.log(`✓ Found ${cutSetData.cutSets.length} cut sets`);
                                
                                // Calculate probabilities for all cut sets
                                const cutSetsWithProb = cutSetData.cutSets.map((cutSet, idx) => {
                                    let probability = 1.0;
                                    let probValid = true;
                                    
                                    for (const event of cutSet) {
                                        const eventName = event.name || event;
                                        const cleanName = eventName.startsWith('/') ? eventName.substring(1) : eventName;
                                        const isComplemented = event.complement || eventName.startsWith('/');
                                        
                                        const info = eventInfo[cleanName];
                                        if (info && info.Calc_Prob !== undefined) {
                                            if (isComplemented) {
                                                probability *= (1.0 - info.Calc_Prob);
                                            } else {
                                                probability *= info.Calc_Prob;
                                            }
                                        } else {
                                            probValid = false;
                                            break;
                                        }
                                    }
                                    
                                    return {
                                        cutSet,
                                        probability: probValid ? probability : null,
                                        originalIndex: idx
                                    };
                                });
                                
                                // Sort by probability (highest first)
                                cutSetsWithProb.sort((a, b) => {

                                    if (a.probability === null) return 1;
                                    if (b.probability === null) return -1;
                                    return b.probability - a.probability;

                                // Calculate MCUB (Minimal Cut-set Upper Bound)

                                htmlContent += `<h3>Minimal Cut Sets</h3>\n`;
                                
                                // Add MCUB
                                if (mcubValid) {

                                    htmlContent += `<p><strong>MCUB (Minimal Cut-set Upper Bound):</strong> ${mcubText}</p>\n`;

                                const limit = Math.min(cutSetsWithProb.length, cutSetLimit);

                                cutSetsWithProb.slice(0, limit).forEach((item, cutSetIdx) => {
                                    const cutSet = item.cutSet;
                                    const probability = item.probability;
                                    
                                    // Build event list with descriptions - each on new line with bold event names
                                    const eventDescriptions = currentProject?.eventDescriptions || {};
                                    const eventLines = cutSet.map(event => {

                                        const description = eventDescriptions[cleanName] || '';
                                        
                                        return description ? `${prefix} - ${description}` : prefix;
                                    }).join('<br/>');

                                    const probText = probability !== null ? probability.toExponential(probDigits) : 'N/A';

                                    htmlContent += `<tr><td>${cutSetIdx + 1}</td><td>${eventLines}</td><td>${probText}</td></tr>\n`;

                    // Create blob with Word MIME type
                    const blob = new Blob([htmlContent], {

                    console.log('Blob size:', blob.size);
                    
                    // Download
                    const url = URL.createObjectURL(blob);

                    a.href = url;

            const generatePDFReport = async (treeIndices, treeImages, includeCutSetsData, headerOptions = {}) => {
                console.log('PDF generation started');
                console.log('Tree indices:', treeIndices);
                console.log('Tree images keys:', Object.keys(treeImages));
                console.log('Include cut sets:', includeCutSetsData);
                console.log('Header options:', headerOptions);

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let y = 20;

                // Title (optional)
                if (headerOptions.includeHeader !== false) {
                    doc.setFontSize(20);
                    doc.text("Fault Tree Analysis Report", 105, y, { align: 'center' });
                    y += 15;
                }

                // Project info (optional)
                doc.setFontSize(12);
                if (headerOptions.includeProject !== false) {
                    doc.text(`Project: ${currentProject?.projectName || 'Unnamed Project'}`, 20, y);
                    y += 7;
                }
                if (headerOptions.includeDate !== false) {
                    doc.text(`Generated: ${new Date().toLocaleString()}`, 20, y);
                    y += 7;
                }

                // Add some space after header if any header elements were included
                if (headerOptions.includeHeader !== false || headerOptions.includeProject !== false || headerOptions.includeDate !== false) {
                    y += 8;
                }

                // Add trees
                for (const idx of treeIndices) {
                    const tree = availableTrees[idx];
                    if (!tree) {
                        console.log(`Tree at index ${idx} not found`);
                        continue;
                    }

                    // Check if need new page
                    if (y > 250) {
                        doc.addPage();
                        y = 20;
                    }

                    // Tree name
                    doc.setFontSize(16);
                    doc.text(tree.treeName || `Fault Tree ${idx + 1}`, 20, y);
                    y += 10;

                    // Add image if available
                    console.log(`Checking image for tree ${idx}, exists: ${!!treeImages[idx]}`);
                    if (treeImages[idx]) {

                            console.log(`Adding image to PDF for tree ${idx}`);
                            doc.addImage(treeImages[idx], 'PNG', 20, y, 170, 113);
                            y += 120;

                        } catch (err) {
                            console.error('Error adding image to PDF:', err);

                    } else {

                    }

                    // Add cut sets if requested
                    if (includeCutSetsData && cutSets) {

                                y = 20;

                                }).join(' AND ');

                                y += 5;
                            });

                            console.log(`No cut set data found for tree ${idx}, key: "${treeKey}"`);
                        }

                doc.save(`${fileName}.pdf`);
