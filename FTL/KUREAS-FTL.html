        class SettingsManager {
            static STORAGE_KEY = 'KUREAS_FTL_settings';
            
            static load() {
                try {
                    const saved = localStorage.getItem(this.STORAGE_KEY);
                    return saved ? { ...DEFAULT_SETTINGS, ...JSON.parse(saved) } : { ...DEFAULT_SETTINGS };
                } catch (err) {

                    return { ...DEFAULT_SETTINGS };

            static save(settings) {
                try {

                    return true;
                } catch (err) {
                    console.error('Failed to save settings:', err);
                    return false;
                }
            }
            
            static reset() {
                localStorage.removeItem(this.STORAGE_KEY);
                return { ...DEFAULT_SETTINGS };
            }

        // Format probability in scientific notation
        function formatProbability(prob, digits) {
            if (!prob || prob === 0) return '0.0E+0';
            
            const exponent = Math.floor(Math.log10(Math.abs(prob)));
            const mantissa = prob / Math.pow(10, exponent);
            
            if (digits === '0') {
                return `${Math.round(mantissa)}.E${exponent >= 0 ? '+' : ''}${exponent}`;
            } else if (digits === '1') {
                return `${mantissa.toFixed(1)}E${exponent >= 0 ? '+' : ''}${exponent}`;
            } else if (digits === '2') {
                return `${mantissa.toFixed(2)}E${exponent >= 0 ? '+' : ''}${exponent}`;
            }
            return '';
        }

        // IndexedDB Database Class
        class TreeDB {
            constructor() {
                this.dbName = 'SaphireFaultTreeDB';
                this.version = 1;
                this.db = null;
            }

            init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);

                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('faulttrees')) {
                            db.createObjectStore('faulttrees', { keyPath: 'id', autoIncrement: true });
                        }
                    };
                });
            }

            saveTree(treeData) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['faulttrees'], 'readwrite');
                    const store = transaction.objectStore('faulttrees');
                    const data = {
                        ...treeData,
                        timestamp: new Date().toISOString()
                    };
                    const request = store.add(data);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            getAllTrees() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['faulttrees'], 'readonly');
                    const store = transaction.objectStore('faulttrees');
                    const request = store.getAll();

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            deleteTree(id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['faulttrees'], 'readwrite');
                    const store = transaction.objectStore('faulttrees');
                    const request = store.delete(id);

                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // Parser Functions
        function parseFTLStructure(text) {
            const sections = text.split('^EOS').filter(s => s.trim());
            const faultTrees = [];
            let projectName = '';

            sections.forEach((section, index) => {
                const tree = parseSingleFaultTree(section.trim());
                if (tree) {
                    if (index === 0) {
                        projectName = tree.projectName;
                    }
                    faultTrees.push(tree);
                }
            });

            return {
                projectName,
                faultTrees
            };
        }

        function parseSingleFaultTree(text) {
            const lines = text.split('\n').filter(line => line.trim());
            if (lines.length === 0) return null;

            // Parse header
            const header = lines[0].replace(/=$/, '').split(',');
            const projectName = header[0].trim();
            // Remove '=' and spaces from tree name
            const treeName = header[1] ? header[1].trim().replace(/=/g, '').replace(/\s+/g, '') : 'UnnamedTree';

            // Build gate map from all lines (can be in any order)
            const gateMap = {};
            const allNodes = new Set();

            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].trim().split(/\s+/);
                if (parts.length >= 1) {
                    const nodeName = parts[0];
                    allNodes.add(nodeName);
                    
                    if (parts.length >= 2) {
                        const gateType = parts[1];
                        const inputs = parts.slice(2);

                        gateMap[nodeName] = {
                            type: gateType,
                            inputs: inputs
                        };
                        
                        // Add all inputs to the set of known nodes
                        inputs.forEach(input => allNodes.add(input));
                    }
                }
            }

            // Find root gate - it's a gate that is not an input to any other gate
            let rootGateName = null;
            const inputNodes = new Set();
            
            // Collect all nodes that are inputs to other gates
            Object.values(gateMap).forEach(gate => {
                gate.inputs.forEach(input => inputNodes.add(input));
            });
            
            // Root is a gate that is not in the input set
            for (const nodeName of Object.keys(gateMap)) {
                if (!inputNodes.has(nodeName)) {
                    rootGateName = nodeName;
                    break;
                }
            }
            
            // If no root found, use first gate defined
            if (!rootGateName && Object.keys(gateMap).length > 0) {
                rootGateName = Object.keys(gateMap)[0];
            }

            if (!rootGateName) return null;

            // Build tree structure recursively
            function buildTree(nodeName, path = []) {
                // Cycle detection
                if (path.includes(nodeName)) {
                    return {
                        name: nodeName,
                        type: 'EVENT',
                        description: '(cycle)',
                        children: []
                    };
                }

                if (gateMap[nodeName]) {
                    const gate = gateMap[nodeName];
                    const newPath = [...path, nodeName];
                    
                    // For TRAN gates (transfer gates), store the transfer reference
                    if (gate.type === 'TRAN') {
                        let transferTarget = '';
                        
                        // If inputs are provided, use the first input as transfer target
                        if (gate.inputs.length > 0) {
                            transferTarget = gate.inputs[0];
                        } else {
                            // If no inputs, the gate name IS the transfer target
                            transferTarget = nodeName;
                        }
                        
                        return {
                            name: nodeName,
                            type: 'TRAN',
                            transferTo: transferTarget,
                            children: []
                        };
                    }
                    
                    // Detect SAPHIRE N/M voting gate format (e.g. "3/4" means 3-of-4)
                    const _nmMatch = /^(\d+)\/(\d+)$/.exec(gate.type);
                    if (_nmMatch) {
                        const _votN = parseInt(_nmMatch[1], 10);
                        return {
                            name: nodeName,
                            type: 'VOTING',
                            votingN: _votN,
                            children: gate.inputs.map(input => buildTree(input, newPath))
                        };
                    }
                    return {
                        name: nodeName,
                        type: gate.type,
                        children: gate.inputs.map(input => buildTree(input, newPath))
                    };
                } else {
                    return {
                        name: nodeName,
                        type: 'EVENT',
                        description: '',
                        children: []
                    };
                }
            }

            const rootNode = buildTree(rootGateName);


            return {
                projectName,
                treeName,
                rootNode
            };
        }

        function parseEventDescriptions(text) {
            const descriptions = {};
            const lines = text.split('\n')
                .map(l => l.replace(/\r$/, ''))  // strip Windows CR
                .filter(line => line.trim())
                .filter(line => !line.trim().startsWith('*'))  // skip comment lines
                .filter(line => !/^[^,]+=\s*$/.test(line.trim()));  // skip header lines ending with =

            lines.forEach(line => {
                // Split on first comma only - descriptions may contain commas
                const commaIdx = line.indexOf(',');
                if (commaIdx < 0) return;
                const eventName = line.substring(0, commaIdx).trim();
                if (!eventName) return;
                // Description is everything after first comma, before optional last ",PROJECT" field
                // Use the part after the first comma - strip a trailing ",PROJECT" if present
                let rest = line.substring(commaIdx + 1);
                // Remove trailing ,PROJECT field (last comma-separated token if it looks like a project name)
                const lastComma = rest.lastIndexOf(',');
                const potentialProject = lastComma >= 0 ? rest.substring(lastComma + 1).trim() : '';
                // If the last field has no spaces (typical project name), strip it
                if (lastComma >= 0 && potentialProject && !/\s/.test(potentialProject)) {
                    rest = rest.substring(0, lastComma);
                }
                const description = rest.trim();
                if (eventName && description) {
                    descriptions[eventName] = description;
                }
            });

            return descriptions;
        }

        // Parse SAPHIRE Gate Description (GTD) file
        // Format: GATE_NAME, GATE_DESCRIPTION, ALTERNATIVE_FLAG, PROJECT_NAME
        // We only use GATE_NAME and GATE_DESCRIPTION
        function parseGateDescriptions(text) {
            const descriptions = {};
            const lines = text.split('\n')
                .map(l => l.replace(/\r$/, ''))  // strip Windows CR
                .filter(line => line.trim())
                .filter(line => !line.trim().startsWith('*'))  // skip comment lines
                .filter(line => !/^[^,]+=\s*$/.test(line.trim()));  // skip header lines ending with =

            lines.forEach(line => {
                // Split on first comma only
                const commaIdx = line.indexOf(',');
                if (commaIdx < 0) return;
                const gateName = line.substring(0, commaIdx).trim();
                if (!gateName) return;
                // Description is in second field - strip trailing ,ALT_FLAG,PROJECT fields
                const afterName = line.substring(commaIdx + 1);
                const descComma = afterName.indexOf(',');
                const description = (descComma >= 0 ? afterName.substring(0, descComma) : afterName).trim();
                if (gateName && description) {
                    descriptions[gateName] = description;
                }
            });

            return descriptions;
        }

        // Parse SAPHIRE Basic Event Information (BEI) file
        // Format: Name,FdT,UdC,UdT,UdValue,Prob,Lambda,Tau,Mission,Init,PF,UdValue2,Calc_Prob,Freq,Model_Type,Phase_Type,Project
        function parseBEI(text) {
            const eventInfo = {};
            const lines = text.split('\n')
                .map(l => l.replace(/\r$/, ''))
                .filter(line => line.trim())
                .filter(line => !line.trim().startsWith('*'))
                .filter(line => !/^[^,]+=\s*$/.test(line.trim()));
            // Skip continuation header lines (e.g. "Prob, Freq, Analysis Type..." from SAPHIRE 8 BEI)
            // A valid data line's first field should look like an event name (no spaces, starts with letter or <)
            const validDataLine = (line) => {
                const firstField = line.split(',')[0].trim();
                // Event names: alphanumeric + hyphens/underscores, or <SPECIAL> names
                return /^(<[^>]*>|[A-Za-z0-9][A-Za-z0-9_\-<>]*)$/.test(firstField);
            };

            lines.forEach(line => {
                if (!validDataLine(line)) return;
                // Split by comma
                const parts = line.split(',');
                
                if (parts.length >= 3) { // At minimum need Name, FdT, and Calc_Prob
                    const name = parts[0] ? parts[0].trim() : '';
                    
                    if (name) {
                        eventInfo[name] = {
                            Name: name,
                            FdT: parts[1] ? parts[1].trim() : '',
                            UdC: parts[2] ? parts[2].trim() : '',
                            UdT: parts[3] ? parts[3].trim() : '',
                            UdValue: parts[4] ? parseFloat(parts[4].trim()) || 0 : 0,
                            Prob: parts[5] ? parseFloat(parts[5].trim()) || 0 : 0,
                            Lambda: parts[6] ? parseFloat(parts[6].trim()) || 0 : 0,
                            Tau: parts[7] ? parseFloat(parts[7].trim()) || 0 : 0,
                            Mission: parts[8] ? parseFloat(parts[8].trim()) || 0 : 0,
                            Init: parts[9] ? parts[9].trim().toUpperCase() === 'T' || parts[9].trim() === '1' : false,
                            PF: parts[10] ? parts[10].trim() : ' ',
                            UdValue2: parts[11] ? parseFloat(parts[11].trim()) || 0 : 0,
                            Calc_Prob: parts[12] ? parseFloat(parts[12].trim()) || 0 : 0,
                            Freq: parts[13] ? parts[13].trim() : ' ',
                            Model_Type: parts[14] ? parts[14].trim() : '',
                            Phase_Type: parts[15] ? parts[15].trim() : '',
                            Project: parts[16] ? parts[16].trim() : ''
                        };
                    }
                }
            });

            // Post-process: map SAPHIRE fields to KUREAS model detail fields
            Object.values(eventInfo).forEach(ev => {
                // Failure model from FdT — only recognised codes get a specific model;
                // any other FdT → FM0 (Probability of Failure), use Calc_Prob directly.
                // FdT codes: 1=demand, 3=Poisson, 7=standby, 5=repair, T=true flag, F=false flag, I=ignore flag
                const fdtMap = { '1':'1', '3':'2', '7':'3', '5':'4', 'T':'5', 'F':'5', 'I':'5' };
                if (!ev.FailureModel && ev.FdT) {
                    ev.FailureModel = fdtMap[String(ev.FdT).toUpperCase()] || '0';
                }
                // For Logic T/F/I flags, seed the flag value directly from FdT
                if (ev.FailureModel === '5') {
                    const fdt = String(ev.FdT).toUpperCase();
                    if (fdt === 'T') ev.LogicFlag = 'T';
                    else if (fdt === 'F') ev.LogicFlag = 'F';
                    else if (fdt === 'I') ev.LogicFlag = 'I';
                    else ev.LogicFlag = 'T'; // fallback
                }
                // Distribution from UdT
                const udtMap = { 'L':'lognormal', 'G':'gamma', 'B':'beta', 'O':'cni', 'N':'point' };
                if (!ev.Distribution && ev.UdT) {
                    ev.Distribution = udtMap[String(ev.UdT).toUpperCase()] || 'point';
                }
                // Distribute UdValue: alpha for beta/gamma, EF for lognormal
                if (ev.UdValue !== undefined && ev.UdValue !== 0) {
                    const dist = ev.Distribution || 'point';
                    if (dist === 'beta' || dist === 'gamma') ev.DistAlpha = ev.UdValue;
                    else if (dist === 'lognormal')           ev.DistEF   = ev.UdValue;
                }
                // Map SAPHIRE model params to KUREAS fields
                if (ev.Lambda !== undefined) ev.DistLambda = ev.Lambda;  // mean rate
                if (ev.Mission !== undefined && ev.Mission !== 0) ev.MissionTime = ev.Mission;
                if (ev.Tau     !== undefined && ev.Tau     !== 0) ev.TauRepair   = ev.Tau;
                if (ev.DemandN === undefined) ev.DemandN = 1;
                // Set Calc_Prob and dialog Prob based on failure model
                const fm = ev.FailureModel || '0';
                const lambda = ev.Lambda || 0;
                const mt = ev.MissionTime || ev.Mission || 1;
                const tau = ev.TauRepair  || ev.Tau    || 1;
                const p0  = ev.Prob || 0;
                if (fm === '0' || fm === '5') {
                    // Probability of Failure / Logic Flag: use Calc_Prob from file; fall back to Prob
                    if (!ev.Calc_Prob && p0) ev.Calc_Prob = p0;
                    // Prob stays as-is
                } else if (fm === '1') {
                    // Demand: Prob field is the per-demand probability
                    ev.DemandProb = p0;
                    // Calc_Prob already set from file; leave it
                } else {
                    let computedProb = null;
                    if (fm === '2' && lambda > 0 && mt > 0) {
                        computedProb = 1 - Math.exp(-lambda * mt);
                    } else if (fm === '3' && lambda > 0 && mt > 0) {
                        const li = lambda * mt;
                        computedProb = 1 + (Math.exp(-li) - 1) / li;
                    } else if (fm === '4' && lambda > 0 && mt > 0 && tau > 0) {
                        computedProb = (lambda*tau)*(1-Math.exp(-(lambda+1/tau)*mt))/(1+lambda*tau);
                    }
                    if (computedProb !== null && !isNaN(computedProb)) {
                        ev.Calc_Prob = computedProb;
                    }
                    // For models 2-4 the mean shown in the dialog is lambda
                    ev.Prob = lambda;
                }
            });
            return eventInfo;
        }

        // Parse SAPHIRE Fault Tree Cut Set (FTC) file
        // Format: Project, Fault_Tree, ModelType/Phase
        //         =
        //         Eventname * Eventname +
        //         Eventname * Eventname * Eventname +
        //         Eventname +
        //         Eventname * Eventname.
        //         ^EOS
        // Lines starting with '*' are comments and should be ignored
        // Note: The last tree in the file may not have ^EOS at the end
        function parseFTC(text) {
            const cutSetsByTree = {};
            
            // Split by ^EOS, but keep content after last ^EOS (or entire file if no ^EOS)
            const sections = [];
            const parts = text.split('^EOS');
            
            // Add all parts that have content
            for (let i = 0; i < parts.length; i++) {
                const trimmed = parts[i].trim();
                if (trimmed.length > 0) {
                    sections.push(trimmed);
                }
            }

            sections.forEach((section, sectionIndex) => {
                // Split into lines and trim, but keep all lines initially
                const allLines = section.split('\n').map(l => l.trim());
                
                // Filter out comment lines (starting with *) and empty lines
                const lines = allLines.filter(l => l && !l.startsWith('*'));
                
                if (lines.length < 2) {
                    return;
                }

                // Parse header: Project, Fault_Tree, ModelType/Phase
                const headerLine = lines[0];
                const headerParts = headerLine.split(',').map(p => p.trim());
                
                if (headerParts.length < 2) {
                    return;
                }

                const project = headerParts[0];
                // Normalize tree name same way as FTL parser (strip = signs and spaces)
                const faultTree = headerParts[1].replace(/=/g, '').replace(/\s+/g, '');
                const modelPhase = headerParts[2] || '';

                // Look for '=' line
                let startIndex = -1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i] === '=') {
                        startIndex = i + 1;
                        break;
                    }
                }

                if (startIndex === -1 || startIndex >= lines.length) {
                    // Still create entry but with 0 cut sets
                    cutSetsByTree[faultTree] = {
                        project: project,
                        faultTree: faultTree,
                        modelPhase: modelPhase,
                        cutSets: []
                    };
                    return;
                }

                // Parse cut sets
                const cutSets = [];
                
                for (let i = startIndex; i < lines.length; i++) {
                    const line = lines[i];
                    if (!line || line === '^EOS') {
                        continue;
                    }

                    // Remove trailing + or .
                    let cutSetLine = line.replace(/[+.]$/, '').trim();
                    
                    // Split by * to get events
                    const events = cutSetLine.split('*').map(e => e.trim()).filter(e => e);
                    
                    // Parse each event (check for complement /)
                    const parsedEvents = events.map(event => {
                        if (event.startsWith('/')) {
                            return {
                                name: event.substring(1).trim(),
                                complement: true
                            };
                        } else {
                            return {
                                name: event.trim(),
                                complement: false
                            };
                        }
                    });

                    if (parsedEvents.length > 0) {
                        cutSets.push(parsedEvents);
                    }
                }

                cutSetsByTree[faultTree] = {
                    project: project,
                    faultTree: faultTree,
                    modelPhase: modelPhase,
                    cutSets: cutSets
                };
            });

            return cutSetsByTree;
        }

        // Compact Layout Algorithm - minimal spacing between siblings
        function calculateLayout(node, nodeMultiplier = 1, spacingMultiplier = 1) {
            const nodeWidth = 160 * nodeMultiplier;
            const nodeHeight = 80 * nodeMultiplier;
            const levelHeight = 150 * nodeMultiplier * spacingMultiplier;
            
            // Minimal gap between siblings (just enough to see separation)
            const minGap = 5 * nodeMultiplier * spacingMultiplier;

            // Calculate subtree widths bottom-up
            function calculateWidths(node) {
                if (!node.children || node.children.length === 0) {
                    node.subtreeWidth = nodeWidth;
                    return;
                }

                // Recursively calculate children first
                node.children.forEach(child => calculateWidths(child));

                // Total width is sum of children's subtree widths plus minimal gaps
                let totalWidth = 0;
                node.children.forEach((child, i) => {
                    totalWidth += child.subtreeWidth;
                    if (i < node.children.length - 1) {
                        totalWidth += minGap;
                    }
                });

                node.subtreeWidth = Math.max(totalWidth, nodeWidth);
            }

            // Position nodes using calculated widths
            function assignPositions(node, x = 0, y = 0) {
                node.x = x;
                node.y = y;

                if (!node.children || node.children.length === 0) {
                    return;
                }

                // Calculate total width of all children
                let totalWidth = 0;
                node.children.forEach((child, i) => {
                    totalWidth += child.subtreeWidth;
                    if (i < node.children.length - 1) {
                        totalWidth += minGap;
                    }
                });

                // Start from left edge, centered under parent
                let currentX = x - totalWidth / 2;

                // Position each child
                node.children.forEach((child, i) => {
                    // Center child in its allocated subtree space
                    const childX = currentX + child.subtreeWidth / 2;
                    assignPositions(child, childX, y + levelHeight);
                    
                    // Move to next position
                    currentX += child.subtreeWidth;
                    if (i < node.children.length - 1) {
                        currentX += minGap;
                    }
                });
            }

            calculateWidths(node);
            assignPositions(node, 0, 0);
        }

        // Get bounding box of tree for auto-fit
        function getTreeBounds(node, nodeMultiplier = 1) {
            let minX = Infinity, maxX = -Infinity;
            let minY = Infinity, maxY = -Infinity;
            const nodeWidth = 160 * nodeMultiplier;
            const nodeHeight = 80 * nodeMultiplier;

            function traverse(node) {
                if (!node) return;
                
                minX = Math.min(minX, node.x - nodeWidth / 2);
                maxX = Math.max(maxX, node.x + nodeWidth / 2);
                minY = Math.min(minY, node.y - nodeHeight / 2);
                maxY = Math.max(maxY, node.y + nodeHeight / 2);

                if (node.children) {
                    node.children.forEach(child => traverse(child));
                }
            }

            traverse(node);

            return {
                minX,
                maxX,
                minY,
                maxY,
                width: maxX - minX,
                height: maxY - minY
            };
        }

        // Tree Canvas Component
        function TreeCanvas({ tree, treeIndex, eventDescriptions, gateDescriptions, eventInfo, project, settings, onDeleteNode, onEditNode, onUndo, canUndo, onAddGate, onAddEvent, onAddNodeGate, onDropBE, onDropFaultTree, onCopyNode, onPasteNode, clipboard }) {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const processedTreeRef = useRef(null);
            const [scale, setScale] = useState(1);
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [isInitialized, setIsInitialized] = useState(false);
            const [expandedTransNodes, setExpandedTransNodes] = useState(new Set());
            const [contextMenu, setContextMenu] = useState(null); // { node, screenX, screenY }
            const [editForm, setEditForm] = useState(null);  // { name, description, probability }
            const [editPanelPos, setEditPanelPos] = useState({ x: 0, y: 0 });
            const [isDraggingEditPanel, setIsDraggingEditPanel] = useState(false);
            const editPanelDragOffset = React.useRef({ x: 0, y: 0 });
            const [selectedNodeName, setSelectedNodeName] = useState(null);
            const [findText, setFindText] = useState(''); // name of currently selected/highlighted node
            const [scopeDialog, setScopeDialog] = useState(null);     // { originalName, totalInstances, updates, isGate, uniquePrompt? }
            const [scopeUniqueName, setScopeUniqueName] = useState('');   // controlled input for unique-name prompt
            const [transferDialog, setTransferDialog] = useState(null); // { originalName, updates, pendingFn }
            const [nameConflictDialog, setNameConflictDialog] = useState(null); // { originalName, conflictingName, updates, scope, treeIdx, isGate }

            // Clear selection/panel whenever the displayed tree changes
            React.useEffect(() => {
                setContextMenu(null);
                setEditForm(null);
                setSelectedNodeName(null);
            }, [tree]);

            // Get multipliers and styles from settings
            const fontMultiplier = getFontSizeMultiplier(settings.fontSize);
            const nodeMultiplier = getNodeSizeMultiplier(settings.nodeSize);
            const spacingMultiplier = getTreeSpacingMultiplier(settings.treeSpacing);
            const fontFamily = getFontFamily(settings.fontFamily);
            const backgroundStyle = getBackgroundStyle(settings.background);
            
            // Combine event and gate descriptions - build case-insensitive lookup map
            const _evtRaw = eventDescriptions || {};
            const _gateRaw = gateDescriptions || {};
            const _evtUpper = {};
            const _gateUpper = {};
            Object.keys(_evtRaw).forEach(k => { _evtUpper[k.toUpperCase()] = _evtRaw[k]; });
            Object.keys(_gateRaw).forEach(k => { _gateUpper[k.toUpperCase()] = _gateRaw[k]; });
            const descriptions = {
                // lookupEvent/lookupGate do case-insensitive matching
                events: _evtRaw,
                gates: _gateRaw,
                eventInfo: eventInfo || {},
                lookupEvent: (name) => _evtRaw[name] || _evtUpper[(name||'').toUpperCase()],
                lookupGate:  (name) => _gateRaw[name] || _gateUpper[(name||'').toUpperCase()]
            };

            useEffect(() => {
                if (!tree || !canvasRef.current) return;

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const container = containerRef.current;

                // Set canvas size
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;

                // Process tree to expand TRAN nodes
                const processedTree = tree.rootNode ? processTreeForExpansion(tree.rootNode) : null;
                processedTreeRef.current = processedTree;

                // Guard: if root was deleted, clear canvas and stop
                if (!processedTree) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    return;
                }

                // Calculate layout with node size and spacing multipliers
                calculateLayout(processedTree, nodeMultiplier, spacingMultiplier);

                // Auto-fit tree on first load based on settings
                if (!isInitialized) {
                    const defaultView = settings.defaultViewStyle || 'fit';
                    
                    if (defaultView === 'fit') {
                        // Fit to Window
                        const bounds = getTreeBounds(processedTree, nodeMultiplier);
                        const padding = 100;
                        const scaleX = (canvas.width - padding * 2) / bounds.width;
                        const scaleY = (canvas.height - padding * 2) / bounds.height;
                        const autoScale = Math.min(scaleX, scaleY, 1); // Don't scale up beyond 1
                        setScale(autoScale);
                        setOffset({ x: 0, y: 0 });
                    } else if (defaultView === '150') {
                        // 150% - adjust vertical offset to position tree lower
                        setScale(1.5);
                        setOffset({ x: 0, y: 50 }); // Push tree down by 50px
                    } else {
                        // 100%
                        setScale(1.0);
                        setOffset({ x: 0, y: 0 });
                    }
                    
                    setIsInitialized(true);
                    return; // Will re-render with new scale
                }

                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Save context state
                ctx.save();

                // Apply transformations
                ctx.translate(canvas.width / 2 + offset.x, 50 + offset.y);
                ctx.scale(scale, scale);

                // Draw tree with all settings
                drawTree(ctx, processedTree, descriptions, project, expandedTransNodes, settings, fontMultiplier, nodeMultiplier, fontFamily, selectedNodeName, findText);

                // Restore context state
                ctx.restore();
            }, [tree, scale, offset, descriptions, isInitialized, expandedTransNodes, settings, fontMultiplier, nodeMultiplier, fontFamily, selectedNodeName, findText]);

            // Set up wheel event listener with passive: false to allow preventDefault
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                const handleWheel = (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    setScale(prev => Math.max(0.1, Math.min(2, prev + delta)));
                };

                canvas.addEventListener('wheel', handleWheel, { passive: false });

                return () => {
                    canvas.removeEventListener('wheel', handleWheel);
                };
            }, []);

            // Edit panel drag
            React.useEffect(() => {
                if (!isDraggingEditPanel) return;
                const onMove = (e) => {
                    setEditPanelPos({
                        x: e.clientX - editPanelDragOffset.current.x,
                        y: e.clientY - editPanelDragOffset.current.y,
                    });
                };
                const onUp = () => setIsDraggingEditPanel(false);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
                return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
            }, [isDraggingEditPanel]);

            // Reset initialization when tree changes
            useEffect(() => {
                setIsInitialized(false);
                setExpandedTransNodes(new Set()); // Reset expanded nodes when tree changes
                // Auto-select root node when tree is freshly created (no children)
                if (tree && tree.rootNode && (!tree.rootNode.children || tree.rootNode.children.length === 0)) {
                    setSelectedNodeName(tree.rootNode.name);
                } else {
                    setSelectedNodeName(null);
                }
            }, [tree]);

            // Recursively process tree to expand TRAN nodes
            function processTreeForExpansion(node, depth = 0) {
                if (!node) return null;

                const isTransGate = node.type === 'TRAN' || node.transferTo;
                
                if (isTransGate && node.transferTo) {
                    const nodeId = `${node.name}_${node.transferTo}`;
                    
                    // Check if this TRAN node should be expanded
                    if (expandedTransNodes.has(nodeId)) {
                        // Find the referenced tree
                        const referencedTree = project?.faultTrees?.find(tree => 
                            tree.treeName === node.transferTo || 
                            tree.rootNode.name === node.transferTo
                        );
                        
                        if (referencedTree && referencedTree.rootNode) {
                            // Create a deep copy of the referenced tree's root node
                            const expandedChild = JSON.parse(JSON.stringify(referencedTree.rootNode));
                            
                            // Keep the TRAN node, but add the referenced tree as its child
                            return {
                                ...node,
                                type: 'TRAN',
                                transferTo: node.transferTo,
                                children: [processTreeForExpansion(expandedChild, depth + 1)],
                                isExpanded: true // Mark as expanded for coloring
                            };
                        }
                    }
                    // Not expanded, return the TRAN node as-is with no children
                    return { 
                        ...node, 
                        children: [],
                        type: 'TRAN',
                        transferTo: node.transferTo 
                    };
                }

                // If it's a TRAN type but no transferTo, try to look it up from gate map
                if (node.type === 'TRAN' && !node.transferTo) {
                    // Look up from original tree
                    const original = findOriginalTranNode(tree.rootNode, node.name);
                    if (original && original.transferTo) {
                        return processTreeForExpansion({ ...node, transferTo: original.transferTo }, depth);
                    }
                }

                // For non-TRAN nodes, recursively process children
                const processedNode = { ...node };
                if (node.children && node.children.length > 0) {
                    processedNode.children = node.children.map(child => processTreeForExpansion(child, depth + 1));
                }

                return processedNode;
            }

            function getLineThicknessMultiplier(setting) {
                if (setting === 'double') return 2;
                if (setting === 'triple') return 3;
                return 1; // single (default)
            }

            function drawTree(ctx, node, descriptions, project, expandedTransNodes, settings, fontMultiplier, nodeMultiplier, fontFamily, selectedNodeName, findText) {
                if (!node) return;

                // Draw edges first (so they appear behind nodes)
                if (node.children && node.children.length > 0) {
                    node.children.forEach(child => {
                        drawEdge(ctx, node, child, expandedTransNodes, settings, nodeMultiplier);
                    });
                }

                // Draw node
                drawNode(ctx, node, descriptions, project, expandedTransNodes, settings, fontMultiplier, nodeMultiplier, fontFamily, selectedNodeName, findText);

                // Draw children
                if (node.children && node.children.length > 0) {
                    node.children.forEach(child => {
                        drawTree(ctx, child, descriptions, project, expandedTransNodes, settings, fontMultiplier, nodeMultiplier, fontFamily, selectedNodeName, findText);
                    });
                }
            }

            function drawNode(ctx, node, descriptions, project, expandedTransNodes, settings, fontMultiplier, nodeMultiplier, fontFamily, selectedNodeName, findText) {
                const colors = getNodeColor(node.type, node, project, expandedTransNodes, settings);
                const ltMult = getLineThicknessMultiplier(settings?.lineThickness);
                const nodeWidth = 160 * nodeMultiplier;
                const nodeHeight = 80 * nodeMultiplier;
                const isSelected = selectedNodeName && node.name === selectedNodeName;

                // Draw highlight glow ring behind selected node
                if (isSelected) {
                    const glowColor = '#f59e0b'; // amber
                    const glowSize = 8 * nodeMultiplier;
                    ctx.save();
                    ctx.shadowColor = glowColor;
                    ctx.shadowBlur = 18 * nodeMultiplier;
                    ctx.strokeStyle = glowColor;
                    ctx.lineWidth = 3 * nodeMultiplier * ltMult;
                    const isTransGateCheck = node.type === 'TRAN' || node.transferTo;
                    const isEvent = node.type === 'EVENT';
                    if (isTransGateCheck) {
                        const h = 75 * nodeMultiplier, w = 90 * nodeMultiplier;
                        ctx.beginPath();
                        ctx.moveTo(node.x, node.y + h/2 + glowSize);
                        ctx.lineTo(node.x - w/2 - glowSize, node.y - h/2 - glowSize);
                        ctx.lineTo(node.x + w/2 + glowSize, node.y - h/2 - glowSize);
                        ctx.closePath();
                    } else if (isEvent) {
                        ctx.beginPath();
                        ctx.ellipse(node.x, node.y, nodeWidth/2 + glowSize, nodeHeight/2 + glowSize, 0, 0, Math.PI*2);
                    } else {
                        const r = 6 * nodeMultiplier;
                        const x = node.x - nodeWidth/2 - glowSize, y = node.y - nodeHeight/2 - glowSize;
                        const w2 = nodeWidth + glowSize*2, h2 = nodeHeight + glowSize*2;
                        ctx.beginPath();
                        ctx.moveTo(x + r, y);
                        ctx.lineTo(x + w2 - r, y); ctx.arcTo(x+w2, y, x+w2, y+r, r);
                        ctx.lineTo(x + w2, y + h2 - r); ctx.arcTo(x+w2, y+h2, x+w2-r, y+h2, r);
                        ctx.lineTo(x + r, y + h2); ctx.arcTo(x, y+h2, x, y+h2-r, r);
                        ctx.lineTo(x, y + r); ctx.arcTo(x, y, x+r, y, r);
                        ctx.closePath();
                    }
                    ctx.stroke();
                    ctx.restore();
                }

                // Draw find-match highlight ring (cyan) behind matched node
                const _findMatch = findText && findText.trim().length > 0 &&
                    node.name.toLowerCase().includes(findText.trim().toLowerCase());
                if (_findMatch) {
                    const glowColor = '#f59e0b'; // amber (same as selection)
                    const glowSize = 10 * nodeMultiplier;
                    ctx.save();
                    ctx.shadowColor = glowColor;
                    ctx.shadowBlur = 22 * nodeMultiplier;
                    ctx.strokeStyle = glowColor;
                    ctx.lineWidth = 3.5 * nodeMultiplier * ltMult;
                    const isTranM = node.type === 'TRAN' || node.transferTo;
                    const isEvtM = node.type === 'EVENT';
                    if (isTranM) {
                        const h = 75 * nodeMultiplier, w = 90 * nodeMultiplier;
                        ctx.beginPath();
                        ctx.moveTo(node.x, node.y + h/2 + glowSize);
                        ctx.lineTo(node.x - w/2 - glowSize, node.y - h/2 - glowSize);
                        ctx.lineTo(node.x + w/2 + glowSize, node.y - h/2 - glowSize);
                        ctx.closePath();
                    } else if (isEvtM) {
                        ctx.beginPath();
                        ctx.ellipse(node.x, node.y, nodeWidth/2 + glowSize, nodeHeight/2 + glowSize, 0, 0, Math.PI*2);
                    } else {
                        const r = 6 * nodeMultiplier;
                        const x = node.x - nodeWidth/2 - glowSize, y = node.y - nodeHeight/2 - glowSize;
                        const w2 = nodeWidth + glowSize*2, h2 = nodeHeight + glowSize*2;
                        ctx.beginPath();
                        ctx.moveTo(x + r, y);
                        ctx.lineTo(x + w2 - r, y); ctx.arcTo(x+w2, y, x+w2, y+r, r);
                        ctx.lineTo(x + w2, y + h2 - r); ctx.arcTo(x+w2, y+h2, x+w2-r, y+h2, r);
                        ctx.lineTo(x + r, y + h2); ctx.arcTo(x, y+h2, x, y+h2-r, r);
                        ctx.lineTo(x, y + r); ctx.arcTo(x, y, x+r, y, r);
                        ctx.closePath();
                    }
                    ctx.stroke();
                    ctx.restore();
                }

                // Check if this is a TRAN gate (transfer gate) - always draw as triangle if type is TRAN
                const isTransGate = node.type === 'TRAN' || node.transferTo;

                if (isTransGate) {
                    // Draw triangle for TRAN gates
                    // Point down when collapsed (default), point up when expanded
                    const height = 75 * nodeMultiplier;  // Increased from 60 to 75
                    const width = 90 * nodeMultiplier;   // Increased from 70 to 90
                    const isExpanded = node.isExpanded || (expandedTransNodes && expandedTransNodes.has(`${node.name}_${node.transferTo}`));

                    ctx.fillStyle = colors.fill;
                    ctx.strokeStyle = colors.stroke;
                    ctx.lineWidth = 2 * ltMult;

                    ctx.beginPath();
                    if (isExpanded) {
                        // Triangle pointing up (expanded state)
                        ctx.moveTo(node.x, node.y - height / 2); // Point at top
                        ctx.lineTo(node.x - width / 2, node.y + height / 2); // Bottom left
                        ctx.lineTo(node.x + width / 2, node.y + height / 2); // Bottom right
                    } else {
                        // Triangle pointing down (collapsed state)
                        ctx.moveTo(node.x, node.y + height / 2); // Point at bottom
                        ctx.lineTo(node.x - width / 2, node.y - height / 2); // Top left
                        ctx.lineTo(node.x + width / 2, node.y - height / 2); // Top right

                    ctx.closePath();

                } else {
                    // Draw shape based on node type
                    ctx.fillStyle = colors.fill;
                    ctx.strokeStyle = colors.stroke;
                    ctx.lineWidth = 2 * ltMult;

                    const x = node.x - nodeWidth / 2;
                    const y = node.y - nodeHeight / 2;
                    const radius = 5;

                    if (node.type === 'EVENT') {
                        // Draw oval/ellipse for events

                        const radiusY = nodeHeight / 2;
                        
                        ctx.beginPath();
                        ctx.ellipse(node.x, node.y, radiusX, radiusY, 0, 0, 2 * Math.PI);

                        ctx.stroke();
                    } else {
                        // Draw rounded rectangle for gates
                        ctx.beginPath();
                        ctx.moveTo(x + radius, y);

                        ctx.lineTo(x + nodeWidth, y + nodeHeight - radius);
                        ctx.quadraticCurveTo(x + nodeWidth, y + nodeHeight, x + nodeWidth - radius, y + nodeHeight);
                        ctx.lineTo(x + radius, y + nodeHeight);
                        ctx.quadraticCurveTo(x, y + nodeHeight, x, y + nodeHeight - radius);

                        ctx.quadraticCurveTo(x, y, x + radius, y);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
								// *** Draw symbol below OR/AND gates based on boxType setting ***
                        if (node.type === 'OR' || node.type === 'AND' || node.type === 'NOT' || node.type === 'NAND' || node.type === 'VOTING') {
                            const boxType = settings?.boxType || 'circle';

                            if (boxType === 'circle') {

                            } else if (boxType === 'gate-symbol') {

                                if (node.type === 'OR') {
                                    // Draw OR gate symbol (rounded-pointy top, concave bottom)

                                    // Start at bottom left
                                    ctx.moveTo(node.x - gateWidth / 2, gateY + gateHeight);

                                    ctx.moveTo(node.x - gateWidth / 2, gateY + gateHeight);

                                    ctx.stroke();

                                    ctx.save();
                                    ctx.strokeStyle = 'white';
                                    ctx.lineWidth = 5 * nodeMultiplier * ltMult;
                                    ctx.lineCap = 'round';
                                    ctx.beginPath();
                                    ctx.moveTo(node.x - gateWidth * 0.25, gateY + gateHeight * 0.9);
                                    ctx.lineTo(node.x + gateWidth * 0.25, gateY + gateHeight * 0.1);
                                    ctx.stroke();
                                    ctx.strokeStyle = '#dc2626';
                                    ctx.lineWidth = 3 * nodeMultiplier * ltMult;
                                    ctx.beginPath();
                                    ctx.moveTo(node.x - gateWidth * 0.25, gateY + gateHeight * 0.9);

                                    ctx.restore();
                                } else if (node.type === 'VOTING') {

                    // Draw gate type header if applicable

                        // Align gate type text based on gate type

                            // Center align for all other gate types

                            let gateLabel = node.type;
                            if (node.type === 'VOTING') {
                                const n = node.votingN || 1;

                    }

                    // Draw node name in black - shrink to fit
                    ctx.fillStyle = 'black';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const nameY = node.type === 'EVENT' ? node.y - 18 : node.y + 5;
                    const _isComplementNode = node.type === 'EVENT' && node.name && node.name.startsWith('/');
                    const _compBaseName = _isComplementNode ? node.name.slice(1) : node.name;
                    const _displayName = _isComplementNode ? _compBaseName : node.name;

                    // Dynamically size text to fit within node (measure display name, not "/name")
                    const maxNameWidth = nodeWidth - 10;

                    const _evtDesc = _isComplementNode
                        ? (_evtDescBase ? '¬ ' + _evtDescBase : 'Complement of ' + _compBaseName)

                        lines.slice(0, 3).forEach((line, i) => {

                            lastLineY = node.y + 2 + i * lineHeight;
                            ctx.fillText(displayLine, node.x, lastLineY);
                        });
                        
                        // Draw probability / flag label
                        const _probNodeName = _isComplementNode ? _compBaseName : node.name;
                        const _baseEICanvas = descriptions.eventInfo && descriptions.eventInfo[_probNodeName];
                        const _isFlag = _baseEICanvas && _baseEICanvas.FailureModel === '5';
                        if (_isFlag) {

                            const _flagVal = _baseEICanvas.LogicFlag || 'T';
                            // Complement of Ignore → also Ignore
                            const _resolvedFlag = (_isComplementNode && _flagVal === 'I') ? 'I'
                                : (_isComplementNode && _flagVal === 'T') ? 'F'
                                : (_isComplementNode && _flagVal === 'F') ? 'T'
