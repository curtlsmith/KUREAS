        // Add Node Modal Component
        function TreeInfoModal({ index, project, onClose }) {
            if (index === null || !project || !project.faultTrees[index]) return null;
            const tree = project.faultTrees[index];
            const treeName = tree.treeName;
            const rootNode = tree.rootNode;
            const rootDesc = (project.gateDescriptions && project.gateDescriptions[treeName]) || '';

            // Count gates and events in the tree
            function countNodes(node) {
                if (!node) return { gates: 0, events: 0 };
                const isEvent = node.type === 'EVENT';
                let gates = isEvent ? 0 : 1;
                let events = isEvent ? 1 : 0;
                (node.children || []).forEach(c => {
                    const sub = countNodes(c);
                    gates += sub.gates; events += sub.events;
                });
                return { gates, events };
            }
            const { gates, events } = countNodes(rootNode);

            // Collect unique basic events with info
            function collectEvents(node, seen = new Set(), list = []) {
                if (!node) return list;
                if (node.type === 'EVENT') {
                    const nm = node.name.startsWith('/') ? node.name.slice(1) : node.name;
                    if (!seen.has(nm)) {
                        seen.add(nm);
                        list.push(nm);
                    }
                }
                (node.children || []).forEach(c => collectEvents(c, seen, list));
                return list;
            }
            const eventNames = collectEvents(rootNode);

            // Where-used: find other trees with TRAN gates pointing to this tree
            const whereUsed = (project.faultTrees || []).filter((t, i) => {
                if (i === index) return false;
                function hasTran(node) {
                    if (!node) return false;
                    if (node.type === 'TRAN' && (node.transferTo === treeName || node.name === treeName)) return true;
                    return (node.children || []).some(hasTran);
                }
                return hasTran(t.rootNode);
            }).map(t => t.treeName);

            // Compute MCUB (Min Cut Upper Bound): 1 - ∏(1 - p_cs_i) over all cut sets
            const _cs = project.cutSets && project.cutSets[treeName];
            const _computedProb = (() => {
                if (!_cs || !Array.isArray(_cs.cutSets) || _cs.cutSets.length === 0) return null;
                const ei = project.eventInfo || {};
                let ftProb = 1.0;
                for (const cutSet of _cs.cutSets) {
                    let csProb = 1.0;
                    for (const ev of cutSet) {
                        const info = ei[ev.name];
                        if (!info || info.Calc_Prob === undefined) return null;
                        csProb *= ev.complement ? (1.0 - info.Calc_Prob) : info.Calc_Prob;
                    }
                    ftProb *= (1.0 - csProb);
                }
                return 1.0 - ftProb;
            })();
            const _topProb = _computedProb;

            const sectionHdr = { fontSize:'11px', fontWeight:'700', color:'#4b5563', textTransform:'uppercase', letterSpacing:'0.05em', borderBottom:'1px solid #e5e7eb', paddingBottom:'4px', marginBottom:'6px', marginTop:'12px' };
            const rowStyle = { display:'flex', gap:'8px', padding:'3px 0', fontSize:'12px', borderBottom:'1px solid #f3f4f6', alignItems:'baseline' };
            const nameStyle = { fontFamily:'monospace', fontWeight:'700', color:'#1e3a5f', minWidth:'120px', flexShrink:0 };
            const descStyle = { color:'#6b7280', flex:1 };
            const probStyle = { fontFamily:'monospace', color:'#7c3aed', fontSize:'11px', minWidth:'90px', textAlign:'right', flexShrink:0 };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center" onMouseDown={onClose}>
                    <div className="bg-white rounded-xl shadow-2xl flex flex-col" style={{width:'520px',maxHeight:'85vh'}} onMouseDown={e => e.stopPropagation()}>
                        {/* Header */}
                        <div className="flex items-center justify-between px-5 py-3 bg-emerald-600 text-white rounded-t-xl" style={{flexShrink:0}}>
                            <span className="font-bold text-sm">{treeName}</span>
                            <button onClick={onClose} className="text-white opacity-75 hover:opacity-100 text-xl leading-none">&times;</button>
                        </div>
                        <div className="px-5 py-4 overflow-y-auto flex-1 text-sm">
                            {/* 1. Name & description */}
                            <div style={sectionHdr}>Fault Tree</div>
                            <div style={{fontSize:'12px',color:'#374151',marginBottom:'4px'}}>
                                <span style={{fontFamily:'monospace',fontWeight:'700'}}>{treeName}</span>
                                {rootDesc && <span style={{color:'#6b7280'}}> &mdash; {rootDesc}</span>}
                            </div>
                            {/* 2. Summary */}
                            <div style={sectionHdr}>Summary</div>
                            <div style={{display:'flex',gap:'16px',fontSize:'12px',color:'#374151'}}>
                                {_topProb !== null && (
                                    <span>Probability: <strong style={{fontFamily:'monospace',color:'#7c3aed'}}>{_topProb.toExponential(3).toUpperCase()}</strong></span>
                                )}
                                <span>Gates: <strong>{gates}</strong></span>
                                <span>Basic Events: <strong>{events}</strong></span>
                            </div>
                            {/* 3. Where used */}
                            <div style={sectionHdr}>Where Used</div>
                            {whereUsed.length === 0 ? (
                                <div style={{fontSize:'12px',color:'#9ca3af',fontStyle:'italic'}}>This fault tree is not used elsewhere in the project.</div>
                            ) : (
                                <div style={{fontSize:'12px',color:'#374151'}}>
                                    Called via Transfer gate from: {whereUsed.map((n,i) => (
                                        <span key={n}><strong style={{fontFamily:'monospace'}}>{n}</strong>{i < whereUsed.length-1 ? ', ' : ''}</span>
                                    ))}
                                </div>
                            )}
                            {/* 4. Basic events */}
                            <div style={sectionHdr}>Basic Events</div>
                            {eventNames.length === 0 ? (
                                <div style={{fontSize:'12px',color:'#9ca3af',fontStyle:'italic'}}>No basic events.</div>
                            ) : (
                                <div style={{maxHeight:'280px',overflowY:'auto',border:'1px solid #e5e7eb',borderRadius:'6px'}}>
                                    {eventNames.map(nm => {
                                        const desc = (project.eventDescriptions && project.eventDescriptions[nm]) || '';
                                        const info = project.eventInfo && project.eventInfo[nm];
                                        const prob = info ? (info.Calc_Prob ?? info.Prob ?? null) : null;
                                        const isFlagModel = info && info.FailureModel === '5';
                                        const flagLabel = isFlagModel ? ({T:'True',F:'False',I:'Ignore'}[info.LogicFlag] || '') : null;
                                        return (
                                            <div key={nm} style={{...rowStyle,padding:'4px 8px'}}>
                                                <span style={nameStyle}>{nm}</span>
                                                <span style={descStyle}>{desc || <span style={{color:'#d1d5db'}}>—</span>}</span>
                                                <span style={probStyle}>
                                                    {isFlagModel ? flagLabel
                                                     : prob !== null ? prob.toExponential(3).toUpperCase()
                                                     : <span style={{color:'#d1d5db'}}>—</span>}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="px-5 py-3 border-t flex justify-end" style={{flexShrink:0}}>
                            <button onClick={onClose} className="px-4 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm">Close</button>
                        </div>
                    </div>
                </div>
            );
        }

        function AddNodeModal({ mode, targetNodeName, onConfirm, onClose, project }) {
            const isEvent = mode === 'event';
            const isFT = mode === 'ft';
            const [name, setName] = React.useState('');
            const [description, setDescription] = React.useState('');
            const [probability, setProbability] = React.useState('');
            const [gateType, setGateType] = React.useState('OR');
            const [votingN, setVotingN] = React.useState(1);
            // Model detail state
            const [notesOpen, setNotesOpen] = React.useState(false);
            const [modelOpen, setModelOpen] = React.useState(false);
            const [notes, setNotes] = React.useState('');
            const [failureModel, setFailureModel] = React.useState('0');
            const [distribution, setDistribution] = React.useState('point');
            const [distAlpha, setDistAlpha] = React.useState('');
            const [distEF, setDistEF] = React.useState('');
            const [demandProb, setDemandProb] = React.useState('');
            const [demandN, setDemandN] = React.useState('1');
            const [lambda, setLambda] = React.useState('');
            const [missionTime, setMissionTime] = React.useState('');
            const [inspInterval, setInspInterval] = React.useState('');
            const [tauRepair, setTauRepair] = React.useState('');
            const [logicFlag, setLogicFlag] = React.useState('T');

            const title = isFT ? 'New Fault Tree' : isEvent ? 'New Basic Event' : 'New Gate';

            // Collect all names in the project
            const _projectNames = React.useMemo(() => {
                const gates = new Set(), events = new Set();
                const walk = (node) => {
                    if (!node) return;
                    if (node.type === 'EVENT') events.add(node.name);
                    else gates.add(node.name);
                    (node.children || []).forEach(walk);
                };
                (project?.faultTrees || []).forEach(t => walk(t.rootNode));
                return { gates, events, all: new Set([...gates, ...events]) };
            }, [project]);

            const _trimmedName = name.trim().toUpperCase();
            const _nameEmpty = _trimmedName.length === 0;
            const _crossConflict = !_nameEmpty && (
                (isEvent  && _projectNames.gates.has(_trimmedName))  ? 'gate' :
                (!isEvent && _projectNames.events.has(_trimmedName)) ? 'basic event' :
                null
            );
            const _sameTypeConflict = !_nameEmpty && !_crossConflict && _projectNames.all.has(_trimmedName);
            const canSubmit = !_nameEmpty && !_crossConflict;

            // Compute probability for FM 1/2/3/4
            const _fm = failureModel;
            const _isCalc = _fm === '1' || _fm === '2' || _fm === '3' || _fm === '4' || _fm === '5';
            const _lam = parseFloat(lambda) || 0;
            const _mt  = parseFloat(missionTime) || 0;
            const _ii  = parseFloat(inspInterval) || 0;
            const _tau = parseFloat(tauRepair) || 0;
            const _dp  = parseFloat(demandProb);
            const _dN  = parseFloat(demandN) || 1;
            let _calcP = null;
            if (_fm === '1' && !isNaN(_dp) && _dp >= 0 && _dN >= 1) {
                _calcP = 1 - Math.pow(1 - _dp, _dN);
            } else if (_fm === '2' && _lam > 0 && _mt > 0) {
                _calcP = 1 - Math.exp(-_lam * _mt);
            } else if (_fm === '3' && _lam > 0 && _ii > 0) {
                const _li = _lam * _ii;
                _calcP = 1 + (Math.exp(-_li) - 1) / _li;
            } else if (_fm === '4' && _lam > 0 && _mt > 0 && _tau > 0) {
                _calcP = (_lam*_tau)*(1-Math.exp(-(_lam+_tau)*_mt))/(1+_lam*_tau);
            }
            const _computedProbStr = (_isCalc && _calcP !== null && !isNaN(_calcP))
                ? _calcP.toExponential(3).toUpperCase() : '';
            const _effectiveProbStr = _isCalc ? _computedProbStr : probability;

            // Derived distribution params
            const meanVal = parseFloat(_effectiveProbStr) || 0;
            const al = parseFloat(distAlpha) || 0;
            const betaDerived = (distribution==='beta' && al>0 && meanVal>0 && meanVal<1)
                ? (al*(1-meanVal)/meanVal).toExponential(3).toUpperCase() : '';
            const gammaDerived = (distribution==='gamma' && al>0 && meanVal>0)
                ? (meanVal/al).toExponential(3) : '';

            const handleConfirm = () => {
                if (!canSubmit) return;
                onConfirm({
                    name: name.trim(), description, gateType, votingN,
                    probability: _effectiveProbStr || probability,
                    logicFlag,
                    notes,
                    failureModel, distribution, distAlpha, distEF,
                    demandProb, demandN,
                    lambda, missionTime, inspInterval, tauRepair,
                });
                onClose();
            };

            const sel = {width:'100%',border:'1px solid #c4b5fd',borderRadius:'4px',padding:'3px 5px',fontSize:'11px',background:'white',cursor:'pointer'};
            const inp = {width:'100%',border:'1px solid #c4b5fd',borderRadius:'4px',padding:'3px 6px',fontSize:'11px',fontFamily:'monospace',MozAppearance:'textfield',appearance:'textfield'};
            const ro  = {border:'1px solid #e9d5ff',borderRadius:'4px',padding:'3px 6px',fontSize:'11px',fontFamily:'monospace',background:'#f5f3ff',color:'#7c3aed',minHeight:'22px'};

            return (
                <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center" onMouseDown={onClose}>
                    <div className="bg-white rounded-xl shadow-2xl overflow-hidden" style={{width:'380px',maxHeight:'92vh',display:'flex',flexDirection:'column'}} onMouseDown={e => e.stopPropagation()}>
                        {/* Header */}
                        <div className={`flex items-center justify-between px-4 py-3 ${isFT ? 'bg-purple-600' : isEvent ? 'bg-emerald-600' : 'bg-blue-600'} text-white`} style={{flexShrink:0}}>
                            <span className="font-semibold text-sm">{title}</span>
                            {targetNodeName && <span className="text-xs opacity-75">at "{targetNodeName}"</span>}
                            <button onClick={onClose} className="text-white opacity-70 hover:opacity-100 text-xl leading-none ml-2">&times;</button>
                        </div>
                        {/* Fields */}
                        <div className="px-4 pt-4 pb-2 space-y-3" style={{overflowY:'auto',flex:1}}>
                            {/* Name */}
                            <div>
                                <label className="block text-xs font-semibold text-gray-500 mb-1">Name *</label>
                                <input
                                    autoFocus
                                    className={`w-full border rounded-lg px-2.5 py-1.5 text-sm font-mono focus:outline-none focus:ring-1 ${_crossConflict ? 'border-red-400 focus:ring-red-400' : _sameTypeConflict ? 'border-yellow-400 focus:ring-yellow-400' : 'border-gray-300 focus:ring-blue-400 focus:border-blue-400'}`}
                                    placeholder={isEvent ? 'e.g. PUMP-FAIL' : 'e.g. TOP-GATE'}
                                    value={name}
                                    onChange={e => setName(e.target.value)}
                                    onKeyDown={e => { if (e.key === 'Enter' && canSubmit) handleConfirm(); if (e.key === 'Escape') onClose(); }}
                                />
                                {_crossConflict && (
                                    <p className="text-xs text-red-600 mt-1 font-medium">
                                        &#x26D4; "{_trimmedName}" is already used as a {_crossConflict}. A name cannot be shared between a basic event and a gate.
                                    </p>
                                )}
                                {_sameTypeConflict && !_crossConflict && (
                                    <p className="text-xs text-yellow-700 mt-1 font-medium">
                                        &#x26A0; "{_trimmedName}" already exists &mdash; adding will create a shared {isEvent ? 'basic event' : 'gate'}.
                                    </p>
                                )}
                            </div>
                            {/* Gate type (non-event) */}
                            {!isEvent && (
                                <div>
                                    <label className="block text-xs font-semibold text-gray-500 mb-1">Gate Type</label>
                                    <div className="flex flex-wrap gap-1">
                                        {[
                                            { label: 'OR', internal: 'OR' }, { label: 'AND', internal: 'AND' },
                                            { label: 'NOT OR', internal: 'NOT' }, { label: 'NOT AND', internal: 'NAND' },
                                            { label: 'N-of-M', internal: 'VOTING' }, { label: 'Transfer', internal: 'TRAN' },
                                        ].map(({ label, internal }) => (
                                            <button key={internal} onClick={() => setGateType(internal)}
                                                className={`px-2 py-1 text-xs rounded-md font-bold border ${gateType === internal ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}
                                            >{label}</button>
                                        ))}
                                    </div>
                                    {gateType === 'VOTING' && (
                                        <div className="flex items-center gap-2 mt-1.5">
                                            <span className="text-xs text-gray-500">N (votes required):</span>
                                            <input type="number" min="1"
                                                className="w-16 border border-gray-300 rounded px-1.5 py-0.5 text-xs font-mono focus:outline-none focus:ring-1 focus:ring-blue-400"
                                                value={votingN}
                                                onChange={e => setVotingN(Math.max(1, parseInt(e.target.value) || 1))}
                                            />
                                            <span className="text-xs text-gray-400">(of M inputs)</span>
                                        </div>
                                    )}
                                </div>
                            )}
                            {/* Description */}
                            <div>
                                <label className="block text-xs font-semibold text-gray-500 mb-1">Description</label>
                                <textarea
                                    className="w-full border border-gray-300 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400 resize-none"
                                    rows={2} placeholder="Optional description"
                                    value={description} onChange={e => setDescription(e.target.value)}
                                />
                            </div>
                            {/* BE-only: Mean Probability + Model Detail + Notes */}
                            {isEvent && (
                                <div>
                                    <div className="flex items-center justify-between mb-1">
                                        <label className="text-xs font-semibold text-gray-500">Mean Probability</label>
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => setModelOpen(v => !v)}
                                                className="text-xs text-purple-600 hover:text-purple-800"
                                                title={modelOpen ? 'Collapse model detail' : 'Expand model detail'}>
                                                {modelOpen ? '\u25b2' : '\u25bc'} Model Detail
                                            </button>
                                            <button onClick={() => setNotesOpen(v => !v)}
                                                className="text-xs text-blue-500 hover:text-blue-700"
                                                title={notesOpen ? 'Collapse notes' : 'Expand notes'}>
                                                {notesOpen ? '\u25b2' : '\u25bc'} Notes
                                            </button>
                                        </div>
                                    </div>
                                    {/* Probability display / input */}
                                    {_fm === '5' ? (
                                        <div style={{border:'1px solid #d1d5db',borderRadius:'8px',padding:'6px 10px',fontSize:'13px',fontFamily:'monospace',background:'#f3f4f6',color:'#374151',fontWeight:'700'}}>
                                            {({T:'TRUE',F:'FALSE',I:'IGNORE'})[logicFlag]||'TRUE'}
                                        </div>
                                    ) : _isCalc ? (
                                        <div style={{border:'1px solid #e9d5ff',borderRadius:'8px',padding:'6px 10px',fontSize:'13px',fontFamily:'monospace',background:'#f5f3ff',color:'#7c3aed'}}>
                                            {_computedProbStr || <span style={{color:'#9ca3af',fontStyle:'italic'}}>set parameters below</span>}
                                        </div>

                                        <input
                                            className="w-full border border-gray-300 rounded-lg px-2.5 py-1.5 text-sm font-mono focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400"
                                            placeholder="e.g. 1.5E-3"
                                            value={probability}
                                            onChange={e => setProbability(e.target.value)}
                                            onBlur={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) setProbability(v.toExponential(3).toUpperCase()); }}
                                            onKeyDown={e => { if (e.key === 'Enter' && canSubmit) handleConfirm(); if (e.key === 'Escape') onClose(); }}
                                        />
                                    ) }
                                    {/* Notes */}
                                    {notesOpen && (
                                        <textarea
                                            className="w-full mt-1.5 border border-gray-300 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400 resize-none"
                                            rows={3} placeholder="Notes (basis, source, uncertainty...)"
                                            value={notes} onChange={e => setNotes(e.target.value)}
                                        />
                                    )}

                // Settings Modal Component
        // Cut Sets Floating Window Component
        function CutSetsFloatingWindow({ 
            cutSetsData,
            stale,
            position, 
            size, 
            minimized,
            onPositionChange, 
            onSizeChange,
            onMinimize,
            onClose,
            onMouseDown,
            eventInfo,
            eventDescriptions,
            treeName,
            settings
        }) {
            const [isResizing, setIsResizing] = React.useState(false);
            const [resizeStart, setResizeStart] = React.useState({ x: 0, y: 0, width: 0, height: 0 });
            const [highlightedEvent, setHighlightedEvent] = React.useState(null);

            // Check and adjust position to keep window in viewport
            React.useEffect(() => {
                const adjustedY = Math.max(20, position.y); // Ensure at least 20px from top
                if (adjustedY !== position.y) {
                    onPositionChange({ ...position, y: adjustedY });
                }
            }, [position.y]);

            const handleResizeStart = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsResizing(true);
                setResizeStart({
                    x: e.clientX,
                    y: e.clientY,
                    width: size.width,
                    height: size.height
                });
            };

            React.useEffect(() => {
                if (!isResizing) return;

                const handleMouseMove = (e) => {
                    const deltaX = e.clientX - resizeStart.x;
                    const deltaY = e.clientY - resizeStart.y;
                    const newWidth = Math.max(200, resizeStart.width + deltaX);
                    const newHeight = Math.max(150, resizeStart.height + deltaY);
                    onSizeChange({ width: newWidth, height: newHeight });
                };

                const handleMouseUp = () => {
                    setIsResizing(false);
                };

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isResizing, resizeStart, onSizeChange]);

            if (!cutSetsData || !cutSetsData.cutSets) {
                return null;
            }
            
            // Get font size classes based on settings
            const getFontSizeClasses = () => {
                switch(settings?.fontSize) {
                    case 'small': return { title: 'text-xs', content: 'text-[10px]' };
                    case 'large': return { title: 'text-base', content: 'text-sm' };
                    default: return { title: 'text-sm', content: 'text-xs' }; // medium
                }
            };
            
            const fontSizeClasses = getFontSizeClasses();
            
            // Helper function to calculate cut set probability
            const calculateCutSetProbability = (cutSet) => {
                let probability = 1.0;
                
                for (const event of cutSet) {
                    const info = eventInfo && eventInfo[event.name];
                    if (info && info.Calc_Prob !== undefined) {
                        if (event.complement) {
                            // Complemented event: use (1 - prob)
                            probability *= (1.0 - info.Calc_Prob);
                        } else {
                            // Normal event: use prob
                            probability *= info.Calc_Prob;
                        }
                    } else {
                        // If any event doesn't have probability, return null
                        return null;
                    }
                }
                
                return probability;
            };
            
            // Helper function to calculate fault tree probability
            const calculateFaultTreeProbability = () => {
                let ftProb = 1.0;
                
                for (const cutSet of cutSetsData.cutSets) {
                    const csProb = calculateCutSetProbability(cutSet);
                    if (csProb === null) {
                        // If any cut set can't be calculated, return null
                        return null;
                    }
                    ftProb *= (1.0 - csProb);
                }
                
                return 1.0 - ftProb;
            };
            
            // Format probability using the showProbability setting (same as canvas/legend)
            const formatProbability = (prob, digitsOverride) => {
                if (prob === null || prob === undefined) return 'N/A';
                if (prob === 0) return '0';
                const digits = digitsOverride || settings?.showProbability || '2';
                if (digits === 'hide') return '?';
                const exp = Math.floor(Math.log10(Math.abs(prob)));
                const man = prob / Math.pow(10, exp);
                if (digits === '0') return `${Math.round(man)}E${exp >= 0 ? '+' : ''}${exp}`;
                if (digits === '1') return `${man.toFixed(1)}E${exp >= 0 ? '+' : ''}${exp}`;
                return `${man.toFixed(2)}E${exp >= 0 ? '+' : ''}${exp}`;
            };
            
            // Helper function to get event tooltip
            const getEventTooltip = (eventName) => {
                const info = eventInfo && eventInfo[eventName];
                const description = eventDescriptions && eventDescriptions[eventName];
                
                if (!info && !description) return eventName;
                
                const parts = [];
                
                // Add description first if available
                if (description) {
                    parts.push(description);
                }
                
                // BEI file has Calc_Prob field
                if (info && info.Calc_Prob !== undefined && info.Calc_Prob !== 0) {
                    parts.push(`Probability: ${formatProbability(info.Calc_Prob)}`);
                }
                // Could also show other useful info
                if (info && info.Lambda !== undefined && info.Lambda !== 0) {
                    parts.push(`Lambda: ${info.Lambda.toExponential(2)}`);
                }
                if (info && info.Mission !== undefined && info.Mission !== 0) {
                    parts.push(`Mission Time: ${info.Mission}`);
                }
                
                return parts.length > 0 ? parts.join('\n') : eventName;
            };
            
            // Helper function to toggle event highlighting
            const handleEventClick = (eventName) => {
                if (highlightedEvent === eventName) {
                    setHighlightedEvent(null); // Deselect if already selected
                } else {
                    setHighlightedEvent(eventName); // Select new event
                }
            };
            
            // Helper function to get event color classes
            const getEventColorClasses = (event) => {
                if (highlightedEvent === event.name) {
                    // Highlighted event - use bright yellow/gold
                    return 'bg-yellow-300 text-yellow-900 ring-2 ring-yellow-500';
                } else if (event.complement) {
                    // Complemented event - red
                    return 'bg-red-100 text-red-700';
                } else {
                    // Normal event - blue
                    return 'bg-blue-100 text-blue-700';
                }
            };
            
            // Sort cut sets by probability (highest first)
            const sortedCutSets = React.useMemo(() => {
                const cutSetsWithProb = cutSetsData.cutSets.map((cutSet, originalIndex) => ({
                    cutSet,
                    probability: calculateCutSetProbability(cutSet),
                    originalIndex
                }));
                
                // Sort by probability (highest first), null probabilities go to end
                cutSetsWithProb.sort((a, b) => {
                    if (a.probability === null && b.probability === null) return 0;
                    if (a.probability === null) return 1;
                    if (b.probability === null) return -1;
                    return b.probability - a.probability; // Descending order
                });
                
                return cutSetsWithProb;
            }, [cutSetsData.cutSets, eventInfo]);
            
            // Calculate fault tree probability for title
            const faultTreeProb = calculateFaultTreeProbability();
            const titleText = `Cut Sets from ${treeName} [${settings.showProbability === 'hide' ? 'P=?' : formatProbability(faultTreeProb, settings.showProbability)}]`;

            return (
                <div
                    style={{
                        position: 'fixed',
                        left: `${position.x}px`,
                        top: `${position.y}px`,
                        width: `${size.width}px`,
                        height: minimized ? 'auto' : `${size.height}px`,
                        zIndex: 1000
                    }}
                    className="bg-white rounded shadow-2xl border-2 border-gray-300 flex flex-col"
                >
                    {/* Title Bar */}
                    <div
                        onMouseDown={onMouseDown}
                        className={`bg-blue-600 text-white px-2 py-1 rounded-t cursor-move flex items-center justify-between ${fontSizeClasses.title} font-semibold select-none`}
                        title={titleText}
                    >
                        <span className="truncate">{titleText}</span>
                        <div className="flex gap-1 flex-shrink-0">
                            <button
                                onClick={(e) => {
                                    e.stopPropagation();
                                    onMinimize();
                                }}
                                className="hover:bg-blue-700 px-1 rounded"
                                title={minimized ? "Expand" : "Minimize"}
                            >
                                {minimized ? '&#x25A1;' : '_'}
                            </button>
                            <button
                                onClick={(e) => {
                                    e.stopPropagation();
                                    onClose();
                                }}
                                className="hover:bg-blue-700 px-1 rounded"
                                title="Close"
                            >
                                &times;
                            </button>
                        </div>
                    </div>

                    {/* Stale banner */}
                    {stale && !minimized && (
                        <div style={{background:'#fef3c7',borderBottom:'2px solid #f59e0b',padding:'7px 12px',fontSize:'11px',color:'#92400e',fontWeight:'600',display:'flex',alignItems:'center',gap:'6px',flexShrink:0}}>
                            <span>⚠</span>
                            <span>Cut sets need to be regenerated for the modified logic.</span>
                        </div>
                    )}
                    {/* Content */}
                    {!minimized && (
                        <>
                            <div className={`flex-1 overflow-y-auto p-2 ${fontSizeClasses.content}`} style={{opacity: stale ? 0.4 : 1, pointerEvents: stale ? 'none' : 'auto'}}>
                                {sortedCutSets.length === 0 ? (
                                    <div className="text-gray-500 text-center py-4">
                                        0 cut sets
                                    </div>
                                ) : (
                                    <div className="space-y-1">
                                        {sortedCutSets.map(({ cutSet, probability }, index) => {
                                            return (
                                                <div key={index} className="flex items-start gap-1">
                                                    <span className="text-gray-600 font-semibold whitespace-nowrap">
                                                        #{index + 1}
                                                    </span>
                                                    {probability !== null && (
                                                        <span 
                                                            className="px-1 py-0.5 rounded font-medium bg-purple-100 text-purple-700 whitespace-nowrap"
                                                            title={`Cut set probability: ${formatProbability(probability, settings.showProbability)}`}
                                                        >
                                                            {settings.showProbability === 'hide' ? null : formatProbability(probability, settings.showProbability)}
                                                        </span>
                                                    )}
                                                    <div className="flex flex-wrap gap-1 items-center">
                                                        {cutSet.map((event, eventIndex) => (
                                                            <React.Fragment key={eventIndex}>
                                                                <span
                                                                    className={`px-1 py-0.5 rounded font-medium cursor-pointer transition-all ${getEventColorClasses(event)}`}
                                                                    title={getEventTooltip(event.name)}
                                                                    onClick={() => handleEventClick(event.name)}
                                                                >
                                                                    {event.complement && '/'}
                                                                    {event.name}
                                                                </span>
                                                                {eventIndex < cutSet.length - 1 && (
                                                                    <span className="text-gray-400">*</span>
                                                                )}
                                                            </React.Fragment>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            {/* Resize Handle */}
                            <div
                                onMouseDown={handleResizeStart}
                                className="absolute bottom-0 right-0 w-4 h-4 cursor-se-resize"
                                style={{
                                    background: 'linear-gradient(135deg, transparent 50%, #9ca3af 50%)'
                                }}
                            />
                        </>
                    )}
                </div>
            );
        }

        // Basic Event List Floating Window

                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);

                                />

                            {/* List */}

                                {filtered.length === 0 ? (
                                    <div style={{ padding:'16px', textAlign:'center', color:'#9ca3af', fontSize:'12px' }}>
                                        {search ? 'No matches' : 'No basic events found'}

                                ) : filtered.map(ev => (
                                    <div
                                        key={ev.name}
                                        draggable
                                        onDragStart={e => { e.dataTransfer.setData('text/plain', ev.name); e.dataTransfer.effectAllowed='copy'; }}
                                        onClick={() => {
                                            const _ei = (project?.eventInfo || {})[ev.name] || {};
                                            const _fdtMap = {'1':'1','3':'2','7':'3','5':'4'};
                                            const _udtMap = {'L':'lognormal','G':'gamma','B':'beta','O':'cni','N':'point'};
                                            setEditingEvent({
                                                name: ev.name,
                                                description: ev.desc || '',
                                                probability: ev.prob != null ? ev.prob.toExponential(3).toUpperCase() : '',
                                                notes: ev.notes || '',
                                                failureModel: _ei.FailureModel || (_ei.FdT ? (_fdtMap[String(_ei.FdT)] || '0') : '0'),
                                                distribution: _ei.Distribution || (_ei.UdT ? (_udtMap[String(_ei.UdT).toUpperCase()] || 'point') : 'point'),
                                                distAlpha: String(_ei.DistAlpha !== undefined ? _ei.DistAlpha : (_ei.UdValue || '')),
                                                distEF:    String(_ei.DistEF    !== undefined ? _ei.DistEF    : ''),
                                                demandN:   String(_ei.DemandN   !== undefined ? _ei.DemandN   : '1'),
                                                missionTime: String(_ei.MissionTime !== undefined ? _ei.MissionTime : (_ei.Mission || '')),
                                                tauRepair:   String(_ei.TauRepair   !== undefined ? _ei.TauRepair   : (_ei.Tau    || '')),
                                                demandProb:  _ei.DemandProb !== undefined ? String(_ei.DemandProb) : '',
                                                lambda:      _ei.Lambda !== undefined && _ei.Lambda !== 0 ? String(_ei.Lambda) : '',
                                                inspInterval: _ei.InspInterval !== undefined && _ei.InspInterval !== 0 ? String(_ei.InspInterval) : '',
                                                logicFlag:   _ei.LogicFlag || 'T',
                                                _modelOpen: beListToggles._modelOpen,
                                                _notesOpen: beListToggles._notesOpen || !!(ev.notes),
                                                _usedInOpen: beListToggles._usedInOpen,
                                            });
                                        }}
                                        style={{ padding:'5px 8px', borderBottom:'1px solid #f3f4f6', cursor:'pointer', display:'flex', alignItems:'flex-start', gap:'6px' }}
                                        onMouseEnter={e => e.currentTarget.style.background='#ecfdf5'}
                                        onMouseLeave={e => e.currentTarget.style.background=''}
                                        title={`Click to edit ${ev.name}`}
                                    >
                                        <span style={{ fontSize:'9px', color:'#6b7280', marginTop:'3px', flexShrink:0 }}>⚙</span>
                                        <div style={{ flex:1, minWidth:0 }}>

                                            {ev.desc && <div style={{ fontSize:'10px', color:'#6b7280', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{ev.desc}</div>}
                                        </div>
                                        <div style={{ fontSize:'10px', color:'#374151', fontFamily:'monospace', flexShrink:0 }}>{fmtProb(ev.prob)}</div>
                                    </div>
                                ))}
                            </div>
                            {/* Resize handle */}
                            <div
                                onMouseDown={handleResizeStart}
                                style={{ position:'absolute', bottom:0, right:0, width:'14px', height:'14px', cursor:'se-resize',
                                    background:'linear-gradient(135deg,transparent 50%,#9ca3af 50%)', borderRadius:'0 0 8px 0' }}
                            />
                        </>
                    )}

                    {/* Basic event editor — exact same layout as canvas click editor */}
                    {editingEvent && (() => {
                        const fm   = editingEvent.failureModel || '0';
                        const dst  = editingEvent.distribution || 'point';
                        const isCalc = fm === '1' || fm === '2' || fm === '3' || fm === '4';
                        const isFlagModel = fm === '5';
                        const lam  = parseFloat(editingEvent.lambda) || 0;
                        const mt   = parseFloat(editingEvent.missionTime) || 1;
                        const N    = parseInt(editingEvent.demandN) || 1;
                        const dp   = parseFloat(editingEvent.demandProb) || 0;
                        let calcProb = null;
                        if (fm === '1') calcProb = dp;
                        else if (fm === '2') calcProb = 1 - Math.exp(-lam * mt);
                        else if (fm === '3') calcProb = (lam * mt) / (lam * mt + 1);
                        else if (fm === '4') calcProb = N * dp;
                        const dispProb = fm === '0' ? editingEvent.probability
                            : (calcProb !== null ? calcProb.toExponential(3).toUpperCase() : '');
                        const _usedFTs = (project?.faultTrees || []).filter(t => {
                            const _has = (node) => {
                                if (!node) return false;
                                const nm = node.name.startsWith('/') ? node.name.slice(1) : node.name;
                                if (node.type === 'EVENT' && nm === editingEvent.name) return true;
                                return (node.children || []).some(_has);
                            };
                            return _has(t.rootNode);
                        }).map(t => t.treeName);
                        return (
                        <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center"

                                style={{width:'345px',maxHeight:'calc(100vh - 48px)',display:'flex',flexDirection:'column'}}

                                {/* Header — matches canvas editor style */}
                                <div className="flex items-center justify-between px-4 py-2.5 bg-gray-50 border-b border-gray-200">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-bold px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700">BASIC EVENT</span>

                                            <span className="text-xs font-bold px-2 py-0.5 rounded-full bg-purple-100 text-purple-700">Prob.={dispProb}</span>
                                        )}
                                        {isFlagModel && (
                                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${editingEvent.logicFlag==='T'?'bg-red-100 text-red-700':editingEvent.logicFlag==='F'?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600'}`}>
                                                Flag={editingEvent.logicFlag==='T'?'True':editingEvent.logicFlag==='F'?'False':'Ignore'}

                                        )}
                                    </div>
                                    <button onClick={() => setEditingEvent(null)} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
                                </div>
                                {/* Fields — matches canvas editor layout */}

                                    {/* Description */}

                                    </div>
                                    {/* Probability + toggles */}
                                    <div>
                                        <div className="flex items-center justify-between mb-1">

                                            <div className="flex items-center gap-2">
                                                <button onClick={() => { setEditingEvent(p=>({...p,_modelOpen:!p._modelOpen})); setBeListToggles(t=>({...t,_modelOpen:!editingEvent._modelOpen})); }}

                                                    {editingEvent._modelOpen ? '▲' : '▼'} Model Detail
                                                </button>
                                                <button onClick={() => { setEditingEvent(p=>({...p,_notesOpen:!p._notesOpen})); setBeListToggles(t=>({...t,_notesOpen:!editingEvent._notesOpen})); }}
                                                    className="text-xs text-blue-500 hover:text-blue-700"
                                                    title={editingEvent._notesOpen ? 'Collapse notes' : 'Expand notes'}>
                                                    {editingEvent._notesOpen ? '▲' : '▼'} Notes
                                                </button>
                                                <button onClick={() => { setEditingEvent(p=>({...p,_usedInOpen:!p._usedInOpen})); setBeListToggles(t=>({...t,_usedInOpen:!editingEvent._usedInOpen})); }}
