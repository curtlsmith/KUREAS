        // Main Application Component
        function FaultTreeVisualizer() {
            const [db, setDb] = useState(null);
            const [savedProjects, setSavedProjects] = useState([]);
            const [currentProject, setCurrentProject] = useState(null);
            const [selectedTreeIndex, setSelectedTreeIndex] = useState(0);
            const [editHistory, setEditHistory] = useState([]); // undo stack, up to 50 states
            const [isDirty, setIsDirty] = useState(false); // true when project has unsaved changes
            const [changeLog, setChangeLog] = useState([]); // append-only QA change history

            // Warn before tab/window close when there are unsaved changes
            React.useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (isDirty && currentProject) {
                        e.preventDefault();
                        e.returnValue = ''; // Required for Chrome; triggers browser native dialog
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [isDirty, currentProject]);
            const [showChangeLog, setShowChangeLog] = useState(false);
            const [clipboard, setClipboard] = useState(null); // { node, mode: 'copy'|'cut', sourceTreeIdx, sourceParent }
            const [showBEList, setShowBEList] = useState(false);
            const [beListPosition, setBEListPosition] = useState({ x: 560, y: 100 });
            const [beListSize, setBEListSize] = useState({ width: 280, height: 440 });
            const [beListMinimized, setBEListMinimized] = useState(false);
            const [isDraggingBEList, setIsDraggingBEList] = useState(false);
            const [beListDragOffset, setBeListDragOffset] = useState({ x: 0, y: 0 });
            const [addNodeModal, setAddNodeModal] = useState(null); // { mode: 'gate'|'event'|'ft', targetNodeName, onConfirm }
            const [view, setView] = useState('upload');
            const [error, setError] = useState('');
            const [eventDescriptions, setEventDescriptions] = useState({});
            const [gateDescriptions, setGateDescriptions] = useState({});
            const [eventInfo, setEventInfo] = useState({});
            const [cutSets, setCutSets] = useState({});
            const [staleTreeNames, setStaleTreeNames] = useState(new Set()); // trees whose cut sets need regen
            const [treeMenuIndex, setTreeMenuIndex] = useState(null); // index of tree showing modify menu
            const [sidebarWidth, setSidebarWidth] = useState(240); // px width of FT list sidebar
            const [treeInfoModal, setTreeInfoModal] = useState(null); // tree index for info dialog
            const [autoLoadBED, setAutoLoadBED] = useState(true);
            const [autoLoadGTD, setAutoLoadGTD] = useState(true);
            const [autoLoadBEI, setAutoLoadBEI] = useState(true);
            const [autoLoadFTC, setAutoLoadFTC] = useState(true);
            const [settings, setSettings] = useState(() => SettingsManager.load());
            const [showSettings, setShowSettings] = useState(false);
            const [showExport, setShowExport] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [workingDirectory, setWorkingDirectory] = useState('');
            const [showProjectNameDialog, setShowProjectNameDialog] = useState(false);
            const [showUnsavedDialog, setShowUnsavedDialog] = useState(false);
            const [editProjectName, setEditProjectName] = useState('');
            const [editProjectDescription, setEditProjectDescription] = useState('');
            
            // Cut sets floating window state
            const [cutSetsPosition, setCutSetsPosition] = useState({ x: 280, y: 180 });
            // Dialog size dimensions keyed by settings.dialogSize
            const DIALOG_SIZES = {
                small:  { width: 250, height: 380 },
                medium: { width: 350, height: 490 },
                large:  { width: 450, height: 600 },
            };
            const [cutSetsSize, setCutSetsSize] = useState(() => DIALOG_SIZES[settings.dialogSize] || DIALOG_SIZES.large);
            const [cutSetsMinimized, setCutSetsMinimized] = useState(false);
            const [cutSetsClosed, setCutSetsClosed] = useState(false);
            const [isDraggingCutSets, setIsDraggingCutSets] = useState(false);
            const [isResizingCutSets, setIsResizingCutSets] = useState(false);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

            // ── Change log helper ──────────────────────────────────────────
            const logChange = React.useCallback((action, detail = '') => {
                setChangeLog(prev => [...prev, {
                    id: prev.length + 1,
                    ts: new Date().toISOString(),
                    action,
                    detail,
                    project: currentProject?.projectName || '',
                    tree: currentProject?.faultTrees?.[selectedTreeIndex]?.treeName || '',
                }]);
            }, [currentProject, selectedTreeIndex]);

            // ── BE List floating window drag ───────────────────────────────
            const handleBEListDragStart = React.useCallback((e) => {
                setIsDraggingBEList(true);
                setBeListDragOffset({ x: e.clientX - beListPosition.x, y: e.clientY - beListPosition.y });
            }, [beListPosition]);

            React.useEffect(() => {
                if (!isDraggingBEList) return;
                const onMove = (e) => setBEListPosition({ x: e.clientX - beListDragOffset.x, y: e.clientY - beListDragOffset.y });
                const onUp = () => setIsDraggingBEList(false);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
                return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
            }, [isDraggingBEList, beListDragOffset]);

            // ── Collect all unique BEs across all fault trees ──────────────
            const allBasicEvents = React.useMemo(() => {
                if (!currentProject) return [];
                const seen = new Set();
                const result = [];
                const walk = (node) => {
                    if (!node) return;
                    if (node.type === 'EVENT' && !seen.has(node.name)) {
                        seen.add(node.name);
                        // Skip complemented events (name starts with '/') — the base event is already listed
                        if (!node.name.startsWith('/')) {
                            const info = (currentProject.eventInfo || {})[node.name] || {};
                            result.push({
                                name: node.name,
                                prob: info.Calc_Prob ?? info.Prob ?? null,
                                desc: (currentProject.eventDescriptions || {})[node.name] || '',
                                notes: info.Notes || '',
                            });
                        }
                    }
                    (node.children || []).forEach(walk);
                };
                (currentProject.faultTrees || []).forEach(t => walk(t.rootNode));
                result.sort((a, b) => a.name.localeCompare(b.name));
                return result;
            }, [currentProject]);

            useEffect(() => {
                const initDB = async () => {
                    try {
                        const database = new TreeDB();
                        await database.init();
                        setDb(database);
                        loadSavedProjects(database);
                    } catch (err) {
                        console.error('Database initialization failed:', err);
                        setError('Failed to initialize database. Some features may not work.');
                    }
                };
                initDB();
            }, []);

            // Undo: Ctrl+Z / Cmd+Z — restore previous project state
            React.useEffect(() => {
                const onKeyDown = (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                        e.preventDefault();
                        setEditHistory(prev => {
                            if (prev.length === 0) return prev;
                            setCurrentProject(prev[prev.length - 1]);
                            return prev.slice(0, -1);
                        });
                    }
                };
                window.addEventListener('keydown', onKeyDown);
                return () => window.removeEventListener('keydown', onKeyDown);
            }, []);

            async function loadSavedProjects(database) {
                try {
                    const projects = await database.getAllTrees();
                    setSavedProjects(projects);
                } catch (err) {
                    console.error('Failed to load projects:', err);
                }
            }

            async function handleFileUpload(e) {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                setError('');

                // Helper: read a File as text using Promise
                const readFileAsText = (file) => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => resolve(ev.target.result);
                    reader.onerror = () => reject(new Error('Failed to read ' + file.name));
                    reader.readAsText(file);
                });

                // Check for .KNOW_FTL
                for (let i = 0; i < files.length; i++) {
                    if (files[i].name.toLowerCase().endsWith('.know_ftl')) {
                        try {
                            const text = await readFileAsText(files[i]);
                            const projectData = JSON.parse(text);
                            if (projectData.format === 'KUREAS-FTL') {
                                loadProject(projectData);
                                setWorkingDirectory(files[i].name);
                                return;
                            } else {
                                setError('Invalid .KNOW_FTL file format.');
                                return;
                            }
                        } catch (err) {
                            setError('Error reading .KNOW_FTL file: ' + err.message);
                            return;
                        }
                    }
                }

                // Identify each file by extension (case-insensitive)
                let ftlFile = null, bedFile = null, gtdFile = null, beiFile = null, ftcFile = null;
                for (let i = 0; i < files.length; i++) {
                    const f = files[i];
                    const ext = f.name.toLowerCase().split('.').pop();
                    if (ext === 'ftl' || ext === 'txt') { if (!ftlFile) ftlFile = f; }
                    else if (ext === 'bed') bedFile = f;
                    else if (ext === 'gtd') gtdFile = f;
                    else if (ext === 'bei') beiFile = f;
                    else if (ext === 'ftc') ftcFile = f;
                }

                if (!ftlFile) { setError('No FTL file found in selection.'); return; }

                // If companion files are missing, try to auto-discover them from the same directory
                // using the File System Access API (Chrome/Edge) or by prompting the user.
                const missingExts = [];
                if (!bedFile) missingExts.push('bed');
                if (!gtdFile) missingExts.push('gtd');
                if (!beiFile) missingExts.push('bei');
                if (!ftcFile) missingExts.push('ftc');

                if (missingExts.length > 0 && window.showOpenFilePicker) {
                    // File System Access API available — silently try to read companions
                    // by getting the directory handle from the FTL file's handle if available.
                    // Since we only have a File object (not a FileSystemFileHandle) from <input>,
                    // we cannot get the directory. Instead, show a targeted file picker for companions.
                    const baseName = ftlFile.name.replace(/\.[^.]+$/, '');
                    const missingNames = missingExts.map(ext => baseName + '.' + ext.toUpperCase());
                    const shouldAsk = confirm(
                        'Companion files not selected.\n\n' +
                        'Missing: ' + missingNames.join(', ') + '\n\n' +
                        'Click OK to select them now, or Cancel to load FTL only.'
                    );

                    if (shouldAsk) {
                        try {
                            const handles = await window.showOpenFilePicker({
                                multiple: true,
                                types: [{ description: 'SAPHIRE Companion Files (BED, GTD, BEI, FTC)', accept: { 'text/plain': ['.bed','.gtd','.bei','.ftc','.BED','.GTD','.BEI','.FTC'] } }]
                            });

                            for (const handle of handles) {
                                const f = await handle.getFile();
                                const ext = f.name.toLowerCase().split('.').pop();
                                if (ext === 'bed' && !bedFile) bedFile = f;
                                else if (ext === 'gtd' && !gtdFile) gtdFile = f;
                                else if (ext === 'bei' && !beiFile) beiFile = f;
                                else if (ext === 'ftc' && !ftcFile) ftcFile = f;
                            }
                        } catch (pickErr) {
                            // User cancelled the picker — continue with what we have
                        }
                    }
                } else if (missingExts.length > 0 && !window.showOpenFilePicker) {
                    // Fallback for browsers without File System Access API (Firefox, Safari)
                    // Show a second <input> prompt via a hidden element
                    const baseName = ftlFile.name.replace(/\.[^.]+$/, '');
                    const missingNames = missingExts.map(ext => baseName + '.' + ext.toUpperCase());
                    const shouldAsk = confirm(
                        'Companion files not selected.\n\n' +
                        'Missing: ' + missingNames.join(', ') + '\n\n' +
                        'Click OK to select them now, or Cancel to load FTL only.'
                    );

                    if (shouldAsk) {
                        const companionFiles = await new Promise((resolve) => {
                            const input = document.createElement('input');
                            input.type = 'file';
                            input.multiple = true;
                            input.accept = '.bed,.gtd,.bei,.ftc,.BED,.GTD,.BEI,.FTC';
                            input.onchange = (ev) => resolve(ev.target.files);
                            input.oncancel  = () => resolve(null);
                            input.click();
                        });

                        if (companionFiles) {
                            for (let i = 0; i < companionFiles.length; i++) {
                                const f = companionFiles[i];
                                const ext = f.name.toLowerCase().split('.').pop();
                                if (ext === 'bed' && !bedFile) bedFile = f;
                                else if (ext === 'gtd' && !gtdFile) gtdFile = f;
                                else if (ext === 'bei' && !beiFile) beiFile = f;
                                else if (ext === 'ftc' && !ftcFile) ftcFile = f;
                            }
                        }
                    }
                }

                setWorkingDirectory('Loading: ' + [ftlFile, bedFile, gtdFile, beiFile, ftcFile].filter(Boolean).map(f=>f.name).join(', '));

                try {
                    // Read all files in parallel
                    const [ftlText, bedText, gtdText, beiText, ftcText] = await Promise.all([
                        readFileAsText(ftlFile),
                        bedFile  ? readFileAsText(bedFile)  : Promise.resolve(null),
                        gtdFile  ? readFileAsText(gtdFile)  : Promise.resolve(null),
                        beiFile  ? readFileAsText(beiFile)  : Promise.resolve(null),
                        ftcFile  ? readFileAsText(ftcFile)  : Promise.resolve(null),
                    ]);

                    // Parse FTL
                    const parsed = parseFTLStructure(ftlText);
                    if (!parsed || !parsed.faultTrees || parsed.faultTrees.length === 0) {
                        setError('Invalid FTL file format. Please check the file structure.');
                        return;
                    }

                    // Parse companion files
                    const bedDescriptions = bedText ? parseEventDescriptions(bedText) : {};
                    const gtdDescriptions = gtdText ? parseGateDescriptions(gtdText) : {};
                    const beiInfo         = beiText ? parseBEI(beiText) : {};
                    const ftcData         = ftcText ? parseFTC(ftcText) : {};



                    // Build status line
                    const loadedFiles = [ftlFile.name];
                    if (bedFile) loadedFiles.push(bedFile.name + ' (' + Object.keys(bedDescriptions).length + ' event desc)');
                    if (gtdFile) loadedFiles.push(gtdFile.name + ' (' + Object.keys(gtdDescriptions).length + ' gate desc)');
                    if (beiFile) loadedFiles.push(beiFile.name + ' (' + Object.keys(beiInfo).length + ' event info)');
                    if (ftcFile) loadedFiles.push(ftcFile.name + ' (' + Object.keys(ftcData).length + ' trees w/ cut sets)');
                    setWorkingDirectory(loadedFiles.join(' | '));

                    // Update all state at once
                    setEventDescriptions(bedDescriptions);
                    setGateDescriptions(gtdDescriptions);
                    setEventInfo(beiInfo);
                    setCutSets(ftcData);
                    setStaleTreeNames(prev => { const s = new Set(prev); Object.keys(ftcData).forEach(k => s.delete(k)); return s; });

                    const projectData = {
                        ...parsed,
                        fileName: ftlFile.name,
                        eventDescriptions: bedDescriptions,
                        gateDescriptions: gtdDescriptions,
                        eventInfo: beiInfo,
                        cutSets: ftcData
                    };

                    setCurrentProject(projectData);
                    setSelectedTreeIndex(0);
                    setCutSetsClosed(false);
                    setIsDirty(false);
                    setEditHistory([]);
                    setView('visualize');

                } catch (err) {

                    setError('Error loading files: ' + err.message);
                }
            }

            // Helper shared by all upload handlers
            const readFileText = (file) => new Promise((res, rej) => {
                const r = new FileReader();
                r.onload = e => res(e.target.result);
                r.onerror = () => rej(new Error('Failed to read ' + file.name));
                r.readAsText(file);
            });

            async function handleDescriptionUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const text = await readFileText(file);
                    const descriptions = parseEventDescriptions(text);
                    setEventDescriptions(descriptions);
                    if (currentProject) setCurrentProject(prev => ({...prev, eventDescriptions: descriptions}));
                } catch (err) { setError('Error parsing BED file: ' + err.message); }
            }

            async function handleGateDescriptionUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const text = await readFileText(file);
                    const descriptions = parseGateDescriptions(text);
                    setGateDescriptions(descriptions);
                    if (currentProject) setCurrentProject(prev => ({...prev, gateDescriptions: descriptions}));
                } catch (err) { setError('Error parsing GTD file: ' + err.message); }
            }

            async function handleBEIUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const text = await readFileText(file);
                    const info = parseBEI(text);
                    setEventInfo(info);
                    if (currentProject) setCurrentProject(prev => ({...prev, eventInfo: info}));
                } catch (err) { setError('Error parsing BEI file: ' + err.message); }
            }

            async function handleFTCUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const text = await readFileText(file);
                    const data = parseFTC(text);
                    setCutSets(data);
                    setStaleTreeNames(prev => { const s = new Set(prev); Object.keys(data).forEach(k => s.delete(k)); return s; });
                    if (currentProject) setCurrentProject(prev => ({...prev, cutSets: data}));
                    setCutSetsClosed(false);
                } catch (err) { setError('Error parsing FTC file: ' + err.message); }
            }

            async function handleDeleteProject(id) {
                if (!confirm('Are you sure you want to delete this project?')) return;

                try {
                    await db.deleteTree(id);
                    await loadSavedProjects(db);
                } catch (err) {
                    setError(`Error deleting project: ${err.message}`);
                }
            }

            function loadProject(project) {
                setCurrentProject(project);
                setEventDescriptions(project.eventDescriptions || {});
                setGateDescriptions(project.gateDescriptions || {});
                setEventInfo(project.eventInfo || {});
                setCutSets(project.cutSets || {});
                setStaleTreeNames(new Set());
                setSelectedTreeIndex(0);
                setCutSetsClosed(false);
                setView('visualize');
            }

            // Handle dragging the cut sets window
            React.useEffect(() => {
                if (!isDraggingCutSets) return;

                const handleMouseMove = (e) => {
                    setCutSetsPosition({
                        x: e.clientX - dragOffset.x,
                        y: e.clientY - dragOffset.y
                    });
                };

                const handleMouseUp = () => {
                    setIsDraggingCutSets(false);
                };

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDraggingCutSets, dragOffset]);

            const handleCutSetsDragStart = (e) => {
                setIsDraggingCutSets(true);
                setDragOffset({
                    x: e.clientX - cutSetsPosition.x,
                    y: e.clientY - cutSetsPosition.y
                });
            };

            // Delete a fault tree from the current project
            function handleDeleteTree(index) {
                const tree = currentProject.faultTrees[index];
                if (!confirm(`Delete fault tree "${tree.treeName}"? This cannot be undone.`)) return;
                setEditHistory(h => [...h.slice(-49), currentProject]);
                logChange('Delete fault tree', `Fault tree "${tree.treeName}" deleted from project`);
                setIsDirty(true);
                const updatedTrees = currentProject.faultTrees.filter((_, i) => i !== index);
                const updatedProject = { ...currentProject, faultTrees: updatedTrees };
                // Also remove cut sets for this tree
                if (updatedProject.cutSets && updatedProject.cutSets[tree.treeName]) {
                    const updatedCutSets = { ...updatedProject.cutSets };
                    delete updatedCutSets[tree.treeName];
                    updatedProject.cutSets = updatedCutSets;
                }
                setCurrentProject(updatedProject);
                const newIndex = Math.min(selectedTreeIndex, updatedTrees.length - 1);
                setSelectedTreeIndex(Math.max(0, newIndex));
            }

            // Rename a fault tree
            function handleRenameTree(index) {
                const tree = currentProject.faultTrees[index];
                const newName = prompt('Rename fault tree "' + tree.treeName + '" to:', tree.treeName);
                if (!newName || newName.trim() === '' || newName.trim() === tree.treeName) return;
                const trimmed = newName.trim().toUpperCase().replace(/\s+/g, '_');
                if (currentProject.faultTrees.some((t, i) => i !== index && t.treeName === trimmed)) {
                    alert('A fault tree named "' + trimmed + '" already exists.');
                    return;
                }
                setEditHistory(h => [...h.slice(-49), currentProject]);
                logChange('Rename fault tree', 'Fault tree "' + tree.treeName + '" renamed to "' + trimmed + '"');
                setIsDirty(true);
                setCurrentProject(prev => {
                    const updatedTrees = prev.faultTrees.map((t, i) => {
                        if (i !== index) return t;
                        const updated = { ...t, treeName: trimmed };
                        // Keep top gate name in sync with tree name
                        if (updated.rootNode) updated.rootNode = { ...updated.rootNode, name: trimmed };
                        return updated;
                    });
                    const updatedCutSets = { ...(prev.cutSets || {}) };
                    if (updatedCutSets[tree.treeName]) {
                        updatedCutSets[trimmed] = updatedCutSets[tree.treeName];
                        delete updatedCutSets[tree.treeName];
                    }
                    return { ...prev, faultTrees: updatedTrees, cutSets: updatedCutSets };
                });
                setStaleTreeNames(prev => { const s = new Set(prev); s.delete(tree.treeName); s.add(trimmed); return s; });
                setTreeMenuIndex(null);
            }

            // Copy a fault tree to a new tree
            function handleCopyTree(index) {
                const tree = currentProject.faultTrees[index];
                const newName = prompt('Copy "' + tree.treeName + '" to new tree name:', tree.treeName + '_COPY');
                if (!newName || newName.trim() === '') return;
                const trimmed = newName.trim().toUpperCase().replace(/\s+/g, '_');
                if (currentProject.faultTrees.some(t => t.treeName === trimmed)) {
                    alert('A fault tree named "' + trimmed + '" already exists.');
                    return;
                }
                setEditHistory(h => [...h.slice(-49), currentProject]);
                logChange('Copy fault tree', 'Fault tree "' + tree.treeName + '" copied to "' + trimmed + '"');
                setIsDirty(true);
                setCurrentProject(prev => {
                    const newTree = JSON.parse(JSON.stringify(tree));
                    newTree.treeName = trimmed;
                    // Top gate name must equal the tree name
                    if (newTree.rootNode) newTree.rootNode.name = trimmed;
                    const sorted = [...prev.faultTrees, newTree]
                        .sort((a, b) => a.treeName.localeCompare(b.treeName));
                    return { ...prev, faultTrees: sorted };
                });
                setTreeMenuIndex(null);
            }

            // Save project as .KNOW_FTL JSON file
            function handleSaveKnowFTL() {
                if (!currentProject) return;
                const projectData = {
                    format: 'KUREAS-FTL',
                    version: '1.1',
                    savedAt: new Date().toISOString(),
                    projectName: currentProject.projectName || 'Unnamed Project',
                    projectDescription: currentProject.projectDescription || '',
                    faultTrees: currentProject.faultTrees,
                    eventDescriptions: currentProject.eventDescriptions || {},
                    gateDescriptions: currentProject.gateDescriptions || {},
                    eventInfo: currentProject.eventInfo || {},
                    cutSets: currentProject.cutSets || {}
                };
                const json = JSON.stringify(projectData, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                setIsDirty(false);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const safeName = (currentProject.projectName || 'Project').replace(/[^a-zA-Z0-9_\-]/g, '_');
                a.href = url;
                a.download = `${safeName}.KNOW_FTL`;
                a.click();
                URL.revokeObjectURL(url);
            }

            // Open project name dialog
            function openProjectNameDialog() {
                setEditProjectName(currentProject?.projectName || '');
                setEditProjectDescription(currentProject?.projectDescription || '');
                setShowProjectNameDialog(true);
            }

            // Save project name/description edits
            function saveProjectName() {
                if (!editProjectName.trim()) return;
                setCurrentProject(prev => ({
                    ...prev,
                    projectName: editProjectName.trim(),
                    projectDescription: editProjectDescription.trim()
                }));
                setShowProjectNameDialog(false);
            }

            // Delete a node and its subtree from a fault tree's root node
            function deleteNodeFromTree(rootNode, targetName) {
                if (!rootNode) return null;
                if (rootNode.name === targetName) return null;
                const updated = { ...rootNode };
                if (updated.children) {
                    updated.children = updated.children
                        .filter(c => c.name !== targetName)
                        .map(c => deleteNodeFromTree(c, targetName))
                        .filter(Boolean);
                }
                return updated;
            }

            // Sync dialog size when settings.dialogSize changes
            React.useEffect(() => {
                const sized = DIALOG_SIZES[settings.dialogSize] || DIALOG_SIZES.large;
                setCutSetsSize(sized);
            }, [settings.dialogSize]);

            // Reopen cut sets window when switching trees (if cut sets exist for new tree)
            React.useEffect(() => {
                if (view === 'visualize' && currentProject && currentProject.faultTrees[selectedTreeIndex]) {
                    const treeName = currentProject.faultTrees[selectedTreeIndex].treeName;
                    const cutSetData = currentProject.cutSets && currentProject.cutSets[treeName];
                    
                    if (cutSetData && cutSetData.cutSets) {
                        setCutSetsClosed(false); // Reopen when switching to tree with cut sets
                    }
                }
            }, [selectedTreeIndex, view, currentProject]);

            return (
                <div className="h-screen flex flex-col bg-gray-50">
                    {/* Header with buttons */}
                    <header className="bg-blue-600 text-white p-2 flex items-center justify-between">
                        <div className="flex items-center gap-2 flex-shrink-0">
                            <h1 className="text-lg font-bold"><a href="https://github.com/curtlsmith/KUREAS/tree/main/FTL" target="_blank" rel="noopener noreferrer" style={{color:"white",textDecoration:"underline",textDecorationStyle:"dotted",textUnderlineOffset:"3px"}}>KUREAS-FTL</a></h1>
                        </div>
                        <span className="text-sm opacity-90 flex-1 text-center">v1.1 Knowledgebase with Uncertainty for Risk Engineering Analysis of Systems: <strong>Fault Tree Logic Module</strong></span>
                        <div className="flex gap-2 flex-shrink-0">
                            {view === 'visualize' && currentProject && (
                                <button
                                    onClick={() => {
                                        if (isDirty && currentProject) {
                                            setShowUnsavedDialog(true);
                                        } else {
                                            setView('upload');
                                            setCurrentProject(null);
                                            setSelectedTreeIndex(0);
                                            setIsDirty(false);
                                            setEditHistory([]);
                                        }
                                    }}
                                    className="px-3 py-1 bg-blue-900 text-white text-sm rounded hover:bg-blue-800"
                                    title="Open FTL"
                                >
                                    Open <strong>FTL</strong>
                                </button>
                            )}
                            {view === 'visualize' && currentProject && (
                                <>
                                    <button
                                        onClick={handleSaveKnowFTL}
                                        className="px-3 py-1 bg-blue-900 text-white text-sm rounded hover:bg-blue-800"
                                        title="Save project as .KNOW_FTL file"
                                    >
                                        Save <strong>FTL</strong>
                                    </button>
                                    <button
                                        onClick={() => setShowReport(true)}
                                        className="px-3 py-1 bg-blue-900 text-white text-sm rounded hover:bg-blue-800"
                                        title="Generate Report"
                                    >
                                        Report
                                    </button>

                                    <button
                                        onClick={() => setShowChangeLog(true)}
                                        className="px-3 py-1 bg-blue-900 text-white text-sm rounded hover:bg-blue-800"
                                        title="View change log"
                                    >
                                        View Changes
                                    </button>
                                </>
                            )}
                            {view === 'visualize' && currentProject && (
                                <>
                                <button
                                    onClick={() => setShowExport(true)}
                                    className="p-2 bg-blue-900 text-white rounded hover:bg-blue-800 text-sm"
                                    title="Export fault trees"
                                >
                                    Export
                                </button>
                                <button
                                    onClick={() => setShowSettings(true)}
                                    className="p-2 bg-blue-900 text-white rounded hover:bg-blue-800"
                                    title="Settings"
                                >
                                    <SettingsIcon />
                                </button>
                                </>
                            )}
                        </div>
                    </header>

                    {/* Main Content - No nav bar */}

                    {/* Error Display */}
                    {error && (
                        <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 mx-4 mt-4 rounded">
                            {error}
                        </div>
                    )}

                    {/* Main Content */}
                    <main className="flex-1 overflow-hidden">
                        {view === 'upload' && (
                            <div className="container mx-auto p-8 max-w-4xl">
                                <div className="bg-white rounded-lg shadow-lg p-8">
                                    <h2 className="text-2xl font-bold mb-6">Open Fault Tree and Related File(s)</h2>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-800 mb-1">
                                                KNOW_FTL or SAPHIRE .FTL file
                                            </label>
                                            <input
                                                type="file"
                                                accept=".ftl,.txt,.bed,.gtd,.bei,.ftc,.know_ftl,.KNOW_FTL"
                                                multiple
                                                onChange={handleFileUpload}
                                                className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                                            />
                                            <p className="mt-2 text-sm text-gray-600">
                                                Select the <strong>.KNOW_FTL</strong> project file. If loading SAPHIRE MAR-D files, select the <strong>.FTL</strong> file and companion files (<strong>.BED</strong>, <strong>.GTD</strong>, <strong>.BEI</strong>, <strong>.FTC</strong>) all at the same time.
                                            </p>
                                        </div>

                                        <div style={{borderTop:'1px solid #e5e7eb', paddingTop:'20px', display:'flex', alignItems:'center', gap:'16px'}}>
                                            <span style={{fontSize:'13px', color:'#6b7280', flexShrink:0}}>— or —</span>
                                            <button
                                                onClick={() => {
                                                    const projName = prompt('Project name (leave blank for "New Project"):')?.trim() || 'New Project';
                                                    setCurrentProject({
                                                        projectName: projName.toUpperCase(),
                                                        projectDescription: '',
                                                        faultTrees: [],
                                                        eventDescriptions: {},
                                                        gateDescriptions: {},
                                                        eventInfo: {},
                                                        cutSets: {}
                                                    });
                                                    setEventInfo({});
                                                    setCutSets({});
                                                    setStaleTreeNames(new Set());
                                                    setEditHistory([]);
                                                    setIsDirty(false);
                                                    setView('visualize');
                                                    logChange('New project', `Project "${projName.toUpperCase()}" created from scratch`);
                                                }}
                                                style={{padding:'10px 24px', background:'#7c3aed', color:'white', border:'none', borderRadius:'8px', fontWeight:'600', fontSize:'14px', cursor:'pointer'}}
                                                onMouseEnter={e => e.currentTarget.style.background='#6d28d9'}
                                                onMouseLeave={e => e.currentTarget.style.background='#7c3aed'}
                                            >
                                                ✦ Start New Project
                                            </button>
                                            <span style={{fontSize:'12px', color:'#9ca3af'}}>Begin with a blank project and build fault trees from scratch.</span>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}

                        {view === 'database' && (
                            <div className="container mx-auto p-8">
                                <h2 className="text-2xl font-bold mb-6">Saved Projects</h2>
                                {savedProjects.length === 0 ? (
                                    <div className="bg-white rounded-lg shadow p-8 text-center text-gray-500">
                                        No saved projects. Upload a file to get started.
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {savedProjects.map(project => (
                                            <div key={project.id} className="bg-white rounded-lg shadow-lg p-6 hover:shadow-xl transition-shadow">
                                                <div className="flex justify-between items-start mb-4">
                                                    <h3 className="text-lg font-bold text-gray-800">{project.projectName}</h3>
                                                    <button
                                                        onClick={() => handleDeleteProject(project.id)}
                                                        className="text-red-600 hover:text-red-800"
                                                        title="Delete Project"
                                                    >
                                                        <TrashIcon />
                                                    </button>
                                                </div>
                                                <p className="text-sm text-gray-600 mb-2">File: {project.fileName}</p>
                                                <p className="text-sm text-gray-600 mb-2">
                                                    Trees: {project.faultTrees.length}
                                                </p>
                                                {project.eventDescriptions && Object.keys(project.eventDescriptions).length > 0 && (
                                                    <p className="text-sm text-green-600 mb-2">
                                                        âœ“ {Object.keys(project.eventDescriptions).length} descriptions
                                                    </p>
                                                )}
                                                <p className="text-xs text-gray-500 mb-4">
                                                    {new Date(project.timestamp).toLocaleString()}
                                                </p>
                                                <button
                                                    onClick={() => loadProject(project)}
                                                    className="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700"
                                                >
                                                    Open Project
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'visualize' && currentProject && (
                            <div className="h-full flex">
                                {/* Sidebar (resizable) */}
                                <div className="bg-white flex flex-col relative" style={{width:sidebarWidth+'px',minWidth:'160px',maxWidth:'480px',flexShrink:0}}>
                                {/* Drag-resize handle */}
                                <div
                                    style={{position:'absolute',top:0,right:0,width:'5px',height:'100%',cursor:'col-resize',zIndex:10,background:'transparent'}}
                                    onMouseDown={e => {
                                        e.preventDefault();
                                        const startX = e.clientX;
                                        const startW = sidebarWidth;
                                        const onMove = mv => {
                                            const newW = Math.max(160, Math.min(480, startW + mv.clientX - startX));
                                            setSidebarWidth(newW);
                                        };
                                        const onUp = () => {
                                            window.removeEventListener('mousemove', onMove);
                                            window.removeEventListener('mouseup', onUp);
                                        };
                                        window.addEventListener('mousemove', onMove);
                                        window.addEventListener('mouseup', onUp);
                                    }}
                                />
                                <div className="p-4 flex flex-col flex-1 overflow-y-auto">
                                    <button
                                        onClick={openProjectNameDialog}
                                        className="text-left font-bold text-lg mb-2 hover:text-blue-600 cursor-pointer border-b pb-2 flex items-center gap-1 w-full"
                                        title="Click to edit project name and description"
                                    >
                                        <span>{currentProject.projectName || 'Unnamed Project'}</span>
                                        <span className="text-gray-400 text-sm flex-shrink-0">✎</span>
                                    </button>
                                    <p
                                        className="text-xs text-gray-500 mb-2 italic cursor-pointer hover:text-blue-600 hover:underline"
                                        onClick={openProjectNameDialog}
                                        title="Click to edit project description"
                                    >
                                        {currentProject.projectDescription || <span className="text-gray-300">Click to add description...</span>}
                                    </p>
                                    <p className="text-sm text-gray-600 mb-1">
                                        {currentProject.faultTrees.length} fault tree(s)
                                    </p>
                                    <div style={{display:'flex',gap:'8px',marginBottom:'8px',flexWrap:'wrap'}}>
                                        <button
                                            onClick={() => setCutSetsClosed(v => !v)}
                                            style={{fontSize:'11px',padding:'3px 8px',background: cutSetsClosed ? '#eff6ff' : '#dbeafe',border:'1px solid #bfdbfe',borderRadius:'4px',cursor:'pointer',color:'#1d4ed8',fontWeight:'500'}}
                                            title={cutSetsClosed ? 'Show cut sets window' : 'Hide cut sets window'}
                                        >✦ {cutSetsClosed ? 'Show cut sets' : 'Hide cut sets'}</button>
                                        <button
                                            onClick={() => setShowBEList(v => !v)}
                                            style={{fontSize:'11px',padding:'3px 8px',background: showBEList ? '#d1fae5' : '#ecfdf5',border:'1px solid #a7f3d0',borderRadius:'4px',cursor:'pointer',color:'#065f46',fontWeight:'500'}}
                                            title={showBEList ? 'Hide basic event list' : 'Show basic event list'}
                                        >⚡ {showBEList ? 'Hide basic events' : 'Show basic events'}</button>
                                    </div>

                                    <div className="space-y-2 mt-4">
                                        {currentProject.faultTrees.map((tree, index) => {
                                            // Get font size based on settings
                                            const fontSizeClass = (() => {
                                                switch(settings.fontSize) {
                                                    case 'small': return 'text-xs';
                                                    case 'large': return 'text-base';
                                                    default: return 'text-sm'; // medium
                                                }
                                            })();
                                            
                                            return (
                                                <div key={index} className="flex items-center group"
                                                    draggable
                                                    onDragStart={e => {
                                                        e.dataTransfer.setData('text/plain', `FAULT_TREE:${tree.treeName}`);
                                                        e.dataTransfer.effectAllowed = 'copy';
                                                    }}
                                                >
                                                    <button
                                                        onClick={() => setSelectedTreeIndex(index)}
                                                        className={`flex-1 text-left px-3 py-2 rounded-l ${fontSizeClass} truncate min-w-0 ${
                                                            selectedTreeIndex === index
                                                                ? 'bg-blue-600 text-white'
                                                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                        }`}
                                                        title={tree.treeName + ' — drag onto a gate to insert as a Transfer gate'}
                                                    >
                                                        {(() => {
                                                            const _hasCutSets = !!(currentProject.cutSets && currentProject.cutSets[tree.treeName] && (currentProject.cutSets[tree.treeName].cutSets || []).length > 0);
                                                            const _isStale = staleTreeNames.has(tree.treeName);
                                                            return _hasCutSets && !_isStale
                                                                ? <strong>{tree.treeName}</strong>
                                                                : tree.treeName;
                                                        })()}
                                                    </button>
                                                    {treeMenuIndex === index ? (
                                                        <div className="flex flex-shrink-0">
                                                            <button onClick={() => handleRenameTree(index)}
                                                                className="px-2 py-1 text-xs bg-yellow-100 text-yellow-800 hover:bg-yellow-200 border-l border-gray-300"
                                                                title="Change name">✏️</button>
                                                            <button onClick={() => handleCopyTree(index)}
                                                                className="px-2 py-1 text-xs bg-blue-100 text-blue-700 hover:bg-blue-200 border-l border-gray-300"
                                                                title="Copy to new tree">❐</button>
                                                            <button onClick={() => { handleDeleteTree(index); setTreeMenuIndex(null); }}
                                                                className="px-2 py-1 text-xs bg-red-100 text-red-600 hover:bg-red-200 border-l border-gray-300"
                                                                title="Delete tree">🗑</button>
                                                            <button onClick={() => { setTreeInfoModal(index); setTreeMenuIndex(null); }}
                                                                className="px-2 py-1 text-xs bg-emerald-100 text-emerald-700 hover:bg-emerald-200 border-l border-gray-300"
                                                                title="Information">ℹ️</button>
                                                            <button onClick={() => setTreeMenuIndex(null)}
                                                                className="px-2 py-1 rounded-r text-xs bg-gray-200 text-gray-500 hover:bg-gray-300 border-l border-gray-300"
                                                                title="Cancel">×</button>
                                                        </div>
                                                    ) : (
                                                        <button
                                                            onClick={() => setTreeMenuIndex(index)}
                                                            className={`px-2 py-2 rounded-r text-xs ${
                                                                selectedTreeIndex === index
                                                                    ? 'bg-blue-700 text-white hover:bg-blue-800'
                                                                    : 'bg-gray-100 text-gray-400 hover:bg-gray-300'
                                                            } opacity-0 group-hover:opacity-100 transition-opacity`}
                                                            title={`Modify fault tree "${tree.treeName}"`}
                                                        >⋯</button>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>{/* inner p-4 */}
                                </div>{/* sidebar */}

                                {/* Canvas Area */}
                                <div className="flex-1 h-full overflow-hidden">
                                    <TreeCanvas
                                        tree={currentProject.faultTrees[selectedTreeIndex]}
                                        treeIndex={selectedTreeIndex}
                                        eventDescriptions={currentProject.eventDescriptions || {}}
                                        gateDescriptions={currentProject.gateDescriptions || {}}
                                        eventInfo={currentProject.eventInfo || {}}
                                        project={currentProject}
                                        settings={settings}
                                        onDeleteNode={(nodeName) => {
                                            const treeIndex = selectedTreeIndex;
                                            const currentTree = currentProject.faultTrees[treeIndex];
                                            const isDeletingRoot = currentTree && currentTree.rootNode && currentTree.rootNode.name === nodeName;
                                            if (isDeletingRoot) {
                                                if (!confirm(`"${nodeName}" is the root gate of this fault tree.\nDeleting it will remove the entire fault tree.\n\nContinue? (Ctrl+Z to undo)`)) return;
                                            }
                                            setEditHistory(h => [...h.slice(-49), currentProject]);
                                            const _delTree = currentProject.faultTrees[selectedTreeIndex];
                                            const _findDelNode = (nd, nm) => { if (!nd) return null; if (nd.name === nm) return nd; for (const c of (nd.children||[])) { const f=_findDelNode(c,nm); if(f) return f; } return null; };
                                            const _delNode = _findDelNode(_delTree?.rootNode, nodeName);
                                            const _delType = _delNode?.type === 'EVENT' ? 'Basic event' : 'Gate';
                                            const _delTreeName = _delTree?.treeName || 'unknown tree';
                                            logChange('Delete node', `${_delType} "${nodeName}" deleted from fault tree "${_delTreeName}"`);
                                            setIsDirty(true);
                                            setStaleTreeNames(prev => { const s=new Set(prev); s.add(_delTreeName); return s; });
                                            setCurrentProject(prev => {
                                                const updatedTrees = prev.faultTrees.map((t, i) => {
                                                    if (i !== treeIndex) return t;
                                                    const updatedRoot = deleteNodeFromTree(t.rootNode, nodeName);
                                                    return { ...t, rootNode: updatedRoot };
                                                }).filter(t => t.rootNode !== null);
                                                const newIndex = Math.min(treeIndex, Math.max(0, updatedTrees.length - 1));
                                                // selectedTreeIndex will be corrected by the effect below
                                                return { ...prev, faultTrees: updatedTrees };
                                            });
                                            // Adjust selectedTreeIndex if needed
                                            if (isDeletingRoot) {
                                                setSelectedTreeIndex(prev => Math.max(0, Math.min(prev, currentProject.faultTrees.length - 2)));
                                            }
                                        }}
                                        onUndo={() => {
                                            if (editHistory.length === 0) return;
                                            setCurrentProject(editHistory[editHistory.length - 1]);
                                            setEditHistory(h => h.slice(0, -1));
                                        }}
                                        canUndo={editHistory.length > 0}
                                        onAddGate={() => {
                                            setAddNodeModal({ mode: 'ft', targetNodeName: null, onConfirm: ({ name, gateType }) => {
                                                const n = name.trim().toUpperCase();
                                                setEditHistory(h => [...h.slice(-49), currentProject]);
                                                logChange('Add fault tree', `New fault tree "${n}" created`);
                                                setIsDirty(true);
                                                setCurrentProject(prev => {
                                                    const newTree = {
                                                        treeName: n, projectName: prev.projectName,
                                                        rootNode: { name: n, type: gateType || 'OR', children: [], ...(gateType === 'VOTING' ? { votingN: votingN || 1 } : {}) }
