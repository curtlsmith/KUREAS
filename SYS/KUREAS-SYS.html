                                <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Export Format</div>
                                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                                    {Object.entries(FORMAT_INFO).map(([key, info]) => (
                                        <label key={key} style={{display:'flex',alignItems:'flex-start',gap:'10px',padding:'10px 12px',border:`2px solid ${format===key ? info.color : '#e5e7eb'}`,borderRadius:'8px',cursor:'pointer',background: format===key ? '#eff6ff' : 'white',transition:'all 0.15s'}}>
                                            <input type="radio" name="exportFmt" value={key} checked={format===key} onChange={() => setFormat(key)} style={{marginTop:'2px',accentColor:info.color}}/>
                                            <div>
                                                <div style={{fontSize:'13px',fontWeight:'600',color: format===key ? info.color : '#374151'}}>{info.label}</div>
                                                <div style={{fontSize:'11px',color:'#6b7280',marginTop:'2px',lineHeight:'1.4'}}>{info.desc}</div>
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Component selection — not applicable for KNOW_FTL */}
                            {format !== 'knowFTL' ? (
                            <div>
                                <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.05em',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span>Components to Export</span>
                                    <button onClick={toggleAll} style={{fontSize:'10px',color:'#0891b2',background:'none',border:'none',cursor:'pointer',fontWeight:'600'}}>
                                        {selectedSSCs.size === allSSCs.length ? 'Deselect All' : 'Select All'}
                                    </button>
                                </div>
                                <div style={{maxHeight:'220px',overflowY:'auto',border:'1px solid #e5e7eb',borderRadius:'8px'}}>
                                    {allSSCs.length === 0 ? (
                                        <div style={{padding:'16px',textAlign:'center',color:'#9ca3af',fontSize:'12px'}}>No components in this system</div>
                                    ) : allSSCs.map((ssc, idx) => (
                                        <label key={idx} style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 12px',borderBottom: idx<allSSCs.length-1 ? '1px solid #f3f4f6':'none',cursor:'pointer',background: selectedSSCs.has(idx) ? '#eff6ff' : 'white'}}>
                                            <input type="checkbox" checked={selectedSSCs.has(idx)} onChange={() => toggleSSC(idx)} style={{accentColor:'#1e3a8a'}}/>
                                            <div style={{flex:1,minWidth:0}}>
                                                <div style={{fontSize:'12px',fontFamily:'monospace',fontWeight:'600',color:'#374151',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ssc.name}</div>
                                                {ssc.label && <div style={{fontSize:'10px',color:'#9ca3af'}}>{ssc.sscType ? `${ssc.sscType} \u2013 ` : ''}{ssc.label}</div>}
                                            </div>
                                            <span style={{fontSize:'10px',color:'#9ca3af',flexShrink:0}}>
                                                {(ssc.failureModes||[]).filter(fm=>fm.applicable!==false).length} FM{(ssc.failureModes||[]).filter(fm=>fm.applicable!==false).length!==1?'s':''}
                                            </span>
                                        </label>
                                    ))}
                                </div>
                                <div style={{fontSize:'11px',color:'#6b7280',marginTop:'5px'}}>{selectedSSCs.size} of {allSSCs.length} component{allSSCs.length!==1?'s':''} selected</div>
                            </div>
                            ) : (
                            <div style={{padding:'14px 16px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px',fontSize:'12px',color:'#166534'}}>
                                <strong>&#x2139;&#xFE0F; Whole-system export</strong> — The KUREAS-FTL file is built from the complete system fault tree and includes all basic events derived from the SYSTEM WORKS expression. The component selection above does not apply.
                            </div>
                            )}
                        </div>

                        {/* Footer */}
                        <div style={{borderTop:'1px solid #e5e7eb',padding:'12px 20px',display:'flex',justifyContent:'flex-end',gap:'8px',flexShrink:0}}>
                            <button onClick={onClose} style={{padding:'8px 18px',background:'#f3f4f6',border:'1px solid #d1d5db',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#374151'}}>Cancel</button>
                            <button onClick={handleExport} style={{padding:'8px 20px',background:'#1e3a8a',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'700',color:'white'}}>
                                &#x2193; Export {selectedSSCs.size > 0 ? `(${selectedSSCs.size})` : ''}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ReportModal({ onClose, backgroundStyle, systemName, systemDescription, systemLogic, sscsInSystem, superComponents, hasFailureInfo, parseSystemWorksExpression, generateMinimalCutSets, calculateCutSetProbability, calculateMCUB, settings }) {
            const [fileFormat, setFileFormat] = useState(() => {
                return localStorage.getItem('KUREAS_SYS_reportFormat') || 'word';
            });
            const [previewHTML, setPreviewHTML] = useState('');
            const [showHTMLPreview, setShowHTMLPreview] = useState(false);
            // Initialize fileName based on systemName
            const [fileName, setFileName] = useState(() => {
                if (systemName && systemName !== 'System_Name') {
                    return systemName.replace(/\s+/g, '_') + '_Report';
                }
                return localStorage.getItem('KUREAS_SYS_reportFileName') || 'system_report';
            });
            const [limitCutSets, setLimitCutSets] = useState(() => {
                return parseInt(localStorage.getItem('KUREAS_SYS_reportCutSetsLimit')) || 100;
            });
            const [showDateTime, setShowDateTime] = useState(() => {
                const saved = localStorage.getItem('KUREAS_SYS_reportShowDateTime');
                return saved === null ? true : saved === 'true';
            });
            
            // Update fileName when systemName changes
            useEffect(() => {
                if (systemName && systemName !== 'System_Name') {
                    setFileName(systemName.replace(/\s+/g, '_') + '_Report');
                }
            }, [systemName]);
            
            const defaultContentItems = [
                { id: 'systemName', label: 'System Name', enabled: true },
                { id: 'extendedDesc', label: 'Extended Description', enabled: true },
                { id: 'sscInfo', label: 'SSC Information', enabled: true },
                { id: 'fmeaInfo', label: 'FMEA Information', enabled: true },
                { id: 'systemWorks', label: 'System Works Expression', enabled: true },
                { id: 'supercomp', label: 'Supercomponent Information', enabled: true },
                { id: 'ftLogic', label: 'Fault Tree Logic', enabled: true },
                { id: 'ftGraphic', label: 'Fault Tree Graphics', enabled: true },
                { id: 'ftCutSets', label: 'Fault Tree Cut Sets', enabled: true },
                { id: 'impGraphic', label: 'Importance Measure Graphic', enabled: true },
                { id: 'impTable', label: 'Importance Measure Table', enabled: true }
            ];
            
            const [contentItems, setContentItems] = useState(() => {
                const saved = localStorage.getItem('KUREAS_SYS_reportContentItems');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        // Merge: keep saved items order/enabled state, add any new default items
                        const savedIds = new Set(parsed.map(item => item.id));
                        const newItems = defaultContentItems.filter(item => !savedIds.has(item.id));
                        // Also remove any old items that no longer exist (like 'fmea')
                        const validIds = new Set(defaultContentItems.map(item => item.id));
                        const filteredSaved = parsed.filter(item => validIds.has(item.id));
                        // Insert new items after sscInfo if fmeaInfo is new
                        if (newItems.length > 0) {
                            const sscInfoIndex = filteredSaved.findIndex(item => item.id === 'sscInfo');
                            if (sscInfoIndex >= 0) {
                                filteredSaved.splice(sscInfoIndex + 1, 0, ...newItems);
                            } else {
                                filteredSaved.push(...newItems);
                            }
                        }
                        return filteredSaved;
                    } catch (e) {
                        return defaultContentItems;
                    }
                }
                return defaultContentItems;
            });
            
            // Save settings to localStorage when they change
            useEffect(() => {
                localStorage.setItem('KUREAS_SYS_reportFormat', fileFormat);
            }, [fileFormat]);
            
            useEffect(() => {
                localStorage.setItem('KUREAS_SYS_reportFileName', fileName);
            }, [fileName]);
            
            useEffect(() => {
                localStorage.setItem('KUREAS_SYS_reportCutSetsLimit', limitCutSets.toString());
            }, [limitCutSets]);
            
            useEffect(() => {
                localStorage.setItem('KUREAS_SYS_reportShowDateTime', showDateTime.toString());
            }, [showDateTime]);
            
            useEffect(() => {
                localStorage.setItem('KUREAS_SYS_reportContentItems', JSON.stringify(contentItems));
            }, [contentItems]);
            
            const moveItem = (index, direction) => {
                if (direction === 'up' && index > 0) {
                    const newItems = [...contentItems];
                    [newItems[index - 1], newItems[index]] = [newItems[index], newItems[index - 1]];
                    setContentItems(newItems);
                } else if (direction === 'down' && index < contentItems.length - 1) {
                    const newItems = [...contentItems];
                    [newItems[index], newItems[index + 1]] = [newItems[index + 1], newItems[index]];
                    setContentItems(newItems);
                }
            };
            
            const toggleItem = (index) => {
                const newItems = [...contentItems];
                newItems[index].enabled = !newItems[index].enabled;
                setContentItems(newItems);
            };
            
            // Build basic event data from SSCs (same logic as FailureAnalysisModal)
            const basicEventData = React.useMemo(() => {
                const data = {};
                
                // Helper to get probability from a failure mode
                const getFailureModeProbability = (fm) => {
                    // Handle linked system - return special marker
                    if (fm.probabilityType === 'linkedSystem') {
                        return { prob: null, isLinked: true, linkedSystemName: fm.linkedSystemName || fm.linkedSystemFile };
                    }
                    
                    // Handle qualitative - get probability from settings based on level
                    if (fm.probabilityType === 'qualitative') {
                        const level = fm.qualitativeLevel || 'medium';
                        let probStr;
                        switch(level) {
                            case 'low': probStr = settings?.qualitativeProbLow || '1E-5'; break;
                            case 'medium': probStr = settings?.qualitativeProbMedium || '1E-3'; break;
                            case 'high': probStr = settings?.qualitativeProbHigh || '1E-1'; break;
                            default: probStr = settings?.qualitativeProbMedium || '1E-3';
                        }
                        return { prob: parseFloat(probStr), isLinked: false };
                    }
                    
                    // Handle screened - skip
                    if (fm.probabilityType === 'screened') {
                        return { prob: 0, isLinked: false, isScreened: true };
                    }
                    
                    // Handle numeric probability
                    const failureRate = parseFloat(fm.data?.mean || 0);
                    const units = fm.data?.units;
                    
                    let prob = 0;
                    if (units === 'd' && !isNaN(failureRate)) {
                        prob = failureRate;
                    } else if (units === 'h' && !isNaN(failureRate)) {
                        const timeToOperate = fm.timeToOperate || 24;
                        prob = 1 - Math.exp(-failureRate * timeToOperate);
                    } else if (units === 'y' && !isNaN(failureRate)) {
                        const timeToOperate = fm.timeToOperate || 24;
                        prob = 1 - Math.exp(-failureRate * timeToOperate / 8760);
                    } else if (!isNaN(failureRate)) {
                        prob = failureRate;
                    }
                    return { prob, isLinked: false };
                };
                
                for (const ssc of sscsInSystem) {
                    if (ssc.failureModes && ssc.failureModes.length > 0) {
                        // Filter for applicable, non-screened failure modes
                        const applicableModes = ssc.failureModes.filter(fm => 
                            fm.applicable !== false && fm.probabilityType !== 'screened'
                        );
                        
                        if (applicableModes.length === 0) continue;
                        
                        // If SSC has multiple applicable failure modes, create separate entries for each
                        if (applicableModes.length > 1) {
                            const fmKeys = applicableModes.map((fm, idx) => {
                                const modeName = (fm.mode || `FM${idx + 1}`).replace(/\s+/g, '_');
                                return `${ssc.name}__${modeName}`;
                            });
                            
                            data[ssc.name] = {
                                probability: null,
                                description: ssc.description || ssc.label || '',
                                hasMultipleModes: true,
                                failureModeNames: fmKeys
                            };
                            
                            applicableModes.forEach((fm, idx) => {
                                const fmKey = fmKeys[idx];
                                const probResult = getFailureModeProbability(fm);
                                
                                data[fmKey] = {
                                    probability: probResult.prob,
                                    description: fm.data?.description || fm.mode || '',
                                    parentSSC: ssc.name,
                                    isLinked: probResult.isLinked,
                                    linkedSystemName: probResult.linkedSystemName,
                                    probabilityType: fm.probabilityType,
                                    qualitativeLevel: fm.qualitativeLevel
                                };
                            });
                        } else {
                            // Single failure mode - use SSC name directly
                            const fm = applicableModes[0];
                            const probResult = getFailureModeProbability(fm);
                            
                            data[ssc.name] = {
                                probability: probResult.prob,
                                description: ssc.description || ssc.label || '',
                                isLinked: probResult.isLinked,
                                linkedSystemName: probResult.linkedSystemName,
                                probabilityType: fm.probabilityType,
                                qualitativeLevel: fm.qualitativeLevel
                            };
                        }
                    }
                }
                return data;
            }, [sscsInSystem, settings]);
            
            // Build failure logic tree with multi-mode SSC expansion
            const failureLogicTree = React.useMemo(() => {
                if (!hasFailureInfo) return null;
                
                try {
                    const parsed = parseSystemWorksExpression(systemLogic, systemName, superComponents);
                    if (!parsed) return null;
                    
                    // Transform basic events for SSCs with multiple failure modes into OR gates
                    const expandMultiModeSscs = (node) => {
                        if (node.type === 'BASIC') {
                            const eventData = basicEventData[node.label];
                            if (eventData && eventData.hasMultipleModes && eventData.failureModeNames) {
                                const ssc = sscsInSystem.find(s => s.name === node.label);
                                return {
                                    id: node.id || `or_${node.label}`,
                                    type: 'OR',
                                    label: `${node.label} fails`,
                                    description: ssc?.description || '',
                                    children: eventData.failureModeNames.map((fmName, idx) => ({
                                        id: `${node.label}_fm${idx}`,
                                        type: 'BASIC',
                                        label: fmName,
                                        description: basicEventData[fmName]?.description || '',
                                        probability: basicEventData[fmName]?.probability || 0
                                    }))
                                };
                            }
                            if (eventData) {
                                node.probability = eventData.probability;
                            }
                            return node;
                        }
                        if (node.children) {
                            node.children = node.children.map(expandMultiModeSscs);
                        }
                        return node;
                    };
                    
                    const expandedTree = expandMultiModeSscs(parsed);
                    
                    // Enrich with descriptions
                    const enrichWithDescriptions = (node) => {
                        if (node.type === 'BASIC') {
                            const ssc = sscsInSystem.find(s => s.name === node.label);
                            if (ssc) {
                                node.description = ssc.description || ssc.label || '';
                            }
                            if (!node.probability && basicEventData[node.label]) {
                                node.probability = basicEventData[node.label].probability;
                            }
                        }
                        if (node.children) {
                            node.children.forEach(enrichWithDescriptions);
                        }
                        return node;
                    };
                    enrichWithDescriptions(expandedTree);
                    
                    return expandedTree;
                } catch (err) {
                    console.error('Error parsing system logic:', err);
                    return null;
                }
            }, [systemLogic, systemName, sscsInSystem, superComponents, basicEventData, hasFailureInfo, parseSystemWorksExpression]);
            
            // Generate cut sets and MCUB
            const { cutSets, mcubValue } = React.useMemo(() => {
                if (!failureLogicTree || !failureLogicTree.children || failureLogicTree.children.length === 0) {
                    return { cutSets: [], mcubValue: null };
                }
                
                const minimalCutSets = generateMinimalCutSets(failureLogicTree, basicEventData);
                
                const cutSetsWithProb = minimalCutSets.map((cutSet, index) => {
                    const probResult = calculateCutSetProbability(cutSet, basicEventData);
                    
                    const descriptions = cutSet.map(eventName => {
                        if (eventName.includes('__')) {
                            const parentSSC = basicEventData[eventName]?.parentSSC;
                            const fmDescription = basicEventData[eventName]?.description || eventName.split('__')[1].replace(/_/g, ' ');
                            if (parentSSC) {
                                return `${parentSSC}: ${fmDescription}`;
                            }
                            return fmDescription;
                        }
                        if (basicEventData[eventName] && basicEventData[eventName].description) {
                            return basicEventData[eventName].description;
                        }
                        return eventName;
                    });
                    
                    const description = descriptions.length === 1 
                        ? descriptions[0] + ' fails'
                        : descriptions.join(' & ') + ' all fail';
                    
                    return {
                        id: index + 1,
                        events: cutSet,
                        probability: probResult.probability,
                        hasLinked: probResult.hasLinked,
                        linkedEvents: probResult.linkedEvents,
                        description: description
                    };
                });
                
                cutSetsWithProb.sort((a, b) => {
                    if (a.hasLinked && !b.hasLinked) return 1;
                    if (!a.hasLinked && b.hasLinked) return -1;
                    if (a.probability !== null && b.probability !== null) {
                        return b.probability - a.probability;
                    }
                    if (a.probability === null) return 1;
                    if (b.probability === null) return -1;
                    return 0;
                });
                
                const cutSetProbabilities = cutSetsWithProb
                    .filter(cs => !cs.hasLinked)
                    .map(cs => cs.probability)
                    .filter(p => p !== null);
                const mcub = calculateMCUB(cutSetProbabilities);
                
                return {
                    cutSets: cutSetsWithProb,
                    mcubValue: mcub
                };
            }, [failureLogicTree, basicEventData, generateMinimalCutSets, calculateCutSetProbability, calculateMCUB]);
            
            // Helper function to calculate importance measures
            const calculateImportanceMeasures = () => {
                if (!mcubValue || !cutSets || cutSets.length === 0 || !basicEventData) {
                    return [];
                }
                
                // Get all unique basic events
                const allEvents = new Set();
                cutSets.forEach(cs => {
                    cs.events.forEach(e => allEvents.add(e));
                });
                
                // Calculate RIR and RRR for each event
                const measures = Array.from(allEvents).map(eventName => {
                    const eventData = basicEventData[eventName];
                    if (!eventData || eventData.probability === null || eventData.probability === undefined) {
                        return null;
                    }
                    
                    const originalProb = eventData.probability;
                    
                    // Calculate RIR: set event probability to 1
                    const tempData1 = { ...basicEventData };
                    tempData1[eventName] = { ...eventData, probability: 1.0, isLinked: false };
                    const cutSetProbs1 = cutSets.map(cs => {
                        const result = calculateCutSetProbability(cs.events, tempData1);
                        return result.probability;
                    }).filter(p => p !== null);
                    const newProb1 = calculateMCUB(cutSetProbs1);
                    const rir = newProb1 / mcubValue;
                    
                    // Calculate RRR: set event probability to 0
                    const tempData0 = { ...basicEventData };
                    tempData0[eventName] = { ...eventData, probability: 0.0, isLinked: false };
                    const cutSetProbs0 = cutSets.map(cs => {
                        const result = calculateCutSetProbability(cs.events, tempData0);
                        return result.probability;
                    }).filter(p => p !== null);
                    const newProb0 = calculateMCUB(cutSetProbs0);
                    const rrr = newProb0 === 0 ? Infinity : mcubValue / newProb0;
                    
                    // Calculate PC and SWIM
                    const pc = rrr === Infinity ? 1.0 : (1 - (1 / rrr));
                    const swim = pc + Math.pow(1 - (1 / rir), 7.64);
                    
                    return {
                        event: eventName,
                        description: eventData.description || eventName,
                        probability: originalProb,
                        rir: rir,
                        rrr: rrr === Infinity ? 999 : rrr,
                        pc: pc,
                        swim: swim
                    };
                }).filter(m => m !== null);
                
                // Sort by SWIM descending
                measures.sort((a, b) => b.swim - a.swim);
                
                return measures;
            };
            
            // Pre-calculate importance measures for use in report sections
            const importanceMeasures = calculateImportanceMeasures();
            
            const handleGenerate = async () => {
                if (fileFormat === 'preview') {
                    await generatePreviewReport();
                } else if (fileFormat === 'markdown') {
                    generateMarkdownReport();
                } else if (fileFormat === 'word') {
                    generateWordReport();
                }
            };

            // Build clean preview HTML (no Word namespaces) from the same HTML section generators
            const generatePreviewReport = async () => {
                try {
                    // Mermaid renderer (same as Word path)
                    const renderMermaidToImage = async (mermaidCode) => {
                        try {
                            mermaid.initialize({ startOnLoad: false, theme: 'default', flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }, securityLevel: 'loose' });
                            const uid = 'prev-mermaid-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                            const { svg } = await mermaid.render(uid, mermaidCode);
                            const parser = new DOMParser();
                            const svgDoc = parser.parseFromString(svg, 'image/svg+xml');
                            const svgEl = svgDoc.documentElement;
                            let w = 800, h = 600;
                            const vb = svgEl.getAttribute('viewBox');
                            if (vb) { const p = vb.split(/[\s,]+/).map(Number); if (p.length === 4) { w = p[2]||800; h = p[3]||600; } }
                            else { w = parseFloat(svgEl.getAttribute('width'))||800; h = parseFloat(svgEl.getAttribute('height'))||600; }
                            w = Math.max(w, 100); h = Math.max(h, 100);
                            svgEl.setAttribute('xmlns','http://www.w3.org/2000/svg');
                            svgEl.setAttribute('width', w); svgEl.setAttribute('height', h);
                            const svgData = new XMLSerializer().serializeToString(svgEl);
                            const b64 = btoa(unescape(encodeURIComponent(svgData)));
                            const dataUrl = 'data:image/svg+xml;base64,' + b64;
                            return new Promise(resolve => {
                                const canvas = document.createElement('canvas');
                                canvas.width = w*2; canvas.height = h*2;
                                const ctx = canvas.getContext('2d');
                                ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
                                const img = new Image();
                                img.onload = () => { try { ctx.drawImage(img,0,0,canvas.width,canvas.height); resolve(canvas.toDataURL('image/png')); } catch(e){ resolve(dataUrl); } };
                                img.onerror = () => resolve(dataUrl);
                                img.src = dataUrl;
                            });
                        } catch(err) { return null; }
                    };

                    let body = '';
                    // Title + date
                    body += `<h1 style="margin:0 0 8px 0;font-size:24px;color:#1e3a8a;text-align:center;">${systemName || 'System Report'}</h1>`;
                    if (showDateTime) {
                        body += `<p style="margin:4px 0 0 0;font-size:13px;text-align:center;color:#6b7280;"><strong>Generated:</strong> ${new Date().toLocaleString()}</p>`;
                    }
                    body += `<hr style="margin:16px 0;border:none;border-top:2px solid #e5e7eb;">`;

                    for (const item of contentItems) {
                        if (!item.enabled) continue;
                        switch(item.id) {
                            case 'systemName':    body += generateHTMLSystemNameSection(); break;
                            case 'extendedDesc':  body += generateHTMLExtendedDescSection(); break;
                            case 'sscInfo':       body += generateHTMLSSCInfoSection(); break;
                            case 'fmeaInfo':      body += await generateHTMLFMEAInfoSectionAsync(renderMermaidToImage); break;
                            case 'systemWorks':   body += generateHTMLSystemWorksSection(); break;
                            case 'supercomp':     body += generateHTMLSupercompSection(); break;
                            case 'ftLogic':       body += generateHTMLFTLogicSection(); break;
                            case 'ftGraphic':     body += generateHTMLFTGraphicSection(); break;
                            case 'ftCutSets':     if (hasFailureInfo) body += generateHTMLFTCutSetsSection(); break;
                            case 'impGraphic':    body += generateHTMLImpGraphicSection(); break;
                            case 'impTable':      if (hasFailureInfo) body += generateHTMLImpTableSection(); break;
                        }
                    }

                    const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
<title>${systemName || 'System Report'}</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 28px 36px; color: #111827; background: #fff; font-size: 13px; line-height: 1.5; }
  h1,h2,h3 { color: #1e3a8a; }
  h2 { font-size: 17px; border-bottom: 2px solid #bfdbfe; padding-bottom: 4px; margin-top: 28px; }
  h3 { font-size: 14px; margin-top: 18px; color: #1e40af; }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
  th { background: #1e3a8a; color: white; padding: 6px 8px; text-align: left; }
  td { border: 1px solid #e5e7eb; padding: 5px 8px; vertical-align: top; }
  tr:nth-child(even) td { background: #f9fafb; }
  pre, code { font-family: 'Courier New', monospace; background: #f3f4f6; padding: 10px; border-radius: 4px; font-size: 11px; white-space: pre-wrap; display: block; }
  hr { border: none; border-top: 1px solid #e5e7eb; margin: 16px 0; }
  img { max-width: 100%; border: 1px solid #e5e7eb; border-radius: 6px; }
  @media print { body { padding: 10mm 15mm; } }
</style></head><body>${body}</body></html>`;

                    setPreviewHTML(html);
                    setShowHTMLPreview(true);
                } catch(err) {
                    alert('Error generating preview: ' + err.message);
                }
            };
            
            const generateMarkdownReport = () => {
                let markdown = '';
                
                // Add title
                markdown += `# ${systemName || 'System Report'}\n\n`;
                
                // Add creation date/time if requested
                if (showDateTime) {
                    const now = new Date();
                    markdown += `**Report Generated:** ${now.toLocaleString()}\n\n`;
                    markdown += '---\n\n';
                }
                
                // Generate content based on selected items
                contentItems.forEach(item => {
                    if (!item.enabled) return;
                    
                    switch(item.id) {
                        case 'systemName':
                            markdown += generateSystemNameSection();
                            break;
                        case 'extendedDesc':
                            markdown += generateExtendedDescSection();
                            break;
                        case 'sscInfo':
                            markdown += generateSSCInfoSection();
                            break;
                        case 'fmeaInfo':
                            markdown += generateFMEAInfoSection();
                            break;
                        case 'systemWorks':
                            markdown += generateSystemWorksSection();
                            break;
                        case 'supercomp':
                            markdown += generateSupercompSection();
                            break;
                        case 'ftLogic':
                            if (hasFailureInfo) markdown += generateFTLogicSection();
                            break;
                        case 'ftGraphic':
                            if (hasFailureInfo) markdown += generateFTGraphicSection();
                            break;
                        case 'ftCutSets':
                            if (hasFailureInfo) markdown += generateFTCutSetsSection();
                            break;
                        case 'impGraphic':
                            if (hasFailureInfo) markdown += generateImpGraphicSection();
                            break;
                        case 'impTable':
                            if (hasFailureInfo) markdown += generateImpTableSection();
                            break;
                    }
                });
                
                // Download the markdown file
                downloadMarkdown(markdown, fileName);
                onClose();
            };
            
            const generateSystemNameSection = () => {
                let section = '## System Name\n\n';
                section += `**Name:** ${systemName || 'N/A'}\n\n`;
                return section;
            };
            
            const generateExtendedDescSection = () => {
                let section = '## Extended Description\n\n';
                if (systemDescription) {
                    // Convert HTML to plain text (basic conversion)
                    const div = document.createElement('div');
                    div.innerHTML = systemDescription;
                    const text = div.textContent || div.innerText || '';
                    section += text + '\n\n';
                } else {
                    section += '*No description provided.*\n\n';
                }
                return section;
            };
            
            const generateSSCInfoSection = () => {
                let section = '## SSC Information\n\n';
                
                if (sscsInSystem.length === 0) {
                    section += '*No SSCs in system.*\n\n';
                    return section;
                }
                
                // Create markdown table
                section += '| SSC Name | Description | Component Type | SSC Type | Failure Modes |\n';
                section += '|----------|-------------|----------------|----------|---------------|\n';
                
                sscsInSystem.forEach(ssc => {
                    const name = ssc.name || 'N/A';
                    const desc = (ssc.description || 'N/A').replace(/\|/g, '\\|').replace(/\n/g, ' ');
                    const compType = ssc.label || 'N/A';
                    const sscType = ssc.sscType || 'N/A';
                    const fmList = ssc.failureModes 
                        ? ssc.failureModes.map(fm => fm.mode).join(', ')
                        : 'None';
                    
                    section += `| ${name} | ${desc} | ${compType} | ${sscType} | ${fmList} |\n`;
                });
                
                section += '\n';
                
                // Add detailed failure mode information
                section += '### Detailed Failure Mode Information\n\n';
                sscsInSystem.forEach(ssc => {
                    if (ssc.failureModes && ssc.failureModes.length > 0) {
                        ssc.failureModes.forEach(fm => {
                            const fmDesc = fm.data.description || 'No description';
                            section += `**${fm.mode} -- ${fmDesc}**\n\n`;
                            if (fm.data.mean) {
                                section += `- Mean: ${fm.data.mean}\n`;
                            }
                            if (fm.data.units) {
                                const unitText = fm.data.units === 'd' ? 'per demand' : 
                                               fm.data.units === 'h' ? 'per hour' : 
                                               fm.data.units === 'y' ? 'per year' : fm.data.units;
                                section += `- Units: ${unitText}\n`;
                            }
                            if (fm.data.distribution_type) {
                                // Format as Distribution_name(shape, scale)
                                let distText = fm.data.distribution_type;
                                const shapeParam = fm.data.distribution_shape_parameter || fm.data.shape_parameter;
                                const scaleParam = fm.data.distribution_scale_parameter || fm.data.scale_parameter;

                    let currentLine = '';
                    
                    words.forEach(word => {
                        if (currentLine.length + word.length + 1 <= maxWidth) {
                            currentLine += (currentLine ? ' ' : '') + word;
                        } else {
                            if (currentLine) lines.push(currentLine);
                            currentLine = word;

                    if (currentLine) lines.push(currentLine);
                    
                    return lines.join('\\n');

                    code += `        ${fmId}["${fmLabel}${probInfo}"]\n`;

                for (const ssc of sscsWithFMEA) {
                    html += `<h2>${escapeHtml(ssc.name)}</h2>\n`;
                    if (ssc.description) {
                        html += `<p>${escapeHtml(ssc.description)}</p>\n`;
                    }
                    
                    // Generate and render mermaid diagram as image
                    const mermaidCode = generateFMEAMermaidCode(ssc);
                    if (mermaidCode) {
                        try {
                            const imageData = await renderMermaidToImage(mermaidCode);
                            if (imageData) {
                                html += `<p><img src="${imageData}" style="max-width: 100%; height: auto;" /></p>\n`;
                            }
                        } catch (err) {
                            console.error('Error rendering FMEA diagram:', err);
                        }
                    }
                    
                    // Also include summary table for this SSC
                    html += `<h3>FMEA Summary Table</h3>\n`;
                    html += `
<table>
<tr>
<th>Failure Mode</th>
<th>Description</th>
<th>Probability</th>
<th>Effects</th>
</tr>
`;
                    (ssc.failureModes || []).forEach(fm => {
                        const fmName = fm.mode || 'Unnamed';
                        const fmDesc = fm.data?.description || '';
                        
                        // Format probability
                        let probStr = '';
                        if (fm.probabilityType === 'screened') {
                            probStr = 'SCREENED';
                        } else if (fm.probabilityType === 'qualitative') {
                            probStr = (fm.qualitativeLevel || 'Unknown').toUpperCase();
                        } else if (fm.data?.mean) {
                            probStr = fm.data.mean;
                        } else {
                            probStr = 'N/A';
                        }
                        
                        // Format effects
                        const effects = (fm.effects || []).map(e => e.description).filter(d => d);
                        const effectsStr = effects.length > 0 
                            ? effects.map(e => escapeHtml(e)).join('<br>') 
                            : '<em>No effects defined</em>';
                        
                        html += `
<tr>
<td>${escapeHtml(fmName)}</td>
<td>${escapeHtml(fmDesc)}</td>
<td>${escapeHtml(probStr)}</td>
<td>${effectsStr}</td>
</tr>
`;
                    });
                    html += `</table>\n`;
                }
                
                return html;
            };
            
            const generateHTMLSystemWorksSection = () => {
                let html = `<h1>System Works Expression</h1>\n`;
                
                if (systemLogic && systemLogic.length > 1) {
                    let currentLine = '';
                    const lines = [];
                    systemLogic.forEach(token => {
                        if (token.type === 'eol') {
                            lines.push(currentLine);
                            currentLine = '';
                        } else if (token.type === 'module_def') {
                            if (currentLine) currentLine += ' ';
                            currentLine += '[' + token.value + '] =';
                        } else if (token.type === 'module_ref') {
                            if (currentLine) currentLine += ' ';
                            currentLine += '[' + token.value + ']';
                        } else {
                            if (currentLine && token.value !== '(' && token.value !== ')' && token.value !== ';') {
                                currentLine += ' ';
                            }
                            currentLine += token.value;
                        }
                    });
                    if (currentLine) {
                        lines.push(currentLine);
                    }
                    html += `<pre class="code">${escapeHtml(lines.join('\n'))}</pre>\n`;
                } else {
                    html += `<p><em>No system logic defined.</em></p>\n`;
                }
                
                return html;
            };
            
            const generateHTMLSupercompSection = () => {
                // Don't show supercomponent section at all if none exist
                if (superComponents.length === 0) {
                    return '';
                }
                
                let html = `<h1>Supercomponent Information</h1>\n`;
                
                superComponents.forEach(sc => {
                    html += `<h2>${escapeHtml(sc.name)}</h2>\n`;

                    html += `</ul>\n`;

            const generateHTMLFTLogicSection = () => {
                let html = `<h1>Fault Tree Logic</h1>\n`;
                
                if (!hasFailureInfo || !failureLogicTree) {
                    html += `<p><em>No system logic defined.</em></p>\n`;
                    return html;
                }
                
                try {
                    // Generate text tree view using pre-computed failureLogicTree
                    const generateTextTree = (node, indent = '') => {
                        let text = '';
                        const connector = '\u251C\u2500';
                        const vertBar = '\u2502  ';
                        
                        if (node.type === 'BASIC') {
                            text += indent + connector + ' [' + node.label + '] ' + (node.description || '') + '\n';
                        } else {
                            text += indent + connector + ' ' + node.type + ': ' + node.label + '\n';
                            
                            if (node.children && node.children.length > 0) {
                                node.children.forEach((child, index) => {
                                    const isLast = index === node.children.length - 1;
                                    const childIndent = indent + (isLast ? '   ' : vertBar);
                                    text += generateTextTree(child, childIndent);
                                });
                            }
                        }
                        
                        return text;
                    };
                    
                    const treeText = generateTextTree(failureLogicTree);
                    html += `<pre class="tree-text">${escapeHtml(treeText)}</pre>\n`;
                    
                } catch (error) {
                    html += `<p><em>Error generating fault tree logic: ${escapeHtml(error.message)}</em></p>\n`;
                }
                
                return html;
            };
            
            const generateHTMLFTGraphicSection = () => {
                let html = `<h1>Fault Tree Graphics</h1>\n`;
                
                if (!hasFailureInfo || !failureLogicTree) {
                    html += `<p><em>No system logic defined.</em></p>\n`;
                    return html;
                }
                
                try {
                    // Generate image using pre-computed failureLogicTree and basicEventData
                    const imageData = generateFaultTreeImageBase64(failureLogicTree, basicEventData, { background: 'light', showProbability: '1' });
                    html += `<img src="${imageData}" style="max-width: 100%; height: auto;" />\n`;
                    
                } catch (error) {
                    html += `<p><em>Error generating fault tree graphic: ${escapeHtml(error.message)}</em></p>\n`;
                }
                
                return html;
            };
            
            const generateHTMLFTCutSetsSection = () => {
                let html = `<h1>Fault Tree Cut Sets</h1>\n`;
                
                if (!hasFailureInfo || !cutSets || cutSets.length === 0) {
                    html += `<p><em>No cut sets available.</em></p>\n`;
                    return html;
                }
                
                try {
                    // Show MCUB first
                    if (mcubValue !== null) {
                        html += `<p class="mcub-title">Minimal Cut Set Upper Bound (MCUB): ${mcubValue.toExponential(2)}</p>\n`;
                    }
                    
                    const displayCutSets = cutSets.slice(0, limitCutSets);
                    html += `<p>Showing ${displayCutSets.length} of ${cutSets.length} cut sets</p>\n`;
                    
                    html += `
<table>
<tr>
<th>#</th>
<th>Cut Set</th>
<th>Description</th>
<th>Probability</th>
</tr>
`;
                    
                    displayCutSets.forEach((cs, idx) => {
                        const events = cs.events.join(' \u00D7 ');
                        const desc = cs.description || '';
                        const prob = cs.probability !== null ? cs.probability.toExponential(2) : 'N/A';
                        html += `
<tr>
<td>${idx + 1}</td>
<td>${escapeHtml(events)}</td>
<td>${escapeHtml(desc)}</td>
<td>${prob}</td>
</tr>
`;
                    });
                    
                    html += `</table>\n`;
                    
                } catch (error) {
                    html += `<p><em>Error generating cut sets: ${escapeHtml(error.message)}</em></p>\n`;
                }
                
                return html;
            };
            
            const generateHTMLImpGraphicSection = () => {
                let html = `<h1>Importance Measure Graphic</h1>\n`;
                
                if (!hasFailureInfo || importanceMeasures.length === 0) {
                    html += `<p><em>No importance measures available.</em></p>\n`;
                    return html;
                }
                
                try {
                    // Generate image using default axis settings
                    const xAxis = 'swim';
                    const yAxis = 'rir';
                    const imageData = generateImportanceMeasureImageBase64(importanceMeasures, xAxis, yAxis);
                    html += `<img src="${imageData}" style="max-width: 100%; height: auto;" />\n`;
                    
                } catch (error) {
                    html += `<p><em>Error generating importance measure graphic: ${escapeHtml(error.message)}</em></p>\n`;
                }
                
                return html;
            };
            
            const generateHTMLImpTableSection = () => {
                let html = `<h1>Importance Measure Table</h1>\n`;
                
                if (!hasFailureInfo || importanceMeasures.length === 0) {
                    html += `<p><em>No importance measures available.</em></p>\n`;
                    return html;
                }
                
                try {
                    html += `
<table>
<tr>
<th>Event</th>
<th>Description</th>
<th>Prob</th>
<th>RIR</th>
<th>RRR</th>
<th>PC</th>
<th>SWIM</th>
</tr>
`;
                    
                    importanceMeasures.forEach(m => {
                        // Format RIR and RRR with one decimal digit
                        const probText = m.probability.toExponential(2);
                        const rirText = m.rir.toFixed(1);
                        const rrrText = m.rrr >= 999 ? '\u221E' : m.rrr.toFixed(1);
                        
                        html += `
<tr>
<td>${escapeHtml(m.event)}</td>
<td>${escapeHtml(m.description)}</td>
<td>${probText}</td>
<td>${rirText}</td>
<td>${rrrText}</td>
<td>${m.pc.toExponential(2)}</td>
<td>${m.swim.toExponential(2)}</td>
</tr>
`;
                    });
                    
                    html += `</table>\n`;
                    
                } catch (error) {
                    html += `<p><em>Error calculating importance measures: ${escapeHtml(error.message)}</em></p>\n`;
                }
                
                return html;
            };
            
            return (
                <React.Fragment>

                    >

                                    <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>

                        {/* Two-column body */}
                        <div className="flex-1 flex overflow-hidden">
                            {/* Left: Content sections */}
                            <div className="border-r overflow-y-auto p-4" style={{ width: '40%', borderColor: backgroundStyle.borderColor }}>
                                <div className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Report Sections</div>
                                <div className="space-y-0.5">
                                    {contentItems.map((item, index) => (
                                        <div key={item.id} className="flex items-center gap-2 py-1 px-2 hover:bg-gray-50 rounded">
                                            <input
                                                type="checkbox"
                                                checked={item.enabled}
                                                onChange={() => toggleItem(index)}
                                                className="w-4 h-4"
                                            />
                                            <span className="flex-1 text-sm">{item.label}</span>
                                            <div className="flex gap-1">
                                                <button
                                                    onClick={() => moveItem(index, 'up')}
                                                    disabled={index === 0}
                                                    className="px-1 py-0.5 text-xs border rounded hover:bg-gray-100 disabled:opacity-30"
                                                    style={{ borderColor: backgroundStyle.borderColor }}
                                                    title="Move up"
                                                >{'\u25B2'}</button>
                                                <button
                                                    onClick={() => moveItem(index, 'down')}
                                                    disabled={index === contentItems.length - 1}
                                                    className="px-1 py-0.5 text-xs border rounded hover:bg-gray-100 disabled:opacity-30"
                                                    style={{ borderColor: backgroundStyle.borderColor }}
                                                    title="Move down"
                                                >{'\u25BC'}</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Right: Options */}
                            <div className="flex-1 overflow-y-auto p-4">
                                <div className="space-y-5">
                                    {/* Type */}
                                    <div>
                                        <div className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Type</div>
                                        <div className="flex gap-2">
                                            {[
                                                { value: 'preview', label: 'Preview' },
                                                { value: 'word', label: 'Word' },
                                                { value: 'markdown', label: 'Markdown' }
                                            ].map(fmt => (
                                                <button
                                                    key={fmt.value}
                                                    onClick={() => setFileFormat(fmt.value)}
                                                    className={`flex-1 px-3 py-2 rounded text-sm font-medium ${
                                                        fileFormat === fmt.value
                                                            ? 'bg-blue-600 text-white'
                                                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                    }`}
                                                >{fmt.label}</button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* File Name */}
                                    <div>
                                        <div className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">File Name</div>
                                        <input
                                            type="text"
                                            value={fileName}
                                            onChange={(e) => setFileName(e.target.value)}
                                            className="w-full px-3 py-2 border rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            style={{
                                                backgroundColor: backgroundStyle.backgroundColor,
                                                color: backgroundStyle.color,
                                                borderColor: backgroundStyle.borderColor
                                            }}
                                            placeholder="Enter file name"
                                        />
                                    </div>

                                    {/* Options */}
                                    <div>
                                        <div className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Options</div>
                                        <div className="space-y-3">
                                            <div className="flex items-center gap-3">
                                                <label className="text-sm text-gray-700 whitespace-nowrap">Limit Cut Sets to:</label>
                                                <input
                                                    type="number"
                                                    value={limitCutSets}
                                                    onChange={(e) => setLimitCutSets(parseInt(e.target.value) || 100)}
                                                    min="1"
                                                    className="w-24 px-2 py-1.5 border rounded text-sm"
                                                    style={{
                                                        backgroundColor: backgroundStyle.backgroundColor,
                                                        color: backgroundStyle.color,
                                                        borderColor: backgroundStyle.borderColor
                                                    }}
                                                />
                                            </div>
                                            <label className="flex items-center gap-2 cursor-pointer">

                                style={{ borderColor: backgroundStyle.borderColor, color: backgroundStyle.color }}
                            >Cancel</button>

                            >

                            </button>

                {/* HTML Preview Overlay */}
                {showHTMLPreview && (

                                    >Print</button>

        }

        // Duplicate SSC Modal Component
        function DuplicateSSCModal({ ssc, onSave, onCancel, backgroundStyle, existingSSCs, settings }) {
            const [searchText, setSearchText] = useState('');
            const [replaceText, setReplaceText] = useState('');
            const [fieldsToSearch, setFieldsToSearch] = useState({
                name: true,
                description: true,
                sscType: true,
                componentType: true,
                failureModeName: true,
                failureModeDescription: true,
                effectDescription: true
            });
            
            // Generate the preview SSC with search/replace applied
            const previewSSC = React.useMemo(() => {
                if (!ssc) return null;
                
                const doReplace = (text) => {
                    if (!text || !searchText) return text;
                    // Case-insensitive global replace
                    const regex = new RegExp(searchText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                    return text.replace(regex, replaceText);
                };
                
                const newSSC = JSON.parse(JSON.stringify(ssc)); // Deep clone
                newSSC.id = 'ssc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                if (fieldsToSearch.name) {
                    newSSC.name = doReplace(newSSC.name);
                }
                if (fieldsToSearch.description) {
                    newSSC.description = doReplace(newSSC.description);
                }
                if (fieldsToSearch.sscType) {
                    newSSC.sscType = doReplace(newSSC.sscType);
                }
                if (fieldsToSearch.componentType) {
                    newSSC.label = doReplace(newSSC.label);
                }
                
                if (newSSC.failureModes) {
                    newSSC.failureModes = newSSC.failureModes.map(fm => {
                        const newFM = { ...fm };
                        if (fieldsToSearch.failureModeName) {
                            newFM.mode = doReplace(newFM.mode);
                        }
                        if (fieldsToSearch.failureModeDescription && newFM.data) {
                            newFM.data = { ...newFM.data, description: doReplace(newFM.data.description) };
                        }
                        // Handle effects
                        if (fieldsToSearch.effectDescription && newFM.effects) {
                            newFM.effects = newFM.effects.map(eff => ({
                                ...eff,
                                description: doReplace(eff.description)
                            }));
                        }
                        return newFM;
                    });
                }
                
                return newSSC;
            }, [ssc, searchText, replaceText, fieldsToSearch]);
            
            // Check if new name already exists
            const nameExists = previewSSC && existingSSCs.some(s => 
                s.name.toLowerCase() === previewSSC.name.toLowerCase() && s.id !== ssc.id
            );
            
            const handleSave = () => {
                if (nameExists) {
                    alert('An SSC with this name already exists. Please modify the search/replace to create a unique name.');
                    return;
                }
                if (previewSSC.name === ssc.name) {
                    alert('The new SSC has the same name as the original. Please modify the search/replace to create a unique name.');
                    return;
                }
                onSave(previewSSC);
            };
            
            const toggleField = (field) => {
                setFieldsToSearch(prev => ({ ...prev, [field]: !prev[field] }));
            };
            
            // Render SSC info panel (reusable for original and preview)
            const renderSSCInfo = (sscData, title, showDiagram = true) => (
                <div className="flex flex-col h-full">
                    <h4 className="font-bold text-sm mb-2 pb-1 border-b flex-shrink-0" style={{ borderColor: backgroundStyle.borderColor }}>
                        {title}
                    </h4>
                    <div className="flex-1 overflow-y-auto text-xs space-y-2">
                        <div>
                            <span className="font-semibold">Name:</span> {sscData.name || '(empty)'}
                        </div>
                        <div>
                            <span className="font-semibold">Description:</span> {sscData.description || '(empty)'}
                        </div>
                        <div>
                            <span className="font-semibold">SSC Type:</span> {sscData.sscType || '(empty)'}
                        </div>
                        <div>
                            <span className="font-semibold">Component Type:</span> {sscData.label || '(empty)'}
                        </div>
                        {sscData.failureModes && sscData.failureModes.length > 0 && (
                            <div className="mt-2">
                                <span className="font-semibold">Failure Modes ({sscData.failureModes.length}):</span>
                                <div className="ml-2 mt-1 space-y-2">
                                    {sscData.failureModes.map((fm, idx) => (
                                        <div key={idx} className="p-2 rounded" style={{
                                            backgroundColor: settings.background === 'dark' ? '#374151' : '#f3f4f6'
                                        }}>
                                            <div><strong>Mode:</strong> {fm.mode || '(empty)'}</div>
                                            {fm.data?.description && (
                                                <div className="text-gray-500"><strong>Description:</strong> {fm.data.description}</div>
                                            )}
                                            {fm.data?.mean && (
                                                <div><strong>Mean:</strong> {fm.data.mean}</div>
                                            )}
                                            {fm.effects && fm.effects.length > 0 && (
                                                <div className="mt-1">
                                                    <strong>Effects:</strong>
                                                    <ul className="list-disc list-inside ml-2">
                                                        {fm.effects.map((eff, effIdx) => (
                                                            <li key={effIdx}>{eff.description || '(empty)'}</li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {/* FMEA Diagram */}
                        {showDiagram && sscData.failureModes && sscData.failureModes.length > 0 && (
                            <div className="mt-3 pt-2 border-t" style={{ borderColor: backgroundStyle.borderColor }}>
                                <span className="font-semibold">FMEA Diagram:</span>
                                <div className="mt-2" style={{ minHeight: '200px' }}>
                                    <SSCFMEADiagram 
                                        ssc={sscData}
                                        settings={settings}
                                    />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
            
            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{
                        backgroundColor: backgroundStyle.paneBackground,
                        color: backgroundStyle.color,
                        maxWidth: '1400px',
                        width: '98%',
                        maxHeight: '92vh',
                        display: 'flex',
                        flexDirection: 'column'
                    }}>
                        <div className="p-4 border-b flex-shrink-0" style={{ borderColor: backgroundStyle.borderColor }}>
                            <h2 className="text-lg font-bold">Duplicate SSC</h2>
                            <p className="text-xs text-gray-500 mt-1">Create a copy of this SSC with search and replace applied to selected fields</p>
                        </div>
                        
                        <div className="flex-1 overflow-hidden p-4">
                            <div className="grid grid-cols-[1fr_auto_1fr] gap-4 h-full" style={{ minHeight: '550px' }}>
                                {/* Left: Original SSC */}
                                <div className="border rounded p-3 overflow-hidden flex flex-col" style={{

                                    minWidth: '280px'

                                                style={{
                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                    color: backgroundStyle.color,
                                                    borderColor: backgroundStyle.borderColor
                                                }}

                                        <div className="pt-2">
                                            <label className="block font-semibold text-xs mb-2">Fields to search:</label>
                                            <div className="space-y-1.5">
                                                {[
                                                    { key: 'name', label: 'Name' },
                                                    { key: 'description', label: 'Description' },
                                                    { key: 'sscType', label: 'SSC Type' },
                                                    { key: 'componentType', label: 'Component Type' },
                                                    { key: 'failureModeName', label: 'Failure Mode Name' },
                                                    { key: 'failureModeDescription', label: 'Failure Mode Description' },
                                                    { key: 'effectDescription', label: 'Effect Description (FMEA)' }

                                                            type="checkbox"
                                                            checked={fieldsToSearch[field.key]}

                                                        />
                                                        {field.label}
