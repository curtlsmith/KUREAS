                                                                                            <div className="font-semibold">{fm.mode} {isPerHour && '(per hour)'} {isPerYear && '(per year)'}</div>
                                                                                            {fm.data.description && (
                                                                                                <div className="mt-1 text-xs">{fm.data.description}</div>
                                                                                            )}
                                                                                            {(isPerHour || isPerYear) && (
                                                                                                <div className="mt-2">
                                                                                                    <label className="block mb-1">
                                                                                                        <span className="font-semibold">Time required to operate (hours): </span>
                                                                                                        <input
                                                                                                            type="number"
                                                                                                            value={fm.timeToOperate || 24}
                                                                                                            onChange={(e) => {
                                                                                                                const newTime = parseFloat(e.target.value) || 24;
                                                                                                                setSelectedItem(prev => {
                                                                                                                    const newData = { ...prev.data };
                                                                                                                    newData.failureModes = newData.failureModes.map((f, i) => 
                                                                                                                        i === index ? { ...f, timeToOperate: newTime } : f
                                                                                                                    );
                                                                                                                    return { ...prev, data: newData };
                                                                                                                });
                                                                                                                setSscsInSystem(prev => prev.map(s => {
                                                                                                                    if (s.id === selectedItem.data.id) {
                                                                                                                        const newFailureModes = s.failureModes.map((f, i) =>
                                                                                                                            i === index ? { ...f, timeToOperate: newTime } : f
                                                                                                                        );
                                                                                                                        return { ...s, failureModes: newFailureModes };
                                                                                                                    }
                                                                                                                    return s;
                                                                                                                }));
                                                                                                            }}
                                                                                                            className="ml-1 px-2 py-1 border rounded"
                                                                                                            style={{
                                                                                                                width: '80px',
                                                                                                                backgroundColor: settings.background === 'dark' ? '#4b5563' : '#ffffff',
                                                                                                                color: settings.background === 'dark' ? '#f3f4f6' : '#111827',
                                                                                                                borderColor: backgroundStyle.borderColor
                                                                                                            }}
                                                                                                        />
                                                                                                    </label>
                                                                                                </div>
                                                                                            )}
                                                                                            {fm.data.mean && fm.probabilityType !== 'linkedSystem' && (
                                                                                                <div className="mt-1 space-y-1">
                                                                                                    {(isPerHour || isPerYear) && failureProbabilityDisplay && (
                                                                                                        <div>
                                                                                                            <span className="font-semibold">Failure Probability (to operate | {timeToOperate} hours): </span>
                                                                                                            {failureProbabilityDisplay}
                                                                                                        </div>
                                                                                                    )}
                                                                                                    <div>
                                                                                                        <span className="font-semibold">
                                                                                                            {isPerHour ? 'Mean failure rate:' : isPerYear ? 'Mean failure rate:' : isPerDemand ? 'Mean Failure Probability (per demand):' : 'Mean:'}
                                                                                                        </span> {fm.data.mean}
                                                                                                    </div>
                                                                                                </div>
                                                                                            )}
                                                                                            {fm.probabilityType === 'linkedSystem' && (
                                                                                                <div className="mt-1 p-2 rounded" style={{
                                                                                                    backgroundColor: settings.background === 'dark' ? '#1e3a5f' : '#dbeafe'
                                                                                                }}>
                                                                                                    <div className="font-semibold text-blue-600">
                                                                                                        <svg className="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                                                                                                        </svg>
                                                                                                        Linked System
                                                                                                    </div>
                                                                                                    <div className="text-xs mt-1">
                                                                                                        <strong>File:</strong> {fm.linkedSystemFile || '(not set)'}
                                                                                                    </div>
                                                                                                    {fm.linkedSystemName && (
                                                                                                        <div className="text-xs">
                                                                                                            <strong>System:</strong> {fm.linkedSystemName}
                                                                                                        </div>
                                                                                                    )}
                                                                                                    <div className="text-xs mt-1 text-gray-500 italic">
                                                                                                        Probability evaluated from linked system's failure logic
                                                                                                    </div>
                                                                                                </div>
                                                                                            )}
                                                                                        </div>
                                                                                    </div>
                                                                                </div>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })()}
                                                        {selectedItem.data.source && (
                                                            <div className="mt-3 p-2 rounded" style={{
                                                                backgroundColor: settings.background === 'dark' ? '#374151' : '#f0f9ff'
                                                            }}>
                                                                <p className="font-bold mb-1">Source:</p>
                                                                <p className="mb-1">{selectedItem.data.source.name}</p>
                                                                {selectedItem.data.source.description && (
                                                                    <p className="text-xs italic">{selectedItem.data.source.description}</p>
                                                                )}
                                                            </div>
                                                        )}
                                                        </div>
                                                        {/* FMEA Diagram (read-only) - fills remaining space */}
                                                        {selectedItem.data.failureModes && selectedItem.data.failureModes.length > 0 && (
                                                            <div className="flex-1 min-h-0 mt-2">
                                                                <SSCFMEADiagram 
                                                                    ssc={selectedItem.data}
                                                                    settings={settings}
                                                                    onClick={() => {
                                                                        setFmeaInitialSSC(selectedItem.data);
                                                                        setShowFMEAModal(true);
                                                                    }}
                                                                />
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                                {/* Supercomponent-specific content */}
                                                {selectedItem.type === 'supercomp' && (
                                                    <div 
                                                        className="border rounded p-2 flex flex-col"
                                                        style={{
                                                            backgroundColor: settings.background === 'dark' ? '#374151' : '#f9fafb',
                                                            borderColor: backgroundStyle.borderColor,
                                                            flex: '1 1 auto',
                                                            minHeight: '150px',
                                                            maxHeight: 'calc(100vh - 350px)',
                                                            overflow: 'hidden'
                                                        }}
                                                    >
                                                        <div className="text-xs overflow-y-auto" style={{
                                                            color: settings.background === 'dark' ? '#d1d5db' : '#6b7280'
                                                        }}>
                                                            <p className="mb-2"><strong>Type:</strong> Supercomponent (series reliability)</p>
                                                            <p className="mb-2"><strong>Contains {selectedItem.data.sscs?.length || 0} SSC(s):</strong></p>
                                                            {selectedItem.data.sscs && selectedItem.data.sscs.length > 0 ? (
                                                                <div className="ml-2 space-y-1">
                                                                    {selectedItem.data.sscs.map((ssc, idx) => (
                                                                        <div key={idx} className="flex items-center justify-between group py-1 px-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600" style={{
                                                                            backgroundColor: settings.background === 'dark' ? '#4b5563' : '#f3f4f6'
                                                                        }}>
                                                                            <div className="flex-1">
                                                                                <span className="font-semibold">{ssc.name}</span>
                                                                                {ssc.description && (
                                                                                    <span className="ml-1 text-gray-500">- {ssc.description}</span>
                                                                                )}
                                                                            </div>
                                                                            <button
                                                                                onClick={() => {
                                                                                    // Remove this SSC from the supercomponent
                                                                                    const updatedSscs = selectedItem.data.sscs.filter((_, i) => i !== idx);
                                                                                    
                                                                                    // Update superComponents state
                                                                                    setSuperComponents(prev => {
                                                                                        const updated = prev.map(sc => 
                                                                                            sc.id === selectedItem.data.id 
                                                                                                ? { ...sc, sscs: updatedSscs }
                                                                                                : sc
                                                                                        );
                                                                                        // Remove supercomponent if it has no SSCs left
                                                                                        return updated.filter(sc => sc.sscs.length > 0);
                                                                                    });
                                                                                    
                                                                                    // Update selectedItem
                                                                                    if (updatedSscs.length > 0) {
                                                                                        setSelectedItem(prev => ({
                                                                                            ...prev,
                                                                                            data: { ...prev.data, sscs: updatedSscs }
                                                                                        }));
                                                                                    } else {
                                                                                        // Supercomponent will be removed, clear selection
                                                                                        setSelectedItem(null);
                                                                                    }
                                                                                }}
                                                                                className="ml-2 px-2 py-0.5 bg-red-500 text-white rounded text-xs hover:bg-red-600 opacity-60 hover:opacity-100"
                                                                                title={`Remove ${ssc.name} from supercomponent`}
                                                                            >
                                                                                &times;
                                                                            </button>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            ) : (
                                                                <p className="italic text-gray-500 ml-2">No SSCs in this supercomponent. Drag SSCs here to add them.</p>
                                                            )}
                                                            <div className="mt-4 p-2 rounded" style={{
                                                                backgroundColor: settings.background === 'dark' ? '#4b5563' : '#e0f2fe'
                                                            }}>
                                                                <p className="text-xs">
                                                                    <strong>Note:</strong> In failure logic, a supercomponent is expanded as an OR gate. 
                                                                    If any component in the supercomponent fails, the supercomponent fails.
                                                                </p>
                                                            </div>
                                                            <div className="mt-4">
                                                                <button
                                                                    onClick={() => {
                                                                        if (confirm(`Delete supercomponent "${selectedItem.data.name}"? The SSCs it contains will not be deleted.`)) {
                                                                            setSuperComponents(prev => prev.filter(sc => sc.id !== selectedItem.data.id));
                                                                            setSelectedItem(null);
                                                                        }
                                                                    }}
                                                                    className="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700 text-xs"
                                                                >
                                                                    Delete Supercomponent
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </>
                                        ) : (
                                            <div className="text-center py-8 text-xs" style={{
                                                color: settings.background === 'dark' ? '#9ca3af' : '#6b7280'
                                            }}>
                                                Click on an SSC or Supercomponent to edit
                                            </div>
                                        )}
                                    </div>
                                </div>
                                </div>
                                {/* End of PANE E & F Container */}
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white text-xs py-1.5 px-4">
                        {loadedSysFile && <span>{loadedSysFile}</span>}
                    </footer>

                    {/* Modals */}
                    {showSettings && (
                        <SettingsModal
                            settings={settings}
                            onSave={(newSettings) => setSettings(newSettings)}
                            onClose={() => setShowSettings(false)}
                        />
                    )}

                    {showAddSSCModal && pendingSSC && (
                        <AddSSCModal
                            systemName={systemName}
                            sscType={pendingSSC.sscType}
                            componentType={pendingSSC.label}
                            failureModes={pendingSSC.failureModes}
                            existingSSCs={sscsInSystem}
                            onSave={handleAddSSC}
                            onCancel={() => {
                                setShowAddSSCModal(false);
                                setPendingSSC(null);
                            }}
                            backgroundStyle={backgroundStyle}
                        />
                    )}

                    {showAddSupercompModal && pendingSupercompSSC && (
                        <AddSupercomponentModal
                            onSave={handleAddSupercomp}
                            onCancel={() => {
                                setShowAddSupercompModal(false);
                                setPendingSupercompSSC(null);
                                setTargetSupercomp(null);
                            }}
                            backgroundStyle={backgroundStyle}
                        />
                    )}

                    {showNewSSCModal && (
                        <NewSSCModal
                            systemName={systemName}
                            onSave={handleNewSSC}
                            onCancel={() => {
                                setShowNewSSCModal(false);
                                setModalMode('ssc');
                            }}
                            backgroundStyle={backgroundStyle}
                            existingSSCs={sscsInSystem}
                            mode={modalMode}
                            selectedSSC={modalMode === 'fm' ? selectedItem?.data : null}
                            settings={settings}
                        />
                    )}
                    
                    {showEditSSCModal && selectedItem?.type === 'ssc' && (
                        <EditSSCModal
                            ssc={selectedItem.data}
                            onSave={handleEditSSC}
                            onCancel={() => setShowEditSSCModal(false)}
                            backgroundStyle={backgroundStyle}
                            existingSSCs={sscsInSystem}
                            systemName={systemName}
                            settings={settings}
                        />
                    )}

                    {showExtendedDescEditor && (
                        <RichTextEditor
                            value={systemDescription}
                            onChange={setSystemDescription}
                            onClose={() => setShowExtendedDescEditor(false)}
                            backgroundStyle={backgroundStyle}
                        />
                    )}
                    
                    {showExportModal && (
                        <ExportModal
                            onClose={() => setShowExportModal(false)}
                            sscsInSystem={sscsInSystem}
                            systemName={systemName}
                            systemLogic={systemLogic}
                            superComponents={superComponents}
                            parseSystemWorksExpression={parseSystemWorksExpression}
                            generateMinimalCutSets={generateMinimalCutSets}
                            calculateCutSetProbability={calculateCutSetProbability}
                            calculateMCUB={calculateMCUB}
                            settings={settings}
                        />
                    )}

                    {showReportModal && (
                        <ReportModal
                            onClose={() => setShowReportModal(false)}
                            backgroundStyle={backgroundStyle}
                            systemName={systemName}
                            systemDescription={systemDescription}
                            systemLogic={systemLogic}
                            sscsInSystem={sscsInSystem}
                            superComponents={superComponents}
                            hasFailureInfo={systemLogic && systemLogic.length > 1}
                            parseSystemWorksExpression={parseSystemWorksExpression}
                            generateMinimalCutSets={generateMinimalCutSets}
                            calculateCutSetProbability={calculateCutSetProbability}
                            calculateMCUB={calculateMCUB}
                            settings={settings}
                        />
                    )}

                    {showFailureAnalysis && (
                        <FailureAnalysisModal
                            onClose={() => setShowFailureAnalysis(false)}
                            settings={settings}
                            backgroundStyle={backgroundStyle}
                            fontSizeClass={fontSizeClass}
                            systemName={systemName}
                            systemDescription={systemDescription}
                            systemLogic={systemLogic}
                            sscsInSystem={sscsInSystem}
                            superComponents={superComponents}
                            linkedSystemProbabilities={linkedSystemProbabilities}
                        />
                    )}

                    {showFMEAModal && (
                        <FMEAModal
                            onClose={() => {
                                setShowFMEAModal(false);
                                setFmeaInitialSSC(null);
                            }}
                            backgroundStyle={backgroundStyle}
                            sscsInSystem={sscsInSystem}
                            setSscsInSystem={setSscsInSystem}
                            systemName={systemName}
                            initialSSC={fmeaInitialSSC}
                        />
                    )}

                    {showCheckScriptModal && (
                        <CheckScriptModal
                            unknownIdentifiers={unknownIdentifiers}
                            setUnknownIdentifiers={setUnknownIdentifiers}
                            onConfirm={handleAddSelectedAsSSCs}
                            onClose={() => {
                                setShowCheckScriptModal(false);
                                setUnknownIdentifiers([]);
                            }}
                            backgroundStyle={backgroundStyle}
                        />
                    )}

                    {showImportModal && (
                        <ImportModal
                            onChooseSEQ={() => { setShowImportModal(false); loadSEQFile(); }}
                            onChooseFTL={() => { setShowImportModal(false); loadFTLFile(); }}
                            onClose={() => setShowImportModal(false)}
                        />
                    )}

                    {showFTLImportModal && (
                        <FTLImportModal
                            pendingEvents={pendingFTLEvents}
                            setPendingEvents={setPendingFTLEvents}
                            onConfirm={handleAddSelectedFTLEvents}
                            onClose={() => { setShowFTLImportModal(false); setPendingFTLEvents([]); }}
                            backgroundStyle={backgroundStyle}
                            settings={settings}
                        />
                    )}

                    {showSEQBCModal && (
                        <SEQBCModal
                            pendingBCs={pendingSEQBCs}
                            setPendingBCs={setPendingSEQBCs}
                            onConfirm={handleAddSelectedSEQBCs}
                            onClose={() => {
                                setShowSEQBCModal(false);
                                setPendingSEQBCs([]);
                            }}
                            backgroundStyle={backgroundStyle}
                        />
                    )}

                    {showDuplicateSSCModal && duplicateSSCSource && (
                        <DuplicateSSCModal
                            ssc={duplicateSSCSource}
                            onSave={(newSSC) => {
                                setSscsInSystem(prev => [...prev, newSSC]);
                                setShowDuplicateSSCModal(false);
                                setDuplicateSSCSource(null);
                                setSelectedItem({ type: 'ssc', data: newSSC });
                            }}
                            onCancel={() => {
                                setShowDuplicateSSCModal(false);
                                setDuplicateSSCSource(null);
                            }}
                            backgroundStyle={backgroundStyle}
                            existingSSCs={sscsInSystem}
                            settings={settings}
                        />
                    )}
                </div>
            );
        }

        // Initialize Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KUREAS_SYS />);
    </script>
</body>
</html>
