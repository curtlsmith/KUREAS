                            <div className="flex gap-2 mb-3">
                                <button 
                                    onClick={selectAll}
                                    className="px-3 py-1 text-xs bg-blue-100 hover:bg-blue-200 rounded"
                                >
                                    Select All
                                </button>
                                <button 
                                    onClick={selectNone}
                                    className="px-3 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded"
                                >
                                    Select None
                                </button>
                            </div>
                            
                            <div className="max-h-64 overflow-y-auto border rounded mb-4" style={{
                                borderColor: backgroundStyle?.borderColor || '#d1d5db'
                            }}>
                                {pendingBCs.map((item, index) => (
                                    <label key={index} className="flex items-start gap-2 p-2 hover:bg-gray-50 border-b cursor-pointer" style={{
                                        borderColor: backgroundStyle?.borderColor || '#e5e7eb'
                                    }}>
                                        <input
                                            type="checkbox"
                                            checked={item.selected}
                                            onChange={() => toggleSelection(index)}
                                            className="w-4 h-4 mt-1"
                                        />
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2">
                                                <span className="font-mono text-sm font-semibold text-purple-700">{item.name}</span>
                                                {item.bcType && (
                                                    <span className="px-2 py-0.5 bg-gray-200 text-gray-700 text-xs rounded">{item.bcType}</span>
                                                )}
                                            </div>
                                            {item.description && (
                                                <p className="text-xs text-gray-600 mt-1">{item.description}</p>
                                            )}
                                        </div>
                                    </label>
                                ))}
                            </div>
                            
                            <div className="flex justify-between items-center">
                                <span className="text-sm text-gray-600">
                                    {selectedCount} of {pendingBCs.length} selected
                                </span>
                                <div className="flex gap-2">
                                    <button
                                        onClick={onClose}
                                        className="px-4 py-2 border rounded hover:bg-gray-100"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={onConfirm}
                                        disabled={selectedCount === 0}
                                        className="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        Import {selectedCount > 0 ? `${selectedCount} ` : ''}Boundary Condition{selectedCount !== 1 ? 's' : ''}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // FMEA Modal Component
        function FMEAModal({ onClose, backgroundStyle, sscsInSystem, setSscsInSystem, systemName, initialSSC }) {
            const [selectedSSC, setSelectedSSC] = useState(() => {
                // If initialSSC is provided, find it in sscsInSystem
                if (initialSSC) {
                    const found = sscsInSystem.find(ssc => ssc.id === initialSSC.id);
                    if (found) return found;
                }
                return sscsInSystem.length > 0 ? sscsInSystem[0] : null;
            });
            const [svgContent, setSvgContent] = useState('');
            const [editingNode, setEditingNode] = useState(null); // { type: 'ssc' | 'fm' | 'effect', sscId, fmIndex, effectIndex }
            const [showAddFMModal, setShowAddFMModal] = useState(false);
            const [showAddEffectModal, setShowAddEffectModal] = useState(false);
            const [currentFMIndex, setCurrentFMIndex] = useState(null);
            const [leftPaneWidth, setLeftPaneWidth] = useState(25);
            const [isResizing, setIsResizing] = useState(false);
            const containerRef = useRef(null);
            const diagramRef = useRef(null);
            
            // Zoom and pan state
            const [zoom, setZoom] = useState(1);
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [isPanning, setIsPanning] = useState(false);
            const [panStart, setPanStart] = useState({ x: 0, y: 0 });
            const diagramContainerRef = useRef(null);
            
            // Generate Mermaid code for the selected SSC
            const generateMermaidCode = useCallback(() => {
                if (!selectedSSC) return null;
                
                let code = 'flowchart TB\n';
                
                // Escape special characters for Mermaid
                const escape = (text) => {
                    if (!text) return '';
                    return text.replace(/"/g, "'").replace(/\n/g, ' ').replace(/[[\]]/g, '');
                };
                
                // Wrap text at specified character width
                const wrapText = (text, maxWidth = 40) => {
                    if (!text) return '';
                    const escaped = escape(text);
                    const words = escaped.split(' ');
                    const lines = [];
                    let currentLine = '';
                    
                    words.forEach(word => {
                        if (currentLine.length + word.length + 1 <= maxWidth) {
                            currentLine += (currentLine ? ' ' : '') + word;
                        } else {
                            if (currentLine) lines.push(currentLine);
                            currentLine = word;
                        }
                    });
                    if (currentLine) lines.push(currentLine);
                    
                    return lines.join('\\n');
                };
                
                // Top node - SSC
                const sscDescWrapped = selectedSSC.description ? wrapText(selectedSSC.description, 40) : '';
                const sscLabel = escape(selectedSSC.name) + (sscDescWrapped ? '\\n' + sscDescWrapped : '');
                code += `    SSC["${sscLabel}"]\n`;
                code += `    style SSC fill:#3b82f6,stroke:#1e40af,color:#fff\n`;
                
                // Failure modes
                const failureModes = selectedSSC.failureModes || [];
                
                if (failureModes.length === 0) {
                    // No failure modes - just show add button (stadium shape)
                    code += `    ADD_FM(["+ Add Failure Mode"])\n`;
                    code += `    SSC --> ADD_FM\n`;
                    code += `    style ADD_FM fill:#dcfce7,stroke:#16a34a,color:#166534\n`;
                } else {
                    // Start Failure Modes subgraph
                    code += `    subgraph FM_GROUP["Failure Modes"]\n`;
                    
                    failureModes.forEach((fm, fmIndex) => {
                        const fmId = `FM${fmIndex}`;
                        const fmLabel = escape(fm.mode || 'Unnamed') + (fm.data?.description ? '\\n' + escape(fm.data.description.substring(0, 40)) : '');
                        
                        // Show probability info
                        let probInfo = '';
                        if (fm.probabilityType === 'screened') {
                            probInfo = '\\n[SCREENED]';
                        } else if (fm.probabilityType === 'qualitative') {
                            probInfo = '\\n[' + (fm.qualitativeLevel || 'Unknown').toUpperCase() + ']';
                        } else if (fm.probabilityType === 'linkedSystem') {
                            probInfo = '\\n[LINKED: ' + escape((fm.linkedSystemName || 'System').substring(0, 20)) + ']';
                        } else if (fm.data?.mean) {
                            probInfo = '\\nP=' + fm.data.mean;
                        }
                        
                        code += `        ${fmId}["${fmLabel}${probInfo}"]\n`;
                    });
                    
                    // Add "Add Failure Mode" button inside subgraph (stadium shape)
                    code += `        ADD_FM(["+ Add Failure Mode"])\n`;
                    code += `    end\n`;
                    
                    // Style failure mode nodes
                    failureModes.forEach((fm, fmIndex) => {
                        code += `    style FM${fmIndex} fill:#fef3c7,stroke:#d97706,color:#92400e\n`;
                    });
                    code += `    style ADD_FM fill:#dcfce7,stroke:#16a34a,color:#166534\n`;
                    
                    // Connect SSC to failure modes
                    failureModes.forEach((fm, fmIndex) => {
                        code += `    SSC --> FM${fmIndex}\n`;
                    });
                    code += `    SSC --> ADD_FM\n`;
                    
                    // Check if there are any effects to show
                    const hasAnyEffects = failureModes.some(fm => 
                        fm.probabilityType !== 'screened' && ((fm.effects && fm.effects.length > 0) || true)
                    );
                    
                    if (hasAnyEffects) {
                        // Start Effects subgraph
                        code += `    subgraph EFF_GROUP["Effects on the System"]\n`;
                        
                        // Add effect nodes with text wrapping
                        failureModes.forEach((fm, fmIndex) => {
                            // Skip screened failure modes - no effects for them
                            if (fm.probabilityType === 'screened') return;
                            
                            const effects = fm.effects || [];
                            effects.forEach((effect, effIndex) => {
                                const effId = `EFF${fmIndex}_${effIndex}`;
                                const effLabel = wrapText(effect.description || 'No description', 35);
                                code += `        ${effId}["${effLabel}"]\n`;
                            });
                            
                            // Add "Add Effect" button for this failure mode (stadium shape)
                            const addEffectId = `ADD_EFF${fmIndex}`;
                            code += `        ${addEffectId}(["+ Add Effect"])\n`;
                        });
                        
                        code += `    end\n`;
                        
                        // Style effect nodes and add effect buttons
                        failureModes.forEach((fm, fmIndex) => {
                            if (fm.probabilityType === 'screened') return;
                            
                            const effects = fm.effects || [];
                            effects.forEach((effect, effIndex) => {
                                code += `    style EFF${fmIndex}_${effIndex} fill:#fce7f3,stroke:#db2777,color:#9d174d\n`;
                            });
                            code += `    style ADD_EFF${fmIndex} fill:#dcfce7,stroke:#16a34a,color:#166534\n`;
                        });
                        
                        // Connect failure modes to effects
                        failureModes.forEach((fm, fmIndex) => {
                            if (fm.probabilityType === 'screened') return;
                            
                            const effects = fm.effects || [];
                            effects.forEach((effect, effIndex) => {
                                code += `    FM${fmIndex} --> EFF${fmIndex}_${effIndex}\n`;
                            });
                            // Connect to add effect button
                            code += `    FM${fmIndex} --> ADD_EFF${fmIndex}\n`;
                        });
                    }
                }
                
                return code;
            }, [selectedSSC]);
            
            // Render the Mermaid diagram
            useEffect(() => {
                const renderDiagram = async () => {
                    const code = generateMermaidCode();
                    if (!code) {
                        setSvgContent('<div class="text-gray-500 p-4">Select an SSC to view its FMEA diagram</div>');
                        return;
                    }
                    
                    try {
                        mermaid.initialize({
                            startOnLoad: false,
                            theme: 'default',
                            flowchart: {
                                useMaxWidth: true,
                                htmlLabels: true,
                                curve: 'basis'
                            },
                            securityLevel: 'loose'
                        });
                        
                        const uniqueId = 'fmea-mermaid-' + Date.now();
                        const { svg } = await mermaid.render(uniqueId, code);
                        setSvgContent(svg);
                    } catch (err) {
                        console.error('Mermaid render error:', err);
                        setSvgContent(`<div class="text-red-500 p-4">Error rendering diagram: ${err.message}</div>`);
                    }
                };
                
                renderDiagram();
            }, [selectedSSC, generateMermaidCode]);
            
            // Add click handlers to nodes after SVG is rendered
            useEffect(() => {
                if (!diagramRef.current || !selectedSSC) return;
                
                const svg = diagramRef.current.querySelector('svg');
                if (!svg) return;
                
                // Find all node groups and add click handlers
                const nodeGroups = svg.querySelectorAll('.node');
                nodeGroups.forEach(nodeGroup => {
                    const nodeId = nodeGroup.id?.replace('flowchart-', '').split('-')[0];
                    if (!nodeId) return;
                    
                    nodeGroup.style.cursor = 'pointer';
                    
                    if (nodeId === 'SSC') {
                        nodeGroup.onclick = (e) => {
                            e.stopPropagation();
                            setEditingNode({ type: 'ssc', ssc: selectedSSC });
                        };
                    } else if (nodeId === 'ADD_FM' || nodeId === 'ADD') {
                        nodeGroup.onclick = (e) => {
                            e.stopPropagation();
                            setShowAddFMModal(true);
                        };
                    } else if (nodeId.startsWith('ADD_EFF')) {
                        const fmIndex = parseInt(nodeId.replace('ADD_EFF', ''));
                        nodeGroup.onclick = (e) => {
                            e.stopPropagation();
                            setCurrentFMIndex(fmIndex);
                            setShowAddEffectModal(true);
                        };
                    } else if (nodeId.startsWith('FM')) {
                        const fmIndex = parseInt(nodeId.replace('FM', ''));
                        nodeGroup.onclick = (e) => {
                            e.stopPropagation();
                            setEditingNode({ type: 'fm', ssc: selectedSSC, fmIndex });
                        };
                    } else if (nodeId.startsWith('EFF')) {
                        const parts = nodeId.replace('EFF', '').split('_');
                        const fmIndex = parseInt(parts[0]);
                        const effIndex = parseInt(parts[1]);
                        nodeGroup.onclick = (e) => {
                            e.stopPropagation();
                            setEditingNode({ type: 'effect', ssc: selectedSSC, fmIndex, effIndex });
                        };
                    }
                });
            }, [svgContent, selectedSSC]);
            
            // Handle adding a new failure mode
            const handleAddFailureMode = (fmData) => {
                if (!selectedSSC) return;
                
                const newFM = {
                    mode: fmData.name,
                    data: {
                        description: fmData.description,
                        mean: fmData.probabilityType === 'probability' ? fmData.probability : '',
                        units: 'd',
                        // Assign CNI distribution for numeric probability types
                        distribution_type: fmData.probabilityType === 'probability' ? 'CNI' : '',
                        distribution_shape_parameter: fmData.probabilityType === 'probability' ? fmData.probability : '',
                        distribution_scale_parameter: ''
                    },
                    probabilityType: fmData.probabilityType,
                    qualitativeLevel: fmData.qualitativeLevel,
                    applicable: fmData.probabilityType !== 'screened',
                    effects: []
                };
                
                setSscsInSystem(prev => prev.map(ssc => {
                    if (ssc.id === selectedSSC.id) {
                        const updated = {
                            ...ssc,
                            failureModes: [...(ssc.failureModes || []), newFM]
                        };
                        setSelectedSSC(updated);
                        return updated;
                    }
                    return ssc;
                }));
                
                setShowAddFMModal(false);
            };
            
            // Handle adding an effect to a failure mode
            const handleAddEffect = (effectData) => {
                if (!selectedSSC || currentFMIndex === null) return;
                
                setSscsInSystem(prev => prev.map(ssc => {
                    if (ssc.id === selectedSSC.id) {
                        const updatedFMs = [...(ssc.failureModes || [])];
                        if (updatedFMs[currentFMIndex]) {
                            updatedFMs[currentFMIndex] = {
                                ...updatedFMs[currentFMIndex],
                                effects: [...(updatedFMs[currentFMIndex].effects || []), { description: effectData.description }]
                            };
                        }
                        const updated = { ...ssc, failureModes: updatedFMs };
                        setSelectedSSC(updated);
                        return updated;
                    }
                    return ssc;
                }));
                
                setShowAddEffectModal(false);
                setCurrentFMIndex(null);
            };
            
            // Handle updating SSC info
            const handleUpdateSSC = (updatedData) => {
                if (!editingNode?.ssc) return;
                
                setSscsInSystem(prev => prev.map(ssc => {
                    if (ssc.id === editingNode.ssc.id) {
                        const updated = { ...ssc, ...updatedData };
                        setSelectedSSC(updated);
                        return updated;
                    }
                    return ssc;
                }));
                setEditingNode(null);
            };
            
            // Handle updating failure mode
            const handleUpdateFailureMode = (updatedData) => {
                if (!editingNode?.ssc || editingNode.fmIndex === undefined) return;
                
                setSscsInSystem(prev => prev.map(ssc => {
                    if (ssc.id === editingNode.ssc.id) {
                        const updatedFMs = [...(ssc.failureModes || [])];
                        if (updatedFMs[editingNode.fmIndex]) {
                            // Determine the mean value based on probability type
                            let meanValue = '';
                            let distType = '';
                            let shapeParam = '';
                            
                            if (updatedData.probabilityType === 'probability') {
                                meanValue = updatedData.probability;
                                distType = 'CNI';
                                shapeParam = updatedData.probability;
                            } else if (updatedData.probabilityType === 'qualitative') {
                                // Use settings to get qualitative probability values
                                const level = updatedData.qualitativeLevel || 'medium';
                                // Access settings from closure - we need to get from the parent
                                const settingsData = JSON.parse(localStorage.getItem('KUREAS_SYS_settings') || '{}');
                                switch(level) {
                                    case 'low': meanValue = settingsData.qualitativeProbLow || '1E-5'; break;
                                    case 'medium': meanValue = settingsData.qualitativeProbMedium || '1E-3'; break;
                                    case 'high': meanValue = settingsData.qualitativeProbHigh || '1E-1'; break;
                                    default: meanValue = settingsData.qualitativeProbMedium || '1E-3';
                                }
                                distType = 'CNI';
                                shapeParam = meanValue;
                            } else if (updatedData.probabilityType === 'linkedSystem') {
                                meanValue = 'LINKED';
                                distType = 'LINKED';
                                shapeParam = '';
                            }
                            // For screened, leave everything empty
                            
                            updatedFMs[editingNode.fmIndex] = {
                                ...updatedFMs[editingNode.fmIndex],
                                mode: updatedData.name,
                                data: {
                                    ...updatedFMs[editingNode.fmIndex].data,
                                    description: updatedData.description,
                                    mean: meanValue,
                                    distribution_type: distType,
                                    distribution_shape_parameter: shapeParam,
                                    distribution_scale_parameter: ''
                                },
                                probabilityType: updatedData.probabilityType,
                                qualitativeLevel: updatedData.qualitativeLevel,
                                linkedSystemFile: updatedData.linkedSystemFile,
                                linkedSystemName: updatedData.linkedSystemName,
                                applicable: updatedData.probabilityType !== 'screened'
                            };
                        }
                        const updated = { ...ssc, failureModes: updatedFMs };
                        setSelectedSSC(updated);
                        return updated;
                    }
                    return ssc;
                }));
                setEditingNode(null);
            };
            
            // Handle updating effect
            const handleUpdateEffect = (updatedData) => {
                if (!editingNode?.ssc || editingNode.fmIndex === undefined || editingNode.effIndex === undefined) return;
                
                setSscsInSystem(prev => prev.map(ssc => {
                    if (ssc.id === editingNode.ssc.id) {
                        const updatedFMs = [...(ssc.failureModes || [])];
                        if (updatedFMs[editingNode.fmIndex]?.effects?.[editingNode.effIndex] !== undefined) {
                            updatedFMs[editingNode.fmIndex].effects[editingNode.effIndex] = { description: updatedData.description };
                        }
                        const updated = { ...ssc, failureModes: updatedFMs };
                        setSelectedSSC(updated);
                        return updated;
                    }
                    return ssc;
                }));
                setEditingNode(null);
            };
            
            // Handle deleting failure mode
            const handleDeleteFailureMode = () => {
                if (!editingNode?.ssc || editingNode.fmIndex === undefined) return;
                
                if (!confirm('Are you sure you want to delete this failure mode and all its effects?')) return;
                
                setSscsInSystem(prev => prev.map(ssc => {
                    if (ssc.id === editingNode.ssc.id) {
                        const updatedFMs = ssc.failureModes.filter((_, idx) => idx !== editingNode.fmIndex);
                        const updated = { ...ssc, failureModes: updatedFMs };
                        setSelectedSSC(updated);
                        return updated;
                    }
                    return ssc;
                }));
                setEditingNode(null);
            };
            
            // Handle deleting effect
            const handleDeleteEffect = () => {
                if (!editingNode?.ssc || editingNode.fmIndex === undefined || editingNode.effIndex === undefined) return;
                
                if (!confirm('Are you sure you want to delete this effect?')) return;
                
                setSscsInSystem(prev => prev.map(ssc => {
                    if (ssc.id === editingNode.ssc.id) {
                        const updatedFMs = [...(ssc.failureModes || [])];
                        if (updatedFMs[editingNode.fmIndex]?.effects) {
                            updatedFMs[editingNode.fmIndex].effects = updatedFMs[editingNode.fmIndex].effects.filter((_, idx) => idx !== editingNode.effIndex);
                        }
                        const updated = { ...ssc, failureModes: updatedFMs };
                        setSelectedSSC(updated);
                        return updated;
                    }
                    return ssc;
                }));
                setEditingNode(null);
            };
            
            // Resize handlers
            const handleResizeStart = (e) => {
                e.preventDefault();
                setIsResizing(true);
            };
            
            useEffect(() => {
                if (!isResizing) return;
                
                const handleMouseMove = (e) => {
                    if (containerRef.current) {
                        const rect = containerRef.current.getBoundingClientRect();
                        const percentage = ((e.clientX - rect.left) / rect.width) * 100;
                        setLeftPaneWidth(Math.max(15, Math.min(40, percentage)));
                    }
                };
                
                const handleMouseUp = () => setIsResizing(false);
                
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
                
                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isResizing]);
            
            // Zoom handler (mouse wheel)
            const handleWheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                setZoom(prev => Math.max(0.25, Math.min(3, prev + delta)));
            };
            
            // Pan handlers (mouse drag)
            const handlePanStart = (e) => {
                // Only start panning on middle mouse button or if holding space
                if (e.button === 1 || e.button === 0) {
                    setIsPanning(true);
                    setPanStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
                }
            };
            
            const handlePanMove = (e) => {
                if (!isPanning) return;
                setPan({
                    x: e.clientX - panStart.x,
                    y: e.clientY - panStart.y
                });
            };
            
            const handlePanEnd = () => {
                setIsPanning(false);
            };
            
            // Reset zoom and pan
            const handleResetView = () => {
                setZoom(1);
                setPan({ x: 0, y: 0 });
            };
            
            // Reset zoom/pan when SSC changes
            useEffect(() => {
                setZoom(1);
                setPan({ x: 0, y: 0 });
            }, [selectedSSC?.id]);
            
            // Copy to clipboard state
            const [copyStatus, setCopyStatus] = useState('');
            
            // Copy diagram to clipboard as PNG
            const handleCopyToClipboard = async () => {
                if (!diagramRef.current || !svgContent) {
                    setCopyStatus('No diagram to copy');
                    setTimeout(() => setCopyStatus(''), 2000);
                    return;
                }
                
                try {
                    const svg = diagramRef.current.querySelector('svg');
                    if (!svg) {
                        setCopyStatus('No SVG found');
                        setTimeout(() => setCopyStatus(''), 2000);
                        return;
                    }
                    
                    // Clone and prepare SVG
                    const svgClone = svg.cloneNode(true);
                    svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                    
                    // Get dimensions
                    const bbox = svg.getBoundingClientRect();
                    const width = bbox.width || 800;
                    const height = bbox.height || 600;
                    
                    // Serialize SVG
                    const serializer = new XMLSerializer();
                    const svgString = serializer.serializeToString(svgClone);
                    const svgDataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
                    
                    // Create canvas and draw
                    const canvas = document.createElement('canvas');
                    const scale = 2; // Higher resolution
                    canvas.width = width * scale;
                    canvas.height = height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    const img = new Image();
                    img.onload = async () => {
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        try {
                            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                            await navigator.clipboard.write([
                                new ClipboardItem({ 'image/png': blob })
                            ]);
                            setCopyStatus('Copied!');
                            setTimeout(() => setCopyStatus(''), 2000);
                        } catch (err) {
                            console.error('Clipboard write failed:', err);
                            setCopyStatus('Copy failed');
                            setTimeout(() => setCopyStatus(''), 2000);
                        }
                    };
                    img.onerror = () => {
                        setCopyStatus('Image load failed');
                        setTimeout(() => setCopyStatus(''), 2000);
                    };
                    img.src = svgDataUrl;
                } catch (err) {
                    console.error('Copy to clipboard error:', err);
                    setCopyStatus('Error: ' + err.message);
                    setTimeout(() => setCopyStatus(''), 2000);
                }
            };
            
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div 
                        ref={containerRef}
                        className="bg-white rounded-lg shadow-xl" 
                        style={{ 
                            width: '90vw', 
                            height: '85vh',
                            maxWidth: '1400px',
                            backgroundColor: backgroundStyle.paneBackground,
                            color: backgroundStyle.color
                        }}
                        onClick={e => e.stopPropagation()}
                    >
                        {/* Header */}
                        <div className="flex items-center justify-between p-4 border-b" style={{ borderColor: backgroundStyle.borderColor }}>
                            <div>
                                <h2 className="text-xl font-bold">Failure Modes and Effects Analysis (FMEA)</h2>
                                <p className="text-sm text-gray-600">System: {systemName || 'Untitled'}</p>
                            </div>
                            <button 
                                onClick={onClose}
                                className="text-gray-500 hover:text-gray-700 text-2xl"
                            >
                                &times;
                            </button>
                        </div>
                        
                        {/* Main Content */}
                        <div className="flex" style={{ height: 'calc(100% - 73px)' }}>
                            {/* Left Pane - SSC List */}
                            <div

        // Read-only FMEA Diagram Component for displaying in SSC details pane
        function SSCFMEADiagram({ ssc, settings, onClick }) {
            const [svgContent, setSvgContent] = useState('');
            const diagramRef = useRef(null);
            
            // Generate Mermaid code for the SSC (read-only version without add buttons)
            const generateReadOnlyMermaidCode = useCallback(() => {
                if (!ssc || !ssc.failureModes || ssc.failureModes.length === 0) return null;
                
                let code = 'flowchart TB\n';
                
                // Escape special characters for Mermaid
                const escape = (text) => {
                    if (!text) return '';
                    return text.replace(/"/g, "'").replace(/\n/g, ' ').replace(/[[\]]/g, '');
                };
                
                // Wrap text at specified character width
                const wrapText = (text, maxWidth = 40) => {
                    if (!text) return '';
                    const escaped = escape(text);
                    const words = escaped.split(' ');
                    const lines = [];
                    let currentLine = '';
                    
                    words.forEach(word => {
                        if (currentLine.length + word.length + 1 <= maxWidth) {
                            currentLine += (currentLine ? ' ' : '') + word;
                        } else {
                            if (currentLine) lines.push(currentLine);
                            currentLine = word;
                        }
                    });
                    if (currentLine) lines.push(currentLine);
                    
                    return lines.join('\\n');
                };
                
                // Top node - SSC with word-wrapped description
                const sscDescWrapped = ssc.description ? wrapText(ssc.description, 40) : '';
                const sscLabel = escape(ssc.name) + (sscDescWrapped ? '\\n' + sscDescWrapped : '');
                code += `    SSC["${sscLabel}"]\n`;
                code += `    style SSC fill:#3b82f6,stroke:#1e40af,color:#fff\n`;
                
                const failureModes = ssc.failureModes || [];
                
                // Start Failure Modes subgraph
                code += `    subgraph FM_GROUP["Failure Modes"]\n`;
                
                failureModes.forEach((fm, fmIndex) => {
                    const fmId = `FM${fmIndex}`;
                    const fmLabel = escape(fm.mode || 'Unnamed') + (fm.data?.description ? '\\n' + escape(fm.data.description.substring(0, 30)) : '');
                    
                    // Show probability info
                    let probInfo = '';
                    if (fm.probabilityType === 'screened') {
                        probInfo = '\\n[SCREENED]';
                    } else if (fm.probabilityType === 'qualitative') {
                        probInfo = '\\n[' + (fm.qualitativeLevel || 'Unknown').toUpperCase() + ']';
                    } else if (fm.probabilityType === 'linkedSystem') {
                        probInfo = '\\n[LINKED: ' + escape((fm.linkedSystemName || 'System').substring(0, 20)) + ']';
                    } else if (fm.data?.mean) {
                        probInfo = '\\nP=' + fm.data.mean;
                    }
                    
                    code += `        ${fmId}["${fmLabel}${probInfo}"]\n`;
                });
                
                code += `    end\n`;
                
                // Style failure mode nodes
                failureModes.forEach((fm, fmIndex) => {
                    code += `    style FM${fmIndex} fill:#fef3c7,stroke:#d97706,color:#92400e\n`;
                });
                
                // Connect SSC to failure modes
                failureModes.forEach((fm, fmIndex) => {
                    code += `    SSC --> FM${fmIndex}\n`;
                });
                
                // Check if there are any effects to show (excluding screened)
                const hasAnyEffects = failureModes.some(fm => 
                    fm.probabilityType !== 'screened' && fm.effects && fm.effects.length > 0
                );
                
                if (hasAnyEffects) {
                    // Start Effects subgraph
                    code += `    subgraph EFF_GROUP["Effects on the System"]\n`;
                    
                    // Add effect nodes with text wrapping
                    failureModes.forEach((fm, fmIndex) => {
                        // Skip screened failure modes - no effects for them
                        if (fm.probabilityType === 'screened') return;
                        
                        const effects = fm.effects || [];
                        effects.forEach((effect, effIndex) => {
                            const effId = `EFF${fmIndex}_${effIndex}`;
                            const effLabel = wrapText(effect.description || 'No description', 35);
                            code += `        ${effId}["${effLabel}"]\n`;
                        });
                    });
                    
                    code += `    end\n`;
                    
                    // Style effect nodes
                    failureModes.forEach((fm, fmIndex) => {
                        if (fm.probabilityType === 'screened') return;
                        
                        const effects = fm.effects || [];
                        effects.forEach((effect, effIndex) => {
                            code += `    style EFF${fmIndex}_${effIndex} fill:#fce7f3,stroke:#db2777,color:#9d174d\n`;
                        });
                    });
                    
                    // Connect failure modes to effects
                    failureModes.forEach((fm, fmIndex) => {
                        if (fm.probabilityType === 'screened') return;
                        
                        const effects = fm.effects || [];
                        effects.forEach((effect, effIndex) => {
                            code += `    FM${fmIndex} --> EFF${fmIndex}_${effIndex}\n`;
                        });
                    });
                }
                
                return code;
            }, [ssc]);
            
            // Render the Mermaid diagram
            useEffect(() => {
                const renderDiagram = async () => {
                    const code = generateReadOnlyMermaidCode();
                    if (!code) {
                        setSvgContent('');
                        return;
                    }
                    
                    try {
                        mermaid.initialize({
                            startOnLoad: false,
                            theme: 'default',
                            flowchart: {
                                useMaxWidth: true,
                                htmlLabels: true,
                                curve: 'basis'
                            },
                            securityLevel: 'loose'
                        });
                        
                        const uniqueId = 'fmea-readonly-' + (ssc?.id || 'unknown') + '-' + Date.now();
                        const { svg } = await mermaid.render(uniqueId, code);
                        setSvgContent(svg);
                    } catch (err) {
                        console.error('Mermaid render error:', err);
                        setSvgContent('');
                    }
                };
                
                renderDiagram();
            }, [ssc, generateReadOnlyMermaidCode]);
            
            if (!svgContent) return null;
            
            return (
                <div 
                    className="mt-3 p-2 border rounded cursor-pointer hover:border-blue-400 transition-colors" 
                    style={{
                        backgroundColor: settings?.background === 'dark' ? '#1f2937' : '#f9fafb',
                        borderColor: settings?.background === 'dark' ? '#4b5563' : '#d1d5db',
                        height: '100%',
                        display: 'flex',
                        flexDirection: 'column'
                    }}
                    onClick={onClick}
                    title="Click to open FMEA Editor"
                >
                    <div className="flex justify-between items-center mb-2 flex-shrink-0">
                        <p className="font-bold text-xs">FMEA Diagram:</p>
                        <span className="text-xs text-blue-600 hover:text-blue-800">Click to edit</span>
                    </div>
                    <div 
                        ref={diagramRef}
                        className="overflow-auto flex-1 min-h-0"
                        dangerouslySetInnerHTML={{ __html: svgContent }}
                    />
                </div>
            );
        }

                    line = line.trim();
                    
                    // Skip empty lines

                    // Skip comments
                    if (line.startsWith('*')) continue;
                    
                    // Check for source name
                    if (line.toLowerCase().startsWith('source name:')) {

                                    }
                                    const components = json.components || [];
                                    sources = [{ name: `FMEA DB: ${json.systemName || file.name}`, description: `Exported ${json.exportedAt || ''}` }];
                                    
                                    // Convert fmeaDB components into relDB-compatible reliability data rows
                                    data = [];
                                    for (const comp of components) {
                                        const fms = (comp.failureModes || []).filter(fm => fm.applicable !== false);
                                        if (fms.length === 0) {
                                            data.push({
                                                index: data.length + 1,
                                                system: comp.system || json.systemName || '',
                                                ssc_type: comp.sscType || '',
                                                component_type: comp.label || comp.name,
                                                failure_mode: 'N/A',
                                                description: comp.description || '',
                                                units: 'd',
                                                distribution_type: 'Lognormal',
                                                mean: '',
                                                distribution_shape_parameter: '',
                                                distribution_scale_parameter: '',
                                                // Extra FMEA fields stored for tree display
                                                _fmeaName: comp.name,
                                                _fmeaData: comp
                                            });
                                        } else {
                                            for (const fm of fms) {
                                                data.push({
                                                    index: data.length + 1,
                                                    system: comp.system || json.systemName || '',
                                                    ssc_type: comp.sscType || '',
                                                    component_type: comp.label || comp.name,
                                                    failure_mode: fm.mode || 'Fails to Operate',
                                                    description: fm.data?.description || fm.description || comp.description || '',
                                                    units: fm.data?.units || 'd',
                                                    distribution_type: fm.data?.distributionType || 'Lognormal',
                                                    mean: fm.data?.mean || '',
                                                    distribution_shape_parameter: fm.data?.alpha || fm.data?.mean || '',
                                                    distribution_scale_parameter: fm.data?.beta || '',
                                                    _fmeaName: comp.name,
                                                    _fmeaData: comp
                                                });
                                            }
                                        }
                                    }
                                } else if (file.name.endsWith('.csv') || file.name.endsWith('.relDB')) {
                                    // Parse CSV / relDB
                                    const result = parseCSV(event.target.result);
                                    data = result.data;
                                    sources = result.source;

                                    data = json.reliability_data || json;
                                    sources = json.source || [];

                                // Check if source already exists

                                        node.isSource && 
                                        node.label === sources[0].name && 
                                        node.description === sources[0].description
                                    );

                                        );

                                    }
                                }
                                
                                // Append to existing data
                                const combinedData = [...reliabilityData, ...data];
                                setReliabilityData(combinedData);
                                
                                // Build new tree section
                                const newTree = buildTree(data, sources);
                                
                                // Append to existing tree
                                const combinedTree = [...treeData, ...newTree];
                                setTreeData(combinedTree);
                                
                                // Expand newly added nodes
                                const newNodeIds = newTree.map(node => node.id);
                                setExpandedNodes(prev => new Set([...prev, ...newNodeIds]));
                            } catch (err) {
                                alert('Error parsing file: ' + err.message);
                            }
                        };
                        reader.readAsText(file);
                    }

            // Save system definition

            // Load SEQ KNOW file to extract boundary conditions from the boundaryConditions section

            // Load FTL file and extract BASIC events as candidate SSCs
            const loadFTLFile = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.KNOW_FTL,.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];

                            const seen = new Set();

                            const events = [];
                            const collectBasic = (node) => {

                                if (node.type === 'BASIC' || node.type === 'EVENT') {
                                    const nm = node.label || node.name || '';
                                    if (nm && !seen.has(nm.toUpperCase()) && !existingNames.has(nm.toUpperCase())) {
                                        seen.add(nm.toUpperCase());
                                        const desc = (data.eventDescriptions && data.eventDescriptions[nm]) || node.description || '';
                                        const info = (data.eventInfo && data.eventInfo[nm]) || {};
                                        const prob = info.Calc_Prob ?? info.Prob ?? null;
                                        events.push({ name: nm, description: desc, probability: prob, selected: true, evalType: 'probability', source: file.name });
                                    }
                                }
                                (node.children || []).forEach(collectBasic);
                            };
                            (data.faultTrees || []).forEach(ft => collectBasic(ft.rootNode));
                            if (events.length === 0) {

            // Confirm import of selected FTL basic events as SSCs
            const handleAddSelectedFTLEvents = () => {

                if (selected.length === 0) { setShowFTLImportModal(false); return; }

                const probLow    = settings?.qualitativeProbLow    || '1E-5';
                const probMedium = settings?.qualitativeProbMedium || '1E-3';
                const probHigh   = settings?.qualitativeProbHigh   || '1E-1';

                const buildFailureMode = (ev) => {
                    const evalType = ev.evalType || 'probability';
                    const baseData = {
                        units: 'd',
                        description: ev.description || '',
                        distribution_type: 'Lognormal',

                    };

                        };
                    }
                    if (evalType === 'low' || evalType === 'medium' || evalType === 'high') {
                        const prob = evalType === 'low' ? probLow : evalType === 'high' ? probHigh : probMedium;
                        return {

                            mode: 'Failure', applicable: true,
                            probabilityType: 'qualitative',

                        };
                    }
                    // 'probability' — use FTL value if available

                    };

                setSscsInSystem(prev => [...prev, ...newSSCs]);
                setShowFTLImportModal(false);
                setPendingFTLEvents([]);
            };


            // Handle deleting a boundary condition
            const handleDeleteBoundaryCondition = (bcId) => {
                setBoundaryConditions(prev => prev.filter(bc => bc.id !== bcId));
            };

            // Check Script function - parse system logic and identify unknown identifiers
            const checkScript = () => {
                const errors = [];
                
                // Check for unbalanced parentheses - check each line separately
                let currentLineNum = 1;
                let lineOpenCount = 0;
                let lineCloseCount = 0;
                const parenErrorLines = [];
                
                systemLogic.forEach(token => {
                    if (token.type === 'eol') {
                        // End of line - check balance for this line
                        if (lineOpenCount !== lineCloseCount) {
                            parenErrorLines.push({
                                line: currentLineNum,
                                open: lineOpenCount,
                                close: lineCloseCount
                            });
                        }
                        currentLineNum++;
                        lineOpenCount = 0;
                        lineCloseCount = 0;
                    } else if (token.value === '(') {
                        lineOpenCount++;
                    } else if (token.value === ')') {
                        lineCloseCount++;
                    }
                });
                
                // Check last line if it doesn't end with eol
                if (lineOpenCount !== lineCloseCount) {
                    parenErrorLines.push({
                        line: currentLineNum,
                        open: lineOpenCount,
                        close: lineCloseCount
                    });
                }
                
                if (parenErrorLines.length > 0) {
                    parenErrorLines.forEach(err => {
                        if (err.open > err.close) {
                            errors.push(`Line ${err.line}: Unbalanced parentheses - ${err.open - err.close} unclosed '(' found`);
                        } else {
                            errors.push(`Line ${err.line}: Unbalanced parentheses - ${err.close - err.open} extra ')' found`);
                        }
                    });
                }
                
                // Get all known identifiers
                const knownKeywords = new Set(keywords.map(k => k.toUpperCase()));
                const knownSSCs = new Set(sscsInSystem.map(ssc => ssc.name.toUpperCase()));
                const knownSupercomps = new Set(superComponents.map(sc => sc.name.toUpperCase()));
                const knownBCs = new Set(boundaryConditions.map(bc => bc.name.toUpperCase()));
                
                // Get variables defined in the script (tokens that end with =)
                const definedVariables = new Set();
                systemLogic.forEach(token => {
                    // Skip comment tokens
                    if (token.type === 'comment') return;
                    
                    if (token.type === 'variable' && token.value.endsWith('=')) {
                        definedVariables.add(token.value.toUpperCase());
                        // Also add without the = for reference
                        definedVariables.add(token.value.slice(0, -1).toUpperCase());
                    }
                });
                
                // Get modules defined in the script
                const definedModules = new Set();
                systemLogic.forEach(token => {
                    if (token.type === 'module_def') {
                        definedModules.add(token.value.toUpperCase());
                    }
                });
                
                // Find unknown identifiers
                const unknowns = new Set();
                systemLogic.forEach(token => {
                    // Skip comment tokens
                    if (token.type === 'comment') return;
                    
                    // Skip module definitions and references (they are self-contained)
                    if (token.type === 'module_def') return;
                    if (token.type === 'module_ref') {
                        // Check if module is defined
                        if (!definedModules.has(token.value.toUpperCase())) {
                            unknowns.add('[' + token.value + ']');
                        }
                        return;
                    }
                    
                    if (token.type === 'identifier' || token.type === 'ssc' || token.type === 'unknown' || token.type === 'text') {
                        const val = token.value.toUpperCase();
                        // Check if it's not a number
                        if (!/^\d+$/.test(token.value)) {
                            // Check if it's not known (including module names without brackets)
                            if (!knownKeywords.has(val) && 
                                !knownSSCs.has(val) && 
                                !knownSupercomps.has(val) && 
                                !knownBCs.has(val) &&
                                !definedVariables.has(val) &&
                                !definedVariables.has(val + '=') &&
                                !definedModules.has(val)) {
                                unknowns.add(token.value);
                            }
                        }
                    }
                });
                
                // Show errors first if any
                if (errors.length > 0) {
                    alert('Script errors found:\n\n' + errors.join('\n'));
                    return; // Don't proceed to unknown identifiers if there are syntax errors
                }
                
                if (unknowns.size === 0) {
                    alert('Script check complete. No errors or unknown identifiers found.');
                } else {
                    // Show modal to let user select which ones to add as SSCs
                    setUnknownIdentifiers(Array.from(unknowns).map(name => ({
                        name,
                        selected: false
                    })));
                    setShowCheckScriptModal(true);
                }

            // Handle adding selected unknown identifiers as SSCs

                    };

            // Handle supercomponent drop

                        setTargetSupercomp(targetSupercompId);
                        
                        if (targetSupercompId) {

                            setSuperComponents(prev => prev.map(sc => {
                                if (sc.id === targetSupercompId) {

                                        ...sc,
                                        sscs: [...sc.sscs, data.data]
                                    };

                            setShowAddSupercompModal(true);

                    }
                } catch (err) {

                        // Handle new SSC creation or failure mode addition
            const handleNewSSC = (data, isUpdate = false) => {
                if (isUpdate) {
                    // Update existing SSC with new failure mode
                    setSscsInSystem(prev => prev.map(s => s.id === data.id ? data : s));
                    // Update selectedItem if it's the same SSC

                } else {

                    setSscsInSystem(prev => [...prev, data]);
                }
                setShowNewSSCModal(false);
                setModalMode('ssc');
            };
            
            // Handle editing an existing SSC
            const handleEditSSC = (updatedSSC) => {
                setSscsInSystem(prev => prev.map(s => s.id === updatedSSC.id ? updatedSSC : s));
                // Update selectedItem if it's the same SSC
                if (selectedItem?.data.id === updatedSSC.id) {
                    setSelectedItem({ type: 'ssc', data: updatedSSC });
                }
                setShowEditSSCModal(false);
            };

            // Handle supercomponent creation
            const handleAddSupercomp = ({ name, description }) => {
                if (pendingSupercompSSC) {
                    const newSupercomp = {
                        id: Date.now(),
                        name: name,
                        description: description,

                    };

                    setShowAddSupercompModal(false);
                    setPendingSupercompSSC(null);
                    setTargetSupercomp(null);
                }
            };

            // Delete SSC from system
            const deleteSSC = (sscId) => {
                if (confirm('Are you sure you want to remove this SSC from the system?')) {
                    setSscsInSystem(prev => prev.filter(s => s.id !== sscId));
                    // Also remove from any supercomponents
                    setSuperComponents(prev => prev.map(sc => ({
                        ...sc,

                    })).filter(sc => sc.sscs.length > 0)); // Remove empty supercomponents
                    if (selectedItem?.type === 'ssc' && selectedItem?.data.id === sscId) {

                    }
                }
            };

            // Delete supercomponent
            const deleteSupercomp = (supercompId) => {
                if (confirm('Are you sure you want to delete this supercomponent?')) {
                    setSuperComponents(prev => prev.filter(sc => sc.id !== supercompId));
                    if (selectedItem?.type === 'supercomp' && selectedItem?.data.id === supercompId) {
                        setSelectedItem(null);
                    }
                }
            };

            // Evaluate a linked system file and return its failure probability (MCUB)
            const evaluateLinkedSystemFile = (fileContent, linkedSettings) => {
                try {
                    const data = JSON.parse(fileContent);
                    const linkedSSCs = data.sscsInSystem || [];
                    const linkedSuperComps = data.superComponents || [];
                    const linkedSystemLogic = data.systemLogic || [];
                    const linkedSystemName = data.systemName || 'Linked System';
                    
                    // Build basic event data for linked system
                    const linkedBasicEventData = {};
                    
                    const getLinkedFailureModeProbability = (fm) => {
                        if (fm.probabilityType === 'qualitative') {
                            const level = fm.qualitativeLevel || 'medium';
                            let probStr;
                            switch(level) {
                                case 'low': probStr = linkedSettings?.qualitativeProbLow || '1E-5'; break;
                                case 'medium': probStr = linkedSettings?.qualitativeProbMedium || '1E-3'; break;
                                case 'high': probStr = linkedSettings?.qualitativeProbHigh || '1E-1'; break;
                                default: probStr = linkedSettings?.qualitativeProbMedium || '1E-3';
                            }
                            return parseFloat(probStr);
                        }
                        if (fm.probabilityType === 'screened') {

                        }
                        // Numeric
                        const failureRate = parseFloat(fm.data?.mean || 0);
                        const units = fm.data?.units;
                        if (units === 'd' && !isNaN(failureRate)) return failureRate;
                        if (units === 'h' && !isNaN(failureRate)) {
                            const t = fm.timeToOperate || 24;
                            return 1 - Math.exp(-failureRate * t);
                        }
                        if (units === 'y' && !isNaN(failureRate)) {

                            return 1 - Math.exp(-failureRate * t / 8760);
                        }
                        return !isNaN(failureRate) ? failureRate : 0;
                    };
                    
                    for (const ssc of linkedSSCs) {

            // Store the editor's insertAtCursor function

            // Parse and translate system works expression to failure logic
            // ==================== CUT SET GENERATION AND QUANTIFICATION ====================
            // Based on KUREAS-FTA fault tree solver
            
            /**
             * Generate minimal cut sets from fault tree structure
             * @param {Object} tree - Fault tree root node
             * @param {Object} basicEventData - Map of basic event names to probability data
             * @returns {Array} Array of minimal cut sets (each cut set is an array of event names)
             */
            function generateMinimalCutSets(tree, basicEventData = {}) {
                if (!tree) return [];
                
                // Generate all cut sets using BFS
                const allCutSets = generateCutSets(tree, basicEventData);
                
                // Minimize the cut sets
                const minimalCutSets = minimizeCutSets(allCutSets);
                
                return minimalCutSets;
            }
            
            /**
             * Generate all cut sets from fault tree using BFS
             */
            function generateCutSets(tree, basicEventData = {}) {
                const cutSets = [];
                const queue = [[tree]];
                
                while (queue.length > 0) {
                    const path = queue.shift();
                    const lastNode = path[path.length - 1];
                    
                    if (!lastNode) continue;
                    
                    if (lastNode.type === 'BASIC' || lastNode.type === 'BASIC_NOT') {
                        // Check for house events: prob=0 eliminates this path; prob=1 it's always present
                        const eventData = basicEventData[lastNode.label];
                        if (eventData && eventData.isHouseEvent && eventData.houseState === 'FALSE') {
                            // Probability 0: this path can never occur — discard it
                            continue;
                        }
                        // Reached basic event - extract all basic events from path
                        const cutSet = path
                            .filter(node => node.type === 'BASIC' || node.type === 'BASIC_NOT')
                            .map(node => node.label);
                        // Remove duplicates (X AND X = X)
                        const uniqueCutSet = [...new Set(cutSet)];
                        if (uniqueCutSet.length > 0) {
                            cutSets.push(uniqueCutSet);
                        }
                        continue;
                    }
                    
                    if (!lastNode.children || lastNode.children.length === 0) {
                        continue;
                    }
                    
                    // Handle NOT gate: treat as a single "complemented" basic event
                    if (lastNode.type === 'NOT') {
                        // NOT gate: the child element being in the working state is the failure cause
                        // Represent as a complemented basic event labeled with the NOT gate label
                        const notEvent = {
                            type: 'BASIC_NOT',
                            label: lastNode.label,
                            isComplement: true
                        };
                        const newPath = [...path.slice(0, -1), notEvent];
                        queue.push(newPath);
                        continue;
                    }
                    
                    // Handle different gate types
                    if (lastNode.type === 'OR') {
                        // OR gate: each child becomes a separate path
                        for (const child of lastNode.children) {
                            const newPath = [...path];
                            if (child.type === 'BASIC' || child.type === 'BASIC_NOT') {
                                newPath.push(child);
                                queue.push(newPath);
                            } else {
                                newPath[newPath.length - 1] = child;
                                queue.push(newPath);
                            }
                        }
                    } else if (lastNode.type === 'AND') {
                        // AND gate: all children must fail (expand combinatorially)
                        expandAndGate(path, lastNode.children, queue, basicEventData);
                    } else if (lastNode.type && lastNode.type.includes('/')) {
                        // Voting gate (e.g., "2/3" means 2 out of 3 must fail)
                        expandVotingGate(path, lastNode.children, lastNode.type, queue, basicEventData);
                    }
                }
                
                return cutSets;
            }
            
            /**
             * Expand AND gate - all children must fail
             */
            function expandAndGate(path, children, queue, basicEventData = {}) {
                // Generate all combinations where all children fail
                const childrenToProcess = children.map(child => {
                    if (child.type === 'BASIC' || child.type === 'BASIC_NOT') {
                        return [[child]];
                    } else {
                        // Recursively generate cut sets for this child
                        return generateCutSets(child, basicEventData);
                    }
                });
                
                // Cartesian product of all child cut sets
                const combinations = cartesianProduct(childrenToProcess);
                
                for (const combo of combinations) {
                    const newPath = path.slice(0, -1); // Remove AND gate
                    const flatCombo = combo.flat();
                    
                    // Add all basic events from the combination
                    for (const item of flatCombo) {
                        if (typeof item === 'object' && (item.type === 'BASIC' || item.type === 'BASIC_NOT')) {
                            newPath.push(item);
                        } else if (typeof item === 'string') {
                            newPath.push({ type: 'BASIC', label: item });
                        }
                    }
                    
                    queue.push(newPath);
                }
            }
            
            /**
             * Expand voting gate (k/n gate)
             */
            function expandVotingGate(path, children, gateType, queue, basicEventData = {}) {
                const match = gateType.match(/(\d+)\/(\d+)/);
                if (!match) return;
                
                const k = parseInt(match[1]); // Number that must fail
                const n = parseInt(match[2]); // Total number
                
                // Generate all combinations of k failures from n children
                const combinations = generateCombinations(children, k);
                
                for (const combo of combinations) {
                    const childrenToProcess = combo.map(child => {
                        if (child.type === 'BASIC' || child.type === 'BASIC_NOT') {
                            return [[child]];
                        } else {
                            return generateCutSets(child, basicEventData);
                        }
                    });
                    
                    // Cartesian product of selected children
                    const products = cartesianProduct(childrenToProcess);
                    
                    for (const prod of products) {
                        const newPath = path.slice(0, -1); // Remove voting gate
                        const flatProd = prod.flat();
                        
                        for (const item of flatProd) {
                            if (typeof item === 'object' && (item.type === 'BASIC' || item.type === 'BASIC_NOT')) {
                                newPath.push(item);
                            } else if (typeof item === 'string') {
                                newPath.push({ type: 'BASIC', label: item });
                            }
                        }
                        
                        queue.push(newPath);
                    }
                }
            }
            
            /**
             * Generate all combinations of k items from array
             */
            function generateCombinations(arr, k) {
                if (k === 0) return [[]];
                if (k > arr.length) return [];
                if (k === arr.length) return [arr];
                
                const result = [];
                
                function backtrack(start, current) {
                    if (current.length === k) {
                        result.push([...current]);
                        return;
                    }
                    
                    for (let i = start; i < arr.length; i++) {
                        current.push(arr[i]);
                        backtrack(i + 1, current);
                        current.pop();
                    }
                }
                
                backtrack(0, []);
                return result;
            }
            
            /**
             * Cartesian product of arrays
             */
            function cartesianProduct(arrays) {
                if (arrays.length === 0) return [[]];
                if (arrays.length === 1) return arrays[0].map(item => [item]);
                
                const result = [];
                const rest = cartesianProduct(arrays.slice(1));
                
                for (const item of arrays[0]) {
                    for (const restItem of rest) {
                        result.push([item, ...restItem]);
                    }
                }
                
                return result;
            }
            
            /**
             * Minimize cut sets by removing non-minimal sets
             */
            function minimizeCutSets(cutSets) {
                if (cutSets.length === 0) return [];
                
                // Convert to unique sets and sort by size
                const uniqueSets = [];
                const seenSets = new Set();
                
                for (const cutSet of cutSets) {
                    const sortedSet = cutSet.slice().sort();
                    const key = sortedSet.join(',');
                    if (!seenSets.has(key)) {
                        seenSets.add(key);
                        uniqueSets.push(sortedSet);
                    }
                }
                
                // Sort by size (smaller first)
                uniqueSets.sort((a, b) => a.length - b.length);
                
                // Remove non-minimal sets
                const minimal = [];
                for (let i = 0; i < uniqueSets.length; i++) {
                    let isMinimal = true;
                    
                    for (let j = 0; j < i; j++) {
                        if (uniqueSets[j].length > uniqueSets[i].length) break;
                        if (isSubset(uniqueSets[j], uniqueSets[i])) {
                            isMinimal = false;
                            break;
                        }
                    }
                    
                    if (isMinimal) {
                        minimal.push(uniqueSets[i]);
                    }
                }
                
                return minimal;
            }
            
            /**
             * Check if subset is a subset of superset
             */
            function isSubset(subset, superset) {
                if (subset.length > superset.length) return false;
                return subset.every(elem => superset.includes(elem));
            }
            
            /**
             * Calculate probability of a single cut set
             * Cut set probability = product of all event probabilities
             * Returns { probability: number|null, hasLinked: boolean, hasUnresolvedLinked: boolean, linkedEvents: string[] }
             */
            function calculateCutSetProbability(cutSet, basicEventData) {
                let prob = 1.0;
                let hasProbData = true;
                let hasLinked = false;
                let hasUnresolvedLinked = false;
                const linkedEvents = [];
                
                for (const eventName of cutSet) {
                    // Check if this is a NOT-prefixed complement event
                    const isComplement = eventName.startsWith('NOT-');
                    const baseName = isComplement ? eventName.slice(4) : eventName;
                    
                    const eventData = basicEventData[baseName] || basicEventData[eventName];
                    if (eventData) {
                        if (eventData.isHouseEvent) {
                            // House events: probability is exactly 0 or 1
                            // If complement (NOT), invert
                            const p = isComplement ? (1.0 - eventData.probability) : eventData.probability;
                            prob *= p;
                        } else if (eventData.isLinked) {
                            hasLinked = true;
                            linkedEvents.push(eventName);
                            if (eventData.linkedResolved && eventData.probability !== undefined && eventData.probability !== null) {
                                const p = isComplement ? (1.0 - eventData.probability) : eventData.probability;
                                prob *= p;
                            } else {
                                hasUnresolvedLinked = true;
                            }
                        } else if (eventData.probability !== undefined && eventData.probability !== null) {
                            const p = isComplement ? (1.0 - eventData.probability) : eventData.probability;
                            prob *= p;
                        } else {
                            hasProbData = false;
                        }
                    } else {
                        hasProbData = false;
                    }
                }
                
                if (hasUnresolvedLinked) {
