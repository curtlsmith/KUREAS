                    return { probability: null, hasLinked: true, hasUnresolvedLinked: true, linkedEvents };
                }
                
                return { probability: hasProbData ? prob : null, hasLinked, hasUnresolvedLinked: false, linkedEvents };
            }
            
            /**
             * Calculate MCUB (Minimal Cut Set Upper Bound)
             * MCUB = 1 - product((1 - P_i)) for all cut sets
             */
            function calculateMCUB(cutSetProbabilities) {
                if (cutSetProbabilities.length === 0) return null;
                if (cutSetProbabilities.some(p => p === null || p === undefined)) return null;
                
                let product = 1.0;
                for (const prob of cutSetProbabilities) {
                    product *= (1.0 - prob);
                }
                
                return 1.0 - product;
            }
            
            /**
             * Format probability for display
             */
            function formatProbability(prob, displayMode = '1') {
                if (prob === null || prob === undefined) return 'N/A';
                
                const digits = parseInt(displayMode) || 1;
                return prob.toExponential(digits);
            }
            
            // ==================== END CUT SET GENERATION ====================
            
            function parseSystemWorksExpression(tokens, systemName, superComponents = []) {
                // Extract variables first (old style with =)
                const variables = {};
                let i = 0;
                while (i < tokens.length) {
                    if (tokens[i].type === 'variable') {
                        const varName = tokens[i].value;
                        const varTokens = [];
                        i++;
                        while (i < tokens.length && tokens[i].type !== 'eol') {
                            varTokens.push(tokens[i]);
                            i++;
                        }
                        variables[varName] = varTokens;
                    }
                    i++;
                }
                
                // Extract modules (new style with [name] =)
                const modules = {};
                i = 0;
                while (i < tokens.length) {
                    if (tokens[i].type === 'module_def') {
                        const moduleName = tokens[i].value;
                        const moduleTokens = [];
                        i++;
                        while (i < tokens.length && tokens[i].type !== 'eol') {
                            moduleTokens.push(tokens[i]);
                            i++;
                        }
                        modules[moduleName.toUpperCase()] = {
                            name: moduleName,
                            tokens: moduleTokens
                        };
                    }
                    i++;
                }

                // Collect IF-THEN rules and IS TRUE/FALSE state assignments
                // These define house events and conditional overrides
                const houseEvents = {};   // elementName -> 'TRUE' | 'FALSE' | { condition, state }
                const ifThenRules = [];   // [{ conditionElement, conditionState, targetElement, targetState }]
                
                i = 0;
                while (i < tokens.length) {
                    // IF <element> WORKS/FAILS THEN <element> IS TRUE/FALSE/WORKS/FAILS
                    // IF <element> WORKS/FAILS THEN <element> FAILS
                    if (tokens[i].value === 'IF') {
                        const ruleTokens = [];
                        i++;
                        while (i < tokens.length && tokens[i].type !== 'eol') {
                            ruleTokens.push(tokens[i]);
                            i++;
                        }
                        // Parse: <condElem> WORKS|FAILS THEN <targetElem> IS TRUE|FALSE | FAILS | WORKS
                        const thenIdx = ruleTokens.findIndex(t => t.value === 'THEN');
                        if (thenIdx > 0) {
                            const condTokens = ruleTokens.slice(0, thenIdx);
                            const conseqTokens = ruleTokens.slice(thenIdx + 1);
                            
                            // Condition: <element> WORKS|FAILS
                            const condElemTokens = condTokens.filter(t => 
                                t.type !== 'keyword' || (t.value !== 'WORKS' && t.value !== 'FAILS'));
                            const condStateToken = condTokens.find(t => t.value === 'WORKS' || t.value === 'FAILS');
                            
                            // Consequence: <element> IS TRUE|FALSE  OR  <element> FAILS|WORKS
                            const isTrueIdx = conseqTokens.findIndex(t => t.value === 'IS TRUE');
                            const isFalseIdx = conseqTokens.findIndex(t => t.value === 'IS FALSE');
                            const failsIdx = conseqTokens.findIndex(t => t.value === 'FAILS');
                            const worksIdx = conseqTokens.findIndex(t => t.value === 'WORKS');
                            
                            let targetElemTokens = [];
                            let targetState = null;
                            
                            if (isTrueIdx >= 0) {
                                targetElemTokens = conseqTokens.slice(0, isTrueIdx);
                                targetState = 'TRUE';
                            } else if (isFalseIdx >= 0) {
                                targetElemTokens = conseqTokens.slice(0, isFalseIdx);
                                targetState = 'FALSE';
                            } else if (failsIdx >= 0) {
                                targetElemTokens = conseqTokens.slice(0, failsIdx);
                                targetState = 'FAILS';
                            } else if (worksIdx >= 0) {
                                targetElemTokens = conseqTokens.slice(0, worksIdx);
                                targetState = 'WORKS';
                            }
                            
                            if (condElemTokens.length > 0 && targetElemTokens.length > 0 && targetState) {
                                const condElemName = condElemTokens.map(t => t.value).join(' ').trim();
                                const targetElemName = targetElemTokens.map(t => t.value).join(' ').trim();
                                const condState = condStateToken ? condStateToken.value : 'FAILS';
                                
                                ifThenRules.push({
                                    conditionElement: condElemName,
                                    conditionState: condState,  // 'WORKS' or 'FAILS'
                                    targetElement: targetElemName,
                                    targetState: targetState    // 'TRUE', 'FALSE', 'FAILS', 'WORKS'
                                });
                            }
                        }
                        continue;
                    }
                    
                    // Standalone: <element> IS TRUE / <element> IS FALSE
                    if (tokens[i].value === 'IS TRUE' || tokens[i].value === 'IS FALSE') {
                        // Find the element before IS TRUE/FALSE on the same line
                        // Walk back to find last non-eol token before this
                        let elemIdx = i - 1;
                        while (elemIdx >= 0 && tokens[elemIdx].type === 'eol') elemIdx--;
                        if (elemIdx >= 0) {
                            const elemName = tokens[elemIdx].value;
                            houseEvents[elemName.toUpperCase()] = tokens[i].value === 'IS TRUE' ? 'TRUE' : 'FALSE';
                        }
                    }
                    
                    i++;
                }

                // Find all SYSTEM WORKS = expressions
                const systemWorksExpressions = [];
                i = 0;
                while (i < tokens.length) {
                    if (tokens[i].value === 'SYSTEM WORKS =') {
                        const exprTokens = [];
                        i++;
                        while (i < tokens.length && tokens[i].type !== 'eol') {
                            exprTokens.push(tokens[i]);
                            i++;
                        }
                        systemWorksExpressions.push(exprTokens);
                    }
                    i++;
                }

                if (systemWorksExpressions.length === 0) {
                    return null;
                }

                let gateCounter = 1;
                const gates = [];
                
                // Create a lookup map for supercomponents
                const supercompMap = {};
                superComponents.forEach(sc => {
                    supercompMap[sc.name.toUpperCase()] = sc;
                });
                
                // Process modules first to create their gates
                const moduleGates = {};
                for (const [moduleName, moduleData] of Object.entries(modules)) {
                    const result = translateWorksToFailure(moduleData.tokens, variables, gateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                    gateCounter = result.nextGateId;
                    
                    const moduleGateName = moduleData.name;
                    if (result.isGate) {
                        const lastGate = gates[gates.length - 1];
                        if (lastGate) {
                            lastGate.label = moduleGateName;
                            lastGate.id = moduleGateName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                            moduleGates[moduleName] = lastGate.label;
                        }
                    } else if (result.items && result.items.length > 0) {
                        const gateType = result.items.length === 1 ? 'OR' : 'OR';
                        gates.push({
                            id: moduleGateName.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                            label: moduleGateName,
                            type: gateType,
                            children: result.items
                        });
                        moduleGates[moduleName] = moduleGateName;
                    }
                }

                // STEP 1: Create top gate
                let topNode;
                if (systemWorksExpressions.length > 1) {
                    const topChildren = [];
                    for (let idx = 0; idx < systemWorksExpressions.length; idx++) {
                        const gateName = `GATE-${gateCounter}`;
                        topChildren.push(gateName);
                        const result = translateWorksToFailure(systemWorksExpressions[idx], variables, gateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                        gateCounter = result.nextGateId;
                    }
                    topNode = {
                        id: 'top',
                        label: `${systemName || 'System'} fails`,
                        type: 'AND',
                        children: topChildren
                    };
                } else {
                    const result = translateWorksToFailure(systemWorksExpressions[0], variables, gateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                    
                    if (result.isGate) {
                        topNode = {
                            id: 'top',
                            label: `${systemName || 'System'} fails`,
                            type: 'OR',
                            children: [result.gateName]
                        };
                    } else {
                        topNode = {
                            id: 'top',
                            label: `${systemName || 'System'} fails`,
                            type: result.gateType || 'OR',
                            children: result.items || []
                        };
                    }
                }

                // Convert to tree structure
                return buildFailureTree(topNode, gates);
            }

            function translateWorksToFailure(tokens, variables, startGateId, gates, modules = {}, moduleGates = {}, supercompMap = {}, houseEvents = {}, ifThenRules = []) {
                // Expand variables, replace module references with gate references, and expand supercomponents
                const expandedTokens = [];
                let localGateCounter = startGateId;
                
                for (const token of tokens) {
                    if (token.type === 'variable' && variables[token.value]) {
                        expandedTokens.push(...variables[token.value]);
                    } else if (token.type === 'module_ref') {
                        const moduleKey = token.value.toUpperCase();
                        if (moduleGates[moduleKey]) {
                            expandedTokens.push({ type: 'gateRef', value: moduleGates[moduleKey] });
                        } else {
                            expandedTokens.push({ type: 'text', value: token.value });
                        }
                    } else if (token.type === 'supercomp') {
                        const supercompKey = token.value.toUpperCase();
                        const supercomp = supercompMap[supercompKey];
                        if (supercomp && supercomp.sscs && supercomp.sscs.length > 0) {
                            const supercompGateName = token.value;
                            gates.push({
                                id: supercompGateName.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                                label: supercompGateName,
                                type: 'OR',
                                children: supercomp.sscs.map(ssc => ssc.name)
                            });
                            expandedTokens.push({ type: 'gateRef', value: supercompGateName });
                        } else {
                            expandedTokens.push({ type: 'text', value: token.value });
                        }
                    } else if ((token.type === 'identifier' || token.type === 'text' || token.type === 'unknown' || token.type === 'ssc') && 
                               moduleGates[token.value.toUpperCase()]) {
                        expandedTokens.push({ type: 'gateRef', value: moduleGates[token.value.toUpperCase()] });
                    } else {
                        expandedTokens.push(token);
                    }
                }

                // ── Handle UNLESS: split on UNLESS keyword ──────────────────────────────
                // SYSTEM WORKS = <expr> UNLESS <condition>
                // Failure: (expr fails) OR (condition holds → house event TRUE)
                const unlessIdx = expandedTokens.findIndex(t => t.value === 'UNLESS');
                if (unlessIdx >= 0) {
                    const baseTokens = expandedTokens.slice(0, unlessIdx);
                    const condTokens = expandedTokens.slice(unlessIdx + 1);
                    
                    // Build failure gate for base expression
                    const baseResult = translateWorksToFailure(baseTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                    localGateCounter = baseResult.nextGateId;
                    
                    // Build condition subtree: condition holding causes failure
                    // Condition element in success space → its failure in failure space is NOT-condition
                    // But UNLESS condition means: if condition is TRUE, system fails
                    // So in failure space: condition being TRUE (it works) is a failure path
                    // We represent this as a house event or as the element itself (it failing = condition true)
                    const condResult = translateConditionToFailure(condTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules, 'holds');
                    localGateCounter = condResult.nextGateId;
                    
                    // OR gate: system fails if base fails OR condition holds
                    const baseChild = baseResult.isGate ? baseResult.gateName : (baseResult.items && baseResult.items.length === 1 ? baseResult.items[0] : null);
                    const condChild = condResult.isGate ? condResult.gateName : (condResult.items && condResult.items.length === 1 ? condResult.items[0] : null);
                    
                    const children = [];
                    if (baseResult.isGate) children.push(baseResult.gateName);
                    else if (baseResult.items) children.push(...baseResult.items);
                    if (condResult.isGate) children.push(condResult.gateName);
                    else if (condResult.items) children.push(...condResult.items);
                    
                    if (children.length > 1) {
                        const gateName = `GATE-${localGateCounter}`;
                        localGateCounter++;
                        gates.push({ id: gateName.toLowerCase(), label: gateName, type: 'OR', children });
                        return { isGate: true, gateName, nextGateId: localGateCounter };
                    } else if (children.length === 1) {
                        return { isGate: false, items: children, nextGateId: localGateCounter };
                    }
                }

                // ── Handle WHEN: split on WHEN keyword ─────────────────────────────────
                // SYSTEM WORKS = <expr> WHEN <condition>
                // System only works when condition holds.
                // Failure: (expr fails) OR (condition does NOT hold → condition-failure event)
                const whenIdx = expandedTokens.findIndex(t => t.value === 'WHEN');
                if (whenIdx >= 0) {
                    const baseTokens = expandedTokens.slice(0, whenIdx);
                    const condTokens = expandedTokens.slice(whenIdx + 1);
                    
                    const baseResult = translateWorksToFailure(baseTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                    localGateCounter = baseResult.nextGateId;
                    
                    // WHEN condition: condition NOT holding is a failure path
                    // = condition element failing (normal failure space translation)
                    const condResult = translateConditionToFailure(condTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules, 'fails');
                    localGateCounter = condResult.nextGateId;
                    
                    const children = [];
                    if (baseResult.isGate) children.push(baseResult.gateName);
                    else if (baseResult.items) children.push(...baseResult.items);
                    if (condResult.isGate) children.push(condResult.gateName);
                    else if (condResult.items) children.push(...condResult.items);
                    
                    if (children.length > 1) {
                        const gateName = `GATE-${localGateCounter}`;
                        localGateCounter++;
                        gates.push({ id: gateName.toLowerCase(), label: gateName, type: 'OR', children });
                        return { isGate: true, gateName, nextGateId: localGateCounter };
                    } else if (children.length === 1) {
                        return { isGate: false, items: children, nextGateId: localGateCounter };
                    }
                }

                // ── Handle RELIES ON: expand dependencies ───────────────────────────────
                // <element> RELIES ON <dependency>
                // If dependency fails, element fails.  Add dependency as extra OR child.
                const reliesOnIdx = expandedTokens.findIndex(t => t.value === 'RELIES ON');
                if (reliesOnIdx >= 0) {
                    // Everything before RELIES ON: the element(s) that rely
                    // Everything after RELIES ON: the dependency
                    // In failure space: OR gate of (elements fail) OR (dependency fails)
                    const subjectTokens = expandedTokens.slice(0, reliesOnIdx);
                    const depTokens = expandedTokens.slice(reliesOnIdx + 1);
                    
                    const subResult = translateWorksToFailure(subjectTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                    localGateCounter = subResult.nextGateId;
                    
                    const depResult = translateWorksToFailure(depTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                    localGateCounter = depResult.nextGateId;
                    
                    const children = [];
                    if (subResult.isGate) children.push(subResult.gateName);
                    else if (subResult.items) children.push(...subResult.items);
                    if (depResult.isGate) children.push(depResult.gateName);
                    else if (depResult.items) children.push(...depResult.items);
                    
                    if (children.length > 1) {
                        const gateName = `GATE-${localGateCounter}`;
                        localGateCounter++;
                        gates.push({ id: gateName.toLowerCase(), label: gateName, type: 'OR', children });
                        return { isGate: true, gateName, nextGateId: localGateCounter };
                    }
                    return { isGate: false, items: children, nextGateId: localGateCounter };
                }

                // ── Handle NOT: wrap next token/group in a NOT node ─────────────────────
                // NOT is handled inside processParentheses / OR/AND split by tagging tokens
                // We pre-process NOT here: replace NOT <element> with a notRef token
                const notProcessed = [];
                for (let ni = 0; ni < expandedTokens.length; ni++) {
                    if (expandedTokens[ni].value === 'NOT') {
                        // Next substantive token becomes a NOT-wrapped reference
                        ni++;
                        if (ni < expandedTokens.length) {
                            const nextTok = expandedTokens[ni];
                            if (nextTok.value === '(') {
                                // NOT ( ... ) — find matching paren, collect inner, make a NOT-gate
                                let depth = 1;
                                let j = ni + 1;
                                while (j < expandedTokens.length && depth > 0) {
                                    if (expandedTokens[j].value === '(') depth++;
                                    else if (expandedTokens[j].value === ')') depth--;
                                    j++;
                                }
                                const innerTokens = expandedTokens.slice(ni + 1, j - 1);
                                const innerResult = translateWorksToFailure(innerTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                                localGateCounter = innerResult.nextGateId;
                                const notGateName = `NOT-GATE-${localGateCounter}`;
                                localGateCounter++;
                                const innerChildren = innerResult.isGate ? [innerResult.gateName] : (innerResult.items || []);
                                gates.push({ id: notGateName.toLowerCase().replace(/[^a-z0-9]/g, '-'), label: notGateName, type: 'NOT', children: innerChildren });
                                notProcessed.push({ type: 'gateRef', value: notGateName });
                                ni = j - 1;
                            } else {
                                // NOT <single-element>: create a NOT node wrapping this element
                                const elemName = nextTok.value;
                                const notGateName = `NOT-${elemName}`;
                                // Only add if not already in gates
                                if (!gates.find(g => g.label === notGateName)) {
                                    gates.push({ id: notGateName.toLowerCase().replace(/[^a-z0-9]/g, '-'), label: notGateName, type: 'NOT', children: [elemName], isNotGate: true });
                                }
                                notProcessed.push({ type: 'gateRef', value: notGateName });
                            }
                        }
                    } else {
                        notProcessed.push(expandedTokens[ni]);
                    }
                }

                // ── Check for voting gate: [number][variable|list][WORKS|FAILS] ─────────
                // WORKS: k-of-n must work → (n-k+1)-of-n failure (existing logic)
                // FAILS: k-of-n must fail → k-of-n AND gate
                {
                    const tks = notProcessed;
                    if (tks.length >= 2 && tks[0].type === 'number') {
                        const k = parseInt(tks[0].value);
                        const items = [];
                        let stateKeyword = null;
                        
                        // Collect items from variable or sequential SSCs
                        if (tks[1].type === 'variable' && variables[tks[1].value]) {
                            for (const t of variables[tks[1].value]) {
                                if (t.type === 'ssc' || t.type === 'supercomp' || 
                                    t.type === 'text' || t.type === 'identifier' || t.type === 'unknown') {
                                    items.push(t.value);
                                }
                            }
                            stateKeyword = tks[2] ? tks[2].value : 'WORKS';
                        } else if (tks[1].type === 'ssc' || tks[1].type === 'text' || tks[1].type === 'identifier') {
                            items.push(tks[1].value);
                            stateKeyword = tks[2] ? tks[2].value : 'WORKS';
                        }
                        
                        if (items.length > 0 && (stateKeyword === 'WORKS' || stateKeyword === 'FAILS')) {
                            const n = items.length;
                            let gateType, gateName;
                            
                            if (stateKeyword === 'WORKS') {
                                // k-of-n must work → system fails when (n-k+1) or more fail
                                const x = n - k + 1;
                                gateName = `GATE-${localGateCounter}`;
                                localGateCounter++;
                                gates.push({ id: gateName.toLowerCase(), label: gateName, type: `${x}/${n}`, children: items });
                            } else {
                                // FAILS: k-of-n must fail → AND gate of k items failing
                                // If k === n, all must fail → regular AND
                                // If k < n, k-of-n failure gate
                                gateName = `GATE-${localGateCounter}`;
                                localGateCounter++;
                                if (k === n) {
                                    gates.push({ id: gateName.toLowerCase(), label: gateName, type: 'AND', children: items });
                                } else {
                                    gates.push({ id: gateName.toLowerCase(), label: gateName, type: `${k}/${n}`, children: items });
                                }
                            }
                            
                            return { isGate: true, gateName, nextGateId: localGateCounter };
                        }
                    }
                }

                // ── Handle standalone WORKS/FAILS suffix on a single element ────────────
                // e.g.  "SSC-1 FAILS"  →  treat SSC-1 as a basic failure event (normal)
                // e.g.  "SSC-1 WORKS"  →  in a consequence/condition context: wrap as NOT
                //   In SYSTEM WORKS = context, a lone element is already a failure event.
                //   A lone "X FAILS" is equivalent to just "X" in failure space.
                //   A lone "X WORKS" in failure space is a NOT gate (X working = it doesn't fail).
                {
                    // Strip trailing WORKS/FAILS keywords to get the base element list
                    const stripped = notProcessed.filter(t => t.value !== 'WORKS' && t.value !== 'FAILS' && t.value !== 'IS TRUE' && t.value !== 'IS FALSE' && t.value !== 'IS');
                    
                    // Check if there's a WORKS keyword at the end (standalone, not voting)
                    const hasWorksAtEnd = notProcessed.length > 0 && notProcessed[notProcessed.length - 1].value === 'WORKS';
                    
                    if (hasWorksAtEnd && stripped.length === 1) {
                        // Single element WORKS → in failure space, this element working is a failure preventer
                        // Represent as NOT gate around the element
                        const elemName = stripped[0].value;
                        const notGateName = `NOT-${elemName}`;
                        if (!gates.find(g => g.label === notGateName)) {
                            gates.push({ id: notGateName.toLowerCase().replace(/[^a-z0-9]/g, '-'), label: notGateName, type: 'NOT', children: [elemName], isNotGate: true });
                        }
                        return { isGate: true, gateName: notGateName, nextGateId: localGateCounter };
                    }
                    
                    // For FAILS suffix or no suffix — proceed with stripped tokens to AND/OR parsing
                    return parseWithOrPrecedence(stripped, localGateCounter, gates);
                }
            }

            // Translate a condition (after UNLESS/WHEN) to failure-space children
            // mode 'holds': condition being true is the failure path (UNLESS)
            // mode 'fails': condition not holding is the failure path (WHEN)
            function translateConditionToFailure(condTokens, variables, startGateId, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules, mode) {
                let localGateCounter = startGateId;
                
                // Strip WORKS/FAILS keywords
                const elemTokens = condTokens.filter(t => t.value !== 'WORKS' && t.value !== 'FAILS');
                const hasWorksKw = condTokens.some(t => t.value === 'WORKS');
                const hasFailsKw = condTokens.some(t => t.value === 'FAILS');
                
                if (elemTokens.length === 0) return { isGate: false, items: [], nextGateId: localGateCounter };
                
                if (mode === 'holds') {
                    // UNLESS condition: condition being present (working/true) causes failure
                    // In failure space: represent as a house event with probability 1 IF condition holds
                    // Simplification: treat condition element as a HOUSE event (present = failure path)
                    // If condition is X WORKS, X working causes failure → NOT-X fails (X working is a failure initiator)
                    // We represent this as a special house/conditional event node
                    if (hasWorksKw) {
                        // The condition "X WORKS" triggering system failure → NOT gate (X working is bad)
                        const elemName = elemTokens.map(t => t.value).join(' ');
                        const notGateName = `NOT-${elemName}`;
                        if (!gates.find(g => g.label === notGateName)) {
                            gates.push({ id: notGateName.toLowerCase().replace(/[^a-z0-9]/g, '-'), label: notGateName, type: 'NOT', children: [elemName], isNotGate: true });
                        }
                        return { isGate: true, gateName: notGateName, nextGateId: localGateCounter };
                    } else {
                        // UNLESS X FAILS or UNLESS X: X itself failing is an extra cause
                        return translateWorksToFailure(elemTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                    }
                } else {
                    // WHEN condition: condition NOT holding causes failure
                    // Normal failure-space translation of the condition element
                    return translateWorksToFailure(elemTokens, variables, localGateCounter, gates, modules, moduleGates, supercompMap, houseEvents, ifThenRules);
                }
            }
            
            function parseWithOrPrecedence(tokens, startGateId, gates) {
                let gateCounter = startGateId;
                
                // First, handle any parenthesized sub-expressions by recursively processing them
                const processedTokens = processParentheses(tokens, gateCounter, gates);
                gateCounter = processedTokens.nextGateId;
                const flatTokens = processedTokens.tokens;
                
                // Now split by AND (lower precedence in success space)
                const andGroups = splitByOperator(flatTokens, 'AND');
                
                if (andGroups.length > 1) {
                    // Multiple AND groups: A AND B AND C
                    // Process each group for OR operators
                    const processedItems = [];
                    
                    // Reserve gate ID for main gate
                    const mainGateId = gateCounter;
                    gateCounter++;
                    
                    for (const group of andGroups) {
                        const result = processOrGroup(group, gateCounter, gates);
                        if (result.isGate) {
                            processedItems.push(result.gateName);
                            gateCounter = result.nextGateId;
                        } else if (result.items && result.items.length > 0) {
                            processedItems.push(...result.items);
                        }
                    }
                    
                    // In success space: A AND B means both must work
                    // In failure space: A' OR B' means either can fail
                    const mainGateName = `GATE-${mainGateId}`;
                    gates.push({
                        id: mainGateName.toLowerCase(),
                        label: mainGateName,
                        type: 'OR',
                        children: processedItems
                    });
                    
                    return {
                        isGate: true,
                        gateName: mainGateName,
                        nextGateId: gateCounter
                    };
                } else {
                    // No AND, just process OR
                    return processOrGroup(flatTokens, gateCounter, gates);
                }
            }
            
            // Process parentheses by recursively evaluating sub-expressions
            function processParentheses(tokens, startGateId, gates) {
                let gateCounter = startGateId;
                const result = [];
                let i = 0;
                
                while (i < tokens.length) {
                    const token = tokens[i];
                    
                    if (token.value === '(') {
                        // Find matching closing parenthesis
                        let depth = 1;
                        let j = i + 1;
                        while (j < tokens.length && depth > 0) {
                            if (tokens[j].value === '(') depth++;
                            else if (tokens[j].value === ')') depth--;
                            j++;
                        }
                        
                        // Extract tokens inside parentheses
                        const innerTokens = tokens.slice(i + 1, j - 1);
                        
                        // Recursively process the inner expression
                        const innerResult = parseWithOrPrecedence(innerTokens, gateCounter, gates);
                        gateCounter = innerResult.nextGateId;
                        
                        if (innerResult.isGate) {
                            // Add a reference token to the gate
                            result.push({ type: 'gateRef', value: innerResult.gateName });
                        } else if (innerResult.items && innerResult.items.length > 0) {
                            // Add the items as tokens
                            innerResult.items.forEach(item => {
                                result.push({ type: 'ssc', value: item });
                            });
                        }
                        
                        i = j; // Skip past the closing parenthesis
                    } else if (token.value === ')') {
                        // Unmatched closing paren - skip
                        i++;
                    } else {
                        result.push(token);
                        i++;
                    }
                }
                
                return { tokens: result, nextGateId: gateCounter };
            }
            
            function processOrGroup(tokens, startGateId, gates) {
                // Split by OR
                const orGroups = splitByOperator(tokens, 'OR');
                
                if (orGroups.length > 1) {
                    // Multiple OR groups: A OR B OR C
                    // In success space: A OR B means either can work
                    // In failure space: A' AND B' means both must fail
                    const items = [];
                    for (const group of orGroups) {
                        for (const token of group) {
                            // Accept SSC, supercomp, text, identifier, unknown, or gateRef token types
                            if (token.type === 'ssc' || token.type === 'supercomp' || 
                                token.type === 'text' || token.type === 'identifier' || 
                                token.type === 'unknown' || token.type === 'gateRef') {
                                items.push(token.value);
                            }
                        }
                    }
                    
                    const gateName = `GATE-${startGateId}`;
                    gates.push({
                        id: gateName.toLowerCase(),
                        label: gateName,
                        type: 'AND',
                        children: items
                    });
                    
                    return {
                        isGate: true,
                        gateName: gateName,
                        nextGateId: startGateId + 1
                    };
                } else {
                    // No OR, collect SSCs and gate references
                    const items = [];
                    for (const token of tokens) {
                        // Accept SSC, supercomp, text, identifier, unknown, or gateRef token types
                        if (token.type === 'ssc' || token.type === 'supercomp' || 
                            token.type === 'text' || token.type === 'identifier' || 
                            token.type === 'unknown' || token.type === 'gateRef') {
                            items.push(token.value);
                        }
                    }
                    
                    return {
                        isGate: false,
                        items: items
                    };
                }
            }
            
            function splitByOperator(tokens, operator) {
                const groups = [];
                let currentGroup = [];
                
                for (const token of tokens) {
                    if (token.value === operator) {
                        if (currentGroup.length > 0) {
                            groups.push(currentGroup);
                            currentGroup = [];
                        }
                    } else {
                        currentGroup.push(token);
                    }
                }
                
                if (currentGroup.length > 0) {
                    groups.push(currentGroup);
                }
                
                return groups.length > 0 ? groups : [tokens];
            }

            function buildFailureTree(topNode, gates) {
                const tree = {
                    id: topNode.id,
                    label: topNode.label,
                    type: topNode.type,
                    children: []
                };

                for (const child of topNode.children) {
                    if (typeof child === 'string') {
                        const gate = gates.find(g => g.label === child);
                        if (gate) {
                            tree.children.push(buildGateNode(gate, gates));
                        } else {
                            tree.children.push({
                                id: child.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                                label: child,
                                type: 'BASIC',
                                children: []
                            });
                        }
                    } else {
                        tree.children.push({
                            id: `item-${Math.random()}`,
                            label: String(child),
                            type: 'BASIC',
                            children: []
                        });
                    }
                }

                return tree;
            }

            function buildGateNode(gate, allGates) {
                const node = {
                    id: gate.id,
                    label: gate.label,
                    type: gate.type,
                    children: [],
                    isNotGate: gate.isNotGate || false
                };

                for (const child of gate.children) {
                    if (typeof child === 'string') {
                        const childGate = allGates.find(g => g.label === child);
                        if (childGate) {
                            node.children.push(buildGateNode(childGate, allGates));
                        } else {
                            node.children.push({
                                id: child.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                                label: child,
                                type: gate.type === 'NOT' ? 'BASIC_NOT' : 'BASIC',
                                children: []
                            });
                        }
                    } else {
                        node.children.push({
                            id: `item-${Math.random()}`,
                            label: String(child),
                            type: 'BASIC',
                            children: []
                        });
                    }
                }

                return node;
            }

            // Failure Analysis Modal Component
            function FailureAnalysisModal({ onClose, settings, backgroundStyle, fontSizeClass, systemName, systemDescription, systemLogic, sscsInSystem, superComponents, linkedSystemProbabilities = {} }) {
                const [activeLeftTab, setActiveLeftTab] = useState('text');
                const [activeRightTab, setActiveRightTab] = useState('cutsets');
                const [leftPaneWidth, setLeftPaneWidth] = useState(50); // percentage
                const [isResizing, setIsResizing] = useState(false);
                const [expandedNodes, setExpandedNodes] = useState(new Set(['top']));
                const [showConnectors, setShowConnectors] = useState(false);
                const [tableSortBy, setTableSortBy] = useState('rir');
                const [tableSortDir, setTableSortDir] = useState('desc');
                const [plotXAxis, setPlotXAxis] = useState(() => {
                    return localStorage.getItem('KUREAS_SYS_plotXAxis') || 'swim';
                });
                const [plotYAxis, setPlotYAxis] = useState(() => {
                    return localStorage.getItem('KUREAS_SYS_plotYAxis') || 'rir';
                });
                const modalRef = useRef(null);
                
                // Save axis selections to localStorage when they change
                useEffect(() => {
                    localStorage.setItem('KUREAS_SYS_plotXAxis', plotXAxis);
                }, [plotXAxis]);
                
                useEffect(() => {
                    localStorage.setItem('KUREAS_SYS_plotYAxis', plotYAxis);
                }, [plotYAxis]);
                
                // Build basic event probability data from SSCs (computed first for use in tree)
                const basicEventData = React.useMemo(() => {
                    const data = {};
                    
                    // Helper to get probability from a failure mode
                    const getFailureModeProbability = (fm) => {
                        // Handle linked system - check if we have a computed probability
                        if (fm.probabilityType === 'linkedSystem') {
                            const linkedFile = fm.linkedSystemFile;
                            if (linkedFile && linkedSystemProbabilities[linkedFile] !== undefined) {
                                // Use the computed probability from the linked system
                                return { 
                                    prob: linkedSystemProbabilities[linkedFile], 
                                    isLinked: true, 
                                    linkedSystemName: fm.linkedSystemName || linkedFile,
                                    linkedResolved: true
                                };
                            }
                            // No probability available yet
                            return { prob: null, isLinked: true, linkedSystemName: fm.linkedSystemName || linkedFile, linkedResolved: false };
                        }
                        
                        // Handle qualitative - get probability from settings based on level
                        if (fm.probabilityType === 'qualitative') {
                            const level = fm.qualitativeLevel || 'medium';
                            let probStr;
                            switch(level) {
                                case 'low': probStr = settings?.qualitativeProbLow || '1E-5'; break;
                                case 'medium': probStr = settings?.qualitativeProbMedium || '1E-3'; break;
                                case 'high': probStr = settings?.qualitativeProbHigh || '1E-1'; break;
                                default: probStr = settings?.qualitativeProbMedium || '1E-3';
                            }
                            return { prob: parseFloat(probStr), isLinked: false };
                        }
                        
                        // Handle screened - skip
                        if (fm.probabilityType === 'screened') {
                            return { prob: 0, isLinked: false, isScreened: true };
                        }
                        
                        // Handle numeric probability
                        const isPerHour = fm.data?.units === 'h';
                        const isPerYear = fm.data?.units === 'y';
                        const isPerDemand = fm.data?.units === 'd';
                        const failureRate = parseFloat(fm.data?.mean || 0);
                        
                        let prob = 0;
                        if (isPerDemand && !isNaN(failureRate)) {
                            prob = failureRate;
                        } else if (isPerHour && !isNaN(failureRate)) {
                            const timeToOperate = fm.timeToOperate || 24;
                            prob = 1 - Math.exp(-failureRate * timeToOperate);
                        } else if (isPerYear && !isNaN(failureRate)) {
                            const timeToOperate = fm.timeToOperate || 24;
                            prob = 1 - Math.exp(-failureRate * timeToOperate / 8760);
                        } else if (!isNaN(failureRate) && failureRate > 0) {
                            prob = failureRate;
                        }
                        return { prob, isLinked: false };
                    };
                    
                    for (const ssc of sscsInSystem) {
                        if (ssc.failureModes && ssc.failureModes.length > 0) {
                            const applicableModes = ssc.failureModes.filter(fm => 
                                fm.applicable !== false && fm.probabilityType !== 'screened'
                            );
                            
                            if (applicableModes.length === 0) continue;
                            
                            // If SSC has multiple applicable failure modes, create separate entries for each
                            // The SSC itself becomes OR of its failure modes
                            if (applicableModes.length > 1) {
                                // Create unique keys using SSC name and failure mode name
                                const fmKeys = applicableModes.map((fm, idx) => {
                                    // Use failure mode name, sanitized to be a valid key
                                    const modeName = (fm.mode || `FM${idx + 1}`).replace(/\s+/g, '_');
                                    return `${ssc.name}__${modeName}`;
                                });
                                
                                // Add entry for SSC that indicates it has children
                                data[ssc.name] = {
                                    probability: null, // Will be computed from OR of children
                                    description: ssc.description || ssc.label || '',
                                    hasMultipleModes: true,
                                    failureModeNames: fmKeys
                                };
                                
                                // Add individual failure mode entries
                                applicableModes.forEach((fm, idx) => {
                                    const fmKey = fmKeys[idx];
                                    const probResult = getFailureModeProbability(fm);
                                    
                                    data[fmKey] = {
                                        probability: probResult.prob,
                                        description: fm.mode || `Failure Mode ${idx + 1}`,
                                        parentSSC: ssc.name,
                                        isLinked: probResult.isLinked,
                                        linkedSystemName: probResult.linkedSystemName,
                                        probabilityType: fm.probabilityType,
                                        qualitativeLevel: fm.qualitativeLevel
                                    };
                                });
                            } else {
                                // Single failure mode - treat SSC as single basic event
                                const fm = applicableModes[0];
                                const probResult = getFailureModeProbability(fm);
                                
                                data[ssc.name] = {
                                    probability: probResult.prob,
                                    description: ssc.description || ssc.label || '',
                                    isLinked: probResult.isLinked,
                                    linkedSystemName: probResult.linkedSystemName,
                                    linkedResolved: probResult.linkedResolved,
                                    probabilityType: fm.probabilityType,
                                    qualitativeLevel: fm.qualitativeLevel
                                };
                            }
                        }
                    }
                    
                    // Inject house events from IS TRUE / IS FALSE standalone lines
                    // and from IF-THEN rules into basicEventData
                    // Scan tokens for IS TRUE / IS FALSE patterns and IF-THEN rules
                    let scanIdx = 0;
                    while (scanIdx < systemLogic.length) {
                        const tok = systemLogic[scanIdx];
                        
                        // Standalone: <element> IS TRUE / <element> IS FALSE
                        if (tok.value === 'IS TRUE' || tok.value === 'IS FALSE') {
                            // The element is the token immediately before on this line
                            let elemIdx = scanIdx - 1;
                            while (elemIdx >= 0 && systemLogic[elemIdx].type === 'eol') elemIdx--;
                            if (elemIdx >= 0) {
                                const elemName = systemLogic[elemIdx].value;
                                const prob = tok.value === 'IS TRUE' ? 1.0 : 0.0;
                                data[elemName] = {
                                    probability: prob,
                                    description: `House event: ${tok.value}`,
                                    isHouseEvent: true,
                                    houseState: tok.value === 'IS TRUE' ? 'TRUE' : 'FALSE'
                                };
                            }
                        }
                        
                        // IF <condElem> WORKS|FAILS THEN <targetElem> IS TRUE|FALSE|FAILS|WORKS
                        if (tok.value === 'IF') {
                            const lineTokens = [];
                            let si = scanIdx + 1;
                            while (si < systemLogic.length && systemLogic[si].type !== 'eol') {
                                lineTokens.push(systemLogic[si]);
                                si++;
                            }
                            const thenIdx = lineTokens.findIndex(t => t.value === 'THEN');
                            if (thenIdx > 0) {
                                const condPart = lineTokens.slice(0, thenIdx);
                                const conseqPart = lineTokens.slice(thenIdx + 1);
                                
                                // Target element state
                                const isTrueIdx = conseqPart.findIndex(t => t.value === 'IS TRUE');
                                const isFalseIdx = conseqPart.findIndex(t => t.value === 'IS FALSE');
                                const failsIdx = conseqPart.findIndex(t => t.value === 'FAILS');
                                
                                let targetElem = null, targetProb = null, houseState = null;
                                
                                if (isTrueIdx >= 0) {
                                    targetElem = conseqPart.slice(0, isTrueIdx).map(t => t.value).join(' ').trim();
                                    targetProb = 1.0; houseState = 'TRUE';
                                } else if (isFalseIdx >= 0) {
                                    targetElem = conseqPart.slice(0, isFalseIdx).map(t => t.value).join(' ').trim();
                                    targetProb = 0.0; houseState = 'FALSE';
                                } else if (failsIdx >= 0) {
                                    targetElem = conseqPart.slice(0, failsIdx).map(t => t.value).join(' ').trim();
                                    // FAILS means we keep existing probability (it's already a failure event)
                                    // but mark it as IF-THEN conditional for annotation
                                    houseState = 'CONDITIONAL_FAILS';
                                }
                                
                                if (targetElem && targetProb !== null) {
                                    // Only set as house event if not already an SSC with data
                                    if (!data[targetElem] || data[targetElem].isHouseEvent) {
                                        data[targetElem] = {
                                            probability: targetProb,
                                            description: `House event (IF-THEN): ${houseState}`,
                                            isHouseEvent: true,
                                            houseState
                                        };
                                    }
                                } else if (targetElem && houseState === 'CONDITIONAL_FAILS') {
                                    // Mark existing SSC as conditionally failing (for annotation)
                                    if (data[targetElem]) {
                                        data[targetElem] = { ...data[targetElem], conditionalFails: true };
                                    }
                                }
                            }
                        }
                        
                        scanIdx++;
                    }
                    
                    return data;
                }, [sscsInSystem, settings, linkedSystemProbabilities, systemLogic]);
                
                // Parse the system logic to create failure tree
                const failureLogicTree = React.useMemo(() => {
                    try {
                        const parsed = parseSystemWorksExpression(systemLogic, systemName, superComponents);
                        if (parsed) {
                            // Transform basic events for SSCs with multiple failure modes into OR gates
                            const expandMultiModeSscs = (node) => {
                                if (node.type === 'BASIC') {
                                    const eventData = basicEventData[node.label];
                                    if (eventData && eventData.hasMultipleModes && eventData.failureModeNames) {
                                        // Replace this basic event with an OR gate of failure modes
                                        const ssc = sscsInSystem.find(s => s.name === node.label);
                                        return {
                                            id: node.id || `or_${node.label}`,
                                            type: 'OR',
                                            label: `${node.label} fails`,
                                            description: ssc?.description || '',
                                            children: eventData.failureModeNames.map((fmName, idx) => ({
                                                id: `${node.label}_fm${idx}`,
                                                type: 'BASIC',
                                                label: fmName,
                                                description: basicEventData[fmName]?.description || '',
                                                probability: basicEventData[fmName]?.probability || 0
                                            }))
                                        };
                                    }
                                    // Add probability for single-mode SSCs
                                    if (eventData) {
                                        node.probability = eventData.probability;
                                    }
                                    return node;
                                }
                                if (node.children) {
                                    node.children = node.children.map(expandMultiModeSscs);
                                }
                                return node;
                            };
                            
                            // First expand multi-mode SSCs
                            const expandedTree = expandMultiModeSscs(parsed);
                            
                            // Then add descriptions and probabilities to remaining basic events
                            const enrichWithDescriptions = (node) => {
                                if (node.type === 'BASIC') {
                                    const ssc = sscsInSystem.find(s => s.name === node.label);
                                    if (ssc) {
                                        node.description = ssc.description || ssc.label || '';
                                    }
                                    // Add probability from basicEventData if not already set
                                    if (!node.probability && basicEventData[node.label]) {
                                        node.probability = basicEventData[node.label].probability;
                                    }
                                }
                                if (node.children) {
                                    node.children.forEach(enrichWithDescriptions);
                                }
                                return node;
                            };
                            enrichWithDescriptions(expandedTree);
                            
                            // Auto-expand all nodes
                            const allNodeIds = new Set(['top']);
                            const collectNodeIds = (node) => {
                                if (node.id) allNodeIds.add(node.id);
                                if (node.children) {
                                    node.children.forEach(collectNodeIds);
                                }
                            };
                            collectNodeIds(expandedTree);
                            setExpandedNodes(allNodeIds);
                            return expandedTree;
                        }
                    } catch (err) {
                        console.error('Error parsing system logic:', err);
                    }
                    
                    return {
                        id: 'top',
                        label: `${systemName || 'System'} fails`,
                        description: 'No system logic defined or parsing error',
                        type: 'OR',
                        children: []
                    };
                }, [systemLogic, systemName, sscsInSystem, superComponents, basicEventData]);
                
                // Generate actual cut sets from fault tree
                const { cutSets, mcubValue } = React.useMemo(() => {
                    if (!failureLogicTree || !failureLogicTree.children || failureLogicTree.children.length === 0) {
                        return { cutSets: [], mcubValue: null };
                    }
                    
                    // Generate minimal cut sets
                    const minimalCutSets = generateMinimalCutSets(failureLogicTree, basicEventData);
                    
                    // Calculate probabilities for each cut set
                    const cutSetsWithProb = minimalCutSets.map((cutSet, index) => {
                        const probResult = calculateCutSetProbability(cutSet, basicEventData);
                        
                        // Build description from basic event descriptions
                        // For failure modes (format: SSC__ModeName), show parent SSC name + failure mode
                        const descriptions = cutSet.map(eventName => {
                            if (eventName.includes('__')) {
                                // This is a failure mode - format as "SSC: Failure Mode Name"
                                const parentSSC = basicEventData[eventName]?.parentSSC;
                                const fmDescription = basicEventData[eventName]?.description || eventName.split('__')[1].replace(/_/g, ' ');
                                if (parentSSC) {
                                    return `${parentSSC}: ${fmDescription}`;
                                }
                                return fmDescription;
                            }
                            if (basicEventData[eventName] && basicEventData[eventName].description) {
                                return basicEventData[eventName].description;
                            }
                            return eventName;
                        });
                        // Use "fails" for single item, "all fail" for multiple items
                        const description = descriptions.length === 1 
                            ? descriptions[0] + ' fails'
                            : descriptions.join(' & ') + ' all fail';
                        
                        return {
                            id: index + 1,
                            events: cutSet,
                            probability: probResult.probability,
                            hasLinked: probResult.hasLinked,
                            hasUnresolvedLinked: probResult.hasUnresolvedLinked,
                            linkedEvents: probResult.linkedEvents,
                            description: description
                        };
                    });
                    
                    // Sort by probability (highest first), unresolved linked events go to end
                    cutSetsWithProb.sort((a, b) => {
                        // Unresolved linked events sort to the end
                        if (a.hasUnresolvedLinked && !b.hasUnresolvedLinked) return 1;
                        if (!a.hasUnresolvedLinked && b.hasUnresolvedLinked) return -1;
                        if (a.probability !== null && b.probability !== null) {
                            return b.probability - a.probability;
                        }
                        if (a.probability === null) return 1;
                        if (b.probability === null) return -1;
                        return 0;
                    });
                    
                    // Calculate MCUB - include resolved linked systems
                    const cutSetProbabilities = cutSetsWithProb
                        .filter(cs => !cs.hasUnresolvedLinked && cs.probability !== null)
                        .map(cs => cs.probability);
                    const mcub = calculateMCUB(cutSetProbabilities);
                    
                    return {
                        cutSets: cutSetsWithProb,
                        mcubValue: mcub
                    };
                }, [failureLogicTree, basicEventData]);
                
                const toggleNode = (nodeId) => {
                    setExpandedNodes(prev => {
                        const newSet = new Set(prev);
                        if (newSet.has(nodeId)) {
                            newSet.delete(nodeId);
                        } else {
                            newSet.add(nodeId);
                        }
                        return newSet;
                    });
                };
                
                const handleResizeStart = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    setIsResizing(true);
                };
                
                useEffect(() => {
                    if (!isResizing) return;
                    
                    const handleMouseMove = (e) => {
                        if (modalRef.current) {
                            const rect = modalRef.current.getBoundingClientRect();
                            const relativeX = e.clientX - rect.left;
                            const percentage = (relativeX / rect.width) * 100;
                            setLeftPaneWidth(Math.max(25, Math.min(75, percentage)));
                        }
                    };
                    
                    const handleMouseUp = () => {
                        setIsResizing(false);
                    };
                    
                    document.addEventListener('mousemove', handleMouseMove);
                    document.addEventListener('mouseup', handleMouseUp);
                    
                    return () => {
                        document.removeEventListener('mousemove', handleMouseMove);
                        document.removeEventListener('mouseup', handleMouseUp);
                    };
                }, [isResizing]);
                
                // Recursive tree node component
                // Fault Tree Graphic Component
                function FaultTreeGraphic({ tree, settings, backgroundStyle }) {
                    const canvasRef = useRef(null);
                    const [scale, setScale] = useState(1);
                    const [offset, setOffset] = useState({ x: 0, y: 0 });
                    const [isDragging, setIsDragging] = useState(false);
                    const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

                    // Draw function
                    const drawNode = (ctx, node, x, y, level = 0, childIndex = 0) => {
                        if (!node) return { width: 0, height: 0 };

                        const nodeHeight = 50;
                        const nodeWidth = 120;
                        const verticalSpacing = 100;
                        const minHorizontalSpacing = 40;
                        const circleRadius = 25;

                        // Calculate width needed for this subtree
                        const calculateSubtreeWidth = (n) => {
                            if (!n || !n.children || n.children.length === 0) {
                                return n.type === 'BASIC' ? circleRadius * 2 : nodeWidth;
                            }
                            
                            let totalWidth = 0;
                            for (const child of n.children) {
                                totalWidth += calculateSubtreeWidth(child);
                            }
                            totalWidth += minHorizontalSpacing * (n.children.length - 1);
                            
                            const nodeOwnWidth = n.type === 'BASIC' ? circleRadius * 2 : nodeWidth;
                            return Math.max(totalWidth, nodeOwnWidth);
                        };

                        // Draw current node
                        ctx.save();
                        
                        // Draw shape based on type
                        if (node.type === 'BASIC') {
                            // Circle for basic events
                            ctx.beginPath();
                            ctx.arc(x, y, circleRadius, 0, 2 * Math.PI);
                            ctx.fillStyle = settings.background === 'dark' ? '#4ade80' : '#86efac';
                            ctx.fill();
                            ctx.strokeStyle = '#16a34a';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                            
                            // Draw label - stagger vertically based on sibling position
                            const labelOffset = (childIndex % 4) * 12; // Cycle every 4 children
                            ctx.fillStyle = settings.background === 'dark' ? '#f3f4f6' : '#111827';
                            ctx.font = '11px monospace';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(node.label || '', x, y - 20 + labelOffset);
                            
                            // Draw probability below label
                            if (node.probability !== undefined && node.probability !== null) {
                                ctx.font = '9px monospace';
                                ctx.textBaseline = 'top';
                                const probText = formatProbability(node.probability, settings.showProbability);
                                ctx.fillText(probText, x, y - 10 + labelOffset);
                            }
                            
                            // Draw description below circle with word wrapping
                            if (node.description) {
                                ctx.font = '8px sans-serif';
                                ctx.fillStyle = '#555';
                                ctx.textBaseline = 'top';
                                
                                // Simple word wrap - split at 20 characters
                                const maxWidth = 100;
                                const words = node.description.split(' ');
                                let line = '';
                                let yOffset = y + 35;
                                
                                for (const word of words) {
                                    const testLine = line + (line ? ' ' : '') + word;
                                    const metrics = ctx.measureText(testLine);
                                    
                                    if (metrics.width > maxWidth && line) {
                                        ctx.fillText(line, x, yOffset);
                                        line = word;
                                        yOffset += 10;
                                    } else {
                                        line = testLine;
                                    }
                                }
                                if (line) {
                                    ctx.fillText(line, x, yOffset);
                                }
                            }
                        } else {
                            // Rectangle for gates
                            let color = '#93c5fd';
                            if (node.type === 'OR') color = '#93c5fd';
                            else if (node.type === 'AND') color = '#86efac';
                            else if (node.type === 'NOT') color = '#fed7aa'; // orange for NOT
                            else if (node.type && node.type.includes('/')) color = '#c084fc';
                            
                            ctx.fillStyle = settings.background === 'dark' ? color : color;
                            ctx.strokeStyle = settings.background === 'dark' ? '#1e40af' : '#1e3a8a';
                            ctx.lineWidth = 2;
                            ctx.fillRect(x - nodeWidth/2, y - nodeHeight/2, nodeWidth, nodeHeight);
                            ctx.strokeRect(x - nodeWidth/2, y - nodeHeight/2, nodeWidth, nodeHeight);
                            
                            // Draw gate type
                            ctx.fillStyle = settings.background === 'dark' ? '#f3f4f6' : '#111827';
                            ctx.font = 'bold 12px monospace';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'top';
                            ctx.fillText(node.type || 'GATE', x, y - nodeHeight/2 + 5);
                            
                            // Draw label with word wrapping
                            ctx.fillStyle = settings.background === 'dark' ? '#f3f4f6' : '#111827';
                            ctx.font = '11px monospace';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            
                            const label = node.label || '';
                            const maxLabelWidth = nodeWidth - 10;
                            const words = label.split(' ');
                            let line = '';
                            let yOffset = y + 8;
                            const lineHeight = 12;
                            
                            for (let i = 0; i < words.length; i++) {
                                const testLine = line + (line ? ' ' : '') + words[i];
                                const metrics = ctx.measureText(testLine);
                                
                                if (metrics.width > maxLabelWidth && line) {
                                    ctx.fillText(line, x, yOffset);
                                    line = words[i];
                                    yOffset += lineHeight;
                                } else {
                                    line = testLine;
                                }
                            }
                            if (line) {
                                ctx.fillText(line, x, yOffset);
                            }
                        }

                        ctx.restore();

                        // Draw children
                        if (node.children && node.children.length > 0) {
                            const childY = y + verticalSpacing;
                            
                            // Calculate widths for each child subtree
                            const childWidths = node.children.map(child => calculateSubtreeWidth(child));
                            const totalChildWidth = childWidths.reduce((sum, w) => sum + w, 0) + 
                                                    minHorizontalSpacing * (node.children.length - 1);
                            
                            // Start from left edge of total child width
                            let childX = x - totalChildWidth / 2 + childWidths[0] / 2;

                            node.children.forEach((child, index) => {
                                // Draw line to child
                                ctx.beginPath();
                                ctx.moveTo(x, y + (node.type === 'BASIC' ? circleRadius : nodeHeight/2));
                                ctx.lineTo(childX, childY - (child.type === 'BASIC' ? circleRadius : nodeHeight/2));
                                ctx.strokeStyle = settings.background === 'dark' ? '#6b7280' : '#9ca3af';
                                ctx.lineWidth = 1;
                                ctx.stroke();

                                // Draw child - pass index for label staggering
                                drawNode(ctx, child, childX, childY, level + 1, index);
                                
                                // Move to next child position
                                if (index < node.children.length - 1) {
                                    childX += childWidths[index] / 2 + minHorizontalSpacing + childWidths[index + 1] / 2;
                                }
                            });
                        }
                    };

                    useEffect(() => {
                        if (!tree || !canvasRef.current) return;

                        const canvas = canvasRef.current;
                        const ctx = canvas.getContext('2d');
                        const container = canvas.parentElement;

                        canvas.width = container.clientWidth;
                        canvas.height = container.clientHeight;

                        ctx.clearRect(0, 0, canvas.width, canvas.height);
