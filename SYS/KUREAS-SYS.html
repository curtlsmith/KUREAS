                                                ))}
                                            </div>
                                        </div>
                                        
                                        <div className="pt-2 flex gap-2">
                                            <button
                                                onClick={() => setFieldsToSearch({
                                                    name: true, description: true, sscType: true,
                                                    componentType: true, failureModeName: true, 
                                                    failureModeDescription: true, effectDescription: true
                                                })}
                                                className="px-2 py-1 text-xs bg-gray-200 hover:bg-gray-300 rounded"
                                                style={{ color: '#374151' }}
                                            >
                                                Select All
                                            </button>
                                            <button
                                                onClick={() => setFieldsToSearch({
                                                    name: false, description: false, sscType: false,
                                                    componentType: false, failureModeName: false, 
                                                    failureModeDescription: false, effectDescription: false
                                                })}
                                                className="px-2 py-1 text-xs bg-gray-200 hover:bg-gray-300 rounded"
                                                style={{ color: '#374151' }}
                                            >
                                                Deselect All
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Right: Preview SSC */}
                                <div className="border rounded p-3 overflow-hidden flex flex-col" style={{
                                    borderColor: nameExists ? '#ef4444' : backgroundStyle.borderColor,
                                    backgroundColor: settings.background === 'dark' ? '#1f2937' : '#fafafa',
                                    borderWidth: nameExists ? '2px' : '1px'
                                }}>
                                    {renderSSCInfo(previewSSC, 'New SSC (Preview)')}
                                    {nameExists && (
                                        <div className="mt-2 p-2 bg-red-100 text-red-700 rounded text-xs flex-shrink-0">
                                            Warning: An SSC with this name already exists!
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        
                        <div className="p-4 border-t flex justify-end gap-2 flex-shrink-0" style={{ borderColor: backgroundStyle.borderColor }}>
                            <button
                                onClick={onCancel}
                                className="px-4 py-2 border rounded hover:bg-gray-100 text-sm"
                                style={{
                                    borderColor: backgroundStyle.borderColor,
                                    color: backgroundStyle.color
                                }}
                            >
                                Cancel
                            </button>
                            <button
                                onClick={handleSave}
                                className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm"
                                disabled={nameExists}
                                style={{ opacity: nameExists ? 0.5 : 1 }}
                            >
                                Create Duplicate
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Edit SSC Modal Component
        function EditSSCModal({ ssc, onSave, onCancel, backgroundStyle, existingSSCs, systemName, settings }) {
            const [sscType, setSscType] = useState(ssc.sscType || '');
            const [componentType, setComponentType] = useState(ssc.label || '');
            const [failureModes, setFailureModes] = useState(() => {
                return (ssc.failureModes || []).map(fm => ({
                    ...fm,
                    probabilityType: fm.probabilityType || 'probability',
                    failureModel: fm.failureModel || '0',
                    demandProb: fm.demandProb !== undefined ? String(fm.demandProb) : '',
                    demandN: fm.demandN !== undefined ? String(fm.demandN) : '1',
                    lambda: fm.lambda !== undefined ? String(fm.lambda) : '',
                    missionTime: fm.missionTime !== undefined ? String(fm.missionTime) : '',
                    inspInterval: fm.inspInterval !== undefined ? String(fm.inspInterval) : '',
                    tauRepair: fm.tauRepair !== undefined ? String(fm.tauRepair) : '',
                    logicFlag: fm.logicFlag || 'T',
                }));
            });
            const [error, setError] = useState('');
            
            // Distribution type options
            const distributionTypes = [
                { value: 'Beta', label: 'Beta', param1Label: 'Shape (Alpha)', param2Label: 'Shape (Beta)' },
                { value: 'CNI', label: 'Constrained Non-Informative (CNI)', param1Label: 'Mean', param2Label: '(Not Used)' },
                { value: 'Gamma', label: 'Gamma', param1Label: 'Shape', param2Label: 'Scale' },
                { value: 'Lognormal', label: 'Lognormal', param1Label: 'Mean', param2Label: 'Error Factor (95th/50th)' },
                { value: 'Point', label: 'Point Estimate', param1Label: '(Not Used)', param2Label: '(Not Used)' }
            ];
            
            // Autocomplete suggestions
            const [sscTypeSuggestions, setSscTypeSuggestions] = useState([]);
            const [componentTypeSuggestions, setComponentTypeSuggestions] = useState([]);
            const [showSscTypeSuggestions, setShowSscTypeSuggestions] = useState(false);
            const [showComponentTypeSuggestions, setShowComponentTypeSuggestions] = useState(false);
            
            // Build unique lists from existing SSCs
            useEffect(() => {
                const sscTypes = new Set();
                const componentTypes = new Set();
                
                existingSSCs.forEach(s => {
                    if (s.sscType) sscTypes.add(s.sscType);
                    if (s.label) componentTypes.add(s.label);
                });
                
                setSscTypeSuggestions(Array.from(sscTypes).sort());
                setComponentTypeSuggestions(Array.from(componentTypes).sort());
            }, [existingSSCs]);
            
            // Get qualitative probability from settings
            const getQualitativeProbability = (level) => {
                switch(level) {
                    case 'low': return settings?.qualitativeProbLow || '1E-5';
                    case 'medium': return settings?.qualitativeProbMedium || '1E-3';
                    case 'high': return settings?.qualitativeProbHigh || '1E-1';
                    default: return settings?.qualitativeProbMedium || '1E-3';
                }
            };
            
            const handleSave = () => {
                // Validation
                if (!sscType.trim()) {
                    setError('SSC Type is required');
                    return;
                }
                if (!componentType.trim()) {
                    setError('Component Type is required');
                    return;
                }
                
                // Update the SSC
                const updatedSSC = {
                    ...ssc,
                    sscType: sscType.trim(),
                    label: componentType.trim(),
                    failureModes: failureModes
                };
                
                onSave(updatedSSC);
            };
            
            // Compute probability for FM1–FM4 from a failure mode's stored params
            const computeFMProb = (fm) => {
                const model = fm.failureModel || '0';
                const _lam = parseFloat(fm.lambda) || 0;
                const _mt  = parseFloat(fm.missionTime) || 0;
                const _ii  = parseFloat(fm.inspInterval) || 0;
                const _tau = parseFloat(fm.tauRepair) || 0;
                const _dp  = parseFloat(fm.demandProb);
                const _dN  = parseFloat(fm.demandN) || 1;
                if (model === '1' && !isNaN(_dp) && _dp >= 0 && _dN >= 1) return 1 - Math.pow(1 - _dp, _dN);
                if (model === '2' && _lam > 0 && _mt > 0) return 1 - Math.exp(-_lam * _mt);
                if (model === '3' && _lam > 0 && _ii > 0) { const li = _lam*_ii; return 1 + (Math.exp(-li)-1)/li; }
                if (model === '4' && _lam > 0 && _mt > 0 && _tau > 0) return (_lam*_tau)*(1-Math.exp(-(_lam+_tau)*_mt))/(1+_lam*_tau);
                return null;
            };

            const updateFailureMode = (index, field, value) => {
                setFailureModes(prev => {
                    const updated = [...prev];
                    const fm = { ...updated[index] };

                    if (field === 'mode') {
                        fm.mode = value;
                    } else if (field === 'description') {
                        fm.data = { ...fm.data, description: value };
                    } else if (field === 'mean') {
                        fm.data = { ...fm.data, mean: value };
                    } else if (field === 'units') {
                        fm.data = { ...fm.data, units: value };
                    } else if (field === 'distribution_type') {
                        fm.data = { ...fm.data, distribution_type: value };
                    } else if (field === 'distribution_shape_parameter' || field === 'shape_parameter') {
                        fm.data = { ...fm.data, distribution_shape_parameter: value };
                    } else if (field === 'distribution_scale_parameter' || field === 'scale_parameter') {
                        fm.data = { ...fm.data, distribution_scale_parameter: value };
                    } else if (field === 'probabilityType') {
                        fm.probabilityType = value;
                        if (value === 'qualitative') {
                            const level = fm.qualitativeLevel || 'medium';
                            const prob = getQualitativeProbability(level);
                            fm.data = { ...fm.data, mean: prob, distribution_type: 'CNI', distribution_shape_parameter: prob, distribution_scale_parameter: '' };
                        } else if (value === 'screened') {
                            fm.data = { ...fm.data, mean: '', distribution_type: '', distribution_shape_parameter: '', distribution_scale_parameter: '' };
                        }
                    } else if (field === 'qualitativeLevel') {
                        fm.qualitativeLevel = value;
                        const prob = getQualitativeProbability(value);
                        fm.data = { ...fm.data, mean: prob, distribution_type: 'CNI', distribution_shape_parameter: prob, distribution_scale_parameter: '' };
                    } else if (field === 'timeToOperate') {
                        fm.timeToOperate = value;
                    } else if (field === 'linkedSystemFile') {
                        fm.linkedSystemFile = value;
                    } else if (field === 'linkedSystemName') {
                        fm.linkedSystemName = value;
                    // Failure model fields
                    } else if (field === 'failureModel') {
                        fm.failureModel = value;
                        // Recompute and store mean when model changes
                        const newFM = { ...fm, failureModel: value };
                        const p = computeFMProb(newFM);
                        if (p !== null) fm.data = { ...fm.data, mean: p.toExponential(3).toUpperCase() };
                        else if (value === '5') fm.data = { ...fm.data, mean: fm.logicFlag === 'F' ? '0' : '1' };
                    } else if (['demandProb','demandN','lambda','missionTime','inspInterval','tauRepair'].includes(field)) {
                        fm[field] = value;
                        // Recompute mean from updated params
                        const p = computeFMProb(fm);
                        if (p !== null) fm.data = { ...fm.data, mean: p.toExponential(3).toUpperCase() };
                    } else if (field === 'logicFlag') {
                        fm.logicFlag = value;
                        fm.data = { ...fm.data, mean: value === 'F' ? '0' : (value === 'I' ? '0' : '1') };
                    }

                    updated[index] = fm;
                    return updated;
                });
            };
            
            // Get distribution info for display (handle case variations like 'lognormal', 'Lognormal', etc.)
            const getDistributionInfo = (distType) => {
                return distributionTypes.find(d => d.value.toLowerCase() === (distType || '').toLowerCase()) || distributionTypes[0];
            };
            
            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{
                        backgroundColor: backgroundStyle.paneBackground,
                        color: backgroundStyle.color,
                        maxWidth: '850px',
                        height: 'calc(100vh - 100px)',
                        maxHeight: '900px',
                        display: 'flex',
                        flexDirection: 'column'
                    }}>
                        <div className="p-6 flex flex-col h-full">
                            <h2 className="text-xl font-bold mb-4 flex-shrink-0">Edit SSC Details</h2>
                            
                            {error && <div className="mb-4 p-2 bg-red-100 text-red-700 rounded text-sm flex-shrink-0">{error}</div>}
                            
                            <div className="space-y-3 flex-shrink-0">
                                <div>
                                    <label className="block font-bold mb-1 text-sm">SSC Name (Read-only)</label>
                                    <input
                                        type="text"
                                        value={ssc.name}
                                        disabled
                                        className="w-full px-3 py-2 border rounded text-sm bg-gray-100"
                                        style={{
                                            backgroundColor: '#e5e7eb',
                                            color: backgroundStyle.color,
                                            borderColor: backgroundStyle.borderColor
                                        }}
                                    />
                                </div>
                                
                                {/* SSC Type and Component Type side by side */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="relative">
                                        <label className="block font-bold mb-1 text-sm">
                                            SSC Type <span className="text-red-500">*</span>
                                        </label>
                                        <input
                                            type="text"
                                            value={sscType}
                                            onChange={(e) => {
                                                setSscType(e.target.value);
                                                setShowSscTypeSuggestions(e.target.value.length > 0);
                                                setError('');
                                            }}
                                            onBlur={() => setTimeout(() => setShowSscTypeSuggestions(false), 200)}
                                            className="w-full px-3 py-2 border rounded text-sm"
                                            placeholder="e.g., Pump"
                                            style={{
                                                backgroundColor: backgroundStyle.backgroundColor,
                                                color: backgroundStyle.color,
                                                borderColor: backgroundStyle.borderColor
                                            }}
                                        />
                                        {showSscTypeSuggestions && sscTypeSuggestions.length > 0 && (
                                            <div className="absolute z-10 w-full mt-1 bg-white border rounded shadow-lg max-h-40 overflow-y-auto">
                                                {sscTypeSuggestions
                                                    .filter(s => s.toLowerCase().includes(sscType.toLowerCase()))
                                                    .map((suggestion, idx) => (
                                                        <div
                                                            key={idx}
                                                            className="px-3 py-2 hover:bg-gray-100 cursor-pointer text-sm"
                                                            onMouseDown={() => {
                                                                setSscType(suggestion);
                                                                setShowSscTypeSuggestions(false);
                                                            }}
                                                        >
                                                            {suggestion}
                                                        </div>
                                                    ))
                                                }
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="relative">
                                        <label className="block font-bold mb-1 text-sm">
                                            Component Type <span className="text-red-500">*</span>
                                        </label>
                                        <input
                                            type="text"
                                            value={componentType}
                                            onChange={(e) => {
                                                setComponentType(e.target.value);
                                                setShowComponentTypeSuggestions(e.target.value.length > 0);
                                                setError('');
                                            }}
                                            onBlur={() => setTimeout(() => setShowComponentTypeSuggestions(false), 200)}
                                            className="w-full px-3 py-2 border rounded text-sm"
                                            placeholder="e.g., Centrifugal Pump"
                                            style={{
                                                backgroundColor: backgroundStyle.backgroundColor,
                                                color: backgroundStyle.color,
                                                borderColor: backgroundStyle.borderColor
                                            }}
                                        />
                                        {showComponentTypeSuggestions && componentTypeSuggestions.length > 0 && (
                                            <div className="absolute z-10 w-full mt-1 bg-white border rounded shadow-lg max-h-40 overflow-y-auto">
                                                {componentTypeSuggestions
                                                    .filter(s => s.toLowerCase().includes(componentType.toLowerCase()))
                                                    .map((suggestion, idx) => (
                                                        <div
                                                            key={idx}
                                                            className="px-3 py-2 hover:bg-gray-100 cursor-pointer text-sm"
                                                            onMouseDown={() => {
                                                                setComponentType(suggestion);
                                                                setShowComponentTypeSuggestions(false);
                                                            }}
                                                        >
                                                            {suggestion}
                                                        </div>
                                                    ))
                                                }
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                            
                            {/* Failure Modes Section - scrollable */}
                            <div className="flex-1 min-h-0 mt-4 flex flex-col">
                                <label className="block font-bold mb-2 text-sm flex-shrink-0">Failure Modes</label>
                                <div className="flex-1 overflow-y-auto border rounded p-2" style={{
                                    borderColor: backgroundStyle.borderColor
                                }}>
                                    <div className="space-y-3">
                                        {failureModes.map((fm, index) => {
                                            const probType = fm.probabilityType || 'probability';
                                            // Normalize distribution type to match dropdown options (handle case variations)
                                            const rawDistType = fm.data?.distribution_type || '';
                                            const matchedDist = distributionTypes.find(d => d.value.toLowerCase() === rawDistType.toLowerCase());
                                            const currentDistType = matchedDist ? matchedDist.value : rawDistType;
                                            const distInfo = getDistributionInfo(currentDistType);
                                            
                                            return (
                                                <div key={index} className="p-3 border rounded text-xs" style={{
                                                    borderColor: backgroundStyle.borderColor,
                                                    backgroundColor: backgroundStyle.backgroundColor
                                                }}>
                                                    <div className="mb-2">
                                                        <label className="block font-semibold mb-1">Failure Mode Name</label>
                                                        <input
                                                            type="text"
                                                            value={fm.mode}
                                                            onChange={(e) => updateFailureMode(index, 'mode', e.target.value)}
                                                            className="w-full px-2 py-1 border rounded"
                                                            style={{
                                                                backgroundColor: backgroundStyle.backgroundColor,
                                                                color: backgroundStyle.color,
                                                                borderColor: backgroundStyle.borderColor
                                                            }}
                                                        />
                                                    </div>
                                                    <div className="mb-2">
                                                        <label className="block font-semibold mb-1">Description</label>
                                                        <textarea
                                                            value={fm.data?.description || ''}
                                                            onChange={(e) => updateFailureMode(index, 'description', e.target.value)}
                                                            rows="2"
                                                            className="w-full px-2 py-1 border rounded"
                                                            style={{
                                                                backgroundColor: backgroundStyle.backgroundColor,
                                                                color: backgroundStyle.color,
                                                                borderColor: backgroundStyle.borderColor
                                                            }}
                                                        />
                                                    </div>
                                                    
                                                    {/* Evaluation Type Selection */}
                                                    <div className="mb-2">
                                                        <label className="block font-semibold mb-1">Evaluation Type</label>
                                                        <select
                                                            value={probType}
                                                            onChange={(e) => updateFailureMode(index, 'probabilityType', e.target.value)}
                                                            className="w-full px-2 py-1 border rounded"
                                                            style={{
                                                                backgroundColor: backgroundStyle.backgroundColor,
                                                                color: backgroundStyle.color,
                                                                borderColor: backgroundStyle.borderColor
                                                            }}
                                                        >
                                                            <option value="probability">Failure Probability</option>
                                                            <option value="qualitative">Qualitative (Low/Medium/High)</option>
                                                            <option value="screened">Screened Out</option>
                                                            <option value="linkedSystem">Link to System Evaluation File</option>
                                                        </select>
                                                    </div>
                                                    
                                                    {/* Linked System File Selection */}
                                                    {probType === 'linkedSystem' && (
                                                        <div className="mb-2 p-2 rounded" style={{ backgroundColor: settings.background === 'dark' ? '#374151' : '#f0f9ff' }}>
                                                            <label className="block font-semibold mb-1">KUREAS-SYS File</label>
                                                            <div className="flex gap-2">
                                                                <input
                                                                    type="text"
                                                                    value={fm.linkedSystemFile || ''}
                                                                    readOnly
                                                                    className="flex-1 px-2 py-1 border rounded text-xs"
                                                                    placeholder="Select a *.KNOW_SYS file..."
                                                                    style={{
                                                                        backgroundColor: backgroundStyle.backgroundColor,
                                                                        color: backgroundStyle.color,
                                                                        borderColor: backgroundStyle.borderColor
                                                                    }}
                                                                />
                                                                <button
                                                                    type="button"
                                                                    onClick={() => {
                                                                        const input = document.createElement('input');
                                                                        input.type = 'file';
                                                                        input.accept = '.KNOW_SYS,.KNOW';
                                                                        input.onchange = (e) => {
                                                                            const file = e.target.files[0];
                                                                            if (file) {
                                                                                if (!file.name.toUpperCase().endsWith('.KNOW_SYS') && !file.name.toUpperCase().endsWith('.KNOW')) {
                                                                                    alert('Please select a valid KUREAS-SYS file (filename must end with ".KNOW_SYS").');
                                                                                    return;
                                                                                }
                                                                                const reader = new FileReader();
                                                                                reader.onload = (event) => {
                                                                                    try {
                                                                                        const data = JSON.parse(event.target.result);
                                                                                        updateFailureMode(index, 'linkedSystemFile', file.name);
                                                                                        updateFailureMode(index, 'linkedSystemName', data.systemName || file.name.replace(/\.KNOW_SYS$/i, '').replace(/\.KNOW$/i, ''));
                                                                                    } catch (err) {
                                                                                        alert('Error reading system file: ' + err.message);
                                                                                    }
                                                                                };
                                                                                reader.readAsText(file);
                                                                            }
                                                                        };
                                                                        input.click();
                                                                    }}
                                                                    className="px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 text-xs"
                                                                >
                                                                    Browse
                                                                </button>
                                                            </div>
                                                            {fm.linkedSystemName && (
                                                                <div className="mt-1 text-xs text-gray-500">
                                                                    System: <strong>{fm.linkedSystemName}</strong>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                    
                                                    {/* Qualitative Level Selection */}
                                                    {probType === 'qualitative' && (
                                                        <div className="mb-2">
                                                            <label className="block font-semibold mb-1">Qualitative Level</label>
                                                            <select
                                                                value={fm.qualitativeLevel || 'medium'}
                                                                onChange={(e) => updateFailureMode(index, 'qualitativeLevel', e.target.value)}
                                                                className="w-full px-2 py-1 border rounded"
                                                                style={{
                                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                                    color: backgroundStyle.color,
                                                                    borderColor: backgroundStyle.borderColor
                                                                }}
                                                            >
                                                                <option value="low">Low ({settings?.qualitativeProbLow || '1E-5'})</option>
                                                                <option value="medium">Medium ({settings?.qualitativeProbMedium || '1E-3'})</option>
                                                                <option value="high">High ({settings?.qualitativeProbHigh || '1E-1'})</option>
                                                            </select>
                                                        </div>
                                                    )}

                                                    {/* Screened indicator */}
                                                    {probType === 'screened' && (
                                                        <div className="mt-2 p-2 bg-gray-200 rounded text-center text-gray-600">
                                                            This failure mode is screened out and will not be included in analysis
                                                        </div>
                                                    )}

                                                    {/* Failure Probability model section */}
                                                    {probType === 'probability' && (() => {
                                                        const mdl = fm.failureModel || '0';
                                                        const calcP = computeFMProb(fm);
                                                        const calcPStr = calcP !== null ? calcP.toExponential(3).toUpperCase() : '';
                                                        const mdInp = {
                                                            width: '100%', border: '1px solid #c4b5fd', borderRadius: '4px',
                                                            padding: '3px 6px', fontSize: '11px', fontFamily: 'monospace',
                                                            backgroundColor: 'white', color: '#111827',
                                                            MozAppearance: 'textfield', appearance: 'textfield'
                                                        };
                                                        return (
                                                            <div className="rounded border mt-1 mb-2" style={{ backgroundColor: settings.background === 'dark' ? '#1e1b4b' : '#f5f3ff', borderColor: '#ddd6fe', padding: '10px' }}>
                                                                {/* Failure Model */}
                                                                <div className="mb-2">
                                                                    <label className="block font-bold mb-1" style={{ color: '#5b21b6', fontSize: '11px' }}>Failure Model</label>
                                                                    <select value={mdl} onChange={e => updateFailureMode(index, 'failureModel', e.target.value)}
                                                                        style={{ width: '100%', border: '1px solid #c4b5fd', borderRadius: '4px', padding: '3px 5px', fontSize: '11px', background: 'white', cursor: 'pointer' }}>
                                                                        <option value="0">Probability of Failure</option>
                                                                        <option value="1">Demand (Binomial)</option>
                                                                        <option value="2">Fails While Operating (Poisson)</option>
                                                                        <option value="3">Fails in Standby</option>
                                                                        <option value="4">Fails While Operating w/ Repair</option>
                                                                        <option value="5">Logic T/F Flag</option>
                                                                    </select>
                                                                </div>

                                                                {/* FM0: Direct probability */}
                                                                {mdl === '0' && (
                                                                    <div className="mb-2">
                                                                        <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Mean Probability</label>
                                                                        <input type="text" value={fm.data?.mean || ''}
                                                                            onChange={e => updateFailureMode(index, 'mean', e.target.value)}
                                                                            placeholder="e.g., 3.0E-04" style={mdInp} />
                                                                    </div>
                                                                )}

                                                                {/* FM1: Demand (Binomial) */}
                                                                {mdl === '1' && (
                                                                    <div className="grid grid-cols-2 gap-2 mb-2">
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Probability (/demand)</label>
                                                                            <input type="number" min="0" max="1" step="any" value={fm.demandProb || ''}
                                                                                onChange={e => updateFailureMode(index, 'demandProb', e.target.value)} style={mdInp} />
                                                                        </div>
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Demands (N)</label>
                                                                            <input type="number" min="1" step="1" value={fm.demandN || '1'}
                                                                                onChange={e => updateFailureMode(index, 'demandN', String(Math.max(1, parseInt(e.target.value)||1)))}
                                                                                style={{...mdInp, MozAppearance:'auto', appearance:'auto'}} />
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* FM2: Fails While Operating (Poisson) */}
                                                                {mdl === '2' && (
                                                                    <div className="grid grid-cols-2 gap-2 mb-2">
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Failure Rate &lambda; (/hr)</label>
                                                                            <input type="number" min="0" step="any" value={fm.lambda || ''}
                                                                                onChange={e => updateFailureMode(index, 'lambda', e.target.value)} style={mdInp} />
                                                                        </div>
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Mission Time (hr)</label>
                                                                            <input type="number" min="0" step="any" value={fm.missionTime || ''}
                                                                                onChange={e => updateFailureMode(index, 'missionTime', e.target.value)} style={mdInp} />
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* FM3: Fails in Standby */}
                                                                {mdl === '3' && (
                                                                    <div className="grid grid-cols-2 gap-2 mb-2">
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Failure Rate &lambda; (/hr)</label>
                                                                            <input type="number" min="0" step="any" value={fm.lambda || ''}
                                                                                onChange={e => updateFailureMode(index, 'lambda', e.target.value)} style={mdInp} />
                                                                        </div>
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Inspection Interval (hr)</label>
                                                                            <input type="number" min="0" step="any" value={fm.inspInterval || ''}
                                                                                onChange={e => updateFailureMode(index, 'inspInterval', e.target.value)} style={mdInp} />
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* FM4: Fails While Operating w/ Repair */}
                                                                {mdl === '4' && (
                                                                    <div className="grid grid-cols-3 gap-2 mb-2">
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Failure Rate &lambda; (/hr)</label>
                                                                            <input type="number" min="0" step="any" value={fm.lambda || ''}
                                                                                onChange={e => updateFailureMode(index, 'lambda', e.target.value)} style={mdInp} />
                                                                        </div>
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Mission Time (hr)</label>
                                                                            <input type="number" min="0" step="any" value={fm.missionTime || ''}
                                                                                onChange={e => updateFailureMode(index, 'missionTime', e.target.value)} style={mdInp} />
                                                                        </div>
                                                                        <div>
                                                                            <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Repair Time &mu; (hr)</label>
                                                                            <input type="number" min="0" step="any" value={fm.tauRepair || ''}
                                                                                onChange={e => updateFailureMode(index, 'tauRepair', e.target.value)} style={mdInp} />
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* FM5: Logic T/F Flag */}
                                                                {mdl === '5' && (
                                                                    <div className="mb-2">
                                                                        <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Flag Value</label>
                                                                        <div className="flex gap-2">
                                                                            {[['T','True'],['F','False'],['I','Ignore']].map(([val,lbl]) => (
                                                                                <button key={val} type="button"
                                                                                    onClick={() => updateFailureMode(index, 'logicFlag', val)}
                                                                                    style={{ flex:1, padding:'3px 0', fontSize:'11px', fontWeight:'700', borderRadius:'4px', border:'1px solid',
                                                                                        borderColor:(fm.logicFlag||'T')===val?'#7c3aed':'#c4b5fd',
                                                                                        background:(fm.logicFlag||'T')===val?'#7c3aed':'white',
                                                                                        color:(fm.logicFlag||'T')===val?'white':'#6b7280', cursor:'pointer'
                                                                                    }}>{lbl}</button>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* Computed probability display for FM1–FM4 */}
                                                                {['1','2','3','4'].includes(mdl) && (
                                                                    <div className="mb-2">
                                                                        <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Computed Probability</label>
                                                                        <div style={{ border:'1px solid #e9d5ff', borderRadius:'4px', padding:'3px 8px', fontSize:'11px', fontFamily:'monospace', background:'#f5f3ff', color:'#7c3aed', fontWeight:'700', minHeight:'22px' }}>
                                                                            {calcPStr || <span style={{ color:'#9ca3af', fontStyle:'italic', fontWeight:'normal' }}>set parameters above</span>}
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* Logic flag state display */}
                                                                {mdl === '5' && (
                                                                    <div className="mb-2">
                                                                        <label className="block mb-1" style={{ color: '#6b7280', fontSize: '11px' }}>Flag State</label>
                                                                        <div style={{ border:'1px solid #d1d5db', borderRadius:'4px', padding:'3px 8px', fontSize:'11px', fontFamily:'monospace', background:'#f3f4f6', color:'#374151', fontWeight:'700' }}>
                                                                            {({T:'TRUE',F:'FALSE',I:'IGNORE'})[fm.logicFlag||'T']}
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* Distribution — only for FM0–FM4 */}
                                                                {mdl !== '5' && (
                                                                    <div style={{ borderTop:'1px solid #ddd6fe', paddingTop:'8px', marginTop:'4px' }}>
                                                                        <label className="block font-bold mb-1" style={{ color: '#5b21b6', fontSize: '11px' }}>Distribution</label>
                                                                        <select value={currentDistType}
                                                                            onChange={e => updateFailureMode(index, 'distribution_type', e.target.value)}
                                                                            disabled={probType === 'qualitative'}
                                                                            style={{ width:'100%', border:'1px solid #c4b5fd', borderRadius:'4px', padding:'3px 5px', fontSize:'11px', background: probType==='qualitative'?'#e5e7eb':'white', cursor:'pointer' }}>
                                                                            <option value="">Select distribution...</option>
                                                                            {distributionTypes.map(dt => (
                                                                                <option key={dt.value} value={dt.value}>{dt.label}</option>
                                                                            ))}
                                                                        </select>
                                                                        {currentDistType && currentDistType !== 'Point' && currentDistType !== 'CNI' && (
                                                                            <div className="grid grid-cols-2 gap-2 mt-2">
                                                                                <div>
                                                                                    <label className="block mb-1" style={{ color:'#6b7280', fontSize:'11px' }}>{distInfo.param1Label}</label>
                                                                                    <input type="text" value={fm.data?.distribution_shape_parameter || ''}
                                                                                        onChange={e => updateFailureMode(index, 'distribution_shape_parameter', e.target.value)} style={mdInp} />
                                                                                </div>
                                                                                <div>
                                                                                    <label className="block mb-1" style={{ color:'#6b7280', fontSize:'11px' }}>{distInfo.param2Label}</label>
                                                                                    <input type="text" value={fm.data?.distribution_scale_parameter || ''}
                                                                                        onChange={e => updateFailureMode(index, 'distribution_scale_parameter', e.target.value)} style={mdInp} />
                                                                                </div>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })()}

                                                    {/* Units — only for FM0 (other models have their own time params) */}
                                                    {probType !== 'screened' && probType !== 'linkedSystem' && probType !== 'qualitative' && (fm.failureModel || '0') === '0' && (
                                                        <div className="mt-2">
                                                            <label className="block font-semibold mb-1">Units</label>
                                                            <select value={fm.data?.units || 'd'}
                                                                onChange={(e) => updateFailureMode(index, 'units', e.target.value)}
                                                                className="w-full px-2 py-1 border rounded"
                                                                style={{ backgroundColor: backgroundStyle.backgroundColor, color: backgroundStyle.color, borderColor: backgroundStyle.borderColor }}>
                                                                <option value="d">per demand</option>
                                                                <option value="h">per hour</option>
                                                                <option value="y">per year</option>
                                                            </select>
                                                        </div>
                                                    )}

                                                    {/* Time to operate — only for FM0 per-hour or per-year */}
                                                    {probType !== 'screened' && probType !== 'linkedSystem' && (fm.failureModel || '0') === '0' && (fm.data?.units === 'h' || fm.data?.units === 'y') && (
                                                        <div className="mt-2">
                                                            <label className="block font-semibold mb-1">Time Required to Operate (hours)</label>
                                                            <input
                                                                type="number"
                                                                value={fm.timeToOperate || 24}
                                                                onChange={(e) => updateFailureMode(index, 'timeToOperate', parseFloat(e.target.value) || 24)}
                                                                className="w-full px-2 py-1 border rounded font-mono"
                                                                min="0" step="1"
                                                                style={{ backgroundColor: backgroundStyle.backgroundColor, color: backgroundStyle.color, borderColor: backgroundStyle.borderColor }}
                                                            />
                                                            <p className="text-xs text-gray-500 mt-1">Used to convert failure rate to probability: P = 1 - e^(-\u03bbt)</p>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex gap-2 mt-4 justify-end flex-shrink-0">
                                <button
                                    onClick={onCancel}
                                    className="px-4 py-2 border rounded hover:bg-gray-100 text-sm"
                                    style={{ borderColor: backgroundStyle.borderColor }}
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={handleSave}
                                    className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm"
                                >
                                    Save Changes
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Check Script Modal - allows user to select unknown identifiers to add as SSCs
        function CheckScriptModal({ unknownIdentifiers, setUnknownIdentifiers, onConfirm, onClose, backgroundStyle }) {
            const toggleSelection = (index) => {
                setUnknownIdentifiers(prev => prev.map((item, i) => 
                    i === index ? { ...item, selected: !item.selected } : item
                ));
            };
            
            const selectAll = () => {
                setUnknownIdentifiers(prev => prev.map(item => ({ ...item, selected: true })));
            };
            
            const selectNone = () => {
                setUnknownIdentifiers(prev => prev.map(item => ({ ...item, selected: false })));
            };
            
            const selectedCount = unknownIdentifiers.filter(u => u.selected).length;
            
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" style={{ maxWidth: '500px' }} onClick={e => e.stopPropagation()}>
                        <div className="p-4">
                            <h2 className="text-xl font-bold mb-2">Check Script Results</h2>
                            <p className="text-sm text-gray-600 mb-4">
                                The following identifiers were found in the script but are not recognized as SSCs, 
                                Supercomponents, Boundary Conditions, or defined variables. 
                                Select the ones you would like to add as new SSCs.
                            </p>
                            
                            <div className="flex gap-2 mb-3">
                                <button 
                                    onClick={selectAll}
                                    className="px-3 py-1 text-xs bg-blue-100 hover:bg-blue-200 rounded"
                                >
                                    Select All
                                </button>
                                <button 
                                    onClick={selectNone}
                                    className="px-3 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded"
                                >
                                    Select None
                                </button>
                            </div>
                            
                            <div className="max-h-64 overflow-y-auto border rounded p-2 mb-4" style={{
                                borderColor: backgroundStyle?.borderColor || '#d1d5db'
                            }}>
                                {unknownIdentifiers.map((item, index) => (
                                    <label key={index} className="flex items-center gap-2 p-2 hover:bg-gray-50 rounded cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={item.selected}
                                            onChange={() => toggleSelection(index)}
                                            className="w-4 h-4"
                                        />
                                        <span className="font-mono text-sm">{item.name}</span>
                                    </label>
                                ))}
                            </div>
                            
                            <div className="flex justify-between items-center">
                                <span className="text-sm text-gray-600">
                                    {selectedCount} of {unknownIdentifiers.length} selected
                                </span>
                                <div className="flex gap-2">
                                    <button
                                        onClick={onClose}
                                        className="px-4 py-2 border rounded hover:bg-gray-100"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={onConfirm}
                                        disabled={selectedCount === 0}
                                        className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        Add {selectedCount > 0 ? `${selectedCount} ` : ''}as SSC{selectedCount !== 1 ? 's' : ''}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // FTL basic-event import modal
        function FTLImportModal({ pendingEvents, setPendingEvents, onConfirm, onClose, backgroundStyle, settings }) {
            const toggle = (i) => setPendingEvents(prev => prev.map((ev, idx) => idx === i ? { ...ev, selected: !ev.selected } : ev));
            const setEvalType = (i, val) => setPendingEvents(prev => prev.map((ev, idx) => idx === i ? { ...ev, evalType: val } : ev));
            const selectAll = () => setPendingEvents(prev => prev.map(ev => ({ ...ev, selected: true })));
            const selectNone = () => setPendingEvents(prev => prev.map(ev => ({ ...ev, selected: false })));
            const count = pendingEvents.filter(ev => ev.selected).length;

            const probLow    = settings?.qualitativeProbLow    || '1E-5';
            const probMedium = settings?.qualitativeProbMedium || '1E-3';
            const probHigh   = settings?.qualitativeProbHigh   || '1E-1';

            const evalOptions = [
                { value: 'probability', label: 'Probability', color: '#1d4ed8' },
                { value: 'low',         label: `Low (${probLow})`,     color: '#6b7280' },
                { value: 'medium',      label: `Med (${probMedium})`,  color: '#92400e' },
                { value: 'high',        label: `High (${probHigh})`,   color: '#b91c1c' },
                { value: 'screened',    label: 'Screened',              color: '#4b5563' },
            ];

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" style={{ maxWidth: '680px' }} onClick={e => e.stopPropagation()}>
                        <div className="p-5">
                            <h2 className="text-xl font-bold mb-1">Import Basic Events as SSCs</h2>
                            <p className="text-sm text-gray-500 mb-4">
                                Select events to import as new SSCs and choose the evaluation type for each.
                            </p>
                            <div className="flex gap-2 mb-3">
                                <button onClick={selectAll} className="px-3 py-1 text-xs bg-green-100 hover:bg-green-200 rounded">Select All</button>
                                <button onClick={selectNone} className="px-3 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">Select None</button>
                            </div>
                            <div className="max-h-72 overflow-y-auto border rounded mb-4" style={{ borderColor: backgroundStyle?.borderColor || '#d1d5db' }}>
                                {pendingEvents.map((ev, i) => (
                                    <div key={i} className="flex items-start gap-2 p-2 border-b" style={{ borderColor: backgroundStyle?.borderColor || '#e5e7eb', backgroundColor: ev.selected ? 'transparent' : '#f9fafb' }}>
                                        <input type="checkbox" checked={ev.selected} onChange={() => toggle(i)} className="w-4 h-4 mt-1 flex-shrink-0" />
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <span className="font-mono text-sm font-semibold text-green-700">{ev.name}</span>
                                                {ev.probability !== null && ev.probability !== undefined && (ev.evalType === 'probability' || !ev.evalType) && (
                                                    <span className="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded font-mono">
                                                        p = {typeof ev.probability === 'number' ? ev.probability.toExponential(3).toUpperCase() : ev.probability}
                                                    </span>
                                                )}
                                            </div>
                                            {ev.description && <p className="text-xs text-gray-500 mt-0.5">{ev.description}</p>}
                                        </div>
                                        {/* Eval type selector — only active when row is checked */}
                                        <div className="flex-shrink-0 flex gap-1 flex-wrap justify-end" style={{ maxWidth: '260px' }}>
                                            {evalOptions.map(opt => (
                                                <button
                                                    key={opt.value}
                                                    type="button"
                                                    disabled={!ev.selected}
                                                    onClick={() => setEvalType(i, opt.value)}
                                                    style={{
                                                        fontSize: '10px', padding: '2px 6px', borderRadius: '4px', border: '1px solid',
                                                        borderColor: (ev.evalType || 'probability') === opt.value ? opt.color : '#d1d5db',
                                                        background: (ev.evalType || 'probability') === opt.value ? opt.color : 'white',
                                                        color: (ev.evalType || 'probability') === opt.value ? 'white' : '#6b7280',
                                                        cursor: ev.selected ? 'pointer' : 'not-allowed',
                                                        opacity: ev.selected ? 1 : 0.4,
                                                        whiteSpace: 'nowrap',
                                                    }}
                                                >{opt.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-sm text-gray-500">{count} of {pendingEvents.length} selected</span>
                                <div className="flex gap-2">
                                    <button onClick={onClose} className="px-4 py-2 border rounded hover:bg-gray-100 text-sm" style={{ borderColor: backgroundStyle?.borderColor || '#d1d5db' }}>Cancel</button>
                                    <button
                                        onClick={onConfirm}
                                        disabled={count === 0}
                                        className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed text-sm"
                                    >
                                        Import {count > 0 ? `${count} ` : ''}SSC{count !== 1 ? 's' : ''}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
