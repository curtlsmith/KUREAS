                        ctx.save();
                        ctx.translate(canvas.width / 2 + offset.x, 50 + offset.y);
                        ctx.scale(scale, scale);

                        drawNode(ctx, tree, 0, 0);

                        ctx.restore();
                    }, [tree, scale, offset, settings]);

                    // Mouse handlers
                    const handleMouseDown = (e) => {
                        setIsDragging(true);
                        setDragStart({ x: e.clientX - offset.x, y: e.clientY - offset.y });
                    };

                    const handleMouseMove = (e) => {
                        if (isDragging) {
                            setOffset({
                                x: e.clientX - dragStart.x,
                                y: e.clientY - dragStart.y
                            });
                        }
                    };

                    const handleMouseUp = () => {
                        setIsDragging(false);
                    };

                    const handleWheel = (e) => {
                        e.preventDefault();
                        const delta = e.deltaY > 0 ? -0.1 : 0.1;
                        setScale(prev => Math.max(0.1, Math.min(3, prev + delta)));
                    };

                    return (
                        <div style={{ width: '100%', height: '100%', position: 'relative' }}>
                            <canvas
                                ref={canvasRef}
                                onMouseDown={handleMouseDown}
                                onMouseMove={handleMouseMove}
                                onMouseUp={handleMouseUp}
                                onMouseLeave={handleMouseUp}
                                onWheel={handleWheel}
                                style={{ 
                                    cursor: isDragging ? 'grabbing' : 'grab',
                                    width: '100%',
                                    height: '100%'
                                }}
                            />
                            <div style={{
                                position: 'absolute',
                                bottom: '10px',
                                right: '10px',
                                padding: '8px',
                                background: settings.background === 'dark' ? '#374151' : '#f3f4f6',
                                borderRadius: '4px',
                                fontSize: '12px',
                                color: settings.background === 'dark' ? '#f3f4f6' : '#111827'
                            }}>
                                Zoom: {Math.round(scale * 100)}%
                            </div>
                        </div>
                    );
                }

                function FailureTreeNode({ node, level = 0, isLast = false, parentPrefix = '' }) {
                    const hasChildren = node.children && node.children.length > 0;
                    const isExpanded = expandedNodes.has(node.id);
                    const isBasicEvent = node.type === 'BASIC' || node.type === 'BASIC_NOT';
                    const isNotGate = node.type === 'NOT';
                    const isHouse = basicEventData[node.label]?.isHouseEvent;
                    
                    // Build prefix for this level
                    const connector = '';  // No vertical lines
                    const branch = showConnectors ? (isLast ? '\u2514' : '\u251C') : '';
                    const space = showConnectors ? ' ' : '';
                    
                    // Gate type badge color
                    const gateColor = node.type === 'OR' ? 'text-blue-600' : 
                                      node.type === 'AND' ? 'text-green-600' : 
                                      node.type === 'NOT' ? 'text-orange-600' :
                                      node.type.includes('/') ? 'text-purple-600' :
                                      'text-gray-700';
                    
                    // House event badge
                    const houseData = basicEventData[node.label];
                    const houseLabel = houseData?.isHouseEvent ? 
                        (houseData.houseState === 'TRUE' ? '\u25A0 HOUSE=TRUE' :

                                    {/* Tab Content */}

                                        borderColor: backgroundStyle.borderColor,

                                    </div>

                                                settings={settings}
                                                mcubValue={mcubValue}
                                            />
                                        ) : (
                                            <div>
                                                {/* Calculate importance measures */}
                                                {(() => {
                                                    if (!mcubValue || cutSets.length === 0) {
                                                        return (
                                                            <div className="text-center p-8 text-gray-500">
                                                                <p>No importance measures available</p>
                                                                <p className="text-xs mt-2">Generate cut sets first</p>
                                                            </div>
                                                        );
                                                    }
                                                    
                                                    // Get all unique basic events
                                                    const allEvents = new Set();
                                                    cutSets.forEach(cs => {
                                                        cs.events.forEach(e => allEvents.add(e));
                                                    });
                                                    
                                                    // Calculate RIR and RRR for each event
                                                    const importanceMeasures = Array.from(allEvents).map(eventName => {
                                                        const eventData = basicEventData[eventName];
                                                        if (!eventData || eventData.probability === null || eventData.isLinked) {
                                                            return null;
                                                        }
                                                        
                                                        const originalProb = eventData.probability;
                                                        
                                                        // Calculate RIR: set event probability to 1
                                                        const tempData1 = { ...basicEventData };
                                                        tempData1[eventName] = { ...eventData, probability: 1.0, isLinked: false };
                                                        const cutSetProbs1 = cutSets.map(cs => {
                                                            const result = calculateCutSetProbability(cs.events, tempData1);
                                                            return result.probability;
                                                        }).filter(p => p !== null);
                                                        const newProb1 = calculateMCUB(cutSetProbs1);
                                                        const rir = newProb1 / mcubValue;
                                                        
                                                        // Calculate RRR: set event probability to 0
                                                        const tempData0 = { ...basicEventData };
                                                        tempData0[eventName] = { ...eventData, probability: 0.0, isLinked: false };
                                                        const cutSetProbs0 = cutSets.map(cs => {
                                                            const result = calculateCutSetProbability(cs.events, tempData0);
                                                            return result.probability;
                                                        }).filter(p => p !== null);
                                                        const newProb0 = calculateMCUB(cutSetProbs0);
                                                        const rrr = newProb0 === 0 ? Infinity : mcubValue / newProb0;
                                                        
                                                        // Calculate PC and SWIM
                                                        const pc = rrr === Infinity ? 1.0 : (1 - (1 / rrr));
                                                        const swim = pc + Math.pow(1 - (1 / rir), 7.64);
                                                        
                                                        return {
                                                            event: eventName,
                                                            description: eventData.description || eventName,
                                                            rir: rir,
                                                            rrr: rrr === Infinity ? 999 : rrr,
                                                            pc: pc,
                                                            swim: swim
                                                        };
                                                    }).filter(m => m !== null);
                                                    
                                                    // Get axis labels and data based on selection
                                                    const getAxisLabel = (axis) => {
                                                        switch(axis) {
                                                            case 'rir': return 'Risk Increase Ratio (RIR)';
                                                            case 'rrr': return 'Risk Reduction Ratio (RRR)';
                                                            case 'pc': return 'Percent Contribution (PC)';
                                                            case 'swim': return 'SWIM (NUREG/CR-5632)';
                                                            default: return '';
                                                        }
                                                    };
                                                    
                                                    const getAxisValue = (measure, axis) => {
                                                        switch(axis) {
                                                            case 'rir': return measure.rir;
                                                            case 'rrr': return measure.rrr;
                                                            case 'pc': return measure.pc;
                                                            case 'swim': return measure.swim;
                                                            default: return 0;
                                                        }
                                                    };
                                                    
                                                    // Find max values for scaling - round to next half-decade
                                                    const rawMaxX = Math.max(...importanceMeasures.map(m => getAxisValue(m, plotXAxis)));
                                                    const rawMaxY = Math.max(...importanceMeasures.map(m => getAxisValue(m, plotYAxis)));
                                                    
                                                    // Function to get next half-decade value (1, 5, 10, 50, 100, 500, 1000, etc.)
                                                    const getNextDecade = (value) => {
                                                        if (value <= 1) return 1;
                                                        if (value <= 5) return 5;
                                                        if (value <= 10) return 10;
                                                        if (value <= 50) return 50;
                                                        if (value <= 100) return 100;
                                                        if (value <= 500) return 500;
                                                        if (value <= 1000) return 1000;
                                                        if (value <= 5000) return 5000;
                                                        if (value <= 10000) return 10000;
                                                        // For larger values, round to next 5*10^n
                                                        const log = Math.log10(value);
                                                        const exp = Math.floor(log);
                                                        const mantissa = value / Math.pow(10, exp);
                                                        if (mantissa <= 5) return 5 * Math.pow(10, exp);
                                                        return Math.pow(10, exp + 1);
                                                    };
                                                    
                                                    const maxX = getNextDecade(rawMaxX);
                                                    const maxY = getNextDecade(rawMaxY);
                                                    
                                                    const plotWidth = 500;
                                                    const plotHeight = 400;
                                                    const margin = { top: 50, right: 20, bottom: 60, left: 60 }; // Increased top margin
                                                    const innerWidth = plotWidth - margin.left - margin.right;
                                                    const innerHeight = plotHeight - margin.top - margin.bottom;
                                                    
                                                    return (
                                                        <div className="p-4">
                                                            <div className="mb-4">
                                                                <h3 className={`${fontSizeClass} font-bold mb-2`}>Importance Measures Plot</h3>
                                                                <div className="flex gap-4 items-center text-sm">
                                                                    <div className="flex items-center gap-2">
                                                                        <label>X-Axis:</label>
                                                                        <select 
                                                                            value={plotXAxis}
                                                                            onChange={(e) => setPlotXAxis(e.target.value)}
                                                                            className="border px-2 py-1 rounded"
                                                                        >
                                                                            <option value="rir">RIR</option>
                                                                            <option value="rrr">RRR</option>
                                                                            <option value="pc">PC</option>
                                                                            <option value="swim">SWIM</option>
                                                                        </select>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <label>Y-Axis:</label>
                                                                        <select 
                                                                            value={plotYAxis}
                                                                            onChange={(e) => setPlotYAxis(e.target.value)}
                                                                            className="border px-2 py-1 rounded"
                                                                        >
                                                                            <option value="rir">RIR</option>
                                                                            <option value="rrr">RRR</option>
                                                                            <option value="pc">PC</option>
                                                                            <option value="swim">SWIM</option>
                                                                        </select>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            
                                                            <svg width={plotWidth} height={plotHeight} className="border">
                                                                <g transform={`translate(${margin.left},${margin.top})`}>
                                                                    {/* Grid lines - 5 major ticks */}
                                                                    {[0, 0.25, 0.5, 0.75, 1].map(frac => (
                                                                        <g key={frac}>
                                                                            <line 
                                                                                x1={frac * innerWidth} 
                                                                                y1={0} 
                                                                                x2={frac * innerWidth} 
                                                                                y2={innerHeight}
                                                                                stroke="#e5e7eb" 
                                                                                strokeDasharray="2,2"
                                                                            />
                                                                            <line 
                                                                                x1={0} 
                                                                                y1={frac * innerHeight} 
                                                                                x2={innerWidth} 
                                                                                y2={frac * innerHeight}
                                                                                stroke="#e5e7eb" 
                                                                                strokeDasharray="2,2"
                                                                            />
                                                                        </g>
                                                                    ))}
                                                                    
                                                                    {/* Axes */}
                                                                    <line x1={0} y1={innerHeight} x2={innerWidth} y2={innerHeight} stroke="black" strokeWidth={2} />
                                                                    <line x1={0} y1={0} x2={0} y2={innerHeight} stroke="black" strokeWidth={2} />
                                                                    
                                                                    {/* Data points with labels */}
                                                                    {importanceMeasures.map((m, idx) => {
                                                                        const xVal = getAxisValue(m, plotXAxis);
                                                                        const yVal = getAxisValue(m, plotYAxis);
                                                                        const x = (xVal / maxX) * innerWidth;
                                                                        const y = innerHeight - (yVal / maxY) * innerHeight;
                                                                        return (
                                                                            <g key={idx}>
                                                                                <circle 
                                                                                    cx={x} 
                                                                                    cy={y} 
                                                                                    r={5} 
                                                                                    fill="#3b82f6"
                                                                                    stroke="white"
                                                                                    strokeWidth={1}
                                                                                />
                                                                                <title>{m.event}: {m.description}
RIR={formatProbability(m.rir, settings.showProbability)}, RRR={m.rrr === 999 ? '\u221E' : formatProbability(m.rrr, settings.showProbability)}, PC={formatProbability(m.pc, settings.showProbability)}, SWIM={formatProbability(m.swim, settings.showProbability)}</title>
                                                                                {/* Event name above point */}
                                                                                <text
                                                                                    x={x}
                                                                                    y={y - 8}
                                                                                    textAnchor="middle"
                                                                                    fontSize="8"
                                                                                    fill="#1f2937"
                                                                                    fontFamily="monospace"
                                                                                >
                                                                                    {m.event}
                                                                                </text>
                                                                            </g>
                                                                        );
                                                                    })}
                                                                    
                                                                    {/* X-axis label */}
                                                                    <text 
                                                                        x={innerWidth / 2} 
                                                                        y={innerHeight + 40} 
                                                                        textAnchor="middle" 
                                                                        fontSize="12"
                                                                    >
                                                                        {getAxisLabel(plotXAxis)}
                                                                    </text>
                                                                    
                                                                    {/* Y-axis label */}
                                                                    <text 
                                                                        x={-innerHeight / 2} 
                                                                        y={-50} 
                                                                        textAnchor="middle" 
                                                                        fontSize="12"
                                                                        transform={`rotate(-90)`}
                                                                    >
                                                                        {getAxisLabel(plotYAxis)}
                                                                    </text>
                                                                    
                                                                    {/* X-axis ticks - one decimal place, 5 major ticks */}
                                                                    {[0, 0.25, 0.5, 0.75, 1].map(frac => {
                                                                        const value = (frac * maxX).toFixed(1);
                                                                        return (
                                                                            <text 
                                                                                key={frac}
                                                                                x={frac * innerWidth} 
                                                                                y={innerHeight + 15} 
                                                                                textAnchor="middle" 
                                                                                fontSize="10"
                                                                            >
                                                                                {value}
                                                                            </text>
                                                                        );
                                                                    })}
                                                                    
                                                                    {/* Y-axis ticks - one decimal place, 5 major ticks */}
                                                                    {[0, 0.25, 0.5, 0.75, 1].map(frac => {
                                                                        const value = (frac * maxY).toFixed(1);
                                                                        return (
                                                                            <text 
                                                                                key={frac}
                                                                                x={-10} 
                                                                                y={innerHeight - frac * innerHeight + 4} 
                                                                                textAnchor="end" 
                                                                                fontSize="10"
                                                                            >
                                                                                {value}
                                                                            </text>
                                                                        );
                                                                    })}
                                                                </g>
                                                            </svg>
                                                            
                                                            {/* Sortable Table */}
                                                            {(() => {
                                                                const handleSort = (column) => {
                                                                    if (tableSortBy === column) {
                                                                        setTableSortDir(tableSortDir === 'asc' ? 'desc' : 'asc');
                                                                    } else {
                                                                        setTableSortBy(column);
                                                                        setTableSortDir('desc');
                                                                    }
                                                                };
                                                                
                                                                const sortedData = [...importanceMeasures].sort((a, b) => {
                                                                    let aVal, bVal;
                                                                    switch(tableSortBy) {
                                                                        case 'event':
                                                                            aVal = a.event;
                                                                            bVal = b.event;
                                                                            return tableSortDir === 'asc' 
                                                                                ? aVal.localeCompare(bVal)
                                                                                : bVal.localeCompare(aVal);
                                                                        case 'description':
                                                                            aVal = a.description;
                                                                            bVal = b.description;
                                                                            return tableSortDir === 'asc'
                                                                                ? aVal.localeCompare(bVal)
                                                                                : bVal.localeCompare(aVal);
                                                                        case 'rir':
                                                                            return tableSortDir === 'asc'
                                                                                ? a.rir - b.rir
                                                                                : b.rir - a.rir;
                                                                        case 'rrr':
                                                                            return tableSortDir === 'asc'
                                                                                ? a.rrr - b.rrr
                                                                                : b.rrr - a.rrr;
                                                                        case 'pc':
                                                                            return tableSortDir === 'asc'
                                                                                ? a.pc - b.pc
                                                                                : b.pc - a.pc;
                                                                        case 'swim':
                                                                            return tableSortDir === 'asc'
                                                                                ? a.swim - b.swim
                                                                                : b.swim - a.swim;
                                                                        default:
                                                                            return 0;
                                                                    }
                                                                });
                                                                
                                                                const SortIndicator = ({ column }) => {
                                                                    if (tableSortBy !== column) return null;
                                                                    return <span className="ml-1">{tableSortDir === 'asc' ? '\u25B2' : '\u25BC'}</span>;
                                                                };
                                                                
                                                                return (
                                                                    <div className="mt-4">
                                                                        <table className="text-xs w-full border" style={{ tableLayout: 'fixed' }}>
                                                                            <thead className="bg-gray-100">

                                                                                    <th 
                                                                                        className="border px-2 py-1 cursor-pointer hover:bg-gray-200"
                                                                                        style={{ width: '22%' }}
                                                                                        onClick={() => handleSort('event')}
                                                                                    >
                                                                                        Event<SortIndicator column="event" />
                                                                                    </th>
                                                                                    <th 
                                                                                        className="border px-2 py-1 cursor-pointer hover:bg-gray-200"
                                                                                        style={{ width: '38%' }}
                                                                                        onClick={() => handleSort('description')}
                                                                                    >
                                                                                        Description<SortIndicator column="description" />
                                                                                    </th>
                                                                                    <th 
                                                                                        className="border px-2 py-1 cursor-pointer hover:bg-gray-200"
                                                                                        style={{ width: '10%' }}
                                                                                        onClick={() => handleSort('rir')}
                                                                                    >
                                                                                        RIR<SortIndicator column="rir" />
                                                                                    </th>
                                                                                    <th 
                                                                                        className="border px-2 py-1 cursor-pointer hover:bg-gray-200"
                                                                                        style={{ width: '10%' }}
                                                                                        onClick={() => handleSort('rrr')}
                                                                                    >
                                                                                        RRR<SortIndicator column="rrr" />
                                                                                    </th>
                                                                                    <th 
                                                                                        className="border px-2 py-1 cursor-pointer hover:bg-gray-200"
                                                                                        style={{ width: '10%' }}
                                                                                        onClick={() => handleSort('pc')}
                                                                                    >
                                                                                        PC<SortIndicator column="pc" />
                                                                                    </th>
                                                                                    <th 
                                                                                        className="border px-2 py-1 cursor-pointer hover:bg-gray-200"
                                                                                        style={{ width: '10%' }}
                                                                                        onClick={() => handleSort('swim')}
                                                                                    >
                                                                                        SWIM<SortIndicator column="swim" />
                                                                                    </th>
                                                                                </tr>
                                                                            </thead>
                                                                            <tbody>
                                                                                {sortedData.map((m, idx) => (
                                                                                    <tr key={idx}>
                                                                                        <td className="border px-2 py-1 font-mono" style={{ wordBreak: 'break-all' }}>{m.event}</td>
                                                                                        <td className="border px-2 py-1" style={{ wordBreak: 'break-word' }}>{m.description}</td>
                                                                                        <td className="border px-2 py-1 font-mono whitespace-nowrap">
                                                                                            {formatProbability(m.rir, settings.showProbability)}
                                                                                        </td>
                                                                                        <td className="border px-2 py-1 font-mono whitespace-nowrap">
                                                                                            {m.rrr === 999 ? '\u221E' : formatProbability(m.rrr, settings.showProbability)}
                                                                                        </td>
                                                                                        <td className="border px-2 py-1 font-mono whitespace-nowrap">
                                                                                            {formatProbability(m.pc, settings.showProbability)}
                                                                                        </td>
                                                                                        <td className="border px-2 py-1 font-mono whitespace-nowrap">
                                                                                            {formatProbability(m.swim, settings.showProbability)}
                                                                                        </td>
                                                                                    </tr>
                                                                                ))}
                                                                            </tbody>
                                                                        </table>
                                                                    </div>
                                                                );
                                                            })()}
                                                        </div>
                                                    );
                                                })()}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }
            
            // Cut Set Viewer Component (Reusable)
            function CutSetViewer({ cutSets, fontSizeClass, backgroundStyle, settings, mcubValue }) {
                const [sortBy, setSortBy] = useState('probability'); // 'probability' | 'order'
                const [highlightedEvent, setHighlightedEvent] = useState(null);
                
                const sortedCutSets = [...cutSets].sort((a, b) => {
                    if (sortBy === 'probability') {
                        if (a.probability === null && b.probability === null) return a.id - b.id;
                        if (a.probability === null) return 1;
                        if (b.probability === null) return -1;
                        return b.probability - a.probability;
                    }
                    return a.id - b.id;
                });
                
                const rareEventApprox = cutSets.reduce((sum, cs) => {
                    if (cs.probability !== null) {
                        return sum + cs.probability;
                    }
                    return sum;
                }, 0);
                
                const probDisplayMode = settings?.showProbability || '1';
                
                return (
                    <div>
                        {/* Header with controls */}
                        <div className="mb-4 space-y-2">
                            <div className="flex items-center justify-between">
                                <div>
                                    <div className={`${fontSizeClass} font-semibold`}>
                                        Total Cut Sets: {cutSets.length}
                                    </div>
                                </div>
                                <select
                                    value={sortBy}
                                    onChange={(e) => setSortBy(e.target.value)}
                                    className="px-2 py-1 border rounded text-xs"
                                    style={{
                                        backgroundColor: backgroundStyle.backgroundColor,
                                        borderColor: backgroundStyle.borderColor
                                    }}
                                >
                                    <option value="probability">Sort by Probability</option>
                                    <option value="order">Sort by Order</option>
                                </select>
                            </div>
                            
                            {/* MCUB Display */}
                            {mcubValue !== null && (
                                <div className="p-3 border-2 border-green-500 rounded bg-green-50" style={{
                                    borderColor: '#22c55e',
                                    backgroundColor: settings?.background === 'dark' ? '#064e3b' : '#f0fdf4'
                                }}>
                                    <div className={`${fontSizeClass} font-bold text-green-800`} style={{
                                        color: settings?.background === 'dark' ? '#86efac' : '#166534'
                                    }}>
                                        System Failure Probability (MCUB) <span className="text-xs font-normal text-green-600" style={{
                                            color: settings?.background === 'dark' ? '#6ee7b7' : '#16a34a'
                                        }}>- Calculated using: 1 - &#8719;(1 - P<sub>i</sub>) for all cut sets</span>
                                    </div>
                                    <div className={`${fontSizeClass} text-green-700 mt-1`} style={{
                                        color: settings?.background === 'dark' ? '#6ee7b7' : '#15803d'
                                    }}>
                                        <span className="font-mono text-lg">
                                            {formatProbability(mcubValue, probDisplayMode)}
                                        </span>
                                    </div>
                                </div>

                            {/* Rare Event Approximation */}
                            {cutSets.length > 0 && cutSets.some(cs => cs.probability !== null) && (
                                <div className={`${fontSizeClass} text-gray-600 text-xs`}>
                                    Rare Event Approximation: {formatProbability(rareEventApprox, probDisplayMode)}
                                </div>
                            )}
                        </div>
                        
                        {/* Cut Sets List - Compact View */}
                        {cutSets.length > 0 ? (
                            <div className="border rounded" style={{
                                backgroundColor: backgroundStyle.backgroundColor,
                                borderColor: backgroundStyle.borderColor
                            }}>
                                {/* Header Row */}
                                <div className="flex items-center p-2 border-b font-semibold text-xs" style={{
                                    backgroundColor: settings?.background === 'dark' ? '#374151' : '#f3f4f6',
                                    borderColor: backgroundStyle.borderColor
                                }}>
                                    <div style={{ width: '40px' }}>#</div>
                                    <div style={{ width: '100px' }}>Probability</div>
                                    <div style={{ flex: 1 }}>Cut Set</div>
                                    <div style={{ flex: 1 }}>Description</div>
                                </div>
                                
                                {/* Cut Set Rows */}
                                {sortedCutSets.map((cutSet, idx) => (
                                    <div 
                                        key={cutSet.id}
                                        className="flex items-center p-2 border-b text-xs hover:bg-gray-50"
                                        style={{
                                            borderColor: backgroundStyle.borderColor,
                                            backgroundColor: cutSet.hasLinked 
                                                ? (cutSet.hasUnresolvedLinked ? '#fef3c7' : '#d1fae5')  // amber if unresolved, green if resolved
                                                : undefined
                                        }}
                                    >
                                        <div style={{ width: '40px' }} className="font-mono">
                                            {idx + 1}
                                        </div>
                                        <div style={{ width: '100px' }} className="font-mono">
                                            {cutSet.hasUnresolvedLinked ? (
                                                <span className="text-amber-600 font-semibold" title="Contains linked system - probability not computed">LINKED</span>
                                            ) : cutSet.hasLinked && cutSet.probability !== null ? (
                                                <span className="text-emerald-700 font-semibold" title="Linked system resolved">
                                                    {formatProbability(cutSet.probability, probDisplayMode)}
                                                </span>
                                            ) : (
                                                cutSet.probability !== null ? formatProbability(cutSet.probability, probDisplayMode) : 'N/A'
                                            )}
                                        </div>
                                        <div style={{ flex: 1 }} className="flex flex-wrap gap-1">
                                            {cutSet.events.map((event, eventIdx) => {
                                                const isLinkedEvent = cutSet.linkedEvents && cutSet.linkedEvents.includes(event);
                                                return (
                                                    <span
                                                        key={eventIdx}
                                                        className={`px-2 py-0.5 rounded text-xs cursor-pointer ${
                                                            highlightedEvent === event 
                                                                ? 'bg-yellow-300 text-yellow-900 ring-2 ring-yellow-500'

                                                            highlightedEvent === event ? null : event
                                                        )}

                                                            ? (cutSet.hasUnresolvedLinked 
                                                                ? `${event} - Linked to external system (not resolved)`
                                                                : `${event} - Linked system resolved`)

                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-8 text-gray-500">
                                <p>No cut sets generated</p>
                                <p className="text-xs mt-2">Define system logic and add failure modes to SSCs</p>
                            </div>
                        )}
                    </div>
                );
            }

            return (

                            <button

                                disabled={sscsInSystem.length === 0}
                                className={`px-3 py-1.5 rounded text-sm text-white disabled:opacity-50 disabled:cursor-not-allowed ${sscsInSystem.length > 0 ? 'bg-blue-900 hover:bg-blue-800' : 'bg-gray-500'}`}
                                title="Failure Modes and Effects Analysis - analyze SSC failure modes and their effects"

                                FMEA
                            </button>
                            <button
                                onClick={() => setShowReportModal(true)}

                            <button

                                        onKeyDown={(e) => {

                                                                parentIds.forEach(id => nodesToExpand.add(id));
                                                                nodesToExpand.add(node.id);
                                                            }
                                                            if (node.children) {
                                                                searchTree(node.children, [...parentIds, node.id]);
                                                            }
                                                        });
                                                    };
                                                    searchTree(treeData);
                                                    setExpandedNodes(nodesToExpand);

                                        </button>

                            <div className={`flex-1 overflow-y-auto ${fontSizeClass}`}>
                                {treeData.map(node => (
                                    <TreeNode
                                        key={node.id}
                                        node={node}
                                        level={0}
                                        onDragStart={handleDragStart}
                                        onExpand={handleExpand}
