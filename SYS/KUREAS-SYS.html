                            <div className="rich-text-toolbar" style={{ 
                                backgroundColor: backgroundStyle.backgroundColor,
                                borderColor: backgroundStyle.borderColor
                            }}>
                                <button 
                                    className="toolbar-button" 
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        execCommand('bold');
                                    }}
                                    title="Bold"
                                >
                                    <strong>B</strong>
                                </button>
                                <button 
                                    className="toolbar-button" 
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        execCommand('italic');
                                    }}
                                    title="Italic"
                                >
                                    <em>I</em>
                                </button>
                                <button 
                                    className="toolbar-button" 
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        execCommand('underline');
                                    }}
                                    title="Underline"
                                >
                                    <u>U</u>
                                </button>
                                <div style={{ width: '1px', background: '#d1d5db', margin: '0 4px' }}></div>
                                <button 
                                    className="toolbar-button" 
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        execCommand('formatBlock', '<h1>');
                                    }}
                                    title="Heading 1"
                                >
                                    H1
                                </button>
                                <button 
                                    className="toolbar-button" 
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        execCommand('formatBlock', '<h2>');
                                    }}
                                    title="Heading 2"
                                >
                                    H2
                                </button>
                                <button 
                                    className="toolbar-button" 
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        execCommand('formatBlock', '<p>');
                                    }}
                                    title="Paragraph"
                                >
                                    P
                                </button>
                                <div style={{ width: '1px', background: '#d1d5db', margin: '0 4px' }}></div>
                                <button 
                                    className="toolbar-button" 
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        execCommand('insertUnorderedList');
                                    }}
                                    title="Bulleted List"
                                >
                                    &#8226; List
                                </button>
                                <button 
                                    className="toolbar-button" 
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        execCommand('insertOrderedList');
                                    }}
                                    title="Numbered List"
                                >
                                    1. List
                                </button>
                            </div>

                            <div 
                                ref={editorRef}
                                className="rich-text-editor"
                                contentEditable
                                onInput={handleInput}
                                style={{
                                    backgroundColor: backgroundStyle.backgroundColor,
                                    color: backgroundStyle.color,
                                    borderColor: backgroundStyle.borderColor,
                                    minHeight: '500px'
                                }}
                            />

                            <div className="flex gap-3 justify-end mt-4">
                                <button
                                    onClick={onClose}
                                    className="px-4 py-2 border rounded hover:bg-gray-100"
                                    style={{ borderColor: backgroundStyle.borderColor }}
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={handleSave}
                                    className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                >
                                    Save
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Settings Modal Component
        function SettingsModal({ settings, onSave, onClose }) {
            const [localSettings, setLocalSettings] = useState({ ...settings });

            const handleChange = (key, value) => {
                setLocalSettings(prev => ({ ...prev, [key]: value }));
            };

            const handleSave = () => {
                SettingsManager.save(localSettings);
                onSave(localSettings);
                onClose();
            };

            const handleReset = () => {
                const defaults = SettingsManager.reset();
                setLocalSettings(defaults);
                SettingsManager.save(defaults);
                onSave(defaults);
            };

            const handleResetLayout = () => {
                if (confirm('Reset screen layout to defaults? This will reset pane sizes.')) {
                    localStorage.removeItem('KUREAS_SYS_layout');
                    alert('Layout reset. Please refresh the page to see changes.');
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={onClose}>
                    <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full m-4 max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                        <div className="p-6">
                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-xl font-bold text-gray-800">Settings</h2>
                                <button onClick={onClose} className="text-gray-500 hover:text-gray-700">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>

                            <div className="space-y-6">
                                {/* Font Size */}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Text Font Size</label>
                                    <div className="flex gap-2">
                                        {['small', 'medium', 'large'].map(size => (
                                            <button
                                                key={size}
                                                onClick={() => handleChange('fontSize', size)}
                                                className={`flex-1 px-4 py-2 rounded ${
                                                    localSettings.fontSize === size
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                }`}
                                            >
                                                {size.charAt(0).toUpperCase() + size.slice(1)}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Font Family */}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Font Family</label>
                                    <div className="flex gap-2">
                                        {[
                                            { value: 'sans-serif', label: 'Sans-serif' },
                                            { value: 'serif', label: 'Serif' },
                                            { value: 'monospace', label: 'Monospaced' }
                                        ].map(font => (
                                            <button
                                                key={font.value}
                                                onClick={() => handleChange('fontFamily', font.value)}
                                                className={`flex-1 px-4 py-2 rounded ${
                                                    localSettings.fontFamily === font.value
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                }`}
                                            >
                                                {font.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Background */}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Background</label>
                                    <div className="flex gap-2">
                                        {[
                                            { value: 'light', label: 'Light' },
                                            { value: 'dark', label: 'Dark' },
                                            { value: 'gray', label: 'Gray' }
                                        ].map(bg => (
                                            <button
                                                key={bg.value}
                                                onClick={() => handleChange('background', bg.value)}
                                                className={`flex-1 px-4 py-2 rounded ${
                                                    localSettings.background === bg.value
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                }`}
                                            >
                                                {bg.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Show Probability */}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Show Probability</label>
                                    <div className="flex gap-2">
                                        {[
                                            { value: '0', label: '0 Digits' },
                                            { value: '1', label: '1 Digit' },
                                            { value: '2', label: '2 Digits' }
                                        ].map(option => (
                                            <button
                                                key={option.value}
                                                onClick={() => handleChange('showProbability', option.value)}
                                                className={`flex-1 px-4 py-2 rounded ${
                                                    localSettings.showProbability === option.value
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                }`}
                                            >
                                                {option.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* SSC Sort Order */}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">SSC Sort Order</label>
                                    <div className="flex gap-2">
                                        {[
                                            { value: 'order', label: 'Order Added' },
                                            { value: 'name', label: 'Name (A-Z)' },
                                            { value: 'probability', label: 'Probability' }
                                        ].map(option => (
                                            <button
                                                key={option.value}
                                                onClick={() => handleChange('sscSort', option.value)}
                                                className={`flex-1 px-4 py-2 rounded ${
                                                    (localSettings.sscSort || 'order') === option.value
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                }`}
                                            >
                                                {option.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Qualitative Probability Settings */}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Assign Failure Probability to Events with Low, Medium, and High Occurrence
                                    </label>
                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs text-gray-600 mb-1">Low</label>
                                            <input
                                                type="text"
                                                value={localSettings.qualitativeProbLow || '1E-5'}
                                                onChange={(e) => handleChange('qualitativeProbLow', e.target.value)}
                                                className="w-full px-3 py-2 border rounded text-sm"
                                                placeholder="1E-5"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-gray-600 mb-1">Medium</label>
                                            <input
                                                type="text"
                                                value={localSettings.qualitativeProbMedium || '1E-3'}
                                                onChange={(e) => handleChange('qualitativeProbMedium', e.target.value)}
                                                className="w-full px-3 py-2 border rounded text-sm"
                                                placeholder="1E-3"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-gray-600 mb-1">High</label>
                                            <input
                                                type="text"
                                                value={localSettings.qualitativeProbHigh || '1E-1'}
                                                onChange={(e) => handleChange('qualitativeProbHigh', e.target.value)}
                                                className="w-full px-3 py-2 border rounded text-sm"
                                                placeholder="1E-1"
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Action Buttons */}
                            <div className="flex justify-between mt-8">
                                <div className="flex gap-2">
                                    <button
                                        onClick={handleReset}
                                        className="px-4 py-2 text-sm bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
                                    >
                                        Reset to Defaults
                                    </button>
                                    <button
                                        onClick={handleResetLayout}
                                        className="px-4 py-2 text-sm bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
                                    >
                                        Reset Screen Layout
                                    </button>
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={onClose}
                                        className="px-4 py-2 text-sm bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={handleSave}
                                        className="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700"
                                    >
                                        Save
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Tree Node Component
        function TreeNode({ node, level, onDragStart, onExpand, expandedNodes, systemHighlight, backgroundStyle }) {
            const isExpanded = expandedNodes.has(node.id);
            const hasChildren = node.children && node.children.length > 0;
            const isDraggable = level === 3; // Component Type level
            const isSource = node.isSource;

            const handleExpand = (e) => {
                e.stopPropagation();
                if (hasChildren && !isSource) {
                    onExpand(node.id);
                }
            };

            // Source separator rendering
            if (isSource) {
                return (
                    <div>
                        <div 
                            className="tree-node py-2 px-2 border-t border-b cursor-pointer" 
                            style={{
                                backgroundColor: backgroundStyle?.backgroundColor === '#1f2937' ? '#374151' : '#e0f2fe',
                                color: backgroundStyle?.backgroundColor === '#1f2937' ? '#f3f4f6' : '#111827',
                                borderColor: backgroundStyle?.backgroundColor === '#1f2937' ? '#4b5563' : '#bae6fd',
                                fontWeight: 'bold',
                                fontSize: '0.75rem'
                            }}
                            onClick={handleExpand}
                        >
                            <Tooltip text={node.description || node.label}>
                                <div className="flex items-center">
                                    <span className="mr-1">
                                        {isExpanded ? '\u25BC' : '\u25B6'}
                                    </span>
                                    <span>{node.label}</span>
                                </div>
                            </Tooltip>
                        </div>
                        {isExpanded && node.children && node.children.length > 0 && (
                            <div>
                                {node.children.map(child => (
                                    <TreeNode
                                        key={child.id}
                                        node={child}
                                        level={level + 1}
                                        onDragStart={onDragStart}
                                        onExpand={onExpand}
                                        expandedNodes={expandedNodes}
                                        systemHighlight={systemHighlight}
                                        backgroundStyle={backgroundStyle}
                                    />
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div>
                    <div
                        className={`tree-node flex items-center py-1 px-2 text-xs ${isDraggable ? 'tree-node-draggable' : ''}`}
                        style={{
                            backgroundColor: systemHighlight && level === 0 ? '#dbeafe' : 'transparent'
                        }}
                        onClick={handleExpand}
                        draggable={isDraggable}
                        onDragStart={(e) => isDraggable && onDragStart(e, node)}
                    >
                        {hasChildren && (
                            <span className="mr-1">
                                {isExpanded ? <ChevronDownIcon /> : <ChevronRightIcon />}
                            </span>
                        )}
                        {!hasChildren && <span className="mr-1" style={{ width: '12px', display: 'inline-block' }}></span>}
                        <span>{node.label}</span>
                    </div>
                    {hasChildren && isExpanded && (
                        <div style={{ paddingLeft: '20px' }}>
                            {node.children.map(child => (
                                <TreeNode
                                    key={child.id}
                                    node={child}
                                    level={level + 1}
                                    onDragStart={onDragStart}
                                    onExpand={onExpand}
                                    expandedNodes={expandedNodes}
                                    systemHighlight={systemHighlight}
                                    backgroundStyle={backgroundStyle}
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // System Logic Editor Component
        // Text-based Logic Editor with line numbers
        function SystemLogicEditor({ tokens, onChange, keywords, sscsInSystem, superComponents, boundaryConditions = [], fontSizeClass, backgroundStyle, onCursorChange }) {
            const textareaRef = useRef(null);
            const lineNumbersRef = useRef(null);
            
            // Convert tokens to text lines
            const tokensToText = (tokenArray) => {
                const lines = [];
                let currentLine = '';
                
                for (const token of tokenArray) {
                    if (token.type === 'eol') {
                        if (currentLine.trim()) {
                            // Don't add semicolon to comment lines
                            const trimmedLine = currentLine.trim();
                            if (trimmedLine.startsWith('#')) {
                                lines.push(trimmedLine);
                            } else {
                                lines.push(trimmedLine + ';');
                            }
                        }
                        currentLine = '';
                    } else if (token.type === 'comment') {
                        // Comment token - add as-is
                        currentLine += token.value + ' ';
                    } else if (token.type === 'module_def') {
                        // Module definition: [name] =
                        currentLine += '[' + token.value + '] = ';
                    } else if (token.type === 'module_ref') {
                        // Module reference: [name]
                        currentLine += '[' + token.value + '] ';
                    } else {
                        currentLine += token.value + ' ';
                    }
                }
                
                // Add any remaining content (without semicolon if it's incomplete)
                if (currentLine.trim()) {
                    lines.push(currentLine.trim());
                }
                
                // If there are no lines, return a default empty line
                if (lines.length === 0) {
                    return 'SYSTEM WORKS = ';
                }
                
                return lines.join('\n');
            };
            
            // Convert text lines back to tokens
            const textToTokens = (text) => {
                const lines = text.split('\n');
                const newTokens = [];
                
                for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
                    let line = lines[lineIndex].trim();
                    if (!line) continue;
                    
                    // Check if line is a comment (starts with #)
                    if (line.startsWith('#')) {
                        // Store comment as a special token type
                        newTokens.push({ type: 'comment', value: line, deletable: true });
                        newTokens.push({ type: 'eol', value: ';', deletable: true });
                        continue;
                    }
                    
                    // Remove trailing semicolon for processing
                    const hasEol = line.endsWith(';');
                    if (hasEol) {
                        line = line.slice(0, -1).trim();
                    }
                    
                    // Parse the line into tokens
                    // Handle multi-word keywords first
                    const multiWordKeywords = ['SYSTEM WORKS =', 'ARE NOT IN', 'ARE IN', 'RELIES ON', 'IS TRUE', 'IS FALSE'];
                    let remaining = line;
                    
                    while (remaining.length > 0) {
                        remaining = remaining.trim();
                        if (!remaining) break;
                        
                        let matched = false;
                        
                        // Check for multi-word keywords first
                        for (const kw of multiWordKeywords) {
                            if (remaining.toUpperCase().startsWith(kw)) {
                                const isFirstToken = newTokens.length === 0 || newTokens[newTokens.length - 1]?.type === 'eol';
                                newTokens.push({
                                    type: 'keyword',
                                    value: kw,
                                    deletable: !(kw === 'SYSTEM WORKS =' && isFirstToken)
                                });
                                remaining = remaining.slice(kw.length);
                                matched = true;
                                break;
                            }
                        }
                        
                        if (matched) continue;
                        
                        // Check for module definition or reference: [module_name] or [module_name] =
                        const moduleMatch = remaining.match(/^\[([^\]]+)\]\s*=?/);
                        if (moduleMatch) {
                            const moduleName = moduleMatch[1];
                            const fullMatch = moduleMatch[0];
                            const isDefinition = fullMatch.trim().endsWith('=');
                            
                            if (isDefinition) {
                                // Module definition: [module_name] =
                                newTokens.push({ type: 'module_def', value: moduleName, deletable: true });
                            } else {
                                // Module reference: [module_name]
                                newTokens.push({ type: 'module_ref', value: moduleName, deletable: true });
                            }
                            remaining = remaining.slice(fullMatch.length);
                            continue;
                        }
                        
                        // Check for parentheses - they should be separate tokens
                        if (remaining.startsWith('(')) {
                            newTokens.push({ type: 'keyword', value: '(', deletable: true });
                            remaining = remaining.slice(1);
                            continue;
                        }
                        if (remaining.startsWith(')')) {
                            newTokens.push({ type: 'keyword', value: ')', deletable: true });
                            remaining = remaining.slice(1);
                            continue;
                        }
                        
                        // Extract next word/token (stop at spaces, semicolons, parentheses, and square brackets)
                        const match = remaining.match(/^([^\s;()[\]]+)/);
                        if (match) {
                            const word = match[1];
                            remaining = remaining.slice(word.length);
                            
                            const wordUpper = word.toUpperCase();
                            
                            // Check if it's a single-word keyword
                            if (keywords.includes(wordUpper) && !multiWordKeywords.includes(wordUpper)) {
                                newTokens.push({ type: 'keyword', value: wordUpper, deletable: true });
                            }
                            // Check if it's a variable definition (ends with =)
                            else if (word.endsWith('=')) {
                                newTokens.push({ type: 'variable', value: word, deletable: true });
                            }
                            // Check if it's a number
                            else if (!isNaN(word) && word !== '') {
                                newTokens.push({ type: 'number', value: word, deletable: true });
                            }
                            // Check if it's an SSC
                            else if (sscsInSystem.find(ssc => ssc.name.toUpperCase() === wordUpper)) {
                                const matchingSSC = sscsInSystem.find(ssc => ssc.name.toUpperCase() === wordUpper);
                                newTokens.push({ type: 'ssc', value: matchingSSC.name, deletable: true });
                            }
                            // Check if it's a supercomponent
                            else if (superComponents.find(sc => sc.name.toUpperCase() === wordUpper)) {
                                const matchingSupercomp = superComponents.find(sc => sc.name.toUpperCase() === wordUpper);
                                newTokens.push({ type: 'supercomp', value: matchingSupercomp.name, deletable: true });
                            }
                            // Check if it's a boundary condition
                            else if (boundaryConditions.find(bc => bc.name.toUpperCase() === wordUpper)) {
                                const matchingBC = boundaryConditions.find(bc => bc.name.toUpperCase() === wordUpper);
                                newTokens.push({ type: 'boundary', value: matchingBC.name, deletable: true });
                            }
                            // Check if it's a variable reference (previously defined)
                            else if (word.endsWith('=') === false && newTokens.some(t => t.type === 'variable' && t.value === word + '=')) {
                                // It's a reference to a previously defined variable
                                newTokens.push({ type: 'variable', value: word + '=', deletable: true });
                            }
                            // Otherwise treat as text
                            else {
                                newTokens.push({ type: 'text', value: word, deletable: true });
                            }
                        } else {
                            break;
                        }
                    }
                    
                    // Add EOL token if line had semicolon
                    if (hasEol) {
                        newTokens.push({ type: 'eol', value: ';', deletable: true });
                    }
                }
                
                // Ensure we have at least the SYSTEM WORKS = token
                if (newTokens.length === 0) {
                    newTokens.push({ type: 'keyword', value: 'SYSTEM WORKS =', deletable: false });
                }
                
                return newTokens;
            };
            
            const [text, setText] = useState(() => tokensToText(tokens));
            const [lineCount, setLineCount] = useState(1);
            const isInternalUpdate = useRef(false);
            
            // Update text when tokens change externally (not from our own edits)
            useEffect(() => {
                if (isInternalUpdate.current) {
                    isInternalUpdate.current = false;
                    return;
                }
                const newText = tokensToText(tokens);
                setText(newText);
            }, [tokens]);
            
            // Update line count when text changes
            useEffect(() => {
                const lines = text.split('\n');
                setLineCount(Math.max(lines.length, 1));
            }, [text]);
            
            // Sync scroll between line numbers and textarea
            const handleScroll = (e) => {
                if (lineNumbersRef.current) {
                    lineNumbersRef.current.scrollTop = e.target.scrollTop;
                }
            };
            
            // Handle text changes
            const handleTextChange = (e) => {
                const newText = e.target.value;
                setText(newText);
                
                // Convert text to tokens and update parent
                const newTokens = textToTokens(newText);
                isInternalUpdate.current = true;
                onChange(newTokens);
            };
            
            // Insert text at cursor position (called from parent via ref)
            const insertAtCursor = useCallback((textToInsert) => {
                if (!textareaRef.current) return;
                
                const textarea = textareaRef.current;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const currentText = text;
                
                // Determine if we need a space before/after
                const charBefore = start > 0 ? currentText[start - 1] : '';
                const charAfter = end < currentText.length ? currentText[end] : '';
                
                let insertText = textToInsert;
                if (charBefore && charBefore !== ' ' && charBefore !== '\n') {
                    insertText = ' ' + insertText;
                }
                if (charAfter && charAfter !== ' ' && charAfter !== '\n' && charAfter !== ';') {
                    insertText = insertText + ' ';
                }
                
                const newText = currentText.slice(0, start) + insertText + currentText.slice(end);
                setText(newText);
                
                // Update tokens
                const newTokens = textToTokens(newText);
                isInternalUpdate.current = true;
                onChange(newTokens);
                
                // Set cursor position after inserted text
                setTimeout(() => {
                    const newCursorPos = start + insertText.length;
                    textarea.focus();
                    textarea.setSelectionRange(newCursorPos, newCursorPos);
                }, 0);
            }, [text, onChange, keywords, sscsInSystem, superComponents, boundaryConditions]);
            
            // Expose insertAtCursor to parent via callback
            useEffect(() => {
                if (onCursorChange) {
                    onCursorChange(insertAtCursor);
                }
            }, [insertAtCursor, onCursorChange]);
            
            // Generate line numbers
            const lineNumbers = [];
            for (let i = 1; i <= Math.max(lineCount, 10); i++) {
                lineNumbers.push(i);
            }
            
            // Calculate line height based on font size class
            const getLineHeight = () => {
                switch (fontSizeClass) {
                    case 'text-xs': return '16px';
                    case 'text-sm': return '20px';
                    case 'text-base': return '24px';
                    case 'text-lg': return '28px';
                    default: return '20px';
                }
            };
            
            const lineHeight = getLineHeight();
            
            return (
                <div 
                    className="h-full flex border rounded overflow-hidden"
                    style={{
                        backgroundColor: backgroundStyle.backgroundColor,
                        borderColor: backgroundStyle.borderColor
                    }}
                >
                    {/* Line numbers column */}
                    <div 
                        ref={lineNumbersRef}
                        className="flex-shrink-0 py-2 px-2 text-right select-none overflow-hidden"
                        style={{
                            backgroundColor: backgroundStyle.backgroundColor === '#1f2937' ? '#111827' : '#f9fafb',
                            borderRight: `1px solid ${backgroundStyle.borderColor}`,
                            color: backgroundStyle.backgroundColor === '#1f2937' ? '#6b7280' : '#9ca3af',
                            minWidth: '40px',
                            lineHeight: lineHeight,
                            fontFamily: 'monospace'
                        }}
                    >
                        {lineNumbers.map(num => (
                            <div key={num} className={fontSizeClass} style={{ lineHeight: lineHeight }}>
                                {num}
                            </div>
                        ))}
                    </div>
                    
                    {/* Text editor */}
                    <textarea
                        ref={textareaRef}
                        value={text}
                        onChange={handleTextChange}
                        onScroll={handleScroll}
                        className={`flex-1 p-2 resize-none outline-none ${fontSizeClass}`}
                        style={{
                            backgroundColor: backgroundStyle.backgroundColor,
                            color: backgroundStyle.color,
                            lineHeight: lineHeight,
                            fontFamily: 'monospace',
                            whiteSpace: 'pre-wrap',
                            wordWrap: 'break-word',
                            overflowWrap: 'break-word'
                        }}
                        placeholder="Enter system logic expressions here..."
                        spellCheck={false}
                    />
                </div>
            );
        }

        // Main Application Component
        // Report Modal Component
        // ==================== FAULT TREE GRAPHIC GENERATOR ====================
        function generateFaultTreeImageBase64(failureLogicTree, basicEventData, settings) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size
            canvas.width = 1200;
            canvas.height = 800;
            
            // Fill background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const nodeWidth = 100;
            const nodeHeight = 50;
            const verticalSpacing = 100;
            const minHorizontalSpacing = 40;
            const circleRadius = 25;
            
            const formatProbability = (prob, showProbSetting) => {
                if (prob === null || prob === undefined) return '';
                if (showProbSetting === '1') return prob.toExponential(2);
                if (showProbSetting === '2') return (prob * 100).toFixed(4) + '%';
                if (showProbSetting === '3') return prob.toFixed(6);
                return '';
            };
            
            const drawTree = (node, x, y, childIndex = 0) => {
                const calculateSubtreeWidth = (n) => {
                    if (!n.children || n.children.length === 0) {
                        return n.type === 'BASIC' ? circleRadius * 2 : nodeWidth;
                    }
                    
                    let totalWidth = 0;
                    for (const child of n.children) {
                        totalWidth += calculateSubtreeWidth(child);
                    }
                    totalWidth += minHorizontalSpacing * (n.children.length - 1);
                    
                    const nodeOwnWidth = n.type === 'BASIC' ? circleRadius * 2 : nodeWidth;
                    return Math.max(totalWidth, nodeOwnWidth);
                };
                
                ctx.save();
                
                // Draw shape based on type
                if (node.type === 'BASIC') {
                    // Circle for basic events
                    ctx.beginPath();
                    ctx.arc(x, y, circleRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = '#86efac';
                    ctx.fill();
                    ctx.strokeStyle = '#16a34a';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Draw label
                    const labelOffset = (childIndex % 4) * 12;
                    ctx.fillStyle = '#111827';
                    ctx.font = '11px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.label || '', x, y - 20 + labelOffset);
                    
                    // Draw probability
                    if (node.probability !== undefined && node.probability !== null) {
                        ctx.font = '9px monospace';
                        ctx.textBaseline = 'top';
                        const probText = formatProbability(node.probability, '1');
                        ctx.fillText(probText, x, y - 10 + labelOffset);
                    }
                    
                    // Draw description
                    if (node.description) {
                        ctx.font = '8px sans-serif';
                        ctx.fillStyle = '#555';
                        ctx.textBaseline = 'top';
                        
                        const maxWidth = 100;
                        const words = node.description.split(' ');
                        let line = '';
                        let yOffset = y + 35;
                        
                        for (const word of words) {
                            const testLine = line + (line ? ' ' : '') + word;
                            const metrics = ctx.measureText(testLine);
                            
                            if (metrics.width > maxWidth && line) {
                                ctx.fillText(line, x, yOffset);
                                line = word;
                                yOffset += 10;
                            } else {
                                line = testLine;
                            }
                        }
                        if (line) {
                            ctx.fillText(line, x, yOffset);
                        }
                    }
                } else {
                    // Rectangle for gates
                    let color = '#93c5fd';
                    if (node.type === 'OR') color = '#93c5fd';
                    else if (node.type === 'AND') color = '#86efac';
                    else if (node.type === 'NOT') color = '#fed7aa';
                    else if (node.type && node.type.includes('/')) color = '#c084fc';
                    
                    ctx.fillStyle = color;
                    ctx.strokeStyle = '#1e3a8a';
                    ctx.lineWidth = 2;
                    ctx.fillRect(x - nodeWidth/2, y - nodeHeight/2, nodeWidth, nodeHeight);
                    ctx.strokeRect(x - nodeWidth/2, y - nodeHeight/2, nodeWidth, nodeHeight);
                    
                    // Draw gate type
                    ctx.fillStyle = '#111827';
                    ctx.font = 'bold 12px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillText(node.type || 'GATE', x, y - nodeHeight/2 + 5);
                    
                    // Draw label with word wrapping
                    ctx.font = '11px monospace';
                    ctx.textBaseline = 'middle';
                    
                    const label = node.label || '';
                    const maxLabelWidth = nodeWidth - 10;
                    const words = label.split(' ');
                    let line = '';
                    let yOffset = y + 8;
                    const lineHeight = 12;
                    
                    for (let i = 0; i < words.length; i++) {
                        const testLine = line + (line ? ' ' : '') + words[i];
                        const metrics = ctx.measureText(testLine);
                        
                        if (metrics.width > maxLabelWidth && line) {
                            ctx.fillText(line, x, yOffset);
                            line = words[i];
                            yOffset += lineHeight;
                        } else {
                            line = testLine;
                        }
                    }
                    if (line) {
                        ctx.fillText(line, x, yOffset);
                    }
                }
                
                ctx.restore();
                
                // Draw children
                if (node.children && node.children.length > 0) {
                    const childY = y + verticalSpacing;
                    
                    const childWidths = node.children.map(child => calculateSubtreeWidth(child));
                    const totalChildWidth = childWidths.reduce((sum, w) => sum + w, 0) + 
                                            minHorizontalSpacing * (node.children.length - 1);
                    
                    let childX = x - totalChildWidth / 2 + childWidths[0] / 2;
                    
                    node.children.forEach((child, index) => {
                        // Draw line to child
                        ctx.beginPath();
                        ctx.moveTo(x, y + (node.type === 'BASIC' ? circleRadius : nodeHeight/2));
                        ctx.lineTo(childX, childY - (child.type === 'BASIC' ? circleRadius : nodeHeight/2));
                        ctx.strokeStyle = '#9ca3af';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        
                        // Recursively draw child
                        drawTree(child, childX, childY, index);
                        
                        // Move to next child position
                        if (index < node.children.length - 1) {
                            childX += childWidths[index] / 2 + minHorizontalSpacing + childWidths[index + 1] / 2;
                        }
                    });
                }
            };
            
            // Draw the tree starting from top center
            drawTree(failureLogicTree, canvas.width / 2, 60);
            
            // Convert to base64
            return canvas.toDataURL('image/png');
        }
        
        // ==================== IMPORTANCE MEASURE GRAPHIC GENERATOR ====================
        function generateImportanceMeasureImageBase64(importanceMeasures, plotXAxis, plotYAxis) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 800;
            canvas.height = 600;
            
            // Fill background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const margin = { top: 40, right: 40, bottom: 80, left: 80 };
            const plotWidth = canvas.width - margin.left - margin.right;
            const plotHeight = canvas.height - margin.top - margin.bottom;
            
            // Get data for axes - filter out invalid values
            const validData = importanceMeasures.filter(m => {
                const xVal = m[plotXAxis];
                const yVal = m[plotYAxis];
                return xVal != null && yVal != null && 
                       isFinite(xVal) && isFinite(yVal) && 
                       xVal > 0 && yVal > 0;
            });
            
            if (validData.length === 0) {
                // Draw "No data" message
                ctx.fillStyle = '#666';
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('No valid data points to display', canvas.width / 2, canvas.height / 2);
                return canvas.toDataURL('image/png');
            }
            
            const xData = validData.map(m => m[plotXAxis]);
            const yData = validData.map(m => m[plotYAxis]);
            
            // Calculate scales - use linear scale for better visibility
            const xMin = Math.min(...xData);
            const xMax = Math.max(...xData);
            const yMin = Math.min(...yData);
            const yMax = Math.max(...yData);
            
            // Add padding to ranges
            const xPadding = (xMax - xMin) * 0.1 || xMax * 0.1;
            const yPadding = (yMax - yMin) * 0.1 || yMax * 0.1;
            const xMinPadded = Math.max(0, xMin - xPadding);
            const xMaxPadded = xMax + xPadding;
            const yMinPadded = Math.max(0, yMin - yPadding);
            const yMaxPadded = yMax + yPadding;
            
            const linearScale = (value, min, max, range) => {
                if (max === min) return range / 2;
                return ((value - min) / (max - min)) * range;
            };
            
            // Draw plot area background
            ctx.fillStyle = '#f8f8f8';
            ctx.fillRect(margin.left, margin.top, plotWidth, plotHeight);
            
            // Draw grid lines
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            const numGridLines = 5;
            for (let i = 0; i <= numGridLines; i++) {
                const x = margin.left + (plotWidth * i / numGridLines);
                const y = margin.top + (plotHeight * i / numGridLines);
                
                // Vertical grid lines
                ctx.beginPath();
                ctx.moveTo(x, margin.top);
                ctx.lineTo(x, canvas.height - margin.bottom);
                ctx.stroke();
                
                // Horizontal grid lines
                ctx.beginPath();
                ctx.moveTo(margin.left, y);
                ctx.lineTo(canvas.width - margin.right, y);
                ctx.stroke();
            }
            
            // Draw axes
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top);
            ctx.lineTo(margin.left, canvas.height - margin.bottom);
            ctx.lineTo(canvas.width - margin.right, canvas.height - margin.bottom);
            ctx.stroke();
            
            // Draw axis labels
            ctx.fillStyle = '#000';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(plotXAxis.toUpperCase(), canvas.width / 2, canvas.height - 20);
            
            ctx.save();
            ctx.translate(20, canvas.height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText(plotYAxis.toUpperCase(), 0, 0);
            ctx.restore();
            
            // Draw tick labels
            ctx.font = '10px sans-serif';
            ctx.fillStyle = '#333';
            for (let i = 0; i <= numGridLines; i++) {
                // X-axis ticks
                const xTickVal = xMinPadded + (xMaxPadded - xMinPadded) * i / numGridLines;
                const xTickPos = margin.left + (plotWidth * i / numGridLines);
                ctx.textAlign = 'center';
                ctx.fillText(xTickVal.toFixed(2), xTickPos, canvas.height - margin.bottom + 15);
                
                // Y-axis ticks
                const yTickVal = yMaxPadded - (yMaxPadded - yMinPadded) * i / numGridLines;
                const yTickPos = margin.top + (plotHeight * i / numGridLines);
                ctx.textAlign = 'right';
                ctx.fillText(yTickVal.toFixed(2), margin.left - 5, yTickPos + 4);
            }
            
            // Draw points
            const colors = ['#3b82f6', '#ef4444', '#22c55e', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'];
            validData.forEach((m, i) => {
                const xVal = m[plotXAxis];
                const yVal = m[plotYAxis];
                
                const x = margin.left + linearScale(xVal, xMinPadded, xMaxPadded, plotWidth);
                const y = canvas.height - margin.bottom - linearScale(yVal, yMinPadded, yMaxPadded, plotHeight);
                
                const color = colors[i % colors.length];
                
                // Draw point
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // Draw label
                ctx.fillStyle = '#000';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'center';
                // Truncate long event names
                const label = m.event.length > 20 ? m.event.substring(0, 18) + '...' : m.event;
                ctx.fillText(label, x, y - 10);
            });
            
            // Draw title
            ctx.fillStyle = '#000';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`Importance Measures: ${plotXAxis.toUpperCase()} vs ${plotYAxis.toUpperCase()}`, canvas.width / 2, 25);
            
            return canvas.toDataURL('image/png');
        }
        
        // ==================== EXPORT MODAL ====================
        function ExportModal({ onClose, sscsInSystem, systemName, systemLogic, superComponents, parseSystemWorksExpression, generateMinimalCutSets, calculateCutSetProbability, calculateMCUB, settings }) {
            const allSSCs = sscsInSystem || [];
            const [selectedSSCs, setSelectedSSCs] = React.useState(() => new Set(allSSCs.map((_, i) => i)));
            const [format, setFormat] = React.useState('relDB');

            const toggleSSC = (idx) => {
                setSelectedSSCs(prev => {
                    const s = new Set(prev);
                    s.has(idx) ? s.delete(idx) : s.add(idx);
                    return s;
                });
            };
            const toggleAll = () => {
                setSelectedSSCs(prev =>
                    prev.size === allSSCs.length ? new Set() : new Set(allSSCs.map((_, i) => i))
                );
            };

            // ── .relDB export ──────────────────────────────────────────────────────
            function exportRelDB() {
                const sscsToExport = allSSCs.filter((_, i) => selectedSSCs.has(i));
                const safeSysName = (systemName || 'System').replace(/[^a-zA-Z0-9_\- ]/g, '_');
                
                let lines = [];
                lines.push(`source name: KUREAS-SYS Export \u2013 ${safeSysName}`);
                lines.push(`source description: Reliability database exported from KUREAS-SYS for system: ${safeSysName}, generated ${new Date().toISOString()}`);
                lines.push(`*System                        ,                    SSC Type,  Component Type              ,Failure Mode           ,Description                                                                         ,Units (per demand or per hour),Distribution Type,Mean,Distribution Shape Parameter (\u03b1),Distribution Scale Parameter (\u03b2)`);
                
                for (const ssc of sscsToExport) {
                    const fms = (ssc.failureModes || []).filter(fm => fm.applicable !== false && fm.probabilityType !== 'screened');
                    if (fms.length === 0) {
                        // Export with blank FM data
                        lines.push(`${systemName || 'System'},${ssc.sscType || ''},${ssc.label || ssc.name},N/A,"${ssc.description || ''}",d,Lognormal,,,`);
                    } else {
                        for (const fm of fms) {
                            const units = fm.data?.units || 'd';
                            const dist = fm.data?.distributionType || 'Lognormal';
                            const mean = fm.data?.mean || '';
                            const alpha = fm.data?.alpha || fm.data?.mean || '';
                            const beta = fm.data?.beta || fm.data?.errorFactor || '';
                            const desc = fm.data?.description || fm.mode || ssc.description || '';
                            lines.push(`${systemName || 'System'},${ssc.sscType || ''},${ssc.label || ssc.name},${fm.mode || 'Fails to Operate'},"${desc}",${units},${dist},${mean},${alpha},${beta}`);
                        }
                    }
                }
                
                const text = lines.join('\r\n');
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const safeName = safeSysName.replace(/\s+/g, '_');
                a.download = `SYS_${safeName}.relDB`;
                a.click();
                URL.revokeObjectURL(url);
            }

            // ── .fmeaDB export ─────────────────────────────────────────────────────
            function exportFmeaDB() {
                const sscsToExport = allSSCs.filter((_, i) => selectedSSCs.has(i));
                const safeSysName = (systemName || 'System').replace(/[^a-zA-Z0-9_\- ]/g, '_');
                
                const exportData = {
                    format: 'KUREAS-SYS-FMEA',
                    version: '1.0',
                    exportedAt: new Date().toISOString(),
                    systemName: systemName || '',
                    components: sscsToExport.map(ssc => ({
                        name: ssc.name,
                        description: ssc.description || '',
                        label: ssc.label || '',
                        sscType: ssc.sscType || '',
                        system: ssc.system || systemName || '',
                        source: ssc.source || null,
                        failureModes: (ssc.failureModes || []).map(fm => ({
                            mode: fm.mode || '',
                            description: fm.data?.description || '',
                            applicable: fm.applicable !== false,
                            probabilityType: fm.probabilityType || 'numeric',
                            qualitativeLevel: fm.qualitativeLevel || null,
                            timeToOperate: fm.timeToOperate || null,
                            data: fm.data ? {
                                mean: fm.data.mean || '',
                                units: fm.data.units || 'd',
                                distributionType: fm.data.distributionType || 'Lognormal',
                                alpha: fm.data.alpha || fm.data.mean || '',
                                beta: fm.data.beta || fm.data.errorFactor || '',
                                description: fm.data.description || ''
                            } : null,
                            effect: fm.effect || '',
                            severity: fm.severity || '',
                            detection: fm.detection || '',
                            mitigation: fm.mitigation || '',
                            notes: fm.notes || ''
                        }))
                    }))
                };
                
                const json = JSON.stringify(exportData, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const safeName = safeSysName.replace(/\s+/g, '_');
                a.download = `SYS_${safeName}.fmeaDB`;
                a.click();
                URL.revokeObjectURL(url);
            }

            const handleExport = () => {
                if (format === 'knowFTL') {
                    // KNOW_FTL does not filter by selectedSSCs — it uses the whole fault tree
                    exportKUREASFTL();
                    onClose();
                    return;
                }
                if (selectedSSCs.size === 0) { alert('Select at least one component to export.'); return; }
                if (format === 'relDB') exportRelDB();
                else if (format === 'fmeaDB') exportFmeaDB();
                onClose();
            };

            // ── KUREAS-FTL (.KNOW_FTL) export ─────────────────────────────────────
            function exportKUREASFTL() {
                if (!systemLogic || systemLogic.length <= 1) {
                    alert('No system logic (SYSTEM WORKS = ...) defined. Please enter fault tree logic before exporting.');
                    return;
                }

                // Build basic event data (probability map) from SSCs
                const basicEventData = {};
                const getProb = (fm) => {
                    if (fm.probabilityType === 'screened') return 0;
                    if (fm.probabilityType === 'qualitative') {
                        const level = fm.qualitativeLevel || 'medium';
                        const map = { low: parseFloat(settings?.qualitativeProbLow||'1E-5'), medium: parseFloat(settings?.qualitativeProbMedium||'1E-3'), high: parseFloat(settings?.qualitativeProbHigh||'1E-1') };
                        return map[level] ?? 1e-3;
                    }
                    if (fm.probabilityType === 'probability') {
                        const model = fm.failureModel || '0';
                        if (model === '5') return fm.logicFlag === 'F' ? 0 : (fm.logicFlag === 'I' ? 0 : 1);
                        if (model === '1') {
                            const dp = parseFloat(fm.demandProb); const dN = parseFloat(fm.demandN) || 1;
                            if (!isNaN(dp) && dp >= 0 && dN >= 1) return 1 - Math.pow(1 - dp, dN);
                        }
                        if (model === '2') {
                            const lam = parseFloat(fm.lambda) || 0; const mt = parseFloat(fm.missionTime) || 0;
                            if (lam > 0 && mt > 0) return 1 - Math.exp(-lam * mt);
                        }
                        if (model === '3') {
                            const lam = parseFloat(fm.lambda) || 0; const ii = parseFloat(fm.inspInterval) || 0;
                            if (lam > 0 && ii > 0) { const li = lam * ii; return 1 + (Math.exp(-li) - 1) / li; }
                        }
                        if (model === '4') {
                            const lam = parseFloat(fm.lambda) || 0; const mt = parseFloat(fm.missionTime) || 0; const tau = parseFloat(fm.tauRepair) || 0;
                            if (lam > 0 && mt > 0 && tau > 0) return (lam*tau)*(1-Math.exp(-(lam+tau)*mt))/(1+lam*tau);
                        }
                        // FM0 or fallback: use data.mean
                        const mean = parseFloat(fm.data?.mean || 0);
                        return isNaN(mean) ? 0 : mean;
                    }
                    // Legacy / non-typed: use data.mean with unit conversion
                    const mean = parseFloat(fm.data?.mean || 0);
                    const units = fm.data?.units || 'd';
                    if (units === 'h') return 1 - Math.exp(-mean * (fm.timeToOperate || 24));
                    if (units === 'y') return 1 - Math.exp(-mean * (fm.timeToOperate || 24) / 8760);
                    return isNaN(mean) ? 0 : mean;
                };

                for (const ssc of allSSCs) {
                    const fms = (ssc.failureModes || []).filter(fm => fm.applicable !== false && fm.probabilityType !== 'screened');
                    if (fms.length === 0) continue;
                    if (fms.length > 1) {
                        basicEventData[ssc.name] = { probability: null, description: ssc.description || ssc.label || '', hasMultipleModes: true, failureModeNames: fms.map((fm, i) => `${ssc.name}__${(fm.mode||`FM${i+1}`).replace(/\s+/g,'_')}`) };
                        fms.forEach((fm, i) => {
                            const key = `${ssc.name}__${(fm.mode||`FM${i+1}`).replace(/\s+/g,'_')}`;
                            basicEventData[key] = { probability: getProb(fm), description: fm.data?.description || fm.mode || '', parentSSC: ssc.name };
                        });
                    } else {
                        basicEventData[ssc.name] = { probability: getProb(fms[0]), description: ssc.description || ssc.label || fms[0].data?.description || '' };
                    }
                }

                // Parse failure logic tree
                let failureTree;
                try {
                    failureTree = parseSystemWorksExpression(systemLogic, systemName, superComponents);
                } catch(e) {
                    alert('Error parsing system logic: ' + e.message);
                    return;
                }
                if (!failureTree) { alert('Could not parse system logic into a fault tree.'); return; }

                // Expand multi-mode SSCs into OR gates
                const expandMultiMode = (node) => {
                    if (node.type === 'BASIC') {
                        const ed = basicEventData[node.label];
                        if (ed?.hasMultipleModes) {
                            return { id: `or_${node.label}`, type: 'OR', label: `${node.label} fails`, children: ed.failureModeNames.map((n,i) => ({ id: `${node.label}_fm${i}`, type: 'BASIC', label: n, description: basicEventData[n]?.description||'' })) };
                        }
                    }
                    if (node.children) node.children = node.children.map(expandMultiMode);
                    return node;
                };
                failureTree = expandMultiMode(failureTree);

                // Build label→FTL-name map so cut sets and descriptions use consistent names
                // FTL EVENT names: spaces→underscore, truncated to 24 chars
                const toFTLName = (label) => (label || 'EVT').replace(/\s+/g, '_').substring(0, 24);

                // Convert SYS tree nodes → FTL-format nodes
                // Preserve _origLabel on EVENT nodes so we can look up descriptions/probabilities
                let gateCounter = 0;
                const convertNode = (node) => {
                    if (node.type === 'BASIC' || node.type === 'BASIC_NOT') {
                        const origLabel = node.label || node.id || 'EVT';
                        const evtName = toFTLName(origLabel);
                        return { name: evtName, type: 'EVENT', _origLabel: origLabel, _complement: node.type === 'BASIC_NOT' };
                    }
                    // Gate
                    const origLabel = node.label || node.id || `G${++gateCounter}`;
                    const gateName = toFTLName(origLabel);
                    let gateType = 'OR';
                    if (node.type === 'AND') gateType = 'AND';
                    else if (node.type === 'NOT') gateType = 'NOT';
                    else if (node.type === 'VOTING') gateType = 'VOTING';
                    const children = (node.children || []).map(convertNode);
                    const result = { name: gateName, type: gateType, children, _origLabel: origLabel };
                    if (node.type === 'VOTING') result.votingN = node.votingN || 1;
                    return result;
                };
                const rootNode = convertNode(failureTree);

                // Collect all EVENT nodes for eventInfo + eventDescriptions
                // Look up description and probability via _origLabel → basicEventData
                const eventInfo = {};
                const eventDescriptions = {};
                const gateDescriptions = {};
                const collectEvents = (node) => {
                    if (node.type === 'EVENT') {
                        const origLabel = node._origLabel || node.name;
                        const ed = basicEventData[origLabel] || basicEventData[node.name] || {};
                        const prob = ed.probability ?? 0;
                        eventInfo[node.name] = {
                            Name: node.name,
                            FdT: '1', UdC: 'L', UdT: 'B',
                            UdValue: prob, Prob: prob,
                            Lambda: 0, Tau: 0, Mission: 0,
                            Init: false, PF: ' ',
                            UdValue2: prob, Calc_Prob: prob,
                            Freq: ' ', Model_Type: '', Phase_Type: '',
                            Project: systemName || ''
                        };
                        const desc = ed.description || '';
                        if (desc) eventDescriptions[node.name] = desc;
                    } else {
                        (node.children || []).forEach(collectEvents);
                    }
                };
                collectEvents(rootNode);

                // Generate minimal cut sets using the SYS failure tree (pre-convertNode)
                // then map each plain-string label to FTL-format { name, complement } objects
                let cutSetsData = {};
                try {
                    const minCS = generateMinimalCutSets(failureTree, basicEventData);
                    // minCS is array of arrays of plain label strings
                    // Convert to FTL format: each event → { name: toFTLName(label), complement: false }
                    const ftlCutSets = minCS.map(cs =>
                        cs.map(label => ({ name: toFTLName(label), complement: false }))
                    );
                    // Compute probabilities using converted names (which match eventInfo keys)
                    const csWithProb = ftlCutSets.map(cs => {
                        let p = 1;
                        for (const ev of cs) {
                            const info = eventInfo[ev.name];
                            if (!info || info.Calc_Prob === undefined) { p = null; break; }
                            p *= ev.complement ? (1 - info.Calc_Prob) : info.Calc_Prob;
                        }
                        return { cs, probability: p };
                    });
                    csWithProb.sort((a, b) => (b.probability || 0) - (a.probability || 0));
                    const probs = csWithProb.map(c => c.probability).filter(p => p !== null);
                    let mcub = null;
                    if (probs.length > 0) {
                        let prod = 1; for (const p of probs) prod *= (1 - p);
                        mcub = 1 - prod;
                    }
                    cutSetsData[systemName || 'System'] = {
                        cutSets: csWithProb.map(c => c.cs),
                        probabilities: csWithProb.map(c => c.probability),
                        mcub
                    };
                } catch(e) {
                    console.warn('Could not compute cut sets for KNOW_FTL export:', e);
                }

                // Strip internal _ fields from rootNode before serialising
                const stripInternal = (node) => {
                    const { _origLabel, _complement, ...clean } = node;
                    if (clean.children) clean.children = clean.children.map(stripInternal);
                    return clean;
                };

                const projectData = {
                    format: 'KUREAS-FTL',
                    version: '1.1',
                    savedAt: new Date().toISOString(),
                    projectName: systemName || 'System',
                    projectDescription: `Fault tree exported from KUREAS-SYS for system: ${systemName||'System'}`,
                    faultTrees: [{
                        treeName: systemName || 'System',
                        rootNode: stripInternal(rootNode)
                    }],
                    eventDescriptions,
                    gateDescriptions,
                    eventInfo,
                    cutSets: cutSetsData
                };

                const json = JSON.stringify(projectData, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const safeName = (systemName||'System').replace(/[^a-zA-Z0-9_\-]/g,'_');
                a.download = `SYS_${safeName}.KNOW_FTL`;
                a.click();
                URL.revokeObjectURL(url);
            }

            const FORMAT_INFO = {
                relDB: {
                    label: 'Reliability Database (.relDB)',
                    color: '#1d4ed8',
                    desc: 'CSV-format reliability database. Contains system, SSC type, component type, failure mode, description, units, and distribution parameters. Compatible with KUREAS-SYS Load Database.'
                },
                fmeaDB: {
                    label: 'FMEA Database (.fmeaDB)',
                    color: '#7c3aed',
                    desc: 'JSON-format FMEA database. Contains all component information including failure modes, FMEA data (severity, detection, mitigation, notes), and probability data. Full round-trip compatible with KUREAS-SYS Load Database.'
                },
                knowFTL: {
                    label: 'KUREAS-FTL Fault Tree (.KNOW_FTL)',
                    color: '#065f46',
                    desc: 'Native KUREAS-FTL project file (JSON). Includes the system fault tree structure, basic event probabilities and descriptions, and pre-computed minimal cut sets. Load directly in KUREAS-FTL.'
                }
            };

            return (
                <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}}
                    onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
                    <div style={{background:'white',borderRadius:'12px',boxShadow:'0 8px 40px rgba(0,0,0,0.3)',width:'500px',maxWidth:'95vw',maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
                        {/* Header */}
                        <div style={{background:'#1e3a8a',color:'white',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
                            <span style={{fontWeight:'700',fontSize:'15px'}}>
                                <svg style={{display:'inline',marginRight:'7px',verticalAlign:'-3px'}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                Export Components
                            </span>
                            <button onClick={onClose} style={{background:'none',border:'none',color:'white',fontSize:'18px',cursor:'pointer',lineHeight:1}}>&#x00D7;</button>
                        </div>

                        <div style={{padding:'18px 20px',overflowY:'auto',flex:1}}>
                            {/* Format selection */}
                            <div style={{marginBottom:'18px'}}>
