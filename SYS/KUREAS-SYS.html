<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="custom">
        const { useState, useEffect, useRef, useCallback } = React;

        // Initialize Mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            },
            securityLevel: 'loose'
        });

        // Settings Management
        const DEFAULT_SETTINGS = {
            fontSize: 'medium',
            fontFamily: 'sans-serif',
            background: 'light',
            showProbability: '1',
            sscSort: 'order',
            qualitativeProbLow: '1E-5',
            qualitativeProbMedium: '1E-3',
            qualitativeProbHigh: '1E-1'
        };

        class SettingsManager {
            static STORAGE_KEY = 'KUREAS_SYS_settings';
            static LAYOUT_KEY = 'KUREAS_SYS_layout';
            
            static load() {
                try {
                    const saved = localStorage.getItem(this.STORAGE_KEY);
                    return saved ? { ...DEFAULT_SETTINGS, ...JSON.parse(saved) } : { ...DEFAULT_SETTINGS };
                } catch (err) {
                    console.error('Failed to load settings:', err);
                    return { ...DEFAULT_SETTINGS };
                }
            }
            
            static save(settings) {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(settings));
                    return true;
                } catch (err) {
                    console.error('Failed to save settings:', err);
                    return false;
                }
            }
            
            static saveLayout(layout) {
                try {
                    localStorage.setItem(this.LAYOUT_KEY, JSON.stringify(layout));
                    return true;
                } catch (err) {
                    console.error('Failed to save layout:', err);
                    return false;
                }
            }
            
            static loadLayout() {
                try {
                    const saved = localStorage.getItem(this.LAYOUT_KEY);
                    return saved ? JSON.parse(saved) : null;
                } catch (err) {
                    console.error('Failed to load layout:', err);
                    return null;
                }
            }
            
            static reset() {
                localStorage.removeItem(this.STORAGE_KEY);
                return { ...DEFAULT_SETTINGS };
            }
        }

        // Helper functions
        function getFontSizeClass(setting) {
            switch(setting) {
                case 'small': return 'text-xs';
                case 'large': return 'text-lg';
                default: return 'text-sm'; // medium is now smaller
            }
        }

        function getFontFamily(setting) {
            switch(setting) {
                case 'serif': return 'font-serif';
                case 'monospace': return 'font-mono';
                default: return 'font-sans';
            }
        }

        function getBackgroundStyle(setting) {
            switch(setting) {
                case 'dark':
                    return { 
                        backgroundColor: '#1f2937', 
                        color: '#f3f4f6',
                        paneBackground: '#374151',
                        borderColor: '#4b5563'
                    };
                case 'light':
                    return { 
                        backgroundColor: '#ffffff', 
                        color: '#111827',
                        paneBackground: '#ffffff',
                        borderColor: '#d1d5db'
                    };
                case 'gray':
                    return { 
                        backgroundColor: '#f3f4f6', 
                        color: '#111827',
                        paneBackground: '#f9fafb',
                        borderColor: '#d1d5db'
                    };
                default:
                    return { 
                        backgroundColor: '#ffffff', 
                        color: '#111827',
                        paneBackground: '#ffffff',
                        borderColor: '#d1d5db'
                    };
            }
        }

        // Icon Components
        const SettingsIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                <circle cx="12" cy="12" r="3"></circle>

        const InfoIcon = () => (
            <span className="text-base">&#8505;&#65039;</span>
        );

        const ChevronRightIcon = () => (
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>

        const ChevronDownIcon = () => (

        // Tooltip Component
        function Tooltip({ text, children }) {
            const [show, setShow] = useState(false);
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [alignment, setAlignment] = useState('center'); // 'center', 'left', or 'right'
            const buttonRef = useRef(null);

            const handleMouseEnter = () => {
                if (buttonRef.current) {
                    const rect = buttonRef.current.getBoundingClientRect();
                    const tooltipWidth = 250; // Approximate tooltip width
                    let xPos = rect.left + rect.width / 2;
                    let align = 'center';
                    
                    // Check if tooltip would go off left edge of screen
                    if (xPos - tooltipWidth / 2 < 10) {
                        xPos = rect.left;
                        align = 'left';
                    }
                    // Check if tooltip would go off right edge of screen
                    else if (xPos + tooltipWidth / 2 > window.innerWidth - 10) {
                        xPos = rect.right;
                        align = 'right';
                    }
                    
                    setPosition({
                        x: xPos,
                        y: rect.bottom + 5
                    });
                    setAlignment(align);
                }
                setShow(true);
            };

            const handleMouseLeave = () => {
                setShow(false);
            };

            // Determine transform and arrow position based on alignment
            const getTooltipStyle = () => {
                switch (alignment) {
                    case 'left':
                        return { left: `${position.x}px`, top: `${position.y}px`, transform: 'translateX(0)' };
                    case 'right':
                        return { left: `${position.x}px`, top: `${position.y}px`, transform: 'translateX(-100%)' };
                    default:
                        return { left: `${position.x}px`, top: `${position.y}px`, transform: 'translateX(-50%)' };
                }
            };

            const getArrowStyle = () => {
                switch (alignment) {
                    case 'left':
                        return 'left-4';
                    case 'right':
                        return 'right-4';
                    default:
                        return 'left-1/2 -translate-x-1/2';
                }
            };

            return (
                <>
                    <div
                        ref={buttonRef}
                        onMouseEnter={handleMouseEnter}
                        onMouseLeave={handleMouseLeave}
                        className="inline-flex items-center cursor-help"
                    >
                        {children}
                    </div>
                    {show && (
                        <div 
                            className="fixed z-50 bg-blue-900 text-white text-sm rounded-lg shadow-xl p-3 max-w-sm pointer-events-none"
                            style={getTooltipStyle()}
                        >
                            <div className="whitespace-pre-line">{text}</div>
                            <div className={`absolute -top-2 ${getArrowStyle()} w-0 h-0 border-l-8 border-r-8 border-b-8 border-transparent border-b-blue-900`}></div>
                        </div>
                    )}
                </>
            );
        }

        // Add Supercomponent Modal Component
        function AddSupercomponentModal({ onSave, onCancel, backgroundStyle }) {
            const [name, setName] = useState('');
            const [description, setDescription] = useState('');
            const [error, setError] = useState('');

            const handleSave = () => {
                if (!name.trim()) {
                    setError('Unique Supercomponent Name is required');
                    return;
                }
                onSave({ name: name.trim(), description: description.trim() });
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{
                        backgroundColor: backgroundStyle.paneBackground,
                        color: backgroundStyle.color
                    }}>
                        <div className="p-6">
                            <h2 className="text-xl font-bold mb-4">Create Supercomponent</h2>

                            <div className="mb-4">
                                <label className="block font-bold mb-2 text-sm">
                                    Unique Supercomponent Name <span className="text-red-500">*</span>
                                </label>
                                <input
                                    type="text"
                                    value={name}
                                    onChange={(e) => {
                                        setName(e.target.value);
                                        setError('');
                                    }}
                                    className="w-full px-3 py-2 border rounded"
                                    placeholder="e.g., TRAIN-A"
                                    style={{
                                        backgroundColor: backgroundStyle.backgroundColor,
                                        color: backgroundStyle.color,
                                        borderColor: backgroundStyle.borderColor
                                    }}
                                    autoFocus
                                />
                                {error && <div className="text-red-500 text-xs mt-1">{error}</div>}
                            </div>

                            <div className="mb-6">
                                <label className="block font-bold mb-2 text-sm">
                                    Supercomponent Description <span className="text-gray-500">(optional)</span>
                                </label>
                                <textarea
                                    value={description}
                                    onChange={(e) => setDescription(e.target.value)}
                                    rows="3"
                                    className="w-full px-3 py-2 border rounded"
                                    placeholder="Brief description of this supercomponent"
                                    style={{
                                        backgroundColor: backgroundStyle.backgroundColor,
                                        color: backgroundStyle.color,
                                        borderColor: backgroundStyle.borderColor
                                    }}
                                />
                            </div>

                            <div className="flex gap-3 justify-end">
                                <button
                                    onClick={onCancel}
                                    className="px-4 py-2 border rounded hover:bg-gray-100"
                                    style={{ borderColor: backgroundStyle.borderColor }}
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={handleSave}
                                    className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                >
                                    Create Supercomponent
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Add SSC Modal Component
        function AddSSCModal({ systemName, sscType, componentType, failureModes, onSave, onCancel, backgroundStyle, existingSSCs }) {
            // Extract acronym from componentType (text in parentheses)
            const acronymMatch = componentType.match(/\(([^)]+)\)/);
            const defaultAcronym = acronymMatch ? acronymMatch[1] : '';
            
            const [name, setName] = useState(defaultAcronym);
            const [description, setDescription] = useState(componentType);
            const [error, setError] = useState('');

            const handleSave = () => {
                const trimmedName = name.trim();
                if (!trimmedName) {
                    setError('Unique SSC Name is required');
                    return;
                }
                
                // Check if name already exists
                const nameExists = existingSSCs.some(ssc => 
                    ssc.name.toLowerCase() === trimmedName.toLowerCase()
                );
                
                if (nameExists) {
                    setError('An SSC with this name already exists in the system');
                    return;
                }
                
                onSave({ name: trimmedName, description: description.trim() });
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{
                        backgroundColor: backgroundStyle.paneBackground,
                        color: backgroundStyle.color
                    }}>
                        <div className="p-6">
                            <h2 className="text-xl font-bold mb-4">Add SSC to System</h2>
                            
                            <div className="mb-4 text-sm space-y-2">
                                <div><strong>System:</strong> {systemName || 'Untitled'}</div>
                                <div><strong>SSC Type:</strong> {sscType}</div>
                                <div><strong>Component Type:</strong> {componentType}</div>
                                {failureModes && failureModes.length > 0 && (() => {
                                    const firstMode = failureModes[0].data;
                                    const units = firstMode.units;
                                    const meanValue = firstMode.mean;
                                    
                                    if (units === 'd') {
                                        return <div><strong>Failure Probability:</strong> {meanValue}</div>;
                                    } else if (units === 'h') {
                                        return <div><strong>Failure Rate (per hour):</strong> {meanValue}</div>;
                                    } else if (units === 'y') {
                                        return <div><strong>Failure Rate (per year):</strong> {meanValue}</div>;
                                    }
                                    return null;
                                })()}
                            </div>

                            <div className="mb-4">
                                <label className="block font-bold mb-2 text-sm">
                                    Unique SSC Name <span className="text-red-500">*</span>
                                </label>
                                <input
                                    type="text"
                                    value={name}
                                    onChange={(e) => {
                                        setName(e.target.value);
                                        setError('');
                                    }}
                                    className="w-full px-3 py-2 border rounded"
                                    placeholder="e.g., AFW-PUMP-A"
                                    style={{
                                        backgroundColor: backgroundStyle.backgroundColor,
                                        color: backgroundStyle.color,
                                        borderColor: backgroundStyle.borderColor
                                    }}
                                    autoFocus
                                />
                                {error && <div className="text-red-500 text-xs mt-1">{error}</div>}
                            </div>

                            <div className="mb-6">
                                <label className="block font-bold mb-2 text-sm">
                                    SSC Description <span className="text-gray-500">(optional)</span>
                                </label>
                                <textarea
                                    value={description}
                                    onChange={(e) => setDescription(e.target.value)}
                                    rows="3"
                                    className="w-full px-3 py-2 border rounded"
                                    placeholder="Brief description of this SSC"
                                    style={{
                                        backgroundColor: backgroundStyle.backgroundColor,
                                        color: backgroundStyle.color,
                                        borderColor: backgroundStyle.borderColor
                                    }}
                                />
                            </div>

                            <div className="flex gap-3 justify-end">
                                <button
                                    onClick={onCancel}
                                    className="px-4 py-2 border rounded hover:bg-gray-100"
                                    style={{ borderColor: backgroundStyle.borderColor }}
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={handleSave}
                                    className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                >
                                    Add SSC
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // New SSC Modal Component

        // New SSC Modal Component
        function NewSSCModal({ systemName, onSave, onCancel, backgroundStyle, existingSSCs, mode = 'ssc', selectedSSC = null, settings }) {
            const [name, setName] = useState(mode === 'fm' && selectedSSC ? selectedSSC.name : '');
            const [description, setDescription] = useState(mode === 'fm' && selectedSSC ? selectedSSC.description : '');
            const [sscType, setSscType] = useState(mode === 'fm' && selectedSSC ? selectedSSC.sscType : '');
            const [componentType, setComponentType] = useState(mode === 'fm' && selectedSSC ? selectedSSC.label : '');
            const [failureMode, setFailureMode] = useState('');
            
            // Autocomplete state
            const [sscTypeSuggestions, setSscTypeSuggestions] = useState([]);
            const [componentTypeSuggestions, setComponentTypeSuggestions] = useState([]);
            const [failureModeSuggestions, setFailureModeSuggestions] = useState([]);
            const [showSscTypeSuggestions, setShowSscTypeSuggestions] = useState(false);
            const [showComponentTypeSuggestions, setShowComponentTypeSuggestions] = useState(false);
            const [showFailureModeSuggestions, setShowFailureModeSuggestions] = useState(false);
            
            // Build unique lists from existing SSCs
            useEffect(() => {
                const sscTypes = new Set();
                const componentTypes = new Set();
                const failureModes = new Set();
                
                existingSSCs.forEach(ssc => {
                    if (ssc.sscType) sscTypes.add(ssc.sscType);
                    if (ssc.label) componentTypes.add(ssc.label);
                    if (ssc.failureModes) {
                        ssc.failureModes.forEach(fm => {
                            if (fm.mode) failureModes.add(fm.mode);
                        });
                    }
                });
                
                setSscTypeSuggestions(Array.from(sscTypes).sort());
                setComponentTypeSuggestions(Array.from(componentTypes).sort());
                setFailureModeSuggestions(Array.from(failureModes).sort());
            }, [existingSSCs]);

            const [failureDescription, setFailureDescription] = useState('');
            const [units, setUnits] = useState('d');

            // Evaluation type (formerly "Probability Type")
            const [probabilityType, setProbabilityType] = useState('probability');
            const [qualitativeLevel, setQualitativeLevel] = useState('medium');
            const [linkedSystemFile, setLinkedSystemFile] = useState('');
            const [linkedSystemName, setLinkedSystemName] = useState('');

            // Failure model (FM0–FM5) — used when probabilityType === 'probability'
            const [failureModel, setFailureModel] = useState('0');
            // FM0: direct probability
            const [mean, setMean] = useState('');
            // FM1: Demand (Binomial)
            const [demandProb, setDemandProb] = useState('');
            const [demandN, setDemandN] = useState('1');
            // FM2: Fails While Operating (Poisson)
            // FM3: Fails in Standby
            // FM4: Fails While Operating w/ Repair
            const [lambda, setLambda] = useState('');
            const [missionTime, setMissionTime] = useState('');
            const [inspInterval, setInspInterval] = useState('');
            const [tauRepair, setTauRepair] = useState('');
            // FM5: Logic T/F Flag
            const [logicFlag, setLogicFlag] = useState('T');

            // Distribution
            const [distributionType, setDistributionType] = useState('CNI');
            const [shapeParam, setShapeParam] = useState('');
            const [scaleParam, setScaleParam] = useState('');

            const [saveOption, setSaveOption] = useState('1');
            const [error, setError] = useState('');

            // Computed probability for FM1–FM4
            const computedProb = React.useMemo(() => {
                const _lam = parseFloat(lambda) || 0;
                const _mt  = parseFloat(missionTime) || 0;
                const _ii  = parseFloat(inspInterval) || 0;
                const _tau = parseFloat(tauRepair) || 0;
                const _dp  = parseFloat(demandProb);
                const _dN  = parseFloat(demandN) || 1;
                if (failureModel === '1' && !isNaN(_dp) && _dp >= 0 && _dN >= 1) {
                    return 1 - Math.pow(1 - _dp, _dN);
                } else if (failureModel === '2' && _lam > 0 && _mt > 0) {
                    return 1 - Math.exp(-_lam * _mt);
                } else if (failureModel === '3' && _lam > 0 && _ii > 0) {
                    const _li = _lam * _ii;
                    return 1 + (Math.exp(-_li) - 1) / _li;
                } else if (failureModel === '4' && _lam > 0 && _mt > 0 && _tau > 0) {
                    return (_lam * _tau) * (1 - Math.exp(-(_lam + _tau) * _mt)) / (1 + _lam * _tau);
                }
                return null;
            }, [failureModel, lambda, missionTime, inspInterval, tauRepair, demandProb, demandN]);

            const computedProbStr = computedProb !== null ? computedProb.toExponential(3).toUpperCase() : '';

            // Effective mean value for saving
            const effectiveMean = React.useMemo(() => {
                if (probabilityType === 'qualitative') return getQualitativeProbability(qualitativeLevel);
                if (probabilityType === 'screened') return '0';
                if (probabilityType === 'linkedSystem') return 'LINKED';
                // probability type
                if (failureModel === '0') return mean;
                if (failureModel === '5') return logicFlag === 'T' ? '1' : '0';
                return computedProbStr || mean;
            }, [probabilityType, qualitativeLevel, failureModel, mean, computedProbStr, logicFlag]);

            // Distribution types list
            const distributionTypes = [
                { value: 'Beta', label: 'Beta', param1Label: 'Shape (Alpha)', param2Label: 'Shape (Beta)' },
                { value: 'CNI', label: 'Constrained Non-Informative (CNI)', param1Label: 'Mean', param2Label: '(Not Used)' },
                { value: 'Gamma', label: 'Gamma', param1Label: 'Shape', param2Label: 'Scale' },
                { value: 'Lognormal', label: 'Lognormal', param1Label: 'Mean', param2Label: 'Error Factor (95th/50th)' },
                { value: 'Point', label: 'Point Estimate', param1Label: '(Not Used)', param2Label: '(Not Used)' }
            ];
            
            const getDistributionInfo = (distType) => {
                return distributionTypes.find(d => d.value.toLowerCase() === (distType || '').toLowerCase()) || distributionTypes[0];
            };
            
            // Get qualitative probability from settings
            function getQualitativeProbability(level) {
                switch(level) {
                    case 'low': return settings?.qualitativeProbLow || '1E-5';
                    case 'medium': return settings?.qualitativeProbMedium || '1E-3';
                    case 'high': return settings?.qualitativeProbHigh || '1E-1';
                    default: return settings?.qualitativeProbMedium || '1E-3';
                }
            }

            // Styles matching FTL Model Detail
            const mdInp = {
                width: '100%', border: '1px solid #93c5fd', borderRadius: '4px',
                padding: '4px 8px', fontSize: '12px', fontFamily: 'monospace',
                backgroundColor: 'white', color: '#111827',
                MozAppearance: 'textfield', appearance: 'textfield'
            };

            const handleSave = async () => {
                if (mode === 'ssc' && !name.trim()) { setError('SSC Name is required'); return; }
                if (mode === 'ssc' && !sscType.trim()) { setError('SSC Type is required'); return; }
                if (mode === 'ssc' && !componentType.trim()) { setError('Component Type is required'); return; }
                if (!failureMode.trim()) { setError('Failure Mode is required'); return; }
                if (probabilityType === 'probability' && failureModel === '0' && !mean.trim()) {
                    setError('Mean value is required for Failure Probability'); return;
                }
                if (probabilityType === 'linkedSystem' && !linkedSystemFile) {
                    setError('Please select a KUREAS-SYS file to link'); return;
                }
                if (mode === 'ssc') {
                    const nameExists = existingSSCs.some(ssc => ssc.name.toLowerCase() === name.trim().toLowerCase());
                    if (nameExists) { setError('An SSC with this name already exists in the system'); return; }
                }

                const failureModeData = {
                    mode: failureMode,
                    probabilityType: probabilityType,
                    qualitativeLevel: probabilityType === 'qualitative' ? qualitativeLevel : undefined,
                    linkedSystemFile: probabilityType === 'linkedSystem' ? linkedSystemFile : undefined,
                    linkedSystemName: probabilityType === 'linkedSystem' ? linkedSystemName : undefined,
                    // Failure model fields (only for 'probability' type)
                    failureModel: probabilityType === 'probability' ? failureModel : undefined,
                    demandProb: probabilityType === 'probability' && failureModel === '1' ? demandProb : undefined,
                    demandN: probabilityType === 'probability' && failureModel === '1' ? demandN : undefined,
                    lambda: probabilityType === 'probability' && ['2','3','4'].includes(failureModel) ? lambda : undefined,
                    missionTime: probabilityType === 'probability' && ['2','4'].includes(failureModel) ? missionTime : undefined,
                    inspInterval: probabilityType === 'probability' && failureModel === '3' ? inspInterval : undefined,
                    tauRepair: probabilityType === 'probability' && failureModel === '4' ? tauRepair : undefined,
                    logicFlag: probabilityType === 'probability' && failureModel === '5' ? logicFlag : undefined,
                    data: {
                        system: systemName,
                        ssc_type: sscType || (mode === 'fm' ? selectedSSC?.sscType : ''),
                        component_type: componentType || (mode === 'fm' ? selectedSSC?.label : ''),
                        failure_mode: failureMode,
                        description: failureDescription,
                        units: probabilityType === 'linkedSystem' ? 'linked' : units,
                        distribution_type: probabilityType === 'probability' ? distributionType : (probabilityType === 'linkedSystem' ? 'LINKED' : 'CNI'),
                        mean: effectiveMean,
                        distribution_shape_parameter: probabilityType === 'probability' ? shapeParam : effectiveMean,
                        distribution_scale_parameter: probabilityType === 'probability' ? scaleParam : ''
                    }
                };

                if (mode === 'fm') {
                    const updatedSSC = {
                        ...selectedSSC,
                        failureModes: [...selectedSSC.failureModes, {
                            ...failureModeData,
                            applicable: probabilityType !== 'screened'
                        }]
                    };
                    onSave(updatedSSC, true);
                    return;
                }

                const newSSC = {
                    id: Date.now(),
                    name: name.trim(),
                    description: description.trim(),
                    label: componentType,
                    failureModes: [{ ...failureModeData, applicable: probabilityType !== 'screened' }],
                    sscType: sscType,
                    system: systemName,
                    source: null
                };

                if (saveOption === '2') {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.relDB,.csv';
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            try {
                                const content = await file.text();
                                const newLine = `${systemName},${sscType},${componentType},${failureMode},"${failureDescription}",${units},${distributionType},${effectiveMean},${shapeParam},${scaleParam}\n`;
                                const updatedContent = content + newLine;
                                const blob = new Blob([updatedContent], { type: 'text/csv' });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url; a.download = file.name; a.click();
                                URL.revokeObjectURL(url);
                                alert('SSC data appended to ' + file.name + '. Please download the updated file.');
                            } catch (err) { alert('Error reading file: ' + err.message); }
                        }
                    };
                    input.click();
                } else if (saveOption === '3') {
                    const filename = prompt('Enter filename for new reliability database:', 'new_database');
                    if (filename) {
                        const csvContent = `Source Name: User Created Database\nSource Description: Created from KUREAS-SYS\n${systemName},${sscType},${componentType},${failureMode},"${failureDescription}",${units},${distributionType},${effectiveMean},${shapeParam},${scaleParam}\n`;
                        const blob = new Blob([csvContent], { type: 'text/csv' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = filename.endsWith('.relDB') ? filename : filename + '.relDB';
                        a.click();
                        URL.revokeObjectURL(url);
                        alert('New database file created: ' + a.download);
                    }
                }

                onSave(newSSC);
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{
                        backgroundColor: backgroundStyle.paneBackground,
                        color: backgroundStyle.color,
                        maxWidth: '600px',
                        maxHeight: '90vh',
                        overflowY: 'auto'
                    }}>
                        <div className="p-6">
                            <h2 className="text-xl font-bold mb-4">{mode === "ssc" ? "Create New SSC" : "Add New Failure Mode"}</h2>
                            
                            {error && (
                                <div className="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded text-sm">
                                    {error}
                                </div>
                            )}
                            
                            <div className="space-y-4">
                                {mode === 'ssc' && (
                                    <>
                                        {/* SSC Name */}
                                        <div>
                                            <label className="block font-bold mb-1 text-sm">
                                                SSC Name <span className="text-red-500">*</span>
                                            </label>
                                            <input
                                                type="text"
                                                value={name}
                                                onChange={(e) => { setName(e.target.value); setError(''); }}
                                                className="w-full px-3 py-2 border rounded text-sm"
                                                placeholder="e.g., PUMP-A"
                                                style={{
                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                    color: backgroundStyle.color,
                                                    borderColor: backgroundStyle.borderColor
                                                }}
                                            />
                                        </div>
                                        
                                        {/* Description */}
                                        <div>
                                            <label className="block font-bold mb-1 text-sm">Description</label>
                                            <input
                                                type="text"
                                                value={description}
                                                onChange={(e) => setDescription(e.target.value)}
                                                className="w-full px-3 py-2 border rounded text-sm"
                                                placeholder="Brief description of the SSC"
                                                style={{
                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                    color: backgroundStyle.color,
                                                    borderColor: backgroundStyle.borderColor
                                                }}
                                            />
                                        </div>
                                        
                                        {/* SSC Type */}
                                        <div className="relative">
                                            <label className="block font-bold mb-1 text-sm">
                                                SSC Type <span className="text-red-500">*</span>
                                            </label>
                                            <input
                                                type="text"
                                                value={sscType}
                                                onChange={(e) => {
                                                    setSscType(e.target.value);
                                                    setShowSscTypeSuggestions(true);
                                                }}
                                                onBlur={() => setTimeout(() => setShowSscTypeSuggestions(false), 200)}
                                                className="w-full px-3 py-2 border rounded text-sm"
                                                placeholder="e.g., Mechanical, Electrical, Instrumentation"
                                                style={{
                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                    color: backgroundStyle.color,
                                                    borderColor: backgroundStyle.borderColor
                                                }}
                                            />
                                            {showSscTypeSuggestions && sscTypeSuggestions.filter(s => s.toLowerCase().includes(sscType.toLowerCase())).length > 0 && (
                                                <div className="absolute z-10 w-full mt-1 border rounded shadow-lg" style={{
                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                    borderColor: backgroundStyle.borderColor
                                                }}>
                                                    {sscTypeSuggestions.filter(s => s.toLowerCase().includes(sscType.toLowerCase())).map(s => (
                                                        <div key={s} className="px-3 py-2 cursor-pointer hover:bg-blue-100 text-sm" onClick={() => { setSscType(s); setShowSscTypeSuggestions(false); }}>{s}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        
                                        {/* Component Type */}
                                        <div className="relative">
                                            <label className="block font-bold mb-1 text-sm">
                                                Component Type <span className="text-red-500">*</span>
                                            </label>
                                            <input
                                                type="text"
                                                value={componentType}
                                                onChange={(e) => {
                                                    setComponentType(e.target.value);
                                                    setShowComponentTypeSuggestions(true);
                                                }}
                                                onBlur={() => setTimeout(() => setShowComponentTypeSuggestions(false), 200)}
                                                className="w-full px-3 py-2 border rounded text-sm"
                                                placeholder="e.g., Centrifugal Pump, Motor-Operated Valve"
                                                style={{
                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                    color: backgroundStyle.color,
                                                    borderColor: backgroundStyle.borderColor
                                                }}
                                            />
                                            {showComponentTypeSuggestions && componentTypeSuggestions.filter(s => s.toLowerCase().includes(componentType.toLowerCase())).length > 0 && (
                                                <div className="absolute z-10 w-full mt-1 border rounded shadow-lg" style={{
                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                    borderColor: backgroundStyle.borderColor
                                                }}>
                                                    {componentTypeSuggestions.filter(s => s.toLowerCase().includes(componentType.toLowerCase())).map(s => (
                                                        <div key={s} className="px-3 py-2 cursor-pointer hover:bg-blue-100 text-sm" onClick={() => { setComponentType(s); setShowComponentTypeSuggestions(false); }}>{s}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                                
                                {/* Failure Mode */}
                                <div className="relative">
                                    <label className="block font-bold mb-1 text-sm">
                                        Failure Mode <span className="text-red-500">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        value={failureMode}
                                        onChange={(e) => {
                                            setFailureMode(e.target.value);
                                            setShowFailureModeSuggestions(true);
                                            setError('');
                                        }}
                                        onBlur={() => setTimeout(() => setShowFailureModeSuggestions(false), 200)}
                                        className="w-full px-3 py-2 border rounded text-sm"
                                        placeholder="e.g., Fails to Start, Fails to Run, Spurious Actuation"
                                        style={{
                                            backgroundColor: backgroundStyle.backgroundColor,
                                            color: backgroundStyle.color,
                                            borderColor: backgroundStyle.borderColor
                                        }}
                                    />
                                    {showFailureModeSuggestions && failureModeSuggestions.filter(s => s.toLowerCase().includes(failureMode.toLowerCase())).length > 0 && (
                                        <div className="absolute z-10 w-full mt-1 border rounded shadow-lg" style={{
                                            backgroundColor: backgroundStyle.backgroundColor,
                                            borderColor: backgroundStyle.borderColor
                                        }}>
                                            {failureModeSuggestions.filter(s => s.toLowerCase().includes(failureMode.toLowerCase())).map(s => (
                                                <div key={s} className="px-3 py-2 cursor-pointer hover:bg-blue-100 text-sm" onClick={() => { setFailureMode(s); setShowFailureModeSuggestions(false); }}>{s}</div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                
                                {/* Failure Mode Description */}
                                <div>
                                    <label className="block font-bold mb-1 text-sm">Failure Mode Description</label>
                                    <textarea
                                        value={failureDescription}
                                        onChange={(e) => setFailureDescription(e.target.value)}
                                        rows="2"
                                        className="w-full px-3 py-2 border rounded text-sm"
                                        style={{
                                            backgroundColor: backgroundStyle.backgroundColor,
                                            color: backgroundStyle.color,
                                            borderColor: backgroundStyle.borderColor
                                        }}
                                    />
                                </div>
                                
                                {/* Evaluation Type Selection */}
                                <div>
                                    <label className="block font-bold mb-1 text-sm">
                                        Evaluation Type <span className="text-red-500">*</span>
                                    </label>
                                    <select
                                        value={probabilityType}
                                        onChange={(e) => { setProbabilityType(e.target.value); setError(''); }}
                                        className="w-full px-3 py-2 border rounded text-sm"
                                        style={{
                                            backgroundColor: backgroundStyle.backgroundColor,
                                            color: backgroundStyle.color,
                                            borderColor: backgroundStyle.borderColor
                                        }}
                                    >
                                        <option value="probability">Failure Probability</option>
                                        <option value="qualitative">Qualitative (Low/Medium/High)</option>
                                        <option value="screened">Screened Out</option>
                                        <option value="linkedSystem">Link to System Evaluation File</option>
                                    </select>
                                </div>
                                
                                {/* Linked System File Selection */}
                                {probabilityType === 'linkedSystem' && (
                                    <div className="p-3 rounded text-sm" style={{ backgroundColor: backgroundStyle.backgroundColor === '#1f2937' ? '#374151' : '#f0f9ff' }}>
                                        <label className="block font-bold mb-2">
                                            KUREAS-SYS File <span className="text-red-500">*</span>
                                        </label>
                                        <div className="flex gap-2">
                                            <input
                                                type="text"
                                                value={linkedSystemFile}
                                                readOnly
                                                className="flex-1 px-3 py-2 border rounded text-sm"
                                                placeholder="Select a *.KNOW_SYS file..."
                                                style={{
                                                    backgroundColor: backgroundStyle.backgroundColor,
                                                    color: backgroundStyle.color,
                                                    borderColor: backgroundStyle.borderColor
                                                }}
                                            />
                                            <button
                                                type="button"
                                                onClick={() => {
                                                    const input = document.createElement('input');
                                                    input.type = 'file';
                                                    input.accept = '.KNOW_SYS,.KNOW';
                                                    input.onchange = (e) => {
                                                        const file = e.target.files[0];
                                                        if (file) {
                                                            if (!file.name.toUpperCase().endsWith('.KNOW_SYS') && !file.name.toUpperCase().endsWith('.KNOW')) {
                                                                alert('Please select a valid KUREAS-SYS file (filename must end with ".KNOW_SYS").');
                                                                return;
                                                            }
                                                            const reader = new FileReader();
                                                            reader.onload = (event) => {
                                                                try {
                                                                    const data = JSON.parse(event.target.result);
                                                                    setLinkedSystemFile(file.name);
                                                                    setLinkedSystemName(data.systemName || file.name.replace(/\.KNOW_SYS$/i, '').replace(/\.KNOW$/i, ''));
                                                                } catch (err) { alert('Error reading system file: ' + err.message); }
                                                            };
                                                            reader.readAsText(file);
                                                        }
                                                    };
                                                    input.click();
                                                }}
                                                className="px-3 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm"
                                            >
                                                Browse...
                                            </button>
                                        </div>
                                        {linkedSystemName && (
                                            <div className="mt-2 text-xs text-gray-500">System: <strong>{linkedSystemName}</strong></div>
                                        )}
                                        <p className="mt-2 text-xs text-gray-500">
                                            This SSC's failure probability will be evaluated from the linked system's failure logic.
                                        </p>
                                    </div>
                                )}
                                
                                {/* Qualitative Level Selection */}
                                {probabilityType === 'qualitative' && (
                                    <div>
                                        <label className="block font-bold mb-1 text-sm">
                                            Qualitative Level <span className="text-red-500">*</span>
                                        </label>
                                        <select
                                            value={qualitativeLevel}
                                            onChange={(e) => setQualitativeLevel(e.target.value)}
                                            className="w-full px-3 py-2 border rounded text-sm"
                                            style={{
                                                backgroundColor: backgroundStyle.backgroundColor,
                                                color: backgroundStyle.color,
                                                borderColor: backgroundStyle.borderColor
                                            }}
                                        >
                                            <option value="low">Low ({settings?.qualitativeProbLow || '1E-5'})</option>
                                            <option value="medium">Medium ({settings?.qualitativeProbMedium || '1E-3'})</option>
                                            <option value="high">High ({settings?.qualitativeProbHigh || '1E-1'})</option>
                                        </select>
                                    </div>
                                )}

                                {/* Screened Out notice */}
                                {probabilityType === 'screened' && (
                                    <div className="p-3 rounded text-sm bg-gray-100 text-gray-600 border border-gray-300">
                                        This failure mode is screened out and will not contribute to system failure probability.
                                    </div>
                                )}

                                {/* Failure Probability model section */}
                                {probabilityType === 'probability' && (
                                    <div className="rounded border" style={{
                                        backgroundColor: backgroundStyle.backgroundColor === '#1f2937' ? '#1e1b4b' : '#f5f3ff',
                                        borderColor: '#ddd6fe',
                                        padding: '12px'
                                    }}>
                                        {/* Failure Model selector */}
                                        <div className="mb-3">
                                            <label className="block font-bold mb-1 text-sm" style={{ color: '#5b21b6' }}>Failure Model</label>
                                            <select
                                                value={failureModel}
                                                onChange={(e) => setFailureModel(e.target.value)}
                                                className="w-full px-2 py-1.5 border rounded text-sm"
                                                style={{
                                                    backgroundColor: 'white',
                                                    color: '#111827',
                                                    borderColor: '#c4b5fd'
                                                }}
                                            >
                                                <option value="0">Probability of Failure</option>
                                                <option value="1">Demand (Binomial)</option>
                                                <option value="2">Fails While Operating (Poisson)</option>
                                                <option value="3">Fails in Standby</option>
                                                <option value="4">Fails While Operating w/ Repair</option>
                                                <option value="5">Logic T/F Flag</option>
                                            </select>
                                        </div>

                                        {/* FM0: Direct probability */}
                                        {failureModel === '0' && (
                                            <div className="mb-3">
                                                <label className="block text-xs font-semibold mb-1" style={{ color: '#6b7280' }}>
                                                    Mean Probability <span className="text-red-500">*</span>
                                                </label>
                                                <input
                                                    type="text"
                                                    value={mean}
                                                    onChange={(e) => { setMean(e.target.value); setError(''); }}
                                                    className="w-full px-2 py-1.5 border rounded text-sm font-mono"
                                                    placeholder="e.g., 3.0E-04"
                                                    style={{
                                                        backgroundColor: 'white',
                                                        color: '#111827',
                                                        borderColor: '#c4b5fd'
                                                    }}
                                                />
                                            </div>
                                        )}

                                        {/* FM1: Demand (Binomial) */}
                                        {failureModel === '1' && (
                                            <div className="grid grid-cols-2 gap-2 mb-3">
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Probability (/demand)</label>
                                                    <input type="number" min="0" max="1" step="any" value={demandProb}
                                                        onChange={e => setDemandProb(e.target.value)} style={mdInp} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Demands (N)</label>
                                                    <input type="number" min="1" step="1" value={demandN}
                                                        onChange={e => setDemandN(String(Math.max(1, parseInt(e.target.value)||1)))}
                                                        style={{...mdInp, MozAppearance: 'auto', appearance: 'auto'}} />
                                                </div>
                                            </div>
                                        )}

                                        {/* FM2: Fails While Operating (Poisson) */}
                                        {failureModel === '2' && (
                                            <div className="grid grid-cols-2 gap-2 mb-3">
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Failure Rate &lambda; (/hr)</label>
                                                    <input type="number" min="0" step="any" value={lambda}
                                                        onChange={e => setLambda(e.target.value)} style={mdInp} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Mission Time (hr)</label>
                                                    <input type="number" min="0" step="any" value={missionTime}
                                                        onChange={e => setMissionTime(e.target.value)} style={mdInp} />
                                                </div>
                                            </div>
                                        )}

                                        {/* FM3: Fails in Standby */}
                                        {failureModel === '3' && (
                                            <div className="grid grid-cols-2 gap-2 mb-3">
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Failure Rate &lambda; (/hr)</label>
                                                    <input type="number" min="0" step="any" value={lambda}
                                                        onChange={e => setLambda(e.target.value)} style={mdInp} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Inspection Interval (hr)</label>
                                                    <input type="number" min="0" step="any" value={inspInterval}
                                                        onChange={e => setInspInterval(e.target.value)} style={mdInp} />
                                                </div>
                                            </div>
                                        )}

                                        {/* FM4: Fails While Operating w/ Repair */}
                                        {failureModel === '4' && (
                                            <div className="grid grid-cols-3 gap-2 mb-3">
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Failure Rate &lambda; (/hr)</label>
                                                    <input type="number" min="0" step="any" value={lambda}
                                                        onChange={e => setLambda(e.target.value)} style={mdInp} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Mission Time (hr)</label>
                                                    <input type="number" min="0" step="any" value={missionTime}
                                                        onChange={e => setMissionTime(e.target.value)} style={mdInp} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Repair Time &mu; (hr)</label>
                                                    <input type="number" min="0" step="any" value={tauRepair}
                                                        onChange={e => setTauRepair(e.target.value)} style={mdInp} />
                                                </div>
                                            </div>
                                        )}

                                        {/* FM5: Logic T/F Flag */}
                                        {failureModel === '5' && (
                                            <div className="mb-3">
                                                <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>Flag Value</label>
                                                <div className="flex gap-2">
                                                    {[['T','True'],['F','False'],['I','Ignore']].map(([val, lbl]) => (
                                                        <button key={val} type="button"
                                                            onClick={() => setLogicFlag(val)}
                                                            style={{
                                                                flex: 1, padding: '4px 0', fontSize: '12px', fontWeight: '700',
                                                                borderRadius: '4px', border: '1px solid',
                                                                borderColor: logicFlag === val ? '#7c3aed' : '#c4b5fd',
                                                                background: logicFlag === val ? '#7c3aed' : 'white',
                                                                color: logicFlag === val ? 'white' : '#6b7280',
                                                                cursor: 'pointer'
                                                            }}
                                                        >{lbl}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* Computed probability display for FM1–FM4 */}
                                        {['1','2','3','4'].includes(failureModel) && (
                                            <div className="mb-3">
                                                <label className="block text-xs font-semibold mb-1" style={{ color: '#6b7280' }}>Computed Probability</label>
                                                <div style={{
                                                    border: '1px solid #e9d5ff', borderRadius: '6px',
                                                    padding: '5px 10px', fontSize: '13px', fontFamily: 'monospace',
                                                    background: '#f5f3ff', color: '#7c3aed', fontWeight: '700', minHeight: '28px'
                                                }}>
                                                    {computedProbStr || <span style={{ color: '#9ca3af', fontStyle: 'italic', fontWeight: 'normal' }}>set parameters above</span>}
                                                </div>
                                            </div>
                                        )}

                                        {/* Logic flag display */}
                                        {failureModel === '5' && (
                                            <div className="mb-3">
                                                <label className="block text-xs font-semibold mb-1" style={{ color: '#6b7280' }}>Flag State</label>
                                                <div style={{
                                                    border: '1px solid #d1d5db', borderRadius: '6px',
                                                    padding: '5px 10px', fontSize: '13px', fontFamily: 'monospace',
                                                    background: '#f3f4f6', color: '#374151', fontWeight: '700'
                                                }}>
                                                    {({T:'TRUE',F:'FALSE',I:'IGNORE'})[logicFlag] || 'TRUE'}
                                                </div>
                                            </div>
                                        )}

                                        {/* Distribution — separator */}
                                        {failureModel !== '5' && (
                                            <div className="border-t pt-3 mt-1" style={{ borderColor: '#ddd6fe' }}>
                                                <label className="block font-bold mb-1 text-sm" style={{ color: '#5b21b6' }}>Distribution</label>
                                                <select
                                                    value={distributionType}
                                                    onChange={(e) => setDistributionType(e.target.value)}
                                                    className="w-full px-2 py-1.5 border rounded text-sm"
                                                    style={{ backgroundColor: 'white', color: '#111827', borderColor: '#c4b5fd' }}
                                                >
                                                    {distributionTypes.map(dt => (
                                                        <option key={dt.value} value={dt.value}>{dt.label}</option>
                                                    ))}
                                                </select>
                                                {/* Distribution shape/scale params */}
                                                {distributionType && distributionType !== 'Point' && distributionType !== 'CNI' && (
                                                    <div className="grid grid-cols-2 gap-2 mt-2">
                                                        <div>
                                                            <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>{getDistributionInfo(distributionType).param1Label}</label>
                                                            <input type="text" value={shapeParam} onChange={e => setShapeParam(e.target.value)} style={mdInp} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs mb-1" style={{ color: '#6b7280' }}>{getDistributionInfo(distributionType).param2Label}</label>
                                                            <input type="text" value={scaleParam} onChange={e => setScaleParam(e.target.value)} style={mdInp} />
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Units - only for non-screened, non-flag */}
                                {probabilityType !== 'screened' && probabilityType !== 'linkedSystem' && !(probabilityType === 'probability' && failureModel === '5') && (
                                    <div>
                                        <label className="block font-bold mb-1 text-sm">Units</label>
                                        <select
                                            value={units}
                                            onChange={(e) => setUnits(e.target.value)}
                                            className="w-full px-3 py-2 border rounded text-sm"
                                            disabled={probabilityType === 'qualitative' || (probabilityType === 'probability' && failureModel !== '0')}
                                            style={{
                                                backgroundColor: (probabilityType === 'qualitative' || (probabilityType === 'probability' && failureModel !== '0')) ? '#e5e7eb' : backgroundStyle.backgroundColor,
                                                color: backgroundStyle.color,
                                                borderColor: backgroundStyle.borderColor
                                            }}
                                        >
                                            <option value="d">Dimensionless (probability)</option>
                                            <option value="h">Per Hour (/hr)</option>
                                            <option value="y">Per Year (/yr)</option>
                                        </select>
                                    </div>
                                )}

                                {/* Save options */}
                                <div className="pt-3 border-t" style={{ borderColor: backgroundStyle.borderColor }}>
                                    <label className="block font-bold mb-2 text-sm">
                                        Save this information?
                                    </label>
                                    <div className="space-y-2">
                                        <label className="flex items-center gap-2 text-sm">
                                            <input type="radio" name="saveOption" value="1"
                                                checked={saveOption === '1'} onChange={(e) => setSaveOption(e.target.value)} />
                                            <span>Save in this project.</span>
                                        </label>
                                        <label className="flex items-center gap-2 text-sm">
                                            <input type="radio" name="saveOption" value="2"
                                                checked={saveOption === '2'} onChange={(e) => setSaveOption(e.target.value)} />
                                            <span>Save to an existing reliability database file</span>
                                        </label>
                                        <label className="flex items-center gap-2 text-sm">
                                            <input type="radio" name="saveOption" value="3"
                                                checked={saveOption === '3'} onChange={(e) => setSaveOption(e.target.value)} />
                                            <span>Create and save in a new reliability database file</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-3 justify-end mt-6">
                                <button
                                    onClick={onCancel}
                                    className="px-4 py-2 border rounded hover:bg-gray-100 text-sm"
                                    style={{ borderColor: backgroundStyle.borderColor }}
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={handleSave}
                                    className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm"
                                >
                                    Save
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Rich Text Editor Component
        function RichTextEditor({ value, onChange, onClose, backgroundStyle }) {
            const editorRef = useRef(null);
            const [content, setContent] = useState(value || getDefaultExtendedDescription());

            useEffect(() => {
                if (editorRef.current) {
                    editorRef.current.innerHTML = content;
                }
            }, []);

            function getDefaultExtendedDescription() {
                return `<h1>System Description</h1>
<p>Provide an overview of the system's purpose and role.</p>

<h1>System Functions</h1>
<p>List the primary functions performed by this system.</p>

<h1>Design Characteristics</h1>
<p>Describe key design features, configuration, and components.</p>

<h1>Assumptions</h1>
<p>Document any assumptions made in the system analysis.</p>

<h1>References</h1>
<p>List relevant documentation, drawings, or sources.</p>`;
            }

            const execCommand = (command, value = null) => {
                // Ensure editor has focus
                if (editorRef.current) {
                    editorRef.current.focus();
                }
                
                if (command === 'formatBlock') {
                    document.execCommand('formatBlock', false, value);
                } else {
                    document.execCommand(command, false, value);
                }
                
                if (editorRef.current) {
                    setContent(editorRef.current.innerHTML);
                }
            };

            const handleSave = () => {
                const html = editorRef.current?.innerHTML || '';
                onChange(html);
                onClose();
            };

            const handleInput = () => {
                if (editorRef.current) {
                    setContent(editorRef.current.innerHTML);
                }
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{ 
                        maxWidth: '1000px',
                        maxHeight: '85vh',
                        backgroundColor: backgroundStyle.paneBackground,
                        color: backgroundStyle.color
                    }}>
                        <div className="p-4">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bold">Edit Extended Description</h2>
                                <div className="flex gap-2">
                                    <button
                                        onClick={onClose}
                                        className="px-4 py-2 text-sm bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={handleSave}
                                        className="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700"
                                    >
                                        Save
                                    </button>
                                </div>
                            </div>
