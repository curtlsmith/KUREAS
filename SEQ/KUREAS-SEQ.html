                                        dangerouslySetInnerHTML={{ __html: extDesc }} />
                                </div>
                            )}
                            {!description && !extDesc && (
                                <p className="text-sm text-gray-400 italic">No description provided for this operating state.</p>
                            )}
                        </div>
                        <div className="p-4 border-t flex justify-end">
                            <button onClick={onClose} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm">Close</button>
                        </div>
                    </div>
                </div>
            );
        }

        // Find the first leaf-node IE that has a non-trivial HTFW script
        const findFirstIeWithScript = (hazardList, scripts) => {
            const visit = (nodes) => {
                for (const n of (nodes || [])) {
                    if (n.children && n.children.length > 0) {
                        const found = visit(n.children);
                        if (found) return found;
                    } else {
                        const s = (scripts || {})[n.id];
                        if (s && s.script) {
                            const body = s.script
                                .replace(/^FACILITY WORKS[^\n]*\n?/i, '')
                                .replace(/#[^\n]*/g, '')
                                .trim();
                            if (body.length > 0) return n.id;
                        }
                    }
                }
                return null;
            };
            return visit(hazardList);
        };

        // ─────────────────────────────────────────────────────────────────────────
        // -------------------------------------------------------------------------
        // renderSankeyPNG -- render a risk Sankey diagram to a PNG data URL for reports.
        const renderSankeyPNG = (rows, units, totalRisk, consName, reportSettings) => {
            if (!rows || rows.length === 0 || totalRisk <= 0) return null;
            const rsd = Math.max(1, Math.min(10, parseInt(reportSettings?.showDigits, 10) || 3));
            const sfmt = v => (v === null || v === undefined || isNaN(v)) ? 'N/A' : v.toExponential(rsd);

            const LABEL_FONT   = 'bold 13px Arial';
            const VALUE_FONT   = '12px Arial';
            const R_LABEL_FONT = 'bold 14px Arial';
            const R_VALUE_FONT = '13px Arial';
            const canvasH = Math.max(100, Math.min(320, rows.length * 56 + 28));
            const canvasW = 700;
            const dpr = 2;

            const offscreen = document.createElement('canvas');
            offscreen.width  = canvasW * dpr;
            offscreen.height = canvasH * dpr;
            const ctx = offscreen.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, canvasW, canvasH);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasW, canvasH);

            const COLORS = ['#6ea8d8','#f4a261','#6bcb77','#e07b9a','#b48ac9','#f4d35e','#84c5c5','#ff8c94'];
            const nodeW = 14;
            ctx.font = LABEL_FONT;
            const maxLblWR = Math.max(...rows.map(r => ctx.measureText(`Seq ${r.seqNum}`).width));
            ctx.font = VALUE_FONT;
            const maxValWR = Math.max(...rows.map(r => ctx.measureText(`${sfmt(r.risk)} ${units}/yr`).width));
            const leftPadR = Math.max(maxLblWR, maxValWR) + 14;
            const PAD = { top: 14, bot: 14, left: leftPadR, right: 8 };

            ctx.font = R_LABEL_FONT;
            const rightLabelW = Math.max(ctx.measureText('Total').width, ctx.measureText(`${sfmt(totalRisk)} ${units}/yr`).width) + 12;

            const leftX  = PAD.left;
            const rightX = canvasW - PAD.right - nodeW - rightLabelW;
            const innerH = canvasH - PAD.top - PAD.bot;
            const GAP = rows.length > 1 ? 14 : 0;
            const usableH = innerH - GAP * (rows.length - 1);

            let cursor = PAD.top;
            const rowGeom = rows.map((row, i) => {
                const h = Math.max(6, (row.risk / totalRisk) * usableH);
                const y = cursor;
                cursor += h + GAP;
                return { y, h, color: COLORS[i % COLORS.length] };
            });

            rows.forEach((row, i) => {
                const g = rowGeom[i];
                const rightSliceY = PAD.top + rows.slice(0, i).reduce((s, r2) => s + (r2.risk / totalRisk) * innerH, 0);
                const rightSliceH = (row.risk / totalRisk) * innerH;
                const x1 = leftX + nodeW, x2 = rightX;
                const cp = (x1 + x2) / 2;
                ctx.beginPath();
                ctx.moveTo(x1, g.y); ctx.bezierCurveTo(cp, g.y, cp, rightSliceY, x2, rightSliceY);
                ctx.lineTo(x2, rightSliceY + rightSliceH);
                ctx.bezierCurveTo(cp, rightSliceY + rightSliceH, cp, g.y + g.h, x1, g.y + g.h);
                ctx.closePath();
                const grad = ctx.createLinearGradient(x1, 0, x2, 0);
                grad.addColorStop(0, g.color + 'cc'); grad.addColorStop(1, g.color + '55');
                ctx.fillStyle = grad; ctx.fill();
            });
            rows.forEach((row, i) => {
                const g = rowGeom[i];
                ctx.fillStyle = g.color;
                ctx.fillRect(leftX, g.y, nodeW, g.h);
                const midY = g.y + g.h / 2;
                ctx.textAlign = 'right';
                ctx.fillStyle = '#1f2937'; ctx.font = LABEL_FONT;
                ctx.fillText(`Seq ${row.seqNum}`, leftX - 6, midY - 1);
                ctx.font = VALUE_FONT; ctx.fillStyle = '#374151';
                ctx.fillText(`${sfmt(row.risk)} ${units}/yr`, leftX - 6, midY + 14);
            });
            ctx.fillStyle = '#374151';
            ctx.fillRect(rightX, PAD.top, nodeW, innerH);
            const rLabelX = rightX + nodeW + 8, rMidY = PAD.top + innerH / 2;
            ctx.fillStyle = '#1f2937'; ctx.font = R_LABEL_FONT; ctx.textAlign = 'left';
            ctx.fillText('Total', rLabelX, rMidY - 2);
            ctx.font = R_VALUE_FONT; ctx.fillStyle = '#374151';
            ctx.fillText(`${sfmt(totalRisk)} ${units}/yr`, rLabelX, rMidY + 16);

            return offscreen.toDataURL('image/png');
        };

        // renderEventTreePNG -- standalone event tree renderer for reports.
        // Takes a pol-like object (output of htfwScriptToPol), builds sequences/
        // topEvents, draws to an offscreen canvas, returns a PNG data URL.
        // Mirror of HowFacilityFailsModal.drawEventTree but self-contained.
        // -------------------------------------------------------------------------
        const renderEventTreePNG = (polLike, endStateOutcomes, ieFreqVal, reportSettings, reportLoadedSystems) => {
            if (!polLike?.nodes || !polLike?.connections) return null;

            // Formatter using showDigits setting
            const rsd = Math.max(1, Math.min(10, parseInt(reportSettings?.showDigits, 10) || 3));
            const rfmt = (v) => {
                if (v === null || v === undefined || isNaN(v)) return null;
                return v.toExponential(rsd);
            };

            // -- Build sequence tree --
            const ieNode = polLike.nodes.find(n => n.type === NODE_TYPES.INITIATING_EVENT);
            if (!ieNode) return null;

            const adjOut = {};
            polLike.nodes.forEach(n => { adjOut[n.id] = []; });
            polLike.connections.forEach(c => { if (adjOut[c.from]) adjOut[c.from].push({ to: c.to, label: c.label || '' }); });

            const buildTree = (nodeId, visited) => {
                if (visited.has(nodeId)) return null;
                const node = polLike.nodes.find(n => n.id === nodeId);
                if (!node) return null;
                const vis2 = new Set(visited); vis2.add(nodeId);
                const children = (adjOut[nodeId] || []).map(edge => {
                    const child = buildTree(edge.to, vis2);
                    return child ? { ...child, connectionLabel: edge.label } : null;
                }).filter(Boolean);
                return { ...node, children };
            };
            const seqTree = buildTree(ieNode.id, new Set());
            if (!seqTree) return null;

            // -- Extract sequences and top events --
            const sequences = [];
            const topEventsOrdered = [];
            const topEventsSet = new Set();
            const topEventsByLabel2 = {}; // label -> canonical entry
            const nodeIdToCanonicalTeId2 = {}; // path-unique id -> canonical id

            const traverse = (node, path, depth) => {
                const cur = [...path, { node, branchLabel: node.connectionLabel || '', depth }];
                if (node.type === NODE_TYPES.FUNCTION && node.children && node.children.length > 0) {
                    const lbl = node.label || '';
                    if (topEventsByLabel2[lbl]) {
                        nodeIdToCanonicalTeId2[node.id] = topEventsByLabel2[lbl].id;
                    } else {
                        if (!topEventsSet.has(node.id)) {
                            topEventsSet.add(node.id);
                            const entry = { id: node.id, label: lbl, description: node.description || '', depth };
                            topEventsOrdered.push(entry);
                            topEventsByLabel2[lbl] = entry;
                            nodeIdToCanonicalTeId2[node.id] = node.id;
                        }
                    }
                }
                if (node.type === NODE_TYPES.END_STATE) {
                    sequences.push({ path: cur, endState: node.label || '', nodeId: node.id });
                } else if (node.children && node.children.length > 0) {
                    node.children.forEach(c => traverse(c, cur, depth + 1));
                }
            };
            traverse(seqTree, [], 0);
            if (sequences.length === 0 || topEventsOrdered.length === 0) return null;

            // -- Sort top events and compute decisions --
            sequences.forEach(seq => {
                seq.topEventOrder = [];
                let pos = 0;
                seq.path.forEach((pe, i) => {
                    const canonId2 = nodeIdToCanonicalTeId2[pe.node.id];
                    if (canonId2 !== undefined) {
                        const branch = i + 1 < seq.path.length ? (seq.path[i + 1].branchLabel || 'PASS') : 'PASS';
                        if (!seq.topEventOrder.find(t => t.teId === canonId2)) {
                            seq.topEventOrder.push({ teId: canonId2, position: pos, branch });
                            pos++;
                        }
                    }
                });
            });

            const teMaxPos = new Map();
            topEventsOrdered.forEach(te => {
                let max = -1;
                sequences.forEach(seq => { const f = seq.topEventOrder.find(t => t.teId === te.id); if (f && f.position > max) max = f.position; });
                teMaxPos.set(te.id, max >= 0 ? max : 999);
            });
            const sortedTopEvents = [...topEventsOrdered].sort((a, b) => {
                const d = teMaxPos.get(a.id) - teMaxPos.get(b.id);
                return d !== 0 ? d : a.depth - b.depth;
            });

            sequences.forEach(seq => {
                seq.decisions = sortedTopEvents.map(te => {
                    const found = seq.topEventOrder.find(t => t.teId === te.id);
                    return { branch: found ? found.branch : 'PASS' };
                });
                const esOut = (endStateOutcomes || {})[seq.nodeId];
                const lbl = (seq.endState || '').toLowerCase();
                seq.outcome = esOut || (lbl.includes('ok') || lbl.includes('success') || lbl.includes('safe') ? 'positive'
                    : lbl.includes('fail') || lbl.includes('damage') || lbl.includes('loss') ? 'negative' : 'unanalyzed');
            });

            // Sort: positive (success) sequences up, negative (fail) down
            const sortedSeqIndices = sequences.map((_, i) => i).sort((a, b) => {
                const rank = { positive: 0, unanalyzed: 1, negative: 2 };
                return (rank[sequences[a].outcome] ?? 1) - (rank[sequences[b].outcome] ?? 1);
            });

            // -- Compute sequence frequencies using loaded systems --
            const sysByFile = {}, sysByName = {}, sysByBaseName = {};
            const _normSysKey = (s) => (s||'').toLowerCase().replace(/^sys_/,'').replace(/\.know_ftl$/i,'').replace(/[-_\s]/g,'');
            Object.values(reportLoadedSystems || {}).forEach(sys => {
                if (!sys) return;
                if (sys.fileName) { sysByFile[sys.fileName] = sys; sysByBaseName[_normSysKey(sys.fileName)] = sys; }
                if (sys.systemName) { sysByName[sys.systemName] = sys; sysByBaseName[_normSysKey(sys.systemName)] = sys; }
            });
            const resolveSystem = (te) => {
                if (te?.knowFtlFileName && sysByFile[te.knowFtlFileName]) return sysByFile[te.knowFtlFileName];
                if (te?.moduleRawName  && sysByName[te.moduleRawName])  return sysByName[te.moduleRawName];
                if (sysByName[te?.label]) return sysByName[te.label];
                return sysByBaseName[_normSysKey(te?.label||'')] || sysByBaseName[_normSysKey(te?.moduleRawName||'')] || null;
            };
            const quantMethod = (reportSettings?.quantificationMethod || 'mcub').toLowerCase();

            const seqFreqs = sequences.map((seq, si) => {
                let seqProb = 1, known = true;
                for (let pi = 0; pi < seq.path.length - 1; pi++) {
                    const curNode = seq.path[pi].node;
                    if (curNode.type !== NODE_TYPES.FUNCTION) continue;
                    const nextBranch = seq.path[pi + 1]?.branchLabel || '';
                    const occurred = nextBranch.toUpperCase().startsWith('W'); // WORKS = system succeeded
                    const sys = resolveSystem(curNode);
                    let sysFailP = null;
                    if (sys && (sys.cutSets || []).length > 0) {
                        sysFailP = quantifyCutSets(sys.cutSets, sys.eventInfo || {}, quantMethod, null);
                    }
                    const bp = occurred ? (sysFailP === null ? 1 : 1 - sysFailP) : sysFailP;
                    if (bp === null || bp === undefined) { known = false; break; }
                    seqProb *= bp;
                }
                const sequenceProb = known ? seqProb : null;
                const sequenceFreq = (sequenceProb !== null && ieFreqVal !== null && ieFreqVal !== undefined && !isNaN(ieFreqVal))
                    ? ieFreqVal * sequenceProb : null;
                return { sequenceProb, sequenceFreq };
            });

            // -- Offscreen canvas setup --
            const offscreen = document.createElement('canvas');
            const ctx = offscreen.getContext('2d');

            const numSeq = sequences.length;
            const numTE  = sortedTopEvents.length;

            // Row height must accommodate two-line end state boxes
            const rowH = 44, boxH = 48, leftM = 20, topM = 20, teGap = 10, pad = 10;

            const measure = (labels, font) => {
                ctx.font = font;
                return labels.reduce((m, l) => Math.max(m, ctx.measureText(l || '').width), 0);
            };
            const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

            // TE box height grows if any TE has a description
            const teHasDesc = sortedTopEvents.some(te => te.description);
            // Lines: up to 2 label + up to 4 desc = up to 6 * 10px + 12 baseline = 72px max; clamp to 80
            const teBoxH = teHasDesc ? 80 : boxH;

            const ieW  = clamp(Math.ceil(measure([seqTree.label || 'IE'], 'bold 9px Arial') + pad * 2), 150, 240);
            const teW  = clamp(Math.ceil(measure(sortedTopEvents.map(t => t.label), 'bold 8px Arial') + pad * 2), 130, 240);
            // End state box width must accommodate two-line content
            const esLabelW = measure(sequences.map(s => s.endState), '8px Arial');
            const esFreqStrs = seqFreqs.map(sf => sf.sequenceFreq !== null ? ('f = ' + rfmt(sf.sequenceFreq) + '/yr') : (sf.sequenceProb !== null ? ('P = ' + rfmt(sf.sequenceProb)) : null)).filter(Boolean);
            const esFreqW = esFreqStrs.length > 0 ? measure(esFreqStrs, '8.5px Arial') : 0;
            const endW = clamp(Math.ceil(Math.max(esLabelW, esFreqW) + pad * 2), 120, 280);

            const headerBoxH = Math.max(boxH, teBoxH);
            const natW = leftM + ieW + 20 + numTE * (teW + teGap) + 20 + endW + 80;
            const natH = topM + headerBoxH + 25 + numSeq * rowH + 30;

            offscreen.width  = natW;
            offscreen.height = natH;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, natW, natH);

            const ieX = leftM, ieY = topM, ieCX = ieX + ieW / 2;
            const teStartX = ieX + ieW + 25;
            const teCXs = sortedTopEvents.map((_, i) => teStartX + i * (teW + teGap) + teW / 2);
            const endHX = teStartX + numTE * (teW + teGap);
            const endCX = endHX + endW / 2;
            const seqStartY = ieY + headerBoxH + 25;

            const sortedEndY = {};
            sortedSeqIndices.forEach((orig, si) => { sortedEndY[orig] = seqStartY + si * rowH; });

            const wrap = (text, maxW, fs) => {
                ctx.font = fs + 'px Arial';
                const words = (text || '').split(' ');
                const lines = []; let cur = '';
                words.forEach(w => {
                    const test = cur ? cur + ' ' + w : w;
                    if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
                    else cur = test;
                });
                if (cur) lines.push(cur);
                return lines;
            };

            const getBranchKey = (si, ti) => {
                let k = '';
                for (let i = 0; i < ti; i++) {
                    const b = sequences[si].decisions[i]?.branch || 'PASS';
                    if (b !== 'PASS') k += b[0];
                }
                return k;
            };

            const branchMids = sortedTopEvents.map(() => ({}));
            const calcMid = (si, ti) => {
                const key = getBranchKey(si, ti);
                if (branchMids[ti][key] !== undefined) return branchMids[ti][key];
                const ys = sequences.map((_, i) => getBranchKey(i, ti) === key ? sortedEndY[i] : null).filter(y => y !== null);
                const mid = (Math.min(...ys) + Math.max(...ys)) / 2;
                branchMids[ti][key] = mid;
                return mid;
            };

            // Build line segments (backwards from end state)
            const allSegs = sequences.map((seq, si) => {
                const segs = []; let curY = sortedEndY[si], curX = endCX;
                for (let ti = numTE - 1; ti >= 0; ti--) {
                    const teX = teCXs[ti];
                    const branch = seq.decisions[ti]?.branch || 'PASS';
                    segs.push({ x1: curX, y1: curY, x2: teX, y2: curY, type: 'h' });
                    curX = teX;
                    if (branch !== 'PASS') {
                        const mid = calcMid(si, ti);
                        segs.push({ x1: teX, y1: curY, x2: teX, y2: mid, type: 'v', branch });
                        curY = mid;
                    }
                }
                segs.push({ x1: curX, y1: curY, x2: ieCX, y2: curY, type: 'h' });
                return segs;
            });

            // -- Draw IE box --
            ctx.fillStyle = '#fef3c7'; ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(ieX, ieY, ieW, boxH, 4); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#1f2937'; ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
            wrap(seqTree.label || 'IE', ieW - pad, 9).slice(0, 2).forEach((ln, i) => ctx.fillText(ln, ieCX, ieY + 14 + i * 10));

            // -- Draw TE boxes (with description) --
            sortedTopEvents.forEach((te, ti) => {
                const bx = teStartX + ti * (teW + teGap), cx = teCXs[ti];
                ctx.fillStyle = '#dbeafe'; ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.roundRect(bx, ieY, teW, teBoxH, 4); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#1f2937'; ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
                const labelLines = wrap(te.label, teW - pad, 8).slice(0, 2);
                labelLines.forEach((ln, i) => ctx.fillText(ln, cx, ieY + 12 + i * 10));
                const labelBottomY = ieY + 12 + labelLines.length * 10;
                if (te.description) {
                    ctx.font = '7.5px Arial'; ctx.fillStyle = '#374151';
                    wrap(te.description, teW - 6, 7.5).slice(0, 4).forEach((ln, i) => ctx.fillText(ln, cx, labelBottomY + 4 + i * 10));
                }
            });

            // -- Draw End States header --
            ctx.fillStyle = '#d1fae5'; ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(endHX, ieY, endW, boxH, 4); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#1f2937'; ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('End States', endCX, ieY + boxH / 2);

            // -- Draw lines --
            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2;
            allSegs.forEach(segs => {
                segs.forEach(seg => {
                    ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
                    if (seg.type === 'v' && seg.branch && seg.branch.toUpperCase() !== 'PASS') {
                        const norm = seg.branch.toUpperCase();
                        const above = seg.y2 < seg.y1;
                        ctx.fillStyle = norm === 'WORKS' ? '#16a34a' : '#dc2626';
                        ctx.font = 'bold 8px Arial'; ctx.textAlign = 'left';
                        ctx.textBaseline = above ? 'bottom' : 'top';
                        ctx.fillText(norm === 'WORKS' ? 'WORKS' : 'FAILS', seg.x1 + 3, above ? seg.y1 - 3 : seg.y1 + 4);
                        ctx.textBaseline = 'alphabetic';
                    }
                });
            });

            // -- Draw IE frequency above trunk line --
            if (ieFreqVal !== null && ieFreqVal !== undefined && !isNaN(ieFreqVal)) {
                let trunkY = null;
                allSegs.forEach(segs => segs.forEach(seg => {
                    if (seg.type === 'h' && Math.abs(seg.x2 - ieCX) < 1 && (trunkY === null || seg.y1 < trunkY)) trunkY = seg.y1;
                }));
                if (trunkY !== null) {
                    const freqStr = 'f = ' + rfmt(ieFreqVal) + '/yr';
                    ctx.font = 'bold 11px Arial'; ctx.fillStyle = '#1f2937'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
                    ctx.fillText(freqStr, ieCX, trunkY - 4);
                }
            }

            // -- Draw end state boxes with two-line freq/prob --
            const esColors = { positive: { fill: '#bbf7d0', stroke: '#15803d' }, negative: { fill: '#fecaca', stroke: '#dc2626' }, unanalyzed: { fill: '#e5e7eb', stroke: '#6b7280' } };
            sortedSeqIndices.forEach((orig, si) => {
                const seq = sequences[orig];
                const sf = seqFreqs[orig];
                const seqY = seqStartY + si * rowH;
                const ec = esColors[seq.outcome] || esColors.unanalyzed;

                const hasFreq = sf.sequenceFreq !== null && sf.sequenceFreq !== undefined && !isNaN(sf.sequenceFreq);
                const hasProb = !hasFreq && sf.sequenceProb !== null && sf.sequenceProb !== undefined && !isNaN(sf.sequenceProb);
                const showLine2 = hasFreq || hasProb;
                const esBoxH = showLine2 ? 34 : 24;

                ctx.fillStyle = ec.fill; ctx.strokeStyle = ec.stroke; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.roundRect(endHX, seqY - esBoxH / 2, endW, esBoxH, 3); ctx.fill(); ctx.stroke();

                const valStr = hasFreq
                    ? `f = ${rfmt(sf.sequenceFreq)}/yr`
                    : `P = ${rfmt(sf.sequenceProb)}`;

                ctx.fillStyle = '#1f2937'; ctx.textAlign = 'center';
                if (showLine2) {
                    ctx.font = '8px Arial'; ctx.textBaseline = 'alphabetic';
                    ctx.fillText(seq.endState || '', endCX, seqY - 2);
                    ctx.font = '10px Arial'; ctx.fillStyle = '#374151';
                    ctx.fillText(valStr, endCX, seqY + 10);
                } else {
                    ctx.font = '8px Arial'; ctx.textBaseline = 'middle';
                    ctx.fillText(seq.endState || '', endCX, seqY);
                }

                ctx.fillStyle = '#1f2937'; ctx.font = 'bold 9px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.fillText('Seq ' + (si + 1), endHX + endW + 5, seqY);
            });

            return offscreen.toDataURL('image/png');
        };

        // SeqReportModal -- Generate Report dialog for KUREAS-SEQ
        // Mirrors the SYS ReportModal pattern: two-column layout, section reorder,
        // Preview / Word output, filename, cut-set limit, date/time toggle.
        function SeqReportModal({
            onClose,
            projectName, projectDescription,
            haData, pols, ieScripts, projectModules,
            operatingStates, loadedSystems, selectedFosId,
            settings,
            getIeScript
        }) {
            useEscapeKey(onClose);
            const backgroundStyle = {
                backgroundColor: settings.background === 'dark' ? '#1f2937' : settings.background === 'gray' ? '#f3f4f6' : '#ffffff',
                color: settings.background === 'dark' ? '#f3f4f6' : '#111827',
                borderColor: settings.background === 'dark' ? '#374151' : '#e5e7eb',
                paneBackground: settings.background === 'dark' ? '#111827' : settings.background === 'gray' ? '#e5e7eb' : '#f9fafb'
            };

            const [fileFormat, setFileFormat] = React.useState(() =>
                localStorage.getItem('KUREAS_SEQ_reportFormat') || 'word');
            const [previewHTML, setPreviewHTML] = React.useState('');
            const [showHTMLPreview, setShowHTMLPreview] = React.useState(false);
            const [isGenerating, setIsGenerating] = React.useState(false);
            const [genStatus, setGenStatus] = React.useState('');

            const [fileName, setFileName] = React.useState(() => {
                const saved = localStorage.getItem('KUREAS_SEQ_reportFileName');
                if (saved) return saved;
                return (projectName || haData?.facilityName || 'SEQ_Report').replace(/\s+/g, '_');
            });
            const [limitCutSets, setLimitCutSets] = React.useState(() =>
                parseInt(localStorage.getItem('KUREAS_SEQ_reportCutSetsLimit')) || 50);
            const [showDateTime, setShowDateTime] = React.useState(() => {
                const v = localStorage.getItem('KUREAS_SEQ_reportShowDateTime');
                return v === null ? true : v === 'true';
            });
            const [onlyWithPOL, setOnlyWithPOL] = React.useState(() => {
                const v = localStorage.getItem('KUREAS_SEQ_reportOnlyWithPOL');
                return v === 'true';
            });

            const defaultContentItems = [
                { id: 'projectName',          label: 'Project Name',           enabled: true },
                { id: 'projectDescription',   label: 'Project Description',    enabled: true },
                { id: 'initiatingEventTable', label: 'Initiating Event Table', enabled: true },
                { id: 'modulesTable',         label: 'Modules Table',          enabled: true },
                { id: 'facilityScenarios',    label: 'Facility Scenarios',     enabled: true },
                { id: 'endStateSummary',      label: 'End State Summary Table',enabled: true },
            ];

            const [contentItems, setContentItems] = React.useState(() => {
                const saved = localStorage.getItem('KUREAS_SEQ_reportContentItems');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        const validIds = new Set(defaultContentItems.map(i => i.id));
                        const filtered = parsed.filter(i => validIds.has(i.id));
                        const savedIds = new Set(filtered.map(i => i.id));
                        const newItems = defaultContentItems.filter(i => !savedIds.has(i.id));
                        return [...filtered, ...newItems];
                    } catch (e) { return defaultContentItems; }
                }
                return defaultContentItems;
            });

            // Persist settings
            React.useEffect(() => { localStorage.setItem('KUREAS_SEQ_reportFormat', fileFormat); }, [fileFormat]);
            React.useEffect(() => { localStorage.setItem('KUREAS_SEQ_reportFileName', fileName); }, [fileName]);
            React.useEffect(() => { localStorage.setItem('KUREAS_SEQ_reportCutSetsLimit', limitCutSets.toString()); }, [limitCutSets]);
            React.useEffect(() => { localStorage.setItem('KUREAS_SEQ_reportShowDateTime', showDateTime.toString()); }, [showDateTime]);
            React.useEffect(() => { localStorage.setItem('KUREAS_SEQ_reportOnlyWithPOL', onlyWithPOL.toString()); }, [onlyWithPOL]);
            React.useEffect(() => { localStorage.setItem('KUREAS_SEQ_reportContentItems', JSON.stringify(contentItems)); }, [contentItems]);

            const moveItem = (index, direction) => {
                if (direction === 'up' && index > 0) {
                    const n = [...contentItems]; [n[index-1], n[index]] = [n[index], n[index-1]]; setContentItems(n);
                } else if (direction === 'down' && index < contentItems.length - 1) {
                    const n = [...contentItems]; [n[index], n[index+1]] = [n[index+1], n[index]]; setContentItems(n);
                }
            };
            const toggleItem = (index) => {
                const n = [...contentItems]; n[index] = { ...n[index], enabled: !n[index].enabled }; setContentItems(n);
            };

            // ----------------------------------------------------------------
            // Helpers
            // ----------------------------------------------------------------

            const sd = Math.max(1, Math.min(10, parseInt(settings?.showDigits, 10) || 3));
            const fmtNum = (val) => {
                if (val === null || val === undefined || isNaN(val)) return 'N/A';
                if (val === 0) return '0';
                return val.toExponential(sd);
            };
            // fmtFreq: compact scientific notation matching the live view
            const fmtFreq = (val) => {
                if (val === null || val === undefined || isNaN(val)) return 'N/A';
                if (val === 0) return '0';
                const exp = Math.floor(Math.log10(Math.abs(val)));
                const mant = val / Math.pow(10, exp);
                const mantStr = Math.abs(mant - 1) < 0.001 ? '1' : mant.toFixed(Math.max(0, sd - 1));
                return mantStr + 'E' + exp;
            };

            // All included hazard leaf nodes for the selected FOS
            const getIncludedIEs = () => {
                if (!haData?.hazardList) return [];
                const ies = [];
                const collect = (node) => {
                    const isLeaf = !node.children || node.children.length === 0;
                    if (isLeaf) {
                        // Check both with selectedFosId AND across all FOS states
                        // (a hazard may be included under any FOS)
                        const hazardStates = haData.hazardStates || {};
                        let included = false;
                        if (selectedFosId) {
                            included = hazardStates[node.id + '_' + selectedFosId] === 'included';
                        }
                        // If not found under selectedFosId, check all states
                        if (!included) {
                            included = Object.keys(hazardStates).some(k =>
                                k.startsWith(node.id + '_') && hazardStates[k] === 'included'
                            );
                        }
                        if (included) ies.push(node);
                    }
                    (node.children || []).forEach(collect);
                };
                haData.hazardList.forEach(collect);
                return ies;
            };

            // Check if a hazard node ID has a renderable Facility Operational Diagram
            // (i.e. its HTFW script parses into a graph with function/end-state nodes)
            const ieHasPOL = (nodeId) => {
                const saved = (ieScripts || {})[nodeId];
                const def   = getIeScript(nodeId, '');
                const script = saved?.script !== undefined ? saved.script : def?.script || '';
                if (!script) return false;
                const ieName = saved?.ieName || def?.ieName || nodeId;
                try {
                    const graph = parseHTFWScript(ieName, script, projectModules);
                    // Must have more than just the IE node to be a real diagram
                    return graph && graph.nodes.size > 1;
                } catch (e) {
                    return false;
                }
            };

            // Render HTFW Mermaid diagram to SVG string
            const renderHTFWSvg = async (ieName, script, endStateOutcomes, nodeMetadata) => {
                if (!script || !ieName) return null;
                try {
                    const graph = parseHTFWScript(ieName, script, projectModules);
                    if (!graph || graph.nodes.size <= 1) return null;
                    const code = generateHTFWMermaid(ieName, graph, endStateOutcomes || {}, nodeMetadata || {}, projectModules, null, settings);
                    const fontSize = fontSizePx(settings?.fontSize);
                    mermaid.initialize({
                        startOnLoad: false, theme: 'default',
                        flowchart: { useMaxWidth: false, htmlLabels: false, curve: 'basis' },
                        themeVariables: { fontSize: fontSize + 'pt' },
                        securityLevel: 'loose'
                    });
                    const uid = 'seq-rpt-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                    const { svg } = await mermaid.render(uid, code);
                    return svg;
                } catch (err) {
                    console.error('HTFW render error:', err);
                    return null;
                }
            };

            // SVG string -> PNG data URL via canvas
            const svgToPng = (svgString) => {
                return new Promise((resolve) => {
                    try {
                        const blob = new Blob([svgString], { type: 'image/svg+xml' });
                        const url = URL.createObjectURL(blob);
                        const img = new Image();
                        img.onload = () => {
                            try {
                                const w = img.naturalWidth || 800;
                                const h = img.naturalHeight || 600;
                                const scale = Math.min(2, 1200 / w);
                                const canvas = document.createElement('canvas');
                                canvas.width  = Math.round(w * scale);
                                canvas.height = Math.round(h * scale);
                                const ctx = canvas.getContext('2d');
                                ctx.fillStyle = 'white';
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                resolve(canvas.toDataURL('image/png'));
                            } catch (e) { resolve(null); }
                            finally { URL.revokeObjectURL(url); }
                        };
                        img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
                        img.src = url;
                    } catch (e) { resolve(null); }
                });
            };

            // Build event-tree sequence table from a pol-like object
            // (works on output of htfwScriptToPol which uses NODE_TYPES values)
            const buildSequenceTable = (polLike, endStateOutcomes) => {
                if (!polLike?.nodes || !polLike?.connections) return { sequences: [], topEvents: [], ieName: '' };

                const ieNode = polLike.nodes.find(n => n.type === NODE_TYPES.INITIATING_EVENT);
                if (!ieNode) return { sequences: [], topEvents: [], ieName: '' };

                // Build adjacency: nodeId -> [{ to, label }]
                const adjOut = {};
                polLike.nodes.forEach(n => { adjOut[n.id] = []; });
                polLike.connections.forEach(c => {
                    if (adjOut[c.from]) adjOut[c.from].push({ to: c.to, label: c.label || '' });
                });

                const topEventsOrdered = [];
                const topEventsSet = new Set();
                const topEventsByLabel5 = {}; // label -> canonical entry
                const nodeIdToCanonicalTeId5 = {}; // path-unique id -> canonical id
                const sequences = [];

                // Each path entry: { nodeId, branchLabel }
                // branchLabel is the connection label used to ARRIVE at this node
                const traverse = (nodeId, path, visited) => {
                    if (visited.has(nodeId)) return;
                    const node = polLike.nodes.find(n => n.id === nodeId);
                    if (!node) return;

                    const newVisited = new Set(visited);
                    newVisited.add(nodeId);
                    const newPath = [...path, nodeId];

                    if (node.type === NODE_TYPES.END_STATE) {
                        sequences.push({ path: newPath, endState: node.label, nodeId: node.id });
                        return;
                    }

                    if (node.type === NODE_TYPES.TRANSFER) {
                        sequences.push({ path: newPath, endState: node.label, nodeId: node.id, isTransfer: true, transferTarget: node.transferTarget || node.label });
                        return;
                    }

                    // Track FUNCTION nodes as top events — deduplicate by label
                    if (node.type === NODE_TYPES.FUNCTION && (adjOut[nodeId] || []).length > 0) {
                        const lbl = node.label || '';
                        if (topEventsByLabel5[lbl]) {
                            nodeIdToCanonicalTeId5[nodeId] = topEventsByLabel5[lbl].id;
                        } else {
                            if (!topEventsSet.has(nodeId)) {
                                topEventsSet.add(nodeId);
                                const entry = { id: nodeId, label: lbl };
                                topEventsOrdered.push(entry);
                                topEventsByLabel5[lbl] = entry;
                                nodeIdToCanonicalTeId5[nodeId] = nodeId;
                            }
                        }
                    }

                    for (const edge of (adjOut[nodeId] || [])) {
                        traverse(edge.to, newPath, newVisited);
                    }
                };

                traverse(ieNode.id, [], new Set());

                // For each sequence, determine which branch was taken after each top event
                // by finding the connection label on the edge from the top event node
                // to the next node in the path. Use canonical IDs for column mapping.
                const processed = sequences.map((seq, si) => {
                    const branches = {};
                    for (const te of topEventsOrdered) {
                        // Find any node in this sequence's path that maps to this canonical te
                        const teNodeId = seq.path.find(nid => nodeIdToCanonicalTeId5[nid] === te.id);
                        if (!teNodeId) { branches[te.id] = ''; continue; }
                        const teIdx = seq.path.indexOf(teNodeId);
                        const nextNodeId = seq.path[teIdx + 1];
                        if (!nextNodeId) { branches[te.id] = ''; continue; }
                        const edge = (adjOut[teNodeId] || []).find(e => e.to === nextNodeId);
                        const lbl = (edge?.label || '').trim();
                        branches[te.id] = lbl;
                    }
                    // Outcome: use endStateOutcomes lookup, fall back to label heuristic
                    const esNode = polLike.nodes.find(n => n.id === seq.nodeId);
                    const storedOutcome = (endStateOutcomes || {})[seq.nodeId];
                    const esLabel = (seq.endState || '').toLowerCase();
                    const outcome = storedOutcome || esNode?.outcome ||
                        (esLabel.includes('ok') || esLabel.includes('success') || esLabel.includes('safe') ? 'positive'
                         : esLabel.includes('fail') || esLabel.includes('damage') || esLabel.includes('loss') ? 'negative'
                         : 'unanalyzed');
                    return { seqNum: si + 1, endState: seq.endState, branches, outcome };
                });

                return { sequences: processed, topEvents: topEventsOrdered, ieName: ieNode.label || '' };
            };

            // Find cut sets from loadedSystems for nodes in a pol-like object
            const gatherCutSets = (polLike) => {
                if (!polLike?.nodes || !loadedSystems) return [];
                const results = [];
                const seenKeys = new Set();

                for (const node of polLike.nodes) {
                    if (node.type !== NODE_TYPES.FUNCTION) continue;
                    const ftlFile     = node.knowFtlFileName || '';
                    const rawName     = node.moduleRawName   || '';
                    const displayName = node.label           || '';

                    // Try matching loadedSystems by fileName or systemName
                    for (const sys of Object.values(loadedSystems)) {
                        const matchesFile = ftlFile && (sys.fileName === ftlFile || sys.fileName?.endsWith('/' + ftlFile));
                        const matchesName = rawName   && sys.systemName === rawName;
                        const matchesDisp = displayName && sys.systemName === displayName;
                        if ((matchesFile || matchesName || matchesDisp) && !seenKeys.has(sys.systemName)) {
                            seenKeys.add(sys.systemName);
                            results.push({
                                systemName: sys.systemName,
                                nodeName:   node.label,
                                cutSets:    sys.cutSets || [],
                                eventInfo:  sys.eventInfo || {}
                            });
                        }
                    }
                }
                return results;
            };

            // ----------------------------------------------------------------
            // Build End State Summary: aggregate sequence frequencies per end
            // state label across all IEs, collecting description from nodeMetadata.
            // Returns an array of { label, description, outcome, totalFreq, totalProb,
            //                       seqCount, ieCount } sorted by label.
            // ----------------------------------------------------------------
            const buildEndStateSummary = (ieList) => {
                // endStates map: label -> { description, outcome, totalFreq, totalProb, seqCount, ieCount }
                const esMap = {};
                const quantMethod = (settings?.quantificationMethod || 'mcub').toLowerCase();

                const merge = (label, description, outcome, seqFreq, seqProb) => {
                    if (!label) return;
                    if (!esMap[label]) {
                        esMap[label] = { label, description: description || '', outcome: outcome || 'unanalyzed', totalFreq: null, totalProb: null, seqCount: 0, ieCount: new Set(), cutSetEvents: new Set() };
                    }
                    const e = esMap[label];
                    // Keep the first non-empty description we find
                    if (!e.description && description) e.description = description;
                    // Keep the most severe outcome (negative > unanalyzed > positive)
                    const rank = { negative: 2, unanalyzed: 1, positive: 0 };
                    if ((rank[outcome] || 0) > (rank[e.outcome] || 0)) e.outcome = outcome;
                    // Accumulate frequency
                    if (seqFreq !== null && seqFreq !== undefined && !isNaN(seqFreq)) {
                        e.totalFreq = (e.totalFreq || 0) + seqFreq;
                    }
                    // Accumulate probability (MCUB: 1 - prod(1-p))
                    if (seqProb !== null && seqProb !== undefined && !isNaN(seqProb)) {
                        e.totalProb = e.totalProb === null
                            ? seqProb
                            : 1 - (1 - e.totalProb) * (1 - seqProb);
                    }
                    e.seqCount++;
                };

                for (const node of ieList) {
                    const saved = (ieScripts || {})[node.id];
                    const def   = getIeScript(node.id, node.name);
                    const ieName           = saved?.ieName           !== undefined ? saved.ieName           : def?.ieName || node.name;
                    const script           = saved?.script           !== undefined ? saved.script           : def?.script || '';
                    const endStateOutcomes = saved?.endStateOutcomes || {};
                    const nodeMetadata     = saved?.nodeMetadata     || {};

                    if (!script) continue;
                    let graph;
                    try { graph = parseHTFWScript(ieName, script, projectModules); } catch (e) { continue; }
                    if (!graph || graph.nodes.size <= 1) continue;

                    // Build polLike and extract sequences
                    const polLike = htfwScriptToPol(ieName, script, projectModules, nodeMetadata, endStateOutcomes);
                    if (!polLike) continue;

                    // IE frequency
                    const rawFreq = computeIeFreqFromHA(haData, node.id, selectedFosId, ieScripts);
                    const ieFreq = (rawFreq !== null && typeof rawFreq === 'number') ? rawFreq : null;

                    // Build adjacency and traverse sequences (same logic as buildSequenceTable)
                    const adjOut = {};
                    polLike.nodes.forEach(n => { adjOut[n.id] = []; });
                    polLike.connections.forEach(c => { if (adjOut[c.from]) adjOut[c.from].push({ to: c.to, label: c.label || '' }); });

                    const ieNode = polLike.nodes.find(n => n.type === NODE_TYPES.INITIATING_EVENT);
                    if (!ieNode) continue;

                    const sequences = [];
                    const topEventsOrdered = [];
                    const topEventsSet = new Set();

                    const traverse = (nodeId, path, visited) => {
                        if (visited.has(nodeId)) return;
                        const n = polLike.nodes.find(x => x.id === nodeId);
                        if (!n) return;
                        const vis2 = new Set(visited); vis2.add(nodeId);
                        if (n.type === NODE_TYPES.FUNCTION && (adjOut[nodeId] || []).length > 0) {
                            if (!topEventsSet.has(nodeId)) { topEventsSet.add(nodeId); topEventsOrdered.push(n); }
                        }
                        if (n.type === NODE_TYPES.END_STATE) {
                            sequences.push({ path: [...path, nodeId], esNodeId: nodeId, esLabel: n.label || '' });
                        } else {
                            for (const edge of (adjOut[nodeId] || [])) traverse(edge.to, [...path, nodeId], vis2);
                        }
                    };
                    traverse(ieNode.id, [], new Set());

                    if (sequences.length === 0) continue;

                    // For each sequence compute branch decisions and then sequence probability
                    for (const seq of sequences) {
                        const esNode = polLike.nodes.find(n => n.id === seq.esNodeId);
                        const esLabel = seq.esLabel;
                        // Description: prefer nodeMetadata[esNodeId].description, then esNode.description
                        const esMeta = nodeMetadata[seq.esNodeId] || {};
                        const esDesc = esMeta.description || esNode?.description || '';
                        const esOutcome = (endStateOutcomes[seq.esNodeId]) || esNode?.outcome || 'unanalyzed';

                        // Walk the path to find branch decisions for top events
                        let seqProb = 1;
                        let seqProbKnown = true;
                        const seqCutSetKeys = new Set(); // track unique cut sets for this sequence

                        // Build sysByFile/sysByName for resolving systems
                        const sysByFile = {}, sysByName = {}, sysByBaseName = {};
                        const _normSysKey2 = (s) => (s||'').toLowerCase().replace(/^sys_/,'').replace(/\.know_ftl$/i,'').replace(/[-_\s]/g,'');
                        Object.values(loadedSystems || {}).forEach(sys => {
                            if (!sys) return;
                            if (sys.fileName) { sysByFile[sys.fileName] = sys; sysByBaseName[_normSysKey2(sys.fileName)] = sys; }
                            if (sys.systemName) { sysByName[sys.systemName] = sys; sysByBaseName[_normSysKey2(sys.systemName)] = sys; }
                        });
                        const resolveSystem = (te) => {
                            if (te?.knowFtlFileName && sysByFile[te.knowFtlFileName]) return sysByFile[te.knowFtlFileName];
                            if (te?.moduleRawName  && sysByName[te.moduleRawName])  return sysByName[te.moduleRawName];
                            if (sysByName[te?.label]) return sysByName[te.label];
                            return sysByBaseName[_normSysKey2(te?.label||'')] || sysByBaseName[_normSysKey2(te?.moduleRawName||'')] || null;
                        };

                        for (let pi = 0; pi < seq.path.length - 1; pi++) {
                            const curId  = seq.path[pi];
                            const nextId = seq.path[pi + 1];
                            const curNode = polLike.nodes.find(n => n.id === curId);
                            if (!curNode || curNode.type !== NODE_TYPES.FUNCTION) continue;

                            const edge = (adjOut[curId] || []).find(e => e.to === nextId);
                            const branchLabel = (edge?.label || '').trim().toUpperCase();
                            const occurred = branchLabel.startsWith('W'); // WORKS = system succeeded

                            const sys = resolveSystem(curNode);
                            let sysFailP = null;
                            if (sys && (sys.cutSets || []).length > 0) {
                                sysFailP = quantifyCutSets(sys.cutSets, sys.eventInfo || {}, quantMethod, null);
                                // On NO-branch, collect the cut set events for this end state
                                if (!occurred) {
                                    sys.cutSets.forEach(cs => {
                                        const key = (cs.events || []).slice().sort().join('|');
                                        if (key) seqCutSetKeys.add(key);
                                    });
                                }
                            }

                            let branchProb;
                            if (occurred) {
                                branchProb = (sysFailP === null) ? 1 : (1 - sysFailP);
                            } else {
                                branchProb = sysFailP;
                            }

                            if (branchProb === null || branchProb === undefined) {
                                seqProbKnown = false; break;
                            }
                            seqProb *= branchProb;
                        }

                        const sequenceProb = seqProbKnown ? seqProb : null;
                        const sequenceFreq = (sequenceProb !== null && ieFreq !== null)
                            ? ieFreq * sequenceProb : null;

                        merge(esLabel, esDesc, esOutcome, sequenceFreq, sequenceProb);
                        if (esMap[esLabel]) {
                            esMap[esLabel].ieCount.add(node.id);
                            seqCutSetKeys.forEach(k => esMap[esLabel].cutSetEvents.add(k));
                        }
                    }
                }

                // Convert to sorted array; replace ieCount Set with a number
                return Object.values(esMap)
                    .map(e => ({ ...e, ieCount: e.ieCount.size, totalCutSets: e.cutSetEvents.size }))
                    .sort((a, b) => a.label.localeCompare(b.label));
            };

            // ----------------------------------------------------------------
            // Report CSS
            // ----------------------------------------------------------------
            const buildCSS = (docSettings) => `
                body { font-family: "${docSettings.fontFamily || 'Arial'}", sans-serif; font-size: ${docSettings.fontSize || 11}pt; line-height: 1.5; color: #111827; }
                h1 { font-size: 20pt; color: #1e3a5f; border-bottom: 2px solid #1e3a5f; padding-bottom: 6pt; margin: 0 0 16pt 0; }
                h2 { font-size: 14pt; color: #1e40af; margin: 22pt 0 6pt 0; border-bottom: 1px solid #bfdbfe; padding-bottom: 3pt; }
                h3 { font-size: 12pt; color: #374151; margin: 16pt 0 4pt 0; }
                h4 { font-size: 11pt; color: #4b5563; margin: 12pt 0 3pt 0; font-style: italic; }
                p  { margin: 5pt 0; }
                table { border-collapse: collapse; width: 100%; margin: 8pt 0 12pt 0; font-size: 9pt; }
                th, td { border: 1px solid #d1d5db; padding: 4pt 7pt; text-align: left; vertical-align: top; }
                th { background-color: #f3f4f6; font-weight: bold; }
                tr:nth-child(even) td { background-color: #f9fafb; }
                .title-block { text-align: center; margin-bottom: 28pt; }
                .meta { color: #6b7280; font-size: 9pt; margin: 3pt 0; }
                .script-block { font-family: "Courier New", monospace; font-size: 8.5pt; background: #f8fafc; border: 1px solid #e2e8f0; padding: 8pt; white-space: pre-wrap; word-break: break-word; margin: 6pt 0 10pt 0; }
                .diagram-img { max-width: 100%; margin: 8pt 0 12pt 0; display: block; border: 1px solid #e5e7eb; }
                .no-data { color: #9ca3af; font-style: italic; font-size: 9pt; }
                .ie-section { margin-bottom: 28pt; padding-left: 10pt; border-left: 3px solid #3b82f6; page-break-inside: avoid; }
                .ok  { color: #15803d; font-weight: bold; }
                .fail { color: #b91c1c; font-weight: bold; }
                .unanalyzed { color: #6b7280; }
                .branch-ok   { background: #dcfce7; }
                .branch-fail { background: #fee2e2; }
                @page { size: ${docSettings.pageSize === 'letter' ? '8.5in 11in' : docSettings.pageSize === 'legal' ? '8.5in 14in' : '210mm 297mm'}; margin: 1in; }
            `;

            // ----------------------------------------------------------------
            // Report builder
            // ----------------------------------------------------------------
            const buildReport = async () => {
                const docSettings = settings?.documentSettings || {};
                const now = new Date();
                const enabledIds = new Set(contentItems.filter(i => i.enabled).map(i => i.id));
                const allIEs = getIncludedIEs();

                // Filter IEs if option set
                const reportIEs = onlyWithPOL
                    ? allIEs.filter(node => ieHasPOL(node.id))
                    : allIEs;

                let html = `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>${projectName || haData?.facilityName || 'SEQ Report'}</title>
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->
<style>${buildCSS(docSettings)}</style>
</head>
<body>
<div class="title-block">
<h1>${projectName || haData?.facilityName || 'SEQ Report'}</h1>
<p class="meta">Facility Scenario Analysis Report</p>`;
                if (haData?.facilityName && projectName && haData.facilityName !== projectName)
                    html += `\n<p class="meta">Facility: ${haData.facilityName}</p>`;
                if (showDateTime)
                    html += `\n<p class="meta">Generated: ${now.toLocaleString()}</p>`;
                html += `\n</div>\n`;

                // -- Project Name --
                if (enabledIds.has('projectName')) {
                    html += `<h2>Project Name</h2>\n<p>${projectName || haData?.facilityName || '<em class="no-data">Not specified</em>'}</p>\n`;
                }

                // -- Project Description --
                if (enabledIds.has('projectDescription')) {
                    html += `<h2>Project Description</h2>\n`;
                    html += projectDescription
                        ? `<p>${projectDescription.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</p>\n`
                        : `<p class="no-data">No description provided.</p>\n`;
                }

                // -- Initiating Event Table --
                if (enabledIds.has('initiatingEventTable')) {
                    html += `<h2>Initiating Event Table</h2>\n`;
                    if (reportIEs.length === 0) {
                        html += `<p class="no-data">No initiating events included for the selected Facility Operating State.</p>\n`;
                    } else {
                        html += `<table><thead><tr>
<th>Hazard / Initiating Event</th>
<th>IE Script Name</th>
<th>Frequency (per yr)</th>
</tr></thead><tbody>`;
                        for (const node of reportIEs) {
                            const saved = (ieScripts || {})[node.id];
                            const def   = getIeScript(node.id, node.name);
                            const ieName = saved?.ieName !== undefined ? saved.ieName : def.ieName;
                            const freq = computeIeFreqFromHA(haData, node.id, selectedFosId, ieScripts);
                            const freqStr = freq === null ? 'N/A'
                                : (typeof freq === 'object' && freq.isRange
                                    ? fmtFreq(freq.min) + ' &ndash; ' + fmtFreq(freq.max)
                                    : fmtFreq(freq));
                            html += `<tr>
<td>${node.name || node.id}</td>
<td>${ieName}</td>
<td>${freqStr}</td>
</tr>`;
                        }
                        html += `</tbody></table>\n`;
                    }
                }

                // -- Modules Table --
                if (enabledIds.has('modulesTable')) {
                    html += `<h2>Modules Table</h2>\n`;
                    if (!projectModules || projectModules.length === 0) {
                        html += `<p class="no-data">No modules defined.</p>\n`;
                    } else {
                        html += `<table><thead><tr>
<th>Module Name</th>
<th>Display Name</th>
<th>Type</th>
<th>Default Outcome</th>
<th>Description</th>
<th>Linked FTL File</th>
</tr></thead><tbody>`;
                        for (const mod of projectModules) {
                            const typeLabel = mod.type === 'endstate' ? 'End State' : 'Function';
                            const oc = mod.outcome === 'positive' ? 'ok' : mod.outcome === 'negative' ? 'fail' : 'unanalyzed';
                            html += `<tr>
<td>${mod.name || ''}</td>
<td>${mod.displayName || ''}</td>
<td>${typeLabel}</td>
<td class="${oc}">${mod.outcome || 'unanalyzed'}</td>
<td>${(mod.description || '').replace(/</g,'&lt;')}</td>
<td>${mod.knowFtlFileName || ''}</td>
</tr>`;
                        }
                        html += `</tbody></table>\n`;
                    }
                }

                // -- Facility Scenarios --
                if (enabledIds.has('facilityScenarios')) {
                    html += `<h2>Facility Scenarios</h2>\n`;

                    if (reportIEs.length === 0) {
                        html += `<p class="no-data">No initiating events to report.</p>\n`;
                    } else {
                        for (let ieIdx = 0; ieIdx < reportIEs.length; ieIdx++) {
                            const node = reportIEs[ieIdx];
                            setGenStatus('Scenario ' + (ieIdx + 1) + ' of ' + reportIEs.length + ': ' + (node.name || node.id) + '...');
                            await new Promise(r => setTimeout(r, 0));

                            const saved = (ieScripts || {})[node.id];
                            const def   = getIeScript(node.id, node.name);
                            const ieName           = saved?.ieName           !== undefined ? saved.ieName           : def.ieName;
                            const script           = saved?.script           !== undefined ? saved.script           : def.script;
                            const endStateOutcomes = saved?.endStateOutcomes || {};
                            const nodeMetadata     = saved?.nodeMetadata     || {};

                            const freq = computeIeFreqFromHA(haData, node.id, selectedFosId, ieScripts);
                            const freqStr = freq === null ? 'N/A'
                                : (typeof freq === 'object' && freq.isRange
                                    ? fmtFreq(freq.min) + ' &ndash; ' + fmtFreq(freq.max) + ' /yr'
                                    : fmtFreq(freq) + ' /yr');

                            // Build a pol-like structure from the HTFW script
                            const polLike = htfwScriptToPol(ieName, script, projectModules, nodeMetadata, endStateOutcomes);

                            // -- Facility Works Script (conditional) --
                            const bodyLines = (script || '').split('\n').filter(l => {
                                const t = l.trim();
                                return t && !t.startsWith('#') && !t.toUpperCase().startsWith('FACILITY WORKS');
                            });
                            const hasScript = bodyLines.length > 0;

                            // -- Facility Operational Diagram (conditional) --
                            const svgStr = await renderHTFWSvg(ieName, script, endStateOutcomes, nodeMetadata);
                            const pngUrl = svgStr ? await svgToPng(svgStr) : null;
                            const hasDiagram = !!(pngUrl || svgStr);

                            // -- Event Tree Graphic (conditional) --
                            const etPng = polLike
                                ? renderEventTreePNG(polLike, endStateOutcomes, typeof freq === 'number' ? freq : null, settings, loadedSystems)
                                : null;

                            // -- Cut Sets (conditional) --
                            const cutSetGroups = polLike ? gatherCutSets(polLike) : [];
                            const hasCutSets = cutSetGroups.length > 0;

                            // Only emit section if at least one element has content
                            if (!hasScript && !hasDiagram && !etPng && !hasCutSets) {
                                // Nothing to show -- skip this IE entirely
                            } else {
                                html += `<div class="ie-section">\n`;
                                html += `<h3>${ieIdx + 1}. ${(node.name || node.id).replace(/</g,'&lt;')}</h3>`;
                                html += `<p><strong>IE Script Name:</strong> ${ieName} &nbsp;&nbsp; <strong>Frequency:</strong> ${freqStr}</p>\n`;

                                if (hasScript) {
                                    html += `<h4>Facility Works Script</h4>\n`;
                                    html += `<div class="script-block">${(script || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>\n`;
                                }

                                if (hasDiagram) {
                                    html += `<h4>Facility Operational Diagram</h4>\n`;
                                    if (pngUrl) {
                                        html += `<img src="${pngUrl}" class="diagram-img" />\n`;
                                    } else {
                                        html += svgStr + '\n';
                                    }
                                }

                                if (etPng) {
                                    html += `<h4>Event Tree Graphic</h4>\n`;
                                    html += `<img src="${etPng}" class="diagram-img" />\n`;
                                }

                                // -- Risk Contribution Sankey (conditional) --
                                if (etPng && polLike) {
                                    const ieFreqR = typeof freq === 'number' ? freq : null;
                                    const riskMapR = {};
                                    if (ieFreqR !== null) {
                                        const _safeIdR = s => s.replace(/[^a-zA-Z0-9_]/g, '_');
                                        const getConsR = (esLabel) => {
                                            const esNid = 'ES_' + _safeIdR(esLabel);
                                            const dm = nodeMetadata[esNid];
                                            if (dm?.consequences?.length) return dm.consequences;
                                            const lc = esLabel.toLowerCase();
                                            for (const meta of Object.values(nodeMetadata))
                                                if ((meta.name || '').toLowerCase() === lc && meta.consequences?.length) return meta.consequences;
                                            const mod = (projectModules || []).find(m => m.type === 'endstate' && (m.displayName || m.name || '').toLowerCase() === lc);
                                            return mod?.consequences || [];
                                        };

                                        // Walk polLike sequences computing branch probabilities from loadedSystems
                                        const adjR = {};
                                        polLike.nodes.forEach(n => { adjR[n.id] = []; });
                                        polLike.connections.forEach(c => { if (adjR[c.from]) adjR[c.from].push({ to: c.to, label: c.label || '' }); });
                                        const sysByFileR = {}, sysByNameR = {};
                                        Object.values(loadedSystems || {}).forEach(sys => {
                                            if (sys?.fileName) sysByFileR[sys.fileName] = sys;
                                            if (sys?.systemName) sysByNameR[sys.systemName] = sys;
                                        });
                                        const resolveR = nd => sysByFileR[nd.knowFtlFileName] || sysByNameR[nd.moduleRawName] || sysByNameR[nd.label] || null;

                                        let seqNumR = 0;
                                        const walkR = (nodeId, prob, visited) => {
                                            if (visited.has(nodeId)) return;
                                            const nd = polLike.nodes.find(n => n.id === nodeId);
                                            if (!nd) return;
                                            if (nd.type === NODE_TYPES.END_STATE || nd.type === 'endstate' || nd.type === 'endState') {
                                                seqNumR++;
                                                const sf = ieFreqR * prob;
                                                getConsR(nd.label || '').forEach(con => {
                                                    const mv = parseFloat(con.distParams?.mean);
                                                    if (isNaN(mv) || mv <= 0) return;
                                                    const lcK = (con.name || 'Unnamed').toLowerCase();
                                                    if (!riskMapR[lcK]) riskMapR[lcK] = { displayName: con.name || 'Unnamed', units: con.freqUnits || '', rows: [] };
                                                    riskMapR[lcK].rows.push({ seqNum: seqNumR, endState: nd.label, freq: sf, risk: sf * mv });
                                                });
                                                return;
                                            }
                                            const vis2 = new Set(visited); vis2.add(nodeId);
                                            (adjR[nodeId] || []).forEach(edge => {
                                                const lbl = (edge.label || '').toUpperCase();
                                                let branchP = 1;
                                                if (nd.type === NODE_TYPES.FUNCTION || nd.type === 'function') {
                                                    const sys = resolveR(nd);
                                                    if (sys?.cutSets?.length) {
                                                        const fp = quantifyCutSets(sys.cutSets, sys.eventInfo || {}, settings?.quantMethod || 'MCUB', null);
                                                        if (fp !== null) branchP = lbl.startsWith('W') ? Math.max(0, 1 - fp) : fp;
                                                    }
                                                }
                                                walkR(edge.to, prob * branchP, vis2);
                                            });
                                        };
                                        const ieNdR = polLike.nodes.find(n => n.type === NODE_TYPES.INITIATING_EVENT || n.type === 'ie' || n.type === 'initiatingEvent');
                                        if (ieNdR) walkR(ieNdR.id, 1, new Set());
                                    }
                                    for (const [, { displayName: dn3, units: u3, rows: r3 }] of Object.entries(riskMapR)) {
                                        if (!r3.length) continue;
                                        const tot3 = r3.reduce((s, r) => s + r.risk, 0);
                                        if (tot3 <= 0) continue;
                                        const sankeyPng = renderSankeyPNG(r3, u3, tot3, dn3, settings);
                                        if (sankeyPng) {
                                            html += `<h4>Risk Contribution &mdash; ${dn3.replace(/</g,'&lt;')}${u3 ? ` (${u3})` : ''}</h4>\n`;
                                            html += `<img src="${sankeyPng}" class="diagram-img" />\n`;
                                        }
                                    }
                                }

                                                                if (hasCutSets) {
                                    html += `<h4>Cut Sets</h4>\n`;
                                    for (const grp of cutSetGroups) {
                                        const all = grp.cutSets;
                                        const show = limitCutSets > 0 ? all.slice(0, limitCutSets) : all;
                                        const truncNote = show.length < all.length ? ', showing first ' + show.length : '';
                                        html += `<p><strong>System: ${grp.nodeName.replace(/</g,'&lt;')}</strong> &nbsp;`;
                                        html += `(${all.length} cut set${all.length !== 1 ? 's' : ''}${truncNote})</p>`;
                                        html += `<table><thead><tr><th>#</th><th>Events</th><th>Probability</th></tr></thead><tbody>`;
                                        for (let ci = 0; ci < show.length; ci++) {
                                            const cs = show[ci];
                                            const evArr = cs.events || (Array.isArray(cs) ? cs : []);
                                            const prob  = cs.probability !== undefined ? cs.probability : null;
                                            const evStr = evArr.map(e => String(e).replace(/</g,'&lt;')).join(', ');
                                            const probStr = (prob !== null && !isNaN(prob)) ? fmtNum(Number(prob)) : '';
                                            html += `<tr><td>${ci + 1}</td><td>${evStr}</td><td>${probStr}</td></tr>`;
                                        }
                                        html += `</tbody></table>\n`;
                                    }
                                }

                                html += `</div>\n`;
                            }
                        }
                    }
                }

                // -- End State Summary Table --
                if (enabledIds.has('endStateSummary')) {
                    html += `<h2>End State Summary Table</h2>\n`;
                    const esSummary = buildEndStateSummary(reportIEs);
                    if (esSummary.length === 0) {
                        html += `<p class="no-data">No end state data available. Ensure IEs have Facility Works scripts with parseable sequences.</p>\n`;
                    } else {
                        const hasFreq  = esSummary.some(e => e.totalFreq  !== null);
                        const hasProb  = esSummary.some(e => e.totalProb  !== null);
                        html += `<table><thead><tr>
<th>End State</th>
<th>Description</th>
<th>Outcome</th>
${hasFreq ? '<th>Total Frequency (per yr)</th>' : ''}
${hasProb && !hasFreq ? '<th>Total Probability</th>' : ''}
<th>Contributing Sequences</th>
<th>Contributing IEs</th>
<th>Contributing Cut Sets</th>
</tr></thead><tbody>`;
                        for (const es of esSummary) {
                            const ocCls = es.outcome === 'positive' ? 'ok' : es.outcome === 'negative' ? 'fail' : 'unanalyzed';
                            const freqStr = (es.totalFreq !== null && !isNaN(es.totalFreq))
                                ? fmtNum(es.totalFreq) : '';
                            const probStr = (es.totalProb !== null && !isNaN(es.totalProb))
                                ? fmtNum(es.totalProb) : '';
                            html += `<tr>
<td><strong>${es.label.replace(/</g,'&lt;')}</strong></td>
<td>${(es.description || '').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</td>
<td class="${ocCls}">${es.outcome}</td>
${hasFreq ? `<td>${freqStr}</td>` : ''}
${hasProb && !hasFreq ? `<td>${probStr}</td>` : ''}
<td>${es.seqCount}</td>
<td>${es.ieCount}</td>
<td>${es.totalCutSets || 0}</td>
</tr>`;
                        }
                        html += `</tbody></table>\n`;
                        if (hasFreq && hasProb) {
                            html += `<p class="meta">Note: Total Frequency = sum of (IE frequency &times; sequence probability) across all contributing sequences. Computed using ${(settings?.quantificationMethod || 'MCUB').toUpperCase()}.</p>\n`;
                        }
                    }
                }

                html += `</body></html>`;
                return html;
            };

            // ----------------------------------------------------------------
            // Generate handler
            // ----------------------------------------------------------------
            const handleGenerate = async () => {
                setIsGenerating(true);
                setGenStatus('Initializing...');
                try {
                    const html = await buildReport();
                    if (fileFormat === 'preview') {
                        setPreviewHTML(html);
                        setShowHTMLPreview(true);
                    } else {
                        const fn = (fileName || 'SEQ_Report').replace(/\.docx?$/i, '');
                        const blob = new Blob([html], { type: 'application/msword' });
                        const url  = URL.createObjectURL(blob);
                        const a    = document.createElement('a');
                        a.href = url; a.download = fn + '.doc'; a.click();
                        URL.revokeObjectURL(url);
                    }
                } catch (err) {
                    console.error('Report error:', err);
                    alert('Error generating report: ' + err.message);
                } finally {
                    setIsGenerating(false);
                    setGenStatus('');
                }
            };

            // ----------------------------------------------------------------
            // Render
            // ----------------------------------------------------------------
            return (
                <React.Fragment>
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={onClose}>
                    <div
                        className="bg-white rounded-lg shadow-xl w-full m-4 flex flex-col"

                    >
                        {/* Header */}
                        <div className="p-4 border-b flex items-center justify-between flex-shrink-0" style={{ borderColor: backgroundStyle.borderColor }}>
