                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>

                        {/* Two-column body */}
                        <div className="flex-1 flex overflow-hidden">

                            {/* Left: Report Sections */}
                            <div className="border-r overflow-y-auto p-4" style={{ width: '40%', borderColor: backgroundStyle.borderColor }}>
                                <div className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Report Sections</div>
                                <div className="space-y-0.5">
                                    {contentItems.map((item, index) => (
                                        <div key={item.id} className="flex items-center gap-2 py-1 px-2 rounded" style={{ background: 'transparent' }}>

                                                <button onClick={() => moveItem(index, 'up')} disabled={index === 0}
                                                    className="px-1 py-0.5 text-xs border rounded hover:bg-gray-100 disabled:opacity-30"
                                                    style={{ borderColor: backgroundStyle.borderColor }} title="Move up">{'\u25B2'}</button>
                                                <button onClick={() => moveItem(index, 'down')} disabled={index === contentItems.length - 1}
                                                    className="px-1 py-0.5 text-xs border rounded hover:bg-gray-100 disabled:opacity-30"
                                                    style={{ borderColor: backgroundStyle.borderColor }} title="Move down">{'\u25BC'}</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Right: Options */}
                            <div className="flex-1 overflow-y-auto p-4">
                                <div className="space-y-5">

                                    {/* Type */}
                                    <div>
                                        <div className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Type</div>
                                        <div className="flex gap-2">
                                            {[{ value: 'preview', label: 'Preview' }, { value: 'word', label: 'Word' }].map(fmt => (
                                                <button key={fmt.value} onClick={() => setFileFormat(fmt.value)}

        function App() {
            // Load saved layout
            const savedLayout = SettingsManager.loadLayout();
            
            // State
            const [settings, setSettings] = useState(SettingsManager.load());
            const [showSettings, setShowSettings] = useState(false);
            const [haData, setHaData] = useState(null);
            const [pols, setPols] = useState([]);
            const [sharedPols, setSharedPols] = useState([]);

            const getSharedPolUsage = (sharedPolId) => {

            };

            // Default Operating States (matching KUREAS-HA)
            const DEFAULT_OPERATING_STATES = [
                { id: 'FOS-1', name: 'Zero Power Operations', description: 'Test operations including operator training', color: '#93c5fd' },
                { id: 'FOS-2', name: 'Shutdown', description: 'Non-testing period while reactor is in safe shutdown', color: '#fca5a5' },
                { id: 'FOS-3', name: 'Refueling', description: 'Loading fuel and core elements to enable test operations', color: '#fde047' },
                { id: 'FOS-4', name: 'Defueling', description: 'End of testing and removing all used fuel to long-term storage', color: '#c4b5fd' }
            ];

            // Get operating states - merge defaults with custom data from HA file
            const operatingStates = DEFAULT_OPERATING_STATES.map(state => {
                const customData = haData?.operatingStateData?.[state.id];
                return {
                    id: state.id,
                    name: customData?.name || state.name,
                    description: customData?.description || state.description,
                    color: customData?.color || state.color
                };
            });

            // Helper function to look up hazard path from haData
            const getHazardPath = (hazardId) => {
                if (!haData?.hazardList || !hazardId) return null;

                const searchNode = (node, currentPath = []) => {
                    if (node.id === hazardId) {
                        // Found the hazard - return the parent path (everything except the hazard itself)
                        return currentPath.join(' > ');
                    }
                    
                    if (node.children && node.children.length > 0) {
                        const nodePath = [...currentPath, node.name];
                        for (const child of node.children) {
                            const result = searchNode(child, nodePath);
                            if (result !== null) return result;
                        }
                    }
                    return null;
                };

                for (const rootNode of haData.hazardList) {
                    const result = searchNode(rootNode, []);
                    if (result !== null) return result;
                }
                return null;
            };

            // Helper function to get operating state display
            const getOperatingStateDisplay = (operatingStateId) => {
                if (!operatingStateId) return null;
                const opState = operatingStates.find(os => os.id === operatingStateId);
                if (opState) {
                    return `${opState.id} - ${opState.name}`;
                }
                return operatingStateId;
            };

            // Resizer logic
            useEffect(() => {
                const resizer = resizerRef.current;

                const handleMouseDown = (e) => {
                    isDraggingRef.current = true;

                    document.body.style.userSelect = 'none';
                };

                const handleMouseMove = (e) => {
                    if (!isDraggingRef.current) return;
                    const containerWidth = window.innerWidth;
                    const newWidth = (e.clientX / containerWidth) * 100;
                    if (newWidth >= 15 && newWidth <= 40) {
                        setLeftPaneWidth(newWidth);
                    }
                };

                const handleMouseUp = () => {
                    isDraggingRef.current = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                };

                resizer.addEventListener('mousedown', handleMouseDown);
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                return () => {
                    resizer.removeEventListener('mousedown', handleMouseDown);
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, []);

            // Hazard pane resizer logic
            useEffect(() => {
                const resizer = hazardResizerRef.current;
                if (!resizer) return;

                const handleMouseDown = (e) => {
                    isDraggingHazardRef.current = true;
                    document.body.style.cursor = 'row-resize';
                    document.body.style.userSelect = 'none';
                };

                const handleMouseMove = (e) => {
                    if (!isDraggingHazardRef.current) return;
                    const leftPane = resizer.parentElement;
                    if (!leftPane) return;
                    const rect = leftPane.getBoundingClientRect();
                    const newHeight = ((e.clientY - rect.top) / rect.height) * 100;
                    if (newHeight >= 20 && newHeight <= 80) {
                        setHazardPaneHeight(newHeight);
                    }
                };

                const handleMouseUp = () => {
                    isDraggingHazardRef.current = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                };

                resizer.addEventListener('mousedown', handleMouseDown);
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                return () => {
                    resizer.removeEventListener('mousedown', handleMouseDown);
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, []);

            // Description panel resizer logic
            useEffect(() => {
                const resizer = descResizerRef.current;
                const container = descContainerRef.current;
                if (!resizer || !container) return;

                const handleMouseDown = (e) => {
                    isDraggingDescRef.current = true;
                    const isHorizontal = container.classList.contains('flex-row');
                    document.body.style.cursor = isHorizontal ? 'col-resize' : 'row-resize';
                    document.body.style.userSelect = 'none';
                };

                const handleMouseMove = (e) => {
                    if (!isDraggingDescRef.current) return;
                    const rect = container.getBoundingClientRect();
                    const isHorizontal = container.classList.contains('flex-row');
                    
                    if (isHorizontal) {
                        // TB layout - resize width from right
                        const newWidth = ((rect.right - e.clientX) / rect.width) * 100;
                        if (newWidth >= 15 && newWidth <= 60) {
                            setDescriptionPanelWidth(newWidth);
                        }
                    } else {
                        // LR layout - resize height from bottom
                        const newHeight = ((rect.bottom - e.clientY) / rect.height) * 100;
                        if (newHeight >= 15 && newHeight <= 60) {
                            setDescriptionPanelHeight(newHeight);
                        }
                    }
                };

                const handleMouseUp = () => {
                    isDraggingDescRef.current = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                };

                resizer.addEventListener('mousedown', handleMouseDown);
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                return () => {
                    resizer.removeEventListener('mousedown', handleMouseDown);
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [currentPol?.layout, currentSharedPol?.layout]);

            // Save layout when resizer values change
            useEffect(() => {
                SettingsManager.saveLayout({
                    leftPaneWidth,
                    hazardPaneHeight,
                    descriptionPanelWidth,
                    descriptionPanelHeight
                });
            }, [leftPaneWidth, hazardPaneHeight, descriptionPanelWidth, descriptionPanelHeight]);

            // HTFW pane horizontal resizer — handler attached inline on the div
            // (the div is conditionally rendered so a ref-based useEffect fires too early)
            const handleHtfwResizerMouseDown = (e) => {
                e.preventDefault();
                const container = e.currentTarget.parentElement;
                if (!container) return;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                const onMove = (ev) => {
                    const rect = container.getBoundingClientRect();
                    const pct = ((ev.clientX - rect.left) / rect.width) * 100;
                    if (pct >= 15 && pct <= 85) setHtfwPaneWidth(pct);
                };
                const onUp = () => {
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };

            // Sanitize a raw IE name into a valid identifier (no spaces/specials)
            const sanitizeIeName = (rawName) => {
                return rawName
                    .replace(/[^a-zA-Z0-9_\- ]/g, '')  // strip specials except hyphen/space
                    .replace(/\s+/g, '_')               // spaces to underscores
                    .replace(/^_+|_+$/g, '');            // trim leading/trailing underscores
            };

            // Update node metadata (name/description) for a node within an IE
            const handleIeNodeMetadata = (hazardId, nodeId, field, value) => {
                setIeScripts(prev => ({
                    ...prev,
                    [hazardId]: {
                        ...(prev[hazardId] || {}),
                        nodeMetadata: {
                            ...((prev[hazardId] || {}).nodeMetadata || {}),
                            [nodeId]: {
                                ...((prev[hazardId] || {}).nodeMetadata?.[nodeId] || {}),
                                [field]: value
                            }
                        }
                    }
                }));
                setHasUnsavedChanges(true);
            };

            // Update an end-state outcome for a specific IE
            const handleIeEndStateOutcome = (hazardId, esNodeId, outcome) => {
                setIeScripts(prev => ({
                    ...prev,
                    [hazardId]: {
                        ...(prev[hazardId] || {}),

            // Get or initialise script entry for an IE
            const getIeScript = (hazardId, hazardName) => {
                if (ieScripts[hazardId]) return ieScripts[hazardId];
                const ieName = sanitizeIeName(hazardName || hazardId);
                return { ieName, script: `FACILITY WORKS(${ieName}) =\n# Enter facility success logic here\n` };
            };

            // Update script data for an IE
            const handleIeScriptChange = (hazardId, field, value) => {
                setIeScripts(prev => ({

                }));
                setHasUnsavedChanges(true);
            };

            // Add a project module
            const handleAddModule = (name, displayName, type, description, outcome, knowFtlFileName, consequences) => {
                const id = 'mod_' + Date.now();
                setProjectModules(prev => [...prev, { id, name, displayName: displayName || '', type: type || 'function', description: description || '', outcome: outcome || 'unanalyzed', knowFtlFileName: knowFtlFileName || '', consequences: consequences || [] }]);
                setHasUnsavedChanges(true);

                setHasUnsavedChanges(true);

            const handleToggleHazardGroup = (nodeId) => {

            // Unsaved changes warning

            // Save settings

            // Load HA KNOW file
            const handleLoadHA = () => {

                input.onchange = (e) => {

                    const reader = new FileReader();

                    reader.readAsText(file);

                input.click();

            // Handle FOS selection after loading a .KNOW_HA file
            const handleFosSelected = (fosId) => {
                if (!showFosSelector) return;
                const { newData, fileName } = showFosSelector;
                setHaData(newData);
                setSelectedFosId(fosId);
                // Pre-populate project name from facility name if not already set
                if (!projectName && newData.facilityName) {
                    setProjectName(newData.facilityName);
                }
                // Auto-initialise ieScripts for all included leaf hazards
                const initScripts = {};
                const visitNode = (node) => {
                    if (node.children && node.children.length > 0) {
                        node.children.forEach(visitNode);
                    } else {
                        const key = `${node.id}_${fosId}`;
                        if ((newData.hazardStates || {})[key] === 'included') {
                            const safeName = (node.name || node.id)
                                .replace(/[^a-zA-Z0-9_ -]/g, '')
                                .replace(/\s+/g, '_')
                                .replace(/^_+|_+$/g, '');
                            // Get eventDescription from hazardAnalysisData applicableEvents (same logic as IncludedHazardsTree)
                            let analysisData = (newData.hazardAnalysisData || {})[key];
                            if (analysisData && analysisData.useInfoFrom) {
                                const sourceKey = `${node.id}_${analysisData.useInfoFrom}`;
                                analysisData = (newData.hazardAnalysisData || {})[sourceKey] || analysisData;
                            }
                            const firstEvent = analysisData && analysisData.applicableEvents && analysisData.applicableEvents.length > 0
                                ? analysisData.applicableEvents[0] : null;
                            const ieDesc = (firstEvent && firstEvent.eventDescription)
                                ? firstEvent.eventDescription
                                : (node.eventDescription || node.description || '');
                            initScripts[node.id] = {
                                ieName: safeName,
                                script: `FACILITY WORKS(${safeName}) =\n# Enter facility success logic for this initiating event\n`,
                                description: ieDesc
                            };
                        }
                    }
                };
                (newData.hazardList || []).forEach(visitNode);
                setIeScripts(prev => {
                    const merged = { ...initScripts };
                    Object.keys(merged).forEach(id => {
                        if (prev[id]) {
                            merged[id] = {
                                ...merged[id],
                                ...prev[id],
                                // Only keep prev description if non-blank; otherwise use HA description
                                description: (prev[id].description && prev[id].description.trim())
                                    ? prev[id].description
                                    : merged[id].description
                            };
                        }
                    });
                    // Preserve any prev entries not in initScripts (other IEs already edited)
                    Object.keys(prev).forEach(id => { if (!merged[id]) merged[id] = prev[id]; });
                    return merged;
                });
                setHasUnsavedChanges(true);
                setShowFosSelector(null);
            };

            // Handle HA import with selective merge
            const handleHAImport = (selectedNewIds, selectedChangedIds, newData) => {
                if (!haData || !haData.hazardList) {
                    // No existing data, just use new data
                    setHaData(newData);
                    setShowHAImport(null);
                    return;
                }

                // Deep clone existing data to modify
                const mergedData = JSON.parse(JSON.stringify(haData));
                
                // Helper to find and add hazard nodes
                const addHazardToTree = (hazardList, newHazardList, hazardId) => {
                    // Find the hazard in the new list and its path
                    let foundPath = null;
                    let foundNode = null;
                    
                    const findInTree = (nodes, path = []) => {
                        for (const node of nodes) {
                            if (node.id === hazardId) {
                                foundNode = node;
                                foundPath = path;
                                return true;
                            }
                            if (node.children && node.children.length > 0) {
                                if (findInTree(node.children, [...path, node])) return true;
                            }
                        }
                        return false;
                    };
                    
                    findInTree(newHazardList);
                    if (!foundNode) return;
                    
                    // Now ensure the path exists in the target and add the node
                    let current = hazardList;
                    for (const pathNode of foundPath) {
                        let existing = current.find(n => n.id === pathNode.id || n.name === pathNode.name);
                        if (!existing) {
                            existing = { ...pathNode, children: [] };
                            current.push(existing);
                        }
                        if (!existing.children) existing.children = [];
                        current = existing.children;
                    }
                    
                    // Add the hazard if not already there
                    if (!current.find(n => n.id === hazardId)) {
                        current.push({ ...foundNode });
                    }
                };
                
                // Add selected new hazards
                selectedNewIds.forEach(hazardId => {
                    addHazardToTree(mergedData.hazardList, newData.hazardList, hazardId);
                    
                    // Also copy hazard states and analysis data for this hazard
                    const opStates = newData.operatingStates || 
                        [{ id: 'FOS-1' }, { id: 'FOS-2' }, { id: 'FOS-3' }, { id: 'FOS-4' }];
                    
                    opStates.forEach(state => {
                        const stateId = state.id || state;
                        const key = `${hazardId}_${stateId}`;
                        
                        if (newData.hazardStates && newData.hazardStates[key] !== undefined) {
                            if (!mergedData.hazardStates) mergedData.hazardStates = {};
                            mergedData.hazardStates[key] = newData.hazardStates[key];
                        }
                        
                        if (newData.hazardAnalysisData && newData.hazardAnalysisData[key]) {
                            if (!mergedData.hazardAnalysisData) mergedData.hazardAnalysisData = {};
                            mergedData.hazardAnalysisData[key] = newData.hazardAnalysisData[key];
                        }
                    });
                });
                
                // Update selected changed hazards
                selectedChangedIds.forEach(hazardId => {
                    const opStates = newData.operatingStates || 
                        [{ id: 'FOS-1' }, { id: 'FOS-2' }, { id: 'FOS-3' }, { id: 'FOS-4' }];
                    
                    opStates.forEach(state => {
                        const stateId = state.id || state;
                        const key = `${hazardId}_${stateId}`;
                        
                        if (newData.hazardStates && newData.hazardStates[key] !== undefined) {
                            if (!mergedData.hazardStates) mergedData.hazardStates = {};
                            mergedData.hazardStates[key] = newData.hazardStates[key];
                        }
                        
                        if (newData.hazardAnalysisData && newData.hazardAnalysisData[key]) {
                            if (!mergedData.hazardAnalysisData) mergedData.hazardAnalysisData = {};
                            mergedData.hazardAnalysisData[key] = newData.hazardAnalysisData[key];
                        }
                    });
                });
                
                // Update operating schedule if present in new data
                if (newData.operatingSchedule) {
                    mergedData.operatingSchedule = newData.operatingSchedule;
                }
                
                // Update operating state data if present
                if (newData.operatingStateData) {
                    mergedData.operatingStateData = { ...mergedData.operatingStateData, ...newData.operatingStateData };
                }
                
                setHaData(mergedData);
                setShowHAImport(null);
                setHasUnsavedChanges(true);
            };

            // Load SEQ KNOW file
            const handleLoadSEQ = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.KNOW_SEQ';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            
                            // Check if we have existing data to compare against
                            const hasExistingData = haData || pols.length > 0 || sharedPols.length > 0;
                            
                            if (hasExistingData) {
                                // Ask user: Load Project (replace) or Import into Current Project
                                setShowLoadModeModal({ file, data });
                            } else {
                                // No existing data, load directly
                                loadSeqDataDirect(data, file.name);
                            }
                        } catch (err) {
                            alert('Error loading SEQ file: ' + err.message);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            };

            // Apply a full project load (replaces everything) from parsed SEQ data
            const loadSeqDataDirect = (data, fileName) => {
                if (data.projectName !== undefined) setProjectName(data.projectName || '');
                if (data.projectDescription !== undefined) setProjectDescription(data.projectDescription || '');
                if (data.selectedFosId !== undefined) setSelectedFosId(data.selectedFosId || null);
                if (data.ieScripts) setIeScripts(data.ieScripts);
                if (data.projectModules) setProjectModules(data.projectModules);
                if (data.haData) setHaData(data.haData);
                if (data.pols) {
                    setPols(data.pols);
                    if (data.pols.length > 0) {
                        setSelectedPolId(data.pols[0].id);
                    }
                }
                if (data.sharedPols) {
                    setSharedPols(data.sharedPols);
                }
                if (data.loadedSystems) {
                    setLoadedSystems(normalizeLoadedSystems(data.loadedSystems));
                }
                if (data.projectSettings && typeof data.projectSettings === 'object') {
                    setSettings(prev => ({ ...prev, ...data.projectSettings }));
                }
                setLoadedFileName(fileName);
                setHasUnsavedChanges(false);
                setShowModulePanel(false);
                const firstIe = findFirstIeWithScript(
                    data.haData?.hazardList || [],
                    data.ieScripts || {}
                );
                if (firstIe) setSelectedIeId(firstIe);
            };

            // Handle SEQ import with selective merge
            const handleSEQImport = (itemsToImport, newData) => {
                if (itemsToImport.replaceAll) {
                    // Replace entire project
                    loadSeqDataDirect(newData, showSEQImport?.fileName || '');
                } else {
                    // Selective merge
                    
                    // Add new POLs
                    if (itemsToImport.newPols?.length > 0) {
                        setPols(prev => [...prev, ...itemsToImport.newPols]);
                    }
                    
                    // Add new shared POLs
                    if (itemsToImport.newSharedPols?.length > 0) {
                        setSharedPols(prev => [...prev, ...itemsToImport.newSharedPols]);
                    }
                    
                    // Add new HA data
                    if (itemsToImport.newHaData) {
                        setHaData(itemsToImport.newHaData);
                    }
                    
                    // Update changed POLs
                    if (itemsToImport.changedPols?.length > 0) {
                        setPols(prev => prev.map(pol => {
                            const updated = itemsToImport.changedPols.find(p => p.id === pol.id);
                            return updated || pol;
                        }));
                    }
                    
                    // Update changed shared POLs
                    if (itemsToImport.changedSharedPols?.length > 0) {
                        setSharedPols(prev => prev.map(sp => {
                            const updated = itemsToImport.changedSharedPols.find(p => p.id === sp.id);
                            return updated || sp;
                        }));
                    }
                    
                    setHasUnsavedChanges(true);
                }
                
                setShowSEQImport(null);
            };


            // ── Load System from KNOW_FTL file ─────────────────────────────────────
            // expectedFileName: optional hint; onFileNameUpdate: callback(fileName) to update node field
            const handleLoadSystemFromFile = (expectedFileName, onFileNameUpdate) => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.KNOW_FTL,.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const doc = JSON.parse(event.target.result);
                            // Validate it looks like a KNOW_FTL
                            if (doc.format !== 'KUREAS-FTL' && doc.$schema?.format !== 'KUREAS-FTL') {
                                alert('This does not appear to be a valid KUREAS-FTL (.KNOW_FTL) file.');
                                return;
                            }
                            // Extract system name from projectName field
                            const systemName = doc.projectName || file.name.replace(/^SYS_/,'').replace(/\.KNOW_FTL$/i,'');

                            // ── Extract eventInfo ────────────────────────────────────────────────
                            // KNOW_FTL stores eventInfo as { [ftlName]: { Calc_Prob, Description, ... } }
                            const newEventInfo = {};
                            if (doc.eventInfo) {
                                Object.entries(doc.eventInfo).forEach(([evtName, evtData]) => {
                                    newEventInfo[evtName] = {
                                        name: evtName,
                                        description: evtData.Description || evtData.description || doc.eventDescriptions?.[evtName] || '',
                                        probability: evtData.Calc_Prob !== undefined ? evtData.Calc_Prob : (evtData.probability !== undefined ? evtData.probability : null)
                                    };
                                });
                            }

                            // ── Extract cut sets ─────────────────────────────────────────────────
                            // cutSets is { [treeName]: { cutSets: [[{name,complement},...]], probabilities: [...], mcub } }
                            let rawCutSets = [];
                            let mcub = null;
                            const treeKey = doc.projectName || Object.keys(doc.cutSets || {})[0] || '';
                            const treeData = doc.cutSets?.[treeKey] || Object.values(doc.cutSets || {})[0];
                            if (treeData) {
                                mcub = treeData.mcub !== undefined ? treeData.mcub : null;
                                const cutSetsArr = treeData.cutSets || [];
                                const probsArr = treeData.probabilities || [];
                                rawCutSets = cutSetsArr.map((cs, idx) => {
                                    const events = Array.isArray(cs)
                                        ? cs.map(ev => {
                                            if (typeof ev === 'string') return ev;
                                            // { name, complement } object — re-encode complement as NOT- prefix
                                            // so calculateCutSetProbability can detect and invert it.
                                            const name = ev.name || String(ev);
                                            return (ev.complement && !name.startsWith('NOT-')) ? ('NOT-' + name) : name;
                                        })
                                        : [];
                                    const prob = probsArr[idx] !== undefined ? probsArr[idx] : null;
                                    // Register any events not yet in eventInfo (fallback)
                                    events.forEach(ev => {
                                        if (!newEventInfo[ev]) newEventInfo[ev] = { name: ev, description: '', probability: null };
                                    });
                                    return { index: idx + 1, events, description: '', probability: prob };
                                });
                            }
                            // ── Recompute any null cut set probabilities ─────────────────────────
                            // Cut sets containing NOT- complement events may have probability=null
                            // in the exported KNOW_FTL (KUREAS-SYS couldn't look up "NOT-X" in
                            // eventInfo, which only has base names "X"). Recompute here now that
                            // newEventInfo is fully populated with both base and NOT- entries.
                            rawCutSets.forEach(cs => {
                                if (cs.probability === null || cs.probability === undefined || isNaN(cs.probability)) {
                                    cs.probability = calculateCutSetProbability(cs.events, newEventInfo, null);
                                }
                            });
                            // ── Conflict detection ──────────────────────────────────────────────
                            const conflicts = [];
                            Object.entries(newEventInfo).forEach(([evtName, newData]) => {
                                // Check across all loaded systems
                                Object.values(loadedSystems).forEach(sys => {
                                    if (sys.systemName === systemName) return; // same system, skip
                                    const existing = sys.eventInfo?.[evtName];
                                    if (!existing) return;
                                    const existP = existing.probability;
                                    const newP = newData.probability;
                                    const probMismatch = existP !== null && newP !== null && Math.abs(existP - newP) > Math.abs(existP) * 1e-6;
                                    const descMismatch = existing.description && newData.description && existing.description !== newData.description;
                                    if (probMismatch || descMismatch) {
                                        conflicts.push({
                                            eventName: evtName,
                                            existingSystem: sys.systemName,
                                            existingProb: existP,
                                            existingDesc: existing.description,
                                            newProb: newP,
                                            newDesc: newData.description
                                        });
                                    }
                                });
                            });
                            if (conflicts.length > 0) {
                                const lines = conflicts.slice(0, 10).map(c =>
                                    `\u2022 "${c.eventName}" (in system "${c.existingSystem}"):\n` +
                                    `  Existing: P=${c.existingProb?.toExponential(2) ?? 'N/A'}, Desc="${c.existingDesc}"\n` +
                                    `  In file:  P=${c.newProb?.toExponential(2) ?? 'N/A'}, Desc="${c.newDesc}"`
                                ).join('\n\n');
                                const more = conflicts.length > 10 ? `\n\n...and ${conflicts.length-10} more conflict(s).` : '';
                                alert(`Cannot load system "${systemName}": basic event conflict(s) detected with already-loaded systems.\n\n${lines}${more}\n\nResolve conflicts in KUREAS-SYS before re-exporting.`);
                                return;
                            }
                            // ── Store system data ───────────────────────────────────────────────
                            const systemKey = systemName;
                            setLoadedSystems(prev => normalizeLoadedSystems({
                                ...prev,
                                [systemKey]: {
                                    fileName: file.name,
                                    systemName,
                                    cutSets: rawCutSets,
                                    eventInfo: newEventInfo,
                                    mcub,
                                    loadedAt: new Date().toISOString()
                                }
                            }));
                            setHasUnsavedChanges(true);
                            if (onFileNameUpdate) onFileNameUpdate(file.name);
                        } catch (err) {
                            alert('Error loading KNOW_FTL file: ' + err.message);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            };

            // Save SEQ KNOW file
            const handleSaveSEQ = () => {
                // Pluck the project-level keys out of the flat settings object.
                const projectSettings = {};
                PROJECT_SETTING_KEYS.forEach(k => {
                    if (settings[k] !== undefined) projectSettings[k] = settings[k];
                });

                const data = {
                    $schema: "KUREAS-SEQ-v1.1",
                    projectName,
                    projectDescription,
                    selectedFosId,
                    ieScripts,
                    projectModules,
                    haData,
                    pols,
                    sharedPols,
                    loadedSystems,
                    projectSettings,
                    savedAt: new Date().toISOString()
                };

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${(projectName || haData?.facilityName || 'Project_Name').replace(/\s+/g, '_')}.KNOW_SEQ`;
                a.click();
                URL.revokeObjectURL(url);
                setHasUnsavedChanges(false);
            };

            // Create new POL
            const handleCreatePOL = (hazard, operatingState, frequency) => {
                const newPol = createDefaultPOL(hazard, operatingState, frequency);
                setPols(prev => [...prev, newPol]);
                setSelectedPolId(newPol.id);
                setHasUnsavedChanges(true);
            };

            // Delete POL
            const handleDeletePOL = (polId) => {
                if (!confirm('Are you sure you want to delete this POL?')) return;
                setPols(prev => prev.filter(p => p.id !== polId));
                if (selectedPolId === polId) {
                    setSelectedPolId(pols.length > 1 ? pols.find(p => p.id !== polId)?.id : null);
                }
                setHasUnsavedChanges(true);
            };

            // Update POL
            const handleUpdatePOL = (updatedPol) => {
                setPols(prev => prev.map(p => p.id === updatedPol.id ? updatedPol : p));
                setHasUnsavedChanges(true);
            };

            // Update node
            const handleUpdateNode = (updatedNode) => {
                const targetPol = currentPol || currentSharedPol;
                if (!targetPol) return;
                
                // Check if this is a shared node and mark as overridden (only for regular POLs)
                if (currentPol) {
                    const originalNode = currentPol.nodes.find(n => n.id === updatedNode.id);
                    if (originalNode?.sharedPolId) {
                        // Check if any field was changed from the shared POL original
                        const sharedPol = sharedPols.find(sp => sp.id === originalNode.sharedPolId);
                        const sharedOriginal = sharedPol?.nodes.find(n => n.id === originalNode.originalNodeId);
                        
                        if (sharedOriginal) {
                            const hasChanges = 
                                updatedNode.label !== sharedOriginal.label ||
                                updatedNode.description !== sharedOriginal.description ||
                                updatedNode.operatingState !== sharedOriginal.operatingState ||
                                updatedNode.notes !== sharedOriginal.notes;
                            
                            if (hasChanges) {
                                updatedNode = { ...updatedNode, isOverridden: true };
                            }
                        }
                    }
                }
                
                const updatedTargetPol = {
                    ...targetPol,
                    nodes: targetPol.nodes.map(n => n.id === updatedNode.id ? updatedNode : n)
                };
                
                if (currentSharedPol) {
                    handleUpdateSharedPol(updatedTargetPol);
                } else {
                    handleUpdatePOL(updatedTargetPol);
                }
            };

            // Reset an overridden shared node to its original state
            const handleResetNode = (node) => {
                if (!currentPol || !node.sharedPolId || !node.originalNodeId) return;
                
                const sharedPol = sharedPols.find(sp => sp.id === node.sharedPolId);
                if (!sharedPol) return;
                
                const originalNode = sharedPol.nodes.find(n => n.id === node.originalNodeId);
                if (!originalNode) return;
                
                // Create reset node with original values but keeping the local id and mapping
                const resetNode = {
                    ...originalNode,
                    id: node.id,
                    sharedPolId: node.sharedPolId,
                    originalNodeId: node.originalNodeId,
                    isOverridden: false // Clear the override flag
                };
                
                const updatedPol = {
                    ...currentPol,
                    nodes: currentPol.nodes.map(n => n.id === node.id ? resetNode : n)
                };
                
                handleUpdatePOL(updatedPol);
            };

            // Delete node
            const handleDeleteNode = (nodeId) => {
                const targetPol = currentPol || currentSharedPol;
                if (!targetPol) return;
                
                const node = targetPol.nodes.find(n => n.id === nodeId);
                
                // For regular POLs, can't delete initiating event
                if (currentPol && node?.type === NODE_TYPES.INITIATING_EVENT) {
                    alert('Cannot delete the initiating event node.');
                    return;
                }
                
                // For shared POLs, can't delete if it's the only node
                if (currentSharedPol && targetPol.nodes.length <= 1) {
                    alert('Cannot delete the only node in a shared diagram.');
                    return;
                }

                const updatedTargetPol = {
                    ...targetPol,
                    nodes: targetPol.nodes.filter(n => n.id !== nodeId),
                    connections: targetPol.connections.filter(c => c.from !== nodeId && c.to !== nodeId)
                };
                
                if (currentSharedPol) {
                    handleUpdateSharedPol(updatedTargetPol);
                } else {
                    handleUpdatePOL(updatedTargetPol);
                }
            };

            // Add node
            const handleAddNode = (newNode, targetNodeId, connectionType) => {
                const targetPol = currentPol || currentSharedPol;
                if (!targetPol) return;

                const updatedNodes = [...targetPol.nodes, newNode];
                let updatedConnections = [...targetPol.connections];

                // Find existing connection from target
                const existingConnIdx = updatedConnections.findIndex(c => 
                    c.from === targetNodeId && 
                    (connectionType === 'yes' ? c.label === 'Yes' : connectionType === 'no' ? c.label === 'No' : !c.label)
                );

                if (existingConnIdx >= 0) {
                    // Insert between existing nodes
                    const existingTarget = updatedConnections[existingConnIdx].to;
                    updatedConnections[existingConnIdx] = {
                        ...updatedConnections[existingConnIdx],
                        to: newNode.id
                    };
                    // Connect new node to old target
                    updatedConnections.push({
                        from: newNode.id,
                        to: existingTarget,
                        label: ''
                    });
                } else {
                    // Create new connection
                    const label = connectionType === 'yes' ? 'Yes' : connectionType === 'no' ? 'No' : '';
                    updatedConnections.push({
                        from: targetNodeId,
                        to: newNode.id,
                        label
                    });
                }

                const updatedTargetPol = {
                    ...targetPol,
                    nodes: updatedNodes,
                    connections: updatedConnections
                };
                
                if (currentSharedPol) {
                    handleUpdateSharedPol(updatedTargetPol);
                } else {
                    handleUpdatePOL(updatedTargetPol);
                }
            };

            // Link to an existing node (create connection only, no new node)
            const handleLinkExistingNode = (existingNodeId, targetNodeId, connectionType) => {
                const targetPol = currentPol || currentSharedPol;
                if (!targetPol) return;

                let updatedConnections = [...targetPol.connections];

                // Check if connection already exists
                const connectionExists = updatedConnections.some(c => 
                    c.from === targetNodeId && c.to === existingNodeId
                );

                if (connectionExists) {
                    alert('This connection already exists.');
                    return;
                }

                // Create new connection to the existing node
                const label = connectionType === 'yes' ? 'Yes' : connectionType === 'no' ? 'No' : '';
                updatedConnections.push({
                    from: targetNodeId,
                    to: existingNodeId,
                    label
                });

                const updatedTargetPol = {
                    ...targetPol,
                    connections: updatedConnections
                };
                
                if (currentSharedPol) {
                    handleUpdateSharedPol(updatedTargetPol);
                } else {
                    handleUpdatePOL(updatedTargetPol);
                }
            };

            // Update branch target
            const handleUpdateBranchTarget = (sourceNodeId, branchType, newTargetId) => {
                const targetPol = currentPol || currentSharedPol;
                if (!targetPol) return;

                const label = branchType === 'yes' ? 'Yes' : branchType === 'no' ? 'No' : '';
                const updatedConnections = targetPol.connections.map(c => {
                    if (c.from === sourceNodeId && c.label === label) {
                        return { ...c, to: newTargetId };
                    }
                    return c;
                });

                const updatedTargetPol = {
                    ...targetPol,
                    connections: updatedConnections
                };
                
                if (currentSharedPol) {
                    handleUpdateSharedPol(updatedTargetPol);
                } else {
                    handleUpdatePOL(updatedTargetPol);
                }
            };

            // Delete branch connection
            const handleDeleteBranch = (sourceNodeId, branchType) => {
                const targetPol = currentPol || currentSharedPol;
                if (!targetPol) return;

                const label = branchType === 'yes' ? 'Yes' : branchType === 'no' ? 'No' : '';
                const updatedConnections = targetPol.connections.filter(c => 
                    !(c.from === sourceNodeId && c.label === label)
                );

                const updatedTargetPol = {
                    ...targetPol,
                    connections: updatedConnections
                };
                
                if (currentSharedPol) {
                    handleUpdateSharedPol(updatedTargetPol);
                } else {
                    handleUpdatePOL(updatedTargetPol);
                }
            };

            // Create new shared POL
            const handleCreateSharedPol = (newSharedPol) => {
                setSharedPols(prev => [...prev, newSharedPol]);
                setSelectedSharedPolId(newSharedPol.id);
                setSelectedPolId(null);
                setHasUnsavedChanges(true);
            };

            // Delete shared POL
            const handleDeleteSharedPol = (sharedPolId) => {
                // Remove shared POL
                setSharedPols(prev => prev.filter(sp => sp.id !== sharedPolId));
                
                // Remove shared nodes from all POLs that use this shared POL
                setPols(prev => prev.map(pol => {
                    if (pol.sharedPolRefs && pol.sharedPolRefs[sharedPolId]) {
                        const { [sharedPolId]: removed, ...remainingRefs } = pol.sharedPolRefs;
                        return {
                            ...pol,
                            nodes: pol.nodes.filter(n => n.sharedPolId !== sharedPolId),
                            connections: pol.connections.filter(c => {
                                const fromNode = pol.nodes.find(n => n.id === c.from);
                                const toNode = pol.nodes.find(n => n.id === c.to);
                                return (!fromNode || fromNode.sharedPolId !== sharedPolId) && 
                                       (!toNode || toNode.sharedPolId !== sharedPolId);
                            }),
                            sharedPolRefs: Object.keys(remainingRefs).length > 0 ? remainingRefs : undefined
                        };
                    }
                    return pol;
                }));
                
                if (selectedSharedPolId === sharedPolId) {
                    setSelectedSharedPolId(null);
                }
                setHasUnsavedChanges(true);
            };

            // Insert shared POL into current diagram
            const handleInsertSharedPol = (sharedPol, insertAfterNodeId, connectionType) => {
                if (!currentPol || !sharedPol) return;

                // Clone shared nodes with new IDs and mark them as shared
                const nodeIdMap = {};
                const clonedNodes = sharedPol.nodes.map(n => {
                    const newId = createId();
                    nodeIdMap[n.id] = newId;
                    return { 
                        ...n, 
                        id: newId,
                        sharedPolId: sharedPol.id,
                        originalNodeId: n.id
                    };
                });

                // Clone connections within the shared POL
                const clonedConnections = sharedPol.connections
                    .filter(c => nodeIdMap[c.from] && nodeIdMap[c.to])
                    .map(c => ({
                        from: nodeIdMap[c.from],
                        to: nodeIdMap[c.to],
                        label: c.label
                    }));

                // Find the first node of the shared POL (node that has no incoming connections within shared POL)
                const sharedNodeIds = new Set(sharedPol.nodes.map(n => n.id));
                const nodesWithIncoming = new Set(sharedPol.connections.filter(c => sharedNodeIds.has(c.from)).map(c => c.to));
                const firstSharedNode = sharedPol.nodes.find(n => !nodesWithIncoming.has(n.id));
                const firstSharedNodeId = firstSharedNode ? nodeIdMap[firstSharedNode.id] : (clonedNodes.length > 0 ? clonedNodes[0].id : null);

                // Find the last node of the shared POL (node that has no outgoing connections within shared POL)
                const nodesWithOutgoing = new Set(sharedPol.connections.filter(c => sharedNodeIds.has(c.to)).map(c => c.from));
                const lastSharedNode = sharedPol.nodes.find(n => !nodesWithOutgoing.has(n.id));
                const lastSharedNodeId = lastSharedNode ? nodeIdMap[lastSharedNode.id] : (clonedNodes.length > 0 ? clonedNodes[clonedNodes.length - 1].id : null);

                // Find the existing connection from the insert point
                const insertNode = currentPol.nodes.find(n => n.id === insertAfterNodeId);
                const connectionLabel = insertNode?.type === NODE_TYPES.FUNCTION 
                    ? (connectionType === 'yes' ? 'Yes' : connectionType === 'no' ? 'No' : '')
                    : '';
                
                // Find the connection that matches our insert criteria
                const existingConnectionIdx = currentPol.connections.findIndex(c => 
                    c.from === insertAfterNodeId && c.label === connectionLabel
                );
                
                let newConnections = [...currentPol.connections, ...clonedConnections];
                
                if (existingConnectionIdx >= 0) {
                    // There's an existing connection - we need to insert between
                    const existingConnection = currentPol.connections[existingConnectionIdx];
                    const originalTargetId = existingConnection.to;
                    
                    // Update the existing connection to point to first shared node
                    newConnections = newConnections.map((c, idx) => {
                        if (idx === existingConnectionIdx) {
                            return { ...c, to: firstSharedNodeId };
                        }
                        return c;
                    });
                    
                    // Add connection from last shared node to the original target
                    if (lastSharedNodeId && originalTargetId) {
                        newConnections.push({
                            from: lastSharedNodeId,
                            to: originalTargetId,
                            label: ''
                        });
                    }
                } else if (firstSharedNodeId) {
                    // No existing connection - just add connection to first shared node
                    newConnections.push({
                        from: insertAfterNodeId,
                        to: firstSharedNodeId,
                        label: connectionLabel
                    });
                }

                const updatedPol = {
                    ...currentPol,
                    nodes: [...currentPol.nodes, ...clonedNodes],
                    connections: newConnections,
                    sharedPolRefs: {
                        ...currentPol.sharedPolRefs,
                        [sharedPol.id]: { name: sharedPol.name, nodeIdMap }
                    }
                };
                handleUpdatePOL(updatedPol);
            };

            // Update detailed description for current POL
            const handleUpdateDetailedDescription = (newDescription) => {
                if (currentPol) {
                    const updatedPol = { ...currentPol, detailedDescription: newDescription };
                    handleUpdatePOL(updatedPol);
                }
            };

            // Update detailed description for shared POL
            const handleUpdateSharedDetailedDescription = (newDescription) => {
                if (currentSharedPol) {
                    const updatedSharedPol = { ...currentSharedPol, detailedDescription: newDescription };
                    setSharedPols(prev => prev.map(sp => 
                        sp.id === updatedSharedPol.id ? updatedSharedPol : sp
                    ));
                    setHasUnsavedChanges(true);
                }
            };

            // Get shared POL descriptions for current POL
            const getSharedPolDescriptions = () => {
                if (!currentPol || !currentPol.sharedPolRefs) return [];
                
                return Object.keys(currentPol.sharedPolRefs)
                    .map(sharedPolId => {
                        const sharedPol = sharedPols.find(sp => sp.id === sharedPolId);
                        if (sharedPol && sharedPol.detailedDescription) {
                            return {
                                name: sharedPol.name,
                                description: sharedPol.detailedDescription
                            };
                        }
                        return null;
                    })
                    .filter(Boolean);
            };

            // Update shared POL and sync to all POLs that use it
            const handleUpdateSharedPol = (updatedSharedPol) => {
                setSharedPols(prev => prev.map(sp => 
                    sp.id === updatedSharedPol.id ? updatedSharedPol : sp
                ));
                setHasUnsavedChanges(true);
                
                // Sync nodes in all POLs that use this shared POL
                setPols(prev => prev.map(pol => {
                    if (pol.sharedPolRefs && pol.sharedPolRefs[updatedSharedPol.id]) {
                        const refInfo = pol.sharedPolRefs[updatedSharedPol.id];
                        const nodeIdMap = { ...refInfo.nodeIdMap };
                        
                        // Get current shared nodes in this POL
                        const currentSharedNodes = pol.nodes.filter(n => n.sharedPolId === updatedSharedPol.id);
                        const currentSharedNodeIds = new Set(currentSharedNodes.map(n => n.originalNodeId));
                        
                        // Get nodes from updated shared POL
                        const updatedNodeIds = new Set(updatedSharedPol.nodes.map(n => n.id));
                        
                        // Find nodes to remove (in current but not in updated)
                        const nodesToRemove = currentSharedNodes.filter(n => !updatedNodeIds.has(n.originalNodeId));
                        const nodeIdsToRemove = new Set(nodesToRemove.map(n => n.id));
                        
                        // Find nodes to add (in updated but not in current)
                        const nodesToAdd = updatedSharedPol.nodes.filter(n => !currentSharedNodeIds.has(n.id));
                        
                        // Create new nodes for additions
                        const newNodes = nodesToAdd.map(n => {
                            const newId = createId();
                            nodeIdMap[n.id] = newId;
                            return {
                                ...n,
                                id: newId,
                                sharedPolId: updatedSharedPol.id,
                                originalNodeId: n.id
                            };
                        });
                        
                        // Update existing nodes (if not overridden)
                        let updatedNodes = pol.nodes
                            .filter(n => !nodeIdsToRemove.has(n.id))
                            .map(node => {
                                if (node.sharedPolId === updatedSharedPol.id && !node.isOverridden) {
                                    const originalNode = updatedSharedPol.nodes.find(n => n.id === node.originalNodeId);
                                    if (originalNode) {
                                        return {
                                            ...node,
                                            label: originalNode.label,
                                            description: originalNode.description,
                                            type: originalNode.type,
                                            operatingState: originalNode.operatingState,
                                            color: originalNode.color,
                                            notes: originalNode.notes
                                        };
                                    }
                                }
                                return node;
                            });
                        
                        // Add new nodes
                        updatedNodes = [...updatedNodes, ...newNodes];
                        
                        // Update connections - remove connections involving deleted nodes
                        let updatedConnections = pol.connections.filter(c => 
                            !nodeIdsToRemove.has(c.from) && !nodeIdsToRemove.has(c.to)
                        );
                        
                        // Add connections from shared POL for new nodes
                        const newConnections = updatedSharedPol.connections
                            .filter(c => {
                                const fromIsNew = nodesToAdd.some(n => n.id === c.from);
                                const toIsNew = nodesToAdd.some(n => n.id === c.to);
                                return fromIsNew || toIsNew;
                            })
                            .map(c => ({
