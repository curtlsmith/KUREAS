                                                {model === 'frequency' && (
                                                    <div className="border rounded p-3 bg-blue-50 space-y-2">
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Frequency Distribution:</label>
                                                            <select value={od.frequencyDistribution || 'point'} onChange={e => setOd({ frequencyDistribution: e.target.value })} className="w-full border rounded px-2 py-1 text-sm">
                                                                <option value="point">Point estimate</option>
                                                                <option value="gamma">Gamma</option>
                                                                <option value="lognormal">Lognormal</option>
                                                                <option value="cni">Constrained Non-Informative (CNI)</option>
                                                            </select>
                                                        </div>
                                                        {od.frequencyDistribution === 'gamma' ? (
                                                            <div className="flex gap-2">
                                                                <div className="flex-1">
                                                                    <label className="block text-xs font-medium mb-1">Shape (&#945;):</label>
                                                                    <input type="text" value={od.gammaShape || ''} onChange={e => setOd({ gammaShape: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="alpha" />
                                                                </div>
                                                                <div className="flex-1">
                                                                    <label className="block text-xs font-medium mb-1">Scale (&#952;):</label>
                                                                    <input type="text" value={od.gammaScale || ''} onChange={e => setOd({ gammaScale: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="theta" />
                                                                </div>
                                                            </div>
                                                        ) : od.frequencyDistribution === 'lognormal' ? (
                                                            <div className="flex gap-2">
                                                                <div className="flex-1">
                                                                    <label className="block text-xs font-medium mb-1">Mean:</label>
                                                                    <input type="text" value={od.lognormalMean || ''} onChange={e => setOd({ lognormalMean: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="Mean value" />
                                                                </div>
                                                                <div className="flex-1">
                                                                    <label className="block text-xs font-medium mb-1">Error Factor (EF):</label>
                                                                    <input type="text" value={od.lognormalEF || ''} onChange={e => setOd({ lognormalEF: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="EF = 95%/50%" />
                                                                </div>
                                                            </div>
                                                        ) : od.frequencyDistribution === 'cni' ? (
                                                            <div>
                                                                <label className="block text-xs font-medium mb-1">Mean:</label>
                                                                <input type="text" value={od.cniMean || ''} onChange={e => setOd({ cniMean: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="Mean value" />
                                                                <p className="text-xs text-gray-500 mt-1">CNI: &#945;=0.5, &#952;=2×mean</p>
                                                            </div>
                                                        ) : (
                                                            <div>
                                                                <label className="block text-xs font-medium mb-1">Point Estimate:</label>
                                                                <input type="text" value={od.pointEstimate || ''} onChange={e => setOd({ pointEstimate: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="e.g. 1.5e-3" />
                                                            </div>
                                                        )}
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Units:</label>
                                                            <select value={od.frequencyUnits || '/yr'} onChange={e => setOd({ frequencyUnits: e.target.value })} className="w-full border rounded px-2 py-1 text-sm">
                                                                <option value="/yr">/yr (per year)</option>
                                                                <option value="/hr">/hr (per hour)</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                )}

                                                {model === 'prob-per-opportunity' && (
                                                    <div className="border rounded p-3 bg-purple-50 space-y-2">
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Opportunities per Operating Period:</label>
                                                            <input type="number" min="1" step="1" value={od.opportunitiesPerPeriod || ''} onChange={e => setOd({ opportunitiesPerPeriod: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="Integer" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Probability Distribution:</label>
                                                            <select value={od.probabilityDistribution || 'point'} onChange={e => setOd({ probabilityDistribution: e.target.value })} className="w-full border rounded px-2 py-1 text-sm">
                                                                <option value="point">Point estimate</option>
                                                                <option value="beta">Beta</option>
                                                                <option value="lognormal">Lognormal</option>
                                                                <option value="cni">Constrained Non-Informative (CNI)</option>
                                                            </select>
                                                        </div>
                                                        {od.probabilityDistribution === 'beta' ? (
                                                            <div className="flex gap-2">
                                                                <div className="flex-1">
                                                                    <label className="block text-xs font-medium mb-1">&#945;:</label>
                                                                    <input type="text" value={od.betaShape || ''} onChange={e => setOd({ betaShape: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="alpha" />
                                                                </div>
                                                                <div className="flex-1">
                                                                    <label className="block text-xs font-medium mb-1">&#946;:</label>
                                                                    <input type="text" value={od.betaScale || ''} onChange={e => setOd({ betaScale: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="beta" />
                                                                </div>
                                                            </div>
                                                        ) : od.probabilityDistribution === 'lognormal' ? (
                                                            <div className="flex gap-2">
                                                                <div className="flex-1">
                                                                    <label className="block text-xs font-medium mb-1">Mean:</label>
                                                                    <input type="text" value={od.probLognormalMean || ''} onChange={e => setOd({ probLognormalMean: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="Mean" />
                                                                </div>
                                                                <div className="flex-1">
                                                                    <label className="block text-xs font-medium mb-1">EF:</label>
                                                                    <input type="text" value={od.probLognormalEF || ''} onChange={e => setOd({ probLognormalEF: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="EF = 95%/50%" />
                                                                </div>
                                                            </div>
                                                        ) : od.probabilityDistribution === 'cni' ? (
                                                            <div>
                                                                <label className="block text-xs font-medium mb-1">Mean:</label>
                                                                <input type="text" value={od.probCniMean || ''} onChange={e => setOd({ probCniMean: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="Mean" />
                                                            </div>
                                                        ) : (
                                                            <div>
                                                                <label className="block text-xs font-medium mb-1">Point Estimate Probability:</label>
                                                                <input type="text" value={od.probPointEstimate || ''} onChange={e => setOd({ probPointEstimate: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="0 to 1" />
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {(model === 'screened-low-freq' || model === 'screened-low-consequence' || model === 'screened-not-applicable') && (
                                                    <div className="border rounded p-3 bg-gray-50 text-sm text-gray-600">
                                                        This IE is screened out. Its frequency will be treated as zero.
                                                    </div>
                                                )}

                                                {model === 'none' && (
                                                    <div className="border rounded p-3 bg-gray-50 text-xs text-gray-500 italic">
                                                        Frequency will be computed from the linked HA file.
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })()}

                                    <div className="flex gap-2 justify-end mt-4">
                                        <button onClick={() => setEditingFullPath(null)} className="px-4 py-2 border rounded hover:bg-gray-100 text-sm">Cancel</button>
                                        <button onClick={handleSaveFullPath} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm">Save</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── Initiating Events Tree (HA-style hazard tree for left pane) ──────────
        function InitiatingEventsTree({ hazards, hazardStates, hazardAnalysisData, selectedFosId, collapsedGroups, onToggleGroup, selectedIeId, onSelectIe, operatingStates, ieFilterText, ieFilterScript, ieScripts, settings }) {
            const fontSize = fontSizePt(settings?.fontSize);

            const formatFrequency = (val) => {
                if (val === null || val === undefined || isNaN(val)) return '';
                if (val === 0) return '0';
                const exp = Math.floor(Math.log10(Math.abs(val)));
                const mant = val / Math.pow(10, exp);
                if (Math.abs(mant - 1) < 0.001) return `1E${exp}`;
                return `${mant.toFixed(1)}E${exp}`;
            };

            // Resolve effective events for a hazard/FOS pair, honouring useInfoFrom references
            const getEffectiveEvents = (hazardId, fosId) => {
                const key = `${hazardId}_${fosId}`;
                const ad = hazardAnalysisData[key];
                if (!ad) return null;
                if (ad.useInfoFrom && ad.useInfoFrom !== '') {
                    const srcKey = `${hazardId}_${ad.useInfoFrom}`;
                    const srcAd = hazardAnalysisData[srcKey];
                    return srcAd ? srcAd.applicableEvents : null;
                }
                return ad.applicableEvents;
            };

            const calcFrequency = (hazardId) => {
                if (!selectedFosId) return null;
                const key = `${hazardId}_${selectedFosId}`;
                const stateVal = hazardStates[key];
                if (stateVal !== 'included') return null;

                // Check for a manual occurrence override in ieScripts first
                const od = (ieScripts || {})[hazardId]?.occurrenceData;
                if (od && od.occurrenceModel && od.occurrenceModel !== 'none') {
                    if (od.occurrenceModel === 'frequency') {
                        const dist = od.frequencyDistribution || 'point';
                        let f = null;
                        if (dist === 'point' && od.pointEstimate) f = parseFloat(od.pointEstimate);
                        else if (dist === 'gamma' && od.gammaShape && od.gammaScale) f = parseFloat(od.gammaShape) * parseFloat(od.gammaScale);
                        else if (dist === 'lognormal' && od.lognormalMean) f = parseFloat(od.lognormalMean);
                        else if (dist === 'cni' && od.cniMean) f = parseFloat(od.cniMean);
                        if (f !== null && !isNaN(f)) {
                            if (od.frequencyUnits === '/hr') f *= 8760;
                            return f > 0 ? f : null;
                        }
                    } else if (od.occurrenceModel === 'prob-per-opportunity') {
                        const n = parseInt(od.opportunitiesPerPeriod, 10) || 1;
                        const pDist = od.probabilityDistribution || 'point';
                        let p = null;
                        if (pDist === 'point' && od.probPointEstimate) p = parseFloat(od.probPointEstimate);
                        else if (pDist === 'beta' && od.betaShape && od.betaScale) p = parseFloat(od.betaShape) / (parseFloat(od.betaShape) + parseFloat(od.betaScale));
                        else if (pDist === 'lognormal' && od.probLognormalMean) p = parseFloat(od.probLognormalMean);
                        else if (pDist === 'cni' && od.probCniMean) p = parseFloat(od.probCniMean);
                        if (p !== null && !isNaN(p)) {
                            const freq = 1 - Math.pow(1 - p, n);
                            return freq > 0 ? freq : null;
                        }
                    } else if (od.occurrenceModel.startsWith('screened')) {
                        return null; // screened — show dash
                    }
                }

                const events = getEffectiveEvents(hazardId, selectedFosId);
                if (!events || events.length === 0) return null;

                let total = 0;
                let hasHazardCurve = false;
                let curveMin = Infinity;
                let curveMax = -Infinity;

                events.forEach(ev => {
                    if (ev.occurrenceModel === 'frequency') {
                        let f = null;
                        const dist = ev.frequencyDistribution || '';
                        if (dist === 'point' && ev.pointEstimate)
                            f = parseFloat(ev.pointEstimate);
                        else if (dist === 'gamma' && ev.gammaShape && ev.gammaScale)
                            f = parseFloat(ev.gammaShape) * parseFloat(ev.gammaScale);
                        else if (dist === 'lognormal' && ev.lognormalMean)
                            f = parseFloat(ev.lognormalMean);
                        else if (dist === 'cni' && ev.cniMean)
                            f = parseFloat(ev.cniMean);
                        if (f !== null && !isNaN(f)) {
                            if (ev.frequencyUnits === '/hr') f = f * 8760;
                            total += f;
                        }
                    } else if (ev.occurrenceModel === 'nureg-2169-fire') {
                        const selections = ev.fireIgnitionSelections || {};
                        const selectedItems = NUREG2169_FIRE_IGNITION_DATA.filter(item => selections[item.bin]);
                        const tableTotal = selectedItems.reduce((sum, item) => sum + item.mean, 0);
                        const componentCount = ev.fireIgnitionComponentCount || 1;
                        const propagationFactor = parseFloat(ev.fireIgnitionPropagationFactor) || 1;
                        const finalMean = (tableTotal / componentCount) * propagationFactor;
                        if (finalMean > 0) total += finalMean;
                    } else if (ev.occurrenceModel === 'prob-per-opportunity') {
                        let prob = null;
                        const dist = ev.probabilityDistribution || 'cni';
                        if (dist === 'point' && ev.probPointEstimate)
                            prob = parseFloat(ev.probPointEstimate);
                        else if (dist === 'beta' && ev.betaShape && ev.betaScale)
                            prob = parseFloat(ev.betaShape) / (parseFloat(ev.betaShape) + parseFloat(ev.betaScale));
                        else if (dist === 'lognormal' && ev.probLognormalMean)
                            prob = parseFloat(ev.probLognormalMean);
                        else if (dist === 'cni' && ev.probCniMean)
                            prob = parseFloat(ev.probCniMean);
                        const opps = parseInt(ev.opportunitiesPerPeriod) || 0;
                        if (prob !== null && !isNaN(prob) && opps > 0) {
                            // Use 1 period/yr as a conservative default — SEQ has no schedule data
                            total += opps * 1 * prob;
                        }
                    } else if (ev.occurrenceModel === 'hazard-curve') {
                        hasHazardCurve = true;
                        (ev.hazardCurveData || []).forEach(row => {
                            if (row.frequency) {
                                const f = parseFloat(row.frequency);
                                if (!isNaN(f)) { curveMin = Math.min(curveMin, f); curveMax = Math.max(curveMax, f); }
                            }
                        });
                    }
                });

                if (hasHazardCurve && curveMin !== Infinity) {
                    return { isRange: true, min: curveMin, max: curveMax };
                }
                return total > 0 ? total : null;
            };

            // Returns true if a leaf passes text + script filters
            const leafMatchesFilter = (node) => {
                // text filter
                if (ieFilterText) {
                    const q = ieFilterText.toLowerCase();
                    if (!(node.name || '').toLowerCase().includes(q) && !(node.id || '').toLowerCase().includes(q)) return false;
                }
                // script filter
                if (ieFilterScript === 'has') {
                    if (!ieHasNonTrivialScript(node.id)) return false;
                }
                if (ieFilterScript === 'none') {
                    if (ieHasNonTrivialScript(node.id)) return false;
                }
                return true;
            };

            // True if the IE has an HTFW script with content beyond the FACILITY WORKS header
            // and comment lines. Used both to filter the IE list and to enlarge the displayed
            // frequency for IEs the analyst has actually started modelling.
            const ieHasNonTrivialScript = (ieId) => {
                const s = (ieScripts || {})[ieId];
                if (!s || !s.script) return false;
                return s.script.trim().replace(/^FACILITY WORKS[^\n]*\n?/, '').replace(/#[^\n]*/g, '').trim().length > 0;
            };

            // Returns true if a subtree has at least one visible (included) leaf for the selected FOS
            const subtreeHasIncluded = (node) => {
                if (!node.children || node.children.length === 0) {
                    if (!selectedFosId) return false;
                    const stateVal = hazardStates[`${node.id}_${selectedFosId}`] || 'unanalyzed';
                    return stateVal === 'included';
                }
                return node.children.some(subtreeHasIncluded);
            };

            const renderNode = (node, level) => {
                const hasChildren = node.children && node.children.length > 0;
                const indent = level * 16 + 6;
                if (hasChildren) {
                    // Skip group nodes whose entire subtree is screened/unanalyzed
                    if (selectedFosId && !subtreeHasIncluded(node)) return null;
                    const collapsed = collapsedGroups.has(node.id);
                    const visibleChildren = node.children.map(child => renderNode(child, level + 1)).filter(Boolean);
                    if (visibleChildren.length === 0) return null;
                    return (
                        <div key={node.id}>
                            <div
                                className="flex border-b cursor-pointer hover:bg-gray-100"
                                style={{ backgroundColor: '#f9fafb' }}
                                onClick={() => onToggleGroup(node.id)}
                            >
                                <div className="flex-1 py-1 px-2 font-semibold flex items-center text-xs" style={{ paddingLeft: `${indent}px` }}>
                                    <span style={{ display:'inline-block', width:'14px', fontSize:'9px', color:'#6b7280', marginRight:'4px', textAlign:'center', transition:'transform 0.15s', transform: collapsed ? 'rotate(-90deg)' : 'rotate(0deg)' }}>{'\u25BC'}</span>
                                    {node.name}
                                </div>
                                <div className="w-24 py-1 px-1 border-l flex-shrink-0 text-xs text-center text-gray-400"></div>
                            </div>
                            {!collapsed && visibleChildren}
                        </div>
                    );
                } else {
                    // Skip screened and unanalyzed leaf nodes
                    if (selectedFosId) {
                        const stateVal = hazardStates[`${node.id}_${selectedFosId}`] || 'unanalyzed';
                        if (stateVal !== 'included') return null;
                    }
                    // Apply text + script filters
                    if (!leafMatchesFilter(node)) return null;
                    const freq = calcFrequency(node.id);
                    const isSelected = selectedIeId === node.id;
                    // For IEs where the analyst has authored a non-trivial HTFW script,
                    // emphasise the frequency by rendering it 2pt larger than the GUI base.
                    const hasHtfwScript = ieHasNonTrivialScript(node.id);
                    const guiFontPt = fontSizePx(settings?.fontSize);
                    const emphFontStyle = hasHtfwScript ? { fontSize: `${guiFontPt + 2}pt` } : null;
                    return (
                        <div
                            key={node.id}
                            className="flex border-b cursor-pointer"
                            style={{ backgroundColor: isSelected ? '#fef08a' : '#eff6ff' }}
                            onClick={() => onSelectIe && onSelectIe(node.id)}
                            onMouseEnter={(e) => { if (!isSelected) e.currentTarget.style.backgroundColor = '#fef9c3'; }}
                            onMouseLeave={(e) => { e.currentTarget.style.backgroundColor = isSelected ? '#fef08a' : '#eff6ff'; }}
                        >
                            <div className="flex-1 py-1 text-xs flex items-center" style={{ paddingLeft: `${indent}px`, paddingRight: '4px' }}>
                                <span style={{ lineHeight: '1.3', fontWeight: isSelected ? '700' : '400' }}>{node.name}</span>
                            </div>
                            <div className="w-24 py-1 px-1 border-l flex-shrink-0 text-xs text-center font-mono flex items-center justify-center">
                                {freq !== null ? (
                                    freq.isRange ? (
                                        <span className="font-bold text-orange-600" style={hasHtfwScript ? emphFontStyle : { fontSize: '0.65rem' }}>
                                            {formatFrequency(freq.min)}&ndash;{formatFrequency(freq.max)}
                                        </span>
                                    ) : (
                                        <span className="font-bold text-blue-700" style={emphFontStyle || undefined}>{formatFrequency(freq)}</span>
                                    )
                                ) : (
                                    <span className="text-gray-300">&mdash;</span>
                                )}
                            </div>
                        </div>
                    );
                }
            };

            if (!hazards || hazards.length === 0) {
                return (
                    <div className="text-gray-400 text-xs text-center py-6 px-2">
                        Load a .KNOW_HA file to populate initiating events
                    </div>
                );
            }

            return (
                <div style={{ fontSize }}>
                    {/* Column header */}
                    <div className="flex border-b sticky top-0 z-10">
                        <div className="flex-1 py-1 px-2 text-xs font-semibold bg-blue-100">Initiating Events</div>
                        <div className="w-24 py-1 px-1 border-l flex-shrink-0 text-xs text-center font-semibold bg-yellow-100">
                            Freq (/yr)
                        </div>
                    </div>
                    {hazards.map(node => renderNode(node, 0))}
                </div>
            );
        }

        function IncludedHazardsTree({ hazards, hazardStates, hazardAnalysisData, pols, selectedPolId, onSelectPol, onCreatePol, operatingStates, filter, settings }) {
            const [expandedNodes, setExpandedNodes] = useState({});
            const [initialized, setInitialized] = useState(false);

            // Get font size from settings
            const fontSize = fontSizePt(settings?.fontSize);

            // Calculate frequency from applicable events
            const calculateFrequency = (analysisData) => {
                if (!analysisData || !analysisData.applicableEvents) return '';
                
                const frequencies = [];
                analysisData.applicableEvents.forEach(event => {
                    if (event.occurrenceModel === 'frequency') {
                        let freq = null;
                        
                        if (event.frequencyDistribution === 'point' && event.pointEstimate) {
                            freq = parseFloat(event.pointEstimate);
                        } else if (event.frequencyDistribution === 'gamma' && event.gammaShape && event.gammaScale) {
                            freq = parseFloat(event.gammaShape) * parseFloat(event.gammaScale);
                        } else if (event.frequencyDistribution === 'lognormal' && event.lognormalMean) {
                            freq = parseFloat(event.lognormalMean);
                        } else if (event.frequencyDistribution === 'cni' && event.cniMean) {
                            freq = parseFloat(event.cniMean);
                        }
                        
                        if (event.frequencyUnits === '/hr' && freq !== null) {
                            freq = freq * 8760;
                        }
                        
                        if (freq !== null && !isNaN(freq)) {
                            frequencies.push(freq);
                        }
                    } else if (event.occurrenceModel === 'nureg-2169-fire') {
                        // Handle NUREG-2169 Fire Ignition - sum of selected ignition sources
                        const selections = event.fireIgnitionSelections || {};
                        const selectedItems = NUREG2169_FIRE_IGNITION_DATA.filter(item => selections[item.bin]);
                        const totalMean = selectedItems.reduce((sum, item) => sum + item.mean, 0);
                        if (totalMean > 0) {
                            frequencies.push(totalMean);
                        }
                    }
                });
                
                if (frequencies.length === 0) return '';
                const total = frequencies.reduce((sum, f) => sum + f, 0);
                return total.toExponential(2);
            };

            // Get all included hazard-state combinations
            const getIncludedItems = () => {
                const included = [];
                
                // Helper function to check if an analysis is effectively screened
                const isAnalysisScreened = (analysis) => {
                    if (!analysis || !analysis.applicableEvents || analysis.applicableEvents.length === 0) {
                        return false;
                    }
                    // Check if ALL events are screened types
                    return analysis.applicableEvents.every(event => 
                        event.occurrenceModel === 'screened-low-freq' ||
                        event.occurrenceModel === 'screened-low-consequence' ||
                        event.occurrenceModel === 'screened-not-applicable'
                    );
                };
                
                // Helper to get the effective status considering useInfoFrom inheritance
                const getEffectiveStatus = (hazardId, stateId) => {
                    const key = `${hazardId}_${stateId}`;
                    const directStatus = hazardStates[key];
                    const analysis = hazardAnalysisData[key];
                    
                    // If this state uses info from another state, check the source
                    if (analysis && analysis.useInfoFrom) {
                        const sourceKey = `${hazardId}_${analysis.useInfoFrom}`;
                        const sourceStatus = hazardStates[sourceKey];
                        const sourceAnalysis = hazardAnalysisData[sourceKey];
                        
                        // If source is screened (either by status or by all events being screened), this is also screened
                        if (sourceStatus === 'screened') {
                            return 'screened';
                        }
                        if (isAnalysisScreened(sourceAnalysis)) {
                            return 'screened';
                        }
                    }
                    
                    // Check if the direct analysis has all screened events
                    if (directStatus === 'included' && isAnalysisScreened(analysis)) {
                        return 'screened';
                    }
                    
                    return directStatus;
                };
                
                const processNode = (node, parentPath = []) => {
                    const currentPath = [...parentPath, node.name];
                    
                    if (node.children && node.children.length > 0) {
                        // Category node - check if any children are included
                        let hasIncludedChildren = false;
                        node.children.forEach(child => {
                            const childResult = processNode(child, currentPath);
                            if (childResult) hasIncludedChildren = true;
                        });
                        return hasIncludedChildren;
                    } else {
                        // Leaf hazard node - check each operating state
                        let hazardIncluded = false;
                        operatingStates.forEach(state => {
                            // Apply filter
                            if (filter.states.length > 0 && !filter.states.includes(state.id)) {
                                return;
                            }
                            
                            const key = `${node.id}_${state.id}`;
                            const effectiveStatus = getEffectiveStatus(node.id, state.id);
                            
                            if (effectiveStatus === 'included') {
                                // Apply hazard name filter
                                if (filter.hazardIds.length > 0 && !filter.hazardIds.includes(node.id)) {
                                    return;
                                }
                                
                                // Apply showOnlyWithDiagrams filter
                                const hasDiagram = pols.some(p => p.hazardId === node.id && p.operatingStateId === state.id);
                                if (filter.showOnlyWithDiagrams && !hasDiagram) {
                                    return;
                                }
                                
                                hazardIncluded = true;
                                let analysis = hazardAnalysisData[key];
                                
                                // If this state uses info from another state, get the source analysis
                                if (analysis && analysis.useInfoFrom) {
                                    const sourceKey = `${node.id}_${analysis.useInfoFrom}`;
                                    analysis = hazardAnalysisData[sourceKey] || analysis;
                                }
                                
                                // Get name and eventDescription from first applicable event if available
                                // Always use node.name as the primary hazard name (from the hazard list)
                                // The event.name might be the same or might be different (eventDescription)
                                // eventDescription is additional descriptive info about the event
                                let eventName = node.name; // Always use the hazard list name as primary
                                let eventDescription = '';
                                if (analysis && analysis.applicableEvents && analysis.applicableEvents.length > 0) {
                                    const firstEvent = analysis.applicableEvents[0];
                                    // Only use firstEvent.name if it's explicitly set and different from eventDescription
                                    // Otherwise keep node.name as the display name
                                    if (firstEvent.name && firstEvent.name !== firstEvent.eventDescription) {
                                        eventName = firstEvent.name;
                                    }
                                    eventDescription = firstEvent.eventDescription || '';
                                }
                                
                                included.push({
                                    hazardId: node.id,
                                    hazardName: eventName,
                                    eventDescription: eventDescription,
                                    stateId: state.id,
                                    stateName: state.name,
                                    stateColor: state.color,
                                    frequency: calculateFrequency(analysis),
                                    path: currentPath,
                                    pol: pols.find(p => p.hazardId === node.id && p.operatingStateId === state.id)
                                });
                            }
                        });
                        return hazardIncluded;
                    }
                };

                if (hazards) {
                    hazards.forEach(node => processNode(node));
                }
                
                return included;
            };

            const includedItems = getIncludedItems();

            // Group by hazard category path
            const groupedItems = {};
            includedItems.forEach(item => {
                const categoryKey = item.path.slice(0, -1).join(' > ') || 'Hazards';
                if (!groupedItems[categoryKey]) {
                    groupedItems[categoryKey] = [];
                }
                groupedItems[categoryKey].push(item);
            });

            // Initialize all nodes as collapsed when there are many items
            // But expand all when showOnlyWithDiagrams filter is active
            useEffect(() => {
                if (filter.showOnlyWithDiagrams) {
                    // Always expand all when filtering for diagrams only
                    const expanded = {};
                    Object.keys(groupedItems).forEach(key => {
                        expanded[key] = true;
                    });
                    setExpandedNodes(expanded);
                } else if (!initialized && includedItems.length > 10) {
                    const collapsed = {};
                    Object.keys(groupedItems).forEach(key => {
                        collapsed[key] = false; // false = collapsed
                    });
                    setExpandedNodes(collapsed);
                    setInitialized(true);
                } else if (!initialized && includedItems.length <= 10) {
                    // Expand all if few items
                    const expanded = {};
                    Object.keys(groupedItems).forEach(key => {
                        expanded[key] = true;
                    });
                    setExpandedNodes(expanded);
                    setInitialized(true);
                }
            }, [includedItems.length, initialized, filter.showOnlyWithDiagrams]);

            // Auto-expand category containing the selected POL
            useEffect(() => {
                if (selectedPolId) {
                    // Find which category contains the selected POL
                    for (const [category, items] of Object.entries(groupedItems)) {
                        const hasSelectedPol = items.some(item => item.pol?.id === selectedPolId);
                        if (hasSelectedPol) {
                            setExpandedNodes(prev => ({ ...prev, [category]: true }));
                            break;
                        }
                    }
                }
            }, [selectedPolId]);

            const toggleExpand = (key) => {
                setExpandedNodes(prev => ({ ...prev, [key]: !prev[key] }));
            };

            if (includedItems.length === 0) {
                return (
                    <div className="text-gray-500 text-center py-4" style={{ fontSize }}>
                        No included hazards found in the HA file
                    </div>
                );
            }

            return (
                <div style={{ fontSize }}>
                    {Object.entries(groupedItems).map(([category, items]) => (
                        <div key={category}>
                            {/* Category header */}
                            <div 
                                className="flex items-center gap-1 px-2 py-1 bg-gray-100 cursor-pointer hover:bg-gray-200 font-medium"
                                onClick={() => toggleExpand(category)}
                            >
                                <span className="text-xs">{expandedNodes[category] ? '\u25BC' : '\u25B6'}</span>
                                <span className="truncate">{category}</span>
                                <span className="text-xs text-gray-500 ml-auto">({items.length})</span>
                            </div>
                            
                            {/* Hazard items */}
                            {expandedNodes[category] && items.map((item, idx) => {
                                const isSelected = item.pol && item.pol.id === selectedPolId;
                                const hasPol = !!item.pol;
                                
                                return (
                                    <div
                                        key={`${item.hazardId}-${item.stateId}-${idx}`}
                                        className={`flex items-center gap-2 px-3 py-1 cursor-pointer border-l-2 ${
                                            isSelected 
                                                ? 'bg-blue-100 border-blue-500' 
                                                : hasPol 
                                                    ? 'hover:bg-gray-50 border-green-400' 
                                                    : 'hover:bg-gray-50 border-gray-200'
                                        }`}
                                        onClick={() => {
                                            if (item.pol) {
                                                onSelectPol(item.pol.id);
                                            } else {
                                                // Create new POL for this hazard/state
                                                const hazard = { 
                                                    id: item.hazardId, 
                                                    name: item.hazardName,
                                                    eventDescription: item.eventDescription,
                                                    path: item.path
                                                };
                                                const state = operatingStates.find(s => s.id === item.stateId);
                                                onCreatePol(hazard, state, item.frequency);
                                            }
                                        }}
                                        title={`${item.hazardName} - ${item.stateName}${item.frequency ? ` (${item.frequency}/yr)` : ''}`}
                                    >
                                        <span 
                                            className="w-2 h-2 rounded-full flex-shrink-0"
                                            style={{ backgroundColor: item.stateColor }}
                                        />
                                        <span className={`flex-1 truncate ${hasPol ? 'font-bold' : ''}`}>{item.hazardName}</span>
                                        <span className="text-xs text-gray-500">{item.stateId}</span>
                                        {!hasPol && (
                                            <span className="text-xs text-blue-600">+</span>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    ))}
                </div>
            );
        }
