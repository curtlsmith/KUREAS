                        if (node.type === NODE_TYPES.FUNCTION && (adjOut2[nodeId] || []).length > 0) {
                            const lbl = node.label || '';
                            if (subTopEventsByLabel[lbl]) {
                                subNodeIdToCanonicalTeId[nodeId] = subTopEventsByLabel[lbl].id;
                            } else if (!subTopEventsSet.has(nodeId)) {
                                subTopEventsSet.add(nodeId);
                                const entry = { id: nodeId, label: lbl, description: node.description || '', knowFtlFileName: node.knowFtlFileName, moduleRawName: node.moduleRawName, distribution: node.distribution || undefined };
                                subTopEventsOrdered.push(entry);
                                subTopEventsByLabel[lbl] = entry;
                                subNodeIdToCanonicalTeId[nodeId] = nodeId;
                            }
                        }

                        if (node.type === NODE_TYPES.END_STATE) {
                            subSeqs.push({ path: newPath, endState: node.label, isTransfer: false });
                        } else if (node.type === NODE_TYPES.TRANSFER) {
                            subSeqs.push({ path: newPath, endState: node.label, isTransfer: true, transferTarget: node.transferTarget || node.label });
                        } else {
                            for (const edge of (adjOut2[nodeId] || [])) traverseSub(edge.to, newPath, newVis);
                        }
                    };
                    traverseSub(ieNode2.id, [], new Set());

                    // Build topEventOrder for each sub-sequence
                    subSeqs.forEach(seq => {
                        seq.topEventOrder = [];
                        let pos = 0;
                        for (let i = 0; i < seq.path.length; i++) {
                            const nid = seq.path[i];
                            const canonId = subNodeIdToCanonicalTeId[nid];
                            if (canonId !== undefined && !seq.topEventOrder.find(t => t.teId === canonId)) {
                                let branch = 'PASS';
                                if (i + 1 < seq.path.length) {
                                    const nextNid = seq.path[i + 1];
                                    const edge = (adjOut2[nid] || []).find(e => e.to === nextNid);
                                    branch = edge ? (edge.label || 'PASS') : 'PASS';
                                }
                                seq.topEventOrder.push({ teId: canonId, position: pos, branch });
                                pos++;
                            }
                        }
                    });

                    // Build failed events for target IE
                    const targetFailedByEs = (() => {
                        try {
                            const p = parseHTFWScript(targetIeName, targetScript, []);
                            return p.failedEventsByEndState || { '__global__': new Set() };
                        } catch (e) { return { '__global__': new Set() }; }
                    })();
                    const getTargetFailedEventsForEndState = (esName) => {
                        const esId2 = 'ES_' + (esName || '').replace(/[^a-zA-Z0-9_]/g, '_');
                        const global2 = targetFailedByEs['__global__'] || new Set();
                        const specific2 = targetFailedByEs[esId2] || new Set();
                        if (global2.size === 0 && specific2.size === 0) return null;
                        return new Set([...global2, ...specific2]);
                    };

                    // System resolvers (same as parent)
                    const sysByFile2 = {};
                    const sysByName2 = {};
                    Object.values(loadedSystems || {}).forEach(sys => {
                        if (!sys) return;
                        if (sys.fileName) sysByFile2[sys.fileName] = sys;
                        if (sys.systemName) sysByName2[sys.systemName] = sys;
                    });
                    const resolveSystem2 = (te, name) => {
                        if (te?.distribution) return makeDistSys(te);
                        if (te?.knowFtlFileName && sysByFile2[te.knowFtlFileName]) return sysByFile2[te.knowFtlFileName];
                        if (te?.moduleRawName && sysByName2[te.moduleRawName]) return sysByName2[te.moduleRawName];
                        if (sysByName2[name]) return sysByName2[name];
                        return null;
                    };
                    const quantMethod2 = (settings?.quantificationMethod || 'mcub').toLowerCase();

                    const results = [];
                    subSeqs.forEach((seq, si) => {
                        const subFailedEvents = getTargetFailedEventsForEndState(seq.endState);
                        const subCutSetItems = seq.topEventOrder
                            .filter(teo => teo.branch && teo.branch !== 'PASS')
                            .map(teo => {
                                const te = subTopEventsOrdered.find(t => t.id === teo.teId);
                                const occurred = teo.branch?.toUpperCase() === 'WORKS';
                                const name2 = te?.label || 'Unknown';
                                const sys2 = resolveSystem2(te, name2);
                                const teIsFailed2 = !occurred && subFailedEvents && subFailedEvents.has(name2);
                                const sysFailP2 = teIsFailed2 ? 1.0 : (sys2 ? quantifyCutSets(sys2.cutSets || [], sys2.eventInfo || {}, quantMethod2, subFailedEvents || null) : null);
                                let branchProb2;
                                if (occurred) { branchProb2 = (sysFailP2 === null || sysFailP2 === undefined) ? 1 : (1 - sysFailP2); }
                                else { branchProb2 = (sysFailP2 === null || sysFailP2 === undefined) ? null : sysFailP2; }
                                let systemExpansion2 = null;
                                if (!occurred) {
                                    if (teIsFailed2) {
                                        systemExpansion2 = { systemName: name2, fileName: '', cutSets: [{ index: 1, events: [name2], probability: 1.0 }] };
                                    } else if (sys2 && (sys2.cutSets || []).length > 0) {
                                        const sorted2 = sys2.cutSets.map(cs2 => {
                                            let dp = cs2.probability;
                                            if (subFailedEvents && subFailedEvents.size > 0) {
                                                const rc = calculateCutSetProbability(cs2.events || [], sys2.eventInfo || {}, subFailedEvents);
                                                if (rc !== null) dp = rc;
                                            }
                                            return { index: cs2.index, events: cs2.events || [], probability: dp };
                                        }).sort((a, b) => {
                                            const pa = a.probability !== null && !isNaN(a.probability) ? a.probability : -1;
                                            const pb = b.probability !== null && !isNaN(b.probability) ? b.probability : -1;
                                            return pb - pa;
                                        });
                                        sorted2.forEach((cs2, i2) => { cs2.index = i2 + 1; });
                                        systemExpansion2 = { systemName: sys2.systemName || name2, fileName: sys2.fileName || '', cutSets: sorted2 };
                                    }
                                }
                                return { teId: teo.teId, name: name2, description: te?.description || '', occurred, branch: teo.branch, position: teo.position, systemExpansion: systemExpansion2, branchProb: branchProb2, sysFailProb: sysFailP2 };
                            }).sort((a, b) => a.position - b.position);

                        // Combine prefix cut set items with sub-sequence items
                        const combinedCutSet = [...prefixCutSet, ...subCutSetItems];

                        // Combined probability
                        let subProb = prefixProb;
                        let subProbKnown = subProb !== null;
                        for (const it of subCutSetItems) {
                            if (it.branchProb === null || it.branchProb === undefined) { subProbKnown = false; break; }
                            subProb = subProb !== null ? subProb * it.branchProb : null;
                        }
                        const subSeqProb = subProbKnown ? subProb : null;
                        const subSeqFreq = (subSeqProb !== null && ieFreq !== null && ieFreq !== undefined && !isNaN(ieFreq)) ? ieFreq * subSeqProb : null;

                        if (seq.isTransfer) {
                            // Recursively expand this nested transfer
                            const nested = resolveTransferSequences(seq.transferTarget, combinedCutSet, subSeqProb, depth + 1, newVisited);
                            if (nested.length > 0) {
                                results.push({
                                    isTransferGroup: true,
                                    transferTarget: seq.transferTarget,
                                    subSequences: nested,
                                    parentSubIndex: si
                                });
                            } else {
                                results.push({ subIndex: si + 1, endState: seq.endState, cutSet: combinedCutSet, sequenceProb: subSeqProb, sequenceFreq: subSeqFreq, failedEvents: subFailedEvents, isTransfer: true, transferTarget: seq.transferTarget });
                            }
                        } else {
                            results.push({ subIndex: si + 1, endState: seq.endState, cutSet: combinedCutSet, sequenceProb: subSeqProb, sequenceFreq: subSeqFreq, failedEvents: subFailedEvents });
                        }
                    });
                    return results;
                };

                // Build lookup tables to resolve top events back to loaded systems.
                // We try, in order: KNOW_FTL filename, exact system name, raw module name, display name.
                const sysByFile = {};
                const sysByName = {};
                const sysByBaseName = {}; // normalized: lowercase, stripped of SYS_ prefix and .KNOW_FTL suffix
                Object.values(loadedSystems || {}).forEach(sys => {
                    if (!sys) return;
                    if (sys.fileName) sysByFile[sys.fileName] = sys;
                    if (sys.systemName) sysByName[sys.systemName] = sys;
                    // Index by normalized base name for fuzzy fallback matching
                    const norm = (s) => s.toLowerCase().replace(/^sys_/,'').replace(/\.know_ftl$/i,'').replace(/[-_\s]/g,'');
                    if (sys.systemName) sysByBaseName[norm(sys.systemName)] = sys;
                    if (sys.fileName)   sysByBaseName[norm(sys.fileName)]   = sys;
                });
                // Build a synthetic single-cut-set system from a distribution node
                const distSysCache = {};
                const makeDistSys = (te) => {
                    if (!te?.distribution) return null;
                    const name  = te.label;
                    const mean  = te.distribution.mean;
                    const distStr = te.distribution.str;
                    if (distSysCache[name]) return distSysCache[name];
                    const syn = {
                        systemName: name,
                        fileName: distStr,
                        cutSets: [{ index: 1, events: [name], probability: mean }],
                        eventInfo: { [name]: { probability: mean, description: distStr } },
                        _isDistribution: true,
                        _distStr: distStr
                    };
                    distSysCache[name] = syn;
                    return syn;
                };
                const resolveSystem = (te, name) => {
                    if (te?.distribution) return makeDistSys(te);
                    if (te?.knowFtlFileName && sysByFile[te.knowFtlFileName]) return sysByFile[te.knowFtlFileName];
                    if (te?.moduleRawName && sysByName[te.moduleRawName]) return sysByName[te.moduleRawName];
                    if (sysByName[name]) return sysByName[name];
                    const norm = (s) => (s||'').toLowerCase().replace(/^sys_/,'').replace(/\.know_ftl$/i,'').replace(/[-_\s]/g,'');
                    const normName = norm(name);
                    const normRaw  = norm(te?.moduleRawName || '');
                    return sysByBaseName[normName] || sysByBaseName[normRaw] || null;
                };

                // Parse FAILED() directives from the HtFW script for this initiating event.
                // failedByEs: { '__global__': Set<string>, [esId]: Set<string> }
                const htfwFailedByEs = (() => {
                    if (!htfwScript) return { '__global__': new Set() };
                    try {
                        const parsed = parseHTFWScript(htfwIeName || '', htfwScript, []);
                        return parsed.failedEventsByEndState || { '__global__': new Set() };
                    } catch (e) { return { '__global__': new Set() }; }
                })();

                // Build the effective FAILED set for a given endstate name:
                //   union of __global__ entries + entries for that specific end-state node id
                const getFailedEventsForEndState = (endStateName) => {
                    const esId = 'ES_' + (endStateName || '').replace(/[^a-zA-Z0-9_]/g, '_');
                    const global = htfwFailedByEs['__global__'] || new Set();
                    const specific = htfwFailedByEs[esId] || new Set();
                    if (global.size === 0 && specific.size === 0) return null;
                    return new Set([...global, ...specific]);
                };

                // Cache per-system failure probability so we don't recompute for each sequence
                // (and for both YES and NO uses of the same system).
                const quantMethod = (settings?.quantificationMethod || 'mcub').toLowerCase();
                const sysFailProbCache = new Map();
                const getSystemFailProb = (sys, failedEvents) => {
                    if (!sys) return null;
                    const feKey = failedEvents && failedEvents.size > 0 ? [...failedEvents].sort().join(',') : '';
                    const key = (sys.systemName || sys.fileName || '') + '|' + feKey;
                    if (sysFailProbCache.has(key)) return sysFailProbCache.get(key);
                    const p = quantifyCutSets(sys.cutSets || [], sys.eventInfo || {}, quantMethod, failedEvents || null);
                    sysFailProbCache.set(key, p);
                    return p;
                };

                return sortedSeqIndices.map((origSeqIdx, sortedIdx) => {
                    const seq = sequences[origSeqIdx];

                    // Determine the FAILED-event set for this sequence's end state
                    const seqFailedEvents = getFailedEventsForEndState(seq.endState);

                    // Build cut set in the order events occur in this specific sequence
                    const cutSet = seq.topEventOrder
                        .filter(teo => teo.branch && teo.branch !== 'PASS')
                        .map(teo => {
                            const te = topEvents.find(t => t.id === teo.teId);
                            const occurred = teo.branch?.toUpperCase() === 'WORKS';
                            const name = te?.label || 'Unknown';
                            const sys = resolveSystem(te, name);

                            // Check if this top event is itself named in FAILED() — if so its
                            // failure probability is forced to 1.0 and it expands as a single
                            // synthetic cut set [topEventName] rather than its system cut sets.
                            const teIsFailed = !occurred && seqFailedEvents && seqFailedEvents.has(name);

                            // System failure probability (if a loaded system corresponds to this top event).
                            // When the top event is FAILED, override to 1.0 regardless of system data.
                            const sysFailP = teIsFailed ? 1.0 : (sys ? getSystemFailProb(sys, seqFailedEvents) : null);

                            // Probability contribution of this branch to the sequence:
                            //   NO  branch  → P(system fails)              (or null if not computable)
                            //   YES branch  → 1 − P(system fails)          (or 1 if no system associated)
                            let branchProb;
                            if (occurred) {
                                branchProb = (sysFailP === null || sysFailP === undefined) ? 1 : (1 - sysFailP);
                            } else {
                                branchProb = (sysFailP === null || sysFailP === undefined) ? null : sysFailP;
                            }

                            // Down-branch system expansion for display.
                            let systemExpansion = null;
                            if (!occurred) {
                                if (teIsFailed) {
                                    // Top event is FAILED: represent as a single synthetic cut set
                                    // with the top event name as its only basic event, P = 1.0.
                                    systemExpansion = {
                                        systemName: name,
                                        fileName: '',
                                        cutSets: [{
                                            index: 1,
                                            events: [name],
                                            probability: 1.0
                                        }]
                                    };
                                } else if (sys && (sys.cutSets || []).length > 0) {
                                    const sysEventInfo = sys.eventInfo || {};
                                    const sorted = sys.cutSets.map(cs => {
                                            // Recompute probability applying FAILED overrides so the
                                            // displayed per-cut-set value reflects P=1.0 for failed events.
                                            // Also recompute when stored probability is null/undefined —
                                            // this covers cut sets with NOT- complement events whose
                                            // probability was null in the exported KNOW_FTL.
                                            let displayProb = cs.probability;
                                            const needsRecompute = displayProb === null || displayProb === undefined || isNaN(displayProb);
                                            if (seqFailedEvents && seqFailedEvents.size > 0) {
                                                const recomp = calculateCutSetProbability(cs.events || [], sysEventInfo, seqFailedEvents);
                                                if (recomp !== null) displayProb = recomp;
                                            } else if (needsRecompute) {
                                                const recomp = calculateCutSetProbability(cs.events || [], sysEventInfo, null);
                                                if (recomp !== null) displayProb = recomp;
                                            }
                                            return {
                                                index: cs.index,
                                                events: cs.events || [],
                                                probability: displayProb
                                            };
                                        }).sort((a, b) => {
                                            // Sort cut sets within this sequence highest probability first.
                                            const pa = a.probability !== null && a.probability !== undefined && !isNaN(a.probability) ? a.probability : -1;
                                            const pb = b.probability !== null && b.probability !== undefined && !isNaN(b.probability) ? b.probability : -1;
                                            return pb - pa;
                                        });
                                    // Re-index after sort so displayed numbers are always 1, 2, 3, …
                                    sorted.forEach((cs, i) => { cs.index = i + 1; });
                                    systemExpansion = {
                                        systemName: sys.systemName || name,
                                        fileName: sys.fileName || '',
                                        cutSets: sorted
                                    };
                                }
                            }
                            // Flag YES branches where the system is effectively always failed
                            // (sysFailP === 1.0), making success probability = 0.
                            const yesFailedWarning = occurred && sysFailP !== null && sysFailP !== undefined && sysFailP >= 1.0;
                            // Flag NO branches where the system is effectively always failed
                            // (sysFailP === 1.0), so the failure probability is 1.
                            const noFailedWarning = !occurred && sysFailP !== null && sysFailP !== undefined && sysFailP >= 1.0;

                            return {
                                teId: teo.teId,
                                name,
                                description: te?.description || '',
                                occurred,
                                branch: teo.branch,
                                position: teo.position,
                                systemExpansion,
                                branchProb,
                                sysFailProb: sysFailP,
                                yesFailedWarning,
                                noFailedWarning
                            };
                        })
                        .sort((a, b) => a.position - b.position); // Sort by position in sequence

                    // Sequence probability = product of branch probs (independence between branches).
                    // If any NO branch has no associated system, sequence probability is unknown.
                    let seqProb = 1;
                    let seqProbKnown = true;
                    for (const it of cutSet) {
                        if (it.branchProb === null || it.branchProb === undefined) { seqProbKnown = false; break; }
                        seqProb *= it.branchProb;
                    }
                    const sequenceProb = seqProbKnown ? seqProb : null;
                    const sequenceFreq = (sequenceProb !== null && ieFreq !== null && ieFreq !== undefined && !isNaN(ieFreq))
                        ? ieFreq * sequenceProb : null;

                    return {
                        sequenceNum: sortedIdx + 1, // New sequence number based on sorted position
                        endState: seq.endState,
                        cutSet: cutSet,
                        sequenceProb,
                        sequenceFreq,
                        failedEvents: seqFailedEvents,  // Set<string> | null — for display overrides
                        isTransfer: seq.isTransfer || false,
                        transferTarget: seq.isTransfer ? (seq.transferTarget || seq.endState) : undefined,
                        // For transfer sequences, also compute derived sub-sequences recursively
                        transferGroup: seq.isTransfer
                            ? resolveTransferSequences(seq.transferTarget || seq.endState, cutSet, sequenceProb, 0, new Set([(htfwIeName || '').toLowerCase()]))
                            : undefined
                    };
                });
            };
            
            const cutSets = generateCutSets();

            // ── Importance Measures ────────────────────────────────────────────
            // Computed from all sequences that have loaded-system expansions.
            // Basic events are drawn from the eventInfo of every loaded system.
            // F(baseline) = sum of sequenceFreq (or sequenceProb if no IE freq) over all sequences.
            // For each basic event: F(1) and F(0) are recomputed by overriding that event's
            // probability to 1.0 or 0.0 across ALL systems that contain it, then re-summing.
            const [imSortBy, setImSortBy] = React.useState('rir');
            const [imSortDir, setImSortDir] = React.useState('desc');
            const [imTarget, setImTarget] = React.useState('all'); // 'all' | 'seq:N' | 'es:EndStateName'

            // Derive unique end states from cutSets for the selector
            const imEndStates = React.useMemo(() => {
                if (!cutSets) return [];
                const seen = new Set();
                const result = [];
                cutSets.forEach(cs => {
                    if (cs.endState && !seen.has(cs.endState)) { seen.add(cs.endState); result.push(cs.endState); }
                });
                return result;
            }, [cutSets]);

            const importanceMeasures = React.useMemo(() => {
                // Need at least one sequence with a computable frequency/probability
                if (!cutSets || cutSets.length === 0) return [];
                if (!loadedSystems || Object.keys(loadedSystems).length === 0) return [];

                // Filter cutSets to the selected target
                const targetCutSets = (() => {
                    if (!imTarget || imTarget === 'all') return cutSets;
                    if (imTarget.startsWith('seq:')) {
                        const seqNum = parseInt(imTarget.slice(4), 10);
                        return cutSets.filter(cs => cs.sequenceNum === seqNum);
                    }
                    if (imTarget.startsWith('es:')) {
                        const esName = imTarget.slice(3);
                        return cutSets.filter(cs => cs.endState === esName);
                    }
                    return cutSets;
                })();
                if (targetCutSets.length === 0) return [];

                const quantMethod = (settings?.quantificationMethod || 'mcub').toLowerCase();
                const useFreq = targetCutSets.some(cs => cs.sequenceFreq !== null && cs.sequenceFreq !== undefined && !isNaN(cs.sequenceFreq));
                const getValue = (cs) => useFreq ? cs.sequenceFreq : cs.sequenceProb;

                // Collect all unique basic events with their info across all loaded systems
                const allEvents = new Map(); // eventName -> { description, probability, systems: [{sys, sysKey}] }
                Object.entries(loadedSystems || {}).forEach(([sysKey, sys]) => {
                    if (!sys || !sys.eventInfo || !sys.cutSets) return;
                    Object.entries(sys.eventInfo).forEach(([evName, ed]) => {
                        if (ed.probability === null || ed.probability === undefined) return;
                        if (!allEvents.has(evName)) {
                            allEvents.set(evName, { description: ed.description || '', probability: ed.probability, systems: [] });
                        }
                        allEvents.get(evName).systems.push({ sysKey, sys });
                    });
                });

                if (allEvents.size === 0) return [];

                // Helper: compute sequence value with an event overridden
                const computeSeqValue = (cs, overrideEvent, overrideProb) => {
                    // For each item in the sequence's cutSet that has a systemExpansion,
                    // re-quantify that system with the override applied.
                    // Then recompute the sequence probability as the product of branch probs.
                    let seqProbKnown = true;
                    let seqProb = 1;
                    for (const item of cs.cutSet) {
                        let branchProb;
                        if (item.branchProb === null || item.branchProb === undefined) {
                            // No system associated — if item.occurred, branchProb = 1; else unknown
                            if (item.occurred) {
                                branchProb = 1;
                            } else {
                                seqProbKnown = false;
                                break;
                            }
                        } else {
                            // Has a known branchProb. If this item's system contains the event,
                            // re-quantify it with the override.
                            const sysName = item.systemExpansion?.systemName;
                            const sysFile = item.systemExpansion?.fileName;
                            const sys = Object.values(loadedSystems || {}).find(s =>
                                (sysFile && s.fileName === sysFile) || (sysName && s.systemName === sysName)
                            );
                            if (sys && sys.eventInfo && overrideEvent in sys.eventInfo) {
                                // Build patched eventInfo
                                const patchedEventInfo = Object.assign({}, sys.eventInfo, {
                                    [overrideEvent]: Object.assign({}, sys.eventInfo[overrideEvent], { probability: overrideProb })
                                });
                                const sysFailP = quantifyCutSets(sys.cutSets || [], patchedEventInfo, quantMethod, cs.failedEvents || null);
                                if (sysFailP === null) { seqProbKnown = false; break; }
                                branchProb = item.occurred ? (1 - sysFailP) : sysFailP;
                            } else {
                                branchProb = item.branchProb;
                            }
                        }
                        seqProb *= branchProb;
                    }
                    if (!seqProbKnown) return null;
                    return useFreq && cs.sequenceFreq !== null
                        ? (ieFreq !== null && ieFreq !== undefined && !isNaN(ieFreq) ? ieFreq * seqProb : null)
                        : seqProb;
                };

                // Baseline: sum of sequence values
                const baselineSeqValues = targetCutSets.map(cs => getValue(cs));
                const fBaseline = baselineSeqValues.every(v => v === null) ? null :
                    baselineSeqValues.reduce((s, v) => (v !== null ? s + v : s), 0);

                if (fBaseline === null || fBaseline === 0) return [];

                const results = [];
                allEvents.forEach((evData, evName) => {
                    // Compute F(1): set event probability to 1
                    const vals1 = targetCutSets.map(cs => computeSeqValue(cs, evName, 1.0));
                    const f1 = vals1.every(v => v === null) ? null : vals1.reduce((s, v) => (v !== null ? s + v : s), 0);

                    // Compute F(0): set event probability to 0
                    const vals0 = targetCutSets.map(cs => computeSeqValue(cs, evName, 0.0));
                    const f0 = vals0.every(v => v === null) ? null : vals0.reduce((s, v) => (v !== null ? s + v : s), 0);

                    if (f1 === null || f0 === null) return;

                    const rir = f1 / fBaseline;
                    const rrrRaw = f0 === 0 ? Infinity : fBaseline / f0;
                    const pc = rrrRaw === Infinity ? 1.0 : (1 - 1 / rrrRaw);
                    const swim = pc + Math.pow(1 - (1 / rir), 7.64);

                    results.push({
                        event: evName,
                        description: evData.description,
                        probability: evData.probability,
                        rir,
                        rrr: rrrRaw === Infinity ? 999 : rrrRaw,
                        pc,
                        swim
                    });
                });

                return results;
            }, [cutSets, loadedSystems, settings, ieFreq, imTarget]);

            // Initialize with all nodes expanded
            useEffect(() => {
                if (sequenceTree) {
                    const allIds = new Set();
                    const collect = (node) => {
                        if (node.children && node.children.length > 0) {
                            allIds.add(node.id);
                            node.children.forEach(collect);
                        }
                    };
                    collect(sequenceTree);
                    setExpandedNodes(allIds);
                }
            }, [pol]);

            // Handle resizer drag
            const handleResizeStart = (e) => {
                isDraggingRef.current = true;
                document.addEventListener('mousemove', handleResizeMove);
                document.addEventListener('mouseup', handleResizeEnd);
            };

            const handleResizeMove = (e) => {
                if (!isDraggingRef.current) return;
                const container = resizerRef.current?.parentElement;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                const newWidth = ((e.clientX - rect.left) / rect.width) * 100;
                setLeftPaneWidth(Math.min(Math.max(newWidth, 20), 80));
            };

            const handleResizeEnd = () => {
                isDraggingRef.current = false;
                document.removeEventListener('mousemove', handleResizeMove);
                document.removeEventListener('mouseup', handleResizeEnd);
            };

            // Toggle node expansion
            const toggleNode = (nodeId) => {
                setExpandedNodes(prev => {
                    const next = new Set(prev);
                    if (next.has(nodeId)) {
                        next.delete(nodeId);
                    } else {
                        next.add(nodeId);
                    }
                    return next;
                });
            };

            // Expand all nodes
            const expandAll = () => {
                if (!sequenceTree) return;
                const allIds = new Set();
                const collect = (node) => {
                    if (node.children && node.children.length > 0) {
                        allIds.add(node.id);
                        node.children.forEach(collect);
                    }
                };
                collect(sequenceTree);
                setExpandedNodes(allIds);
            };

            // Collapse all nodes
            const collapseAll = () => {
                setExpandedNodes(new Set());
            };

            // Get node type icon and color
            const getNodeStyle = (type) => {
                switch (type) {
                    case NODE_TYPES.INITIATING_EVENT:
                        return { icon: '\u25B6', color: 'text-red-600', bgColor: 'bg-red-50' };
                    case NODE_TYPES.FUNCTION:
                        return { icon: '\u25A0', color: 'text-blue-600', bgColor: 'bg-blue-50' };
                    case NODE_TYPES.TRANSITION:
                        return { icon: '\u25CF', color: 'text-purple-600', bgColor: 'bg-purple-50' };
                    case NODE_TYPES.END_STATE:
                        return { icon: '\u25C0', color: 'text-green-600', bgColor: 'bg-green-50' };
                    default:
                        return { icon: '\u25A1', color: 'text-gray-600', bgColor: 'bg-gray-50' };
                }
            };

            // Render tree node recursively
            const renderTreeNode = (node, depth = 0) => {
                const hasChildren = node.children && node.children.length > 0;
                const isExpanded = expandedNodes.has(node.id);
                const style = getNodeStyle(node.type);

                return (
                    <div key={node.id} style={{ marginLeft: depth * 20 }}>
                        <div 
                            className={`flex items-center gap-2 py-1 px-2 rounded cursor-pointer hover:bg-gray-100 ${style.bgColor}`}
                            onClick={() => hasChildren && toggleNode(node.id)}
                        >
                            {hasChildren ? (
                                <span className="w-4 text-center text-gray-500">
                                    {isExpanded ? '\u25BC' : '\u25B6'}
                                </span>
                            ) : (
                                <span className="w-4"></span>
                            )}
                            <span className={style.color}>{style.icon}</span>
                            {node.connectionLabel && (
                                <span className="text-xs px-1 bg-yellow-100 text-yellow-700 rounded">
                                    {node.connectionLabel}
                                </span>
                            )}
                            <span className="font-medium">{node.label}</span>
                            {node.type === NODE_TYPES.END_STATE && (
                                <span className="text-xs text-green-600 ml-auto">Endstate</span>
                            )}
                        </div>
                        {hasChildren && isExpanded && (
                            <div>
                                {node.children.map(child => renderTreeNode(child, depth + 1))}
                            </div>
                        )}
                    </div>
                );
            };

            // Copy event tree canvas as a cropped PNG
            const handleCanvasCopy = async () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                try {
                    // Compute natural (unscaled, unpadded) content size — same formula as drawEventTree
                    const numSequences = sequences.length;
                    const numTopEvents = topEvents.length;
                    if (numSequences === 0) return;
                    const rowHeight = 40, minIeBoxWidth = 150, minTeBoxWidth = 120, minEndBoxWidth = 110;
                    const maxBoxWidth = 240, boxHeight = 48, leftMargin = 20, topMargin = 20, teGap = 10, labelHPadding = 10;
                    const tmpCanvas = document.createElement('canvas');
                    tmpCanvas.width = 1; tmpCanvas.height = 1;
                    const tmpCtx = tmpCanvas.getContext('2d');
                    const measureMax = (labels, font) => {
                        tmpCtx.font = font;
                        return labels.reduce((m, l) => Math.max(m, l ? tmpCtx.measureText(l).width : 0), 0);
                    };
                    const ieBoxWidth  = Math.min(maxBoxWidth, Math.max(minIeBoxWidth,  Math.ceil(measureMax([sequenceTree?.label||'IE'], 'bold 9px Arial') + labelHPadding*2)));
                    const teBoxWidth  = Math.min(maxBoxWidth, Math.max(minTeBoxWidth,  Math.ceil(measureMax(topEvents.map(t=>t.label||''), 'bold 8px Arial') + labelHPadding*2)));
                    const endBoxWidth = Math.min(maxBoxWidth, Math.max(minEndBoxWidth, Math.ceil(measureMax(sequences.map(s=>s.endState||''), '8px Arial') + labelHPadding*2)));
                    const naturalWidth  = leftMargin + ieBoxWidth + 20 + (numTopEvents*(teBoxWidth+teGap)) + 20 + endBoxWidth + 55;
                    const naturalHeight = topMargin + boxHeight + 25 + (numSequences*rowHeight) + 30;

                    // Render into a tight offscreen canvas at 2x resolution.
                    // Source rect on the live canvas: content starts at panOffset and is
                    // scaled by effectiveZoom, so we read exactly naturalWidth*zoom x naturalHeight*zoom
                    // pixels starting at panOffset (clamped to 0 since autoFit has no pan).
                    const xform = lastDrawTransformRef.current || { zoom: 1, panX: 0, panY: 0 };
                    const srcX = Math.max(0, xform.panX);
                    const srcY = Math.max(0, xform.panY);
                    const srcW = naturalWidth  * xform.zoom;
                    const srcH = naturalHeight * xform.zoom;
                    const scale = 2;
                    const offscreen = document.createElement('canvas');
                    offscreen.width  = naturalWidth  * scale;
                    offscreen.height = naturalHeight * scale;
                    const offCtx = offscreen.getContext('2d');
                    offCtx.fillStyle = '#ffffff';
                    offCtx.fillRect(0, 0, offscreen.width, offscreen.height);
                    offCtx.drawImage(canvas, srcX, srcY, srcW, srcH, 0, 0, offscreen.width, offscreen.height);

                    offscreen.toBlob(async (blob) => {
                        if (!blob) { setCanvasCopyMsg('Failed'); setTimeout(() => setCanvasCopyMsg(''), 2000); return; }
                        try {
                            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                            setCanvasCopyMsg('Copied!');
                            setTimeout(() => setCanvasCopyMsg(''), 1800);
                        } catch(e) {
                            console.error('Canvas copy failed:', e);
                            setCanvasCopyMsg('Failed');
                            setTimeout(() => setCanvasCopyMsg(''), 2000);
                        }
                    }, 'image/png');
                } catch(e) {
                    console.error('Canvas copy error:', e);
                    setCanvasCopyMsg('Failed');
                    setTimeout(() => setCanvasCopyMsg(''), 2000);
                }
            };

            // Draw event tree on canvas - using backwards algorithm like KUREAS-ETL
            const drawEventTree = () => {
                if (!canvasRef.current) return;
                
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const container = canvasContainerRef.current;
                if (!container) return;
                
                const numSequences = sequences.length;
                const numTopEvents = topEvents.length;
                
                if (numSequences === 0) return;
                
                // Dimensions (these are MINIMUM widths — boxes will grow to fit the longest
                // label in each category so we never have to truncate names).
                const rowHeight = 40;
                const minIeBoxWidth = 150;
                const minTeBoxWidth = 120;
                const minEndBoxWidth = 110;
                const maxBoxWidth = 240; // cap so a single huge name doesn't dominate
                const boxHeight = 48;
                const leftMargin = 20;
                const topMargin = 20;
                const teGap = 10;
                const labelHPadding = 10; // padding inside box around the wrapped label

                // Helper: measure the maximum rendered width of one or more labels at a font.
                // Used so each column is sized to its widest label (no truncation).
                const measureMaxWidth = (labels, fontSpec) => {
                    ctx.font = fontSpec;
                    let max = 0;
                    for (const lbl of labels) {
                        if (!lbl) continue;
                        const w = ctx.measureText(lbl).width;
                        if (w > max) max = w;
                    }
                    return max;
                };

                // Compute box widths from actual label sizes, clamped to [min, max].
                const ieLabelStr = (sequenceTree?.label || 'IE');
                const ieMeasured = measureMaxWidth([ieLabelStr], 'bold 9px Arial');
                const ieBoxWidth = Math.min(maxBoxWidth, Math.max(minIeBoxWidth, Math.ceil(ieMeasured + labelHPadding * 2)));

                const teMeasured = measureMaxWidth(topEvents.map(t => t.label || ''), 'bold 8px Arial');
                const teBoxWidth = Math.min(maxBoxWidth, Math.max(minTeBoxWidth, Math.ceil(teMeasured + labelHPadding * 2)));

                const endMeasured = measureMaxWidth(sequences.map(s => s.endState || ''), '8px Arial');
                const endBoxWidth = Math.min(maxBoxWidth, Math.max(minEndBoxWidth, Math.ceil(endMeasured + labelHPadding * 2)));

                // Natural content size (unchanged formula, just uses the new dynamic widths)
                const naturalWidth = leftMargin + ieBoxWidth + 20 + (numTopEvents * (teBoxWidth + teGap)) + 20 + endBoxWidth + 55;
                const naturalHeight = topMargin + boxHeight + 25 + (numSequences * rowHeight) + 30;

                // Auto-fit to container width when the user hasn't zoomed or panned.
                // We scale up as well as down so the diagram always fills the available width.
                const isPristine = (zoom === 1 && panOffset.x === 0 && panOffset.y === 0);
                const autoFit = isPristine && container.clientWidth > 0
                    ? container.clientWidth / naturalWidth
                    : null;
                const effectiveZoom = autoFit !== null ? autoFit : zoom;

                // Canvas physical size: when auto-fitting, size the canvas to the container so
                // the scaled drawing fills the visible area (no extra empty space, no overflow).
                if (autoFit !== null) {
                    canvas.width  = container.clientWidth;
                    canvas.height = Math.max(naturalHeight * autoFit, container.clientHeight);
                } else {
                    canvas.width  = Math.max(naturalWidth, container.clientWidth);
                    canvas.height = Math.max(naturalHeight, container.clientHeight);
                }

                // Clear canvas
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Apply zoom and pan
                ctx.save();
                ctx.translate(panOffset.x, panOffset.y);
                ctx.scale(effectiveZoom, effectiveZoom);
                // Stash the transform so hit-testing can run the inverse without recomputing.
                lastDrawTransformRef.current = { zoom: effectiveZoom, panX: panOffset.x, panY: panOffset.y };
                
                // Calculate positions
                const ieX = leftMargin;
                const ieY = topMargin;
                const ieCenterX = ieX + ieBoxWidth / 2;
                
                const teStartX = ieX + ieBoxWidth + 25;
                const teY = ieY;
                const teCenterXs = topEvents.map((te, idx) => teStartX + idx * (teBoxWidth + teGap) + teBoxWidth / 2);
                
                const endHeaderX = teStartX + numTopEvents * (teBoxWidth + teGap);
                const endCenterX = endHeaderX + endBoxWidth / 2;
                
                const sequenceStartY = ieY + boxHeight + 25;
                const endStateYs = sequences.map((seq, idx) => sequenceStartY + idx * rowHeight);
                
                // Helper: wrap text to multiple lines
                const wrapText = (text, maxWidth, fontSize) => {
                    if (!text) return [];
                    ctx.font = `${fontSize}px Arial`;
                    const words = text.split(' ');
                    const lines = [];
                    let currentLine = '';
                    
                    words.forEach(word => {
                        const testLine = currentLine ? currentLine + ' ' + word : word;
                        const metrics = ctx.measureText(testLine);
                        if (metrics.width > maxWidth && currentLine) {
                            lines.push(currentLine);
                            currentLine = word;
                        } else {
                            currentLine = testLine;
                        }
                    });
                    if (currentLine) lines.push(currentLine);
                    return lines;
                };
                
                // Helper: get branch key for a sequence up to a top event index
                const getBranchKey = (seqIdx, teIdx) => {
                    const seq = sequences[seqIdx];
                    let key = '';
                    for (let i = 0; i < teIdx; i++) {
                        const branch = seq.decisions[i]?.branch || 'PASS';
                        if (branch !== 'PASS') {
                            key += branch[0];
                        }
                    }
                    return key;
                };
                
                // Calculate branch midpoints for each top event
                const branchMidYs = [];
                for (let teIdx = 0; teIdx < numTopEvents; teIdx++) {
                    branchMidYs.push({});
                }
                
                // Use the pre-sorted sequence indices from component level
                // Calculate endStateYs based on sorted order
                const sortedEndStateYs = {};
                sortedSeqIndices.forEach((origIdx, sortedIdx) => {
                    sortedEndStateYs[origIdx] = sequenceStartY + sortedIdx * rowHeight;
                });
                
                const calculateBranchMidPoint = (seqIdx, teIdx) => {
                    const branchKey = getBranchKey(seqIdx, teIdx);
                    
                    const matchingSeqs = [];
                    for (let i = 0; i < numSequences; i++) {
                        if (getBranchKey(i, teIdx) === branchKey) {
                            matchingSeqs.push(i);
                        }
                    }
                    
                    const matchingYs = matchingSeqs.map(i => sortedEndStateYs[i]);
                    return (Math.min(...matchingYs) + Math.max(...matchingYs)) / 2;
                };
                
                // Find transition X positions based on their position in the sequence
                const getTransitionXForSequence = (seq) => {
                    const transitionPositions = [];
                    if (!seq.transitionInfo) return transitionPositions;
                    
                    seq.transitionInfo.forEach(ti => {
                        // Find the position of this transition in the sequence
                        const transitionPos = ti.position;
                        
                        // Find the top event that comes after this transition position
                        // The transition label should appear between top events
                        let xPos = endHeaderX - 50; // Default to near end
                        
                        // Find which top event positions this transition falls between
                        for (let teIdx = 0; teIdx < topEvents.length; teIdx++) {
                            const te = topEvents[teIdx];
                            const teOrder = seq.topEventOrder.find(teo => teo.teId === te.id);
                            if (teOrder && teOrder.position > transitionPos) {
                                // This top event comes after the transition
                                xPos = teCenterXs[teIdx] - (teBoxWidth + teGap) / 2;
                                break;
                            }
                        }
                        
                        transitionPositions.push({ x: xPos, operatingState: ti.operatingState });
                    });
                    return transitionPositions;
                };
                
                // Calculate all line segments for each sequence (working backwards from end state)
                const allSegments = [];
                
                for (let seqIdx = 0; seqIdx < numSequences; seqIdx++) {
                    const seq = sequences[seqIdx];
                    const segments = [];
                    let currentY = sortedEndStateYs[seqIdx];
                    let currentX = endCenterX;
                    
                    // Work backwards through top events
                    for (let teIdx = numTopEvents - 1; teIdx >= 0; teIdx--) {
                        const teX = teCenterXs[teIdx];
                        const decision = seq.decisions[teIdx];
                        const branch = decision?.branch || 'PASS';
                        
                        if (branch === 'PASS') {
                            segments.push({
                                x1: currentX, y1: currentY,
                                x2: teX, y2: currentY,
                                type: 'horizontal'
                            });
                            currentX = teX;
                        } else {
                            segments.push({
                                x1: currentX, y1: currentY,
                                x2: teX, y2: currentY,
                                type: 'horizontal'
                            });
                            
                            const branchKey = getBranchKey(seqIdx, teIdx);
                            let midY;
                            if (branchMidYs[teIdx][branchKey] !== undefined) {
                                midY = branchMidYs[teIdx][branchKey];
                            } else {
                                midY = calculateBranchMidPoint(seqIdx, teIdx);
                                branchMidYs[teIdx][branchKey] = midY;
                            }
                            
                            segments.push({
                                x1: teX, y1: currentY,
                                x2: teX, y2: midY,
                                type: 'branch',
                                branch: branch
                            });
                            
                            currentY = midY;
                            currentX = teX;
                        }
                    }
                    
                    // Final horizontal to IE
                    segments.push({
                        x1: currentX, y1: currentY,
                        x2: ieCenterX, y2: currentY,
                        type: 'horizontal'
                    });
                    
                    // Store transition positions for this sequence
                    segments.transitionPositions = getTransitionXForSequence(seq);
                    segments.seqY = sortedEndStateYs[seqIdx];
                    segments.seqIdx = seqIdx;
                    
                    allSegments.push(segments);
                }
                
                // Draw IE box
                ctx.fillStyle = '#fef3c7';
                ctx.strokeStyle = '#f59e0b';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(ieX, ieY, ieBoxWidth, boxHeight, 4);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#1f2937';
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const ieLabel = sequenceTree?.label || 'IE';
                const ieLabelLines = wrapText(ieLabel, ieBoxWidth - labelHPadding, 9);
                // Use the same label line height (10px) and description offset (+4) as the top
                // event boxes so the description text aligns vertically across all boxes in the
                // same row. ieY === teY, so equal offsets keep the rows visually aligned.
                const ieLabelLineH = 10;
                ieLabelLines.slice(0, 2).forEach((line, i) => {
                    ctx.fillText(line, ieCenterX, ieY + 12 + i * ieLabelLineH);
                });
                const ieLabelBottomY = ieY + 12 + Math.min(ieLabelLines.length, 2) * ieLabelLineH;

                // Draw IE description (freq is drawn separately, above the trunk line)
                if (sequenceTree?.description) {
                    ctx.font = '8px Arial';
                    ctx.fillStyle = '#1f2937';
                    const descLines = wrapText(sequenceTree.description, ieBoxWidth - 10, 8);
                    descLines.slice(0, 3).forEach((line, idx) => {
                        ctx.fillText(line, ieCenterX, ieLabelBottomY + 4 + idx * 10);
                    });
                }
                
                // Draw top event boxes (Functions only)
                topEvents.forEach((te, idx) => {
                    const teBoxX = teStartX + idx * (teBoxWidth + teGap);
                    const teCenterX = teCenterXs[idx];
                    
                    ctx.fillStyle = '#dbeafe';
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(teBoxX, teY, teBoxWidth, boxHeight, 4);
                    ctx.fill();
                    ctx.stroke();
                    
                    // Top event name (smaller) — wrap rather than truncate
                    ctx.fillStyle = '#1f2937';
                    ctx.font = 'bold 8px Arial';
                    ctx.textAlign = 'center';
                    const teLabelLines = wrapText(te.label || '', teBoxWidth - labelHPadding, 8);
                    const teLineH = 10;
                    teLabelLines.slice(0, 2).forEach((line, i) => {
                        ctx.fillText(line, teCenterX, teY + 12 + i * teLineH);
                    });
                    const teLabelBottomY = teY + 12 + Math.min(teLabelLines.length, 2) * teLineH;

                    // Top event description with wrapping
                    if (te.description) {
                        ctx.font = '8px Arial';
                        ctx.fillStyle = '#1f2937'; // Black for readability
                        const descLines = wrapText(te.description, teBoxWidth - 8, 8);
                        descLines.slice(0, 4).forEach((line, idx) => {
                            ctx.fillText(line, teCenterX, teLabelBottomY + 4 + idx * 10);
                        });
                    }
                });
                
                // Draw "End States" header
                ctx.fillStyle = '#d1fae5';
                ctx.strokeStyle = '#22c55e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(endHeaderX, ieY, endBoxWidth, boxHeight, 4);
                ctx.fill();
                ctx.stroke();
                
                ctx.fillStyle = '#1f2937';
                ctx.font = 'bold 9px Arial';
                ctx.fillText('End States', endCenterX, ieY + boxHeight / 2);
                
                // Draw all sequence lines
                ctx.strokeStyle = '#64748b';
                ctx.lineWidth = 2;

                allSegments.forEach((segments, idx) => {
                    segments.forEach(seg => {
                        if (seg.type === 'horizontal' || seg.type === 'branch') {
                            ctx.beginPath();
                            ctx.moveTo(seg.x1, seg.y1);
                            ctx.lineTo(seg.x2, seg.y2);
                            ctx.stroke();

                            // Draw branch label (YES/NO) — pinned near branch start
                            if (seg.type === 'branch' && seg.branch && seg.branch.toUpperCase() !== 'PASS') {
                                const normBranch = seg.branch.toUpperCase();
                                // In backward traversal: a branch leaving an UPPER trunk has y2 > y1
                                // (going down) — the line is ABOVE at y1, so label sits below it.
                                // A branch arriving at a LOWER trunk has y2 < y1 — the line is
                                // BELOW at y1, so label sits above it. We use textBaseline='bottom'
                                // when the label is above a line, so the y we pass is the bottom
                                // edge of the text and there's a predictable gap to the line.
                                const labelX = seg.x1 + 3;
                                const aboveLine = seg.y2 < seg.y1; // label sits above seg.y1
                                ctx.fillStyle = normBranch === 'WORKS' ? '#16a34a' : '#dc2626';
                                ctx.font = 'bold 8px Arial';
                                ctx.textAlign = 'left';
                                if (aboveLine) {
                                    ctx.textBaseline = 'bottom';
                                    ctx.fillText(normBranch === 'WORKS' ? 'WORKS' : 'FAILS', labelX, seg.y1 - 3);
                                } else {
                                    ctx.textBaseline = 'top';
                                    ctx.fillText(normBranch === 'WORKS' ? 'WORKS' : 'FAILS', labelX, seg.y1 + 4);
                                }
                                ctx.textBaseline = 'alphabetic'; // restore default for subsequent text
                            }
                        }
                    });

                    // Draw transition operating state labels on the sequence line (moved right to avoid overlap)
                    if (segments.transitionPositions && segments.transitionPositions.length > 0) {
                        segments.transitionPositions.forEach(tp => {
                            ctx.fillStyle = '#7c3aed';
                            ctx.font = 'italic 8px Arial';
                            ctx.textAlign = 'left';
                            ctx.fillText(tp.operatingState, tp.x + 15, segments.seqY - 8);
                        });
                    }
                });

                // Draw IE frequency directly above the trunk line that emerges from the IE box.
                // The trunk is the highest horizontal segment whose right endpoint is ieCenterX —
                // i.e. the last "Final horizontal to IE" segment of any sequence. Multiple sequences
                // sharing the trunk produce the same y; we take the topmost just in case.
                if (ieFreq !== null && ieFreq !== undefined && !isNaN(ieFreq)) {
                    let trunkY = null;
                    allSegments.forEach(segs => {
                        segs.forEach(seg => {
                            if (seg.type === 'horizontal' && Math.abs(seg.x2 - ieCenterX) < 0.5) {
                                if (trunkY === null || seg.y1 < trunkY) trunkY = seg.y1;
                            }
                        });
                    });
                    if (trunkY !== null) {
                        // Draw IE frequency just above the trunk (first sequence) line,
                        // left edge aligned with ieCenterX (where sequence lines emerge from the IE).
                        ctx.font = 'bold 12px Arial';
                        ctx.fillStyle = '#1f2937';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'alphabetic';
                        ctx.fillText(`Frequency = ${fmt(ieFreq)}/yr`, ieCenterX, trunkY - 4);
                    }
                }
                
                // Helper: get fill/stroke for an end-state outcome
                const esColors = {
                    positive:   { fill: '#bbf7d0', stroke: '#15803d' },
                    negative:   { fill: '#fecaca', stroke: '#dc2626' },
                    unanalyzed: { fill: '#e5e7eb', stroke: '#6b7280' }
                };
                const getEsColors = (endStateLabel) => {
                    // Look up outcome from the pol node whose label matches
                    const matchNode = pol.nodes && pol.nodes.find(n =>
                        n.type === NODE_TYPES.END_STATE && n.label === endStateLabel
                    );
                    const outcome = matchNode?.outcome || 'unanalyzed';
                    return esColors[outcome] || esColors.unanalyzed;
                };

                // Draw end state boxes using sorted order - iterate by sorted position
                endStateHitsRef.current = []; // rebuild every draw since geometry depends on data
                sortedSeqIndices.forEach((origSeqIdx, sortedIdx) => {
                    const seq = sequences[origSeqIdx];
                    const seqY = sequenceStartY + sortedIdx * rowHeight;
                    const ec = getEsColors(seq.endState);

                    // Lookup freq from generated cut sets (parallel order: cutSets[sortedIdx])
                    const csInfo = cutSets[sortedIdx];
                    const freq = csInfo?.sequenceFreq;
                    const prob = csInfo?.sequenceProb;
                    const hasFreq = freq !== null && freq !== undefined && !isNaN(freq);
                    const hasProb = !hasFreq && prob !== null && prob !== undefined && !isNaN(prob);
                    const showLine2 = hasFreq || hasProb;

                    const boxH = showLine2 ? 32 : 24;
                    const boxX = endHeaderX;
                    const boxY = seqY - boxH / 2;

                    if (seq.isTransfer) {
                        // Draw right-pointed pentagon (arrow-box) for transfer
                        const ptW = endBoxWidth;
                        const ptH = boxH;
                        const ptX = boxX;
                        const ptY = boxY;
                        const arrowTip = ptX + ptW + 10; // tip of arrow
                        const midY = ptY + ptH / 2;
                        ctx.fillStyle = '#fef3c7'; // amber-100
                        ctx.strokeStyle = '#d97706'; // amber-600
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(ptX, ptY);
                        ctx.lineTo(ptX + ptW, ptY);
                        ctx.lineTo(arrowTip, midY);
                        ctx.lineTo(ptX + ptW, ptY + ptH);
                        ctx.lineTo(ptX, ptY + ptH);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();

                        // Record clickable hit box
                        endStateHitsRef.current.push({
                            x: ptX, y: ptY, w: ptW + 10, h: ptH,
                            sortedIdx,
                            sequenceNum: csInfo?.sequenceNum ?? (sortedIdx + 1)
                        });

                        ctx.fillStyle = '#92400e';
                        ctx.font = 'bold 8px Arial';
                        ctx.textAlign = 'center';
                        const trLabel = '\u25B6 ' + (seq.endState || '');
                        if (showLine2) {
                            ctx.fillText(trLabel, endCenterX, seqY - 3);
                            ctx.font = '10px Arial';
                            ctx.fillStyle = '#92400e';
                            const valStr = hasFreq ? `f = ${fmt(freq)}/yr` : `P = ${fmt(prob)}`;
                            ctx.fillText(valStr, endCenterX, seqY + 8);
                        } else {
                            ctx.fillText(trLabel, endCenterX, seqY);
                        }
                    } else {
                        ctx.fillStyle = ec.fill;
                        ctx.strokeStyle = ec.stroke;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(boxX, boxY, endBoxWidth, boxH, 3);
                        ctx.fill();
                        ctx.stroke();

                        // Record clickable hit box (drawing coords) for this sequence.
                        endStateHitsRef.current.push({
                            x: boxX, y: boxY, w: endBoxWidth, h: boxH,
                            sortedIdx,
                            sequenceNum: csInfo?.sequenceNum ?? (sortedIdx + 1)
                        });

                        ctx.fillStyle = '#1f2937';
                        ctx.font = '8px Arial';
                        ctx.textAlign = 'center';
                        const endLabel = seq.endState || '';
                        if (showLine2) {
                            ctx.fillText(endLabel, endCenterX, seqY - 3);
                            ctx.font = '10px Arial';
                            ctx.fillStyle = '#374151';
                            const valStr = hasFreq ? `f = ${fmt(freq)}/yr` : `P = ${fmt(prob)}`;
                            ctx.fillText(valStr, endCenterX, seqY + 8);
                        } else {
                            ctx.fillText(endLabel, endCenterX, seqY);
                        }
                    }

                    // Draw sequence number
                    ctx.fillStyle = '#1f2937';
                    ctx.font = 'bold 9px Arial';
                    ctx.textAlign = 'left';
                    ctx.fillText(`Seq ${sortedIdx + 1}`, endHeaderX + endBoxWidth + 15, seqY);
                });
                
                ctx.restore();
            };
            
            useEffect(() => {
                if (activeLeftTab === 'graphic') {
                    drawEventTree();
                }
            }, [activeLeftTab, sequences, topEvents, sequenceTree, zoom, panOffset, leftPaneWidth, cutSets, ieFreq]);

            // Re-draw when the canvas container itself resizes (window resize, splitter drag,
            // initial measurement after mount). This ensures the auto-fit math always uses
            // the actual visible width.
            useEffect(() => {
                if (activeLeftTab !== 'graphic') return;
                const el = canvasContainerRef.current;
                if (!el || typeof ResizeObserver === 'undefined') return;
                const ro = new ResizeObserver(() => { drawEventTree(); });
                ro.observe(el);
                return () => ro.disconnect();
            }, [activeLeftTab, sequences, topEvents, sequenceTree]);

            // Redraw both the event-tree canvas and all Sankey canvases whenever the
            // splitter changes sankeyHeight (the ref-callback approach used by Sankey
            // only fires on mount, so we need an imperative redraw on resize).
            useEffect(() => {
                if (activeLeftTab !== 'graphic') return;
                // 1. Redraw event-tree canvas (container height changed)
                drawEventTree();
                // 2. Redraw each Sankey canvas
                const dd = sankeyDrawDataRef.current;
                if (!dd) return;
                const { drawSankey, riskMap, consNames } = dd;
                consNames.forEach(cName => {
                    const el = sankeyRefs.current[cName];
                    if (!el) return;
                    const { rows, units } = riskMap[cName] || {};
                    if (!rows) return;
                    const dpr = window.devicePixelRatio || 1;
                    const w = Math.max(200, el.parentElement?.clientWidth || 400);
                    const canvasH = Math.max(100, Math.min(320, rows.length * 56 + 28));
                    el.width = Math.round(w * dpr);
                    el.height = Math.round(canvasH * dpr);
                    el.style.width = w + 'px';
                    el.style.height = canvasH + 'px';
                    const ctx = el.getContext('2d');
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    drawSankey(el, rows, units);
                });
            }, [sankeyHeight, activeLeftTab]);
            
            // Zoom handlers
            const handleZoomIn = () => setZoom(z => Math.min(z * 1.2, 3));
            const handleZoomOut = () => setZoom(z => Math.max(z / 1.2, 0.3));
            const handleZoomReset = () => {
                setZoom(1);
                setPanOffset({ x: 0, y: 0 });
            };
            
            // Pan handlers + click detection.
            // We only enter pan mode after the cursor has moved past a small threshold,
            // so a quick click on an end-state box doesn't get swallowed by panning.
            const CLICK_DRAG_THRESHOLD = 4; // px in screen space
            const handleCanvasMouseDown = (e) => {
                if (e.button === 0) {
                    mouseDownPosRef.current = { x: e.clientX, y: e.clientY };
                    setLastMousePos({ x: e.clientX, y: e.clientY });
                }
            };

            const handleCanvasMouseMove = (e) => {
                if (mouseDownPosRef.current && !isPanning) {
                    const dx = e.clientX - mouseDownPosRef.current.x;
                    const dy = e.clientY - mouseDownPosRef.current.y;
                    if (Math.hypot(dx, dy) > CLICK_DRAG_THRESHOLD) {
                        setIsPanning(true);
                    }
                }
                if (isPanning) {
                    const dx = e.clientX - lastMousePos.x;
                    const dy = e.clientY - lastMousePos.y;
                    setPanOffset(prev => ({ x: prev.x + dx, y: prev.y + dy }));
                    setLastMousePos({ x: e.clientX, y: e.clientY });
                }
            };

            // Hit-test the end-state boxes against an event in CANVAS-pixel coords,
            // accounting for the zoom/pan transform applied during drawing.
            const hitTestEndState = (clientX, clientY) => {
                const canvas = canvasRef.current;
                const xform = lastDrawTransformRef.current;
                if (!canvas || !xform) return null;
                const rect = canvas.getBoundingClientRect();
                // Translate viewport coords → canvas-pixel coords. Account for any CSS scaling
                // in case the browser ever scales the canvas element.
                const cssToCanvasX = canvas.width  / rect.width;
                const cssToCanvasY = canvas.height / rect.height;
                const canvasX = (clientX - rect.left) * cssToCanvasX;
                const canvasY = (clientY - rect.top)  * cssToCanvasY;
                // Inverse of the drawing transform: drawX = (canvasX - panX) / zoom.
                const drawX = (canvasX - xform.panX) / xform.zoom;
                const drawY = (canvasY - xform.panY) / xform.zoom;
                for (const h of endStateHitsRef.current) {
                    if (drawX >= h.x && drawX <= h.x + h.w && drawY >= h.y && drawY <= h.y + h.h) {
                        return h;
                    }
                }
                return null;
            };

            const handleCanvasMouseUp = (e) => {
                // If we never crossed the drag threshold, treat as a click and try to hit-test.
                if (!isPanning && mouseDownPosRef.current && e) {
                    const hit = hitTestEndState(e.clientX, e.clientY);
                    if (hit) {
                        scrollToCutSet(hit.sortedIdx);
                    }
                }
                mouseDownPosRef.current = null;
                setIsPanning(false);
            };

            // Scroll the cut-set list to the group for the given sortedIdx and flash-highlight it.
            const scrollToCutSet = (sortedIdx) => {
                // Make sure the right pane is visible. If the user is in fullscreen graphic mode,
                // exit so they can see the cut set list.
                if (isGraphicFullscreen) setIsGraphicFullscreen(false);
                if (activeRightTab !== 'cutsets') setActiveRightTab('cutsets');
                // Defer scroll to next tick so the layout / tab swap can settle.
                setTimeout(() => {
                    const el = cutSetGroupRefs.current[sortedIdx];
                    if (el && el.scrollIntoView) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                    setHighlightedSeq(sortedIdx);
                    setTimeout(() => setHighlightedSeq(null), 1500);
                }, 0);
            };
            
            const handleWheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                setZoom(z => Math.min(Math.max(z * delta, 0.3), 3));
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div 
                        className="bg-white rounded-lg shadow-xl flex flex-col"
                        style={{ width: '90vw', height: '85vh' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        {/* Header */}
                        <div className="p-4 border-b flex items-center justify-between bg-gray-100">
                            <div>
                                <h2 className="text-xl font-bold">How the Facility Fails</h2>
                                {pol && (
                                    <p className="text-sm text-gray-600">
                                        {pol.name}{pol.description ? ` - ${pol.description}` : ''}
                                    </p>
                                )}
                            </div>
                            <button 
                                onClick={onClose} 
                                className="text-gray-500 hover:text-gray-700 p-1"
                            >
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 flex overflow-hidden">
                            {/* Left Pane - Sequence Logic */}
                            <div
                                style={{ width: isGraphicFullscreen ? '100%' : `${leftPaneWidth}%`, flexShrink: 0 }}
                                className="flex flex-col border-r"
                            >
                                <div className="p-2 border-b flex items-center justify-between bg-gray-50">
                                    <h3 className="font-bold text-sm">Sequence Logic</h3>
                                    {activeLeftTab === 'tree' && (
                                        <div className="flex gap-2">
                                            <button
                                                onClick={expandAll}
                                                className="px-2 py-1 text-xs border rounded hover:bg-gray-100"
                                                title="Expand All"
                                            >
                                                &#8853; All
                                            </button>
                                            <button
                                                onClick={collapseAll}
                                                className="px-2 py-1 text-xs border rounded hover:bg-gray-100"
