                                <div style={{ position: 'fixed', inset: 0, backgroundColor: 'rgba(0,0,0,0.45)', zIndex: 99999, display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={() => setShowCons(false)}>
                                    <div style={{ background: isDark ? '#1f2937' : '#ffffff', border: `1px solid ${borderColor}`, borderRadius: '0.5rem', width: '520px', maxWidth: '95vw', maxHeight: '85vh', display: 'flex', flexDirection: 'column', boxShadow: '0 20px 60px rgba(0,0,0,0.35)' }} onClick={e => e.stopPropagation()}>
                                        {/* Header */}
                                        <div style={{ padding: '12px 16px', borderBottom: `1px solid ${borderColor}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
                                            <span style={{ fontWeight: 700, fontSize: '0.875rem', color: isDark ? '#6ee7b7' : '#166534' }}>
                                                Consequences &mdash; <span style={{ fontWeight: 400, color: isDark ? '#d1d5db' : '#374151' }}>{displayName || name || 'End State'}</span>
                                            </span>
                                            <button onClick={() => setShowCons(false)} style={{ color: '#9ca3af', fontSize: '1.25rem', lineHeight: 1, fontWeight: 700, background: 'none', border: 'none', cursor: 'pointer' }} title="Close without saving">&times;</button>
                                        </div>
                                        {/* Scrollable body */}
                                        <div style={{ overflowY: 'auto', flex: 1, padding: '12px 16px', display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                            {consequences.length === 0 && (
                                                <p style={{ fontSize: '0.75rem', fontStyle: 'italic', color: isDark ? '#9ca3af' : '#6b7280', margin: 0 }}>No consequences defined. Click &ldquo;+ Add Consequence&rdquo; to add one.</p>
                                            )}
                                            {consequences.map((con, idx) => {
                                                const distDef = MOD_DIST_TYPES.find(d => d.value === con.distType) || MOD_DIST_TYPES[1];
                                                return (
                                                    <div key={con.id} style={{ border: `1px solid ${borderColor}`, borderRadius: '0.375rem', padding: '10px', backgroundColor: isDark ? '#111827' : '#f0fdf4', display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                                            <span style={{ fontSize: '0.875rem', fontWeight: 700, color: isDark ? '#f3f4f6' : '#111827' }}>{con.name || `Consequence ${idx + 1}`}</span>
                                                            <button onClick={() => setConsequences(prev => prev.filter((_, i) => i !== idx))} style={{ color: '#ef4444', fontSize: '0.75rem', fontWeight: 700, background: 'none', border: 'none', cursor: 'pointer' }}>&times; Remove</button>
                                                        </div>
                                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px' }}>
                                                            <div>
                                                                <label style={{ display: 'block', fontSize: '0.7rem', marginBottom: '2px', color: isDark ? '#9ca3af' : '#6b7280' }}>Name</label>
                                                                <input type="text" value={con.name} onChange={e => modUpdateCons(idx, 'name', e.target.value)} style={{ ...inputStyle, width: '100%', fontSize: '0.75rem', border: `1px solid ${borderColor}`, borderRadius: '0.25rem', padding: '2px 6px', boxSizing: 'border-box' }} placeholder="e.g. Facility Damage" />
                                                            </div>
                                                            <div>
                                                                <label style={{ display: 'block', fontSize: '0.7rem', marginBottom: '2px', color: isDark ? '#9ca3af' : '#6b7280' }}>Frequency Units</label>
                                                                <input type="text" value={con.freqUnits} onChange={e => modUpdateCons(idx, 'freqUnits', e.target.value)} style={{ ...inputStyle, width: '100%', fontSize: '0.75rem', border: `1px solid ${borderColor}`, borderRadius: '0.25rem', padding: '2px 6px', boxSizing: 'border-box' }} placeholder="e.g. per year" />
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label style={{ display: 'block', fontSize: '0.7rem', marginBottom: '2px', color: isDark ? '#9ca3af' : '#6b7280' }}>Description</label>
                                                            <textarea value={con.description} onChange={e => modUpdateCons(idx, 'description', e.target.value)} rows={2} style={{ ...inputStyle, width: '100%', fontSize: '0.75rem', border: `1px solid ${borderColor}`, borderRadius: '0.25rem', padding: '2px 6px', boxSizing: 'border-box', resize: 'vertical' }} placeholder="Describe this consequence type" />
                                                        </div>
                                                        <div>
                                                            <label style={{ display: 'block', fontSize: '0.7rem', marginBottom: '2px', color: isDark ? '#9ca3af' : '#6b7280' }}>Distribution</label>
                                                            <select value={con.distType} onChange={e => modUpdateCons(idx, 'distType', e.target.value)} style={{ ...inputStyle, width: '100%', fontSize: '0.75rem', border: `1px solid ${borderColor}`, borderRadius: '0.25rem', padding: '2px 6px', marginBottom: '4px', boxSizing: 'border-box' }}>
                                                                {MOD_DIST_TYPES.map(d => <option key={d.value} value={d.value}>{d.value}</option>)}
                                                            </select>
                                                            <div style={{ display: 'grid', gap: '6px', gridTemplateColumns: `repeat(${distDef.params.length}, 1fr)` }}>
                                                                {distDef.params.map(p => (
                                                                    <div key={p.key}>
                                                                        <label style={{ display: 'block', fontSize: '0.7rem', marginBottom: '2px', color: isDark ? '#9ca3af' : '#6b7280' }}>{p.label}</label>
                                                                        <input type="text" value={con.distParams[p.key] || ''} onChange={e => modUpdateCons(idx, 'param.' + p.key, e.target.value)} style={{ ...inputStyle, width: '100%', fontSize: '0.75rem', border: `1px solid ${borderColor}`, borderRadius: '0.25rem', padding: '2px 6px', boxSizing: 'border-box' }} placeholder="0" />
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        {/* Footer */}
                                        <div style={{ padding: '10px 16px', borderTop: `1px solid ${borderColor}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
                                            <button
                                                onClick={() => setConsequences(prev => [...prev, modMakeCons()])}
                                                style={{ fontSize: '0.75rem', padding: '4px 10px', borderRadius: '0.25rem', border: `1px solid ${isDark ? '#059669' : '#16a34a'}`, color: isDark ? '#6ee7b7' : '#166534', backgroundColor: isDark ? '#064e3b' : '#f0fdf4', cursor: 'pointer' }}
                                            >+ Add Consequence</button>
                                            <div style={{ display: 'flex', gap: '6px' }}>
                                                <button onClick={() => setShowCons(false)} style={{ fontSize: '0.75rem', padding: '4px 10px', borderRadius: '0.25rem', border: `1px solid ${borderColor}`, backgroundColor: isDark ? '#374151' : '#f9fafb', color: isDark ? '#d1d5db' : '#374151', cursor: 'pointer' }}>Cancel</button>
                                                <button onClick={() => setShowCons(false)} style={{ fontSize: '0.75rem', padding: '4px 10px', borderRadius: '0.25rem', backgroundColor: '#16a34a', color: '#ffffff', border: 'none', cursor: 'pointer' }}>Done</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {type === 'function' && (
                                <div>
                                    <label className="text-xs text-gray-500 block mb-0.5">KUREAS-SYS FTL File</label>
                                    <div className="flex gap-1 items-center">
                                        <button
                                            onClick={() => onLoadSystem && onLoadSystem(knowFtlFileName, (fileName) => setKnowFtlFileName(fileName))}
                                            className="flex-shrink-0 text-xs px-2 py-0.5 rounded text-white"
                                            style={{ backgroundColor: '#1e3a8a' }}
                                            onMouseEnter={e => e.currentTarget.style.backgroundColor = '#1e40af'}
                                            onMouseLeave={e => e.currentTarget.style.backgroundColor = '#1e3a8a'}
                                            title="Load cut sets and basic events from a KUREAS-SYS KNOW_FTL file"
                                        >
                                            Load System
                                        </button>
                                        <span
                                            className="flex-1 text-xs font-mono px-1 py-0.5 rounded border truncate"
                                            style={{ ...inputStyle, color: knowFtlFileName ? (isDark ? '#93c5fd' : '#1e3a8a') : '#9ca3af', fontStyle: knowFtlFileName ? 'normal' : 'italic', minWidth: 0 }}
                                            title={knowFtlFileName || 'No file loaded'}
                                        >
                                            {knowFtlFileName || 'not loaded'}
                                        </span>
                                    </div>
                                </div>
                            )}
                            <div className="flex gap-1 justify-end">
                                <button onClick={() => { setName(''); setDisplayName(''); setType('function'); setDesc(''); setOutcome('unanalyzed'); setKnowFtlFileName(''); setConsequences([]); setShowCons(false); onSetEditing(undefined); }} className="text-xs px-2 py-0.5 border rounded hover:bg-gray-100" style={{ borderColor }}>Cancel</button>
                                <button onClick={handleSave} disabled={!name.replace(/[^a-zA-Z0-9_\-]/g, '')} className="text-xs px-2 py-0.5 rounded text-white disabled:opacity-50" style={{ backgroundColor: '#7c3aed' }}>Save</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ══ HTFW Script Parser & Diagram ══════════════════════════════════════════

        /**
         * Parse an HTFW script into a graph descriptor.
         *
         * Grammar (each statement ends with ';'):
         *   IF( <cond_list> ) THEN ENDSTATE( <name> )
         *   IF( <cond_list> ) THEN FAILED( <id_list> ) AND ENDSTATE( <name> )
         *   FAILED( <id_list> )                    -- global override
         *   <cond_list> ::= <term> (AND <term>)*
         *   <term>      ::= NOT <id> | <id>
         *   <id_list>   ::= <id> (, <id>)*
         *
         * Returns { nodes, edges, failedEventsByEndState }
         *   nodes: Map<id,{id,label,type}>   type: 'ie'|'function'|'endstate'|'failed'
         *   edges: [{from,to,label}]
         *   failedEventsByEndState: { [esId]: Set<string>, '__global__': Set<string> }
         */
        const parseHTFWScript = (ieName, rawScript, projectModules) => {
            const nodes = new Map();  // id -> { id, label, type }
            const edges = [];         // { from, to, label }
            const edgeSet = new Set(); // deduplicate
            const failedEventsByEndState = { '__global__': new Set() };
            const pendingDist = {};   // label -> distribution object (for BETA/CNI statements)

            // Build a lookup map from module name → module object
            const modulesByName = {};
            (projectModules || []).forEach(m => { modulesByName[m.name] = m; });

            const addNode = (id, label, type) => {
                if (!nodes.has(id)) {
                    const mod = modulesByName[label];
                    const dist = pendingDist[label] || null;
                    nodes.set(id, {
                        id,
                        label,
                        type: mod ? (mod.type === 'endstate' ? 'endstate' : 'function') : type,
                        fromModule: !!mod,
                        moduleId: mod ? mod.id : undefined,
                        ...(dist ? { distribution: dist } : {})
                    });
                } else if (pendingDist[label]) {
                    // Apply distribution retroactively if node was created before the dist statement
                    const existing = nodes.get(id);
                    if (!existing.distribution) existing.distribution = pendingDist[label];
                }
            };
            const addEdge = (from, to, label) => {
                const key = `${from}|${to}|${label}`;
                if (!edgeSet.has(key)) { edgeSet.add(key); edges.push({ from, to, label }); }
            };

            const safeId = (s) => s.replace(/[^a-zA-Z0-9_]/g, '_');
            const ieId = safeId(ieName || 'IE');
            addNode(ieId, ieName || 'IE', 'ie');

            // Strip FACILITY WORKS(...) = header line
            const bodyLines = rawScript
                .split('\n')
                .map(l => l.trim())
                .filter(l => l && !l.startsWith('#') && !l.toUpperCase().startsWith('FACILITY WORKS'));

            // Track which condition nodes have been connected from the IE already
            // so we can chain YES arcs in order.
            // Helper: parse a FAILED(...) argument list into trimmed event names
            const parseFailedArgs = (argsStr) =>
                argsStr.split(',').map(s => s.trim()).filter(Boolean);

            // For each statement:
            bodyLines.forEach(line => {
                // Remove trailing semicolon
                const stmt = line.replace(/;$/, '').trim();

                // ── Standalone FAILED(X, Y, ...) ──────────────────────────────
                // All events are collected into ONE grouped node connected from the IE.
                const standaloneFailMatch = stmt.match(/^FAILED\s*\((.+)\)$/i);
                if (standaloneFailMatch) {
                    const evNames = parseFailedArgs(standaloneFailMatch[1]);
                    evNames.forEach(evName => failedEventsByEndState['__global__'].add(evName));
                    // Upsert a single grouped node; append any new names to its label.
                    const gId = 'FAIL___global__';
                    if (nodes.has(gId)) {
                        const existing = nodes.get(gId);
                        const existingNames = existing.label.split(', ');
                        evNames.forEach(n => { if (!existingNames.includes(n)) existingNames.push(n); });
                        existing.label = existingNames.join(', ');
                    } else {
                        nodes.set(gId, { id: gId, label: evNames.join(', '), type: 'failed' });
                        addEdge(ieId, gId, 'FAILED');
                    }
                    return;
                }

                // ── IF(...) THEN FAILED(X,Y) AND ENDSTATE(...) ────────────────
                // All events for this end-state are collected into ONE grouped node.
                const ifFailEndMatch = stmt.match(/^IF\s*\((.+?)\)\s*THEN\s*FAILED\s*\((.+?)\)\s*AND\s*ENDSTATE\s*\((.+?)\)$/i);
                if (ifFailEndMatch) {
                    const condList     = ifFailEndMatch[1].trim();
                    const failArgs     = ifFailEndMatch[2].trim();
                    const endStateName = ifFailEndMatch[3].trim();
                    const esId = 'ES_' + safeId(endStateName);
                    addNode(esId, endStateName, 'endstate');

                    const evNames = parseFailedArgs(failArgs);
                    if (!failedEventsByEndState[esId]) failedEventsByEndState[esId] = new Set();
                    evNames.forEach(evName => failedEventsByEndState[esId].add(evName));
                    // Upsert a single grouped node per end-state; append new names if needed.
                    const gId = 'FAIL_' + esId;
                    if (nodes.has(gId)) {
                        const existing = nodes.get(gId);
                        const existingNames = existing.label.split(', ');
                        evNames.forEach(n => { if (!existingNames.includes(n)) existingNames.push(n); });
                        existing.label = existingNames.join(', ');
                    } else {
                        nodes.set(gId, { id: gId, label: evNames.join(', '), type: 'failed' });
                        addEdge(gId, esId, 'FAILED');
                    }

                    // Build condition chain with path-aware IDs (same logic as standard IF/THEN)
                    const terms2 = condList.split(/\bAND\b/i).map(t => t.trim());
                    const orderedConds2 = terms2.map(term => {
                        const nm = term.match(/^NOT\s+(.+)$/i);
                        return nm ? { name: nm[1].trim(), polarity: 'FAILS' } : { name: term, polarity: 'WORKS' };
                    });
                    if (orderedConds2.length > 0) {
                        let pathKey2 = ieId;
                        let prevId2  = ieId;
                        orderedConds2.forEach(({ name, polarity }, idx) => {
                            const isFirst = idx === 0;
                            const isLast  = idx === orderedConds2.length - 1;
                            const cId = pathKey2 + '__' + safeId(name);
                            addNode(cId, name, 'function');
                            if (isFirst) {
                                addEdge(ieId, cId, 'WORKS');
                            } else {
                                addEdge(prevId2, cId, orderedConds2[idx - 1].polarity);
                            }
                            if (isLast) {
                                addEdge(cId, esId, polarity);
                            }
                            pathKey2 = pathKey2 + '__' + safeId(name) + '_' + polarity;
                            prevId2  = cId;
                        });
                    }
                    return;
                }

                // ── IF(...) THEN TRANSFER(ie_name) ────────────────────────────
                const ifTransferMatch = stmt.match(/^IF\s*\((.+?)\)\s*THEN\s*TRANSFER\s*\((.+?)\)$/i);
                if (ifTransferMatch) {
                    const condList3     = ifTransferMatch[1].trim();
                    const transferName  = ifTransferMatch[2].trim();
                    const trId = 'TR_' + safeId(transferName);
                    if (!nodes.has(trId)) {
                        nodes.set(trId, { id: trId, label: transferName, type: 'transfer', transferTarget: transferName });
                    }

                    const terms3 = condList3.split(/\bAND\b/i).map(t => t.trim());
                    const orderedConds3 = terms3.map(term => {
                        const nm = term.match(/^NOT\s+(.+)$/i);
                        return nm ? { name: nm[1].trim(), polarity: 'FAILS' } : { name: term, polarity: 'WORKS' };
                    });
                    if (orderedConds3.length > 0) {
                        let pathKey3 = ieId;
                        let prevId3  = ieId;
                        orderedConds3.forEach(({ name, polarity }, idx) => {
                            const isFirst = idx === 0;
                            const isLast  = idx === orderedConds3.length - 1;
                            const cId = pathKey3 + '__' + safeId(name);
                            addNode(cId, name, 'function');
                            if (isFirst) {
                                addEdge(ieId, cId, 'WORKS');
                            } else {
                                addEdge(prevId3, cId, orderedConds3[idx - 1].polarity);
                            }
                            if (isLast) {
                                addEdge(cId, trId, polarity);
                            }
                            pathKey3 = pathKey3 + '__' + safeId(name) + '_' + polarity;
                            prevId3  = cId;
                        });
                    }
                    return;
                }

                // ── Distribution assignment: NAME = BETA(a, b) or NAME = CNI(mean) ──
                const distMatch = stmt.match(/^(.+?)\s*=\s*(BETA|CNI)\s*\((.+)\)$/i);
                if (distMatch) {
                    const sysName  = distMatch[1].trim();
                    const distType = distMatch[2].toUpperCase();
                    const args     = distMatch[3].split(',').map(s => s.trim());
                    let distShape, distScale, distMean;
                    if (distType === 'BETA') {
                        distShape = parseFloat(args[0]);
                        distScale = parseFloat(args[1]);
                        // Mean of Beta(alpha, beta) = alpha / (alpha + beta)
                        distMean  = distShape / (distShape + distScale);
                    } else { // CNI
                        distMean  = parseFloat(args[0]);
                        distShape = 0.5;
                        distScale = 0.5 * (1 - distMean) / distMean;
                    }
                    const distStr = distType === 'BETA'
                        ? `BETA(${args[0]}, ${args[1]})`
                        : `CNI(${args[0]})`;
                    // Store distribution on all nodes with this label (already created)
                    nodes.forEach(n => {
                        if (n.label === sysName) {
                            n.distribution = { type: distType, shape: distShape, scale: distScale, mean: distMean, str: distStr };
                        }
                    });
                    // Store for nodes not yet created
                    pendingDist[sysName] = { type: distType, shape: distShape, scale: distScale, mean: distMean, str: distStr };
                    return;
                }

                // ── Standard IF(...) THEN ENDSTATE(...) ───────────────────────
                const ifMatch = stmt.match(/^IF\s*\((.+?)\)\s*THEN\s*ENDSTATE\s*\((.+?)\)$/i);
                if (!ifMatch) return;

                const condList = ifMatch[1].trim();
                const endStateName = ifMatch[2].trim();
                const esId = 'ES_' + safeId(endStateName);
                addNode(esId, endStateName, 'endstate');

                // Parse condition list: split by AND (case-insensitive).
                // Preserve original order so the chain is walked left-to-right.
                const terms = condList.split(/\bAND\b/i).map(t => t.trim());

                // Build an ordered list of { name, polarity: 'WORKS'|'FAILS' }
                const orderedConds = terms.map(term => {
                    const notMatch = term.match(/^NOT\s+(.+)$/i);
                    return notMatch
                        ? { name: notMatch[1].trim(), polarity: 'FAILS' }
                        : { name: term, polarity: 'WORKS' };
                });

                if (orderedConds.length === 0) return;

                // Walk the chain building path-unique IDs.
                //
                // Node ID = ancestorPathKey + '__' + safeId(name)
                // where ancestorPathKey encodes ALL ancestors AND their polarities.
                // This guarantees that "B asked after A=WORKS" and "B asked after A=FAILS"
                // become distinct diagram nodes, giving true event-tree branching.
                //
                // Edge from parent to current node carries the PARENT'S polarity
                // (i.e., "parent resolved WORKS/FAILS, so now we ask current").
                // Exception: the first node's incoming edge from IE is always WORKS
                // (the IE fires, and we start asking questions).
                // The last node's outgoing edge to the end-state carries ITS OWN polarity.

                // pathKey accumulates the full ancestry path (name + polarity at each step)
                let pathKey = ieId;
                let prevId  = ieId;

                orderedConds.forEach(({ name, polarity }, idx) => {
                    const isFirst = idx === 0;
                    const isLast  = idx === orderedConds.length - 1;

                    // Include name AND polarity in pathKey so WORKS-branch and FAILS-branch
                    // produce distinct pathKeys for any subsequent children.
                    const cId = pathKey + '__' + safeId(name);
                    addNode(cId, name, 'function');

                    // Arc from parent to this node:
                    if (isFirst) {
                        // IE fires → always ask first question (WORKS arc from IE)
                        addEdge(ieId, cId, 'WORKS');
                    } else {
                        // Parent resolved with its polarity → now ask this question
                        const parentPolarity = orderedConds[idx - 1].polarity;
                        addEdge(prevId, cId, parentPolarity);
                    }

                    if (isLast) {
                        // This node resolves with its own polarity → end state
                        addEdge(cId, esId, polarity);
                    }

                    // Advance path: include polarity so WORKS/FAILS branches diverge
                    pathKey = pathKey + '__' + safeId(name) + '_' + polarity;
                    prevId  = cId;
                });
            });

            // Apply any pending distributions to nodes that were created before the dist statement
            nodes.forEach(n => {
                if (!n.distribution && pendingDist[n.label]) {
                    n.distribution = pendingDist[n.label];
                }
            });

            return { nodes, edges, failedEventsByEndState };
        };

        /**
         * Generate Mermaid flowchart code from parsed HTFW graph.
         * endStateOutcomes: { [esId]: 'unanalyzed'|'positive'|'negative' }
         */
        const generateHTFWMermaid = (ieName, graph, endStateOutcomes, nodeMetadata, projectModules, ieFreq, settings) => {
            const { nodes, edges } = graph;
            if (nodes.size === 0) return '';

            const ieColor       = '#fef9c3';  // light yellow
            const functionColor = settings?.functionColor || '#e0f2fe';
            const esUnanalyzed  = '#e5e7eb';  // grey
            const esPositive    = '#bbf7d0';  // green
            const esNegative    = '#fecaca';  // light red

            let code = 'flowchart LR\n';

            // Node definitions
            const modById = {};
            (projectModules || []).forEach(m => { modById[m.id] = m; });

            const clean = s => (s || '').replace(/`/g, "'").replace(/"/g, "'").replace(/\n/g, ' ');

            const formatFreq = (val) => {
                if (val === null || val === undefined || isNaN(val) || val <= 0) return '';
                const exp = Math.floor(Math.log10(Math.abs(val)));
                const mant = val / Math.pow(10, exp);
                return Math.abs(mant - 1) < 0.001 ? `1E${exp}` : `${mant.toFixed(1)}E${exp}`;
            };

            const wrapDesc = (text) => {
                if (!text || text.length <= 25) return text;
                const words = text.split(' '); const lines = []; let cur = '';
                for (const w of words) {
                    const t = cur ? cur + ' ' + w : w;
                    if (t.length > 25 && cur) { lines.push(cur); cur = w; if (lines.length === 2) { lines.push(cur); break; } }
                    else cur = t;
                }
                if (cur && lines.length < 3) lines.push(cur);
                return lines.join('\n');
            };

            nodes.forEach(node => {
                const meta = nodeMetadata?.[node.id] || {};
                const modForNode = node.fromModule && node.moduleId ? modById[node.moduleId] : null;
                const rawLabel = modForNode ? (modForNode.displayName || modForNode.name) : (meta.name || node.label);
                const rawDesc  = modForNode ? (modForNode.description || '') : (meta.description || '');
                const lbl  = clean(rawLabel);
                const desc = wrapDesc(clean(rawDesc));

                if (node.type === 'ie') {
                    const freqStr = (ieFreq && ieFreq > 0) ? formatFreq(ieFreq) : '';
                    const freqLine = freqStr ? `\n(${freqStr} /yr)` : '';
                    const descLine = desc ? `\n${desc}` : '';
                    code += `    ${node.id}{{"${lbl}${descLine}${freqLine}"}}\n`;
                } else if (node.type === 'function') {
                    const descLine = desc ? `\n${desc}` : '';
                    code += `    ${node.id}["${lbl}${descLine}"]\n`;
                } else if (node.type === 'endstate') {
                    const descLine = desc ? `\n${desc}` : '';
                    code += `    ${node.id}(["${lbl}${descLine}"])\n`;
                } else if (node.type === 'transfer') {
                    // Right-pointed pentagon shape: > text ]
                    code += `    ${node.id}>"→ ${lbl}"]\n`;
                } else if (node.type === 'failed') {
                    // Render as a hexagon node with "Failed" header and the comma-separated event list below
                    code += `    ${node.id}{{"Failed\n${lbl}"}}\n`;
                }
            });

            // Edges
            edges.forEach(e => {
                const labelPart = e.label ? `|"  ${e.label}  "|` : '';
                code += `    ${e.from} -->${labelPart} ${e.to}\n`;
            });

            // Styles
            nodes.forEach(node => {
                if (node.type === 'ie') {
                    code += `    style ${node.id} fill:${ieColor},stroke:#b45309,stroke-width:2px\n`;
                } else if (node.type === 'function') {
                    code += `    style ${node.id} fill:${functionColor},stroke:#0369a1,stroke-width:2px\n`;
                } else if (node.type === 'failed') {
                    code += `    style ${node.id} fill:#fed7aa,stroke:#c2410c,stroke-width:2px,stroke-dasharray:4 2\n`;
                } else if (node.type === 'transfer') {
                    code += `    style ${node.id} fill:#fef3c7,stroke:#d97706,stroke-width:2px\n`;
                } else if (node.type === 'endstate') {
                    let outcome = endStateOutcomes?.[node.id] || 'unanalyzed';
                    // If sourced from a module, fall back to module's own outcome
                    if (outcome === 'unanalyzed' && node.fromModule && node.moduleId) {
                        const mod = (projectModules || []).find(m => m.id === node.moduleId);
                        if (mod) outcome = mod.outcome || 'unanalyzed';
                    }
                    const fill = outcome === 'positive' ? esPositive : outcome === 'negative' ? esNegative : esUnanalyzed;
                    const stroke = outcome === 'positive' ? '#15803d' : outcome === 'negative' ? '#dc2626' : '#6b7280';
                    code += `    style ${node.id} fill:${fill},stroke:${stroke},stroke-width:2px\n`;
                }
            });

            return code;
        };

        // ── HTFWDiagram component ─────────────────────────────────────────────────
        function HTFWDiagram({ ieName, script, endStateOutcomes, onOutcomeChange, nodeMetadata, onNodeMetadataChange, diagramKey, projectModules, ieFreq, settings, onLoadSystem, onModuleUpdate }) {
            const containerRef = React.useRef(null);
            const [svgContent, setSvgContent] = React.useState('');
            const [zoom, setZoom] = React.useState(1);
            const [parseError, setParseError] = React.useState('');
            const [endStateNodes, setEndStateNodes] = React.useState([]);
            const [functionNodes, setFunctionNodes] = React.useState([]);
            const [isFullscreen, setIsFullscreen] = React.useState(false);
            const [copyMsg, setCopyMsg] = React.useState('');
            // Consequences modal state
            const [consModalNodeId, setConsModalNodeId] = React.useState(null);
            const [consModalData, setConsModalData] = React.useState([]);
            // ES Module consequences modal
            const [modConsModalMod, setModConsModalMod] = React.useState(null);
            const [modConsModalData, setModConsModalData] = React.useState([]);
            const openModConsModal = (mod) => {
                setModConsModalData(JSON.parse(JSON.stringify(mod.consequences || [])));
                setModConsModalMod(mod);
            };
            const saveModConsModal = () => {
                if (onModuleUpdate) onModuleUpdate(modConsModalMod.id, modConsModalData);
                setModConsModalMod(null);
            };
            const updateModCons = (idx, field, value) => {
                setModConsModalData(prev => {
                    const arr = [...prev];
                    if (field === 'distType') {
                        const def = HTFW_DIST_TYPES.find(d => d.value === value);
                        const blank = {};
                        (def?.params || []).forEach(p => { blank[p.key] = ''; });
                        arr[idx] = { ...arr[idx], distType: value, distParams: blank };
                    } else if (field.startsWith('param.')) {
                        arr[idx] = { ...arr[idx], distParams: { ...arr[idx].distParams, [field.slice(6)]: value } };
                    } else {
                        arr[idx] = { ...arr[idx], [field]: value };
                    }
                    return arr;
                });
            };

            // ── Consequence constants & helpers ───────────────────────────────
            const HTFW_DIST_TYPES = [
                { value: 'Normal',     params: [{ key: 'mean', label: 'Mean' }, { key: 'stddev', label: 'Std Dev' }] },
                { value: 'Lognormal',  params: [{ key: 'mean', label: 'Mean' }, { key: 'errorFactor', label: 'Error Factor' }] },
                { value: 'Gamma',      params: [{ key: 'mean', label: 'Mean' }, { key: 'alpha', label: 'Alpha (α)' }] },
                { value: 'Beta',       params: [{ key: 'mean', label: 'Mean' }, { key: 'beta', label: 'Beta (β)' }] },
                { value: 'Uniform',    params: [{ key: 'lower', label: 'Lower Bound' }, { key: 'upper', label: 'Upper Bound' }] },
                { value: 'Triangular', params: [{ key: 'lower', label: 'Lower' }, { key: 'mode', label: 'Mode' }, { key: 'upper', label: 'Upper' }] },
            ];
            const htfwMakeCons = () => ({
                id: Math.random().toString(36).slice(2),
                name: '', description: '', distType: 'Lognormal',
                distParams: { mean: '', errorFactor: '' }, freqUnits: ''
            });
            const openConsModal = (nodeId) => {
                const existing = (nodeMetadata[nodeId] || {}).consequences || [];
                setConsModalData(JSON.parse(JSON.stringify(existing)));
                setConsModalNodeId(nodeId);
            };
            const saveConsModal = () => {
                onNodeMetadataChange(consModalNodeId, 'consequences', consModalData);
                setConsModalNodeId(null);
            };
            const updateCons = (idx, field, value) => {
                setConsModalData(prev => {
                    const arr = [...prev];
                    if (field === 'distType') {
                        const def = HTFW_DIST_TYPES.find(d => d.value === value);
                        const blank = {};
                        (def?.params || []).forEach(p => { blank[p.key] = ''; });
                        arr[idx] = { ...arr[idx], distType: value, distParams: blank };
                    } else if (field.startsWith('param.')) {
                        arr[idx] = { ...arr[idx], distParams: { ...arr[idx].distParams, [field.slice(6)]: value } };
                    } else {
                        arr[idx] = { ...arr[idx], [field]: value };
                    }
                    return arr;
                });
            };

            // Parse + render whenever script/outcomes/settings change
            React.useEffect(() => {
                if (!script || !ieName) { setSvgContent(''); setEndStateNodes([]); setFunctionNodes([]); return; }
                let graph;
                try {
                    graph = parseHTFWScript(ieName, script, projectModules);
                    setParseError('');
                } catch (err) {
                    setParseError(err.message);
                    setSvgContent('');
                    return;
                }

                // Collect nodes for the properties panel
                const esNodes = [], fnNodes = [];
                graph.nodes.forEach(n => {
                    if (n.type === 'endstate') esNodes.push(n);
                    else if (n.type === 'function') fnNodes.push(n);
                });
                setEndStateNodes(esNodes);
                setFunctionNodes(fnNodes);

                if (graph.nodes.size <= 1) { setSvgContent(''); return; }

                const code = generateHTFWMermaid(ieName, graph, endStateOutcomes, nodeMetadata, projectModules, ieFreq, settings);

                (async () => {
                    try {
                        const fontSize = fontSizePx(settings?.fontSize);
                        mermaid.initialize({
                            startOnLoad: false,
                            theme: 'default',
                            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
                            themeVariables: { fontSize: `${fontSize}pt`, edgeLabelBackground: '#ffffff' },
                            securityLevel: 'loose'
                        });
                        const uid = 'htfw-' + Date.now();
                        const { svg } = await mermaid.render(uid, code);
                        // Make SVG fill its container width
                        const fullWidthSvg = svg
                            .replace(/(<svg[^>]*?)\s+width="[^"]*"/, '$1')
                            .replace(/(<svg[^>]*?)\s+height="[^"]*"/, '$1')
                            .replace(/<svg/, '<svg style="width:100%;height:auto;display:block"');
                        setSvgContent(fullWidthSvg);
                    } catch (err) {
                        console.error('HTFW mermaid error:', err);
                        setParseError('Diagram render error: ' + err.message);
                        setSvgContent('');
                    }
                })();
            }, [script, ieName, endStateOutcomes, nodeMetadata, diagramKey, projectModules, ieFreq, settings?.fontSize, settings?.functionColor]);

            // Download diagram as PNG
            // Re-render mermaid code with htmlLabels:false for canvas operations
            // (Chrome cannot rasterize <foreignObject> in SVG drawn to canvas)
            const renderForCanvas = async (code) => {
                const fontSize = fontSizePx(settings?.fontSize);
                mermaid.initialize({
                    startOnLoad: false,
                    theme: 'default',
                    flowchart: { useMaxWidth: false, htmlLabels: false, curve: 'basis' },
                    themeVariables: { fontSize: `${fontSize}pt` },
                    securityLevel: 'loose'
                });
                const uid = 'htfw-canvas-' + Date.now();
                const { svg } = await mermaid.render(uid, code);
                // Restore htmlLabels:true for normal display renders
                mermaid.initialize({
                    startOnLoad: false,
                    theme: 'default',
                    flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
                    themeVariables: { fontSize: `${fontSize}pt`, edgeLabelBackground: '#ffffff' },
                    securityLevel: 'loose'
                });
                return svg;
            };

            // Rasterize an SVG string to a canvas blob
            const svgToBlob = (svgString) => new Promise((resolve, reject) => {
                const dataUri = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
                const img = new Image();
                img.onload = () => {
                    const scale = 2;
                    const canvas = document.createElement('canvas');
                    canvas.width  = img.naturalWidth  * scale;
                    canvas.height = img.naturalHeight * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(scale, scale);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob(blob => {
                        if (!blob) { reject(new Error('canvas toBlob returned null')); return; }
                        resolve(blob);
                    }, 'image/png');
                };
                img.onerror = () => reject(new Error('Image load failed'));
                img.src = dataUri;
            });

            // Download diagram as PNG
            const handleDownload = async () => {
                if (!svgContent) return;
                try {
                    let graph;
                    try { graph = parseHTFWScript(ieName, script, projectModules); }
                    catch(err) { alert('Parse error: ' + err.message); return; }
                    const code = generateHTFWMermaid(ieName, graph, endStateOutcomes, nodeMetadata, projectModules, ieFreq, settings);
                    const canvasSvg = await renderForCanvas(code);
                    const blob = await svgToBlob(canvasSvg);
                    const a = document.createElement('a');
                    a.download = `${ieName || 'htfw'}_diagram.png`;
                    a.href = URL.createObjectURL(blob);
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
                } catch(e) {
                    console.error('Download failed:', e);
                    alert('Download failed: ' + e.message);
                }
            };

            // Copy SVG to clipboard as PNG
            const handleCopy = async () => {
                if (!svgContent) return;
                try {
                    let graph;
                    try { graph = parseHTFWScript(ieName, script, projectModules); }
                    catch(err) { throw new Error('Parse error: ' + err.message); }
                    const code = generateHTFWMermaid(ieName, graph, endStateOutcomes, nodeMetadata, projectModules, ieFreq, settings);
                    const canvasSvg = await renderForCanvas(code);
                    const blob = await svgToBlob(canvasSvg);
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    setCopyMsg('Copied!');
                    setTimeout(() => setCopyMsg(''), 1800);
                } catch(e) {
                    console.error('Mermaid copy failed:', e);
                    setCopyMsg('Copy failed');
                    setTimeout(() => setCopyMsg(''), 2000);
                }
            };

            const OUTCOME_OPTS = [
                { value: 'unanalyzed', label: 'Unanalyzed',      color: '#e5e7eb', text: '#374151' },
                { value: 'positive',   label: 'Positive Outcome', color: '#bbf7d0', text: '#166534' },
                { value: 'negative',   label: 'Negative Outcome', color: '#fecaca', text: '#991b1b' },
            ];

            // Tab state for the elements grid
            const [elementsTab, setElementsTab] = React.useState('sys');

            // ── Grid sort state ──────────────────────────────────────────────
            const [sysSort, setSysSort]   = React.useState({ col: null, dir: null }); // {col:'name'|'desc'|'ftl'|'cond'|'type', dir:'asc'|'desc'}
            const [esSort,  setEsSort]    = React.useState({ col: null, dir: null }); // {col:'name'|'desc'|'outcome'|'cons'|'type', dir:'asc'|'desc'}

            const cycleSort = (current, col, setSortFn) => {
                if (current.col !== col) { setSortFn({ col, dir: 'asc' }); return; }
                if (current.dir === 'asc')  { setSortFn({ col, dir: 'desc' }); return; }
                setSortFn({ col: null, dir: null });
            };

            const sortArrow = (sort, col) => {
                if (sort.col !== col) return <span style={{ color:'#94a3b8', fontSize:'9px', marginLeft:'3px' }}>&#8597;</span>;
                return sort.dir === 'asc'
                    ? <span style={{ color:'#1e40af', fontSize:'9px', marginLeft:'3px' }}>&#8593;</span>
                    : <span style={{ color:'#1e40af', fontSize:'9px', marginLeft:'3px' }}>&#8595;</span>;
            };

            // ── Grid column-width state ──────────────────────────────────────
            // Sys grid: [type, name, desc, ftl, cond]  (px)
            const [sysColWidths, setSysColWidths] = React.useState([80, 130, 160, 150, 160]);
            // ES grid:  [type, name, desc, outcome, cons]
            const [esColWidths,  setEsColWidths]  = React.useState([80, 130, 160, 120, 100]);

            // Resize drag logic — uses refs so mousemove handler captures current values without stale closure
            const resizeDragRef = React.useRef(null); // { setWidths, colIdx, startX, startW }

            const onResizeMouseDown = (e, setWidths, colIdx, currentWidths) => {
                e.preventDefault();
                e.stopPropagation();
                resizeDragRef.current = { setWidths, colIdx, startX: e.clientX, startW: currentWidths[colIdx] };
                const onMove = (me) => {
                    const drag = resizeDragRef.current;
                    if (!drag) return;
                    const delta = me.clientX - drag.startX;
                    const newW  = Math.max(40, drag.startW + delta);
                    drag.setWidths(prev => {
                        const next = [...prev];
                        next[drag.colIdx] = newW;
                        return next;
                    });
                };
                const onUp = () => {
                    resizeDragRef.current = null;
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };

            // Resize handle element — called as a function (not <Component/>) since it's defined inline
            const ResizeHandle = (setWidths, colIdx, widths) => (
                <span
                    onMouseDown={(e) => onResizeMouseDown(e, setWidths, colIdx, widths)}
                    style={{
                        position: 'absolute', right: 0, top: 0, bottom: 0, width: '5px',
                        cursor: 'col-resize', userSelect: 'none', zIndex: 1,
                        borderRight: '2px solid transparent',
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderRightColor = '#93c5fd'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderRightColor = 'transparent'; }}
                />
            );

            // Deduplicate end states by label
            const dedupByLabel = (arr) => {
                const seen = new Set();
                return arr.filter(n => {
                    if (seen.has(n.label)) return false;
                    seen.add(n.label);
                    return true;
                });
            };

            // Build function rows with "conditional upon" context.
            // Each function node in the graph may appear multiple times (different path-unique IDs
            // but same label) when the same system is questioned on more than one branch.
            // We traverse the graph from the IE root and, for every function node encountered,
            // record the prior function nodes (label + branch taken).
            const functionRows = React.useMemo(() => {
                if (!script || !ieName || functionNodes.length === 0) return functionNodes.map(n => ({ node: n, priorContext: [] }));
                let graph2;
                try { graph2 = parseHTFWScript(ieName, script, projectModules); } catch(e) { return functionNodes.map(n => ({ node: n, priorContext: [] })); }
                // Build adjacency: nodeId -> [{to, label}]
                const adj = {};
                graph2.edges.forEach(e => { (adj[e.from] = adj[e.from] || []).push({ to: e.to, label: e.label || '' }); });
                // Find IE root
                let ieId = null;
                graph2.nodes.forEach((nd) => { if (nd.type === 'ie') ieId = nd.id; });
                if (!ieId) return functionNodes.map(n => ({ node: n, priorContext: [] }));
                // Traverse collecting function-node encounters per path
                const rows = []; // {nodeId, label, priorContext:[{label,branch}]}
                const seenKey = new Set(); // "nodeId|contextKey" to avoid duplicates
                const traverse2 = (nodeId, priorFns, visited) => {
                    if (visited.has(nodeId)) return;
                    const nd = graph2.nodes.get(nodeId);
                    if (!nd) return;
                    if (nd.type === 'function') {
                        const contextKey = priorFns.map(p => p.label + ':' + p.branch).join('|');
                        const rowKey = nodeId + '|' + contextKey;
                        if (!seenKey.has(rowKey)) {
                            seenKey.add(rowKey);
                            rows.push({ nodeId, label: nd.label, priorContext: [...priorFns] });
                        }
                    }
                    const outgoing = adj[nodeId] || [];
                    outgoing.forEach(edge => {
                        const newPrior = nd.type === 'function'
                            ? [...priorFns, { label: nd.label, branch: edge.label }]
                            : priorFns;
                        traverse2(edge.to, newPrior, new Set([...visited, nodeId]));
                    });
                };
                traverse2(ieId, [], new Set());
                // Map rows back to functionNode objects (for metadata/knowFtl access)
                return rows.map(r => {
                    const node = functionNodes.find(n => n.id === r.nodeId) || functionNodes.find(n => n.label === r.label) || { id: r.nodeId, label: r.label, type: 'function' };
                    return { node, priorContext: r.priorContext };
                });
            }, [functionNodes, script, ieName, projectModules]);

            const endStateRows = dedupByLabel(endStateNodes);

            // ── Sorted row arrays ────────────────────────────────────────────
            const sortedFunctionRows = React.useMemo(() => {
                if (!sysSort.col) return functionRows;
                const getKey = (row) => {
                    const { node: n, priorContext } = row;
                    const meta = nodeMetadata?.[n.id] || {};
                    const mod  = n.fromModule ? (projectModules || []).find(m => m.id === n.moduleId) : null;
                    if (sysSort.col === 'type') return n.fromModule ? 'module' : 'sys/func';
                    if (sysSort.col === 'name') return (mod ? (mod.displayName || mod.name) : (meta.name !== undefined ? meta.name : n.label)).toLowerCase();
                    if (sysSort.col === 'desc') return (mod ? (mod.description || '') : (meta.description || '')).toLowerCase();
                    if (sysSort.col === 'ftl')  return (mod ? (mod.knowFtlFileName || '') : (meta.knowFtlFileName || '')).toLowerCase();
                    if (sysSort.col === 'cond') return priorContext.map(p => p.label + ':' + p.branch).join('|').toLowerCase();
                    return '';
                };
                return [...functionRows].sort((a, b) => {
                    const ka = getKey(a), kb = getKey(b);
                    const cmp = ka < kb ? -1 : ka > kb ? 1 : 0;
                    return sysSort.dir === 'asc' ? cmp : -cmp;
                });
            }, [functionRows, sysSort, nodeMetadata, projectModules]);

            const sortedEndStateRows = React.useMemo(() => {
                if (!esSort.col) return endStateRows;
                const getKey = (n) => {
                    const meta = nodeMetadata?.[n.id] || {};
                    const mod  = n.fromModule ? (projectModules || []).find(m => m.id === n.moduleId) : null;
                    if (esSort.col === 'type') return n.fromModule ? 'es module' : 'end state';
                    if (esSort.col === 'name') return (mod ? (mod.displayName || mod.name) : (meta.name !== undefined ? meta.name : n.label)).toLowerCase();
                    if (esSort.col === 'desc') return (mod ? (mod.description || '') : (meta.description || '')).toLowerCase();
                    if (esSort.col === 'outcome') return (mod ? (mod.outcome || 'unanalyzed') : (endStateOutcomes?.[n.id] || 'unanalyzed'));
                    if (esSort.col === 'cons')  return ((meta.consequences || []).length + (mod ? (mod.consequences || []).length : 0));
                    return '';
                };
                return [...endStateRows].sort((a, b) => {
                    const ka = getKey(a), kb = getKey(b);
                    const cmp = ka < kb ? -1 : ka > kb ? 1 : 0;
                    return esSort.dir === 'asc' ? cmp : -cmp;
                });
            }, [endStateRows, esSort, nodeMetadata, projectModules, endStateOutcomes]);

            return (
                <div className="flex flex-col h-full overflow-hidden">
                    {/* Tabbed elements grid: Systems/Functions | End State */}
                    {(functionRows.length > 0 || endStateRows.length > 0) && (
                        <div className="flex-shrink-0 border-b bg-white overflow-hidden flex flex-col" style={{ maxHeight: '36%' }}>
                            {/* Tab bar */}
                            <div className="flex border-b bg-gray-50 flex-shrink-0">
                                <button
                                    onClick={() => setElementsTab('sys')}
                                    className={`px-3 py-1 text-xs font-semibold border-r transition-colors ${elementsTab === 'sys' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                                    style={{ marginBottom: elementsTab === 'sys' ? '-1px' : '0' }}
                                >
                                    Systems / Functions {functionRows.length > 0 ? `(${functionRows.length})` : ''}
                                </button>
                                <button
                                    onClick={() => setElementsTab('es')}
                                    className={`px-3 py-1 text-xs font-semibold border-r transition-colors ${elementsTab === 'es' ? 'bg-white text-blue-800 border-b-2 border-b-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                                    style={{ marginBottom: elementsTab === 'es' ? '-1px' : '0' }}
                                >
                                    End State {endStateRows.length > 0 ? `(${endStateRows.length})` : ''}
                                </button>
                            </div>
                            {/* Tab content */}
                            <div className="overflow-y-auto flex-1">
                                {/* ── Systems / Functions tab ── */}
                                {elementsTab === 'sys' && (
                                    <table className="border-collapse" style={{ fontSize: 'var(--gui-fs, 0.9rem)', tableLayout: 'fixed', width: sysColWidths.reduce((a,b)=>a+b,0) + 'px', minWidth: '100%' }}>
                                        <colgroup>
                                            {sysColWidths.map((w,i) => <col key={i} style={{ width: w + 'px' }} />)}
                                        </colgroup>
                                        <thead className="sticky top-0 z-10">
                                            <tr className="bg-blue-50">
                                                {[
                                                    { key:'type', label:'Type' },
                                                    { key:'name', label:'Display Name' },
                                                    { key:'desc', label:'Description' },
                                                    { key:'ftl',  label:'SYS_system.KNOW_FTL' },
                                                    { key:'cond', label:'Conditional Upon' },
                                                ].map((col, ci) => (
                                                    <th key={col.key}
                                                        className="border-b border-r px-2 py-1 text-left font-semibold text-blue-800 select-none"
                                                        style={{ position:'relative', cursor:'pointer', overflow:'hidden', whiteSpace:'nowrap' }}
                                                        onClick={() => cycleSort(sysSort, col.key, setSysSort)}
                                                    >
                                                        <span style={{ pointerEvents:'none' }}>{col.label}{sortArrow(sysSort, col.key)}</span>
                                                        {ResizeHandle(setSysColWidths, ci, sysColWidths)}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sortedFunctionRows.map(({ node: n, priorContext }, idx) => {
                                                const isMod  = !!n.fromModule;
                                                const mod    = isMod ? (projectModules || []).find(m => m.id === n.moduleId) : null;
                                                const meta   = nodeMetadata?.[n.id] || {};
                                                const displayName = isMod && mod ? (mod.displayName || mod.name) : (meta.name !== undefined ? meta.name : n.label);
                                                const displayDesc = isMod && mod ? (mod.description || '') : (meta.description || '');
                                                const rowBg  = isMod ? (idx % 2 === 0 ? '#faf5ff' : '#f3e8ff') : (idx % 2 === 0 ? '#ffffff' : '#f9fafb');
                                                return (
                                                    <tr key={n.id + '|' + idx} style={{ backgroundColor: rowBg }}>
                                                        <td className="border-b border-r px-2 py-0.5 whitespace-nowrap">
                                                            {isMod ? (
                                                                <span className="px-1.5 py-0.5 rounded text-xs font-semibold bg-purple-100 text-purple-800">Module</span>
                                                            ) : (
                                                                <span className="px-1.5 py-0.5 rounded text-xs font-semibold bg-blue-100 text-blue-800">Sys/Func</span>
                                                            )}
                                                        </td>
                                                        <td className="border-b border-r px-1 py-0.5" style={{ minWidth: '7rem' }}>
                                                            {isMod ? (
                                                                <span className="px-1 text-xs text-gray-600">{displayName}</span>
                                                            ) : (
                                                                <input
                                                                    type="text"
                                                                    value={meta.name !== undefined ? meta.name : n.label}
                                                                    onChange={(e) => onNodeMetadataChange(n.id, 'name', e.target.value)}
                                                                    className="w-full border-0 bg-transparent focus:outline-none focus:ring-1 focus:ring-blue-300 rounded px-1 text-xs"
                                                                    placeholder={n.label}
                                                                    spellCheck={false}
                                                                />
                                                            )}
                                                        </td>
                                                        <td className="border-b border-r px-1 py-0.5">
                                                            {isMod ? (
                                                                <span className="px-1 text-xs text-gray-400 italic">{displayDesc || '—'}</span>
                                                            ) : (
                                                                <input
                                                                    type="text"
                                                                    value={meta.description || ''}
                                                                    onChange={(e) => onNodeMetadataChange(n.id, 'description', e.target.value)}
                                                                    className="w-full border-0 bg-transparent focus:outline-none focus:ring-1 focus:ring-blue-300 rounded px-1 text-xs"
                                                                    placeholder="Optional description..."
                                                                    spellCheck={false}
                                                                />
                                                            )}
                                                        </td>
                                                        <td className="border-b border-r px-1 py-0.5" style={{ minWidth: '11rem' }}>
                                                            {!isMod ? (
                                                                n.distribution ? (
                                                                    <span
                                                                        className="px-1 text-xs font-mono text-purple-700 font-semibold"
                                                                        title={`Distribution: ${n.distribution.str} — mean = ${n.distribution.mean.toExponential(3)}`}
                                                                    >
                                                                        {n.distribution.str}
                                                                    </span>
                                                                ) : (
                                                                    <div className="flex items-center gap-1">
                                                                        <input
                                                                            type="text"
                                                                            value={meta.knowFtlFileName || ''}
                                                                            onChange={(e) => onNodeMetadataChange(n.id, 'knowFtlFileName', e.target.value)}
                                                                            className="flex-1 border-0 bg-transparent focus:outline-none focus:ring-1 focus:ring-blue-300 rounded px-1 text-xs font-mono"
                                                                            placeholder="SYS_name.KNOW_FTL"
                                                                            spellCheck={false}
                                                                            style={{ minWidth: 0 }}
                                                                        />
                                                                        <button
                                                                            onClick={() => onLoadSystem && onLoadSystem(meta.knowFtlFileName, (fileName) => onNodeMetadataChange(n.id, 'knowFtlFileName', fileName))}
                                                                            className="flex-shrink-0 px-1.5 py-0.5 bg-blue-900 text-white rounded hover:bg-blue-800 text-xs font-medium"
                                                                            title="Load system cut sets and basic events from KNOW_FTL file"
                                                                        >
                                                                            Load
                                                                        </button>
                                                                    </div>
                                                                )
                                                            ) : mod ? (
                                                                <span
                                                                    className="px-1 text-xs font-mono truncate block"
                                                                    style={{ color: mod.knowFtlFileName ? '#1e3a8a' : '#9ca3af', fontStyle: mod.knowFtlFileName ? 'normal' : 'italic' }}
                                                                    title={mod.knowFtlFileName ? `KNOW_FTL: ${mod.knowFtlFileName}` : 'No KNOW_FTL loaded for this module'}
                                                                >
                                                                    {mod.knowFtlFileName || 'not loaded'}
                                                                </span>
                                                            ) : (
                                                                <span className="text-gray-400 italic text-xs px-1">&mdash;</span>
                                                            )}
                                                        </td>
                                                        <td className="border-b px-2 py-0.5" style={{ minWidth: '10rem' }}>
                                                            {priorContext.length === 0 ? (
                                                                <span className="text-gray-400 italic text-xs">None (first top event)</span>
                                                            ) : (
                                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '2px 4px', alignItems: 'center' }}>
                                                                    {priorContext.map((pc, pi) => {
                                                                        const isSuccess = !pc.branch || pc.branch.toUpperCase() === 'YES' || pc.branch.toUpperCase() === 'WORKS' || pc.branch.toUpperCase() === 'SUCCESS' || pc.branch.toUpperCase() === 'OK' || pc.branch.toUpperCase() === 'PASS';
                                                                        const tag = isSuccess ? 'WORKS' : 'FAILS';
                                                                        const tagColor = isSuccess ? '#166534' : '#991b1b';
                                                                        const tagBg    = isSuccess ? '#dcfce7' : '#fee2e2';
                                                                        return (
                                                                            <span key={pi} className="text-xs text-gray-700 whitespace-nowrap">
                                                                                {pc.label}{' '}
                                                                                <span style={{ backgroundColor: tagBg, color: tagColor, fontWeight: 600, fontSize: '10px', padding: '0 3px', borderRadius: '3px' }}>[{tag}]</span>
                                                                                {pi < priorContext.length - 1 ? <span className="text-gray-400">,</span> : null}
                                                                            </span>
                                                                        );
                                                                    })}
                                                                </div>
                                                            )}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                )}
                                {/* ── End State tab ── */}
                                {elementsTab === 'es' && (
                                    <table className="border-collapse" style={{ fontSize: 'var(--gui-fs, 0.9rem)', tableLayout: 'fixed', width: esColWidths.reduce((a,b)=>a+b,0) + 'px', minWidth: '100%' }}>
                                        <colgroup>
                                            {esColWidths.map((w,i) => <col key={i} style={{ width: w + 'px' }} />)}
                                        </colgroup>
                                        <thead className="sticky top-0 z-10">
                                            <tr className="bg-blue-50">
                                                {[
                                                    { key:'type',    label:'Type' },
                                                    { key:'name',    label:'Display Name' },
                                                    { key:'desc',    label:'Description' },
                                                    { key:'outcome', label:'Outcome' },
                                                    { key:'cons',    label:'Consequences' },
                                                ].map((col, ci) => (
                                                    <th key={col.key}
                                                        className="border-b border-r px-2 py-1 text-left font-semibold text-blue-800 select-none"
                                                        style={{ position:'relative', cursor:'pointer', overflow:'hidden', whiteSpace:'nowrap' }}
                                                        onClick={() => cycleSort(esSort, col.key, setEsSort)}
                                                    >
                                                        <span style={{ pointerEvents:'none' }}>{col.label}{sortArrow(esSort, col.key)}</span>
                                                        {ResizeHandle(setEsColWidths, ci, esColWidths)}
                                                    </th>

        // ── FOS Selector Modal ────────────────────────────────────────────────────
        function FosSelectorModal({ haData, onSelect, onCancel }) {
            useEscapeKey(onCancel);
            const states = haData?.operatingStates || [];
            const customData = haData?.operatingStateData || {};
            const [chosen, setChosen] = useState(states.length > 0 ? states[0].id : null);

            return (
                <div className="modal-overlay">

                                                        <span className="px-2 py-0.5 rounded text-xs font-semibold text-gray-800" style={{ backgroundColor: color }}>{state.id}</span>
                                                        <span className="font-medium text-sm">{name}</span>

        // ── FOS Info Modal ────────────────────────────────────────────────────────
        function FosInfoModal({ haData, selectedFosId, onClose }) {
            useEscapeKey(onClose);
            const fosStates = haData?.operatingStates || [];
            const customData = haData?.operatingStateData || {};
            const fos = fosStates.find(s => s.id === selectedFosId);
            if (!fos) return null;
            const cd = customData[fos.id] || {};
            const name = cd.name || fos.name;
            const description = cd.description || fos.description || '';
            const extDesc = cd.extendedDescription || '';
            const color = cd.color || fos.color || '#e5e7eb';
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" style={{ maxWidth: '520px' }} onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="px-3 py-1 rounded font-bold text-sm text-gray-800" style={{ backgroundColor: color }}>{fos.id}</span>
                                <h2 className="text-lg font-bold">{name}</h2>
