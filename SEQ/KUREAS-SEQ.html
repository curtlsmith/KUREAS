        // HA Import Modal - for comparing and merging HA data
        function HAImportModal({ existingHaData, newHaData, onImport, onClose }) {
            useEscapeKey(onClose);
            const [newHazardsSelection, setNewHazardsSelection] = useState({});
            const [changedHazardsSelection, setChangedHazardsSelection] = useState({});
            const [activeTab, setActiveTab] = useState('new'); // 'new' or 'changed'

            // Get all leaf hazards from a hazard list
            const getLeafHazards = (hazardList, path = []) => {
                const leaves = [];
                const processNode = (node, currentPath) => {
                    const nodePath = [...currentPath, node.name];
                    if (node.children && node.children.length > 0) {
                        node.children.forEach(child => processNode(child, nodePath));
                    } else {
                        leaves.push({
                            id: node.id,
                            name: node.name,
                            path: nodePath.join(' > ')
                        });
                    }
                };
                (hazardList || []).forEach(node => processNode(node, []));
                return leaves;
            };

            // Compare hazard analysis data for changes
            const compareAnalysisData = (existing, incoming) => {
                if (!existing && !incoming) return { changed: false, changes: [] };
                if (!existing) return { changed: true, changes: ['New analysis data'] };
                if (!incoming) return { changed: false, changes: [] };

                const changes = [];
                
                // Compare applicableEvents
                const existingEvents = existing.applicableEvents || [];
                const incomingEvents = incoming.applicableEvents || [];
                
                if (existingEvents.length !== incomingEvents.length) {
                    changes.push(`Event count: ${existingEvents.length} -> ${incomingEvents.length}`);
                }
                
                // Compare each event
                incomingEvents.forEach((inEvent, idx) => {
                    const exEvent = existingEvents[idx];
                    if (!exEvent) {
                        changes.push(`New event: ${inEvent.name || 'Unnamed'}`);
                    } else {
                        if (exEvent.occurrenceModel !== inEvent.occurrenceModel) {
                            changes.push(`Model: ${exEvent.occurrenceModel} -> ${inEvent.occurrenceModel}`);
                        }
                        if (exEvent.occurrenceModel === 'frequency' && inEvent.occurrenceModel === 'frequency') {
                            if (exEvent.pointEstimate !== inEvent.pointEstimate) {
                                changes.push(`Frequency: ${exEvent.pointEstimate || '?'} -> ${inEvent.pointEstimate || '?'}`);
                            }
                        }
                        if (exEvent.occurrenceModel === 'nureg-2169-fire' && inEvent.occurrenceModel === 'nureg-2169-fire') {
                            const exSel = Object.keys(exEvent.fireIgnitionSelections || {}).filter(k => exEvent.fireIgnitionSelections[k]).length;
                            const inSel = Object.keys(inEvent.fireIgnitionSelections || {}).filter(k => inEvent.fireIgnitionSelections[k]).length;
                            if (exSel !== inSel) {
                                changes.push(`Fire sources: ${exSel} -> ${inSel}`);
                            }
                        }
                    }
                });

                return { changed: changes.length > 0, changes };
            };

            // Analyze differences between existing and new HA data
            const analyzeChanges = () => {
                const existingLeaves = getLeafHazards(existingHaData?.hazardList);
                const newLeaves = getLeafHazards(newHaData?.hazardList);
                
                const existingIds = new Set(existingLeaves.map(h => h.id));
                const newIds = new Set(newLeaves.map(h => h.id));
                
                // Find new hazards (in new but not in existing)
                const newHazards = newLeaves.filter(h => !existingIds.has(h.id));
                
                // Find hazards that exist in both but may have different analysis data
                const commonHazards = newLeaves.filter(h => existingIds.has(h.id));
                const changedHazards = [];
                
                // Compare hazard states and analysis for common hazards
                const existingStates = existingHaData?.hazardStates || {};
                const newStates = newHaData?.hazardStates || {};
                const existingAnalysis = existingHaData?.hazardAnalysisData || {};
                const newAnalysis = newHaData?.hazardAnalysisData || {};
                
                // Get operating states (use new data's states or default)
                const opStates = newHaData?.operatingStates || 
                    [{ id: 'FOS-1' }, { id: 'FOS-2' }, { id: 'FOS-3' }, { id: 'FOS-4' }];
                
                commonHazards.forEach(hazard => {
                    const changes = [];
                    
                    opStates.forEach(state => {
                        const stateId = state.id || state;
                        const key = `${hazard.id}_${stateId}`;
                        
                        // Check if status changed
                        if (existingStates[key] !== newStates[key]) {
                            changes.push({
                                stateId,
                                type: 'status',
                                from: existingStates[key] || 'undefined',
                                to: newStates[key] || 'undefined'
                            });
                        }
                        
                        // Check if analysis data changed
                        const analysisComparison = compareAnalysisData(existingAnalysis[key], newAnalysis[key]);
                        if (analysisComparison.changed) {
                            changes.push({
                                stateId,
                                type: 'analysis',
                                details: analysisComparison.changes
                            });
                        }
                    });
                    
                    if (changes.length > 0) {
                        changedHazards.push({
                            ...hazard,
                            changes
                        });
                    }
                });
                
                return { newHazards, changedHazards };
            };

            const { newHazards, changedHazards } = analyzeChanges();

            // Initialize selections and active tab based on which list has content
            useEffect(() => {
                const newSel = {};
                newHazards.forEach(h => { newSel[h.id] = true; });
                setNewHazardsSelection(newSel);
                
                const changedSel = {};
                changedHazards.forEach(h => { changedSel[h.id] = false; });
                setChangedHazardsSelection(changedSel);
                
                // Set active tab to whichever has content (prefer 'new' if both have content)
                if (newHazards.length > 0 && changedHazards.length === 0) {
                    setActiveTab('new');
                } else if (changedHazards.length > 0 && newHazards.length === 0) {
                    setActiveTab('changed');
                } else {
                    setActiveTab('new'); // default to 'new' if both have content
                }
            }, []);

            const toggleNewHazard = (id) => {
                setNewHazardsSelection(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const toggleChangedHazard = (id) => {
                setChangedHazardsSelection(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const selectAllNew = () => {
                const sel = {};
                newHazards.forEach(h => { sel[h.id] = true; });
                setNewHazardsSelection(sel);
            };

            const selectNoneNew = () => {
                const sel = {};
                newHazards.forEach(h => { sel[h.id] = false; });
                setNewHazardsSelection(sel);
            };

            const selectAllChanged = () => {
                const sel = {};
                changedHazards.forEach(h => { sel[h.id] = true; });
                setChangedHazardsSelection(sel);
            };

            const selectNoneChanged = () => {
                const sel = {};
                changedHazards.forEach(h => { sel[h.id] = false; });
                setChangedHazardsSelection(sel);
            };

            const handleImport = () => {
                const selectedNewIds = Object.keys(newHazardsSelection).filter(id => newHazardsSelection[id]);
                const selectedChangedIds = Object.keys(changedHazardsSelection).filter(id => changedHazardsSelection[id]);
                onImport(selectedNewIds, selectedChangedIds, newHaData);
            };

            const newCount = Object.values(newHazardsSelection).filter(v => v).length;
            const changedCount = Object.values(changedHazardsSelection).filter(v => v).length;

            // If no changes detected, just import directly
            if (newHazards.length === 0 && changedHazards.length === 0) {
                return (
                    <div className="modal-overlay">
                        <div className="modal-content" style={{ maxWidth: '500px' }}>
                            <div className="p-5">
                                <h2 className="text-xl font-bold mb-4">Import HA Data</h2>
                                <p className="mb-4">No differences detected between the existing project and the new HA file.</p>
                                <p className="text-gray-600 mb-4">The HA data will be updated with the latest file.</p>
                                <div className="flex gap-3 justify-end">
                                    <button onClick={onClose} className="px-4 py-2 border rounded hover:bg-gray-100">
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={() => onImport([], [], newHaData)}
                                        className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                    >
                                        Update HA Data
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{ maxWidth: '800px', width: '95%', maxHeight: '85vh' }}>
                        <div className="p-5 flex flex-col" style={{ maxHeight: '80vh' }}>
                            <h2 className="text-xl font-bold mb-2">Import HA Data - Review Changes</h2>
                            <p className="text-sm text-gray-600 mb-4">
                                The HA file contains differences from your current project. Review and select which changes to apply.
                            </p>

                            {/* Tabs - highlight in red if tab has content to review */}
                            <div className="flex border-b mb-4">
                                <button
                                    onClick={() => setActiveTab('new')}
                                    className={`px-4 py-2 -mb-px font-medium ${activeTab === 'new' 
                                        ? 'border-b-2 border-blue-600 text-blue-600' 
                                        : newHazards.length > 0 
                                            ? 'text-red-600 font-bold' 
                                            : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    {newHazards.length > 0 && activeTab !== 'new' && (
                                        <span className="mr-1">&#9888;</span>
                                    )}
                                    New Hazards ({newHazards.length})
                                </button>
                                <button
                                    onClick={() => setActiveTab('changed')}
                                    className={`px-4 py-2 -mb-px font-medium ${activeTab === 'changed' 
                                        ? 'border-b-2 border-orange-600 text-orange-600' 
                                        : changedHazards.length > 0 
                                            ? 'text-red-600 font-bold' 
                                            : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    {changedHazards.length > 0 && activeTab !== 'changed' && (
                                        <span className="mr-1">&#9888;</span>
                                    )}
                                    Changed Hazards ({changedHazards.length})
                                </button>
                            </div>

                            {/* Tab Content */}
                            <div className="flex-1 overflow-y-auto border rounded p-3 mb-4" style={{ minHeight: '300px' }}>
                                {activeTab === 'new' ? (
                                    newHazards.length === 0 ? (
                                        <div className="text-center text-gray-500 py-8">
                                            No new hazards found in the HA file.
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-sm text-gray-600">
                                                    Select hazards to add to your project (default: all selected)
                                                </span>
                                                <div className="flex gap-2">
                                                    <button onClick={selectAllNew} className="text-xs text-blue-600 hover:underline">
                                                        Select All
                                                    </button>
                                                    <span className="text-gray-300">|</span>
                                                    <button onClick={selectNoneNew} className="text-xs text-blue-600 hover:underline">
                                                        Select None
                                                    </button>
                                                </div>
                                            </div>
                                            {newHazards.map(hazard => (
                                                <label 
                                                    key={hazard.id}
                                                    className="flex items-start gap-3 p-2 hover:bg-gray-50 rounded cursor-pointer"
                                                >
                                                    <input
                                                        type="checkbox"
                                                        checked={newHazardsSelection[hazard.id] || false}
                                                        onChange={() => toggleNewHazard(hazard.id)}
                                                        className="mt-1"
                                                    />
                                                    <div>
                                                        <div className="font-medium text-sm">{hazard.name}</div>
                                                        <div className="text-xs text-gray-500">{hazard.path}</div>
                                                    </div>
                                                </label>
                                            ))}
                                        </>
                                    )
                                ) : (
                                    changedHazards.length === 0 ? (
                                        <div className="text-center text-gray-500 py-8">
                                            No changed hazards detected.
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-sm text-gray-600">
                                                    Select hazards to update with new data (default: none selected)
                                                </span>
                                                <div className="flex gap-2">
                                                    <button onClick={selectAllChanged} className="text-xs text-blue-600 hover:underline">
                                                        Select All
                                                    </button>
                                                    <span className="text-gray-300">|</span>
                                                    <button onClick={selectNoneChanged} className="text-xs text-blue-600 hover:underline">
                                                        Select None
                                                    </button>
                                                </div>
                                            </div>
                                            {changedHazards.map(hazard => (
                                                <label 
                                                    key={hazard.id}
                                                    className="flex items-start gap-3 p-2 hover:bg-gray-50 rounded cursor-pointer border-b"
                                                >
                                                    <input
                                                        type="checkbox"
                                                        checked={changedHazardsSelection[hazard.id] || false}
                                                        onChange={() => toggleChangedHazard(hazard.id)}
                                                        className="mt-1"
                                                    />
                                                    <div className="flex-1">
                                                        <div className="font-medium text-sm">{hazard.name}</div>
                                                        <div className="text-xs text-gray-500 mb-1">{hazard.path}</div>
                                                        <div className="text-xs bg-orange-50 p-2 rounded">
                                                            <strong>Changes:</strong>
                                                            <ul className="list-disc list-inside mt-1">
                                                                {hazard.changes.map((change, idx) => (
                                                                    <li key={idx}>
                                                                        {change.type === 'status' ? (
                                                                            <span>{change.stateId}: Status {change.from} → {change.to}</span>
                                                                        ) : (
                                                                            <span>
                                                                                {change.stateId}: {change.details.join(', ')}
                                                                            </span>
                                                                        )}
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </label>
                                            ))}
                                        </>
                                    )
                                )}
                            </div>

                            {/* Summary */}
                            <div className="bg-gray-50 rounded p-3 mb-4 text-sm">
                                <strong>Summary:</strong> 
                                <span className="ml-2 text-green-700">{newCount} new hazard(s) to add</span>
                                <span className="mx-2">|</span>
                                <span className="text-orange-700">{changedCount} hazard(s) to update</span>
                            </div>

                            {/* Footer */}
                            <div className="flex gap-3 justify-end">
                                <button onClick={onClose} className="px-4 py-2 border rounded hover:bg-gray-100">
                                    Cancel
                                </button>
                                <button 
                                    onClick={handleImport}
                                    className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                >
                                    Import Selected Changes
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // SEQ Import Modal - Compare existing project with loaded SEQ file
        function SEQImportModal({ existingData, newData, onImport, onClose }) {
            useEscapeKey(onClose);
            const [newItemsSelection, setNewItemsSelection] = useState({});
            const [changedItemsSelection, setChangedItemsSelection] = useState({});
            const [activeTab, setActiveTab] = useState('new'); // 'new' or 'changed'

            // Helper to compare POL nodes
            const comparePOLNodes = (existingPol, newPol) => {
                const changes = [];
                
                if (!existingPol || !newPol) return changes;
                
                // Compare node count
                const existingNodeCount = existingPol.nodes?.length || 0;
                const newNodeCount = newPol.nodes?.length || 0;
                if (existingNodeCount !== newNodeCount) {
                    changes.push(`Node count: ${existingNodeCount} → ${newNodeCount}`);
                }
                
                // Compare connection count
                const existingConnCount = existingPol.connections?.length || 0;
                const newConnCount = newPol.connections?.length || 0;
                if (existingConnCount !== newConnCount) {
                    changes.push(`Connection count: ${existingConnCount} → ${newConnCount}`);
                }
                
                // Compare layout
                if (existingPol.layout !== newPol.layout) {
                    changes.push(`Layout: ${existingPol.layout || 'LR'} → ${newPol.layout || 'LR'}`);
                }
                
                // Compare name
                if (existingPol.name !== newPol.name) {
                    changes.push(`Name: "${existingPol.name}" → "${newPol.name}"`);
                }
                
                // Compare detailed description
                const existingDesc = existingPol.detailedDescription || '';
                const newDesc = newPol.detailedDescription || '';
                if (existingDesc !== newDesc) {
                    if (!existingDesc && newDesc) {
                        changes.push('Detailed description added');
                    } else if (existingDesc && !newDesc) {
                        changes.push('Detailed description removed');
                    } else {
                        changes.push('Detailed description modified');
                    }
                }
                
                return changes;
            };

            // Compare shared POLs
            const compareSharedPol = (existingShared, newShared) => {
                const changes = [];
                
                if (!existingShared || !newShared) return changes;
                
                // Compare node count
                const existingNodeCount = existingShared.nodes?.length || 0;
                const newNodeCount = newShared.nodes?.length || 0;
                if (existingNodeCount !== newNodeCount) {
                    changes.push(`Node count: ${existingNodeCount} → ${newNodeCount}`);
                }
                
                // Compare name
                if (existingShared.name !== newShared.name) {
                    changes.push(`Name: "${existingShared.name}" → "${newShared.name}"`);
                }
                
                // Compare detailed description
                const existingDesc = existingShared.detailedDescription || '';
                const newDesc = newShared.detailedDescription || '';
                if (existingDesc !== newDesc) {
                    if (!existingDesc && newDesc) {
                        changes.push('Detailed description added');
                    } else if (existingDesc && !newDesc) {
                        changes.push('Detailed description removed');
                    } else {
                        changes.push('Detailed description modified');
                    }
                }
                
                return changes;
            };

            // Analyze differences
            const analyzeChanges = () => {
                const newItems = [];
                const changedItems = [];
                
                const existingPols = existingData.pols || [];
                const newPols = newData.pols || [];
                const existingSharedPols = existingData.sharedPols || [];
                const newSharedPols = newData.sharedPols || [];
                // Create lookup maps
                const existingPolMap = new Map(existingPols.map(p => [p.id, p]));
                const existingSharedMap = new Map(existingSharedPols.map(p => [p.id, p]));
                
                // Check for new and changed POLs
                newPols.forEach(pol => {
                    const existing = existingPolMap.get(pol.id);
                    if (!existing) {
                        newItems.push({
                            id: pol.id,
                            type: 'pol',
                            name: pol.name,
                            description: `Diagram for ${pol.hazardName || 'hazard'} (${pol.operatingStateId || 'unknown state'})`,
                            item: pol
                        });
                    } else {
                        const changes = comparePOLNodes(existing, pol);
                        if (changes.length > 0) {
                            changedItems.push({
                                id: pol.id,
                                type: 'pol',
                                name: pol.name,
                                description: `Diagram for ${pol.hazardName || 'hazard'} (${pol.operatingStateId || 'unknown state'})`,
                                changes,
                                item: pol
                            });
                        }
                    }
                });
                
                // Check for new and changed shared POLs
                newSharedPols.forEach(sharedPol => {
                    const existing = existingSharedMap.get(sharedPol.id);
                    if (!existing) {
                        newItems.push({
                            id: sharedPol.id,
                            type: 'sharedPol',
                            name: sharedPol.name,
                            description: 'Shared Plant Operating Logic',
                            item: sharedPol
                        });
                    } else {
                        const changes = compareSharedPol(existing, sharedPol);
                        if (changes.length > 0) {
                            changedItems.push({
                                id: sharedPol.id,
                                type: 'sharedPol',
                                name: sharedPol.name,
                                description: 'Shared Plant Operating Logic',
                                changes,
                                item: sharedPol
                            });
                        }
                    }
                });

                // Check for HA data changes
                if (newData.haData && existingData.haData) {
                    // Compare facility name
                    if (existingData.haData.facilityName !== newData.haData.facilityName) {
                        changedItems.push({
                            id: 'haData-facilityName',
                            type: 'haData',
                            name: 'Facility Name',
                            description: 'Hazard Analysis Data',
                            changes: [`"${existingData.haData.facilityName || ''}" → "${newData.haData.facilityName || ''}"`],
                            item: { field: 'facilityName', value: newData.haData.facilityName }
                        });
                    }
                } else if (newData.haData && !existingData.haData) {
                    newItems.push({
                        id: 'haData',
                        type: 'haData',
                        name: 'Hazard Analysis Data',
                        description: `From ${newData.haData.facilityName || 'unknown facility'}`,
                        item: newData.haData
                    });
                }
                
                return { newItems, changedItems };
            };

            const { newItems, changedItems } = analyzeChanges();

            // Initialize selections
            useEffect(() => {
                const newSel = {};
                newItems.forEach(item => { newSel[item.id] = true; }); // Default: all selected
                setNewItemsSelection(newSel);
                
                const changedSel = {};
                changedItems.forEach(item => { changedSel[item.id] = false; }); // Default: none selected
                setChangedItemsSelection(changedSel);
                
                // Set active tab based on content
                if (newItems.length > 0 && changedItems.length === 0) {
                    setActiveTab('new');
                } else if (newItems.length === 0 && changedItems.length > 0) {
                    setActiveTab('changed');
                } else if (newItems.length > 0) {
                    setActiveTab('new');
                }
            }, []);

            const toggleNewItem = (id) => {
                setNewItemsSelection(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const toggleChangedItem = (id) => {
                setChangedItemsSelection(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const selectAllNew = () => {
                const newSel = {};
                newItems.forEach(item => { newSel[item.id] = true; });
                setNewItemsSelection(newSel);
            };

            const selectNoneNew = () => {
                const newSel = {};
                newItems.forEach(item => { newSel[item.id] = false; });
                setNewItemsSelection(newSel);
            };

            const selectAllChanged = () => {
                const sel = {};
                changedItems.forEach(item => { sel[item.id] = true; });
                setChangedItemsSelection(sel);
            };

            const selectNoneChanged = () => {
                const sel = {};
                changedItems.forEach(item => { sel[item.id] = false; });
                setChangedItemsSelection(sel);
            };

            const handleImport = () => {
                const selectedNewIds = Object.keys(newItemsSelection).filter(id => newItemsSelection[id]);
                const selectedChangedIds = Object.keys(changedItemsSelection).filter(id => changedItemsSelection[id]);
                
                // Collect items to import
                const itemsToImport = {
                    newPols: newItems.filter(i => i.type === 'pol' && selectedNewIds.includes(i.id)).map(i => i.item),
                    newSharedPols: newItems.filter(i => i.type === 'sharedPol' && selectedNewIds.includes(i.id)).map(i => i.item),
                    newHaData: newItems.find(i => i.type === 'haData' && selectedNewIds.includes(i.id))?.item,
                    changedPols: changedItems.filter(i => i.type === 'pol' && selectedChangedIds.includes(i.id)).map(i => i.item),
                    changedSharedPols: changedItems.filter(i => i.type === 'sharedPol' && selectedChangedIds.includes(i.id)).map(i => i.item),
                };
                
                onImport(itemsToImport, newData);
            };

            const newCount = Object.values(newItemsSelection).filter(Boolean).length;
            const changedCount = Object.values(changedItemsSelection).filter(Boolean).length;

            const getTypeIcon = (type) => {
                switch (type) {
                    case 'pol': return '📊';
                    case 'sharedPol': return '🔗';
                    case 'haData': return '⚠️';
                    default: return '📄';
                }
            };

            const getTypeLabel = (type) => {
                switch (type) {
                    case 'pol': return 'Diagram';
                    case 'sharedPol': return 'Shared Logic';
                    case 'haData': return 'Hazard Data';
                    default: return 'Item';
                }
            };

            // Check if there are no changes at all
            if (newItems.length === 0 && changedItems.length === 0) {
                return (
                    <div className="modal-overlay">
                        <div className="modal-content" onClick={e => e.stopPropagation()}>
                            <div className="p-5">
                                <h2 className="text-xl font-bold mb-4">Load SEQ File</h2>
                                <p className="text-gray-600 mb-4">
                                    The loaded SEQ file contains no new items or changes compared to the current project.
                                </p>
                                <p className="text-gray-600 mb-6">
                                    Do you want to replace the current project with the loaded file?
                                </p>
                                <div className="flex gap-3 justify-end">
                                    <button onClick={onClose} className="px-4 py-2 border rounded hover:bg-gray-100">
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={() => onImport({ replaceAll: true }, newData)}
                                        className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                    >
                                        Replace Project
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="modal-overlay">
                    <div className="modal-content modal-content-wide" onClick={e => e.stopPropagation()}>
                        <div className="p-5">
                            <h2 className="text-xl font-bold mb-4">Import SEQ File Changes</h2>
                            
                            <p className="text-gray-600 mb-4">
                                The loaded SEQ file contains items that differ from the current project.
                                Select which changes to incorporate.
                            </p>

                            {/* Tabs */}
                            <div className="flex border-b mb-4">
                                <button
                                    onClick={() => setActiveTab('new')}
                                    className={`px-4 py-2 font-medium ${
                                        activeTab === 'new' 
                                            ? 'border-b-2 border-green-600 text-green-600' 
                                            : 'text-gray-500 hover:text-gray-700'
                                    } ${activeTab !== 'new' && newItems.length > 0 ? 'font-bold text-red-600' : ''}`}
                                >
                                    New Items ({newItems.length})
                                    {activeTab !== 'new' && newItems.length > 0 && <span className="ml-1">⚠</span>}
                                </button>
                                <button
                                    onClick={() => setActiveTab('changed')}
                                    className={`px-4 py-2 font-medium ${
                                        activeTab === 'changed' 
                                            ? 'border-b-2 border-orange-600 text-orange-600' 
                                            : 'text-gray-500 hover:text-gray-700'
                                    } ${activeTab !== 'changed' && changedItems.length > 0 ? 'font-bold text-red-600' : ''}`}
                                >
                                    Changed Items ({changedItems.length})
                                    {activeTab !== 'changed' && changedItems.length > 0 && <span className="ml-1">⚠</span>}
                                </button>
                            </div>

                            {/* Content */}
                            <div className="max-h-80 overflow-y-auto border rounded p-3">
                                {activeTab === 'new' ? (
                                    newItems.length === 0 ? (
                                        <div className="text-center text-gray-500 py-8">
                                            No new items in the loaded file.
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-sm text-gray-600">
                                                    Select items to add (default: all selected)
                                                </span>
                                                <div className="flex gap-2">
                                                    <button onClick={selectAllNew} className="text-xs text-blue-600 hover:underline">
                                                        Select All
                                                    </button>
                                                    <span className="text-gray-300">|</span>
                                                    <button onClick={selectNoneNew} className="text-xs text-blue-600 hover:underline">
                                                        Select None
                                                    </button>
                                                </div>
                                            </div>
                                            {newItems.map(item => (
                                                <label 
                                                    key={item.id}
                                                    className="flex items-start gap-3 p-2 hover:bg-green-50 rounded cursor-pointer border-b"
                                                >
                                                    <input
                                                        type="checkbox"
                                                        checked={newItemsSelection[item.id] || false}
                                                        onChange={() => toggleNewItem(item.id)}
                                                        className="mt-1"
                                                    />
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2">
                                                            <span>{getTypeIcon(item.type)}</span>
                                                            <span className="font-medium text-sm">{item.name}</span>
                                                            <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">
                                                                {getTypeLabel(item.type)}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs text-gray-500">{item.description}</div>
                                                    </div>
                                                </label>
                                            ))}
                                        </>
                                    )
                                ) : (
                                    changedItems.length === 0 ? (
                                        <div className="text-center text-gray-500 py-8">
                                            No changed items detected.
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-sm text-gray-600">
                                                    Select items to update (default: none selected)
                                                </span>
                                                <div className="flex gap-2">
                                                    <button onClick={selectAllChanged} className="text-xs text-blue-600 hover:underline">
                                                        Select All
                                                    </button>
                                                    <span className="text-gray-300">|</span>
                                                    <button onClick={selectNoneChanged} className="text-xs text-blue-600 hover:underline">
                                                        Select None
                                                    </button>
                                                </div>
                                            </div>
                                            {changedItems.map(item => (
                                                <label 
                                                    key={item.id}
                                                    className="flex items-start gap-3 p-2 hover:bg-orange-50 rounded cursor-pointer border-b"
                                                >
                                                    <input
                                                        type="checkbox"
                                                        checked={changedItemsSelection[item.id] || false}
                                                        onChange={() => toggleChangedItem(item.id)}
                                                        className="mt-1"
                                                    />
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2">
                                                            <span>{getTypeIcon(item.type)}</span>
                                                            <span className="font-medium text-sm">{item.name}</span>
                                                            <span className="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded">
                                                                {getTypeLabel(item.type)}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs text-gray-500 mb-1">{item.description}</div>
                                                        <div className="text-xs bg-orange-50 p-2 rounded">
                                                            <strong>Changes:</strong>
                                                            <ul className="list-disc list-inside mt-1">
                                                                {item.changes.map((change, idx) => (
                                                                    <li key={idx}>{change}</li>
                                                                ))}
                                                            </ul>

        // Node Tree Component for editing
        function NodeTree({ pol, sharedPols, onEditNode, onAddNode, onEditBranch, onDeleteNode }) {
            if (!pol) return null;

            const getNodeIcon = (type) => {
                switch (type) {
                    case NODE_TYPES.INITIATING_EVENT: return '\u25B6'; // Right triangle
                    case NODE_TYPES.FUNCTION: return '\u25A0'; // Square
                    case NODE_TYPES.TRANSITION: return '\u25CF'; // Circle
                    case NODE_TYPES.END_STATE: return '\u25C0'; // Left triangle
                    default: return '\u25A1';
                }
            };

            const getNodeTypeColor = (type) => {
                switch (type) {
                    case NODE_TYPES.INITIATING_EVENT: return 'text-red-600';
                    case NODE_TYPES.FUNCTION: return 'text-blue-600';
                    case NODE_TYPES.TRANSITION: return 'text-purple-600';
                    case NODE_TYPES.END_STATE: return 'text-green-600';
                    default: return 'text-gray-600';
                }
            };

            // Sort nodes by type: IE first, then Functions, Transitions, End States
            const getTypeSortOrder = (type) => {
                switch (type) {
                    case NODE_TYPES.INITIATING_EVENT: return 0;
                    case NODE_TYPES.FUNCTION: return 1;
                    case NODE_TYPES.TRANSITION: return 2;
                    case NODE_TYPES.END_STATE: return 3;
                    default: return 4;
                }
            };

            // Separate regular nodes from shared nodes and sort by type
            const regularNodes = pol.nodes
                .filter(n => !n.sharedPolId)
                .sort((a, b) => getTypeSortOrder(a.type) - getTypeSortOrder(b.type));
            
            // Group shared nodes by their source shared POL
            const sharedNodeGroups = {};
            pol.nodes.filter(n => n.sharedPolId).forEach(node => {
                if (!sharedNodeGroups[node.sharedPolId]) {
                    sharedNodeGroups[node.sharedPolId] = [];
                }
                sharedNodeGroups[node.sharedPolId].push(node);
            });
            
            // Sort shared nodes within each group by type
            Object.keys(sharedNodeGroups).forEach(key => {
                sharedNodeGroups[key].sort((a, b) => getTypeSortOrder(a.type) - getTypeSortOrder(b.type));
            });

            // Check if a branch exists for a given node and connection type
            const getBranchConnection = (nodeId, branchType) => {
                const label = branchType === 'yes' ? 'Yes' : branchType === 'no' ? 'No' : '';
                return pol.connections.find(c => c.from === nodeId && c.label === label);
            };

            const handleBranchClick = (e, nodeId, branchType) => {
                e.stopPropagation();
                const existingConnection = getBranchConnection(nodeId, branchType);
                if (existingConnection) {
                    // Branch exists - edit it
                    onEditBranch(nodeId, branchType, existingConnection);
                } else {
                    // No branch - add new
                    onAddNode(nodeId, branchType);
                }
            };

            const renderNode = (node, isShared = false) => {
                const yesConnection = getBranchConnection(node.id, 'yes');
                const noConnection = getBranchConnection(node.id, 'no');
                
                return (
                    <div
                        key={node.id}
                        className={`tree-node flex items-center gap-2 ${isShared ? 'bg-purple-50 border-l-2 border-purple-300' : ''}`}
                        onClick={() => onEditNode(node)}
                    >
                        <span className={getNodeTypeColor(node.type)}>{getNodeIcon(node.type)}</span>
                        <span className={`flex-1 truncate ${node.isOverridden ? 'font-bold' : ''}`}>
                            {node.label || '(unnamed)'}
                            {node.isOverridden && <span className="text-red-500 ml-1 font-bold">*</span>}
                        </span>
                        {node.type === NODE_TYPES.FUNCTION && (
                            <div className="flex gap-1">
                                <button
                                    onClick={(e) => handleBranchClick(e, node.id, 'yes')}
                                    className={`text-xs px-1 rounded ${
                                        yesConnection 
                                            ? 'bg-green-500 text-white hover:bg-green-600' 
                                            : 'bg-green-100 text-green-700 hover:bg-green-200'
                                    }`}
                                    title={yesConnection ? 'Edit Yes branch' : 'Add Yes branch'}
                                >
                                    {yesConnection ? 'Y' : '+Y'}
                                </button>
                                <button
                                    onClick={(e) => handleBranchClick(e, node.id, 'no')}
                                    className={`text-xs px-1 rounded ${
                                        noConnection 
                                            ? 'bg-red-500 text-white hover:bg-red-600' 
                                            : 'bg-red-100 text-red-700 hover:bg-red-200'
                                    }`}
                                    title={noConnection ? 'Edit No branch' : 'Add No branch'}
                                >
                                    {noConnection ? 'N' : '+N'}
                                </button>
                            </div>
                        )}
                        {(node.type === NODE_TYPES.TRANSITION || node.type === NODE_TYPES.INITIATING_EVENT) && (
                            <button
                                onClick={(e) => {
                                    e.stopPropagation();
                                    onAddNode(node.id, 'next');
                                }}
                                className="text-xs px-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200"
                                title="Add next node"
                            >
                                +
                            </button>
                        )}
                    </div>
                );
            };

            return (
                <div className="p-2">
                    <div className="text-sm font-semibold mb-2 px-2">Nodes</div>
                    {regularNodes.map(node => renderNode(node, false))}
                    
                    {/* Shared node groups */}
                    {Object.entries(sharedNodeGroups).map(([sharedPolId, nodes]) => {
                        const sharedPol = sharedPols?.find(sp => sp.id === sharedPolId);
                        const sharedPolName = pol.sharedPolRefs?.[sharedPolId]?.name || sharedPol?.name || 'Shared Logic';
                        const hasOverriddenNodes = nodes.some(n => n.isOverridden);
                        
                        return (
                            <div key={sharedPolId} className="mt-3">
                                <div className="text-xs font-semibold mb-1 px-2 text-purple-600 flex items-center gap-1">
                                    <span className="border-b border-dashed border-purple-400 flex-1"></span>
                                    <span>From: {sharedPolName}</span>
                                    <span className="border-b border-dashed border-purple-400 flex-1"></span>
                                </div>
                                {nodes.map(node => renderNode(node, true))}
                            </div>
                        );
                    })}
                    
                    {/* Legend for overridden nodes */}
                    {pol.nodes && pol.nodes.some(n => n.isOverridden) && (
                        <div className="mt-4 pt-2 border-t text-xs text-gray-500 px-2">
                            <span className="text-red-500 font-bold">*</span> Indicates node modified from shared diagram
                        </div>
                    )}
                </div>
            );
        }

        /**
         * Convert a parsed HTFW graph into a pol-compatible object so that
         * HowFacilityFailsModal can render the event tree directly from the script.
         * nodeMetadata, projectModules and endStateOutcomes are used to resolve
         * display names and labels.
         */
        const htfwScriptToPol = (ieName, rawScript, projectModules, nodeMetadata, endStateOutcomes, ieDescription) => {
            if (!rawScript || !ieName) return null;
            let graph;
            try {
                graph = parseHTFWScript(ieName, rawScript, projectModules);
            } catch(e) {
                return null;
            }
            if (!graph || graph.nodes.size <= 1) return null;

            const modById = {};
            (projectModules || []).forEach(m => { modById[m.id] = m; });

            const nodes = [];
            const connections = [];

            // Collect the IDs of FAILED-type nodes so we can skip them and their edges.
            // FAILED() is a quantification modifier only — it has no place in the event tree graphic.
            const failedNodeIds = new Set();
            graph.nodes.forEach(node => { if (node.type === 'failed') failedNodeIds.add(node.id); });

            graph.nodes.forEach(node => {
                // Skip FAILED() modifier nodes — they are not event tree elements.
                if (node.type === 'failed') return;

                const meta       = (nodeMetadata || {})[node.id] || {};
                const modForNode = node.fromModule && node.moduleId ? modById[node.moduleId] : null;
                const displayName = modForNode
                    ? (modForNode.displayName || modForNode.name)
                    : (meta.name || node.label);
                // For the IE node, prefer the IE-level description provided by the caller
                // over any node-metadata description.
                const description = node.type === 'ie'
                    ? (ieDescription || meta.description || '')
                    : (modForNode
                        ? (modForNode.description || '')
                        : (meta.description || ''));
                // Carry KNOW_FTL filename so the cut set generator can resolve the loaded system
                // even when the displayed label differs from the system's projectName.
                const knowFtlFileName = modForNode
                    ? (modForNode.knowFtlFileName || '')
                    : (meta.knowFtlFileName || '');
                // Carry the underlying module/raw name (used as another lookup key)
                const moduleRawName = modForNode ? modForNode.name : node.label;

                let type;
                if (node.type === 'ie')       type = NODE_TYPES.INITIATING_EVENT;
                else if (node.type === 'function') type = NODE_TYPES.FUNCTION;
                else if (node.type === 'transfer') type = NODE_TYPES.TRANSFER;
                else                           type = NODE_TYPES.END_STATE;

                nodes.push({
                    id:          node.id,
                    label:       displayName,
                    description: description,
                    type:        type,
                    transferTarget: node.type === 'transfer' ? node.transferTarget : undefined,
                    knowFtlFileName: knowFtlFileName || undefined,
                    moduleRawName:   moduleRawName || undefined,
                    distribution:    node.distribution || undefined,
                    // carry outcome so HowFacilityFailsModal can colour end states
                    // For module end-states the outcome lives on the module object; fall back to
                    // endStateOutcomes (inline HtFW nodes) and then to 'unanalyzed'.
                    outcome:     type === NODE_TYPES.END_STATE
                        ? ((endStateOutcomes || {})[node.id]
                            || (modForNode?.type === 'endstate' ? modForNode.outcome : undefined)
                            || 'unanalyzed')
                        : undefined
                });
            });

            graph.edges.forEach(e => {
                // Skip any edge that touches a FAILED() modifier node.
                if (failedNodeIds.has(e.from) || failedNodeIds.has(e.to)) return;
                connections.push({ from: e.from, to: e.to, label: e.label || '' });
            });

            return { nodes, connections, id: 'htfw_' + ieName, label: ieName };
        };

        // How the Facility Fails Modal
        function HowFacilityFailsModal({ pol, settings, loadedSystems, ieFreq, onClose, htfwScript, htfwIeName, nodeMetadata, projectModules, allIeScripts }) {
            useEscapeKey(onClose);
            const [leftPaneWidth, setLeftPaneWidth] = useState(60);
            const [activeLeftTab, setActiveLeftTab] = useState('graphic');
            const [activeRightTab, setActiveRightTab] = useState('cutsets');
            const [expandedNodes, setExpandedNodes] = useState(new Set());
            const [zoom, setZoom] = useState(1);
            const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
            const [isPanning, setIsPanning] = useState(false);
            const [lastMousePos, setLastMousePos] = useState({ x: 0, y: 0 });
            // Track which expanded-system cut sets are showing their BE details inline.
            // Key is `${seqIdx}:${itemIdx}:${csIdx}` so each cut set row toggles independently.
            const [expandedSysCutSets, setExpandedSysCutSets] = useState(() => new Set());
            // Fullscreen mode hides the right (Sequence Insights) pane so the event tree
            // graphic can use the entire modal width.
            const [isGraphicFullscreen, setIsGraphicFullscreen] = useState(false);
            const [canvasCopyMsg, setCanvasCopyMsg] = useState('');
            // Briefly highlight the cut-set group corresponding to the clicked end state.
            const [highlightedSeq, setHighlightedSeq] = useState(null);
            // Height of the Sankey / Risk Contribution area (px); user-draggable.
            const [sankeyHeight, setSankeyHeight] = useState(200);
            const sankeyResizerRef = useRef(null);
            const sankeyDragRef = useRef(null); // { startY, startH }
            // Holds latest Sankey draw data so the resize effect can redraw without stale closure.
            const sankeyDrawDataRef = useRef(null); // { drawSankey, riskMap, consNames }
            const resizerRef = useRef(null);
            const isDraggingRef = useRef(false);
            const canvasRef = useRef(null);
            const sankeyRefs = useRef({}); // keyed by consequence name
            const canvasContainerRef = useRef(null);
            // Hit boxes for clickable end-state boxes on the canvas.
            // Stored in DRAWING coordinates so we apply the inverse zoom/pan in the click handler.
            const endStateHitsRef = useRef([]);
            // Track mouse-down position to distinguish a click from a pan-drag on mouseup.
            const mouseDownPosRef = useRef(null);
            // Per-sequence DOM refs in the cut-set list so an end-state click can scroll to one.
            const cutSetGroupRefs = useRef({});
            // The last zoom/pan transform actually used when drawEventTree ran.
            // Auto-fit can produce a zoom different from the `zoom` state, so we cache it
            // here to make hit-testing accurate without recomputing the auto-fit math.
            const lastDrawTransformRef = useRef(null);

            // Number formatter using the project-level "Show Digits" setting.
            // showDigits is the digits-after-the-decimal arg to toExponential, so the displayed
            // string has (showDigits + 1) significant digits — e.g. showDigits=3 → "1.234e-04".
            const sd = Math.max(1, Math.min(10, parseInt(settings?.showDigits, 10) || 3));
            const fmt = (v) => {
                if (v === null || v === undefined || isNaN(v)) return 'N/A';
                return v.toExponential(sd);
            };

            // Build sequence tree from POL
            const buildSequenceTree = () => {
                if (!pol || !pol.nodes || !pol.connections) return null;

                // Find initiating event
                const ieNode = pol.nodes.find(n => n.type === NODE_TYPES.INITIATING_EVENT);
                if (!ieNode) return null;

                // Build tree recursively
                const buildNode = (nodeId, visited = new Set()) => {
                    if (visited.has(nodeId)) return null; // Prevent cycles
                    visited.add(nodeId);

                    const node = pol.nodes.find(n => n.id === nodeId);
                    if (!node) return null;

                    const outgoingConnections = pol.connections.filter(c => c.from === nodeId);
                    const children = outgoingConnections
                        .map(conn => {
                            const childTree = buildNode(conn.to, new Set(visited));
                            if (childTree) {
                                return {
                                    ...childTree,
                                    connectionLabel: conn.label || ''
                                };
                            }
                            return null;
                        })
                        .filter(c => c !== null);

                    return {
                        id: node.id,
                        label: node.label,
                        description: node.description,
                        type: node.type,
                        operatingState: node.operatingState,
                        knowFtlFileName: node.knowFtlFileName,
                        moduleRawName: node.moduleRawName,
                        distribution: node.distribution,
                        children: children
                    };
                };

                return buildNode(ieNode.id);
            };

            const sequenceTree = buildSequenceTree();

            // Extract sequences (paths from IE to End States) and top events (Functions only, not Transitions)
            const extractSequencesAndTopEvents = () => {
                if (!sequenceTree) return { sequences: [], topEvents: [], transitions: [] };

                const sequences = [];
                const topEventsOrdered = []; // Only Functions
                const topEventsSet = new Set();
                const topEventsByLabel = {}; // label -> canonical top event entry (for dedup by name)
                const nodeIdToCanonicalTeId = {}; // path-unique nodeId -> canonical teId
                const transitionsOrdered = []; // Track transitions separately
                const transitionsSet = new Set();
                
                // First pass: traverse to find all paths and collect top events/transitions in order
                const traverse = (node, path = [], depth = 0) => {
                    const currentPath = [...path, { 
                        node, 
                        branchLabel: node.connectionLabel || '',
                        depth
                    }];
                    
                    // Track Functions as top events — deduplicate by label so that path-unique
                    // node IDs for the same system (e.g. B after YES-A vs B after NO-A) map to
                    // a single column header in the event tree graphic.
                    if (node.type === NODE_TYPES.FUNCTION && node.children && node.children.length > 0) {
                        const lbl = node.label || '';
                        if (topEventsByLabel[lbl]) {
                            // Already have a column for this label — just record the remapping
                            nodeIdToCanonicalTeId[node.id] = topEventsByLabel[lbl].id;
                        } else {
                            if (!topEventsSet.has(node.id)) {
                                topEventsSet.add(node.id);
                                const entry = {
                                    id: node.id,
                                    label: node.label,
                                    description: node.description,
                                    type: node.type,
                                    knowFtlFileName: node.knowFtlFileName,
                                    moduleRawName: node.moduleRawName,
                                    distribution: node.distribution || undefined,
                                    depth: depth
                                };
                                topEventsOrdered.push(entry);
                                topEventsByLabel[lbl] = entry;
                                nodeIdToCanonicalTeId[node.id] = node.id;
                            }
                        }
                    }
                    
                    // Track Transitions separately
                    if (node.type === NODE_TYPES.TRANSITION && node.children && node.children.length > 0) {
                        if (!transitionsSet.has(node.id)) {
                            transitionsSet.add(node.id);
                            transitionsOrdered.push({
                                id: node.id,
                                label: node.label,
                                operatingState: node.operatingState,
                                depth: depth
                            });
                        }
                    }
                    
                    if (node.type === NODE_TYPES.END_STATE) {
                        // Found an end state - save this sequence
                        sequences.push({
                            path: currentPath,
                            endState: node.label
                        });
                    } else if (node.type === NODE_TYPES.TRANSFER) {
                        // Found a transfer — record as a sequence with a transfer endpoint
                        sequences.push({
                            path: currentPath,
                            endState: node.label,
                            isTransfer: true,
                            transferTarget: node.transferTarget || node.label
                        });
                    } else if (node.children && node.children.length > 0) {
                        node.children.forEach(child => {
                            traverse(child, currentPath, depth + 1);
                        });
                    }
                };

                traverse(sequenceTree);
                
                // Now we need to determine proper top event order based on sequence paths
                // For each sequence, record the order in which top events are encountered
                // Then sort top events by their typical position across all sequences
                
                // First, for each sequence, build ordered list of top events encountered
                sequences.forEach(seq => {
                    seq.topEventOrder = []; // Ordered list of {teId, position, branch}
                    let position = 0;
                    
                    for (let i = 0; i < seq.path.length; i++) {
                        const pathNode = seq.path[i].node;
                        
                        // Check if this is a top event (Function) — use canonical id for column mapping
                        const canonicalTeId = nodeIdToCanonicalTeId[pathNode.id];
                        if (canonicalTeId !== undefined) {
                            // Get the branch taken
                            let branch = 'PASS';
                            if (i + 1 < seq.path.length) {
                                branch = seq.path[i + 1].branchLabel || 'PASS';
                            }
                            
                            // Only push if we haven't already recorded this canonical column
                            // for this sequence (avoid double-entries when two path nodes
                            // map to the same canonical top event)
                            if (!seq.topEventOrder.find(t => t.teId === canonicalTeId)) {
                                seq.topEventOrder.push({
                                    teId: canonicalTeId,
                                    position: position,
                                    branch: branch
                                });
                                position++;
                            }
                        }
                        
                        // Check if this is a transition
                        if (transitionsSet.has(pathNode.id) && i + 1 < seq.path.length) {
                            const nextNode = seq.path[i + 1];
                            seq.transitionInfo = seq.transitionInfo || [];
                            seq.transitionInfo.push({
                                transitionId: pathNode.id,
                                operatingState: nextNode.node.operatingState || pathNode.operatingState || '',
                                position: position
                            });
                        }
                    }
                });
                
                // Calculate the maximum position for each top event across all sequences
                // Top events that appear later should be to the right
                const teMaxPosition = new Map();
                topEventsOrdered.forEach(te => {
                    let maxPos = -1;
                    sequences.forEach(seq => {
                        const found = seq.topEventOrder.find(teo => teo.teId === te.id);
                        if (found && found.position > maxPos) {
                            maxPos = found.position;
                        }
                    });
                    teMaxPosition.set(te.id, maxPos >= 0 ? maxPos : 999);
                });
                
                // Sort top events by their maximum position (leftmost position = appears earliest)
                // If tied, use the order they were first encountered
                const sortedTopEvents = [...topEventsOrdered].sort((a, b) => {
                    const posA = teMaxPosition.get(a.id);
                    const posB = teMaxPosition.get(b.id);
                    if (posA !== posB) return posA - posB;
                    return a.depth - b.depth; // Tie-breaker: depth in tree
                });
                
                // Build decision array for each sequence based on SORTED top events order
                sequences.forEach(seq => {
                    seq.decisions = [];
                    
                    sortedTopEvents.forEach(te => {
                        const found = seq.topEventOrder.find(teo => teo.teId === te.id);
                        if (found) {
                            seq.decisions.push({ branch: found.branch });
                        } else {
                            seq.decisions.push({ branch: 'PASS' });
                        }
                    });
                });
                
                return { sequences, topEvents: sortedTopEvents, transitions: transitionsOrdered };
            };

            const { sequences, topEvents, transitions } = extractSequencesAndTopEvents();
            
            // Sort sequences so that Yes branches go up (lower Y) and No branches go down (higher Y)
            // This sorted order will be used for both the graphic and cut sets
            const sortedSeqIndices = sequences.map((seq, idx) => idx);
            sortedSeqIndices.sort((a, b) => {
                const seqA = sequences[a];
                const seqB = sequences[b];
                
                // Compare decisions at each top event from left to right
                for (let teIdx = 0; teIdx < topEvents.length; teIdx++) {
                    const branchA = seqA.decisions[teIdx]?.branch || 'PASS';
                    const branchB = seqB.decisions[teIdx]?.branch || 'PASS';
                    
                    // YES comes before NO (YES = up = lower index)
                    // PASS is neutral
                    const normA = branchA.toUpperCase();
                    const normB = branchB.toUpperCase();
                    const orderA = normA === 'WORKS' ? 0 : normA === 'PASS' ? 1 : 2;
                    const orderB = normB === 'WORKS' ? 0 : normB === 'PASS' ? 1 : 2;
                    
                    if (orderA !== orderB) {
                        return orderA - orderB;
                    }
                }
                return 0;
            });
            
            // Generate cut sets for each sequence - in sorted order with new sequence numbers
            // For top events on the down branch (NO / failure) that correspond to a loaded system,
            // attach the system's cut sets so the failure is shown as the OR of its representative cut sets.
            // Also compute per-branch probabilities and the sequence frequency.
            const generateCutSets = () => {
                // ── Recursive transfer resolver ──────────────────────────────
                // Resolves sequences that end at a TRANSFER by fetching the target IE's
                // script (from ieScripts keyed by IE name), parsing it, and returning
                // derived sub-sequences. Depth-limited to prevent infinite loops.
                const resolveTransferSequences = (transferTarget, prefixCutSet, prefixProb, depth, visitedIEs) => {
                    if (depth > 8) return []; // safety limit
                    if (!htfwScript) return [];

                    // Find the target IE's script by matching ieName field
                    let targetScript = null;
                    let targetIeName = null;
                    // ieScripts is in scope via the HowFacilityFailsModal props chain;
                    // it was passed via htfwScript so we need to search via projectModules
                    // and the ieScripts map provided as a closure from the parent App component.
                    // We receive the target-IE script via a prop: allIeScripts
                    if (!allIeScripts) return [];
                    const normalizedTarget = (transferTarget || '').trim();
                    // Look for a matching script by ieName or by hazard node name
                    for (const [hid, scriptData] of Object.entries(allIeScripts)) {
                        if (!scriptData || !scriptData.script) continue;
                        const sn = (scriptData.ieName || '').trim();
                        if (sn.toLowerCase() === normalizedTarget.toLowerCase()) {
                            targetScript = scriptData.script;
                            targetIeName = sn;
                            break;
                        }
                    }
                    if (!targetScript || !targetIeName) return [];
                    if (visitedIEs.has(targetIeName.toLowerCase())) return []; // cycle guard

                    const newVisited = new Set(visitedIEs);
                    newVisited.add(targetIeName.toLowerCase());

                    let targetGraph;
                    try { targetGraph = parseHTFWScript(targetIeName, targetScript, projectModules); }
                    catch (e) { return []; }
                    if (!targetGraph || targetGraph.nodes.size <= 1) return [];

                    const targetPol = htfwScriptToPol(targetIeName, targetScript, projectModules, {}, {}, '');
                    if (!targetPol || !targetPol.nodes || !targetPol.connections) return [];

                    // Build adjacency for target tree
                    const adjOut2 = {};
                    targetPol.nodes.forEach(n => { adjOut2[n.id] = []; });
                    targetPol.connections.forEach(c => { if (adjOut2[c.from]) adjOut2[c.from].push({ to: c.to, label: c.label || '' }); });
                    const ieNode2 = targetPol.nodes.find(n => n.type === NODE_TYPES.INITIATING_EVENT);
                    if (!ieNode2) return [];

                    // Traverse target tree to collect sub-sequences
                    const subSeqs = [];
                    const subTopEventsOrdered = [];
                    const subTopEventsSet = new Set();
                    const subTopEventsByLabel = {};
                    const subNodeIdToCanonicalTeId = {};

                    const traverseSub = (nodeId, path2, visited2) => {
                        if (visited2.has(nodeId)) return;
                        const node = targetPol.nodes.find(n => n.id === nodeId);
                        if (!node) return;
                        const newVis = new Set(visited2);
                        newVis.add(nodeId);
                        const newPath = [...path2, nodeId];
