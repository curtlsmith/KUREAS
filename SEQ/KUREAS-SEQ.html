<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Custom hook: closes a modal when Escape is pressed
        const useEscapeKey = (onClose) => {
            useEffect(() => {
                if (!onClose) return;
                const handler = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handler);
                return () => document.removeEventListener('keydown', handler);
            }, [onClose]);
        };

        // Initialize Mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            },
            securityLevel: 'loose'
        });

        // Default Settings
        const DEFAULT_SETTINGS = {
            nodeColor: '#e0f2fe',
            ieColor: '#fecaca',
            functionColor: '#e0f2fe',
            transitionColor: '#e9d5ff',
            endStateColor: '#bbf7d0',
            transferColor: '#fef3c7',
            fontSize: 'medium',
            fontFamily: 'sans-serif',
            background: 'light',
            showDigits: 3,
            arcLabelSize: 'medium',
            quantificationMethod: 'mcub', // 'mcub' or 'bdd' — used when computing P(cut sets) for sequence frequency
            documentSettings: {
                pageSize: 'letter',
                fontFamily: 'Arial',
                fontSize: 11
            }
        };

        // Keys in the flat `settings` object that are PROJECT-level (saved into and loaded from
        // the .KNOW_SEQ file). All other keys are GUI-level (browser-only, in localStorage).
        // Defined here so handleSaveSEQ / handleLoadSEQ stay in sync with the Settings modal.
        const PROJECT_SETTING_KEYS = [
            // Default node colors
            'nodeColor', 'ieColor', 'functionColor', 'transitionColor', 'endStateColor',
            // Quantification & display
            'showDigits', 'quantificationMethod', 'arcLabelSize',
            // Document settings (will move to a richer report config later)
            'documentSettings'
        ];

        // Settings Manager
        class SettingsManager {
            static STORAGE_KEY = 'KUREAS_SEQ_settings';
            static LAYOUT_KEY = 'KUREAS_SEQ_layout';
            
            static load() {
                try {
                    const saved = localStorage.getItem(this.STORAGE_KEY);
                    return saved ? { ...DEFAULT_SETTINGS, ...JSON.parse(saved) } : { ...DEFAULT_SETTINGS };
                } catch (err) {
                    console.error('Failed to load settings:', err);
                    return { ...DEFAULT_SETTINGS };
                }
            }
            
            static save(settings) {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(settings));
                    return true;
                } catch (err) {
                    console.error('Failed to save settings:', err);
                    return false;
                }
            }
            
            static loadLayout() {
                try {
                    const saved = localStorage.getItem(this.LAYOUT_KEY);
                    return saved ? JSON.parse(saved) : {
                        leftPaneWidth: 25,
                        hazardPaneHeight: 50,
                        descriptionPanelWidth: 35,
                        descriptionPanelHeight: 35
                    };
                } catch (err) {
                    console.error('Failed to load layout:', err);
                    return {
                        leftPaneWidth: 25,
                        hazardPaneHeight: 50,
                        descriptionPanelWidth: 35,
                        descriptionPanelHeight: 35
                    };
                }
            }
            
            static saveLayout(layout) {
                try {
                    localStorage.setItem(this.LAYOUT_KEY, JSON.stringify(layout));
                    return true;
                } catch (err) {
                    console.error('Failed to save layout:', err);
                    return false;
                }
            }
        }

        // Rich Text Editor Component
        // Convert a fontSize token ('xsmall'|'small'|'medium'|'large'|'xlarge'
        // or a legacy numeric string like '12') to a pixel integer for canvas drawing.
        function fontSizePx(token) {
            switch (String(token)) {
                case 'xsmall': return 9;
                case 'small':  return 11;
                case 'large':  return 14;
                case 'xlarge': return 17;
                case 'medium': return 12;
                default: { const n = parseInt(token); return (n > 0 && n < 100) ? n : 12; }
            }
        }
        // Convert a fontSize token to a CSS pt string for Mermaid / inline styles.
        function fontSizePt(token) { return fontSizePx(token) + 'pt'; }

        function RichTextEditor({ value, onChange, onClose, title }) {
            const editorRef = useRef(null);
            const savedSelectionRef = useRef(null);
            const [content, setContent] = useState(value || '');
            const [selectedFontSize, setSelectedFontSize] = useState('12');
            const [selectedFontFamily, setSelectedFontFamily] = useState('Arial');

            useEffect(() => {
                if (editorRef.current) {
                    editorRef.current.innerHTML = content;
                }
            }, []);

            // Save selection when user is in the editor
            const saveSelection = () => {
                const selection = window.getSelection();
                if (selection.rangeCount > 0 && editorRef.current && 
                    editorRef.current.contains(selection.anchorNode)) {
                    savedSelectionRef.current = selection.getRangeAt(0).cloneRange();
                }
            };

            // Restore selection before executing commands
            const restoreSelection = () => {
                if (editorRef.current && savedSelectionRef.current) {
                    editorRef.current.focus();
                    const selection = window.getSelection();
                    selection.removeAllRanges();
                    selection.addRange(savedSelectionRef.current);
                    return true;
                }
                if (editorRef.current) {
                    editorRef.current.focus();
                }
                return false;
            };

            const updateFontControls = () => {
                if (!editorRef.current) return;
                
                const selection = window.getSelection();
                if (selection.rangeCount > 0 && editorRef.current.contains(selection.anchorNode)) {
                    // Save selection whenever it changes in the editor
                    saveSelection();
                    
                    const range = selection.getRangeAt(0);
                    let node = range.startContainer;
                    
                    while (node && node !== editorRef.current) {
                        if (node.nodeType === Node.ELEMENT_NODE) {
                            const element = node;
                            const computedStyle = window.getComputedStyle(element);
                            
                            const fontSize = computedStyle.fontSize;
                            if (fontSize) {
                                const sizeInPx = parseInt(fontSize);
                                setSelectedFontSize(sizeInPx.toString());
                            }
                            
                            const fontFamily = computedStyle.fontFamily;
                            if (fontFamily) {
                                const firstFont = fontFamily.split(',')[0].replace(/['"]/g, '').trim();
                                setSelectedFontFamily(firstFont);
                            }
                            
                            break;
                        }
                        node = node.parentNode;
                    }
                }
            };

            // Listen for selection changes
            useEffect(() => {
                document.addEventListener('selectionchange', updateFontControls);
                return () => document.removeEventListener('selectionchange', updateFontControls);
            }, []);

            const execCommandWithSelection = (command, value = null) => {
                restoreSelection();
                setTimeout(() => {
                    document.execCommand(command, false, value);
                    if (editorRef.current) {
                        setContent(editorRef.current.innerHTML);
                        saveSelection();
                    }
                }, 0);
            };

            const applyFontSize = (size) => {
                restoreSelection();
                
                setTimeout(() => {
                    const selection = window.getSelection();
                    if (!selection.rangeCount) return;
                    
                    const range = selection.getRangeAt(0);
                    if (range.collapsed) return;
                    
                    // Extract selected content
                    const selectedContent = range.extractContents();
                    
                    // Create wrapper span with font size
                    const span = document.createElement('span');
                    span.style.fontSize = size + 'px';
                    span.appendChild(selectedContent);
                    
                    // Insert the styled span
                    range.insertNode(span);
                    
                    // Select the new content
                    const newRange = document.createRange();
                    newRange.selectNodeContents(span);
                    selection.removeAllRanges();
                    selection.addRange(newRange);
                    
                    if (editorRef.current) {
                        setContent(editorRef.current.innerHTML);
                        saveSelection();
                    }
                }, 0);
            };

            const changeFontFamily = (family) => {
                restoreSelection();
                
                setTimeout(() => {
                    const selection = window.getSelection();
                    if (!selection.rangeCount) return;
                    
                    const range = selection.getRangeAt(0);
                    if (range.collapsed) return;
                    
                    // Extract selected content
                    const selectedContent = range.extractContents();
                    
                    // Create wrapper span with font family
                    const span = document.createElement('span');
                    let fontFamilyString = family;
                    if (family === 'Arial') fontFamilyString = 'Arial, sans-serif';
                    else if (family === 'Times New Roman') fontFamilyString = "'Times New Roman', serif";
                    else if (family === 'Courier New') fontFamilyString = "'Courier New', monospace";
                    else if (family === 'Georgia') fontFamilyString = 'Georgia, serif';
                    else if (family === 'Verdana') fontFamilyString = 'Verdana, sans-serif';
                    
                    span.style.fontFamily = fontFamilyString;
                    span.appendChild(selectedContent);
                    
                    // Insert the styled span
                    range.insertNode(span);
                    
                    // Select the new content
                    const newRange = document.createRange();
                    newRange.selectNodeContents(span);
                    selection.removeAllRanges();
                    selection.addRange(newRange);
                    
                    if (editorRef.current) {
                        setContent(editorRef.current.innerHTML);
                        saveSelection();
                    }
                }, 0);
            };

            const handleInsertImage = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.style.maxWidth = '100%';
                        img.style.height = 'auto';
                        img.style.margin = '10px 0';
                        
                        editorRef.current.focus();
                        const selection = window.getSelection();
                        if (selection.rangeCount > 0) {
                            const range = selection.getRangeAt(0);
                            range.deleteContents();
                            range.insertNode(img);
                            range.collapse(false);
                        } else {
                            editorRef.current.appendChild(img);
                        }
                        
                        setContent(editorRef.current.innerHTML);
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            };

            const handleInsertTable = () => {
                const rows = prompt('Number of rows:', '3');
                const cols = prompt('Number of columns:', '3');
                
                if (!rows || !cols) return;
                
                const numRows = parseInt(rows) || 3;
                const numCols = parseInt(cols) || 3;
                
                let tableHtml = '<table style="border-collapse: collapse; width: 100%; margin: 10px 0;">';
                for (let i = 0; i < numRows; i++) {
                    tableHtml += '<tr>';
                    for (let j = 0; j < numCols; j++) {
                        const cellStyle = 'border: 1px solid #ccc; padding: 8px; min-width: 50px;';
                        if (i === 0) {
                            tableHtml += `<th style="${cellStyle} background-color: #f3f4f6; font-weight: bold;">Header ${j + 1}</th>`;
                        } else {
                            tableHtml += `<td style="${cellStyle}">Cell</td>`;
                        }
                    }
                    tableHtml += '</tr>';
                }
                tableHtml += '</table>';
                
                editorRef.current.focus();
                document.execCommand('insertHTML', false, tableHtml);
                setContent(editorRef.current.innerHTML);
            };

            const removeFormatting = () => {
                editorRef.current.focus();
                document.execCommand('removeFormat', false, null);
                
                if (editorRef.current) {
                    setContent(editorRef.current.innerHTML);
                }
            };

            const handleSave = () => {
                const html = editorRef.current?.innerHTML || '';
                onChange(html);
                onClose();
            };

            const handleInput = () => {
                if (editorRef.current) {
                    setContent(editorRef.current.innerHTML);
                }
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{ 
                        maxWidth: '900px', 
                        width: '95%',
                        maxHeight: '85vh',
                        display: 'flex',
                        flexDirection: 'column'
                    }}>
                        <div className="p-4" style={{ flex: '0 0 auto' }}>
                            <h2 className="text-xl font-bold mb-4">{title || 'Edit Detailed Description'}</h2>
                            
                            {/* Toolbar */}
                            <div style={{ 
                                position: 'sticky', 
                                top: 0, 
                                zIndex: 10, 
                                backgroundColor: '#ffffff', 
                                paddingBottom: '8px', 
                                borderBottom: '1px solid #e5e7eb', 
                                display: 'flex', 
                                flexWrap: 'wrap', 
                                alignItems: 'center', 
                                gap: '4px' 
                            }}>
                                <select
                                    value={selectedFontSize}
                                    onMouseDown={(e) => { saveSelection(); }}
                                    onChange={(e) => { 
                                        setSelectedFontSize(e.target.value);
                                        applyFontSize(e.target.value);
                                    }}
                                    className="border rounded px-2 py-1 text-sm"
                                    title="Font Size"
                                >
                                    <option value="10">10pt</option>
                                    <option value="11">11pt</option>
                                    <option value="12">12pt</option>
                                    <option value="14">14pt</option>
                                    <option value="16">16pt</option>
                                    <option value="18">18pt</option>
                                    <option value="24">24pt</option>
                                </select>
                                <select
                                    value={selectedFontFamily}
                                    onMouseDown={(e) => { saveSelection(); }}
                                    onChange={(e) => { 
                                        setSelectedFontFamily(e.target.value);
                                        changeFontFamily(e.target.value);
                                    }}
                                    className="border rounded px-2 py-1 text-sm"
                                    title="Font Family"
                                >
                                    <option value="Arial">Arial</option>
                                    <option value="Times New Roman">Times New Roman</option>
                                    <option value="Courier New">Courier New</option>
                                    <option value="Georgia">Georgia</option>
                                    <option value="Verdana">Verdana</option>
                                </select>
                                <span className="text-gray-300 px-1">|</span>
                                <button 
                                    onMouseDown={(e) => { e.preventDefault(); execCommandWithSelection('bold'); }}
                                    className="px-2 py-1 border rounded hover:bg-gray-100"
                                    title="Bold"
                                >
                                    <strong>B</strong>
                                </button>
                                <button 
                                    onMouseDown={(e) => { e.preventDefault(); execCommandWithSelection('italic'); }}
                                    className="px-2 py-1 border rounded hover:bg-gray-100"
                                    title="Italic"
                                >
                                    <em>I</em>
                                </button>
                                <button 
                                    onMouseDown={(e) => { e.preventDefault(); execCommandWithSelection('underline'); }}
                                    className="px-2 py-1 border rounded hover:bg-gray-100"
                                    title="Underline"
                                >
                                    <u>U</u>
                                </button>
                                <span className="text-gray-300 px-1">|</span>
                                <button 
                                    onMouseDown={(e) => { e.preventDefault(); execCommandWithSelection('formatBlock', 'h1'); }}
                                    className="px-2 py-1 border rounded hover:bg-gray-100 text-xs"
                                    title="Heading 1"
                                >
                                    H1
                                </button>
                                <button

        }

        // Node Types
        const NODE_TYPES = {
            INITIATING_EVENT: 'initiatingEvent',
            FUNCTION: 'function',
            TRANSITION: 'transition',
            END_STATE: 'endState',
            TRANSFER: 'transfer'
        };

        // ─────────────────────────────────────────────────────────────────────────
        // Quantification helpers (mirror KUREAS-SYS so cut-set probabilities are
        // computed the same way KUREAS-SYS does, controlled by settings.quantificationMethod).
        //   - calculateMCUB: 1 - prod(1 - P_i)  (Min Cut Upper Bound)
        //   - calculateBDD : exact via inclusion-exclusion (small problems) or
        //                    Shannon-decomposition BDD (large problems)
        // basicEventData is { [name]: { probability } }.
        // ─────────────────────────────────────────────────────────────────────────

        // failedEvents: optional Set<string> of event names to override with P=1.0
        function calculateCutSetProbability(cutSet, basicEventData, failedEvents) {
            let prob = 1.0;
            let hasProbData = true;
            for (const eventName of cutSet) {
                const isComplement = typeof eventName === 'string' && eventName.startsWith('NOT-');
                const baseName = isComplement ? eventName.slice(4) : eventName;
                // FAILED() override: treat this event as P=1.0 (certain failure)
                if (failedEvents && (failedEvents.has(baseName) || failedEvents.has(eventName))) {
                    const p = isComplement ? 0.0 : 1.0;
                    prob *= p;
                    continue;
                }
                const ed = basicEventData[baseName] || basicEventData[eventName];
                if (ed && ed.probability !== undefined && ed.probability !== null) {
                    const p = isComplement ? (1.0 - ed.probability) : ed.probability;
                    prob *= p;
                } else {
                    hasProbData = false;
                }
            }
            return hasProbData ? prob : null;
        }

        function calculateMCUB(cutSetProbabilities) {
            if (!cutSetProbabilities || cutSetProbabilities.length === 0) return null;
            if (cutSetProbabilities.some(p => p === null || p === undefined || isNaN(p))) return null;
            let product = 1.0;
            for (const p of cutSetProbabilities) product *= (1.0 - p);
            return 1.0 - product;
        }

        /**
         * Normalize a loadedSystems object so that any cut set with a null/undefined/NaN
         * stored probability gets it recomputed from its events using the system's eventInfo.
         * This is needed because KUREAS-SYS exports null for cut sets containing NOT- complement
         * events (it can't look up "NOT-X" in eventInfo which only has base name "X").
         * Called whenever loadedSystems data arrives from any external source.
         */
        function normalizeLoadedSystems(loadedSystems) {
            if (!loadedSystems) return loadedSystems;
            const result = {};
            for (const [key, sys] of Object.entries(loadedSystems)) {
                if (!sys || !sys.cutSets) { result[key] = sys; continue; }
                const eventInfo = sys.eventInfo || {};
                let changed = false;
                const cutSets = sys.cutSets.map(cs => {
                    if (cs.probability !== null && cs.probability !== undefined && !isNaN(cs.probability)) return cs;
                    const recomp = calculateCutSetProbability(cs.events || [], eventInfo, null);
                    if (recomp === null) return cs;
                    changed = true;
                    return { ...cs, probability: recomp };
                });
                result[key] = changed ? { ...sys, cutSets } : sys;
            }
            return result;
        }

        function _buildBDDTree(cutSets, allEventsSet) {
            if (!cutSets || cutSets.length === 0) return null;
            const eventList = Array.from(allEventsSet).sort();
            const eventIndex = new Map();
            eventList.forEach((e, i) => eventIndex.set(e, i));
            const useNumber = eventList.length <= 31;

            if (useNumber) {
                const cutSetMasks = cutSets.map(cs => {
                    let mask = 0;
                    for (const event of cs) {
                        const idx = eventIndex.get(event);
                        if (idx !== undefined) mask |= (1 << idx);
                    }
                    return mask;
                });
                const nodeCache = new Map();
                const buildNode = (varIdx, remainingMasks) => {
                    if (remainingMasks.length === 0) return null;
                    for (let i = 0; i < remainingMasks.length; i++) {
                        if (remainingMasks[i] === 0) return 'ONE';
                    }
                    if (varIdx >= eventList.length) return null;
                    const uniq = Array.from(new Set(remainingMasks)).sort((a, b) => a - b);
                    const cacheKey = varIdx + ':' + uniq.join(',');
                    const cached = nodeCache.get(cacheKey);
                    if (cached !== undefined) return cached;
                    const varBit = 1 << varIdx;
                    const eventName = eventList[varIdx];
                    const masksHigh = new Array(remainingMasks.length);
                    for (let i = 0; i < remainingMasks.length; i++) {
                        const m = remainingMasks[i];
                        masksHigh[i] = (m & varBit) ? (m & ~varBit) : m;
                    }
                    const high = buildNode(varIdx + 1, masksHigh);
                    const masksLow = [];
                    for (let i = 0; i < remainingMasks.length; i++) {
                        if (!(remainingMasks[i] & varBit)) masksLow.push(remainingMasks[i]);
                    }
                    const low = buildNode(varIdx + 1, masksLow);
                    if (high === low) { nodeCache.set(cacheKey, high); return high; }
                    const node = { varIdx, eventName, high, low };
                    nodeCache.set(cacheKey, node);
                    return node;
                };
                return { root: buildNode(0, cutSetMasks), eventList, eventIndex };
            }

            // BigInt fallback
            const cutSetMasks = cutSets.map(cs => {
                let mask = 0n;
                for (const event of cs) {
                    const idx = eventIndex.get(event);
                    if (idx !== undefined) mask |= (1n << BigInt(idx));
                }
                return mask;
            });
            const nodeCache = new Map();
            const buildNode = (varIdx, remainingMasks) => {
                if (remainingMasks.length === 0) return null;
                for (let i = 0; i < remainingMasks.length; i++) {
                    if (remainingMasks[i] === 0n) return 'ONE';
                }
                if (varIdx >= eventList.length) return null;
                const uniqSet = new Set();
                for (let i = 0; i < remainingMasks.length; i++) uniqSet.add(remainingMasks[i].toString(16));
                const uniq = Array.from(uniqSet).sort();
                const cacheKey = varIdx + ':' + uniq.join(',');
                const cached = nodeCache.get(cacheKey);
                if (cached !== undefined) return cached;
                const varBit = 1n << BigInt(varIdx);
                const eventName = eventList[varIdx];
                const masksHigh = new Array(remainingMasks.length);
                for (let i = 0; i < remainingMasks.length; i++) {
                    const m = remainingMasks[i];
                    masksHigh[i] = (m & varBit) ? (m & ~varBit) : m;
                }
                const high = buildNode(varIdx + 1, masksHigh);
                const masksLow = [];
                for (let i = 0; i < remainingMasks.length; i++) {
                    if (!(remainingMasks[i] & varBit)) masksLow.push(remainingMasks[i]);
                }
                const low = buildNode(varIdx + 1, masksLow);
                if (high === low) { nodeCache.set(cacheKey, high); return high; }
                const node = { varIdx, eventName, high, low };
                nodeCache.set(cacheKey, node);
                return node;
            };
            return { root: buildNode(0, cutSetMasks), eventList, eventIndex };
        }

        function _evaluateBDDTree(bddTree, eventData) {
            if (!bddTree) return 0;
            const { root } = bddTree;
            if (root === null) return 0;
            if (root === 'ONE') return 1;
            const getProb = (name) => {
                const isComplement = name.startsWith('NOT-');
                const baseName = isComplement ? name.slice(4) : name;
                const d = eventData[baseName] || (!isComplement && eventData[name]);
                if (!d || d.probability === null || d.probability === undefined) return 0;
                return isComplement ? (1 - d.probability) : d.probability;
            };
            const evalCache = new Map();
            const evalNode = (node) => {
                if (node === null) return 0;
                if (node === 'ONE') return 1;
                if (evalCache.has(node)) return evalCache.get(node);
                const p = getProb(node.eventName);
                const result = p * evalNode(node.high) + (1 - p) * evalNode(node.low);
                evalCache.set(node, result);
                return result;
            };
            return Math.max(0, Math.min(1, evalNode(root)));
        }

        function calculateBDD(cutSets, basicEventData) {
            if (!cutSets || cutSets.length === 0) return null;
            // Bail out if any required event has no probability.
            // NOT- prefixed events are complements — look up the base name.
            const allEvents = new Set();
            for (const cs of cutSets) for (const ev of cs) allEvents.add(ev);
            for (const ev of allEvents) {
                const isComplement = ev.startsWith('NOT-');
                const baseName = isComplement ? ev.slice(4) : ev;
                const d = basicEventData[baseName] || (!isComplement && basicEventData[ev]);
                if (!d || d.probability === null || d.probability === undefined) return null;
            }
            const tree = _buildBDDTree(cutSets, allEvents);
            if (!tree) return 0;
            return _evaluateBDDTree(tree, basicEventData);
        }

        /**
         * Compute P(cut sets) for a single system using settings.quantificationMethod.
         * cutSets: [{ events: [name,...], probability: number|null }, ...]
         * eventInfo: { [name]: { probability } }
         */
        // failedEvents: optional Set<string> — events forced to P=1.0 per FAILED() directive
        function quantifyCutSets(cutSets, eventInfo, method, failedEvents) {
            if (!cutSets || cutSets.length === 0) return null;
            const m = (method || 'mcub').toLowerCase();
            const fe = failedEvents || null;
            if (m === 'bdd') {
                // When FAILED overrides exist, inject them into a patched eventInfo copy
                let effEventInfo = eventInfo || {};
                if (fe && fe.size > 0) {
                    effEventInfo = Object.assign({}, effEventInfo);
                    fe.forEach(evName => { effEventInfo[evName] = { probability: 1.0 }; });
                }
                const cutSetEvents = cutSets.map(cs => cs.events || []);
                return calculateBDD(cutSetEvents, effEventInfo);
            }
            // MCUB — recompute from events when FAILED overrides exist, else use stored probs.
            const probs = cutSets.map(cs => {
                if (!fe || fe.size === 0) {
                    if (cs.probability !== null && cs.probability !== undefined && !isNaN(cs.probability)) return cs.probability;
                }
                return calculateCutSetProbability(cs.events || [], eventInfo || {}, fe);
            });
            return calculateMCUB(probs);
        }

        // NUREG-2169 Fire Ignition Frequencies (Table 4-4)
        // Each item has: bin, location, ignitionSource, mean (frequency /yr), ef (lognormal error factor)
        // Data must match KUREAS-HA exactly for frequency calculations to be consistent
        const NUREG2169_FIRE_IGNITION_DATA = [
            { bin: '1', location: 'Battery room', ignitionSource: 'Batteries (all plants all modes)', mean: 1.96e-04, ef: 25.92 },
            { bin: '2', location: 'Containment (PWR)', ignitionSource: 'Reactor coolant pump (PWR plants at power)', mean: 1.37e-03, ef: 9.94 },

            { bin: '5', location: 'Control / auxiliary / reactor building', ignitionSource: 'Cable fires caused by welding and cutting (all plants at power)', mean: 7.83e-04, ef: 23.02 },
            { bin: '6', location: 'Control / auxiliary / reactor building', ignitionSource: 'Transient fires caused by welding and cutting (all plants at power)', mean: 4.44e-03, ef: 26.24 },
            { bin: '7', location: 'Diesel generator room', ignitionSource: 'Transients (all plants at power)', mean: 3.33e-03, ef: 5.85 },
            { bin: '8', location: 'Plant-Wide Components', ignitionSource: 'Diesel generators (all plants all modes)', mean: 7.81e-03, ef: 3.39 },
            { bin: '9', location: 'Plant-Wide Components', ignitionSource: 'Air compressors (all plants all modes)', mean: 4.69e-03, ef: 6.29 },
            { bin: '10', location: 'Plant-Wide Components', ignitionSource: 'Battery chargers (all plants all modes)', mean: 1.12e-03, ef: 8.67 },
            { bin: '11', location: 'Plant-Wide Components', ignitionSource: 'Cable fires caused by welding and cutting (all plants at power)', mean: 2.77e-04, ef: 20.11 },
            { bin: '12', location: 'Plant-Wide Components', ignitionSource: 'Cable run (self-ignited cable fires) (all plants all modes)', mean: 7.02e-04, ef: 6.66 },

            { bin: '18', location: 'Plant-Wide Components', ignitionSource: 'Junction boxes (all plants all modes)', mean: 3.61e-03, ef: 6.98 },
            { bin: '19', location: 'Plant-Wide Components', ignitionSource: 'Miscellaneous hydrogen fires (all plants all modes)', mean: 4.82e-03, ef: 5.68 },
            { bin: '20', location: 'Plant-Wide Components', ignitionSource: 'Off-gas and H2 recombiner (BWR plants at power)', mean: 5.81e-03, ef: 4.82 },
            { bin: '21', location: 'Plant-Wide Components', ignitionSource: 'Pumps (all plants all modes)', mean: 2.72e-02, ef: 2.06 },
            { bin: '22', location: 'Plant-Wide Components', ignitionSource: 'RPS MG sets (all plants at power)', mean: 2.31e-03, ef: 15.57 },
            { bin: '23', location: 'Plant-Wide Components', ignitionSource: 'Transformers (all plants all modes)', mean: 9.56e-03, ef: 5.77 },
            { bin: '24', location: 'Plant-Wide Components', ignitionSource: 'Transient fires caused by welding and cutting (all plants at power)', mean: 4.79e-03, ef: 4.42 },
            { bin: '25', location: 'Plant-Wide Components', ignitionSource: 'Transients (all plants at power)', mean: 8.54e-03, ef: 3.12 },
            { bin: '26', location: 'Plant-Wide Components', ignitionSource: 'Ventilation subsystems (all plants all modes)', mean: 1.64e-02, ef: 4.03 },
            { bin: '27', location: 'Transformer yard', ignitionSource: 'Transformer - Catastrophic (all plants at power)', mean: 6.61e-03, ef: 4.49 },
            { bin: '28', location: 'Transformer yard', ignitionSource: 'Transformer - Non Catastrophic (all plants at power)', mean: 6.53e-03, ef: 4.20 },
            { bin: '29', location: 'Transformer yard', ignitionSource: 'Yard transformers (others) (all plants at power)', mean: 3.69e-03, ef: 11.60 },
            { bin: '30', location: 'Turbine building', ignitionSource: 'Boiler (all plants at power)', mean: 1.09e-03, ef: 8.20 },
            { bin: '31', location: 'Turbine building', ignitionSource: 'Cable fires caused by welding and cutting (all plants all modes)', mean: 3.47e-04, ef: 16.72 },
            { bin: '32', location: 'Turbine building', ignitionSource: 'Main feedwater pumps (all plants at power)', mean: 4.38e-03, ef: 5.31 },
            { bin: '33', location: 'Turbine building', ignitionSource: 'Turbine generator excitor (all plants at power)', mean: 8.36e-04, ef: 10.88 },
            { bin: '34', location: 'Turbine building', ignitionSource: 'Turbine generator hydrogen (all plants at power)', mean: 4.12e-03, ef: 7.03 },
            { bin: '35', location: 'Turbine building', ignitionSource: 'Turbine generator oil (all plants at power)', mean: 5.49e-03, ef: 5.46 },
            { bin: '36', location: 'Turbine building', ignitionSource: 'Transient fires caused by welding and cutting (all plants at power)', mean: 4.67e-03, ef: 5.09 },
            { bin: '37', location: 'Turbine building', ignitionSource: 'Transients (all plants at power)', mean: 6.71e-03, ef: 4.07 }
        ];

        // Create unique ID
        const createId = () => Date.now() + Math.random().toString(36).substr(2, 9);

        /**
         * Compute IE frequency (per year) for a given selected IE under a selected FOS,
         * derived from KUREAS-HA hazard analysis data. Returns null if not computable.
         */
        const computeIeFreqFromHA = (haData, selectedIeId, selectedFosId, ieScripts) => {
            // Check for a manual occurrence model override in ieScripts first
            const scriptData = (ieScripts || {})[selectedIeId];
            const od = scriptData?.occurrenceData;
            if (od && od.occurrenceModel && od.occurrenceModel !== 'none') {
                if (od.occurrenceModel === 'frequency') {
                    const dist = od.frequencyDistribution || 'point';
                    let f = null;
                    if (dist === 'point' && od.pointEstimate) f = parseFloat(od.pointEstimate);
                    else if (dist === 'gamma' && od.gammaShape && od.gammaScale) f = parseFloat(od.gammaShape) * parseFloat(od.gammaScale);
                    else if (dist === 'lognormal' && od.lognormalMean) f = parseFloat(od.lognormalMean);
                    else if (dist === 'cni' && od.cniMean) f = parseFloat(od.cniMean);
                    if (f !== null && !isNaN(f)) {
                        if (od.frequencyUnits === '/hr') f *= 8760;
                        return f > 0 ? f : null;
                    }
                } else if (od.occurrenceModel === 'prob-per-opportunity') {
                    const n = parseInt(od.opportunitiesPerPeriod, 10) || 1;
                    const pDist = od.probabilityDistribution || 'point';
                    let p = null;
                    if (pDist === 'point' && od.probPointEstimate) p = parseFloat(od.probPointEstimate);
                    else if (pDist === 'beta' && od.betaShape && od.betaScale) p = parseFloat(od.betaShape) / (parseFloat(od.betaShape) + parseFloat(od.betaScale));
                    else if (pDist === 'lognormal' && od.probLognormalMean) p = parseFloat(od.probLognormalMean);
                    else if (pDist === 'cni' && od.probCniMean) p = parseFloat(od.probCniMean);
                    if (p !== null && !isNaN(p)) {
                        const freq = 1 - Math.pow(1 - p, n);
                        return freq > 0 ? freq : null;
                    }
                } else if (od.occurrenceModel.startsWith('screened')) {
                    return 0; // screened = zero frequency
                }
            }

            if (!selectedIeId || !selectedFosId || !haData) return null;
            const key = `${selectedIeId}_${selectedFosId}`;
            if ((haData.hazardStates || {})[key] !== 'included') return null;
            const ad = (haData.hazardAnalysisData || {})[key];
            if (!ad || !ad.applicableEvents) return null;
            let total = 0;
            (ad.applicableEvents || []).forEach(ev => {
                if (ev.occurrenceModel === 'frequency') {
                    let f = null;
                    const dist = ev.frequencyDistribution || '';
                    if (dist === 'point' && ev.pointEstimate) f = parseFloat(ev.pointEstimate);
                    else if (dist === 'gamma' && ev.gammaShape && ev.gammaScale) f = parseFloat(ev.gammaShape) * parseFloat(ev.gammaScale);
                    else if (dist === 'lognormal' && ev.lognormalMean) f = parseFloat(ev.lognormalMean);
                    else if (dist === 'cni' && ev.cniMean) f = parseFloat(ev.cniMean);
                    if (f !== null && !isNaN(f)) {
                        if (ev.frequencyUnits === '/hr') f *= 8760;
                        total += f;
                    }
                } else if (ev.occurrenceModel === 'nureg-2169-fire') {
                    const sel = ev.fireIgnitionSelections || {};
                    const t = NUREG2169_FIRE_IGNITION_DATA.filter(i => sel[i.bin]).reduce((s, i) => s + i.mean, 0);
                    total += (t / (ev.fireIgnitionComponentCount || 1)) * (parseFloat(ev.fireIgnitionPropagationFactor) || 1);
                }
            });
            return total > 0 ? total : null;
        };

        // Create default node
        const createNode = (type, data = {}) => {
            const id = createId();
            const baseNode = {
                id,
                type,
                label: data.label || '',
                description: data.description || '',
                color: data.color || DEFAULT_SETTINGS.nodeColor,
                x: data.x || 0,
                y: data.y || 0
            };

            switch (type) {
                case NODE_TYPES.INITIATING_EVENT:
                    return {
                        ...baseNode,
                        frequency: data.frequency || '',
                        hazardId: data.hazardId || '',
                        operatingStateId: data.operatingStateId || ''
                    };
                case NODE_TYPES.FUNCTION:
                    return {
                        ...baseNode,
                        sysModelFile: data.sysModelFile || '',
                        knowFtlFileName: data.knowFtlFileName || '',
                        yesTarget: data.yesTarget || null,
                        noTarget: data.noTarget || null
                    };
                case NODE_TYPES.TRANSITION:
                    return {
                        ...baseNode,
                        operatingState: data.operatingState || '',
                        target: data.target || null
                    };
                case NODE_TYPES.END_STATE:
                    return {
                        ...baseNode,
                        consequences: []
                    };
                default:
                    return baseNode;
            }
        };

        // Create default POL
        const createDefaultPOL = (hazard, operatingState, frequency) => {
            // hazard.name is the hazard name from the hazard list
            // hazard.eventDescription (if available) should go into the description
            // hazard.path is the full path including the hazard itself
            const ieNode = createNode(NODE_TYPES.INITIATING_EVENT, {
                label: hazard?.name || 'Hazard',
                description: hazard?.eventDescription || hazard?.description || '',
                frequency: frequency || '',
                hazardId: hazard?.id || '',
                operatingStateId: operatingState?.id || ''
            });

            const endNode = createNode(NODE_TYPES.END_STATE, {
                label: 'End State',
                description: 'Define end state'
            });

            // Connect IE to End State initially
            ieNode.target = endNode.id;

            // Get parent path (all elements except the last one which is the hazard itself)
            const hazardPath = hazard?.path || [];
            const parentPath = hazardPath.slice(0, -1);

            // Create diagram name: Diagram_XXX_YYY where spaces and hyphens become underscores
            const sanitizeName = (str) => (str || '').replace(/[\s-]+/g, '_');
            const hazardNameSanitized = sanitizeName(hazard?.name || 'New');
            const operatingStateSanitized = sanitizeName(operatingState?.id || 'FOS');
            const diagramName = `Diagram_${hazardNameSanitized}_${operatingStateSanitized}`;

            return {
                id: createId(),
                name: diagramName,
                description: '',
                detailedDescription: '', // Rich text detailed description
                layout: 'LR', // LR = left-to-right, TB = top-to-bottom
                hazardId: hazard?.id || '',
                hazardName: hazard?.name || '',
                hazardPath: hazardPath,
                hazardParentPath: parentPath.join(' > '),
                operatingStateId: operatingState?.id || '',
                operatingState: operatingState ? `${operatingState.id} - ${operatingState.name}` : '',
                nodes: [ieNode, endNode],

                ]
            };

        // Node Editor Modal Component
        function NodeEditorModal({ node, operatingStates, settings, onSave, onDelete, onClose, onReset, isInitiatingEvent, sharedPols, onLoadSystem, loadedSystems }) {
            useEscapeKey(onClose);
            // Get default color based on node type
            const getDefaultColorForType = (type) => {
                switch (type) {
                    case NODE_TYPES.INITIATING_EVENT:
                        return settings.ieColor || '#fecaca';
                    case NODE_TYPES.FUNCTION:
                        return settings.functionColor || '#e0f2fe';
                    case NODE_TYPES.TRANSITION:
                        return settings.transitionColor || '#e9d5ff';
                    case NODE_TYPES.END_STATE:
                        return settings.endStateColor || '#bbf7d0';
                    default:
                        return settings.nodeColor || '#e0f2fe';
                }
            };

            const [localNode, setLocalNode] = useState({ 
                ...node,
                color: node.color || getDefaultColorForType(node.type),
                notes: node.notes || '',
                knowFtlFileName: node.knowFtlFileName || '',
                consequences: node.consequences || []
            });

            // ── Consequence helpers ───────────────────────────────────────────
            const DIST_TYPES = [
                { value: 'Normal',      params: [{ key: 'mean', label: 'Mean' }, { key: 'stddev', label: 'Std Dev' }] },
                { value: 'Lognormal',   params: [{ key: 'mean', label: 'Mean' }, { key: 'errorFactor', label: 'Error Factor' }] },
                { value: 'Gamma',       params: [{ key: 'mean', label: 'Mean' }, { key: 'alpha', label: 'Alpha (α)' }] },
                { value: 'Beta',        params: [{ key: 'mean', label: 'Mean' }, { key: 'beta', label: 'Beta (β)' }] },
                { value: 'Uniform',     params: [{ key: 'lower', label: 'Lower Bound' }, { key: 'upper', label: 'Upper Bound' }] },
                { value: 'Triangular',  params: [{ key: 'lower', label: 'Lower' }, { key: 'mode', label: 'Mode' }, { key: 'upper', label: 'Upper' }] },
            ];

            const makeConsequence = () => ({
                id: Math.random().toString(36).slice(2),
                name: '',
                description: '',
                distType: 'Lognormal',
                distParams: { mean: '', errorFactor: '' },
                freqUnits: ''
            });

            const updateConsequence = (idx, field, value) => {
                setLocalNode(prev => {
                    const cons = [...prev.consequences];
                    if (field === 'distType') {
                        // Reset params when distribution type changes
                        const def = DIST_TYPES.find(d => d.value === value);
                        const blank = {};
                        (def?.params || []).forEach(p => { blank[p.key] = ''; });
                        cons[idx] = { ...cons[idx], distType: value, distParams: blank };
                    } else if (field.startsWith('param.')) {
                        const pk = field.slice(6);
                        cons[idx] = { ...cons[idx], distParams: { ...cons[idx].distParams, [pk]: value } };
                    } else {
                        cons[idx] = { ...cons[idx], [field]: value };
                    }
                    return { ...prev, consequences: cons };
                });
            };

            const addConsequence = () => {
                setLocalNode(prev => ({ ...prev, consequences: [...prev.consequences, makeConsequence()] }));
            };

            const removeConsequence = (idx) => {
                setLocalNode(prev => ({ ...prev, consequences: prev.consequences.filter((_, i) => i !== idx) }));
            };
            const fileInputRef = useRef(null);

            const handleSave = () => {
                onSave(localNode);
                onClose();
            };

            const handleReset = () => {
                if (onReset && node.sharedPolId && node.originalNodeId) {
                    if (confirm('Reset this node to match the original shared diagram? Any local modifications will be lost.')) {
                        onReset(node);
                        onClose();
                    }
                }
            };

            const handleFileSelect = () => {
                fileInputRef.current?.click();
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setLocalNode(prev => ({ ...prev, sysModelFile: file.name }));
                }
            };

            const getNodeTypeLabel = (type) => {
                switch (type) {
                    case NODE_TYPES.INITIATING_EVENT: return 'Initiating Event';
                    case NODE_TYPES.FUNCTION: return 'Function';
                    case NODE_TYPES.TRANSITION: return 'Transition';
                    case NODE_TYPES.END_STATE: return 'End State';
                    default: return 'Node';
                }
            };

            // Get the shared POL name if this is a shared node
            const getSharedPolName = () => {
                if (node.sharedPolId && sharedPols) {
                    const sharedPol = sharedPols.find(sp => sp.id === node.sharedPolId);
                    return sharedPol?.name || 'Unknown Shared Diagram';
                }
                return null;
            };

            const sharedPolName = getSharedPolName();

            return (
                <div className="modal-overlay">
                    <div className="modal-content modal-content-wide" onClick={e => e.stopPropagation()}>
                        <div className="p-5">

                                                ) : (
                                                    <>From shared diagram: <strong>{sharedPolName}</strong></>
                                                )}
                                            </span>
                                        </div>
                                        {node.isOverridden && onReset && (
                                            <button
                                                onClick={handleReset}
                                                className="px-3 py-1 bg-orange-500 text-white text-sm rounded hover:bg-orange-600"
                                                title="Reset this node to match the original shared diagram"

                                                Reset to Original

                                    </div>
                                </div>
                            )}
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1">Name:</label>
                                    <input
                                        type="text"
                                        value={localNode.label}
                                        onChange={(e) => setLocalNode(prev => ({ ...prev, label: e.target.value }))}
                                        className="w-full border rounded px-3 py-2"
                                        placeholder="Enter name"
                                        disabled={isInitiatingEvent}
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium mb-1">Description:</label>
                                    <textarea
                                        value={localNode.description}
                                        onChange={(e) => setLocalNode(prev => ({ ...prev, description: e.target.value }))}
                                        className="w-full border rounded px-3 py-2"
                                        rows={4}
                                        placeholder="Enter description"
                                        disabled={isInitiatingEvent}
                                    />
                                </div>

                                {/* ── Consequences (End State only) ─────────────────── */}
                                {node.type === NODE_TYPES.END_STATE && (() => {
                                    const distDef = (dt) => DIST_TYPES.find(d => d.value === dt) || DIST_TYPES[1];
                                    return (
                                        <div className="border rounded p-3 space-y-3 bg-green-50">
                                            <div className="flex items-center justify-between">
                                                <span className="text-sm font-semibold text-green-900">Consequences</span>
                                                <button
                                                    onClick={addConsequence}
                                                    className="px-2 py-1 bg-green-700 text-white text-xs rounded hover:bg-green-800"
                                                    title="Add consequence type"
                                                >+ Add Consequence</button>
                                            </div>
                                            {localNode.consequences.length === 0 && (
                                                <p className="text-xs text-gray-500 italic">No consequences defined. Click &ldquo;+ Add Consequence&rdquo; to add one.</p>
                                            )}
                                            {localNode.consequences.map((con, idx) => {
                                                const params = distDef(con.distType).params;
                                                return (
                                                    <div key={con.id} className="border rounded p-3 bg-white space-y-2 relative">
                                                        <div className="flex items-center justify-between mb-1">
                                                            <span className="text-sm font-bold text-gray-800">{con.name || `Consequence ${idx + 1}`}</span>
                                                            <button
                                                                onClick={() => removeConsequence(idx)}
                                                                className="text-red-500 hover:text-red-700 text-xs font-bold px-1"
                                                                title="Remove this consequence"
                                                            >&times; Remove</button>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-2">
                                                            <div>
                                                                <label className="block text-xs font-medium mb-1">Name</label>
                                                                <input
                                                                    type="text"
                                                                    value={con.name}
                                                                    onChange={e => updateConsequence(idx, 'name', e.target.value)}
                                                                    className="w-full border rounded px-2 py-1 text-sm"
                                                                    placeholder="e.g. Facility Damage"
                                                                />
                                                            </div>
                                                            <div>
                                                                <label className="block text-xs font-medium mb-1">Frequency Units</label>
                                                                <input
                                                                    type="text"
                                                                    value={con.freqUnits}
                                                                    onChange={e => updateConsequence(idx, 'freqUnits', e.target.value)}
                                                                    className="w-full border rounded px-2 py-1 text-sm"
                                                                    placeholder="e.g. per year"
                                                                />
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Description</label>
                                                            <textarea
                                                                value={con.description}
                                                                onChange={e => updateConsequence(idx, 'description', e.target.value)}
                                                                className="w-full border rounded px-2 py-1 text-sm"
                                                                rows={2}
                                                                placeholder="Describe this consequence type"
                                                            />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-medium mb-1">Distribution</label>
                                                            <select
                                                                value={con.distType}
                                                                onChange={e => updateConsequence(idx, 'distType', e.target.value)}
                                                                className="w-full border rounded px-2 py-1 text-sm mb-2"
                                                            >
                                                                {DIST_TYPES.map(d => (
                                                                    <option key={d.value} value={d.value}>{d.value}</option>
                                                                ))}
                                                            </select>
                                                            <div className={`grid gap-2 grid-cols-${params.length}`}>
                                                                {params.map(p => (
                                                                    <div key={p.key}>
                                                                        <label className="block text-xs text-gray-500 mb-1">{p.label}</label>
                                                                        <input
                                                                            type="text"
                                                                            value={con.distParams[p.key] || ''}
                                                                            onChange={e => updateConsequence(idx, 'param.' + p.key, e.target.value)}
                                                                            className="w-full border rounded px-2 py-1 text-sm"
                                                                            placeholder="0"
                                                                        />
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    );
                                })()}

                                {node.type === NODE_TYPES.FUNCTION && (
                                    <div className="space-y-3">
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Associated SYS_system.KNOW_FTL File Name:</label>
                                            <div className="flex gap-2">
                                                <input
                                                    type="text"
                                                    value={localNode.knowFtlFileName || ''}
                                                    onChange={(e) => setLocalNode(prev => ({ ...prev, knowFtlFileName: e.target.value }))}

                                                    placeholder="e.g. SYS_SystemName.KNOW_FTL"
                                                />
                                                <button
                                                    onClick={() => {
                                                        if (onLoadSystem) onLoadSystem(localNode.knowFtlFileName, (fileName) => {
                                                            setLocalNode(prev => ({ ...prev, knowFtlFileName: fileName }));
                                                        });

        // POL Editor Modal
        function POLEditorModal({ pol, haData, operatingStates, onSave, onClose }) {
            useEscapeKey(onClose);
            const [name, setName] = useState(pol.name);
            const [description, setDescription] = useState(pol.description);
            const [layout, setLayout] = useState(pol.layout);

            // Look up hazard path from haData.hazardList
            const getHazardInfo = () => {
                if (!haData?.hazardList || !pol.hazardId) {
                    return { path: null, hazardName: pol.hazardName };
                }

                let foundPath = null;
                let foundHazardName = null;

                const searchNode = (node, currentPath = []) => {
                    const nodePath = [...currentPath, node.name];
                    
                    if (node.id === pol.hazardId) {
                        // Found the hazard - path is everything except the hazard itself
                        foundPath = currentPath;
                        foundHazardName = node.name;
                        return true;
                    }
                    
                    if (node.children && node.children.length > 0) {
                        for (const child of node.children) {
                            if (searchNode(child, nodePath)) {
                                return true;
                            }
                        }
                    }
                    return false;
                };

                for (const rootNode of haData.hazardList) {
                    if (searchNode(rootNode, [])) {
                        break;
                    }
                }

                return { 
                    path: foundPath ? foundPath.join(' > ') : null,
                    hazardName: foundHazardName || pol.hazardName
                };
            };

            // Get operating state display name
            const getOperatingStateDisplay = () => {
                if (!pol.operatingStateId) return pol.operatingState;
                const opState = operatingStates?.find(os => os.id === pol.operatingStateId);
                if (opState) {
                    return `${opState.id} - ${opState.name}`;
                }
                return pol.operatingState || pol.operatingStateId;
            };

            const hazardInfo = getHazardInfo();
            const operatingStateDisplay = getOperatingStateDisplay();

            const handleSave = () => {
                onSave({ ...pol, name, description, layout });
                onClose();
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div className="p-4">
                            <h2 className="text-xl font-bold mb-4">Edit Diagram Properties</h2>
                            
                            <div className="space-y-4">
                                {/* Show Hazard and Operating State as read-only */}
                                {(hazardInfo.hazardName || hazardInfo.path) && (
                                    <div className="bg-gray-50 border rounded p-3">
                                        {hazardInfo.path && (
                                            <div className="mb-2">
                                                <label className="block text-xs text-gray-500 mb-1">Path:</label>
                                                <div className="font-medium">{hazardInfo.path}</div>
                                            </div>
                                        )}
                                        <div className="mb-2">
                                            <label className="block text-xs text-gray-500 mb-1">Hazard:</label>
                                            <div className="font-medium">{hazardInfo.hazardName}</div>
                                        </div>
                                        {operatingStateDisplay && (
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">Facility Operating State:</label>
                                                <div className="font-medium">{operatingStateDisplay}</div>
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                <div>
                                    <label className="block text-sm font-medium mb-1">Diagram Name:</label>
                                    <input
                                        type="text"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                        className="w-full border rounded px-3 py-2"
                                        placeholder="Enter POL name"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium mb-1">Description:</label>
                                    <textarea
                                        value={description}
                                        onChange={(e) => setDescription(e.target.value)}
                                        className="w-full border rounded px-3 py-2"
                                        rows={3}
                                        placeholder="Enter description"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium mb-1">Layout Direction:</label>
                                    <select
                                        value={layout}
                                        onChange={(e) => setLayout(e.target.value)}
                                        className="w-full border rounded px-3 py-2"
                                    >
                                        <option value="LR">Left to Right</option>
                                        <option value="TB">Top to Bottom</option>
                                    </select>
                                </div>
                            </div>

                            <div className="flex gap-3 justify-end mt-6">

        // Import POL Modal
        function ImportPOLModal({ pols, sharedPols, currentPol, isSharedPol, onImport, onClose }) {
            useEscapeKey(onClose);
            const [selectedPol, setSelectedPol] = useState(null);
            const [selectedNodes, setSelectedNodes] = useState([]);
            
            // Combine pols and sharedPols for source selection, excluding current
            const allSourceDiagrams = [
                ...pols.filter(p => p.id !== currentPol.id).map(p => ({ ...p, isShared: false })),
                ...(sharedPols || []).filter(p => p.id !== currentPol.id).map(p => ({ ...p, isShared: true }))
            ];
            
            // Get valid insertion points (not end states, and for shared POLs also not IE)
            const insertionPoints = currentPol.nodes.filter(n => 
                n.type !== NODE_TYPES.END_STATE && 
                (!isSharedPol || n.type !== NODE_TYPES.INITIATING_EVENT)
            );
            
            // Default to single insertion point if only one exists
            const [insertAfterNode, setInsertAfterNode] = useState(
                insertionPoints.length === 1 ? insertionPoints[0].id : ''
            );

            // When source POL is selected, select all nodes by default
            const handleSourcePolChange = (polId) => {
                setSelectedPol(polId);
                const sourcePol = allSourceDiagrams.find(p => p.id === polId);
                if (sourcePol) {
                    // Select all non-IE nodes by default
                    const allNodeIds = sourcePol.nodes
                        .filter(n => n.type !== NODE_TYPES.INITIATING_EVENT)
                        .map(n => n.id);
                    setSelectedNodes(allNodeIds);
                } else {
                    setSelectedNodes([]);
                }
            };

            const handleImport = () => {
                if (selectedPol && selectedNodes.length > 0 && insertAfterNode) {
                    onImport(selectedPol, selectedNodes, insertAfterNode);
                    onClose();
                }
            };

            const sourcePol = allSourceDiagrams.find(p => p.id === selectedPol);

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content modal-content-wide" onClick={e => e.stopPropagation()}>
                        <div className="p-4">
                            <h2 className="text-xl font-bold mb-4">Import from Existing Diagram</h2>

                                <div>
