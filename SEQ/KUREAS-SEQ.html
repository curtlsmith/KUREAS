                                                    <div className="mt-4 pt-4 border-t">
                                                        <h4 className="font-medium text-sm text-purple-700 mb-2">Shared Logic Descriptions</h4>
                                                        {sharedDescriptions.map((desc, idx) => (
                                                            <div key={idx} className="mb-3 p-2 bg-purple-50 rounded">
                                                                <div className="text-xs font-medium text-purple-600 mb-1">{desc.name}</div>
                                                                <div 
                                                                    className="prose prose-sm max-w-none"
                                                                    dangerouslySetInnerHTML={{ __html: desc.description }}
                                                                />
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                    
                                    return (
                                        <>
                                            <div className="p-2 border-b bg-gray-50">
                                                {/* Hazard parent path and Operating State header */}
                                                {(hazardPath || opStateDisplay) && (
                                                    <div className="mb-1 text-sm">
                                                        {hazardPath && (
                                                            <span className="font-medium">{hazardPath}</span>
                                                        )}
                                                        {hazardPath && opStateDisplay && (
                                                            <span className="text-gray-400 mx-2">|</span>
                                                        )}
                                                        {opStateDisplay && (
                                                            <>
                                                                <span className="text-gray-600">Operating State: </span>
                                                                <span className="font-medium">{opStateDisplay}</span>
                                                            </>
                                                        )}
                                                    </div>
                                                )}
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <span className="font-semibold">{currentPol.name}</span>
                                                        <span
                                                            className="ml-2 text-sm cursor-pointer hover:text-blue-600 hover:underline"
                                                            style={{ color: currentPol.description ? '#6b7280' : '#9ca3af' }}
                                                            title="Click to edit description"
                                                            onClick={() => setShowPOLEditor(true)}
                                                        >
                                                            {currentPol.description ? currentPol.description : 'No description \u2014 click to add'}
                                                        </span>
                                                    </div>
                                                    <div className="text-sm text-gray-500">
                                                        Click on nodes to edit
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Diagram + Description layout based on direction */}
                                            <div ref={descContainerRef} className={`flex-1 overflow-hidden flex ${isTopToBottom ? 'flex-row' : 'flex-col'}`}>
                                                {/* Diagram */}
                                                <div className={`overflow-auto bg-gray-50 ${isTopToBottom ? 'flex-1' : ''}`}
                                                     style={!isTopToBottom ? { height: `${100 - descriptionPanelHeight}%` } : undefined}>
                                                    <MermaidDiagram
                                                        pol={currentPol}
                                                        onNodeClick={(node) => setEditingNode(node)}
                                                        settings={settings}
                                                    />
                                                </div>
                                                
                                                {/* Resizer */}
                                                <div 
                                                    ref={descResizerRef}
                                                    className={isTopToBottom ? 'resizer' : 'resizer-horizontal'}
                                                />
                                                
                                                {/* Description Panel */}
                                                <DescriptionPanel />
                                            </div>
                                        </>
                                    );
                                })()
                            ) : currentSharedPol ? (
                                (() => {
                                    const isTopToBottom = currentSharedPol.layout === 'TB';
                                    
                                    return (
                                        <>
                                            <div className="p-2 border-b bg-purple-50">
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <span className="text-purple-600 font-semibold">Shared: {currentSharedPol.name}</span>
                                                    </div>
                                                    <div className="text-sm text-gray-500">
                                                        Click on nodes to edit
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Diagram + Description layout */}
                                            <div ref={descContainerRef} className={`flex-1 overflow-hidden flex ${isTopToBottom ? 'flex-row' : 'flex-col'}`}>
                                                {/* Diagram */}
                                                <div className={`overflow-auto bg-gray-50 ${isTopToBottom ? 'flex-1' : ''}`}
                                                     style={!isTopToBottom ? { height: `${100 - descriptionPanelHeight}%` } : undefined}>
                                                    <MermaidDiagram
                                                        pol={currentSharedPol}
                                                        onNodeClick={(node) => setEditingNode(node)}
                                                        settings={settings}
                                                    />
                                                </div>
                                                
                                                {/* Resizer */}
                                                <div 
                                                    ref={descResizerRef}
                                                    className={isTopToBottom ? 'resizer' : 'resizer-horizontal'}
                                                />
                                                
                                                {/* Description Panel for Shared POL */}
                                                <div className="overflow-auto bg-white" 
                                                     style={{ 
                                                         [isTopToBottom ? 'width' : 'height']: `${isTopToBottom ? descriptionPanelWidth : descriptionPanelHeight}%`,
                                                         minWidth: isTopToBottom ? '200px' : undefined,
                                                         minHeight: !isTopToBottom ? '150px' : undefined
                                                     }}>
                                                    <div className="p-2 bg-purple-50 border-b flex justify-between items-center">
                                                        <span className="font-medium text-sm text-purple-800">Detailed Description</span>
                                                        <button
                                                            onClick={() => setShowDetailedDescEditor('shared')}
                                                            className="px-2 py-1 text-xs bg-purple-600 text-white rounded hover:bg-purple-700"
                                                        >
                                                            Edit
                                                        </button>
                                                    </div>
                                                    <div className="p-3">
                                                        {currentSharedPol.detailedDescription ? (
                                                            <div 
                                                                className="prose prose-sm max-w-none"
                                                                dangerouslySetInnerHTML={{ __html: currentSharedPol.detailedDescription }}
                                                            />
                                                        ) : (
                                                            <p className="text-gray-400 text-sm italic">
                                                                No detailed description. Click Edit to add text, images, and tables.
                                                            </p>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </>
                                    );
                                })()
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-gray-500">
                                    <div className="text-center">
                                        {haData ? (
                                            <p className="text-sm">Select an initiating event from the left panel to view its HTFW script and diagram</p>
                                        ) : (
                                            <div className="space-y-2">
                                                <p className="text-lg">Load a KUREAS-HA KNOW file containing hazards to evaluate further.</p>
                                                <p className="text-lg">Load a KUREAS-SEQ file to continue with that project.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                        </div>
                    </div>

                    {/* Status Bar */}
                    <div className="bg-black text-white px-3 py-1 text-xs flex items-center justify-between">
                        <span>
                            {loadedFileName ? `Loaded: ${loadedFileName}` : 'No file loaded'}
                            {hasUnsavedChanges && ' *'}
                        </span>
                        <span>
                            {haData?.facilityName && `Facility: ${haData.facilityName}`}
                        </span>
                    </div>

                    {/* Modals */}
                    {showReportModal && (
                        <SeqReportModal
                            onClose={() => setShowReportModal(false)}
                            projectName={projectName}
                            projectDescription={projectDescription}
                            haData={haData}
                            pols={pols}
                            ieScripts={ieScripts}
                            projectModules={projectModules}
                            operatingStates={operatingStates}
                            loadedSystems={loadedSystems}
                            selectedFosId={selectedFosId}
                            settings={settings}
                            getIeScript={getIeScript}
                        />
                    )}
                    {showSettings && (
                        <SettingsModal
                            settings={settings}
                            onSave={handleSaveSettings}
                            onClose={() => setShowSettings(false)}
                        />
                    )}

                    {showSystemInfo && (
                        <SystemInfoModal
                            loadedSystems={loadedSystems}
                            onLoadSystem={handleLoadSystemFromFile}
                            settings={settings}
                            onClose={() => setShowSystemInfo(false)}
                        />
                    )}

                    {showFosSelector && (
                        <FosSelectorModal
                            haData={showFosSelector.newData}
                            onSelect={handleFosSelected}
                            onCancel={() => setShowFosSelector(null)}
                        />
                    )}

                    {showFosInfo && selectedFosId && haData && (
                        <FosInfoModal
                            haData={haData}
                            selectedFosId={selectedFosId}
                            onClose={() => setShowFosInfo(false)}
                        />
                    )}

                    {showProjectDescEditor && (
                        <ProjectDescEditorModal
                            description={projectDescription}
                            onSave={(newDesc) => { setProjectDescription(newDesc); setHasUnsavedChanges(true); setShowProjectDescEditor(false); }}
                            onClose={() => setShowProjectDescEditor(false)}
                        />
                    )}

                    {editingNode && (
                        <NodeEditorModal
                            node={editingNode}
                            operatingStates={operatingStates}
                            settings={settings}
                            onSave={handleUpdateNode}
                            onDelete={handleDeleteNode}
                            onReset={handleResetNode}
                            onClose={() => setEditingNode(null)}
                            isInitiatingEvent={editingNode.type === NODE_TYPES.INITIATING_EVENT}
                            sharedPols={sharedPols}
                            onLoadSystem={handleLoadSystemFromFile}
                            loadedSystems={loadedSystems}
                        />
                    )}

                    {showAddNode && currentPol && (
                        <AddNodeModal
                            targetNodeId={showAddNode.nodeId}
                            connectionType={showAddNode.connType}
                            existingNodes={currentPol.nodes}
                            operatingStates={haData?.operatingStateData || []}
                            settings={settings}
                            onAdd={handleAddNode}
                            onLinkExisting={handleLinkExistingNode}
                            onClose={() => setShowAddNode(null)}
                        />
                    )}

                    {editingBranch && currentPol && (
                        <EditBranchModal
                            sourceNodeId={editingBranch.nodeId}
                            branchType={editingBranch.branchType}
                            connection={editingBranch.connection}
                            nodes={currentPol.nodes}
                            onUpdateTarget={handleUpdateBranchTarget}
                            onDeleteBranch={handleDeleteBranch}
                            onClose={() => setEditingBranch(null)}
                        />
                    )}

                    {showPOLEditor && currentPol && (
                        <POLEditorModal
                            pol={currentPol}
                            haData={haData}
                            operatingStates={operatingStates}
                            onSave={handleUpdatePOL}
                            onClose={() => setShowPOLEditor(false)}
                        />
                    )}

                    {showImportPOL && (currentPol || currentSharedPol) && (
                        <ImportPOLModal
                            pols={pols}
                            sharedPols={sharedPols}
                            currentPol={currentPol || currentSharedPol}
                            isSharedPol={!!currentSharedPol}
                            onImport={currentSharedPol ? handleImportNodesToShared : handleImportNodes}
                            onClose={() => setShowImportPOL(false)}
                        />
                    )}

                    {showHazardSelector && haData && (
                        <HazardSelectorModal
                            hazards={haData.hazardList || []}
                            operatingStates={operatingStates}
                            hazardStates={haData.hazardStates || {}}
                            hazardAnalysisData={haData.hazardAnalysisData || {}}
                            onSelect={handleCreatePOL}
                            onClose={() => setShowHazardSelector(false)}
                        />
                    )}

                    {showFilterModal && haData && (
                        <FilterModal
                            hazards={haData.hazardList || []}
                            hazardStates={haData.hazardStates || {}}
                            operatingStates={operatingStates}
                            pols={pols}
                            filter={hazardFilter}
                            onSave={setHazardFilter}
                            onClose={() => setShowFilterModal(false)}
                        />
                    )}

                    {showNewSharedPol && (
                        <NewSharedPOLModal
                            operatingStates={operatingStates}
                            pols={pols}
                            sharedPols={sharedPols}
                            settings={settings}
                            onSave={handleCreateSharedPol}
                            onClose={() => setShowNewSharedPol(false)}
                        />
                    )}

                    {showDeleteSharedPol && (
                        <DeleteSharedPOLModal
                            sharedPol={showDeleteSharedPol}
                            usageList={getSharedPolUsage(showDeleteSharedPol.id)}
                            onConfirm={handleDeleteSharedPol}
                            onClose={() => setShowDeleteSharedPol(null)}
                        />
                    )}

                    {showInsertSharedPol && currentPol && (
                        <InsertSharedPOLModal
                            sharedPol={showInsertSharedPol}
                            targetPol={currentPol}
                            onInsert={handleInsertSharedPol}
                            onClose={() => setShowInsertSharedPol(null)}
                        />
                    )}

                    {showHowFails && howFailsPol && (
                        <HowFacilityFailsModal
                            pol={howFailsPol}
                            settings={settings}
                            loadedSystems={loadedSystems}
                            ieFreq={howFailsIeFreq}
                            onClose={() => { setShowHowFails(false); setHowFailsPol(null); setHowFailsIeFreq(null); }}
                            htfwScript={selectedIeId ? (() => { const sv = ieScripts[selectedIeId] || {}; const bv = getIeScript(selectedIeId, sv.ieName || selectedIeId); return sv.script !== undefined ? sv.script : bv.script; })() : null}
                            htfwIeName={selectedIeId ? (() => { const sv = ieScripts[selectedIeId] || {}; const bv = getIeScript(selectedIeId, sv.ieName || selectedIeId); return sv.ieName !== undefined ? sv.ieName : bv.ieName; })() : null}
                            nodeMetadata={selectedIeId ? ((ieScripts[selectedIeId] || {}).nodeMetadata || {}) : {}}
                            projectModules={projectModules}
                            allIeScripts={ieScripts}
                        />
                    )}


                    {showHAImport && (
                        <HAImportModal
                            existingHaData={haData}
                            newHaData={showHAImport.newData}
                            onImport={handleHAImport}
                            onClose={() => setShowHAImport(null)}
                        />
                    )}

                    {showLoadModeModal && (() => {
                        const { file, data } = showLoadModeModal;
                        const newName = data.projectName || file.name;
                        return (
                            <div className="modal-overlay" style={{ zIndex: 10000 }}>
                                <div className="modal-content" style={{ maxWidth: '440px', width: '95%' }} onClick={e => e.stopPropagation()}>
                                    <div className="p-5">
                                        <h2 className="text-lg font-bold mb-1 text-blue-900">Load SEQ File</h2>
                                        <p className="text-sm text-gray-500 mb-4 font-mono truncate" title={file.name}>{file.name}</p>
                                        <p className="text-sm text-gray-700 mb-4">
                                            A project is already loaded. How would you like to open this file?
                                        </p>
                                        <div className="space-y-2 mb-5">
                                            {/* Option 1 — Load Project (default, visually prominent) */}
                                            <button
                                                autoFocus
                                                onClick={() => {
                                                    setShowLoadModeModal(null);
                                                    loadSeqDataDirect(data, file.name);
                                                }}
                                                className="w-full text-left px-4 py-3 rounded border-2 border-blue-600 bg-blue-50 hover:bg-blue-100 focus:outline-none"
                                            >
                                                <div className="font-semibold text-blue-900 text-sm">Load Project <span className="ml-1 text-xs bg-blue-600 text-white px-1.5 py-0.5 rounded">Default</span></div>
                                                <div className="text-xs text-blue-700 mt-0.5">Replace the current project entirely with <span className="font-medium">{newName}</span>.</div>
                                            </button>
                                            {/* Option 2 — Import into Current Project */}
                                            <button
                                                onClick={() => {
                                                    setShowLoadModeModal(null);
                                                    setShowSEQImport({
                                                        newData: data,
                                                        fileName: file.name,
                                                        existingData: { haData, pols, sharedPols }
                                                    });
                                                }}
                                                className="w-full text-left px-4 py-3 rounded border border-gray-300 bg-white hover:bg-gray-50 focus:outline-none"
                                            >
                                                <div className="font-semibold text-gray-800 text-sm">Import into Current Project</div>
                                                <div className="text-xs text-gray-500 mt-0.5">Selectively merge new and changed items from the file into the current project.</div>
                                            </button>
                                        </div>
                                        <div className="flex justify-end">
                                            <button onClick={() => setShowLoadModeModal(null)} className="px-4 py-2 text-sm border rounded hover:bg-gray-100 text-gray-600">
                                                Cancel
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {showSEQImport && (
                        <SEQImportModal
                            existingData={showSEQImport.existingData}
                            newData={showSEQImport.newData}
                            onImport={handleSEQImport}
                            onClose={() => setShowSEQImport(null)}
                        />
                    )}

                    {showDetailedDescEditor === 'pol' && currentPol && (
                        <RichTextEditor
                            value={currentPol.detailedDescription || ''}
                            onChange={handleUpdateDetailedDescription}
                            onClose={() => setShowDetailedDescEditor(null)}
                            title={`Edit Detailed Description - ${currentPol.name}`}
                        />
                    )}

                    {showDetailedDescEditor === 'shared' && currentSharedPol && (
                        <RichTextEditor
                            value={currentSharedPol.detailedDescription || ''}
                            onChange={handleUpdateSharedDetailedDescription}
                            onClose={() => setShowDetailedDescEditor(null)}
                            title={`Edit Detailed Description - ${currentSharedPol.name}`}
                        />
                    )}

                    {showModifyIEList && haData && (
                        <ModifyIEListModal
                            hazardList={haData.hazardList || []}
                            ieScripts={ieScripts}
                            onSaveIeScript={handleIeScriptChange}
                            onSave={(newList) => {
                                setHaData(prev => ({ ...prev, hazardList: newList }));
                                setHasUnsavedChanges(true);
                            }}
                            onClose={() => setShowModifyIEList(false)}
                        />
                    )}
                </div>
            );
        }

        // Render the application
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
