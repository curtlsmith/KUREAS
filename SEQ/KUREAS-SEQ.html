                                                title="Collapse All"
                                            >
                                                &#8854; All
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {/* Tabs */}
                                <div className="flex border-b">
                                    <button
                                        onClick={() => setActiveLeftTab('tree')}
                                        className={`flex-1 px-4 py-2 text-sm ${activeLeftTab === 'tree' ? 'bg-blue-100 border-b-2 border-blue-600 font-medium' : 'hover:bg-gray-50'}`}
                                    >
                                        Tree View
                                    </button>
                                    <button
                                        onClick={() => setActiveLeftTab('graphic')}
                                        className={`flex-1 px-4 py-2 text-sm ${activeLeftTab === 'graphic' ? 'bg-blue-100 border-b-2 border-blue-600 font-medium' : 'hover:bg-gray-50'}`}
                                    >
                                        Event Tree Graphic
                                    </button>
                                </div>

                                {/* Tab Content */}
                                <div style={{ flex: '1 1 0', minHeight: 0, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
                                    {activeLeftTab === 'tree' ? (
                                        <div className="flex-1 overflow-auto p-4">
                                            {sequenceTree ? (
                                                renderTreeNode(sequenceTree)
                                            ) : (
                                                <div className="text-gray-500 text-center p-4">
                                                    No sequence data available
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div style={{ flex: '1 1 0', minHeight: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                                            {/* Toolbar — matches main HTFW diagram toolbar (same icons/labels) */}
                                            <div className="flex-shrink-0 flex items-center gap-1 px-2 py-1 border-b bg-gray-50">
                                                <button onClick={handleZoomIn}    className="text-xs px-2 py-0.5 border rounded hover:bg-gray-200 font-bold" title="Zoom in">+</button>
                                                <button onClick={handleZoomOut}   className="text-xs px-2 py-0.5 border rounded hover:bg-gray-200 font-bold" title="Zoom out">&minus;</button>
                                                <button onClick={handleZoomReset} className="text-xs px-2 py-0.5 border rounded hover:bg-gray-200" title="Reset zoom">1:1</button>
                                                <span className="text-xs text-gray-400 px-1">{Math.round(zoom * 100)}%</span>
                                                <div className="w-px h-4 bg-gray-300 mx-1"/>
                                                <button
                                                    onClick={() => setIsGraphicFullscreen(f => !f)}
                                                    className="text-xs px-2 py-0.5 border rounded hover:bg-gray-200"
                                                    title={isGraphicFullscreen ? 'Exit fullscreen graphic' : 'Use full modal width for the graphic'}
                                                >
                                                    {isGraphicFullscreen ? '\u22BF Exit' : '\u26F6 Full'}
                                                </button>
                                                <div className="w-px h-4 bg-gray-300 mx-1"/>
                                                <button onClick={() => { const c=canvasRef.current; if(!c)return; const a=document.createElement('a'); a.download=`event_tree_${pol?.label||'diagram'}.png`; a.href=c.toDataURL('image/png'); a.click(); }} className="text-xs px-2 py-0.5 border rounded hover:bg-gray-200" title="Download as PNG">Download</button>
                                                <button onClick={handleCanvasCopy} className="text-xs px-2 py-0.5 border rounded hover:bg-gray-200" title="Copy diagram to clipboard">{canvasCopyMsg || '\u29C9 Copy'}</button>
                                            </div>
                                        <div style={{ flex: '1 1 0', minHeight: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                                            {/* Canvas container — fills remaining height above Sankey */}
                                            <div 
                                                ref={canvasContainerRef}
                                                className="overflow-hidden"
                                                style={{ flex: '1 1 0', minHeight: 0, cursor: isPanning ? 'grabbing' : 'grab' }}
                                                onMouseDown={handleCanvasMouseDown}
                                                onMouseMove={handleCanvasMouseMove}
                                                onMouseUp={handleCanvasMouseUp}
                                                onMouseLeave={handleCanvasMouseUp}
                                                onWheel={handleWheel}
                                            >
                                                <canvas ref={canvasRef} style={{ display: 'block' }} />
                                                {sequences.length === 0 && (
                                                    <div className="text-gray-500 text-center p-4">
                                                        No sequences found (no paths to end states)
                                                    </div>
                                                )}
                                            </div>

                                    {/* ── Risk Contribution Sankey diagrams ──────────── */}
                                    {activeLeftTab === 'graphic' && (() => {
                                        // Resolve consequences for each sequence end-state.
                                        // Look in nodeMetadata first (HtFW nodes), then projectModules (module end-states).
                                        const nm = nodeMetadata || {};
                                        const mods = projectModules || [];

                                        // safeId mirrors parseHTFWScript's safeId
                                        const _safeId = s => s.replace(/[^a-zA-Z0-9_]/g, '_');

                                        const getConsequences = (endStateName) => {
                                            // 1. Direct nodeMetadata lookup by canonical ES node ID
                                            //    End-state nodes are keyed as 'ES_' + safeId(label)
                                            const esNodeId = 'ES_' + _safeId(endStateName);
                                            const directMeta = nm[esNodeId];
                                            if (directMeta && Array.isArray(directMeta.consequences) && directMeta.consequences.length > 0)
                                                return directMeta.consequences;

                                            // 2. Scan all nodeMetadata entries whose stored name/label matches
                                            //    (handles renamed nodes and any ID variation)
                                            const lc = endStateName.toLowerCase();
                                            for (const [nid, meta] of Object.entries(nm)) {
                                                const label = (meta.name || '').toLowerCase();
                                                if (label === lc && Array.isArray(meta.consequences) && meta.consequences.length > 0)
                                                    return meta.consequences;
                                            }

                                            // 3. projectModules — case-insensitive name match
                                            const mod = mods.find(m =>
                                                m.type === 'endstate' &&
                                                (m.displayName || m.name || '').toLowerCase() === lc
                                            );
                                            if (mod && Array.isArray(mod.consequences) && mod.consequences.length > 0)
                                                return mod.consequences;

                                            return [];
                                        };

                                        // Build per-consequence-type risk data across all sequences.
                                        // riskMap key is consequence name lowercased for case-insensitive grouping;
                                        // displayName preserves the first-seen capitalisation for the header.
                                        // riskMap: { lcKey: { displayName, units, rows: [{seqNum, endState, freq, consMean, risk}] } }
                                        const riskMap = {};
                                        cutSets.forEach((cs) => {
                                            if (cs.sequenceFreq === null || cs.sequenceFreq === undefined) return;
                                            const cons = getConsequences(cs.endState);
                                            cons.forEach(con => {
                                                const meanVal = parseFloat(con.distParams?.mean);
                                                if (isNaN(meanVal) || meanVal <= 0) return;
                                                const risk = cs.sequenceFreq * meanVal;
                                                const rawName = con.name || 'Unnamed';
                                                const lcKey = rawName.toLowerCase();
                                                if (!riskMap[lcKey]) riskMap[lcKey] = { displayName: rawName, units: con.freqUnits || '', rows: [] };
                                                riskMap[lcKey].rows.push({
                                                    seqNum: cs.sequenceNum,
                                                    endState: cs.endState,
                                                    freq: cs.sequenceFreq,
                                                    consMean: meanVal,
                                                    risk
                                                });
                                            });
                                        });

                                        const consNames = Object.keys(riskMap);
                                        if (consNames.length === 0) return null;

                                        const sfmt = v => (v === null || v === undefined || isNaN(v)) ? 'N/A' : v.toExponential(sd);
                                        const drawSankey = (canvas, rows, units) => {
                                            if (!canvas) return;
                                            const total = rows.reduce((s, r) => s + r.risk, 0);
                                            if (total <= 0) return;
                                            const dpr = window.devicePixelRatio || 1;
                                            const W = canvas.width / dpr;
                                            const H = canvas.height / dpr;
                                            const ctx = canvas.getContext('2d');
                                            ctx.clearRect(0, 0, W, H);

                                            const LABEL_FONT   = 'bold 13px Arial';
                                            const VALUE_FONT   = '12px Arial';
                                            const R_LABEL_FONT = 'bold 14px Arial';
                                            const R_VALUE_FONT = '13px Arial';

                                            // Measure max label width to set left panel width
                                            ctx.font = LABEL_FONT;
                                            const maxSeqW = Math.max(...rows.map(r => ctx.measureText(`Seq ${r.seqNum}`).width));
                                            ctx.font = VALUE_FONT;
                                            const maxValW = Math.max(...rows.map(r => ctx.measureText(`${sfmt(r.risk)} ${units}/yr`).width));
                                            const leftLabelW = Math.max(maxSeqW, maxValW) + 14;

                                            ctx.font = R_LABEL_FONT;
                                            const rightLabelW = Math.max(ctx.measureText('Total').width, ctx.measureText(`${sfmt(total)} ${units}/yr`).width) + 12;

                                            const nodeW = 14;
                                            const PAD = { top: 14, bot: 14, left: leftLabelW, right: 8 };
                                            const leftX  = PAD.left;
                                            const rightX = W - PAD.right - nodeW - rightLabelW;
                                            const innerH = H - PAD.top - PAD.bot;

                                            // Pastel palette
                                            const COLORS = ['#6ea8d8','#f4a261','#6bcb77','#e07b9a','#b48ac9','#f4d35e','#84c5c5','#ff8c94'];

                                            const GAP = rows.length > 1 ? 14 : 0;
                                            const usableH = innerH - GAP * (rows.length - 1);

                                            let cursor = PAD.top;
                                            const rowGeom = rows.map((row, i) => {
                                                const h = Math.max(6, (row.risk / total) * usableH);
                                                const y = cursor;
                                                cursor += h + GAP;
                                                return { y, h, color: COLORS[i % COLORS.length] };
                                            });

                                            // Draw flow bands
                                            rows.forEach((row, i) => {
                                                const g = rowGeom[i];
                                                const rightSliceY = PAD.top + rows.slice(0, i).reduce((s, r2) => s + (r2.risk / total) * innerH, 0);
                                                const rightSliceH = (row.risk / total) * innerH;
                                                const x1 = leftX + nodeW, x2 = rightX;
                                                const cp = (x1 + x2) / 2;
                                                ctx.beginPath();
                                                ctx.moveTo(x1, g.y);
                                                ctx.bezierCurveTo(cp, g.y, cp, rightSliceY, x2, rightSliceY);
                                                ctx.lineTo(x2, rightSliceY + rightSliceH);
                                                ctx.bezierCurveTo(cp, rightSliceY + rightSliceH, cp, g.y + g.h, x1, g.y + g.h);
                                                ctx.closePath();
                                                const grad = ctx.createLinearGradient(x1, 0, x2, 0);
                                                grad.addColorStop(0, g.color + 'cc');
                                                grad.addColorStop(1, g.color + '55');
                                                ctx.fillStyle = grad;
                                                ctx.fill();
                                            });

                                            // Draw left nodes + labels (right-aligned, left of bar)
                                            rows.forEach((row, i) => {
                                                const g = rowGeom[i];
                                                ctx.fillStyle = g.color;
                                                ctx.fillRect(leftX, g.y, nodeW, g.h);
                                                const midY = g.y + g.h / 2;
                                                ctx.textAlign = 'right';
                                                ctx.fillStyle = '#1f2937';
                                                ctx.font = LABEL_FONT;
                                                ctx.fillText(`Seq ${row.seqNum}`, leftX - 6, midY - 1);
                                                ctx.font = VALUE_FONT;
                                                ctx.fillStyle = '#374151';
                                                ctx.fillText(`${sfmt(row.risk)} ${units}/yr`, leftX - 6, midY + 14);
                                            });

                                            // Draw right node
                                            ctx.fillStyle = '#374151';
                                            ctx.fillRect(rightX, PAD.top, nodeW, innerH);

                                            // Right labels
                                            const rLabelX = rightX + nodeW + 8;
                                            const rMidY = PAD.top + innerH / 2;
                                            ctx.fillStyle = '#1f2937';
                                            ctx.font = R_LABEL_FONT;
                                            ctx.textAlign = 'left';
                                            ctx.fillText('Total', rLabelX, rMidY - 2);
                                            ctx.font = R_VALUE_FONT;
                                            ctx.fillStyle = '#374151';
                                            ctx.fillText(`${sfmt(total)} ${units}/yr`, rLabelX, rMidY + 16);
                                        };

                                        // Store draw data so the sankeyHeight resize effect can redraw imperatively.
                                        sankeyDrawDataRef.current = { drawSankey, riskMap, consNames };

                                        return (
                                            <React.Fragment>
                                                {/* Drag handle between canvas and Sankey */}
                                                <div
                                                    ref={sankeyResizerRef}
                                                    onMouseDown={(e) => {
                                                        e.preventDefault();
                                                        sankeyDragRef.current = { startY: e.clientY, startH: sankeyHeight };
                                                        const onMove = (me) => {
                                                            const drag = sankeyDragRef.current;
                                                            if (!drag) return;
                                                            // Dragging up increases Sankey height
                                                            const delta = drag.startY - me.clientY;
                                                            setSankeyHeight(Math.max(80, Math.min(600, drag.startH + delta)));
                                                        };
                                                        const onUp = () => {
                                                            sankeyDragRef.current = null;
                                                            document.removeEventListener('mousemove', onMove);
                                                            document.removeEventListener('mouseup', onUp);
                                                        };
                                                        document.addEventListener('mousemove', onMove);
                                                        document.addEventListener('mouseup', onUp);
                                                    }}
                                                    style={{ height: '5px', flexShrink: 0, cursor: 'ns-resize', backgroundColor: '#e5e7eb', borderTop: '1px solid #d1d5db', borderBottom: '1px solid #d1d5db' }}
                                                    onMouseEnter={e => { e.currentTarget.style.backgroundColor = '#bfdbfe'; }}
                                                    onMouseLeave={e => { e.currentTarget.style.backgroundColor = '#e5e7eb'; }}
                                                    title="Drag to resize consequence diagrams"
                                                />
                                                {/* Sankey area — fixed height, scrollable */}

                                                    <div style={{ fontSize: '11px', fontWeight: 700, color: '#374151', paddingLeft: '8px', paddingTop: '6px', paddingBottom: '4px', flexShrink: 0 }}>
                                                        Risk Contribution
                                                    </div>
                                                    <div style={{ overflowY: 'auto', flex: '1 1 auto' }}>
                                                    {consNames.map(cName => {
                                                        const { displayName: consDisplayName, units, rows } = riskMap[cName];
                                                        const canvasH = Math.max(100, Math.min(320, rows.length * 56 + 28));
                                                        return (
                                                            <div key={cName} style={{ marginBottom: '8px', paddingLeft: '8px', paddingRight: '8px' }}>
                                                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '2px' }}>
                                                                    <span style={{ fontSize: '11px', fontWeight: 600, color: '#6b7280' }}>{consDisplayName}{units ? ` (${units})` : ''}</span>
                                                                    <div style={{ display: 'flex', gap: '4px' }}>
                                                                        <button
                                                                            onClick={() => {
                                                                                const el = sankeyRefs.current[cName];
                                                                                if (!el) return;
                                                                                const a = document.createElement('a');
                                                                                a.download = `risk_sankey_${cName}.png`;
                                                                                a.href = el.toDataURL('image/png');
                                                                                a.click();
                                                                            }}
                                                                            style={{ fontSize: '10px', padding: '1px 6px', border: '1px solid #d1d5db', borderRadius: '3px', cursor: 'pointer', backgroundColor: '#f9fafb' }}

                                                                        >Download</button>
                                                                        <button
                                                                            onClick={() => {
                                                                                const el = sankeyRefs.current[cName];
                                                                                if (!el) return;
                                                                                el.toBlob(blob => { if (blob) navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]); });
                                                                            }}
                                                                            style={{ fontSize: '10px', padding: '1px 6px', border: '1px solid #d1d5db', borderRadius: '3px', cursor: 'pointer', backgroundColor: '#f9fafb' }}
                                                                            title="Copy Sankey to clipboard"
                                                                        >&#x29C9; Copy</button>
                                                                    </div>
                                                                </div>
                                                                <canvas
                                                                    ref={el => {
                                                                        sankeyRefs.current[cName] = el;
                                                                        if (!el) return;
                                                                        const dpr = window.devicePixelRatio || 1;
                                                                        const w = Math.max(200, el.parentElement?.clientWidth || 400);
                                                                        el.width = Math.round(w * dpr);
                                                                        el.height = Math.round(canvasH * dpr);
                                                                        el.style.width = w + 'px';
                                                                        el.style.height = canvasH + 'px';
                                                                        const ctx = el.getContext('2d');
                                                                        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                                                                        drawSankey(el, rows, units);
                                                                    }}
                                                                    style={{ display: 'block', width: '100%', height: canvasH + 'px', border: '1px solid #e5e7eb', borderRadius: '4px', backgroundColor: '#fafafa' }}
                                                                />
                                                            </div>
                                                        );
                                                    })}
                                                    </div>
                                                </div>
                                            </React.Fragment>
                                        );
                                    })()}
                                        </div>
                                    </div>
                                    )}
                                </div>
                            </div>

                            {/* Resizer */}
                            {!isGraphicFullscreen && (
                                <div
                                    ref={resizerRef}
                                    className="resizer"
                                    onMouseDown={handleResizeStart}

                            {/* Right Pane - Sequence Insights */}

                                                                {!cs.isTransfer && (() => {

                                                                    const oc = esNode?.outcome || "unanalyzed";

                                                                    return <span className={`text-xs px-2 py-1 rounded ${bg}`}>{cs.endState}</span>;
                                                                })()}
                                                            </div>
                                                        </div>
                                                        {/* Prefix cut set items (conditions from this tree) */}
                                                        {cs.cutSet.length === 0 ? (
                                                            <div className="text-xs text-gray-500 italic">
                                                                {cs.isTransfer ? '(Direct transfer)' : '(No branch decisions - direct path)'}
                                                            </div>
                                                        ) : (
                                                            <div className="space-y-1">
                                                                {cs.cutSet.map((item, itemIdx) => (
                                                                    <div
                                                                        key={itemIdx}
                                                                        className={`text-xs p-2 rounded ${

                                                                                ? 'bg-orange-50 border border-orange-300'
                                                                                : item.occurred
                                                                                    ? 'bg-green-50 border border-green-200'
                                                                                    : item.noFailedWarning
                                                                                        ? 'bg-red-50 border border-red-500'
                                                                                        : 'bg-red-50 border border-red-200'
                                                                        }`}
                                                                    >
                                                                        <div className="flex items-start gap-2">
                                                                            <span className={`font-bold ${item.yesFailedWarning ? 'text-orange-600' : item.occurred ? 'text-green-600' : item.noFailedWarning ? 'text-red-700' : 'text-red-600'}`}>
                                                                                {item.occurred ? 'WORKS' : 'FAILS'}
                                                                            </span>
                                                                            <div className="flex-1">
                                                                                <div className="font-medium flex items-center gap-2 flex-wrap">
                                                                                    <span>{item.name}</span>
                                                                                    {item.yesFailedWarning && (
                                                                                        <span className="text-orange-700 text-[10px] font-semibold">Probability = 0 because the system/function is failed</span>

                                                                                    {item.noFailedWarning && (
                                                                                        <span className="text-orange-700 text-[10px] font-semibold">Probability = 1, system/function is failed</span>
                                                                                    )}
                                                                                </div>
                                                                                {item.description && (
                                                                                    <div className="text-gray-500 text-[10px]">{item.description}</div>
                                                                                )}
                                                                            </div>
                                                                        </div>
                                                                        {item.systemExpansion && item.systemExpansion.cutSets.length > 0 && (() => {
                                                                            // Find the loaded system so we can resolve BE description/probability when expanded.
                                                                            const sysName = item.systemExpansion.systemName;
                                                                            const sysFile = item.systemExpansion.fileName;
                                                                            const sys = Object.values(loadedSystems || {}).find(s =>
                                                                                (sysFile && s.fileName === sysFile) || (sysName && s.systemName === sysName)
                                                                            );
                                                                            const eventInfo = sys?.eventInfo || {};
                                                                            return (
                                                                            <div className="mt-2 ml-6 pl-2 border-l-2 border-red-300">
                                                                                <div className="space-y-1">
                                                                                    {item.systemExpansion.cutSets.map((sysCs, sci) => {
                                                                                        const rowKey = `${idx}:${itemIdx}:${sci}`;
                                                                                        const isExpanded = expandedSysCutSets.has(rowKey);
                                                                                        return (
                                                                                        <div key={sci} className="bg-white rounded border border-red-200">
                                                                                            <button
                                                                                                type="button"
                                                                                                onClick={() => {
                                                                                                    setExpandedSysCutSets(prev => {
                                                                                                        const next = new Set(prev);
                                                                                                        if (next.has(rowKey)) next.delete(rowKey);
                                                                                                        else next.add(rowKey);
                                                                                                        return next;
                                                                                                    });
                                                                                                }}
                                                                                                className="w-full flex items-start gap-2 px-2 py-1 text-left hover:bg-red-50 cursor-pointer"
                                                                                                title={isExpanded ? 'Click to collapse' : 'Click to see basic event details'}
                                                                                            >
                                                                                                <span className="text-[10px] text-gray-400 font-mono w-3 text-center select-none">
                                                                                                    {isExpanded ? '\u25BC' : '\u25B6'}
                                                                                                </span>
                                                                                                <span className="text-[10px] text-gray-500 font-mono w-4 text-right">{sysCs.index}</span>
                                                                                                <span className="text-[10px] font-mono text-gray-800 flex-1">
                                                                                                    {sysCs.events.length > 0 ? sysCs.events.join(' \u00D7 ') : '(empty)'}
                                                                                                </span>
                                                                                                {sysCs.probability !== null && sysCs.probability !== undefined && !isNaN(sysCs.probability) && (
                                                                                                    <span className="text-[10px] font-mono text-gray-500">
                                                                                                        {fmt(sysCs.probability)}

                                                                                            </button>
                                                                                            {isExpanded && (

                                                                                                        <table className="w-full text-[10px]" style={{borderCollapse:'collapse'}}>
                                                                                                            <thead>
                                                                                                                <tr className="text-gray-500">
                                                                                                                    <th className="text-left font-semibold py-0.5 pr-2">Event</th>
                                                                                                                    <th className="text-left font-semibold py-0.5 pr-2">Description</th>
                                                                                                                    <th className="text-right font-semibold py-0.5">Probability</th>
                                                                                                                </tr>
                                                                                                            </thead>
                                                                                                            <tbody>
                                                                                                                {sysCs.events.map((evName, ei) => {
                                                                                                                    const isComplement = evName.startsWith('NOT-');
                                                                                                                    const baseName = isComplement ? evName.slice(4) : evName;
                                                                                                                    const ed = eventInfo[baseName] || eventInfo[evName] || {};
                                                                                                                    const seqFe = cs.failedEvents;
                                                                                                                    const isFailed = seqFe && seqFe.has(evName);
                                                                                                                    const baseProb = ed.probability;
                                                                                                                    const displayProb = isFailed
                                                                                                                        ? (isComplement ? 0.0 : 1.0)
                                                                                                                        : (baseProb !== null && baseProb !== undefined)
                                                                                                                            ? (isComplement ? (1.0 - baseProb) : baseProb)
                                                                                                                            : undefined;

                                                                                                                            <td className="py-0.5 pr-2 text-gray-700 align-top">{ed.description || ''}</td>
                                                                                                                            <td className="py-0.5 font-mono text-right align-top whitespace-nowrap" style={{color: isFailed ? '#c2410c' : undefined}}>{fmt(displayProb)}</td>
                                                                                                                        </tr>
                                                                                                                    );
                                                                                                                })}
                                                                                                            </tbody>
                                                                                                        </table>
                                                                                                    )}
                                                                                                    <div className="mt-2 pt-2 border-t border-red-200 flex items-center justify-between">
                                                                                                        <span className="text-[10px] font-semibold text-gray-700">Cut Set Probability</span>
                                                                                                        <span className="text-[11px] font-mono font-semibold text-gray-900">
                                                                                                            {fmt(sysCs.probability)}
                                                                                                        </span>
                                                                                                    </div>
                                                                                                </div>
                                                                                            )}
                                                                                        </div>
                                                                                        );
                                                                                    })}
                                                                                </div>
                                                                            </div>
                                                                            );
                                                                        })()}
                                                                    </div>
                                                                ))}
                                                            </div>

                                                        {/* Transfer group: derived sub-sequences from the target IE */}
                                                        {cs.isTransfer && cs.transferGroup && cs.transferGroup.length > 0 && (
                                                            <div className="mt-3 border-t border-amber-300 pt-3">

                                                                    <span>&#x25B6;</span>
                                                                    <span>Derived sequences from {cs.transferTarget}</span>
                                                                </div>
                                                                <div className="space-y-2">
                                                                    {cs.transferGroup.map((sub, subIdx) => {
                                                                        if (sub.isTransferGroup) {
                                                                            return (
                                                                                <div key={subIdx} className="border border-amber-200 rounded p-2 bg-amber-50/60">
                                                                                    <div className="text-xs font-semibold text-amber-700 mb-1">&#x25B6; Nested transfer → {sub.transferTarget}</div>
                                                                                    <div className="space-y-1 ml-2">
                                                                                        {(sub.subSequences || []).map((nsub, nsi) => (
                                                                                            <div key={nsi} className="border border-amber-100 rounded p-2 bg-white">
                                                                                                <div className="flex items-center justify-between mb-1 gap-1">
                                                                                                    <span className="text-[11px] font-bold text-amber-800">Seq {cs.sequenceNum}-{subIdx+1}-{nsi+1}</span>
                                                                                                    <div className="flex items-center gap-1 flex-wrap justify-end">
                                                                                                        {nsub.sequenceFreq !== null && nsub.sequenceFreq !== undefined && !isNaN(nsub.sequenceFreq) ? (

                                                                            <div key={subIdx} className="border border-amber-200 rounded p-2 bg-white">

                                                                                    <span className="text-[11px] font-bold text-gray-800">
                                                                                        Seq {cs.sequenceNum}-{sub.subIndex !== undefined ? sub.subIndex : subIdx+1}

                                                                                        {sub.sequenceFreq !== null && sub.sequenceFreq !== undefined && !isNaN(sub.sequenceFreq) ? (

                                                                                            <span className="text-[10px] font-mono px-1 py-0.5 rounded bg-blue-100 text-blue-800">P={fmt(sub.sequenceProb)}</span>

                                                                                        <span className="text-[10px] px-1 py-0.5 rounded bg-gray-100 text-gray-700">{sub.endState}</span>

                                                                                    {(sub.cutSet || []).map((it, ii) => (

                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>

                                                        {cs.isTransfer && (!cs.transferGroup || cs.transferGroup.length === 0) && (
                                                            <div className="mt-2 text-xs text-amber-600 italic">
                                                                (Transfer target &quot;{cs.transferTarget}&quot; not resolved — no matching IE script found)

                                        </div>
                                    ) : (
                                        (() => {
                                            const sd = Math.max(1, Math.min(10, parseInt(settings?.showDigits, 10) || 3));
                                            const fmtP = (v) => (v === null || v === undefined || isNaN(v)) ? '-' : v.toExponential(sd);
                                            const fmtR = (v) => (v === null || v === undefined || isNaN(v)) ? '-' : (v >= 999 ? '∞' : v.toFixed(2));

                                            // Target selector — always shown when there are sequences
                                            const hasSequences = cutSets && cutSets.length > 0;
                                            const targetSelector = hasSequences ? (
                                                <div style={{ marginBottom: '10px', padding: '8px 10px', background: '#f0f9ff', border: '1px solid #bae6fd', borderRadius: '6px', display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>
                                                    <span style={{ fontSize: '11px', fontWeight: 700, color: '#0369a1', whiteSpace: 'nowrap' }}>Importance Measure Target:</span>

                                                    </table>

                                        })()

        // ══ HTFW Script Editor ═════════════════════════════════════════════════════
        function HTFWScriptEditor({ ieName, ieDescription, script, onIeNameChange, onIeDescriptionChange, onScriptChange, projectModules, fontSizeClass, bgStyle }) {
            const textareaRef  = React.useRef(null);
            const lineNumRef   = React.useRef(null);
            const backdropRef  = React.useRef(null);
            const lineSpanRefs = React.useRef([]);
            const [lineHeights, setLineHeights] = React.useState([]);
            const [showDescEditor, setShowDescEditor] = React.useState(false);
            const [descDraft, setDescDraft] = React.useState('');

            const isDark      = bgStyle?.backgroundColor === '#1f2937';
            const commentColor = isDark ? '#4ade80' : '#15803d';
            const normalColor  = bgStyle?.color || '#111827';
            const headerBg    = isDark ? '#1e3a5f' : '#dbeafe';
            const borderColor  = bgStyle?.borderColor || '#d1d5db';
            const paneBg      = bgStyle?.backgroundColor || '#ffffff';

            const getLineHeight = () => {
                switch (fontSizeClass) {
                    case 'text-xs':   return '16px';
                    case 'text-sm':   return '20px';
                    case 'text-base': return '24px';
                    case 'text-lg':   return '28px';
                    default:          return '20px';
                }
            };
            const lineHeight = getLineHeight();

            // Synchronous line count so line numbers always match
            const currentLineCount = Math.max((script || '').split('\n').length, 1);

            // Measure actual rendered span heights so line numbers track wrapped lines
            React.useLayoutEffect(() => {
                const spans = lineSpanRefs.current;
                if (!spans || spans.length === 0) return;
                const defaultH = parseInt(lineHeight, 10);
                const heights = spans.map(span => span ? span.offsetHeight : defaultH);
                setLineHeights(prev => {
                    if (prev.length === heights.length && heights.every((h, i) => h === prev[i])) return prev;
                    return heights;
                });
            });

            // Sync scroll: textarea drives both line-numbers and backdrop
            const handleScroll = (e) => {
                if (lineNumRef.current)  lineNumRef.current.scrollTop  = e.target.scrollTop;
                if (backdropRef.current) {
                    backdropRef.current.scrollTop  = e.target.scrollTop;
                    backdropRef.current.scrollLeft = e.target.scrollLeft;
                }
            };

            const handleInsertModule = (mod) => {
                if (!textareaRef.current) return;
                const ta    = textareaRef.current;
                const start = ta.selectionStart;
                const before = script.slice(0, start);
                const after  = script.slice(ta.selectionEnd);
                const ref    = mod.name;
                const prefix = (before && !before.endsWith(' ') && !before.endsWith('\n')) ? ' ' : '';
                const suffix = (after  && !after.startsWith(' ')  && !after.startsWith('\n') && !after.startsWith(';')) ? ' ' : '';
                const newScript = before + prefix + ref + suffix + after;
                onScriptChange(newScript);
                setTimeout(() => {
                    const pos = start + prefix.length + ref.length;
                    ta.focus();
                    ta.setSelectionRange(pos, pos);
                }, 0);
            };

            // Generate line-number entries using measured heights
            const lineNumbers = [];
            for (let i = 1; i <= Math.max(currentLineCount, 10); i++) lineNumbers.push(i);

            return (
                <div className="flex flex-col h-full overflow-hidden" style={{ backgroundColor: paneBg }}>
                    {/* Header row 1: FACILITY WORKS(IE_NAME) = */}
                    <div className="flex-shrink-0 flex items-center gap-2 px-3 py-1.5 border-b" style={{ backgroundColor: headerBg, borderColor }}>

                            FACILITY WORKS(
                        </span>
                        <input
                            type="text"
                            value={ieName}
                            onChange={(e) => onIeNameChange(e.target.value.replace(/[^a-zA-Z0-9_\-]/g, ''))}
                            className="font-mono font-bold text-xs border rounded px-1 py-0 focus:outline-none focus:ring-1 focus:ring-blue-400"
                            style={{ width: '180px', backgroundColor: isDark ? '#374151' : '#fff', color: isDark ? '#fbbf24' : '#b45309' }}

                        />
                        <span className="font-mono font-bold text-xs whitespace-nowrap" style={{ color: isDark ? '#93c5fd' : '#1e3a8a' }}>
                            ) =
                        </span>
                    </div>

                    {/* Header row 1b: IE description (click to open editor dialog) */}

                    {/* Description editor dialog (plain-text, multi-line) */}
                    {showDescEditor && (

                                        style={{ minHeight: '180px', resize: 'vertical', fontFamily: 'inherit' }}
                                        placeholder="Optional description of this initiating event…"
                                        spellCheck={true}
                                    />
                                </div>
                                <div className="px-4 py-3 border-t flex justify-end gap-2" style={{ backgroundColor: '#f8fafc' }}>
                                    <button
                                        onClick={() => setShowDescEditor(false)}
                                        className="px-3 py-1.5 border rounded text-sm hover:bg-gray-100"
                                    >Cancel</button>
                                    <button
                                        onClick={() => {
                                            if (onIeDescriptionChange) onIeDescriptionChange(descDraft);
                                            setShowDescEditor(false);
                                        }}
                                        className="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700"
                                    >Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header row 2: Insert keyword + module buttons */}
                    <div className="flex-shrink-0 flex items-center gap-1 px-3 py-1 border-b flex-wrap" style={{ backgroundColor: isDark ? '#1e293b' : '#f0f4ff', borderColor }}>
                        <span className="text-xs font-semibold whitespace-nowrap" style={{ color: isDark ? '#93c5fd' : '#1e3a8a' }}>Insert</span>
                        {/* Keyword snippets */}
                        {[
                            { label: 'IF()...THEN ENDSTATE()', snippet: 'IF() THEN ENDSTATE()', title: 'Insert IF/THEN/ENDSTATE statement' },
                            { label: 'IF()...THEN FAILED()AND ENDSTATE()', snippet: 'IF() THEN FAILED() AND ENDSTATE()', title: 'Insert IF/THEN/FAILED/AND/ENDSTATE statement' },
                            { label: 'FAILED()', snippet: 'FAILED()', title: 'Insert global FAILED override — events set to P=1.0 for all sequences' },
                            { label: 'NOT', snippet: 'NOT ', title: 'Insert NOT (logical negation)' },
                            { label: 'AND', snippet: ' AND ', title: 'Insert AND (logical conjunction)' },
                            { label: 'BETA(α,β)', snippet: ' = BETA(, )', title: 'Assign Beta distribution to a system/function: NAME = BETA(shape, scale). Mean = shape/(shape+scale)' },
                            { label: 'CNI(mean)', snippet: ' = CNI()', title: 'Assign Constrained Non-Informative (Beta) distribution: NAME = CNI(mean). Equivalent to BETA(0.5, 0.5*(1-mean)/mean)' },
                        ].map(kw => (
                            <button
                                key={kw.label}
                                onClick={() => {
                                    if (!textareaRef.current) return;
                                    const ta = textareaRef.current;
                                    const start = ta.selectionStart;
                                    const before = script.slice(0, start);
                                    const after  = script.slice(ta.selectionEnd);
                                    const prefix = (before && !before.endsWith(' ') && !before.endsWith('\n')) ? ' ' : '';
                                    const suffix = (after && !after.startsWith(' ') && !after.startsWith('\n') && !after.startsWith(';')) ? ' ' : '';
                                    const newScript = before + prefix + kw.snippet + suffix + after;
                                    onScriptChange(newScript);
                                    setTimeout(() => {
                                        const pos = start + prefix.length + kw.snippet.length;
                                        ta.focus(); ta.setSelectionRange(pos, pos);
                                    }, 0);
                                }}
                                className="px-1.5 py-0.5 text-xs rounded border font-mono"
                                style={{ backgroundColor: isDark ? '#1e3a5f' : '#dbeafe', borderColor: isDark ? '#3b82f6' : '#93c5fd', color: isDark ? '#93c5fd' : '#1e40af' }}
                                title={kw.title}
                            >
                                {kw.label}
                            </button>
                        ))}
                        {/* Module (top-event / function) references */}
                        {projectModules.length > 0 && (
                            <>
                                <span className="text-xs text-gray-400 select-none" style={{ margin: '0 2px' }}>|</span>
                                {projectModules.map(mod => (
                                    <button
                                        key={mod.id}
                                        onClick={() => handleInsertModule(mod)}
                                        className="px-1.5 py-0.5 text-xs rounded border hover:bg-purple-100"
                                        style={{ backgroundColor: isDark ? '#4c1d95' : '#ede9fe', borderColor: isDark ? '#7c3aed' : '#a78bfa', color: isDark ? '#c4b5fd' : '#5b21b6' }}
                                        title={`Insert ${mod.name} at cursor`}
                                    >
                                        {mod.name}
                                    </button>
                                ))}
                            </>
                        )}
                    </div>

                    {/* Editor body */}
                    <div className="h-full flex border rounded overflow-hidden" style={{ backgroundColor: paneBg, borderColor }}>
                        {/* Line numbers — heights track wrapped lines via lineHeights */}
                        <div
                            ref={lineNumRef}
                            className="flex-shrink-0 py-2 px-2 text-right select-none overflow-hidden"
                            style={{
                                backgroundColor: isDark ? '#111827' : '#f9fafb',
                                borderRight: `1px solid ${borderColor}`,
                                color: isDark ? '#6b7280' : '#9ca3af',
                                minWidth: '40px',
                                fontFamily: 'monospace',
                            }}
                        >
                            {lineNumbers.map((num, idx) => (
                                <div key={num} className={fontSizeClass || 'text-sm'} style={{
                                    height:     lineHeights[idx] ? `${lineHeights[idx]}px` : lineHeight,
                                    lineHeight: lineHeights[idx] ? `${lineHeights[idx]}px` : lineHeight,
                                    display: 'flex',
                                    alignItems: 'flex-start',
                                    justifyContent: 'flex-end',
                                    paddingTop: lineHeights[idx] && lineHeights[idx] > parseInt(lineHeight, 10)
                                        ? `${Math.floor(parseInt(lineHeight, 10) / 4)}px` : '0',
                                }}>
                                    {num}
                                </div>
                            ))}
                        </div>

                        {/* Backdrop + textarea — identical metrics so cursor stays in sync */}
                        <div className="flex-1 relative overflow-hidden">
                            <div
                                ref={backdropRef}
                                aria-hidden="true"
                                className={`absolute inset-0 p-2 pointer-events-none select-none ${fontSizeClass || 'text-sm'}`}
                                style={{
                                    fontFamily: 'monospace',
                                    lineHeight,
                                    whiteSpace: 'pre-wrap',
                                    wordWrap: 'break-word',
                                    overflowWrap: 'break-word',
                                    overflow: 'hidden',
                                    scrollbarWidth: 'none',
                                }}
                            >
                                {(() => {
                                    lineSpanRefs.current = [];
                                    return (script || '').split('\n').map((line, i) => (
                                        <span
                                            key={i}
                                            ref={el => { lineSpanRefs.current[i] = el; }}
                                            style={{
                                                display: 'block',
                                                lineHeight,
                                                color: line.trimStart().startsWith('#') ? commentColor : normalColor,
                                            }}
                                        >
                                            {line || '\u200b'}
                                        </span>
                                    ));
                                })()}
                            </div>
                            <textarea
                                ref={textareaRef}
                                value={script || ''}
                                onChange={(e) => onScriptChange(e.target.value)}
                                onScroll={handleScroll}
                                className={`absolute inset-0 w-full h-full p-2 resize-none outline-none ${fontSizeClass || 'text-sm'}`}
                                style={{
                                    backgroundColor: 'transparent',
                                    color: 'transparent',
                                    caretColor: normalColor,
                                    lineHeight,
                                    fontFamily: 'monospace',
                                    whiteSpace: 'pre-wrap',
                                    wordWrap: 'break-word',
                                    overflowWrap: 'break-word',
                                }}
                                placeholder="# Enter facility success logic here"
                                spellCheck={false}
                            />
                        </div>
                    </div>
                </div>
            );
        }

        // ══ System/Function and End State Elements Panel ══════════════════════════
        function ProjectModulesPanel({ modules, editingId, onAdd, onUpdate, onDelete, onSetEditing, bgStyle, onLoadSystem }) {
            const OUTCOME_OPTS = [
                { value: 'unanalyzed', label: 'Unanalyzed',      color: '#e5e7eb', text: '#374151' },
                { value: 'positive',   label: 'Positive Outcome', color: '#bbf7d0', text: '#166534' },
                { value: 'negative',   label: 'Negative Outcome', color: '#fecaca', text: '#991b1b' },
            ];
            const [name, setName]           = React.useState('');
            const [displayName, setDisplayName] = React.useState('');
            const [type, setType]           = React.useState('function');
            const [description, setDesc]    = React.useState('');
            const [outcome, setOutcome]     = React.useState('unanalyzed');
            const [knowFtlFileName, setKnowFtlFileName] = React.useState('');
            const [consequences, setConsequences] = React.useState([]);
            const [showCons, setShowCons]   = React.useState(false);
            const isDark      = bgStyle?.backgroundColor === '#1f2937';

            const MOD_DIST_TYPES = [
                { value: 'Normal',     params: [{ key: 'mean', label: 'Mean' }, { key: 'stddev', label: 'Std Dev' }] },
                { value: 'Lognormal',  params: [{ key: 'mean', label: 'Mean' }, { key: 'errorFactor', label: 'Error Factor' }] },
                { value: 'Gamma',      params: [{ key: 'mean', label: 'Mean' }, { key: 'alpha', label: 'Alpha (α)' }] },
                { value: 'Beta',       params: [{ key: 'mean', label: 'Mean' }, { key: 'beta', label: 'Beta (β)' }] },
                { value: 'Uniform',    params: [{ key: 'lower', label: 'Lower Bound' }, { key: 'upper', label: 'Upper Bound' }] },
                { value: 'Triangular', params: [{ key: 'lower', label: 'Lower' }, { key: 'mode', label: 'Mode' }, { key: 'upper', label: 'Upper' }] },
            ];
            const modMakeCons = () => ({
                id: Math.random().toString(36).slice(2),
                name: '', description: '', distType: 'Lognormal',
                distParams: { mean: '', errorFactor: '' }, freqUnits: ''
            });
            const modUpdateCons = (idx, field, value) => {
                setConsequences(prev => {
                    const arr = [...prev];
                    if (field === 'distType') {
                        const def = MOD_DIST_TYPES.find(d => d.value === value);
                        const blank = {};
                        (def?.params || []).forEach(p => { blank[p.key] = ''; });
                        arr[idx] = { ...arr[idx], distType: value, distParams: blank };
                    } else if (field.startsWith('param.')) {
                        arr[idx] = { ...arr[idx], distParams: { ...arr[idx].distParams, [field.slice(6)]: value } };
                    } else {
                        arr[idx] = { ...arr[idx], [field]: value };
                    }
                    return arr;
                });
            };
            const borderColor = bgStyle?.borderColor || '#d1d5db';
            const paneBg      = bgStyle?.backgroundColor || '#ffffff';

            React.useEffect(() => {
                if (editingId === null) { setName(''); setDisplayName(''); setType('function'); setDesc(''); setOutcome('unanalyzed'); setKnowFtlFileName(''); setConsequences([]); setShowCons(false); return; }
                if (editingId === undefined) return;
                const mod = modules.find(m => m.id === editingId);
                if (mod) { setName(mod.name); setDisplayName(mod.displayName || ''); setType(mod.type || 'function'); setDesc(mod.description || ''); setOutcome(mod.outcome || 'unanalyzed'); setKnowFtlFileName(mod.knowFtlFileName || ''); setConsequences(JSON.parse(JSON.stringify(mod.consequences || []))); setShowCons(false); }
            }, [editingId, modules]);

            const handleSave = () => {
                const cleanName = name.replace(/[^a-zA-Z0-9_\-]/g, '');
                if (!cleanName) return;
                if (editingId === null) {
                    onAdd(cleanName, displayName, type, description, outcome, knowFtlFileName, consequences);
                } else {
                    onUpdate(editingId, cleanName, displayName, type, description, outcome, knowFtlFileName, consequences);
                }
                setName(''); setDisplayName(''); setType('function'); setDesc(''); setOutcome('unanalyzed'); setKnowFtlFileName(''); setConsequences([]); setShowCons(false);
                onSetEditing(undefined);
            };

            const inputStyle = { backgroundColor: isDark ? '#374151' : '#fff', color: isDark ? '#f3f4f6' : '#111827', borderColor };

            return (
                <div className="flex flex-col h-full overflow-hidden" style={{ backgroundColor: paneBg }}>
                    <div className="flex items-center justify-between px-3 py-1.5 border-b flex-shrink-0" style={{ backgroundColor: isDark ? '#2d1b69' : '#f3f0ff', borderColor }}>
                        <span className="text-xs font-bold" style={{ color: isDark ? '#c4b5fd' : '#4c1d95' }}>System/Function and End State Elements</span>
                        <button
                            onClick={() => onSetEditing(null)}
                            className="text-xs px-2 py-0.5 rounded"
                            style={{ backgroundColor: isDark ? '#5b21b6' : '#7c3aed', color: 'white' }}
                            title="Define a reusable System/Function or End State"
                        >
                            + New
                        </button>
                    </div>

                    {/* Module chips */}
                    <div className="px-3 py-2 flex flex-wrap gap-1.5 overflow-y-auto" style={{ maxHeight: '72px' }}>
                        {modules.length === 0 ? (
                            <span className="text-xs text-gray-400 italic">No modules yet. Modules are reusable nodes (Sys/Func or End State) shared across IE scripts.</span>
                        ) : (
                            modules.map(mod => {
                                const isES = mod.type === 'endstate';
                                const oc = OUTCOME_OPTS.find(o => o.value === (mod.outcome || 'unanalyzed')) || OUTCOME_OPTS[0];
                                return (
                                    <span
                                        key={mod.id}
                                        className="inline-flex items-center gap-1 text-xs font-mono font-semibold px-2 py-0.5 rounded-full border cursor-pointer"
                                        style={{ backgroundColor: editingId === mod.id ? (isDark ? '#4c1d95' : '#ddd6fe') : (isES ? oc.color : (isDark ? '#2d1b69' : '#ede9fe')), borderColor: isES ? '#9ca3af' : (isDark ? '#7c3aed' : '#a78bfa'), color: isES ? oc.text : (isDark ? '#c4b5fd' : '#5b21b6') }}
                                        onClick={() => onSetEditing(mod.id)}
                                        title={`${isES ? 'End State' : 'Sys/Func'}: ${mod.displayName || mod.name}${mod.description ? ' — ' + mod.description : ''} — click to edit`}
                                    >
                                        {mod.name}
                                        <button
                                            onClick={(e) => { e.stopPropagation(); onDelete(mod.id); }}
                                            className="hover:text-red-600 leading-none"
                                            title="Delete module"
                                        >&times;</button>
                                    </span>
                                );
                            })
                        )}
                    </div>

                    {/* Edit / create area */}
                    {editingId !== undefined && (
                        <div className="flex-shrink-0 border-t p-2 space-y-1.5" style={{ borderColor, backgroundColor: isDark ? '#1f2937' : '#fafafa' }}>
                            <div className="flex gap-2">
                                <div className="flex-1">
                                    <label className="text-xs text-gray-500 block mb-0.5">Name (identifier)</label>
                                    <input
                                        type="text"
                                        value={name}
                                        onChange={(e) => setName(e.target.value.replace(/[^a-zA-Z0-9_\-]/g, ''))}
                                        placeholder="Module_Name"
                                        className="w-full font-mono text-xs border rounded px-1 py-0.5 focus:outline-none focus:ring-1 focus:ring-purple-400"
                                        style={inputStyle}
                                        spellCheck={false}
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 block mb-0.5">Type</label>
                                    <select
                                        value={type}
                                        onChange={(e) => setType(e.target.value)}
                                        className="text-xs border rounded px-1 py-0.5 focus:outline-none focus:ring-1 focus:ring-purple-400"
                                        style={inputStyle}
                                    >
                                        <option value="function">Sys / Function</option>
                                        <option value="endstate">End State</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="text-xs text-gray-500 block mb-0.5">Display Name <span className="text-gray-400">(shown in diagram & grid)</span></label>
                                <input
                                    type="text"
                                    value={displayName}
                                    onChange={(e) => setDisplayName(e.target.value)}
                                    placeholder={name || 'Human-readable label...'}
                                    className="w-full text-xs border rounded px-1 py-0.5 focus:outline-none focus:ring-1 focus:ring-purple-400"
                                    style={inputStyle}
                                    spellCheck={false}
                                />
                            </div>
                            <div>
                                <label className="text-xs text-gray-500 block mb-0.5">Description</label>
                                <input
                                    type="text"
                                    value={description}
                                    onChange={(e) => setDesc(e.target.value)}
                                    placeholder="Optional description..."
                                    className="w-full text-xs border rounded px-1 py-0.5 focus:outline-none focus:ring-1 focus:ring-purple-400"
                                    style={inputStyle}
                                    spellCheck={false}
                                />
                            </div>
                            {type === 'endstate' && (
                                <div>
                                    <label className="text-xs text-gray-500 block mb-0.5">Outcome</label>
                                    <select
                                        value={outcome}
                                        onChange={(e) => setOutcome(e.target.value)}
                                        className="w-full text-xs border rounded px-1 py-0.5 focus:outline-none focus:ring-1 focus:ring-purple-400"
                                        style={{ ...inputStyle, backgroundColor: OUTCOME_OPTS.find(o=>o.value===outcome)?.color || '#e5e7eb', color: OUTCOME_OPTS.find(o=>o.value===outcome)?.text || '#374151' }}
                                    >
                                        {OUTCOME_OPTS.map(o => (
                                            <option key={o.value} value={o.value} style={{ backgroundColor: o.color, color: o.text }}>{o.label}</option>
                                        ))}
                                    </select>
                                </div>
                            )}
                            {type === 'endstate' && (
                                <div className="flex items-center gap-2">
                                    <button
                                        onClick={() => setShowCons(true)}
                                        className="flex-1 text-xs py-0.5 rounded border font-semibold"
                                        style={{ borderColor: isDark ? '#059669' : '#16a34a', color: isDark ? '#6ee7b7' : '#166534', backgroundColor: isDark ? '#064e3b' : '#f0fdf4' }}
                                    >
                                        {consequences.length > 0 ? `✎ Consequences (${consequences.length})` : '✎ Consequences…'}
                                    </button>
                                </div>
                            )}

                            {/* ── Consequences popup dialog (End State modules) ─────── */}
                            {showCons && (
