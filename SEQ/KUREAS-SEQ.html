        // Hazard Selector Modal
        function HazardSelectorModal({ hazards, operatingStates, hazardStates, hazardAnalysisData, onSelect, onClose }) {
            useEscapeKey(onClose);
            const [selectedHazard, setSelectedHazard] = useState(null);
            const [selectedState, setSelectedState] = useState(null);

            // Calculate frequency from applicable events
            const calculateFrequency = (analysisData) => {
                if (!analysisData || !analysisData.applicableEvents) return '';
                
                const frequencies = [];
                analysisData.applicableEvents.forEach(event => {
                    if (event.occurrenceModel === 'frequency') {
                        let freq = null;
                        
                        if (event.frequencyDistribution === 'point' && event.pointEstimate) {
                            freq = parseFloat(event.pointEstimate);
                        } else if (event.frequencyDistribution === 'gamma' && event.gammaShape && event.gammaScale) {
                            freq = parseFloat(event.gammaShape) * parseFloat(event.gammaScale);
                        } else if (event.frequencyDistribution === 'lognormal' && event.lognormalMean) {
                            freq = parseFloat(event.lognormalMean);
                        } else if (event.frequencyDistribution === 'cni' && event.cniMean) {
                            freq = parseFloat(event.cniMean);
                        }
                        
                        if (event.frequencyUnits === '/hr' && freq !== null) {
                            freq = freq * 8760;
                        }
                        
                        if (freq !== null && !isNaN(freq)) {
                            frequencies.push(freq);
                        }
                    } else if (event.occurrenceModel === 'nureg-2169-fire') {
                        // Handle NUREG-2169 Fire Ignition - sum of selected ignition sources
                        const selections = event.fireIgnitionSelections || {};
                        const selectedItems = NUREG2169_FIRE_IGNITION_DATA.filter(item => selections[item.bin]);
                        const totalMean = selectedItems.reduce((sum, item) => sum + item.mean, 0);
                        if (totalMean > 0) {
                            frequencies.push(totalMean);
                        }
                    }
                });
                
                if (frequencies.length === 0) return '';
                const total = frequencies.reduce((sum, f) => sum + f, 0);
                return total.toExponential(2);
            };

            // Get included hazards for a state
            const getIncludedHazards = (stateId) => {
                const included = [];
                const findIncluded = (nodes) => {
                    if (!nodes) return;
                    nodes.forEach(node => {
                        if (node.children && node.children.length > 0) {
                            findIncluded(node.children);
                        } else {
                            // Key format uses underscore: hazardId_stateId
                            const key = `${node.id}_${stateId}`;
                            const status = hazardStates?.[key];
                            let analysis = hazardAnalysisData?.[key];
                            
                            // If this state uses info from another state, get the source analysis
                            if (analysis && analysis.useInfoFrom) {
                                const sourceKey = `${node.id}_${analysis.useInfoFrom}`;
                                analysis = hazardAnalysisData?.[sourceKey] || analysis;
                            }
                            
                            if (status === 'included') {
                                // Get name and eventDescription from first applicable event if available
                                // Always use node.name as the primary hazard name (from the hazard list)
                                let eventName = node.name;
                                let eventDescription = '';
                                if (analysis && analysis.applicableEvents && analysis.applicableEvents.length > 0) {
                                    const firstEvent = analysis.applicableEvents[0];
                                    // Only use firstEvent.name if it's explicitly set and different from eventDescription
                                    if (firstEvent.name && firstEvent.name !== firstEvent.eventDescription) {
                                        eventName = firstEvent.name;
                                    }
                                    eventDescription = firstEvent.eventDescription || '';
                                }
                                
                                included.push({
                                    ...node,
                                    name: eventName,
                                    eventDescription: eventDescription,
                                    frequency: calculateFrequency(analysis)
                                });
                            }
                        }
                    });
                };
                findIncluded(hazards);
                return included;
            };

            const handleSelect = () => {
                if (selectedHazard && selectedState) {
                    const hazard = getIncludedHazards(selectedState.id).find(h => h.id === selectedHazard);
                    onSelect(hazard, selectedState, hazard?.frequency);
                    onClose();
                }
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content modal-content-wide" onClick={e => e.stopPropagation()}>
                        <div className="p-4">
                            <h2 className="text-xl font-bold mb-4">Create New POL</h2>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1">Operating State:</label>
                                    <select
                                        value={selectedState?.id || ''}
                                        onChange={(e) => {
                                            const state = operatingStates.find(s => s.id === e.target.value);
                                            setSelectedState(state);
                                            setSelectedHazard(null);
                                        }}
                                        className="w-full border rounded px-3 py-2"
                                    >
                                        <option value="">Select Operating State</option>
                                        {operatingStates.map(state => (
                                            <option key={state.id} value={state.id}>
                                                {state.id} - {state.name}
                                            </option>
                                        ))}
                                    </select>
                                </div>

                                {selectedState && (
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Hazard (Included hazards only):</label>
                                        <div className="border rounded p-2 max-h-64 overflow-y-auto">
                                            {getIncludedHazards(selectedState.id).length === 0 ? (
                                                <div className="text-gray-500 text-center py-4">
                                                    No included hazards for this operating state
                                                </div>
                                            ) : (
                                                getIncludedHazards(selectedState.id).map(hazard => (
                                                    <div
                                                        key={hazard.id}
                                                        className={`p-2 cursor-pointer rounded ${selectedHazard === hazard.id ? 'bg-blue-100' : 'hover:bg-gray-100'}`}
                                                        onClick={() => setSelectedHazard(hazard.id)}
                                                    >
                                                        <div className="font-medium">{hazard.name}</div>
                                                        {hazard.frequency && (
                                                            <div className="text-sm text-gray-600">Frequency: {hazard.frequency}/yr</div>
                                                        )}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="flex gap-3 justify-end mt-6">
                                <button
                                    onClick={onClose}
                                    className="px-4 py-2 border rounded hover:bg-gray-100"
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={handleSelect}
                                    className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                    disabled={!selectedHazard || !selectedState}
                                >
                                    Create POL
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Mermaid Diagram Component
        function MermaidDiagram({ pol, onNodeClick, settings }) {
            const containerRef = useRef(null);
            const wrapperRef = useRef(null);
            const [svgContent, setSvgContent] = useState('');
            const [zoom, setZoom] = useState(1);
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            const generateMermaidCode = useCallback(() => {
                if (!pol || !pol.nodes || pol.nodes.length === 0) return '';

                const direction = pol.layout || 'LR';
                let code = `flowchart ${direction}\n`;

                // Get arc label size class
                const getArcLabelSize = () => {
                    switch (settings.arcLabelSize) {
                        case 'small': return 10;
                        case 'large': return 16;
                        default: return 13;
                    }
                };

                // Group nodes by shared POL
                const regularNodes = pol.nodes.filter(n => !n.sharedPolId);
                const sharedPolGroups = {};
                pol.nodes.filter(n => n.sharedPolId).forEach(node => {
                    if (!sharedPolGroups[node.sharedPolId]) {
                        sharedPolGroups[node.sharedPolId] = [];
                    }
                    sharedPolGroups[node.sharedPolId].push(node);
                });

                // Add regular node definitions with custom shapes
                // Using backticks for automatic text wrapping (Mermaid 10.1.0+)
                regularNodes.forEach(node => {
                    const label = (node.label || '').replace(/`/g, "'").replace(/"/g, "'");
                    const desc = node.description ? node.description.replace(/`/g, "'").replace(/"/g, "'").substring(0, 200) : '';
                    // Add trailing space to prevent text clipping in PNG export
                    const descLine = desc ? `\n${desc} ` : ' ';
                    
                    switch (node.type) {
                        case NODE_TYPES.INITIATING_EVENT:
                            // Initiating event: hexagon shape {{...}}
                            const freq = node.frequency ? `\n( ${node.frequency} ) ` : '';
                            code += `    ${node.id}{{"\`${label}${descLine}${freq}\`"}}\n`;
                            break;
                        case NODE_TYPES.FUNCTION:
                            code += `    ${node.id}["\`${label}${descLine}\`"]\n`;
                            break;
                        case NODE_TYPES.TRANSITION:
                            // Operating state is now shown on the arc, not in the node
                            code += `    ${node.id}("\`${label}${descLine}\`")\n`;
                            break;
                        case NODE_TYPES.END_STATE:
                            // End state: oval/stadium shape ([...])
                            code += `    ${node.id}(["\`${label}${descLine}\`"])\n`;
                            break;
                    }
                });

                // Add shared POL subgraphs
                Object.entries(sharedPolGroups).forEach(([sharedPolId, nodes]) => {
                    const sharedPolName = pol.sharedPolRefs?.[sharedPolId]?.name || 'Shared Logic';
                    // Sanitize subgraph ID for Mermaid (replace non-alphanumeric with underscore)
                    const safeSubgraphId = 'sg_' + sharedPolId.replace(/[^a-zA-Z0-9]/g, '_');
                    code += `    subgraph ${safeSubgraphId}["${sharedPolName}"]\n`;
                    code += `    style ${safeSubgraphId} stroke-dasharray: 5 5\n`;
                    
                    nodes.forEach(node => {
                        const label = (node.label || '').replace(/`/g, "'").replace(/"/g, "'");
                        const desc = node.description ? node.description.replace(/`/g, "'").replace(/"/g, "'").substring(0, 200) : '';
                        const descLine = desc ? `\n${desc} ` : ' ';
                        
                        switch (node.type) {
                            case NODE_TYPES.FUNCTION:
                                code += `        ${node.id}["\`${label}${descLine}\`"]\n`;
                                break;
                            case NODE_TYPES.TRANSITION:
                                code += `        ${node.id}("\`${label}${descLine}\`")\n`;
                                break;
                            case NODE_TYPES.END_STATE:
                                code += `        ${node.id}(["\`${label}${descLine}\`"])\n`;
                                break;
                        }
                    });
                    
                    code += `    end\n`;
                });

                // Add connections with operating state on arc for transitions
                pol.connections.forEach(conn => {
                    let label = conn.label || '';
                    
                    // Find if source is a transition node and add operating state to arc
                    const sourceNode = pol.nodes.find(n => n.id === conn.from);
                    if (sourceNode && sourceNode.type === NODE_TYPES.TRANSITION && sourceNode.operatingState) {
                        // Add operating state without special characters
                        const stateLabel = sourceNode.operatingState;
                        label = label ? `${label} - ${stateLabel}` : stateLabel;
                    }
                    
                    // Quote the label and add padding spaces to prevent clipping
                    const labelPart = label ? `|"  ${label}  "|` : '';
                    code += `    ${conn.from} -->${labelPart} ${conn.to}\n`;
                });

                // Add styling with node-type-specific colors
                pol.nodes.forEach(node => {
                    let nodeColor = node.color;
                    if (!nodeColor || nodeColor === DEFAULT_SETTINGS.nodeColor) {
                        // Use type-specific default color
                        switch (node.type) {
                            case NODE_TYPES.INITIATING_EVENT:
                                nodeColor = settings.ieColor || '#fecaca';
                                break;
                            case NODE_TYPES.FUNCTION:
                                nodeColor = settings.functionColor || '#e0f2fe';
                                break;
                            case NODE_TYPES.TRANSITION:
                                nodeColor = settings.transitionColor || '#e9d5ff';
                                break;
                            case NODE_TYPES.END_STATE:
                                nodeColor = settings.endStateColor || '#bbf7d0';
                                break;
                            default:
                                nodeColor = settings.nodeColor || '#e0f2fe';
                        }
                    }
                    // Use thicker red stroke for overridden nodes
                    const strokeWidth = node.isOverridden ? '4px' : '2px';
                    const strokeColor = node.isOverridden ? '#dc2626' : '#333';
                    code += `    style ${node.id} fill:${nodeColor},stroke:${strokeColor},stroke-width:${strokeWidth}\n`;
                });

                return code;
            }, [pol, settings]);

            useEffect(() => {
                const renderDiagram = async () => {
                    if (!containerRef.current || !pol) return;

                    const code = generateMermaidCode();
                    if (!code) {
                        setSvgContent('');
                        return;
                    }

                    try {
                        // Reinitialize mermaid with current font size
                        const fontSize = fontSizePx(settings.fontSize);
                        
                        // Get arc label size
                        let edgeLabelFontSize = 13;
                        switch (settings.arcLabelSize) {
                            case 'small': edgeLabelFontSize = 10; break;
                            case 'large': edgeLabelFontSize = 16; break;
                            default: edgeLabelFontSize = 13;
                        }
                        
                        mermaid.initialize({
                            startOnLoad: false,
                            theme: 'default',
                            flowchart: {
                                useMaxWidth: true,
                                htmlLabels: true,
                                curve: 'basis'
                            },
                            themeVariables: {
                                fontSize: `${fontSize}pt`,
                                edgeLabelBackground: '#ffffff',
                                tertiaryTextColor: '#333333'
                            },
                            securityLevel: 'loose'
                        });
                        
                        // Use unique ID for each render to avoid caching issues
                        const uniqueId = 'mermaid-' + pol.id + '-' + Date.now();
                        const { svg } = await mermaid.render(uniqueId, code);
                        
                        // Apply arc label size by modifying SVG
                        let modifiedSvg = svg;
                        modifiedSvg = modifiedSvg.replace(/class="edgeLabel"/g, `class="edgeLabel" style="font-size: ${edgeLabelFontSize}px;"`);
                        
                        setSvgContent(modifiedSvg);
                        
                        // Reset pan when layout changes
                        setPan({ x: 0, y: 0 });
                    } catch (err) {
                        console.error('Mermaid render error:', err);
                        setSvgContent(`<div class="text-red-500 p-4">Error rendering diagram: ${err.message}</div>`);
                    }
                };

                renderDiagram();
            }, [pol, generateMermaidCode, settings.fontSize, settings.arcLabelSize]);

            // Add click handlers to nodes after SVG is rendered
            useEffect(() => {
                if (!containerRef.current || !pol) return;

                const svg = containerRef.current.querySelector('svg');
                if (!svg) return;

                // Find all node groups and add click handlers
                const nodeGroups = svg.querySelectorAll('.node');
                nodeGroups.forEach(nodeGroup => {
                    const nodeId = nodeGroup.id?.replace('flowchart-', '').split('-')[0];
                    if (nodeId) {
                        const node = pol.nodes.find(n => n.id === nodeId);
                        if (node) {
                            nodeGroup.style.cursor = 'pointer';
                            nodeGroup.onclick = (e) => {
                                e.stopPropagation();
                                onNodeClick(node);
                            };
                        }
                    }
                });
            }, [svgContent, pol, onNodeClick]);

            // Attach wheel listener with passive: false to allow preventDefault
            useEffect(() => {
                const wrapper = wrapperRef.current;
                if (!wrapper) return;

                const handleWheel = (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    setZoom(prev => Math.max(0.25, Math.min(3, prev + delta)));
                };

                wrapper.addEventListener('wheel', handleWheel, { passive: false });
                return () => {
                    wrapper.removeEventListener('wheel', handleWheel);
                };
            }, []);

            // Pan handlers
            const handleMouseDown = (e) => {
                if (e.button === 0) {
                    setIsDragging(true);
                    setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
                }
            };

            const handleMouseMove = (e) => {
                if (isDragging) {
                    setPan({
                        x: e.clientX - dragStart.x,
                        y: e.clientY - dragStart.y
                    });
                }
            };

            const handleMouseUp = () => {
                setIsDragging(false);
            };

            const handleZoomIn = () => setZoom(prev => Math.min(prev + 0.25, 3));
            const handleZoomOut = () => setZoom(prev => Math.max(prev - 0.25, 0.25));
            const handleResetView = () => {
                setZoom(1);
                setPan({ x: 0, y: 0 });
            };

            return (
                <div 
                    ref={wrapperRef}
                    className="w-full h-full overflow-hidden relative"
                    onMouseDown={handleMouseDown}
                    onMouseMove={handleMouseMove}
                    onMouseUp={handleMouseUp}
                    onMouseLeave={handleMouseUp}
                    style={{ cursor: isDragging ? 'grabbing' : 'grab' }}
                >
                    <div 
                        ref={containerRef}
                        className="p-4"
                        style={{
                            transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`,
                            transformOrigin: 'center center'
                        }}
                        dangerouslySetInnerHTML={{ __html: svgContent }}
                    />
                    
                    {/* Zoom Controls */}
                    <div className="absolute bottom-4 right-4 flex flex-col gap-1 bg-white rounded shadow-lg border p-1">
                        <button
                            onClick={(e) => { e.stopPropagation(); handleZoomIn(); }}
                            className="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded text-lg font-bold"
                            title="Zoom In"
                        >
                            +
                        </button>
                        <button
                            onClick={(e) => { e.stopPropagation(); handleZoomOut(); }}
                            className="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded text-lg font-bold"
                            title="Zoom Out"
                        >
                            &minus;
                        </button>
                        <div className="border-t my-1"></div>
                        <button
                            onClick={(e) => { e.stopPropagation(); handleResetView(); }}
                            className="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded text-xs"
                            title="Reset View"
                        >
                            &#8634;
                        </button>
                    </div>
                    
                    {/* Zoom indicator */}
                    <div className="absolute bottom-4 left-4 text-xs text-gray-500 bg-white px-2 py-1 rounded shadow">
                        {Math.round(zoom * 100)}%
                    </div>
                </div>
            );
        }

        // Filter Modal Component
        function FilterModal({ hazards, hazardStates, operatingStates, pols, filter, onSave, onClose }) {
            useEscapeKey(onClose);
            const [localFilter, setLocalFilter] = useState({ ...filter });

            // Get all unique hazards that are included in at least one state
            const getIncludedHazardsList = () => {
                const included = [];
                const processNode = (node) => {
                    if (node.children && node.children.length > 0) {
                        node.children.forEach(child => processNode(child));
                    } else {
                        // Check if this hazard is included in any state
                        for (const state of operatingStates) {
                            const key = `${node.id}_${state.id}`;
                            if (hazardStates[key] === 'included') {
                                included.push({ id: node.id, name: node.name });
                                break;
                            }
                        }
                    }
                };
                if (hazards) {
                    hazards.forEach(node => processNode(node));
                }
                return included;
            };

            // Get hazards that have diagrams
            const getHazardsWithDiagrams = () => {
                const hazardIds = new Set();
                pols.forEach(pol => {
                    if (pol.hazardId) {
                        hazardIds.add(pol.hazardId);
                    }
                });
                return hazardIds;
            };

            const includedHazards = getIncludedHazardsList();
            const hazardsWithDiagrams = getHazardsWithDiagrams();

            const handleToggleState = (stateId) => {
                setLocalFilter(prev => {
                    const states = prev.states.includes(stateId)
                        ? prev.states.filter(s => s !== stateId)
                        : [...prev.states, stateId];
                    return { ...prev, states };
                });
            };

            const handleToggleHazard = (hazardId) => {
                setLocalFilter(prev => {
                    const hazardIds = prev.hazardIds.includes(hazardId)
                        ? prev.hazardIds.filter(h => h !== hazardId)
                        : [...prev.hazardIds, hazardId];
                    return { ...prev, hazardIds };
                });
            };

            const handleSelectAllStates = () => {
                setLocalFilter(prev => ({ ...prev, states: [] }));
            };

            const handleSelectNoStates = () => {
                setLocalFilter(prev => ({ ...prev, states: ['none'] }));
            };

            const handleSelectAllHazards = () => {
                setLocalFilter(prev => ({ ...prev, hazardIds: [], showOnlyWithDiagrams: false }));
            };

            const handleShowHazardsWithDiagrams = () => {
                setLocalFilter(prev => ({ ...prev, showOnlyWithDiagrams: !prev.showOnlyWithDiagrams }));
            };

            const handleSave = () => {
                onSave(localFilter);
                onClose();
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div className="p-4">
                            <h2 className="text-xl font-bold mb-4">Filter Included Hazards</h2>
                            
                            <div className="space-y-4">
                                {/* Operating States Filter */}
                                <div>
                                    <div className="flex items-center justify-between mb-2">
                                        <label className="block text-sm font-medium">Operating States:</label>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={handleSelectAllStates}
                                                className="text-xs text-blue-600 hover:text-blue-800"
                                            >
                                                All
                                            </button>
                                            <button
                                                onClick={handleSelectNoStates}
                                                className="text-xs text-blue-600 hover:text-blue-800"
                                            >
                                                None
                                            </button>
                                        </div>
                                    </div>
                                    <div className="border rounded p-2 max-h-32 overflow-y-auto">
                                        {operatingStates.map(state => {
                                            const isSelected = localFilter.states.length === 0 || localFilter.states.includes(state.id);
                                            return (
                                                <label key={state.id} className="flex items-center gap-2 p-1 hover:bg-gray-100 cursor-pointer">
                                                    <input
                                                        type="checkbox"
                                                        checked={isSelected && !localFilter.states.includes('none')}
                                                        onChange={() => handleToggleState(state.id)}
                                                    />
                                                    <span 
                                                        className="w-3 h-3 rounded"
                                                        style={{ backgroundColor: state.color }}
                                                    />
                                                    <span className="text-sm">{state.id} - {state.name}</span>
                                                </label>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Hazards Filter */}
                                <div>
                                    <div className="flex items-center justify-between mb-2">
                                        <label className="block text-sm font-medium">Hazards:</label>
                                        <button
                                            onClick={handleSelectAllHazards}
                                            className="text-xs text-blue-600 hover:text-blue-800"
                                        >
                                            Show All
                                        </button>
                                    </div>
                                    
                                    {/* Show Hazards with Diagrams checkbox */}
                                    <label className="flex items-center gap-2 p-2 mb-2 bg-blue-50 rounded cursor-pointer hover:bg-blue-100">
                                        <input
                                            type="checkbox"
                                            checked={localFilter.showOnlyWithDiagrams || false}
                                            onChange={handleShowHazardsWithDiagrams}
                                        />
                                        <span className="text-sm font-medium text-blue-700">
                                            Show Hazards with Diagrams Only ({hazardsWithDiagrams.size})
                                        </span>
                                    </label>
                                    
                                    <div className="border rounded p-2 max-h-48 overflow-y-auto">
                                        {includedHazards.length === 0 ? (
                                            <div className="text-gray-500 text-sm text-center py-2">
                                                No included hazards
                                            </div>
                                        ) : (
                                            includedHazards.map(hazard => {
                                                const isSelected = localFilter.hazardIds.length === 0 || localFilter.hazardIds.includes(hazard.id);
                                                const hasDiagram = hazardsWithDiagrams.has(hazard.id);
                                                return (
                                                    <label key={hazard.id} className="flex items-center gap-2 p-1 hover:bg-gray-100 cursor-pointer">
                                                        <input
                                                            type="checkbox"
                                                            checked={isSelected}
                                                            onChange={() => handleToggleHazard(hazard.id)}
                                                        />
                                                        <span className="text-sm truncate">{hazard.name}</span>
                                                        {hasDiagram && (
                                                            <span className="text-xs text-green-600 ml-auto">&#x2713;</span>
                                                        )}
                                                    </label>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-3 justify-end mt-6">
                                <button
                                    onClick={onClose}
                                    className="px-4 py-2 border rounded hover:bg-gray-100"
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={handleSave}
                                    className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                >
                                    Apply Filter
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Included Hazards Tree Component
        // ── Modify IE List Modal ──────────────────────────────────────────────────
        function ModifyIEListModal({ hazardList, onSave, onClose, ieScripts, onSaveIeScript }) {
            useEscapeKey(onClose);
            const [localList, setLocalList] = useState(JSON.parse(JSON.stringify(hazardList)));
            const [editingNode, setEditingNode] = useState(null);
            const [expandedNodes, setExpandedNodes] = useState(new Set());
            const [showAddForm, setShowAddForm] = useState(hazardList.length === 0);
            const [newIE, setNewIE] = useState({ level1: '', level2: '', level3: '', level4: '' });
            const [editingFullPath, setEditingFullPath] = useState(null);
            // occurrence model state lives inside editingFullPath as .occurrenceData = { occurrenceModel, ... }

            const toggleExpand = (nodeId) => {
                const s = new Set(expandedNodes);
                if (s.has(nodeId)) s.delete(nodeId); else s.add(nodeId);
                setExpandedNodes(s);
            };

            const findNodeById = (nodes, id) => {
                for (const n of nodes) {
                    if (n.id === id) return n;
                    if (n.children) { const f = findNodeById(n.children, id); if (f) return f; }
                }
                return null;
            };

            const removeNode = (nodes, id) => nodes.filter(n => {
                if (n.id === id) return false;
                if (n.children) n.children = removeNode(n.children, id);
                return true;
            });

            const updateNodeName = (nodes, id, name) => nodes.map(n => {
                if (n.id === id) return { ...n, name };
                if (n.children) return { ...n, children: updateNodeName(n.children, id, name) };
                return n;
            });

            const getNodePath = (targetId) => {
                const walk = (nodes, path) => {
                    for (const n of nodes) {
                        const p = [...path, n.name];
                        if (n.id === targetId) return p;
                        if (n.children) { const r = walk(n.children, p); if (r) return r; }
                    }
                    return null;
                };
                const result = walk(localList, []);
                const padded = [...(result || [])];
                while (padded.length < 4) padded.push('');
                return padded;
            };

            const getNodeLevel = (targetId) => {
                const walk = (nodes, depth) => {
                    for (const n of nodes) {
                        if (n.id === targetId) return depth;
                        if (n.children) { const r = walk(n.children, depth + 1); if (r !== -1) return r; }
                    }
                    return -1;
                };
                return walk(localList, 0);
            };

            const getNextHazId = (nodes) => {
                let maxId = 0;
                const walk = (list) => list.forEach(n => {
                    const m = (n.id || '').match(/^HAZ-(\d+)$/);
                    if (m) { const v = parseInt(m[1], 10); if (v > maxId) maxId = v; }
                    if (n.children) walk(n.children);
                });
                walk(nodes);
                return maxId + 1;
            };

            const handleSaveFullPath = () => {
                if (!editingFullPath) return;
                const { nodeId, level } = editingFullPath;
                const fp = editingFullPath.path;
                const l1 = fp[0].trim(), l2 = fp[1].trim(), l3 = fp[2].trim(), l4 = fp[3].trim();
                if (!l1) { alert('Level 1 (Category) is required.'); return; }
                if (level >= 1 && !l2) { alert('Level 2 (Group) is required for this node.'); return; }
                if (level >= 2 && !l3) { alert('Level 3 (Type) is required for this node.'); return; }
                if (level >= 3 && !l4) { alert('Level 4 (Event) is required for this node.'); return; }

                // Save occurrence model override for this IE node
                if (onSaveIeScript && editingFullPath.occurrenceData !== undefined) {
                    onSaveIeScript(nodeId, 'occurrenceData', editingFullPath.occurrenceData);
                }

                const nodeToMove = findNodeById(localList, nodeId);
                if (!nodeToMove) { setEditingFullPath(null); return; }
                let work = removeNode(JSON.parse(JSON.stringify(localList)), nodeId);
                let nextId = getNextHazId(work) + 100;
                const mk = (name) => ({ id: `HAZ-${nextId++}`, name, children: [] });

                if (level === 0) {
                    const ex = work.find(n => n.name.toLowerCase() === l1.toLowerCase());
                    if (ex) { (nodeToMove.children || []).forEach(c => ex.children.push(c)); }
                    else work.push({ ...nodeToMove, name: l1 });
                } else if (level === 1) {
                    let p1 = work.find(n => n.name.toLowerCase() === l1.toLowerCase());
                    if (!p1) { p1 = mk(l1); work.push(p1); }
                    if (!p1.children) p1.children = [];
                    const ex = p1.children.find(n => n.name.toLowerCase() === l2.toLowerCase());
                    if (ex) { (nodeToMove.children || []).forEach(c => ex.children.push(c)); }
                    else p1.children.push({ ...nodeToMove, name: l2 });
                } else if (level === 2) {
                    let p1 = work.find(n => n.name.toLowerCase() === l1.toLowerCase());
                    if (!p1) { p1 = mk(l1); work.push(p1); }
                    if (!p1.children) p1.children = [];
                    let p2 = p1.children.find(n => n.name.toLowerCase() === l2.toLowerCase());
                    if (!p2) { p2 = mk(l2); p1.children.push(p2); }
                    if (!p2.children) p2.children = [];
                    const ex = p2.children.find(n => n.name.toLowerCase() === l3.toLowerCase());
                    if (ex) { (nodeToMove.children || []).forEach(c => ex.children.push(c)); }
                    else p2.children.push({ ...nodeToMove, name: l3 });
                } else {
                    let p1 = work.find(n => n.name.toLowerCase() === l1.toLowerCase());
                    if (!p1) { p1 = mk(l1); work.push(p1); }
                    if (!p1.children) p1.children = [];
                    let p2 = p1.children.find(n => n.name.toLowerCase() === l2.toLowerCase());
                    if (!p2) { p2 = mk(l2); p1.children.push(p2); }
                    if (!p2.children) p2.children = [];
                    let p3 = p2.children.find(n => n.name.toLowerCase() === l3.toLowerCase());
                    if (!p3) { p3 = mk(l3); p2.children.push(p3); }
                    if (!p3.children) p3.children = [];
                    if (!p3.children.find(n => n.name.toLowerCase() === l4.toLowerCase())) {
                        p3.children.push({ ...nodeToMove, name: l4, children: [] });
                    }
                }
                setLocalList(work);
                setEditingFullPath(null);
            };

            const handleRemove = (nodeId) => {
                if (confirm('Remove this IE / group and all its children? This cannot be undone.')) {
                    setLocalList(removeNode(JSON.parse(JSON.stringify(localList)), nodeId));
                }
            };

            const handleSaveEdit = () => {
                if (editingNode && editingNode.name.trim()) {
                    setLocalList(updateNodeName(localList, editingNode.id, editingNode.name.trim()));
                    setEditingNode(null);
                }
            };

            const handleAddIE = () => {
                const l1 = newIE.level1.trim(), l2 = newIE.level2.trim();
                const l3 = newIE.level3.trim(), l4 = newIE.level4.trim();
                if (!l1) { alert('Please enter at least a Level 1 (IE Category).'); return; }
                let nextId = getNextHazId(localList);
                const updated = JSON.parse(JSON.stringify(localList));

                let n1 = updated.find(n => n.name.toLowerCase() === l1.toLowerCase());
                if (!n1) { n1 = { id: `HAZ-${nextId++}`, name: l1, children: [] }; updated.push(n1); }
                if (!n1.children) n1.children = [];

                if (l2) {
                    let n2 = n1.children.find(n => n.name.toLowerCase() === l2.toLowerCase());
                    if (!n2) { n2 = { id: `HAZ-${nextId++}`, name: l2, children: [] }; n1.children.push(n2); }
                    if (!n2.children) n2.children = [];
                    if (l3) {
                        let n3 = n2.children.find(n => n.name.toLowerCase() === l3.toLowerCase());
                        if (!n3) { n3 = { id: `HAZ-${nextId++}`, name: l3, children: [] }; n2.children.push(n3); }
                        if (!n3.children) n3.children = [];
                        if (l4 && !n3.children.find(n => n.name.toLowerCase() === l4.toLowerCase())) {
                            n3.children.push({ id: `HAZ-${nextId++}`, name: l4, children: [] });
                        }
                    }
                }

                setLocalList(updated);
                const newExp = new Set(expandedNodes);
                updated.forEach(n => {
                    if (n.name.toLowerCase() === l1.toLowerCase()) {
                        newExp.add(n.id);
                        if (l2 && n.children) n.children.forEach(c => {
                            if (c.name.toLowerCase() === l2.toLowerCase()) {
                                newExp.add(c.id);
                                if (l3 && c.children) c.children.forEach(d => {
                                    if (d.name.toLowerCase() === l3.toLowerCase()) newExp.add(d.id);
                                });
                            }
                        });
                    }
                });
                setExpandedNodes(newExp);
                setNewIE(prev => ({ ...prev, level3: '', level4: '' }));
            };

            const renderNode = (node, level) => {
                const hasChildren = node.children && node.children.length > 0;
                const isExpanded = expandedNodes.has(node.id);
                const isEditing = editingNode && editingNode.id === node.id;
                const levelLabels = ['Category', 'Group', 'Type', 'IE'];
                const levelLabel = level < levelLabels.length ? levelLabels[level] : '';

                return (
                    <div key={node.id}>
                        <div
                            className="flex items-center gap-2 py-1 px-2 hover:bg-gray-100"
                            style={{ paddingLeft: `${level * 20 + 8}px` }}
                        >
                            {hasChildren ? (
                                <span onClick={() => toggleExpand(node.id)} className="cursor-pointer select-none w-4 text-xs text-gray-500">
                                    {isExpanded ? '\u25BC' : '\u25B6'}
                                </span>
                            ) : <span className="w-4"></span>}

                            {isEditing ? (
                                <input
                                    type="text"
                                    value={editingNode.name}
                                    onChange={(e) => setEditingNode({ ...editingNode, name: e.target.value })}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleSaveEdit(); if (e.key === 'Escape') setEditingNode(null); }}
                                    className="flex-1 border rounded px-2 py-1 text-sm"
                                    autoFocus
                                />
                            ) : (
                                <span
                                    className="flex-1 text-sm cursor-pointer hover:text-blue-700 hover:underline"
                                    title="Click to rename"
                                    onClick={() => setEditingNode({ id: node.id, name: node.name })}
                                >
                                    {node.name}
                                    {levelLabel && <span className="ml-2 text-xs text-gray-400" style={{ textDecoration: 'none' }}>({levelLabel})</span>}
                                </span>
                            )}

                            <div className="flex gap-1 flex-shrink-0">
                                {isEditing ? (
                                    <React.Fragment>
                                        <button onClick={handleSaveEdit} className="px-2 py-1 bg-green-600 text-white text-xs rounded hover:bg-green-700">Save</button>
                                        <button onClick={() => setEditingNode(null)} className="px-2 py-1 bg-gray-500 text-white text-xs rounded hover:bg-gray-600">Cancel</button>
                                    </React.Fragment>
                                ) : (
                                    <React.Fragment>
                                        <button
                                            onClick={() => {
                                                const existing = (ieScripts || {})[node.id] || {};
                                                setEditingFullPath({
                                                    nodeId: node.id,
                                                    level,
                                                    path: getNodePath(node.id),
                                                    isLeaf: !hasChildren,
                                                    occurrenceData: existing.occurrenceData || { occurrenceModel: 'frequency', frequencyDistribution: 'point', pointEstimate: '', frequencyUnits: '/yr' }
                                                });
                                            }}
                                            className="px-2 py-1 bg-blue-600 text-white text-xs rounded hover:bg-blue-700"
                                            title="Edit full path (all ancestor levels)"
                                        >Edit</button>
                                        <button
                                            onClick={() => handleRemove(node.id)}
                                            className="px-2 py-1 bg-red-600 text-white text-xs rounded hover:bg-red-700"
                                            title="Remove this IE / group and all its children"
                                        >Remove</button>
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                        {hasChildren && isExpanded && (
                            <div>{node.children.map(child => renderNode(child, level + 1))}</div>
                        )}
                    </div>
                );
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content" style={{ maxWidth: '900px', backgroundColor: '#ffffff', color: '#111827', maxHeight: '90vh', display: 'flex', flexDirection: 'column' }}>
                        <div className="p-4 flex flex-col flex-1 overflow-hidden">
                            <h2 className="text-xl font-bold mb-3">Modify IE List</h2>

                            <div className="mb-3 p-3 bg-purple-50 border border-purple-200 rounded text-sm">
                                <p className="font-semibold mb-1">IE Tree Hierarchy</p>
                                <p className="text-gray-700 mb-1">Initiating events are organized up to four levels deep (mirroring the linked HA file):</p>
                                <div className="ml-2 text-gray-600" style={{ lineHeight: '1.6' }}>
                                    <div><strong>Level 1:</strong> IE Category <span className="text-gray-400 italic">(e.g., Internal Hazards)</span></div>
                                    <div style={{ paddingLeft: '20px' }}><strong>Level 2:</strong> IE Group <span className="text-gray-400 italic">(e.g., Internal Fire)</span></div>
                                    <div style={{ paddingLeft: '40px' }}><strong>Level 3:</strong> IE Type <span className="text-gray-400 italic">(e.g., Building X Fires)</span></div>
                                    <div style={{ paddingLeft: '60px' }}><strong>Level 4:</strong> Initiating Event <span className="text-gray-400 italic">(e.g., Fire in Electrical Cabinet #1)</span></div>
                                </div>
                                <p className="text-xs text-orange-700 mt-2">⚠️ Edits here modify the local copy of the IE tree. Reloading the HA file will reset to the original.</p>
                            </div>

                            {/* Add IE Form */}
                            <div className="mb-3 p-3 bg-gray-50 border rounded flex-shrink-0">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="font-semibold text-sm">Add IE</span>
                                    {!showAddForm && (
                                        <button onClick={() => setShowAddForm(true)} className="px-3 py-1 bg-green-600 text-white text-xs rounded hover:bg-green-700">+ Add IE</button>
                                    )}
                                </div>
                                {showAddForm && (
                                    <div>
                                        <div className="grid grid-cols-2 gap-2 mb-2">
                                            {(() => {
                                                const l1Opts = [...new Set(localList.map(n => n.name))];
                                                const matchedL1 = localList.find(n => n.name.toLowerCase() === newIE.level1.trim().toLowerCase());
                                                const l2Opts = matchedL1 ? [...new Set((matchedL1.children || []).map(n => n.name))] : [...new Set(localList.flatMap(n => (n.children || []).map(c => c.name)))];
                                                const matchedL2 = matchedL1 && (matchedL1.children || []).find(n => n.name.toLowerCase() === newIE.level2.trim().toLowerCase());
                                                const l3Opts = matchedL2 ? [...new Set((matchedL2.children || []).map(n => n.name))] : [];
                                                const matchedL3 = matchedL2 && (matchedL2.children || []).find(n => n.name.toLowerCase() === newIE.level3.trim().toLowerCase());
                                                const l4Opts = matchedL3 ? [...new Set((matchedL3.children || []).map(n => n.name))] : [];
                                                return (
                                                    <React.Fragment>
                                                        <datalist id="ie-l1-opts">{l1Opts.map(o => <option key={o} value={o}/>)}</datalist>
                                                        <datalist id="ie-l2-opts">{l2Opts.map(o => <option key={o} value={o}/>)}</datalist>
                                                        <datalist id="ie-l3-opts">{l3Opts.map(o => <option key={o} value={o}/>)}</datalist>
                                                        <datalist id="ie-l4-opts">{l4Opts.map(o => <option key={o} value={o}/>)}</datalist>
                                                        <div>
                                                            <label className="block text-xs text-gray-500 mb-0.5">Level 1: IE Category *</label>
                                                            <input type="text" list="ie-l1-opts" value={newIE.level1}
                                                                onChange={e => setNewIE(prev => ({ ...prev, level1: e.target.value, level2: '', level3: '', level4: '' }))}
                                                                className="w-full border rounded px-2 py-1.5 text-sm" placeholder="e.g., Internal Hazards" autoComplete="off" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs text-gray-500 mb-0.5">Level 2: IE Group</label>
                                                            <input type="text" list="ie-l2-opts" value={newIE.level2}
                                                                onChange={e => setNewIE(prev => ({ ...prev, level2: e.target.value, level3: '', level4: '' }))}
                                                                className="w-full border rounded px-2 py-1.5 text-sm" placeholder="e.g., Internal Fire" autoComplete="off" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs text-gray-500 mb-0.5">Level 3: IE Type</label>
                                                            <input type="text" list="ie-l3-opts" value={newIE.level3}
                                                                onChange={e => setNewIE(prev => ({ ...prev, level3: e.target.value, level4: '' }))}
                                                                className="w-full border rounded px-2 py-1.5 text-sm" placeholder="e.g., Building X Fires" autoComplete="off" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs text-gray-500 mb-0.5">Level 4: Initiating Event</label>
                                                            <input type="text" list="ie-l4-opts" value={newIE.level4}
                                                                onChange={e => setNewIE(prev => ({ ...prev, level4: e.target.value }))}
                                                                className="w-full border rounded px-2 py-1.5 text-sm" placeholder="e.g., LOSP-1"
                                                                onKeyDown={e => { if (e.key === 'Enter') handleAddIE(); }} autoComplete="off" />
                                                        </div>
                                                    </React.Fragment>
                                                );
                                            })()}
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={handleAddIE} className="px-3 py-1.5 bg-green-600 text-white text-sm rounded hover:bg-green-700">Add IE</button>
                                            <button onClick={() => setShowAddForm(false)} className="px-3 py-1.5 border text-sm rounded hover:bg-gray-100">Hide Form</button>
                                        </div>
                                        <p className="text-xs text-gray-400 mt-1">Existing parent levels are reused automatically. Press Enter in the last field to add quickly.</p>
                                    </div>
                                )}
                            </div>

                            <div className="mb-2 text-sm text-gray-600 flex-shrink-0">
                                <p><strong>Click a name</strong> to rename inline &nbsp;|&nbsp; <strong>Edit</strong> to change full path &nbsp;|&nbsp; <strong>Remove</strong> to permanently delete a node and all its children</p>
                            </div>

                            <div className="border rounded p-2 overflow-y-auto mb-4 flex-1" style={{ minHeight: '200px' }}>
                                {localList.length > 0 ? localList.map(n => renderNode(n, 0)) : (
                                    <div className="text-center text-gray-500 py-4">No IEs in list. Use the Add IE form above to create your first entry.</div>
                                )}
                            </div>

                            <div className="flex gap-3 justify-end flex-shrink-0">
                                <button onClick={onClose} className="px-4 py-2 border rounded hover:bg-gray-100">Cancel</button>
                                <button onClick={() => { onSave(localList); onClose(); }} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save Changes</button>
                            </div>
                        </div>
                    </div>

                    {/* Full-path / details editor overlay */}
                    {editingFullPath && (
                        <div className="modal-overlay" style={{ zIndex: 200 }}>
                            <div className="modal-content" style={{ maxWidth: '560px', backgroundColor: '#ffffff', color: '#111827', maxHeight: '90vh', overflowY: 'auto' }}>
                                <div className="p-4">
                                    <h3 className="text-lg font-bold mb-1">Edit Initiating Event Details</h3>
                                    <p className="text-xs text-gray-500 mb-3">Edit any level name. Changing a parent level will move this node under the matching existing node, or create a new one.</p>

                                    {/* Path levels */}
                                    {['Category', 'Group', 'Type', 'IE'].map((label, i) => {
                                        const disabled = i > editingFullPath.level;
                                        return (
                                            <div key={i} className="mb-3">
                                                <label className="block text-xs font-medium mb-0.5" style={{ color: disabled ? '#9ca3af' : '#374151' }}>
                                                    Level {i + 1}: {label}{i === 0 ? ' *' : ''}
                                                    {i === editingFullPath.level && <span className="ml-2 text-xs font-semibold text-blue-600">(this node)</span>}
                                                </label>
                                                <input
                                                    type="text"
                                                    value={editingFullPath.path[i]}
                                                    onChange={e => { const p = [...editingFullPath.path]; p[i] = e.target.value; setEditingFullPath(prev => ({ ...prev, path: p })); }}
                                                    disabled={disabled}
                                                    className="w-full border rounded px-2 py-1.5 text-sm"
                                                    style={{ backgroundColor: disabled ? '#f9fafb' : '#fff', color: disabled ? '#9ca3af' : '#111827', fontStyle: disabled ? 'italic' : 'normal', borderColor: i === editingFullPath.level ? '#3b82f6' : '#d1d5db' }}
                                                    placeholder={disabled ? '(not applicable)' : `e.g., ${['Internal Hazards','Internal Fire','Building X Fires','LOSP-1'][i]}`}
                                                    autoFocus={i === editingFullPath.level}
                                                    onKeyDown={e => { if (e.key === 'Enter') handleSaveFullPath(); if (e.key === 'Escape') setEditingFullPath(null); }}

                                            </div>

                                    {/* Occurrence model — only shown for leaf IE nodes */}
                                    {editingFullPath.isLeaf && (() => {
                                        const od = editingFullPath.occurrenceData || {};
                                        const setOd = (patch) => setEditingFullPath(prev => ({ ...prev, occurrenceData: { ...(prev.occurrenceData || {}), ...patch } }));
                                        const model = od.occurrenceModel || 'frequency';
                                        return (
                                            <div className="mt-4 border-t pt-4 space-y-3">
                                                <div className="text-sm font-semibold text-gray-700 mb-2">Occurrence Model Override</div>

                                                        <option value="screened-low-freq">Screened due to low frequency</option>
                                                        <option value="screened-low-consequence">Screened due to low consequence</option>
                                                        <option value="screened-not-applicable">Screened due to not being applicable</option>
                                                        <option value="none">(No override — use HA file)</option>
